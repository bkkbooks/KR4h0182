body:
  text: 元萇振興溫泉頌夫駕輕煙勒麟鳳駃及奔星走攀流月蟬變羽化之民餐霞之士斯蓋有道存焉固非人事之所覶瞜至若泥行水驟血食之夫興沒自天去來非已寸陰於朝露百齡迅於滅電一物不諧則疣贅以生庶事不康則風火以敗故聖王百姓之多疹撰藥石以濟之造化愍蒼生之鴆毒設甘餌以救之蓋溫泉者乃自然之經方天地之元醫出于河渭之南泄于麗山之下淵華玉徹清數刃靈感超異畯極不測無樵薪之爨而揚湯沸于楚鑊無公蔬之探而寒暑調于夏鼎高塘之雲朝舞于水湄巫山之雨夕收于淵際青林碧草含露而迎岸香風蕙色列而環渚于是左湯谷右濛汜南九江北輸海千城万國之氓懷疾枕疴之口莫不宿粻而來賓療苦于斯水但上無尺棟下無環堵悠悠君子我將安泊孤忝發軫咸池分條紫漢道屬升平弱年斆仕既歷通顯朝望已隆爰自常伯出居分陜地兼陸海之饒祿厚封君之室而報天之效無聞恤民之譽安在每思傾微寒深責以為斯泉天實之而人略未備乃翦山開鄣因林搆宇邃館來風清簷駐月望想煙霞遲羽衣之或顧願言多士恕因茲以蕩穢乃作頌曰皇皇上靈愍我蒼生泌彼溫泉于此麗川其水剋神剋神剋聖濟世之醫救民之命其聖伊何排霜吐旭其神伊何吞耽去毒無藉煙炭誰假樵木湛若虞淵沸如湯谷東枕華山西揯咸陽連疇接畛墟落相望彩林爭翠菉樹成行香風旦起文霞夕張陟彼麗山望想千里乃作高堂鴻飛鳳起三輔之英五都之士慕我芳塵爰居爰止其德既酋其聲既遠金華屑桂舂山九轉目放群羊手犬控鵠來思俊我口堂而下闕碑拓本上言乙龍虎居喪并數閏月求仕案違制律居三年之喪而冒哀求仕五歲刑龍虎未盡二十七月而請宿衛刑五歲魏書禮志四延昌二年偏將軍乙龍虎喪父給假二十七月而龍虎并數閏月詣府求上領軍元珍上言又見通典一百又上言案士虞禮三年之喪期而小祥又期而大祥中月而禫鄭玄云中猶間也自喪至此凡二十七月又禮言祥之日鼓素琴鄭云鼓琴者存樂也孔子祥後五日彈琴而不成十日而成笙歌鄭注與鄭志及踰月可以歌皆身自逾月可為此謂存樂也非所謂樂樂者使工為之晉博士許猛解三驗曰案黍離麥秀之歌小雅曰君子作歌惟以告哀魏詩曰心之憂矣我歌且謠若斯之類豈可謂之金石之樂哉是以徒歌謂之謠徒吹謂之和記曰比音而樂之及干戚羽毛謂之樂若夫禮樂之施于金石越于聲音者此乃所謂樂也至于素琴以示終笙歌以省哀者則非樂矣聞傳云大祥除衰杖而素縞麻衣大祥之服也雜記注云衣黃裳則是禫祭黃者未大吉也檀弓云祥而縞是月禫徙月樂鄭志趙商問鄭玄答云祥謂大祥二十五月是月禫謂二十七月非謂上祥之月也徙月而樂許猛釋六徵曰樂者自謂八音克諧之樂也謂在二十八月工奏金石之樂耳而駮云大祥之後喪事終矣脫如此駮禫復焉施又駮云禫中鼓琴復有罪乎然禫則黃裳未大吉也鼓琴存樂在禮所許若使工奏八音融然成韻既未徙月不罪伊何又駮云禫中既得從御職事求上何為不可檢龍虎居喪二十六月始是素縞麻衣大祥之中何謂禫乎三年沒閏理無可疑麻衣在體冒仕求榮實為大尤罪其焉捨又省依王杜禫祥同月全乖鄭義喪凶尚遠而欲速除何匆匆者哉下府愚量鄭為得之何者禮記云吉事尚近日凶事尚遠日又論語云喪與其易寧戚而服限三年痛盡終身中月之解雖容二義尚遠寧戚又檢王杜之義起于魏末晉初及越騎校尉程猗贊成王肅駮鄭禫二十七月之失為六徵三驗上言于晉武帝曰夫禮國之大典兆民所日用豈可二哉今服禫者各各不同非聖世一統之謂鄭玄説二十七月禫甚乖大義臣每難鄭失六有徵三有驗初未能破臣難而通玄説者如猗之意謂鄭義廢矣太康中許猛上言扶鄭釋六徵解三驗以鄭禫二十七月為得猗及王肅為失而博士宋昌等議猛扶鄭為衷晉武從之王杜之義于是敗矣王杜之義見敗者晉武知其不可行故也而上省同猗而贊王欲虧鄭之成軌竊所未寧更無異義還從前處魏書禮志四崔鴻駮珍又上言云云又略見通典一百奏言尚書公事不應送御史案御史令云中尉督司百寮治書侍御史糾察禁內又云中尉出行車輻前驅除道一里王公百辟避路時經四帝前後中尉二十許入奉以周旋未曾暫廢府寺臺省並從此令唯肅宗之世為臨洮舉哀故兼尚書左僕射臣順不肯與名又不送簿故中尉臣酈道元舉而奏之而順復啓云尚書百揆之本令僕納言之貴不宜下隸中尉送名御史尋亦蒙敕聽如其奏從此迄今便無準一臣初上臺具見其事意欲申請決議但以權兼未宜便耳日復一日遂歷炎涼去月朔旦臺移尚書索應朝名帳而省稽留不送尋復移催并主使忽為尚書郎中裴獻伯後注云案舊事御史中尉逢臺郎于復道中尉下車執板郎中車上舉手禮之以此而言明非敵體臣既見此深為怪愕旋省二三未解所以正謂都省別被新式改易高祖舊命即遣移問事何所依又獲尚書郎中王元旭報出蔡氏漢官似非穿鑿始知裴王亦規壞典謨兩人心欲自矯臣案漢書宣秉傳云詔徵秉為御史中丞與司隸校尉尚書令俱會殿庭並專席而坐京師號之為三獨坐又尋魏書崔琰傳晉文陽傳嘏傳皆云既為中丞百寮震悚以此而言則中丞不揖省郎蓋已久矣憲臺不屬都堂亦非今日又尋職令云朝會失時即加彈糾則百官簿帳應送上臺灼然明矣又皇太子以下違犯憲制皆得糾察則令僕朝名宣付御史又亦彰矣不付名至否臧何驗臣順專執未為平通先朝曲遂豈是正法謹案尚書郎中臣裴獻伯王元旭等望班士流早參清宦輕弄短札斐然若斯苟執異端忽焉至此此而不綱將隳朝令請以見事免獻伯等所居官付法科處尚書納言之本令僕百揆之要同彼浮虛助之乖失宜明首從節級其罪魏書宗室元子思傳又通典二十四引兩條諫南征表乞少留思更圖後舉魏書宗室武衛將軍謂附傳高祖南征丕表奏議斬絞刑聖心垂仁恕之惠使受戮者免裸骸之恥普天感德莫不幸甚臣等謹議大逆及賊各棄市袒斬盜及吏受賕各絞刑踣諸甸師魏書刑罰志太和元年司徒元丕等奏言對詔奏既葬即吉伏奉明詔群情圮絶臣與元等不識古義以老朽之年歷奉纍聖國家舊事頗所知聞伏惟遠祖重光世襲至有大諱之日唯侍送梓宮者凶服左右盡皆從吉四祖三宗因而無改世祖高宗臣所目見唯先帝升遐臣受任長安不在侍送之列竊聞所傳無異前式伏惟陛下以至孝之性哀毀過禮伏聞所御三食不滿半溢臣等叩心絶氣坐不安席願暫抑至慕之情遵先朝成事思金册遺令奉行前式無失舊典魏書禮志三詔遣尚書李沖宣旨于東陽王丕等丕對又奏臣與尉元歷事五帝雖衰老無識敢奏所聞自聖世以來大諱之後三月必須迎神于西攘惡于北具行吉禮自皇始以來未之或易魏書禮志三通典八十東陽王丕奏奏遷主太廟竊聞太廟已就明堂功畢然享祀之禮不可久曠至于移廟之日須得國之大姓遷主安廟禮部尚書王諶既是庶姓不宜參豫臣昔以皇室宗屬遷世祖之主先朝舊式不敢不聞魏書禮志三太和十五年十月太尉丕奏飢民出關逐食給過所議諸曹下大夫以上人各將二吏別掌給過所州郡亦然不過三日給之便訖有何難也魏書宗室武衛將軍謂附傳上言獄成不許家人陳訴檢除名之例依律文獄成謂處罪案成者寺謂犯罪徑彈後使覆檢鞠證定刑罪狀彰露案署分昞獄理是成若使案雖成雖已申省事下廷尉或寺以情狀未盡或邀駕撾鼓或門下立疑更付別使者可從未成之條其家人陳訴信其專辭而阻成斷便是曲遂于私有乖公體何者五詐既窮六備已立僥幸之輩更起異端進求延罪于漏刻退希不測之恩宥辨以惑正曲以辭直長民姦于下隳國法于上竊所未安魏書刑罰志延昌三年六月兼廷尉卿元志監王靖等上言上書請御袞服臣等聞宸極居中則列宿齊其晷帝王順天則群后仰其度伏惟陛下德協二儀道隆三五仁風被于四海盛化塞于天區澤及昆蟲恩霑行葦謳歌所屬八表歸心軍威所及如風靡草萬姓顒顒咸思係命而躬履謙虛退身後己宸儀未彰袞服未御非所以上允皇天之意下副樂推之心宜光崇聖烈示軌憲于萬世臣等謹昧死以聞魏書道武紀天興元年閏月左丞相驃騎大將軍衛王儀及諸王公卿士詣闕上書皇子名議古帝王之制名其體有五有信有義有象有假有類伏惟陛下當盛明之運應昌發之期誕生皇子宜以德命魏書宗室托跋素傳高宗詔群臣議定皇子名素及司徒陸麗議高宗從之臨刑自作墓志銘洛陽男子姓元名景有道無時其年不永魏書宗室元壽興傳簡御史表御史之職鷹鸇是任必逞爪牙有所噬搏若選後生年少血氣方剛者恐其輕肆徑直傷物處廣愚謂宜簡宿官經事忠良平慎者為之魏書宗室元暉傳上疏請布耳目以訪牧守臣聞治人之本實委牧守之官得其才則政平物理失其人則訟興怨結自非察訪善惡明加貶賞將何以黜彼貪怠陟此清勤也竊以大使巡省必廣迎送之費御史馳糾頗回威濫之刑且暫爾往還理不委悉縱有簡舉良未平當愚謂宜令三司八座侍中黃門各布耳目外訪州鎮牧將治人守令能不若德教有方清白獨著宜以名聞即加褒陟若治績無效貪暴遠聞亦便示牒登加貶退如此則不出庭戶坐知四方端委垂拱明賞審罰矣魏書宗室元暉傳上書論政要其一曰御史之職務使得賢必得其人不拘階秩久于其事責其成功其二曰安人寧邊觀時而動頃來邊將亡遠大之略貪萬一之功楚梁之好未聞而蠶婦之怨屢結斯乃庸人所為鋭于姦利之所致也平吳之計自有良圖不在于一城一戍也又河北數州國之基本飢荒多年戶口流散方今境上兵復徵發即如此日何易舉動愚謂數年以來唯宜靜邊以息召役安人勸農惠此中夏請嚴敕邊將自今有賊戍求內附者不聽輒遣援接皆須表聞違者雖有功請以違詔書論三曰國之資儲唯藉河北飢饉積年戶口逃散生長姦詐因生隱藏出縮老小妄注死失收人租調割入于已人困于下官損于上自非更立權制善加檢括損耗之來方在未已請求其議明宣條格魏書元暉傳綏慰冀部還上言冀土寬廣界去州六七日百里負海險遠宜分置一州鎮遏海曲北史十五遼西公意烈傳大乘賊亂後詔洪超持節兼黃門侍郎綏慰冀部還上言朝議從之後遂立滄州請免程靈虯官表梁郡太守程靈虯唯酒是耽貪財為事虐政殘民寇盜並起黷音悖響盈于道路部境呼嗟僉焉怨酷梁郡密邇偽畿醜聲易布非直有點清風臣恐取嗤荒遠請免所居官以明刑憲魏書河南王曜附傳
