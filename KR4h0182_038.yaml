body:
  text: 劉芳立學表夫為國家者罔不崇儒尊道學斆為先誠復政有質文茲範不易諒由萬端資始衆務稟法故也唐虞已往典籍無據隆周以降任居虎門周禮大司樂云師氏掌以媺詔王居虎門之左司王朝掌國中之事以教國子弟蔡氏勸學篇云周之師氏居虎門左敷陳六藝以教國子今之祭酒即周師氏洛陽記國子學宮與天子宮對太學在開陽門外案學記云古之王者建國親民教學為先鄭氏注云內則設師保以教使國子學焉外則有太學庠序之官由斯而言國學在內太學在外明矣案如洛陽記猶有仿像臣愚謂今既徙縣嵩瀍皇居伊洛宮闕府寺僉復故址至于國學豈可舛替校量舊事應在宮門之左至如太學基所炳在仍舊營構太和二十年發敕立四門博士于四門置學臣案自周已上學惟以二或尚西或尚東或貴在國或貴在郊爰暨周室學蓋有六師氏居內太學在國四小在郊禮記云周人養庶老于虞庠虞庠在國之西郊禮又云天子設四學當入學而太子齒注云四學周四郊之虞庠也案大戴保傅篇云帝入東學尚親而貴仁帝入南學尚齒而貴信帝入西學尚賢而貴德帝入北學尚貴而尊爵帝入太學承師而問道周之五學于此彌彰案鄭注學記周則六學所以然者注云內則設師保以教使國子學焉外則有太學庠序之官此其證也漢魏已降無復四郊謹尋先旨宜在四門案王肅注云天子四郊有學去王都五十里考之鄭氏不云遠近今太學故坊基址寬曠四郊別置相去遼闊檢督難周計太學坊并作四門猶為太廣以臣愚量同處無嫌且今時制置多循中代未審四學應從古不求集名儒禮官議其定所魏書劉芳傳修理金石樂器表禮樂事大不容輒決自非博延公卿廣集儒彥討論得失研窮是非則無以垂之萬葉為不朽之式魏書劉芳傳郊壇疏臣聞國之大事莫先郊祀郊祀之本實在審位是以列聖格言彪炳綿籍先儒正論昭著經史臣學謝全經業乖通古豈可輕薦瞽言妄陳管説竊見所置壇祠遠近之宜考之典制或未允衷既曰職司請陳膚淺孟春令云其數八又云迎春于東郊盧植云東郊八里之郊也賈逵云東郊木帝太昊八里許慎云東郊八里郊也鄭玄孟春令注云王居明堂禮曰王出十五里迎歲蓋殷禮也周禮近郊五十里鄭玄別注云東郊去都城八里高誘云迎春氣于東方八里郊也王肅云東郊八里因木數也此皆同謂春郊八里之明據也孟夏令云其數七又云迎夏于南郊盧植云南郊七里郊也賈逵云南郊火帝炎帝七里許慎云南郊七里郊也鄭玄云南郊去都城七里高誘云南郊七里之郊也王肅云南郊七里因火數也此又南郊七里之審據也中央令云其數五盧植云中郊五里之郊也賈逵云中央黃帝之位并南郊之季故云兆五帝于四郊也鄭玄云中郊西南未地去都城五里此又中郊五里之審據也孟秋令云其數九又曰迎秋于西郊盧植云西郊九里郊賈逵云西郊金帝少皞九里許慎云西郊九里郊也鄭玄云西郊去都城九里高誘云西郊九里之郊也王肅云西郊九里因金數也此又西郊九里之審據也孟冬令云其數六又云迎冬于北郊盧植云北郊六里郊也賈逵云北郊水帝顓頊六里許慎云北郊六里郊也鄭玄云北郊去都城六里高誘云北郊六里之郊也王肅云北郊六里因水數也此又北郊六里之審據也宋氏含文嘉注云周禮王畿千里二十分其一以為近郊近郊五十里倍之為遠郊迎王氣蓋于近郊漢不設王畿則以其方數為郊處故東郊八里南郊七里西郊九里北郊六里中郊在西南未地五里祭祀志云建武二年正月初制郊兆于雒陽城南七里依采元始中故事北郊在雒陽城北四里此又漢世南北郊明據也今地祇準此至如三十里之郊進乖鄭玄所引殷周二代之據退違漢魏所行故事凡邑外曰郊今計四郊各以郭門為限里數依上禮朝拜日月皆于東西門外今日月之位去城東西路各三十竊又未審禮又云祭日于壇祭月于坎今計造如上禮儀志云立高禖祠于城南不云里數故今仍舊靈星本非禮事兆自漢初專為祈田恆隸郡縣郊祀志云高祖五年制詔御史其令天下立靈星祠牲用太牢縣邑令長得祠晉祠令云郡縣國祠稷社先農縣又祠靈星此靈星在天下諸縣之明據也周公廟所以別在洛陽者蓋姬旦創成洛邑故傳世洛陽崇祠不絶以彰厥庸夷齊廟者亦世為洛陽界內神祠今並移太常恐乖其本天下此類甚衆皆當部郡縣修理公私施之禱請竊惟太常所司郊廟神祇自有常限無宜臨時斟酌以意若遂爾妄營則不免淫祀二祠在太常在洛陽于國一也然貴在審本臣以愚蔽謬忝今職考括墳籍博采群議既無異端謂粗可依據今玄冬務隙野罄人間遷易郊壇二三為便魏書劉芳傳北史四十二社稷宜樹木疏依合朔儀注曰有變以朱絲為繩以繞係社樹三匝而今無樹又周禮司徒職云設其社稷之壝而樹之田主各以其社之土所宜木鄭玄注云所宜木謂若松柏栗也此其一證也又小司徒封人職云掌設王之社壝為畿封而樹之鄭玄注云不言稷者王主于社稷社之細也此其二證也又論語曰哀公問社于宰我宰我對曰夏后氏以松殷人以柏周人以栗是乃土地之所宜也此其三證也又白虎通云社稷所以有樹何也尊而識之也使民望見即敬之又所以表功也案此正解所以有樹之義了不論有之與無也此其四證也此云社稷所以有樹何然則稷亦有樹明矣又五經通義云天子太社王社諸侯國社侯社制度奈何曰社皆有垣無屋樹其中以木有木者土主生萬物萬物莫善于木故樹木也此其五證也此最其丁寧備解有樹之意也又五經要義云社必樹之以木周禮司徒職曰班社而樹之各以土地所生尚書逸篇曰太社惟松東社惟柏南社惟梓西社惟栗北社惟槐此其六證也此又太社及四方皆有樹別之明據也又見諸家禮圖社稷圖皆畫為樹惟誡社誡稷無樹此其七證也雖辨有樹之據猶未正所植之木案論語稱夏后氏以松殷人以柏周人以栗便是世代不同而尚書逸篇則云太社惟松東社惟柏南社惟梓西社惟栗北社惟槐如此便以一代之中而五社各異也愚以為宜植以松何以言之逸書云太社惟松今者植松不慮失禮惟稷無成證稷乃社之細蓋亦不離松也魏書劉芳傳北史四十二彭城王協諡議王挺德弱齡誕資至孝睿性過人學不師授卓爾之操發自天然不群之美幼而獨出及入參政務綸綍有光爰登中鉉敷明五教漢北告危皇赫問罪王內親藥膳外總六師及宮車晏駕上下哀慘奮猛銜戚英略潛通翼衛靈輿整戎振旆歷次宛謝迄干魯陽送往奉居無慚周霍稟遺作輔遠至邇安分陜恆方流詠燕趙廓清江西威懾南越入釐百揆庶績咸熙履勤不憚在功愈挹溫恭愷悌忠雅寬仁興居有度善終篤始高尚厥心功成身退義亮聖衷美光世典依諡法保大定功曰武善問周達曰宣諡曰武宣王魏書彭城王協傳永平元年太常卿劉芳議上尚書言詞樂諧音本非所曉且國之大事亦不可決于數人今請更集朝彥衆辨是非明居典據資決元凱然後營制魏書樂志永平二年秋高肇等奏使劉芳更造樂器詔可芳上尚書言上言參制舞名并制新曲觀古帝王罔不據功象德而制舞名及諸樂章今欲教文武二舞施之郊廟請參制二舞之名竊觀漢魏已來鼓吹之曲亦不相緣今亦須制新曲以揚皇家之德美魏書樂志永平三年冬芳上言又上言臣聞樂者感物移風諷氓變俗先王所以教化黎元湯武所以原闕一葉魏書樂志永平三年冬芳又上言陳終德為母持重議案喪服乃士之正禮含有天子諸侯卿大夫之事其中時復下同庶人者皆別標顯至如傳重自士以上古者卿士咸多世位又士以上乃有宗廟世儒多云嫡孫傳重下通庶人以為差謬何以明之禮稽命徵曰天子之元士二廟諸侯之上士亦二廟中下士一廟一廟者祖禰共廟祭法又云庶人無廟既如此分明豈得通于庶人也傳重者主宗廟非謂庶人祭于寢也兼纍世承嫡方得為嫡子嫡孫耳不爾者不得繼祖也又鄭玄別變除云為五世長子服斬也魏晉以來不復行此禮矣案喪服經無嫡孫為祖持重三年正文雖有為長子三年嫡孫期傳及注因説嫡孫傳重之義今世既不復為嫡子服斬卑位之嫡孫不陵諸叔而持重則可知也且準終德資階方之于古未登下士庶人在官復無斯禮考之舊典驗之今世則茲範罕行且諸叔見存喪主有寄宜依諸孫服期為允魏書禮志四永平四年太常卿劉芳議又見通典八十九又議國子所云喪服雖以士為主而必下包庶人本亦不謂一篇之內全不下同庶人正言嫡孫傳重專士以上此經傳之正文不及庶人明矣戴德喪服變除云父為長子斬自天子達于士此皆士以上乃有嫡子之明據也且承重者以其將代已為宗廟主廟主了不云寢又其證也所引大夫不世者此公羊穀梁近儒小道之書至如左氏詩易尚書論語皆有典證或是未寤許叔重五經異義云今春秋公羊穀梁説卿大夫世位則權并一姓謂周尹氏齊崔氏也而古春秋左氏説卿大夫皆得世祿傳曰官族易曰食舊德舊德謂食父故祿也尚書曰世選爾勞豫不紀爾善詩云惟周之士不顯奕世論語曰興滅國繼絶世國謂諸侯世謂卿大夫也斯皆正經及論語士以上世位之明證也士皆世祿也八品者一命斯乃信然伹觀此據可謂覩其綱未照其目也案晉官品令所制九品皆正無從故以第八品準古下士今皇朝官令皆有正從若以其員外之資為第十六品也豈得為正八品之士哉推考古今謹如前議魏書禮志四窮通論闕
