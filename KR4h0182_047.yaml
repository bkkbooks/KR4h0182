body:
  text: 張普惠密表太后父不可稱太上臣聞優名寶位王者之所光錫尊君愛親臣子所以慎終必使勳績相侔號秩相可然後能顯揚當時傳徽萬代者矣竊見故侍中司徒胡公懷道含靈實誕聖后載育至尊母儀四海近樞克唯允之寄居槐體論道之明故以功餘九錫褒假鑾纛深聖上之加隆極慈后之至愛憲章天下不亦可乎而太上之號竊謂未衷何者易稱天尊地卑乾坤定矣故曰大哉乾元又曰至哉坤元明乾坤不可竝大禮記曰天無二日土無二王嘗禘郊社尊無二上明君臣不可竝上伏見詔書以司徒為太上秦公夫人為太上秦君夫人蒙號于前司徒繫之于後尊光之美盛矣竊惟高祖受禪于獻文皇帝故仰尊為太上皇此因上上而生名也皇太后稱令以繫敕下蓋取三從之道遠同文母列于十亂則司徒之為太上恐乖繫敕之意春秋傳曰葬稱公臣子辭明不可復加上也書曰茲豫大饗于先王爾祖其從與饗之司徒位尊屬重必當配饗先朝稱太上以為臣以事太上皇恐非司徒翼翼之心漢祖創有天下尊父曰太上皇母曰昭靈后乃帝者之事晉有小子侯尚曰僭之于天子司徒三公也其可同號于帝乎孔子曰必也正名名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足易曰有大者不可以盈故受之以謙謙尊而光卑而不可踰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙又曰困于上者必反于下故受之以井比剋吉定兆而以淺改卜群心悲惋亦或天地神靈所以垂至戒啓聖情伏願聖后回日月之明察微臣之請停司徒逼同之號從卑下不踰之稱畏困上之鑒邀謙光之福則天下幸甚臣聞見災修德災變成善此太戊所以興殷桑穀以之自滅況今卜遷方始當修革之會愚以為無上之名不可假之脫譏于千載恐貽不言之咎且君之于臣比葬三臨之禮也司徒誠為后父實人臣也雖子尊不加于父乃天下母以義斷恩不可遂在室之意故曰女子有行遠兄弟父母況乃應坤之載承天之重而朔望于司徒之殯晨昏于郊墓之閒雖聖思蒸蒸其不虞宜戒離宸極之嚴居疲靈蹕于道路此亦億兆蒼生瞻仰失圖伏願尋載馳之不歸存靜方之光大則草木可繁人靈斯穆臣職忝諫司敢獻狂瞽謹冒上聞不敢宣露乞垂省覽昭臣微款脫得奉謁聖顏曲盡愚衷者死且不朽魏書張普惠傳靈太后父司徒胡國珍薨贈相國太上秦公普惠以前世后父無太上之號詣闕上疏陳其不可左右畏懼莫敢為通會聞胡家穿壙下墳有磐石乃密表表論時政得失一曰審法度平斗尺租調務輕賦役務省二曰聽輿言察怨訟先皇舊事有不便于政者請悉追改三曰進忠謇退不肖任賢勿二去邪勿疑四曰興滅國繼絶世勳親之胤所宜收敘魏書張普惠傳復徵綿麻疏伏聞尚書奏復綿麻之調遵先皇之軌夙宵惟度欣戰交集何者聞復高祖舊典所以欣惟新俱可復而不復所以戰違法仰惟高祖廢大斗去長尺改重稱所以愛萬姓從薄賦知軍國須綿麻之用故云幅度之閒億兆應有綿麻之利故絹上稅綿八兩布上稅麻十五斤萬姓得廢大斗去長尺改重稱荷輕賦之饒不適于綿麻而已故歌舞以供其賦奔走以役其勤天子信于上億兆樂于下故易曰悅以使民民忘其勞此之謂也自茲以降漸漸長闊百姓嗟怨聞于朝野伏惟皇太后未臨朝之前陛下居諒暗之日宰輔不尋其本知天下之怨綿麻不察其幅廣度長稱重斗大革其所斃存其可存而特放綿麻之調以悅天下之心此所謂悅之不以道愚臣所以未悅者也尚書既知國少綿麻不惟法度之易民言之可畏便欲去天下之大信棄已行之成詔追前之非遂後之失奏求還復綿麻以充國用不思庫中大有綿麻而群官共竊之愚臣以為于理未盡何者今宮人請調度造衣物必度忖稱量絹布匹有尺丈之盈一猶不計其廣絲綿斤兼百銖之剩未聞依筆罪州郡若一匹之濫一斤之惡則鞭戶主連三長此所以民以貪者也今百官請俸人樂長闊并欲厚重無復準極得長闊厚重者便云其州能調絹布精闊且長橫發美譽以亂視聽不聞嫌長惡廣求計還官者此百司所以仰負聖明也今若必復綿麻者謂宜先令四海知其所由明立嚴禁復本幅度新綿麻之典依太和之稅其在庫絹布竝及絲綿不依典制者請遣一尚書與太府卿左右藏令依今官度官稱計其斤兩廣長折給請俸之人總常俸之數年俸所出以布綿麻亦應其一歲之用使天下知二聖之心愛民惜法如此則高祖之軌中興于神龜明明慈信照布于無窮則孰不幸甚伏願亮臣悾悾之至下慰蒼生之心魏書張普惠傳尚書計奏復徵綿麻恐共勞民不堪命上疏云云又見通典五上疏諫崇佛法不親郊廟臣聞明德恤祀成湯光六百之祥嚴父配天孔子稱周公其人也故能馨香上聞福傳遐世伏惟陛下重暉纂統欽明文思天地屬心百神佇望故宜敦崇祀禮咸秩無文而告朔朝廟不親于明堂嘗禘郊社多委于有司觀射遊苑躍馬騁中危而非典豈清蹕之意殖不思之冥業損巨費于生民減祿削力近供無事之僧崇飾雲殿遠邀未然之報昧爽之臣稽首于外玄寂之衆遨遊于內愆禮忤時人靈未穆愚謂從朝夕之因求祇劫之果未若先萬國之欣心以事其親使天下和平災害不生者也伏願淑慎威儀萬邦作式躬致郊廟之虔親紆朔望之禮釋莫成均竭心千畝明發不寐潔誠禋祼孝悌可以通神明德教可以光四海則一人有喜兆民賴之然後精進三寶信心如來道由化深故諸漏可盡法隨禮積故彼岸可登量撤僧寺不急之華還復百官久折之秩已興之構務從𥳑成將來之造權令停息仍舊亦可何必改作庶節用愛人法俗俱賴臣學不經遠言多孟浪忝職其憂不敢默爾魏書張普惠傳肅宗不親視朝崇佛法郊廟多委有司上疏又略見廣弘明集六諫送蠕蠕阿那瓌還國疏臣聞乾元以利貞為大非義則不動皇王以博施為功非類則不從故能始萬物而化天下者也伏惟陛下睿哲欽明道光虞舜八表宅心九服清晏蠕蠕相害于朔垂妖師扇亂于江外此乃封豕長蛇不識王度天將悔其罪所以奉皇魏故荼毒之辛苦之令知至道之可樂也宜安民以悅其志恭已以懷其心而先自勞擾艱難下民興師郊甸之內遠投荒塞之外救纍世之勍敵可謂無名之師諺曰唯亂門之無過愚情未見其可當是邊將窺竊一時之功不思兵為凶器不得已而用之者也夫白登之役漢祖親困之樊噲欲以十萬衆橫行胸奴中季布以為不可請斬之千載以為美況今旱酷異常聖慈降膳乃以萬五千人使楊鈞為將而欲定蠕蠕忤時而動其可濟乎阿那瓌投命皇朝撫之可也豈容困疲我兆民以資天喪之虜昔莊公納子糾以致乾時之敗魯僖以邾國而有懸胄之恥今蠕蠕時亂後主繼立雖云散亡姦虞難抑脫有井陘之慮楊鈞之肉其可食乎高車蠕蠕連兵積年饑饉相仍須其自斃小亡大傷然後一舉而并之此卞氏之高略所以獲兩虎不可不圖之今土山告難𥳑書相續蓋亦無能為也正與今舉相會天其或者欲以告戒人不欲使南北兩疆竝興大衆脫狂狡搆閒于其閒而復事連中國何以寧之今宰輔專欲好小名不圖安危大計此微臣所以寒心者也那瓌之不還負何信義此機之際北師宜停臣言不及義文書所經過不敢不陳兵猶火也不戢將自焚二虜自滅之形可以為殷鑒伏願輯和萬國以靜四疆混一之期坐而自至矣臣愚昧多違必無可採匹天之智願以呈獻魏書張普惠傳上疏答詔訪冤屈詩稱文王孫子本枝百世易曰大君有命開國成家皆所以明德睦親維城作翰漢高封爵之誓曰使黃河如帶太山如礪國以永存爰及苖裔又申之以丹書之信重之以白馬之盟其以彊大分王罪犯蹙邑者蓋有之矣未聞父基子構世載忠賢一死一削用為恆典者也故尚書令臣肇未能遠稽古義近究成旨以初封之詔有親王二千戶始蕃一千戶二蕃五百戶三蕃三百戶謂是親疏世減之法又以開國五等有所減之言以為世減之趣遂立格奏奪稱是高祖本意仍被旨可差謬之來亦已甚矣遂使勳親懷屈幽顯同冤紛訟彌年莫之能息臣輒遠研旨格深窮其事世變減奪今古無據又尋詔書稱昔未可采今始列璧豈得混一內分天近也故樂良樂安同蕃異封廣陽安豐屬別戶等安定之嫡邑齊親王河閒戚近更從蕃食是乃太和降旨初封之倫級勳親兼樹非世減之大驗者也博陵襲爵亦在太和之年時不世減以父嘗全食足戶充本同之始封減從今式如此則減者減其所足之外足者足其所減之內減足之旨乃為所貢所食耳欲使諸王開國弗專其民賦役之差貴賤有等蓋準擬周禮公侯伯子男貢稅之法王食其羊公食三分之一侯伯四分之一子男五分之一是以新興得足充本清淵吏多減戶故始封承襲俱稱所減謂減之以貢食謂食之于國斯實高祖霈然之詔減實之理聖明自釋求之史帛猶有未盡時尚書臣琇疑減足之參差旨又判之以開訓所減之旨可以不疑于世減矣而臣肇弗稽往事曰五等有所減之格用為世減之法以王封有親疏之等謂是代削之條妄解成旨雷同世奪以此毒天下民其從乎故太傅任城文宣王臣澄樞弼纍朝識洞今古為尚書之日殷勤執請孜孜于重議被旨不許于此遂停又律罪例減及先帝之緦麻令給親恤止當世之有服律令相違威澤異品使七廟曾玄不治未恤嫡封則爵祿無窮枝庶則屬內貶絶儀刑作孚億兆何觀夫一人吁嗟尚曰虧治今諸王五等各稱其冤七廟之孫竝訟其切陳訴之案盈于省曹朝言巷議咸云其苦恐非先王所以建萬國親諸侯睦九族之義也臣猥忝今任于茲五年推尋旨格謂無世減之理請近遵高祖減食之謨遠循百代象賢之誥退由九伐進從九儀則刑罰有倫封不虛黜斯乃文王所以克慎不敢侮于鰥寡而況于公侯伯子男乎今旨訪冤滯愚以此為大者求尋光錫之詔竝諸條格所奪所請事事窮審諸王開國非犯罪削奪者竝求還復其昔嘗全食足戶充本減從令式者從前則力多于親懿全奪則減足之格不行愚謂祿力竝應依所之食而食之若是則力少蕃王粟帛仍本戶邑雖盈之減兩秦既有全食足戶之異故不得同于新封之力耳親恤所褒請依律斷伏惟親親尊賢位必功立尊賢以司民可不慎乎親親以牧族其可棄乎如脫蒙允求以旨判為始其前來吏秩悉年久不追臣又聞明德慎罰文王所以造周咸有一德殷湯所以革夏故能上令下從風動草偃畏之如雷電敬之如明神是以天子家天下綏萬國若天之無不覆地之無不載遷都之構庶方子來泛澤所沾降及陪皂寧有嶽牧二千石縣令丞尉治中別駕及諸軍幢受命于朝廷而可不預乎此之班駮雲雨之不平謂是當時有司出納之未允何以明之仰尋世宗詔書百官普進一級中有朝臣刺史登時褒授則內外貴賤莫不同澤又覆奏稱爰及陪皂明無不逮自後人率其心紛綸盈庭嫌少誤惑視聽限以泛前更為年斷六年三年之考以意折之泛前泛後之歲隔而絶之遂使如綸之旨頓于一朝泛前六年上第者全不得泛三年上第者蒙半階而已泛前泛後合考者隔絶而不得無考者無折而全泛前泛後有考無考竝蒙全泛與否乖違勤舊彌屈差若毫釐謬以千里其此之謂乎易曰言行君子之所以動天下可不慎歟言之不從無以抑之遂奏奪牧守外祿全不與泛散官改為四年之考泛前者八年一階政令不一冤訟惟甚與而復奪其本在茲致使邀駕擊鼓者無理以加其罪誹謗公聽者無辭以抑其言噂𠴲所由生慢悖所由起夫琴瑟不調澆而更張善人國之本也其可棄乎詩云樂只君子邦家之基堯典曰克明俊德呂刑曰何擇非人周官曰官弗必備唯其人咎繇曰無曠庶官天工人其代之詩云人之云亡邦國殄瘁又曰雨我公田遂及我私孔子曰不患貧而患不均如此則官必擇人泛則宜溥請遠遵正始元旨近準聖明二泛內外百官悉同一階不以泛前折考不以散狂增年則同雲共澍四海均洽如謂未可宜以權理折之易曰聖人之大寶曰位何以守位曰仁春秋傳曰一曰擇人如此則乃可無泛不可無考守宰之泛既以追奪則百官之泛不應獨霑溥澤既收復誰敢怨夫三載之考興于太和再周之陟通千景明閒劇祿力自有加減陪臣以事省降而考則三年朝官既祿等平曹更四周乃陟考祿參差各稱其枉且一日從軍征戍苦于煩任終年專使決斷重千陪臣恆上若通為三載之考無泛隔折則各盈其分亦足以近塞群口遠綏四方日昳求賢猶有所失況不遵擇人之訓唯以停久而進乎自今已後考黜願以三宅革心選進願以三雋居德書曰舉能其官惟爾之能稱非其人惟爾弗任斯周道所以佑辟康民敢不敬守臣忝官樞副毗察冤訟寤寐惟省謂宜追正愚固所陳方無可采魏書張普惠傳時詔訪冤屈普惠上疏廣陵北海二王為所生祖母服議謹案二王祖母皆受命先朝為二國太妃可謂受命乎天子為始封之母矣喪服慈母如母在三年章傳曰貴父命也鄭注云大夫之妾子父在為母大功則士之妾子為母朞父卒則皆得申此大夫命其妾子以為母所慈猶曰貴父命為之三年況天子命其子為列國王命其所生母為國太妃反自同公子為母練冠之與大功乎輕重顛倒不可之甚者也傳曰始封之君不臣諸父昆弟則當服其親服若魯衛列國相為服朞判無疑矣何以明之喪服君為姑姊妹女子子嫁于國君者傳曰何以大功尊同也尊同則得服其親服諸侯之子稱公子公子不得禰先君然則兄弟一體位列諸侯自以尊同得相為服不可還準公子遠厭天王故降有四品君夫人以尊降公子大夫之子以厭降名例不同何可亂也禮大夫之妾子以父命慈已申其三年太妃既受命先帝光昭一國二王胙土茅社顯錫大邦舍尊同之高據附不禰之公子雖許蔡失位亦不是過服問曰有從輕而重公子之妻為其皇姑公子雖厭妻尚獲申況廣陵北海論封則封君之子語妃則命妃之孫承妃纂重遠別先皇更以先后之止統厭其所生之祖嫡方之皇姑不以遙乎今既許其申服而復限之以朞比之慈母不亦爽歟經曰為君之祖父母父母妻長子傳曰何以朞父母長子君服斬妻則小君交卒然後為祖後者服斬今祖乃獻文皇帝諸侯不得祖之母為太妃蓋二王三年之證議者近背正經以附非類差之毫毛所失或遠且天子尊則配天莫非臣妾何為命之為國母而不聽子服其親乎記曰從服者所從亡則已又曰不為君母之黨服則為其母之黨服今所從既亡不以親服服其所生則屬從之服于何所施若以諸王入為公卿便同大夫者則當今之議皆不須以國為言也今之諸王自同列國雖不之國別置臣寮王食一方得不以諸侯言之敢據周禮輒同三年魏書張普惠傳廣陵王恭北海王皓疑為所生祖母服朞與三年博士執意不同詔群寮會議普惠議又見北史四十六奏記任城王澄竊聞三殺九親別疏昵之敘五服六術等衰麻之心皆因事飾情不易之道者也然則莫大之痛深于終身之外書策之哀除于喪紀之內外者不可無節故斷之以三年內者不可遂除故敦之以日月禮大練之日鼓素琴蓋推以即吉也小功以上非虞祔練除不沐浴此拘之以制也曾子問曰相識有喪服可以與于祭乎孔子曰緦不祭喪何助于人祭既不與疑無宴食之道又曰廢喪服可以與于饋奠之事乎子曰脫衰與奠非禮也注云為其忘哀疾愚謂除喪之始不與饋奠小功之內其可觀射乎雜記云大功以下既葬適人人食之其黨也食之非黨也不食食猶擇人于射為惑伏見明教立射會之限將以二七令辰集城中文武肄武藝于北園行揖讓于中舍時非大閲之秋景涉妨農之節國家縞禫甫除殿下功衰仍襲釋而為樂以訓百姓便是易先王之典教忘哀戚之情恐非所以昭令德視子孫者也案射儀射者以禮樂為本忘而從事不可謂禮鍾鼓弗設不可謂樂捨此二者何用射為又七日之戲令制無之班勞所施慮違事體庫府空虛宜待新調二三之趣停之為便乞至九月備飾盡行然後奏貍首之章宣矍相之令聲軒懸建雲鉦神民欣畼于斯時也伏惟慈明遠被萬民是望舉動所書發言唯則願更廣訪賜垂曲采昭其管見之心恕其讜言之責則芻蕘無遺歌輿人有獻誦矣魏書張普惠傳任城王澄功衰在身欲于七月七日集會文武北園馬射普惠奏記于澄澄意納其言託辭自罷又北史四十六答訪烈懿太妃題碑任城王澄遭太妃憂臣寮為立碑頌題碑欲云康王元妃之碑澄詐于普惠答曰謹尋朝典但有王妃而無元字魯夫人孟子稱元妃者欲下與繼室聲子相對今烈懿太妃作配先王更無聲子仲子之嫌竊謂不假元字以別名位且以氏配姓愚以為在生之稱故春秋夫人姜氏至自齊既葬以諡配姓故經書葬我小君文姜又曰來歸夫人成風之襚皆以諡配姓古者婦人從夫諡今烈懿太妃德冠一世故特蒙褒錫乃萬代之高事豈容于定名之重而不稱烈懿乎魏書張普惠傳又北史四十六
