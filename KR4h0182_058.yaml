body:
  text: 卷五十八闕名御射碑皇帝以太延元年十二月車駕東巡徑五回之險邃覽崇岸之竦峙乃停駕路側援弓而射之飛矢踰于巖山刊石用讚元功水經滱水注洛州鄉城老人佛碑夫法界無相相而十方旨趣無言言而法界故入世者具大悲以濟群生出世者行六度而除八難是以前馳羊後牛欲使智水無湍愛河永竭然齋主啓請示滅雙林正化隨遷業煩無救但思念雕素真形波斯心鑄茲神狀今吉万歲卅四人等敬造真儀一龕上祚皇家沐霑靈識頌曰出有入機不見出空入益物為先下來不去無動無遷妙矣能惻焉漆園初起雙樹息言鐫容万代流傳大十六年正月草一日功訖碑拓本前有卅四人姓名不録中書令祕書監兗州刺史鄭羲碑公諱羲字幼驎可州熒陽開封人也肇洪源于有周胙母弟以命氏桓以親賢司徒武以善職並歌緇衣之作誦乎奕世降逯于漢鄭君當時播節讓以振高風大夫司農創解詁以開經義迹刊圖史美灼二書德音雲翻碩響長列揚州以十策匡時司空豫州以勳德著稱高祖略恢亮儒素味道居真州府招辟莫之能致值有晉弗競君道陵夷聰曜虔劉避地冀方隱括求全靜居自逸屬石氏勃興揆亂起正徵給事黃門持節遷侍中尚書贈楊州刺史曾祖豁以明哲佐世後燕中山尹太常卿濟南貞公祖溫道協儲端燕太子瞻事父曄仁結義徒績著寧邊拜建威將軍汝陰太守綿榮千載聯光百世自非積德纍仁慶屆無窮其孰能傳輝踵美致如此之遠哉可謂身沒而名不朽者也公稟三靈之淑氣應五百之恆期乘和載誕文明冠世篤信樂道據德依仁孝弟端雅寡言愍行六籍孔精百氏備究八素九丘靡不昭達至乎人倫禮式陰陽律曆尤所留心然高真沈默恥為傾側之行不與俗和絶于趣向之情常慕晏平仲東里子産之為人自以為博物不如也蘊斯文于衡泌延德聲乎州閭和平中舉秀才答策高第擢補中書博士彌以方正自居雖才望稱官而乃歷載不遷任清務簡遂乘間述作注諸經論撰話林數卷莫不玄契聖理超異恆儒又作孔顏謠靈巖頌及諸賦詠詔策辭清雅博皆行于世也以才望見陟遷中書侍郎又假員外散騎常侍陽武子南使宋國宋王客郎孔道均就邸設會酒行樂作均謂公曰樂其何如公答曰哀楚有餘而雅正不足其細已甚矣而能久于均默然而罷移年而蕭氏滅宋雖延陵之觀昔詩鄭公之聽宋樂其若神明矣朝廷以公使協皇華華原隰斯光遷給事中中書令總司文史敷奏惟允國之律令是所議定公長子懿雍容和令器望兼資早綜銓衡能聲徽著敦詩悅禮尤精易理季子道昭博學明俊才冠祕穎研圖注篆超侍紫幄公行于前吏部祕書隨其後凡厥庶寮莫不欽其人也于時有識比之三陳後年不盈紀懿給事黃門侍郎太常卿使持節督齊州諸軍事平東將軍齊州刺史道昭祕書丞中書侍郎司徒咨議通直散騎常侍國子祭酒祕書監司州大中正使持節督光州諸軍事平東將軍光州刺史父官子寵才德相承海內敬其榮也先時假公太常卿熒陽侯詣長安拜燕宣王廟還解太常其給事中中書令侯如故縱容鳳闈動斯可則冠婚喪祭之禮書疏報問之式比之制矣民胥行矣雖位未槐鼎而仁重有餘太和初除使持節安東將軍督兗州諸軍事兗州刺史南陽公德政寬明化先仁惠不嚴之治穆如清風耕桑有敬讓之高朝市無鞭戮之刑即道之美不專于魯矣太和中徵祕書監春秋六十有七寢疾薨于位凡百君子莫不悲國秀之永沈哀道宗之長沒皇上振悼痛百常往遣使贈襚策贈有加諡曰文祭以太牢以太和十七年四月草四日歸葬乎熒陽石門東南十三里三皇山之陽于是故吏主簿東郡程天賜等六十人仰道墳之緬邈悲鴻休之未刊乃相與欽述景行銘之玄石以揚非世之美而作頌曰爰鑒往紀稽覽前徽有賢有聖靡弗應時繇實契似旦亦協姬於穆鄭公誕睿應期伊昔桓武並美司徒恭惟我君世監祕書三墳剋闡五典允敷文為辭首學實宗儒德秀時哲望高世族灼灼獨明亭亭孤邈式胄三雍鄒風再燭作嶽河兗澤移草木慶靈長發繼葉傳光君既挺發胤亦含章文義襲軌朱紱相望刊石銘德與日永揚碑拓本夫琁因方祇以緒既啓兼德風使君源遐緬睿業崇深識照天璣沖光警智冰清玉映有夷齊之操蒞政化作捍青蕃流愛屋之歌垂芳河濟欣來蘇之詠可謂動衆化盛刊方來何述前治中從事史東平內史昌伯東平祖髦長乂山威將軍治中從事史吳興沈預民徐貞思等鏤石鐫徽万君諱思伯字士休武威姑臧人也晉太師賈他之後太傅誼九世祖敷前魏青龍中為幽州刺史行達州州事恩忠喪亡遂州刺史高祖朕事兼州別駕宜都王司馬曾祖宏有令譽未宦早喪祖青州録本州中正州主簿齊郡太守君童齔之中卓然岐嶷親鄰䊵綺善文賦慷慨志張良超悵致太和中起家為奉朝請尊得優遊雅素逍遙集高誼求雖年始弱冠便然公輔之稍遷揚烈將軍校尉前軍將軍仍授輔國將軍左夜勤王匪躬斯著遐邇欽風縉紳引領除河內太守以親老除尋將一載召拜滎陽太守辭不獲已遂恭斯授官任未期風教逯不澤漸年方之我君有慚德矣尋除持節督南青州諸軍事征虜將軍南青州刺史之所頃之丁父憂復召拜光祿少卿將軍如故君諒暗在躬宿昔皓髮繼幾毀哀嘗財賑施親疏周給門姪長幼靡不贍恤等其榮悴均其豐約士除持節督兗州諸軍事左將軍兗州刺史于時州士荒饉連歲不登又境上之民好懷去就君按之以法之以在優平賦其歲稔既實禮義用興關境懷仁外鄰附民庶欣歌士女詠仰照灼英徽蟬聯德楷世仁惟矩聲溢遐芳流遠動謨資韶氣繪藻華綺繢雕思三州淄澠別味思二續既良海沂換鄭懷芳義彰詠兼系管昃甘棠撫河濟飾光服治隆王趙才超張陸化湛煙翔風屬既領憲以穆猛相資惠和並布威厲秋霜澤孚春露巖栖以空丘園知慕異域恩鄰襁附歌載聲教民庶未融敬惟德化于此知隆永馥芳風兗州刺史賈思伯碑神龜二年歲次己亥四月戊辰朔草日丁亥訖功大義主翟旭仁義主人令曹安都義主薑甫德碑拓本魯郡太守張猛龍清頌碑君諱猛龍宇神南陽白水人也其氏族分興源流所出故已備詳世録不復具載盛鬱于帝皇之始德星曜像于朱鳥之間淵玄万壑之中巉巖千峰之上奕葉清高煥乎篇牘矣周宣時張仲詩人詠其孝友光緝姬中興是賴晉大夫張老春秋嘉其聲績漢初趙景王張耳浮沈秦漢之間終跨列土之賞手世君其後也魏明帝景初中西中郎將使持節平西將軍涼州刺史瑍之十世孫八世祖軌晉惠帝永中使持節安西將軍護羌校尉涼州刺史西平公七世祖素軌之第三子晉明帝太寧中臨羌都尉平西將軍西海晉昌金城武威四郡太守遂家武威高祖鍾涼州武宣王大沮渠時建威將軍武威太守曾祖璋偽涼舉秀才本州治中西海二郡太守還朝尚書祠部郎羽林監祖興宗偽涼都營護軍建節將軍饒河黃河二郡太守父生樂歸國青襟之志白首方堅君體稟河靈神資嶽秀桂質蘭儀點弱露以懷芳松心自明若新蘅之當春初荷之出水入孝出弟邦閭有名雖黃金未應無慚郭氏友朋交遊達蒙幽人表年草七遭父憂寢食過禮泣血情深假使曾柴更世寧異今德既傾乾覆唯恃坤慈冬溫夏凊曉夕承奉家貧致養不辭採運之勤年卅丁母艱勺飲不入偷魂七朝磬力盡思備之生死脫時當宣尼無愧深歎每事過人孤風獨超令譽日新聲馳天紫以延昌中出身除奉朝請優遊文省朋儕慕其雅尚朝廷以君蔭如此德宣暢以熙平之年除魯郡太守治民以禮移風以樂如傷之痛無怠于夙宵若子之愛有懷于心目是使學校剋修比屋清業農桑勸課田織以登入境觀朝莫不禮讓化感無心草石知變恩及泉木禽魚自安勝殘不待賒年有成期月而已遂令講習之音再聲于闕里來蘇之歌復詠于洙京兆五無以剋加河南二尹裁可若茲雖名位未一風同且易俗之黃侯不足比功宵魚之感密子寧獨稱德況乃辭金退玉之貞耿拔葵去織之信義方之我君今猶古詩愷悌君子民之父母實恐韶曦遷影東風改吹盡地庶逆深泫慕是以刊石題詠以旌盛美言能式闡庶揚休烈辭曰氏煥天文體承帝胤神秀春方靈源在震積石千尋長松萬刃軒冕周漢冠蓋魏晉河靈嶽秀月起景飛窮神開照式誕英徽高山仰止從善如歸唯德是蹈唯仁是依栖遲下庭素心若雪鶴響難留音遐發天心乃眷觀光王闕浣紱紫承華煙月妙簡剖符儒鄉分金沂道裂錦鄒方春明好養溫而霜乃如之人實國之良之恤小大以情洗濯此群填雲褰天淨千里開明學建禮修風反正野畔讓耕林衣可改留我明聖何以勿翦恩深在民何以鳭憘風化移新飲河止滿度海迷津勒石啚永碑拓本末云正光三年正月草三日訖龍驤將軍營州刺史高貞碑君諱貞字羽真勃海修人也其先蓋炎帝氏之苗裔昔在黃唐是為四嶽爰逯伯夷受命于虞舜曰典朕暨呂尚佐周克殷有大功于天下位為太師俾侯齊國世世勿絶表乎東海其公族有高子者即其氏焉自茲已降冠冕繼及世濟其德不霣其名祖左光祿大夫勃海敬公純嘏所鍾式誕文昭皇太后是為世宗武皇帝之外祖考安東將軍青州刺史莊公有行有禮克荷克構即文昭皇太后之弟二兄也君稟岐嶷之姿挺圭璋之質清暈發于載弄秀悟表乎齠齒黃中通理之名卓爾不群之目固已殊異公族見稱于匠者至于孝以事親則白華不能比其潔友于兄弟則常棣無以方其盛敬讓著自閭閻信義行于邦黨若夫秉心塞淵礪名教伏膺文武不肅而成則綴軌于前修同規于先達者矣雖綺襦紈褲英華于王許龍馬流車陸離于陰鄧而不以富貴驕人必以謙虛業已是故夷門識慕蹇步知歸我德如風物應如響弱冠以外戚令望除祕書郎傃驎閣而來儀贍石渠而式跂于是縱容校文之職翻飛鵷鷺之間容止此而可觀清風茲焉已穆既而重離載朗東朝始建杞梓備陳瑤金必剖僉求其可帝曰爾諧遷太子洗馬夙夜惟夤媚茲儲后仰敷四德之美式揚三善之功同禁聯坊亡有出其右也于時六宮無主百姓未繫周爰大邦岡踰莘似以君姊有神表淑問拜為皇后君戚愈重愈沖寵日益權日損由是有少君退讓之風無長淵驕奢之患故赫赫之望具瞻允集楨幹之期匪朝伊暮而不幸短命春秋草有六以延昌三年歲次甲什四月己卯朔草六日乙巳遘疾卒于京師二宮悲慟九族悼傷同位駿奔遐邇必至天子乃詔有司曰故太子洗馬高貞器業始茂方加榮級而秀穎未實奄雕夏彩今宅兆有期宜蒙追陟可特贈龍驤將軍營州刺史以旌戚俊其墓次所須悉仰本州營辨臨葬又特給東園龍輀加諡曰懿凡我僚舊爰及邦人咸以君生而玉質至美也幼若老成至慧也孝友因心至行也富貴不驕至謙也君以此終亦以此始烏可廢而不録使來者無聞焉乃相與採石名山樹碑墓道其詞曰厥緒皇堯咨四嶽周命呂望惟高惟國世有龍光自茲作氏不霣其芳於鑠光祿饗茲戩穀赫矣安東純嘏斯屬或女或妹匪娀伊僕陟彼昭陽光我邦族山川降祉餘慶不已敬公之孫莊公之子如琇如瑩為山伊始人知其進莫見其止古人有言膏梁難正於乎我君終和且令牧己謙謙與物無競孝友因心能久能敬爰始來儀濯纓麟沼翽羽儲扃其容皎皎方搏九霄載飛載𣄸天道如何是久是夭生榮死哀禮有加數曷用寵終英英旗輅其人雖往其風可慕玄石一刊清徽永鑄大代正光四年歲次癸卯管黃鍾六月碑拓本中嶽嵩陽寺碑夫至理空淨非大智無以寄其言法身凝寂非妙信無以感其像故託金軀於至信之國布慈雲於多士之世顯皮紙骨筆之重半偈乍身之貴是以須達崇善填金弗吝優主仰戀鐫檀寫真斯皆聖人留軌為物樹業故然乃遺形八万還升慧頂有大德沙門生禪師遊三空以歸真泝法流而御世控三車而徽蹤秉常樂以係軌隱顯無方浮沈嵩嶺道風遠被德香普薰乃皇帝傾心以師資朝野望風而屈膝此山先來未有塔廟禪師將欲接引四生永辭沸鑊拯拔群品遠離炎爐卜茲福地創立神場當中嶽之要害對衆術之摳耳乃北背高峰南臨廣陌西帶濬澗東接修林于太和八年歲次甲子建造伽藍築立塔壂布置僧坊略深梗概王公卿士咸發布向之心凡厥庶民並欣喜捨之志司空公裴衍昔在齊都欽承師德願歸中國為寺檀主本願既從雲歸禪師乃構千善靈塔一十五層始就七級緣差中止而七層之狀遠望則迢亭巍峨仰參天漢近視則嶵嵬儼嶷旁魄絶望自佛法光興未有斯壯也禪師指麾成之匪日禪師背後雖復名工巧匠無能陟其嶮峭禪師大弟子沙門統倫豔二法師並妙思淵賾神智難量繼軌四依津世覺華散藻戒香盝馥與諸同志以師遺功成茲洪業分稟磚更罩兩塔並各七層仰師願殊特妙巧創秀出塔殿宮堂星羅棊布內外圖寫本生埿曰十尊儀無量億數皆笵金為相裁玉成豪瓌碧熅爍丹彩絢耀色煥光輝宇宙異類衆多罔知厝緒龕房禪室側環繞徑閣通門前後廊重復菀衍逶迤規而有楷矩而有則溝霤雙泉四殖甘果柳裊長條松擎圓蓋池荷照灼翠葉紅輝微波碧徹潺流灒瀨異禽巡獸飲喙相鳴碩學名賢踵武相望引房清誦列館法言洪鐘一扣應真四集唄響八飛香煙似霧虔禮禪寂六時靡輟方為衆聖万劫之靈場八輩十方三世之菀囿也天平二年四月八日倫豔二統乃刊石樹碑雕飾尊像贊貽嘉福顯彰聖儀高足大沙門統遵法師忘懷體道戒珠皎潔仁智明敏器宇汪庠間妙思于三空之表顯真如于四忍之外接引群生舟航巨海率諸邑義繕立天宮整修嚴麗兼造白玉像一龕眷屬侍御剞劂鐫磨妙匠精巧三十二滿八十好圓色掩耀靈光暉夜月以諸勝善仰資皇帝聖曆無窮國境寧泰太后德被蒼永保仁齡預捨一豪同登我淨若見若聞等一常樂傍盡邊塵後窮來際咸鍾此福其詞曰明明大聖皎皎無著至寂至妙湛然常樂無像無言形名應世七步舉手播宣苦諦聲光振動濯我塵滯化息雙林終歸實際金儀言寢塔像勃興香尊避坐多寶踊升為模為楷永劫祗承維大沙門權機應傅英風秀朗玄通常住道德芳烈帝后欽裕構造靈基朝野傾務遠摹妙喜近光祗樹唯聖唯賢爰依爰附億兆來蘇天龍虔仰城芥千空此基無爽碑拓本禪靜寺剎前銘敬史君碑公名字顯俊平陽泰平人蓋虞舜之苗裔田敬仲之後也舜有康哉之唱敬有和鳴之應德徽書史道合無名自茲以降世阜哲人龜組繼襲英聲不朽公資黃中之雅氣稟川嶽之粹靈苞一德于懷抱淵万頃于胸襟摻節端華風神雅峻博學多通無所成名振徽音于綺歲播九德于冠年豈伊一日千里實曰王佐之才解褐奉朝請于時女后稱制權移外戚黨樹私門謀危王室公乘義發憤肆忠奉國結周公河西之略咨義真折角之恥挂冠辭闕杖劍歸卿虎步方州翹心日角孝莊統曆攝履還朝帝嘉乃功用優勳賞封泰平縣開國子除晉州別駕永安云季元凶伏罪殘醜遺燼更相鳩率始資賈詡之計終成李郭之舉責罪宣平交兵象闕長戟百万胡騎千群大丞相勃海王德隆齊晉作牧唐都志存匡合克翦封鯨以公器宇淵亮民望所歸特申情怉委以經謀公深識時雄罔計強弱豹變從時應機而起毗文贊武專按劍之功帷籌野戰參斷鼇之力長蛇既勦龜鼎惟新策勳有典式酬功效進封永安侯食邑千戶拜車騎將軍度支尚書俄遷都官尚書公位居省闥職在樞機竭忠奉上庶情求瘼獎進英賢糾廢姦慝宿滯必申頽綱由整今上德配玄黃融齊日月鑒殷徙御未遑外略秦隴放命乘此憑陵驅率戎虜擾我生民汾晉邊遐偏被其毒惟捍所寄事符賢桀乃以以公為汾州刺史尋轉晉州刺史車騎侯如故公秉麾出閫佩錦歸鄉明賞罰以勸元戎敷仁澤以字黎庶乘機迭出智勇兼奮聿未周姦渠遁迹百城旆檡四民歸堵敢飯之嗂不息安居之詠更新雖李牧禦邊細侯治雍不能尚也又燕司失馭編荒作逆連黑山之衆峙黃巾之勢縱橫海表陸梁幽冀震感皇衷命公是討公運六奇于帷幄忘七尺于戎行深淮陰平趙之略協段熲破羌之謀廣張旗幟厲怒三軍紛紜馳突遂夷凶醜凱旆而歸增隆寵秩拜儀同三司韓地邊嶮繡連蠻楚夏風攸改彯偽成俗密人不恭鴟張溪壑黠虜因資玩威疆埸歷政為𧣲莫能芟遏百姓雕傷流離略盡天子悼兆民之荼炭惟邊祏之須才終朝忘食夜分不寢以公略不世德效纍彰除殘拯溺非莫可加拜驃騎大將軍潁州刺史大都督潁州諸軍事儀同三司開國如故公深惟臣辱職不求易憘遇槃根薄言來踐輕賦斂以阜民財勞吐握以招賢俊嚴治烽候宿俵輕肥榷火或舉豹騎爭先鬼出電入梟囚万計賞不踰功罰必當罪人物輻輳繈負雲歸玉燭登年絃歌不息亦既芟夷世難功濟民生復惟舟梁苦海運茲迷溺敬崇三寶翹翥九劫望維衛以虛心念毗耶而延佇此地實為高敞眺實遐隆遠乘山嶽邇帶池閻惟金剛之妙宅諒神基之淨土故平陽太守潁川太守使持節秦州刺史梁洪雅攝情物外宅志道場爰建精廬鬱茲形勝水火亟交年歲攸積龍宮梵室雕落朽故公乃勉率僚佐肅心營造遠訪名工窮盡巧麗建七層之寶剎寫雙樹之光儀金瓊疊照朱紫聯華長廊四密廣夏清疏名僧遠萃大法津流憑此至誠仰願皇帝陛下祚隆天地齊光九劫化漸三塗率偕四果日誓勗順終如始有滅有生無虧八万之因無生無滅濟此娑婆之苦湛露易晞貞剛惟久式裁金石永昭不朽作頌惟聖之後達者克昌代綰圭組世有蘭芳挺茲明德隆贊霸王齊鑣管范間步蕭張弱齡聰璿岐年秀發藉蔭聖童殉齊初月疾惡如風趣善如蹶百行斯兼三省無闕作牧西蕃君臨南甸荒服來庭鯨鯢由翦政行保鄣化絲大啓千乘職聯三鉉發揚拯壓開職道矇飛甍架雨寶劍分虹月光照曜日映玲瓏業茲世福永樹來功維大魏興和二年龍集庚申下缺碑拓本魯孔子廟碑粵若稽古睿后欽明文思衡宰邁德丕顯九功咸事故能庸勳親賢官方式敘惟大魏徙鄴之五載皇興和之元年天子曰咨夤賓出日實唯濟岱宣風敷化義屬英良以君理思優敏實惟舊德升朝牧民物望斯允必能絃歌鄒魯剋振斯文乃制詔册拜我君公使持節都督兗州諸軍事車騎大將軍當州大都督兗州刺史君姓李字仲琁趙國柏仁人也其先帝高陽之苗裔柱史之胤左車之綿緒瑤光休彩赫奕于上齡若水嘉祥枎疏于季葉君以資解褐奉朝請俄除定州平北府法曹參軍仍歷功曹咨議參軍事定相雍三州長史東郡汲郡恆農三郡太守司徒左長史中散太中大夫營構都將雍兗二州刺史所在恩遺訓在民夫椒桂易地而貞馥不移君鳳舉雲翔風期如一斯實天懷直置妙與神同悒然不樂思仁未深刑平惠和言為淳階資寵之榮奕葉重光之貴氣韻優峻之奇政績緝熙之美既備于史傳與清頌故不復詳載焉君神懷疏爽風度絶人學業與源並深趣橾共寒松俱秀故其蒞兗部也嘗未浹旬言覲孔廟肅恭致誠敬神如在遂軔車曲阜令馬沂流周遊眺覽尚想伊人慨然有報功之意乃命工人修建容像孔子曰從我于陳蔡者皆不得及門也因歷敘其才以為四科之目生既見從沒侍故顏氏于易辭起豫者商紛綸于文誥是則聖人之道須輔佐而成故曰吾有由也惡言不聞于耳所以雕素十子列其側今于奉進儒冠于諸徒亦青襟青領雖逝者如斯風霜驟謝而淪姿舊訊曖似還新至如廟宇凝靜靈姿嚴麗數仞之牆無以踰七之房不能出夫道繫于人人亡則道隱斯大義以之而乖微言以之而絶今聖容肅穆二五成行丹素陸離似微笑而時言左右若承顏而受業是以覩之者莫不欣欣焉有入室登堂之想斯亦化之一隅也天誕聖哲作民師風闕里播洙泗至于歎鳳鳥之寂寥傷河圖之莫出屢應聘而不遇知道德之不行乃正雅頌修春秋刊理六經懸諸日月載之後莫不遵其義以述作服其訓以成身咨可謂開闢之儒聖無窮之文宗者矣此地古號曲埠是唯魯都雖宮觀荒毀臺池然其廟庭也蔚筫林于九冬罩修柯于百刃類神栝之侵漢同梧宮之巨圍至夫鴻隨秋下則月秀霜枝燕逐春來亦風開翠葉既觀亦足以安樂聖靈是以無代不加修繕謶億載以寧神君清明在躬精思入微功被人神德貫幽顯豈惟營飾宣筫經創如虔修岱像崇奉玄宗敦素翦華興存廢絶視民如傷納之仁壽體亡懷以幽詣任万物以為心豈直靈津孤灑虛光獨散者哉夫一月之明可影百川一人之鑒從橫万趣爰自刺舉未或斯同然丹青所以圖盛金石所以刊不朽不鐫珉瑤焉述府州佐令士民等略序義目樹碑廟庭俾後來君子知功業之若斯焉乃作頌曰二儀肇泮人倫攸舉邈邈玄王誕茲聖緒祖習堯舜獻章文武聲溢九天化潭八宇祖習聖神盡妙化潭伊何存教同麗景榑天孤昭無異岱宗巖巖特峭重山隱寶深霞祕暉在哀之葉自衛言歸德生于豫文實在茲彝倫禮樂剋敘書詩驚異灰管流氣良木其摧緬踰千祀以存恕亡允諸靈意不有伊人熟云修置唯君體道布政優優白鳩巢室赤雀西樓仁罔不備智周器冠後哲風邁前修既繕孔像復立十賢誠兼岱宇勤盡重玄仰聖儀之煥爛嘉鴻之嬋聯長無絶兮終古永萬億兮斯傳興和三年十二月十一日功碑拓本邑主造像碑大魏武定六年歲次戊辰九月己未朔十二日庚午邑主敬造石像碑文夫玄精曠遠妙理沖深至道不廓幽賾難覩故像物隱光出于慌惚之中法相淪暉生于希夷之外瞰彼靈山結五子之遐想眷茲淥水闡九龍以成津瞻其堂宇若穹旻之帶曜靈尋之杳莫若遊霞之登九霄正覺焉可究哉故佛弟子邑主等導流荊宛翻光嵩洛據德衡道冠中鼎然皆以生逢隘運形沈丘壤識果業之可崇知冥限之有期恐朝露之命覩太陽而旭晞草木之年隨秋霜而降墜怙恃先靈罔極之效弗展幼子遐裔覆育之恩靡託遂磬竭家資率引邑義構像通衢崇蔥寶業峨嵯溪谷之濱條蕩平原之里背祀丘以樹形跨闌橋而建宇庶能使七世幽魂遊處天堂之中前亡後死免脫八難之苦爰及胄相承軒蓋重輝冕旒繼世入衛鉤陳出宰蕃嶽台鉉相望圭璋疊影奔蔚流聲簏素伏願皇道雍熙景命維新駿奔馳戎渠交行蘆歌德霜被澤圖録再炳升平吉始凡厥蒼生咸蒙斯福乃作頌曰聖者啓胤學道求真國王非寶儲二匪珍捐妻施子棄若遺塵金軀靡吝嵓壑投身遂登正覺神通自然群魔稽首靈冠諸天慈悲万有光照大千苞綸曠劫仰之彌玄擾擾群生有善有惡報應如響隨心降蘀磬茲果庶免鼎鑊覬拔幽魂遷神妙樂伏願皇家景祚康延解鞅桃林釋轡華山蒲車巖阿訪逸求賢孤竹舍薇黃綺執鞭誹木旋設諫鼓空懸導茲邑義采石嵩陽是琢是肯樹此福堂勒碑啓像跨躡崇岡德之皎皎千載流芳碑拓本祝麴文東方青帝土公青帝威神南方赤帝土公赤帝威神西方白帝土公白帝威神北方黑帝土公黑帝威神中央黃帝土公黃帝威神某年月某日辰朔日敬啓五方五土之神主人某甲謹以七月上辰造作麥麴數千百餅阡陌縱橫以辨疆界須建立五王各布封境酒脯之薦以相祈請願垂神力勤鑒所願使出類絶蹤穴蟲潛影衣色錦布或蔚或炳殺熱火燌以烈以猛芳越椒熏味超和鼎飲利君子既醉既逞惠彼小人亦恭亦靜敬告再三格言斯整神之聽之福應自冥人願無為希從畢永急急如律令齊民要術七投書敦煌城東門涼王三十年若七年魏書沮渠牧犍傳初太延中有一父老投書于敦煌城東門忽然不見其書一紙八字戲嘲陽休之有觸藩之羝羊乘連錢之驄馬從晉陽而向鄴懷屬書而盈把北史四十七陽尼附傳有人士戲嘲休之云丹書河西河西三十年破帶石樂七年魏書沮渠牧犍傳又于震電之所得石丹書玉印文富樂曰昌永保無疆福祿曰臻長享萬年魏書靈徵志下和平三年四月河內張超于壞樓所城北故佛圖處獲玉印以獻印方二寸其文曰云云乞給兵送還磧北啓投化蠕蠕元退社渾河旃等二人以今月二十六日到鎮云國土大亂姓姓別住迭相抄掠當今北人鵠望待拯今乞依前恩賜給精兵一萬還令督率送臣磧北撫定荒人脫蒙所請事必克濟魏書蠕蠕傳正光二年七月上獻文帝表奉詔聽臣還舊土故遣良利守洮陽若不追前恩求令洮陽貢其土物魏書吐谷渾傳上書乞賑救臣亡父僻處塞外仰慕天子威德遣使表獻不空于歲天子降念賜遺甚厚及臣繼立亦不闕常貢天子垂矜亦不異前世敢緣至恩輒陳私艱臣國自無諱所攻擊經今八歲人民飢荒無以存活賊今攻臣甚急臣不能自全遂捨國東奔三分免一即日已到焉耆東界思歸天闕幸垂賑救魏書車師國傳真君十一年車師王車夷落遣使琢進辥直上書上孝明帝書大國天子天之所生願日出處常為漢中天子波斯國王君和多千萬敬拜魏書波斯國傳神龜中遣使上書貢物上獻文帝表西方諸國今皆已屬蠕蠕奴世奉大國至今無異今蠕蠕軍馬到城下奴聚兵自固故遣使奉獻延望救援魏書于闐國傳顯祖末蠕蠕寇于闐于闐患之遣使素目伽上表求援
