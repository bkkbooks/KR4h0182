body:
  text: 文成帝修復佛法詔夫為帝王者必祗奉明靈顯彰一道其能惠著生民濟益群品者雖在古昔猶序其風烈是以春秋嘉崇明之禮祭典載功施之族況釋迦如來功濟大干惠流塵境等生死者歎其達觀覽文義者貴其妙用明助王政之禁律益仁智之善性排斥群邪開演正覺故前代已來莫不崇尚亦我國家常所尊事也世祖太武皇帝開廣邊荒德澤遐及沙門道五善行純誠惠始之倫無遠不至風義相感往往如林夫山海之深怪物多有姦淫之徒得容假託講寺之中致有凶黨是以先朝因其瑕釁戮其有罪有司失旨一切禁斷景穆皇帝每為慨然值軍國多事未遑修復朕承洪緒君臨萬邦思述先志以隆斯道今制諸州郡縣于衆居之所各聽建佛圖一區任其財用不制會限其好樂道法欲為沙門不問長幼出于良家性行素篤無諸嫌穢鄉里所明者聽其出家率大州五十小州四十人其郡遙遠臺者十人各當局分皆足以化惡就善播揚道教也魏書釋老志獲玉印詔朕以眇身纂承大業懼不能宣慈惠和寧濟萬寓夙夜兢兢若臨淵谷然即位以來百姓晏安風雨順序邊方無事衆瑞兼呈不可稱數又于苑內獲方寸玉印其文曰子孫長壽群公卿士咸曰休哉豈朕一人克臻斯應實由天地祖宗降祐之所致也思與兆庶共茲嘉慶其令民大酺三日諸殊死已下各降罪一等魏書文成紀詔李安世汝但守此至大不慮不富貴北史三十三李孝伯附傳曲赦京師詔今始奉世祖恭宗神主于太廟又于西苑遍秩群神朕以大慶饗賜百寮而犯罪之人獨即刑戮非所以子育群生矜及衆庶夫聖人之教自近及遠是以周文刑于寡妻至于兄弟以御家邦化苟從近恩亦宜然其曲赦京師死囚已下魏書文成紀遣使巡行州郡詔夫為治者因宜以設官舉賢以任職故上下和平民無怨謗若官非其人姦邪在立則政教陵遲至于凋薄思明黜陟以隆治道今遣尚書穆伏真等三十人巡行州郡觀察風俗入其境農不墾殖田畝多荒則徭役不時廢于力也耆老飯蔬食少壯無衣褐則聚斂煩數匱于財也閭里空虛民多流散則綏導無方疏于恩也盜賊公行劫奪不息則威禁不設失于刑也衆謗並興大小嗟怨善人隱伏佞邪當途則為法混淆昏于政也諸如此比黜而戮之善于政者褎而賞之其有阿枉不能自由聽詣使告狀使者檢治若信清能衆所稱美誣告以求直反其罪使者受財斷察不平聽詣公車上訴其不孝父母不順尊長為吏姦暴乃為盜賊各具以名上其容隱者以所慝之罪罪之魏書文成紀懲牧守貪穢詔朕即阼至今屢下寬大之旨蠲除煩苛去諸不急欲令物獲其所人安其業而牧守百里不能宣揚恩意求欲無厭斷截官物以入于己使課調懸少而深文極墨委罪于民苟求免咎曾不改懼國家之制賦役乃輕比年已來雜調減省而所在州郡咸有逋懸非在職之官綏導失所貪穢過度誰使之然自今常調不充民不安業宰民之徒加以死罪申告天下稱朕意焉魏書文成紀禁穿毀墳隴詔昔姬文葬枯骨天下歸仁自今有穿毀墳壟者斬之魏書文成紀北巡至陰山有故家毀廢下詔案治遷代前逋詔夫褒賞必于有功刑罰審于有罪此古今之所同由來之常式牧守蒞民侵食百姓以營家業王賦不充雖歲滿去職應計前逋正其刑罪而主者失于督察不加彈正使有罪者優遊獲免無罪者妄受其辜是啓姦邪之路長貪暴之心豈所謂原情處罪以正天下自今諸遷代者仰列在職殿最案制治罪克舉者加之爵寵有愆者肆之刑戮使能否殊貫刑賞不差主者明為條制以為常楷魏書文成紀賑雲中等六郡詔朕承洪業統御群有思恢政化以濟兆民故薄賦斂以實其財輕徭役以紓其力欲令百姓修業人不匱乏而六鎮雲中高平二雍秦州偏遇災旱年穀不收其遣開倉廩以賑之有流徙者諭還桑梓欲市糴他界為關傍郡通其交易之路若典司之官分職不均使上恩不達于下下民不贍于時加以重罪無有攸縱魏書文成紀禁因調發增價詔刺史牧民為萬里之表自頃每因發調逼民假貸大商富賈要射時利旬日之間增贏十倍上下通同分以潤屋故編戶之家困于凍餒豪富之門日有兼積為政之斃莫過于此其一切禁絶犯者十匹以上皆死布告天下咸令知禁魏書文成紀選補先勞舊才能詔朕承洪緒統御萬國垂拱南面委政群司欲緝熙治道以致寧一夫三代之隆莫不崇尚年齒今選舉之官多不以次令班白處後晚進居先豈所謂彝倫攸敘者也諸曹選補宜各先盡勞舊才能魏書文成紀召役逼雇論同枉法論朕憲章舊典分職設官欲令敷揚治化緝熙庶績然在職之人皆蒙顯擢委以事任當厲已竭誠務省徭役使兵民優逸家給人贍今內外諸司州鎮守宰侵使兵民勞役非一自今擅有召役逼雇不程皆論同枉法魏書文成紀宮壇不改作詔朕每歲以秋日間月命群官講武平壤所幸之處必立宮壇縻費之功勞損非一宜仍舊貫何必改作也魏書文成紀畋獵不濫殺詔朕順時畋獵而從官殺獲過度既殫禽獸乖不合圍之義其敕從官及典圍將校自今已後不聽濫殺其畋獲皮肉別自頒賚魏書文成紀檢還賣鬻男女詔前以民遭飢寒不自存濟有賣鬻男女者盡仰還其家或因緣勢力或私行請託共相通容不時檢校令良家子息仍為奴婢今仰精究不聽取贖有犯加罪若仍不檢還聽其父兄上訴以掠人論魏書文成紀定婚喪條格詔名位不同禮亦異數所以殊等級示軌儀今喪葬嫁娶大禮未備貴勢豪富越度奢靡非所謂式昭典憲者也有司可為之條格使貴賤有章上下咸序著之于令魏書文成紀貴族不婚卑姓詔夫婚姻者人道之始是以夫婦之義三綱之首禮之重者莫過于斯尊卑高下宜令區別然中代以來貴族之門多不率法或貪利財賄或因緣私好在于苟合無所選擇令貴賤不分巨細同貫塵穢清化虧損人倫將何以宣示典謨垂之來裔今制皇族師傅王公侯伯及士民之家不得與百工伎巧卑姓為婚犯者加罪魏書文成紀賜宿石詔石為忠臣鞚馬切諫免虎之害後有犯罪宥而勿坐魏書宿石傳高宗親欲射虎石叩馬而諫後虎騰躍殺人詔云云遣使者詔源賀卿以忠誠款至著自先朝以丹青之潔而受蒼蠅之汙朕登時研檢已加極法故遣宣意其善綏所蒞勿以囂謗之言致損慮也魏書源賀傳賀為冀州刺史姦人石華告沙門道可與賀謀反高宗遣使者詔賀黃金合盤銘九州致貢殊域來賓乃作茲器錯用貝珍鍛以紫金鏤以白銀範圍擬載吐耀含真纖文麗質若化若神皇王御之百福維新魏書食貨志和平二年秋詔中尚方作黃金合盤十二具徑二尺二寸縷以金鈿以玫瑰其銘曰云云又見初學記二十七以為太武帝當誤除雜調詔夫賦斂煩則民財匱課調輕則用不足是以十一而稅頌聲作矣先朝榷其輕重以惠百姓朕承洪業上惟祖宗之休命夙興待旦惟民之恤欲令天下同于逸豫而徭賦不息將何以塞煩去苛拯濟黎元者哉今兵革不起畜積有餘諸有雜調一以與民魏書獻文紀令刺史守宰自選吏詔先朝以州牧親民宜置良佐故敕有司班九條之制使前政選吏以待俊乂必謂銓衡允衷朝綱應敘然牧司寬惰不祗憲旨舉非其人愆于典度今制刺史守宰到官之日仰自舉民望忠信以為選官不聽前政共相干冒若簡任失所以罔上論魏書獻文紀詔高允自頃以來庠序不建為日久矣道肆陵遲學業遂廢子襟之歎復見干令朕既纂統大業八表晏寧稽之舊典欲置學宮于郡國使進修之業有所津寄卿儒宗元老朝望舊德宜與中祕二省參議以聞魏書高允傳報于闐國王詔朕承天理物欲令萬方各安其所應敕諸軍以拯汝難但去汝遐阻雖復遣援不救當時之急已停師不行汝宜知之朕今練甲養卒一二歲間當躬率猛將為汝除患汝其謹警候以待大舉魏書于闐國傳報尉元詔待後軍到量宜守防其青冀已遣軍援須待剋定更運軍糧魏書尉元傳詔尉元賊將沈攸之吳憘公等驅率蟻衆進寇下邳卿戎昭果毅智勇奮發水陸邀絶應時摧殄自淮以北蕩然清定皆是元帥經略將士效力之所致也朕用嘉焉所獲諸城要害之處分兵置戍以帖民情今方欲清蕩吳會懸旌秣陵至用兵所宜形勢進止善加量度動靜以聞魏書尉元傳詔慕容白曜卿總率戎旅討除不賓霜戈所向無不摧靡旬日之內剋拔四城韓白之功何以加此雖升城戍將房崇吉守遠不順危亡已形遺在旦夕宜勉崇威略務存長轡不必窮兵極武以為勞頓且伐罪弔民國之令典當招懷以德使來蘇之澤加于百姓魏書慕容白曜傳恤宋呂梁敗卒詔頃張永迷擾敢拒王威暴骨原隰殘廢不少死生冤痛朕甚愍焉天下民一也可敕郡縣永軍殘廢之士聽還江南露骸草莽者收瘞之魏書獻文紀皇興元年正月大破張永沈攸之于呂梁東明年詔民病給醫藥詔朕思百姓病苦民多非命明發不寐疚心疾首是以廣集良醫遠采名藥欲以救護兆民可宣告天下民有病者所在官司遣醫就家診視所須藥物任醫量給之魏書獻三月文紀誓衆詔諸將用兵在奇不在衆也卿等但為朕力戰方略已在朕心魏書蠕蠕傳車駕北討顯祖親誓衆詔諸將又北史九十八聽逃兵歸首詔天安以來軍國多務南定徐方北掃遺虜征戌之人亡竄非一雖罪合刑書每君哀宥然寬政猶水逋逃遂多宜申明典刑以肅姦偽自今諸有逃亡之兵及下代守宰浮遊不赴者限六月三十日悉聽歸首不首者論如律魏書獻文紀禪位太子詔朕承洪業運屬太平淮岱率從四海清晏是以希心玄古志存淡泊躬覽萬務則損頤神之和一日或曠政有淹滯之失但子有天下歸尊于父父有天下傳之于子今稽協靈運考會群心爰命儲宮踐升大位朕方優遊恭已棲心浩然社稷乂安克廣其業不亦善乎百官有司其祗奉胤子以答天休宣布寓內咸使聞悉魏書獻文紀聽尉元以韓念祖為睢陵令詔樹君為民民情如此可聽如請魏書尉元傳報雍州人王叔保等詔選曹已用人藻有惠政自宜他敘魏書劉藻傳藻遷雍州鎮將雍州人王叔保等三百人表乞藻為騃奴戍主詔祀孔子廟禁婦女合雜詔尼父稟達聖之姿體生知之量窮理盡性道光四海頃者淮徐未賓廟隔非所致令祠典寢頓禮章殄滅遂使女巫妖覡淫進非禮殺生鼓舞倡優媟狎豈所以尊明神敬聖道者也自今已後有祭孔子廟制用酒脯而巳不聽婦女合雜以祈非望之福犯者以違制論其公家有事自如常禮犧牲粢盛務盡豐潔臨事致敬令肅如也牧司之官明糾不法使禁令必行魏書孝文紀上隱括比丘詔比丘不在寺舍遊涉村落交通姦猾經歷年歲令民間五五相保不得容止無籍之僧精加隱括有者送付州鎮其在畿郡送付本曹若為三寶巡民教化者在外齎州鎮維那文移在臺者齎都維那等印牒然後聽行違者加罪魏書釋老志又詔內外之人興建福業造立圖寺高敞顯博亦足以輝隆至教矣然無知之徒各相高尚貧富相競費竭財産務存高廣傷殺昆蟲含生之類苟能精致纍土聚沙福鍾不朽欲建為福之因未知傷生之業朕為民父母慈養是務自今一切斷之魏書釋老志令送濟州靈像達都詔夫信誠則應遠行篤則感深歷觀先世靈瑞乃有禽獸易色草木移性濟州東平郡靈像發輝變成金銅之色殊常之事絶于往古熙隆妙法理在當今有司與沙門統曇曜令州送像達都使道俗咸覩實相之容普告天下皆使聞知魏書釋老志受爵詔非功無以受爵非能無以受祿凡出外遷者皆引此奏聞求乞假品在職有效聽下附正若無殊稱隨而削之舊制諸鎮將刺史假五等爵及有所貢獻而得假爵者皆不得世襲魏書官氏志貢舉詔頃者州郡選貢多不以實碩人聽以窮處幽仄鄙夫所以超分妄進豈所謂旌賢樹德者也今年貢舉尤為猥濫自今所遣皆門盡州郡之高才極鄉閭之選魏書孝文紀上答百濟國王餘慶詔得表聞之無恙甚善卿在東隅處五服之外不遠山海歸誠魏闕欣嘉至意用戢于懷朕承萬世之業君臨四海統御群生今宇內清一八表歸義襁負而至者不可稱數風俗之和士馬之盛皆餘禮等親所聞見卿與高麗不穆屢致陵犯苟能順義守之以仁亦何憂于寇讎也前所遣使浮海以撫荒外之國從來積年往而不返存亡達否未能審悉卿所送鞍比校舊乘非中國之物不可以疑似之事以生必然之過經略權要已具別旨又詔知高麗阻強侵軼卿士修先君之舊怨棄息民之大德兵交纍載難結荒邊使兼申胥之誠國有楚越之急乃應展義扶微乘幾電舉但以高麗稱藩先朝供職日久于彼雖有自昔之釁于國未有犯令之愆卿使命始通便求致伐尋討事會理亦未周故往年遣禮等至平壤欲驗其由狀然高麗奏請頻煩辭理俱詣行人不能抑其請司法無以成其責故聽其所啓詔禮等還若今復違旨則過咎益露後雖自陳無所逃罪然後興師討之于義為得九夷之國世居海外道畼則奉藩惠戢則保境故羈縻著于前典楛貢曠于歲時卿備陳強弱之形具列往代之迹俗殊事異擬貺乖衷洪規大略其致猶在今中夏平一宇內無虞每欲陵威東極懸旌域表拯荒黎于偏方舒皇風于遠服良由高麗即敘未及卜征今若不從詔旨則卿之來謀載協元戎啓行將不云遠便可豫率同興具以待事時遣報使速究彼情師舉之日卿為鄉導之首大捷之後又受元功之賞不亦善乎所獻錦布海物雖不悉達明卿至心今賜雜物如別魏書百濟國傳牧守久任詔書云三載一考三考黜陟幽明頃者已來官以勞升未久而代牧守無恤民之心競為聚斂送故迎新相屬于路非所以固民志隆治道也自今牧守溫仁清儉克已奉公者可久于其任歲積有成遷位一級其有貪殘非道侵削黎庶者雖在官甫爾必加黜罰著之于令永為彝準魏書孝文紀上詔群祀無用牲朕承天事神以育群品而咸秩處廣用牲甚衆夫神聰明正直享德與信何必在牲易曰東鄰殺牛不如西鄰之礿祭實受其福苟誠感有著雖行潦菜羹可以致大嘏何必多殺然後獲祉福哉其命有司非郊天地宗廟社稷之祀皆無用牲魏書禮志一延興二年有司奏天地五郊社稷已下及諸神合一千七十五所歲用牲七萬五千五百顯祖深愍生命乃詔又見通典五十五未句作皆用酒脯原守宰為民所列罪詔往年縣召民秀二人問以守宰治狀善惡具聞將加賞罰而賞者未幾罪者衆多肆法傷生情所未忍今特垂寬恕之恩申以解網之惠諸為民所列者特原其罪盡可貸之魏書孝文紀上葬獄囚詔自今京師及天下之囚罪末分判在獄致死無近親者公給衣衾棺櫝葬埋之不得曝露魏書孝文紀上遣使河南七州詔河南七州牧守多不奉法致新邦之民莫能上達遣使者觀風察獄黜陟幽明其有鰥寡孤獨貧不自存者復其雜徭年八十已上一子不從役力田孝悌才器有益于時信義著于鄉閭者具以名聞魏書孝文紀上詔呂羅漢卿以勞勤獲敘才能致用內總禁旅外臨方兵褒寵之隆可謂備矣自非盡節竭誠將何以垂名竹帛仇池接近邊境兵革屢興既勞士卒亦動民庶皆由鎮將不明綏禁不理之所致也卿應機赴擊殄此凶醜隴右至險民亦剛悍若不導之德齊之以刑寇賊莫由可息百姓無以得靜朕垂心治道欲使遠近清穆卿可召集豪右擇其事宜以利民為先益國為本隨其風俗以施威惠其有安士樂業奉公勤私者善加勸督無奪時利明相宣告稱朕意焉魏書呂羅漢傳寬宥詔朕應曆數開一之期屬千載光熙之運雖仰嚴誨猶懼德化不寬至有門房之誅然下民凶戾不顧親戚一人為惡殃及合門朕為民父母深所愍悼自今以後非謀反大逆干紀外奔罪止其身而已今德被殊方文軌將一宥刑寬禁不亦善乎魏書孝文紀上詔報蠕蠕主子成所論婚事今始一反尋覽事理未允厥中夫男而下女爻象所明初婚之吉敦崇禮娉君子所以重人倫之本不敬其初今終難矣魏書蠕蠕傳原平原女子孫男玉詔男玉重節輕身以義犯法緣情定罪理在可原其特恕之魏書列女傳孫氏男玉者夫為靈縣民所殺追執讎人男玉以杖驅殺之有司處死以聞顯祖詔購擒劫盜詔尚書李欣著勳先朝弼諧皇極讜言嘉謀旬日屢進實國家之楨幹當今之老成也是以擢授南部綜理煩務自在厥位夙夜惟寅乃心匪懈克己復禮退食自公利上之事知無不為賞罰所加不避疏戚雖孝子之思慈母鷹鸇之逐鳥雀何以方之若鄭之子産魯之季文亦未加也然惡直醜正盜憎主人自往年以來群姦不息劫欣宗人李英等四家焚燒舍宅傷害良善此而可忍孰不可恕有司可明加購募必令摛殄魏書李欣傳詔呂羅漢朕總攝萬幾統臨四海思隆古道光顯風教故內委群司外任方牧正是志士建節之秋忠臣立功之會然赤水諸羌民遠居邊士非卿善誘何以招輯卿所得口馬表求貢奉朕嘉乃誠便敕領納其馬印付都牧口以賜卿魏書呂羅漢傳禪位太子册命昔堯舜之禪天下也皆由其子不肖若丹朱商均能負荷者豈搜揚仄陋而授之哉爾雖沖弱有君人之表必能恢隆王道以濟兆民今使太保建安王陸馥太尉源賀持節奉皇帝璽綬致位于爾躬其踐升帝位克廣洪業以光祖宗之烈使朕優遊履道頤神養性可不善歟魏書獻文紀下書納義陽王昶易稱利用行師書云恭行天罰必觀時而後施因機而後舉故夏伐有扈四海以平晉定吳會萬方以一今宋室衰微凶難洊起國有殺君之逆邦罹崩離之難起自蕭牆亹流合境偽使持節散騎常侍都督徐南北兗青冀幽七州豫州之梁郡諸軍事征北將軍儀同三司徐州刺史義陽王昶踵微子之蹤蹈項伯之迹知機體運歸款闕庭朕錫以顯爵班同親舊昶弟湘東王進不能扶危定傾退不能降身高謝阻兵安忍篡位自立既無闔閭靜亂之功而有無知悖禮之變怠棄三正慢易天常覆敗之徵既兆危亡之應已著偽江州刺史晉安王復稱大號自立一隅荊郢二州刺史安陸臨海王劉子綏子頊大擅威令不相祗伏徐州刺史彭城鎮主辥安都青州刺史沈文秀冀州刺史歷城鎮主崔道固等皆彼之要藩懼及禍難擁衆獨據各無定主仰觀天象俯察人謀六軍燮伐之期率士同軌之日朕承休烈屬當泰運思播靈武廓寧九服豈可得臨萬乘之機遘時來之遇而不討其讎逆振其艱患哉今可分命諸軍以行九伐使持節征東大將軍安定王直勤伐伏玄侍中尚書左僕射安西大將軍平北公直勤美晨散騎常侍殿中尚書平北將軍山陽公呂羅漢領隴右之衆五萬沿漢而東直指襄陽使持節征南大將軍勃海王道勤天賜侍中尚書令安東大將軍始平王直勤渴言侯散騎常侍殿中尚書令安西將軍西陽王直勤蓋戶千領幽冀之衆七萬濱海而南直指東陽使持節征南將軍京兆王直勤子侍中司徒安南大將軍新建王獨孤侯尼須散騎常侍西平公韓道人領江雍之衆八萬出洛陽直至壽陽使持節征南大將軍宜陽王直勤新城侍中太尉征東大將軍直勤駕頭拔羽直征東將軍北平公拔敦及義陽王劉昶領定相之衆十萬出濟兗直造彭城與諸軍剋期同到會于秣陵納昶反國定其社稷使荊陽沾德義之風江漢被來蘇之惠邊疆將吏不得因宋衰亂有所侵損以傷我國家存救之義主者明宣所部咸使聞知稱朕意焉宋書索虜傳義陽王昶單騎奔虜太宗泰始初晉安王子勛為逆虜謀欲納昶下書克青冀二州下書朕承天序臨御兆民思闡皇風以隆治道而荊吳僭傲跨跱一方天降其殃以罰有罪篡戮發于蕭牆毒害嬰于群庶徐州刺史辥安都司州刺史常珍奇深體逆順歸誠獻款遭難已久飢饉荐臻或以糊口之功私力竊盜或不識王命藏竄山藪或為囚徒先被執繫元元之命甚可哀愍其曲赦淮北三州之民自天安二年正月三十日壬寅昧爽以前諸犯死罪以下繫囚見徒一切原遣唯子殺父母孫殺祖父母弟殺兄妻殺夫奴殺主不從赦例若亡命山澤百日不首復其初罪今陽春之初東作方興三州之民各安其業以就農桑有飢窮不自存通其市糴之路鎮統之主勤加慰納遵用輕典以蒞新化若緌導失中令民逃亡加罪無縱其普宣下咸使聞知朕意焉宋書索虜傳辥安都遣使引虜虜攻克青冀二州執沈文秀崔道固又下書
