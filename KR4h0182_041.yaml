body:
  text: 封軌明堂辟雍議明堂者布政之宮在國之陽所以嚴父配天聽朝設教其經構之式蓋已尚矣故周官匠人職云夏后氏世室殷人重屋周人明堂五室九階四戶八窗鄭玄曰或舉宗廟或舉正寢或舉明堂互之以見同制然則三代明堂其制一也案周與夏殷損益不同至于明堂因而弗革明五室之義得天數矣是以鄭玄又曰五室者象五行也然則九階者法九土四戶者達四時八窗者通八風誠不易之大範有國之恆式若其上圓下方以則天地通水環宮以節觀者茅蓋白盛為之質飾赤綴白綴為之戶牖皆典籍所具載制度之明義也在秦之世焚滅五典毀黜三代變更先聖不依舊憲故呂氏月令見九室之義大戴之禮著十二堂之論漢承秦法亦未能改東西二京俱為九室是以黃圖白虎通蔡雍應劭等咸稱九室以象九州十二堂以象十二辰夫室以祭天堂以布政依天而祭故室不過五依時布政故堂不踰四州之與辰非所可法九與十二其用安在今聖朝欲尊道訓民備禮化物宜則五室以為永制至如廟學之嫌臺沼之雜袁準之徒已論正矣遺論具在不復須載魏書封懿附傳又北史二十四務德戒闕慎言戒闕遠佞戒闕防姦戒闕清河國臣為君母服議案臣從君服降君一等君為母三年臣則期今司空以仰厭先帝俯就大功臣之從服不容有過但禮文殘缺制無正條竊附情理謂宜小功庶君臣之服不失其序升降之庶頗會禮意魏書禮志四延昌三年清河王懌所生母羅太妃薨侍中崔光議君厭降大功國臣服期太學博士封偉伯等十人議爾朱榮配食明帝廟議榮為人臣親行殺逆安有害人之母與子對饗考古詢今未見其義北齊書封隆之傳與齊王啓斛斯椿賀拔勝賈顯智等往事爾朱中復乖阻及討仲遠又與之同猜忍之人志欲無限又叱列延慶侯念賢皆在京師王授以名位此等必構禍隙北齊書封隆之傳叔母及兄子喪出入不作鼓吹議喪大記云期九月之喪既葬飲酒食肉不與人樂之五月三月之喪比葬令酒食肉不與人樂之世叔母故主宗子直云令酒食肉不言不與人樂之鄭玄云義服恩輕以此推之明義服葬容有樂理又禮大功言而不議小功議而不及樂言論之間尚自不及其于聲作明不得也雖復功德樂在宜止魏書禮志四延昌三年七月司空清河王懌第七叔母北海王妃劉氏薨司徒高肇兄子太子洗馬貞卒並上言未知出入猶作鼓吹不太學博士封祖胄議上書諫內徙蠕蠕降戶臣以古人有言裔不謀夏夷不亂華荒忽之人羈縻而已是以先朝居之于荒服之間者正以悅近來遠招附殊俗亦以別華戎異內外也今新附者衆若舊者見徙新者必不安不安必思土思土則走叛狐死首丘其害方甚又此族類衣毛食肉樂冬便寒南土溼熱往必將盡進失歸伏之心退非藩衛之益徙在中夏而生後患愚心所見謂為不可魏書楊播附傳太和末使楊椿持節徙蠕蠕降戶椿上書不從元愈之難果悉浮河赴賊所在鈔掠如椿所策誡子孫我家入魏之始即為上客給田宅賜奴婢馬牛羊遂成富室自爾至今二十年二千石方伯不絶祿恤甚多至于親姻知故吉凶之際必厚加贈襚來往賓寮必以酒肉飲食是故親姻朋友無憾焉國家初丈夫好服綵色吾雖不記上谷翁時事然記清河翁時服飾恆見翁著布衣韋帶常約敕諸父曰汝等後世脫若富貴于今日者慎勿積金一斤綵帛百匹已上用為富也又不聽治生求利又不聽與勢家作婚姻至吾兄弟不能遵奉今汝等服乘已漸華好吾是以知恭儉之德漸不如上世也又吾兄弟若在家必同盤而食若有近行不至必待其還亦有過中不食忍飢相待吾兄弟八人今存者有三是故不忍別食也又願畢吾兄弟世不異居異財汝等眼見非為虛假如聞汝等兄弟時有別齋獨食者此又不如吾等一世也吾今日不為貧賤然居住宅舍不作壯麗華飾者正慮汝等後世不賢不能保守之方為勢家所奪北都時朝法嚴急太和初吾兄弟三人並居內職兄在高祖在右吾與津在文明太后左右于時口敕責諸內官十日仰密得一事不列便大嗔嫌諸人多有依敕密列者亦有太后高祖中間傳言構間者吾兄弟自相誡曰今忝二聖近臣母子間甚難宜深慎之又列人事亦何容易縱被瞋責慎勿輕言十餘年中不嘗言一人罪過當時大被嫌責答曰臣等非不聞人言正恐不審仰誤聖聽是以不敢言于後終以不言蒙賞及二聖間言語終不敢輒爾傳通太和二十一年吾從濟州來朝在清徽堂豫宴高祖謂諸王諸貴曰北京之日太后嚴明吾每得杖左右因此有是非言語和朕母子者唯楊椿兄弟遂舉賜四兄及我酒汝等脫若萬一蒙時主知遇宜深慎言語不可輕論人惡也吾自惟文武才藝門望姻援不勝他人一旦位登侍中尚書四歷九卿十為刺史光祿大夫儀同開府司徒太保津今復為司空者正由忠貞小心謹慎口不嘗論人過無貴無賤待之以禮以是故至此耳聞汝等學時俗人乃有坐而待客者有驅馳勢門者有輕論人惡者及見貴勝則敬重之見貧賤則慢易之此人行之大失立身之大病也汝家仕皇魏以來高祖以下乃有七郡太守三十二州刺史內外顯職時流少比汝等若能存禮節不為奢淫驕慢假不勝人足免尢誚足成名家吾今年始七十五自惟氣力尚堪朝覲天子所以孜孜求退者正欲使汝等知天下滿足之義為一門法耳非是苟求千載之名也汝等能記吾言百年之後終無恨矣魏書楊播附傳椿致仕臨行誠子孫臨岐州下劫賊教有人著某色衣乘某色馬在城東十里被殺不知姓名若有家人可速收視北史四十一楊津傳有武功人齎絹三匹去城十里為賊所劫津乃下教有一老母行哭而出云是已子于是遣騎追收并絹俱獲加兵送阿那瓌入國表傳聞彼人已立主是阿那瓌同堂兄弟夷人獸心已相君長恐未肯以殺兄之人郊迎其弟輕往虛反徒損國威自非廣加兵衆無以送其入北魏書蠕蠕傳正光二年正月遣送阿那瓌時安北將軍懷朔鎮將楊鈞表奏鑄五銖錢昔馬援在隴西嘗上書求復五銖錢事下三府不許及援徵入為虎賁中郎親對光武申釋其趣事始施行臣頃在雍州亦表陳其事聽人與官並鑄五銖錢使人樂為而俗斃得改旨下尚書八座不許以今況昔即理不殊求取臣前表經御披析魏書楊播附傳時所用錢人多私鑄稍就薄小乃至風飄水浮米斗幾值一千楊侃奏孝莊從之乃鑄五銖錢又見通典九移報梁豫州刺史裴邃彼之纂兵想別有意何為妄構白捺也他人有心豫忖度之勿謂秦無人也魏書楊播附傳播子侃為揚州録事參軍梁裴邃規襲壽春謬移云魏修白捺此亦須營歐陽侃移報班告軍士今且停軍于此以待步卒兼觀民情向背然後可行若送降名者各自還村候臺軍舉烽火各亦應之以明降款其無應烽者即是不降之村理宜殄戮魏書楊播附傳蕭寶夤反楊侃為長孫稚行臺左丞領騎干弘農北渡據石錐堡班告云云民遂轉相告報一宿間火光遍數百里寇各散歸列辭尚書父母忿爭木無餘惡直以謬誤一朝橫禍今母喪未殯父命旦夕慮兄弟五人並各幼稚慮身居長今年十五有一女弟始向四歲更相鞠養不能保全父若就刑交墜溝壑乞以身代老父命使嬰弱衆孤得蒙存立魏書長孫慮傳母因飲酒其父真呵叱之誤以杖擊便即致死真為縣囚執處以重坐慮列辭尚書通津頌惟彼澠泉竭踰三齡祈盡圭璧謁窮斯牲道從隆替隆由聖明水經淄水注陽水時有通塞先公除州即任未期是水復通海岱之士又頌通津焉敷化未期玄澤潛施枯源揚瀾涸川滌陂水經淄水注先政輟津我后通洋水經淄水注七聘闕水經注序易稱天以一生水故氣微于北方而為物之先也元中記曰天下之多者水也浮天載地高下無所不至萬物無所不潤及其氣流屆石精薄膚寸不崇朝而澤合靈宇者神莫與並矣是以達者不能測其淵沖而盡其鴻深也昔大禹記著山海周而不備地理志其所録簡而不周尚書本紀與職方俱略都賦所述裁不宣意水經雖粗輟津緒又闕旁通所謂各言其志而罕能備其宣導者矣今尋圖訪賾者極聆州域之説而涉土遊方者寡能達其津昭縱髣佛前聞不能不猶深屏營也余少無尋山之趣長違問津之性識絶深經道淪要博進無訪一知二之機退無觀隅三反之慧獨學無聞古人傷其孤陋捐喪辭書達士嗟其面牆默室求深閉舟問遠故亦難矣然毫管窺天曆筒時昭飲河酌海從性斯畢竊以多暇空傾歲月輒述水經布廣前文大傳曰大川相間小川相屬東歸于海脈其枝流之吐納診其沿路之所躔訪瀆搜渠緝而綴之經有謬誤者考以附正文所不載非經水常源者不在記注之限但綿古芒昧華戎代襲郭邑空傾川流戕改殊名異目世乃不同川渠隱顯書圖自貿或亂流而攝詭號或直絶而生通稱枉渚交奇洄湍決澓躔絡枝煩條貫系夥十二經通尚或難言輕流細漾固難辨究正可自獻徑見之心備陳輿徒之説其所不知蓋闕如也所以撰證本經附其枝要者庶備忘誤之私求其尋省之易水經注聚珍本為清河王懌諫靈太后使沙門惠憐以呪水療病表臣聞深惑衆之科禮絶妖淫之禁皆所以大明居正防遏姦邪昔在漢末有張角者亦以此術熒惑當時論其所行與今不異遂能詃誘生人致黃巾之禍天下塗炭數十年間角之由也昔新垣姦不登于明堂五利僥終嬰于顯戮魏書清河王懌傳時有沙門惠憐自云呪水飲人能差諸病靈太后使于城西之南治療百姓病懌表諫諫水路幸鄴臣聞博納輿言君上之崇務規針匡正臣下之誠節是以置鼓設謗爰自曩日虛襟博聽義屬今辰臣既疏魯濫蒙榮貫司兼獻弼職當然否佩遇恩華願陳聞見竊以都作營構之材部別科擬素有定所工治已訖回付都水用造舟艫闕永固居宇之功作暫時遊嬉之用損耗殊倍終為棄物且子來之誠本期營起今乃修繕舟楫更為非務公私回惶僉深怪愕又欲御泛龍舟經由石濟其沿河挽道久以荒蕪舟楫之人素不便習若欲委棹正流深薄之危古今共慎若欲挽牽取進授衣之月裸形水陸恐乖視人若子之義且鄴洛相望陸路平直時乘沃若往來匪難更乃捨周道之安即涉川之殆此乃愚智等慮朝野俱惑進退伏思不見其可又從駕群寮聽將妻纍舟楫之間更無限隔士女雜亂內外不分當今景御休明惟新式度裁禮調風軌物寰宇竊惟斯舉或損洪猷深失溥天順則之望又氐胡犯順未恭西道偏戎旗胄仍襲南寇對接迎畿蠻民疏戾每造不軌窺覦間隙或生慮外愚謂應妙選懿親撫寧後事令姦回息覬覦之望邊寇絶窺疆之心臣稟性愚直知而無隱區區丹志冒昧以聞魏書高道悅傳高祖將由水路幸鄴已詔都水回營構之材以造舟楫道悅諫
