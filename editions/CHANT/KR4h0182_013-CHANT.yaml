body:
  text: 孝武帝即位改元詔否泰相沿廢興互有玄天無所隱精靈弗能諭大魏統乾德漸區宇牢籠九服旁礡三光而上天降禍運踵多難禮樂崩淪憲章漂沒赫赫宗周翦為戎寇肅肅清廟將成茂草胡羯乘機肆其昏虐殺君害王刳剔海內競其吞噬之意不識醉飽之心自書契以來未有若斯者已大丞相渤海王忠存本朝精貫白日爰舉義旗志雪國恥故廣阿之軍貔虎奪氣鄴下之師金湯失險近者四胡相率實繁有徒驅天下之兵盡華戎之銳桴鼓暫交一朝盪滅元兇授首大憝斯擒揚旆濟河埽清伊洛士民安堵不失舊章社稷危而復安洪基毀而還構朕以託體宸極猥當樂推祗握寶圖承茲大業得以眇身託于王公之上若涉淵水罔識攸津思與兆民同茲嘉慶可大赦天下改中興二年為太昌元年魏書出帝紀賑贍孤老疾病詔無侮惸獨事炳前經惠此鰥寡聲留往冊朕以薄德作民父母乃眷元元寤言增歎今理運惟新哀矜伊始如有孤老疾病無所依歸者有司明君隱括依格賑贍魏書出帝紀議定條格詔理有一準則民無覬覦法啟二門則吏多威福前主為律後主為令歷世永久實用滋章非所以準的庶品隄防萬物可令執事之官四品以上集于都省取諸條格議定一途其不可施用者當局停記新定之格勿與舊制相連務在約通無致𤕠滯魏書出帝紀埋覆露屍詔頃西土年饑百姓流徙或身倚溝渠或命懸道路皆見棄草土取厭烏鳶言念于此有警夜寢掩骼之禮誠所庶幾行墐之義冀亦可勉其諸有露屍今所在埋覆可宣告天下魏書出帝紀汎級詔內外百司普汎六級在京百寮加中興四級義師將士竝加軍汎六級在鄴百官三級河北同義之州兩級河橋建義者加五級關西二級諸受建明普泰封爵汎級優特之階悉追魏書出帝紀租調詔閒者凶權誕恣法令變常遂立夷貊輕賦冀收天下之意隨以箕斂之重終納十倍之征掩目捕雀何能過此朕屬念烝黎無忘寢食加田桑始事生業未滋若頓依常格或不周展今歲租調且兩收一丐來年復舊魏書出帝紀汎階詔頃永安馭運載育皇儲遂錫汎階以申國慶近經普泰便爾中追今罪人既殄舊章斯復宜述往旨用卒前恩皇子汎二級悉可還授文穆廟汎故宜停寢若已受者依例追之魏書出帝紀報高歡請遷都鄴詔高祖定鼎河洛為永永之基經營制度至世宗乃畢王既功在社稷宜遵太和舊事北齊書神武紀下初神武自京師將北以為洛陽久經喪亂不如鄴請遷都魏帝曰云云神武奉詔又見北史六定大成樂名詔王者功成作樂治定制禮以成為號良無閒然又六代之舞者以大為名今可準古為大成也凡音樂以舞為主故干戈羽籥禮亦無別但依舊為文舞武舞而已餘如議魏書樂志長孫稚祖瑩表上新樂瑩復議樂名為嘉成孝武詔又見通典一百四十二參佐詔諸參佐自三府以下爰及外州皆不得復加常侍及兼兩員雖已授者亦悉追之魏書出帝紀申幽枉詔諸幽枉未申事經一周已上悉集華林將親覽察脫事已經年有司不列者聽其人各自陳訴若事連州郡由緣淹歲者亦仰尚書總集以聞魏書出帝紀大夫員外不帶領詔大夫之職位秩貴顯員外之官亦為匪賤而下及胥吏帶領非一高卑渾雜有損彝章自今已後京官樂為稱事小職者直加散號將軍願罷卑官者聽為大夫及員外之職不宜仍前散實參領其申旨特加者不在此例魏書出帝紀報宇文泰詔賀拔岳既殞士眾未有所歸卿可為大都督即相統領知欲漸就東下良不可言今亦徵侯莫陳悅士馬入京若其不來朕當親自致罰宜體此意不過淹留周書文帝紀上南征詔大魏得一居宸乘六馭宇攷風雲之所會宅日月之所中自北而南東征西怨后來其蘇無思不偃而句吳負險久遺度外世祖太武皇帝握金鏡以照耀擊玉鼓以鏗鏘神武之所牢寵威風之所轥轢莫不雲徹霧卷瓦解冰消長江已北盡為魏土頃天步中圮國綱時屯凶豎因機互窺上國疆埸侵噬州郡淪胥乃眷東顧無忘寢食自非五牛警旆七萃案部何以復文武之舊業拯塗炭于遺黎朕將親總六軍徑臨彭汴一勞永逸庶保無疆內外百寮便可嚴備出頓之期更聽後敕魏書出帝紀密詔高歡宇文黑獺自平破秦隴多求非分脫有變詐事資經略但表啟未全背戾進討事涉怱怱遂召群臣議其可否僉言假稱南伐內外戒嚴一則防黑獺不虞二則可威吳楚北齊書神武紀下詔高歡曾與乾邕私有盟約今復反覆兩端北齊書高乾傳科贈陣亡將士詔頃年以來天步時阻干戈不戢荊棘斯生或徇節感恩奮不顧命或臨戎對敵赴難如歸身首橫分骸骨不斂勳誠靡錄榮贈莫加寤寐矜之良有嗟悼可普告內外所在言列若無親近聽故友陳之尚書檢實隨狀科贈庶麤慰冤魂少申惻隱魏書出帝紀又敕高歡王若厭伏人情杜絕物議雖有歸河東之兵罷建興之戍送相州之粟追齊州之軍令蔡儁受代使邸珍出徐止戈散馬各事家業脫須糧廩別遣轉輸則讒人結舌疑悔不生王高枕太原朕垂拱京洛終不舉足渡河以干戈相指王若馬首南向問鼎輕重朕雖無武欲止不能必為社稷宗廟出萬死之策決在于王非朕能定為山止簣相為惜之北齊書神武紀下進封寇洛詔往者侯莫陳悅遠同逆賊潛害故清水公岳志在兼并當時造次物情驚駭使持節驃騎大將軍儀同三司前涇州刺史大都督臨邑懸開國公寇洛忠款自心勳誠早立遂能糾合義軍以待大丞相見危授命推賢而奉此而不賞何以勸勵將來可加開府進爵京兆郡公封洛母宋氐為襄城郡君周書寇洛傳獨孤信歸國下詔如願荊襄之役實展功效既屬強寇力屈道窮歸賊不可還朝路絕適事求宜未足稱過違難句吳誠貫夷險義全終始良可嘉歎復情存謙退款心謝責寍容議及恩降止云免咎斯則事失權宜理乖通變可轉驃騎大將軍加侍中開府其使持節儀同三司浮陽郡公悉如故周書獨孤信傳信本名如願荅周惠達手詔西顧無憂唯公是屬蕭寇之重深所寄懷周書周惠達傳詔廬恭祖經師易求人師難得朕諸兒稍長欲令卿為師周書盧誕傳報宇文泰公膺期作宰義高匡合仗鉞專征舉無遺算朕所以垂拱九載實資元輔之力俾九服寍謐詐賴翊贊之功今大寇未殄而以諸將失律便欲自貶深虧體國之誠宜抑此謙光恤予一人周書文帝紀下太祖以邙山之戰諸將失律上表請自貶魏帝報下拓跋儉詔吳人未獲須助謀謨今使梁王兵馬受公節度廋信拓跋儉碑制六樂歌舞詔六樂尚矣其聲歌之節舞蹈之容寂寥已絕不可得而詳也但方行古人之事可不本干茲乎自宜依準制其歌舞祀五帝日月星辰隋書音樂志中恭帝元年平荊州大獲欒氏樂器以屬有司及建六官乃詔禪位詔予聞皇天之命不于常惟歸于德故堯授舜舜授禹時其宜也天厭我魏邦垂變以告惟爾罔弗知予雖不明敢弗龔天命格有德哉今踵唐虞舊典禪位于周庸布告遐邇焉周書孝閔帝紀禪位冊書咨爾周公帝王之位弗有常有德者受命時乃天道予式時庸荒求于唐虞之彝踵曰我魏德之終舊矣我邦小大罔弗知今其可久怫于天道而不歸有德歟時用詢謀僉曰公昭考文公格勳德于天地丕濟生民洎公躬又宣重光故玄象徵見于上謳訟奔走于下天之厤數用實在焉予安敢弗若是以欽祗聖典遜位于公公其享茲大命保有萬國可不慎歟周書孝閔帝紀遷鄴詔安安能遷自古之明典所居摩定往昔之成規是以殷遷八城周十三地吉凶有數隆替無恆事由于變通理出于不得已故也高祖孝文皇帝式觀乾象俯協人謀發自武州來幸嵩縣魏雖舊國其命維新及正光之季國步孔棘喪亂不已寇賊交侵俾我生民無所措手今遠遵古式深驗時事攷龜襲吉遷宅漳滏庶克隆洪基再昌寶厤主者明為條格及時發邁魏書孝靜紀追旌羊敦蘇淑詔昔五絝興謠兩岐致詠皆由仁覃千里化洽一邦故廣平太守羊敦故中出太守蘇淑竝器業和隱幹用貞濟善政聞國清譽在民方藉良才遂登高秩先後凋亡朝野傷悼追旌清德蓋惟舊章可各賞帛百匹穀五百斛班下郡國咸使聞知魏書良史羊敦傳贈高湛詔故持節都督南荊州諸軍事假鎮軍將軍揚烈將軍員外羽林監行南荊州諸軍事南荊州刺史當州大都督高子澄識用開敏氣幹英發擁攝蕃翰誠效剋宣臨難殉軀奄從非命言命遺績有悼于懷宜申追寵式光往烈可贈假節督齊州諸軍事輔國將軍齊州刺史高湛墓誌拓本禁斷城中新立寺詔梵境幽玄義歸清曠伽藍淨土理絕囂塵前朝城內先有禁斷自聿來遷鄴率由舊章而百辟士民屆郊之始城外新城竝皆給宅舊城中暫時普借更擬後須非為永久如聞諸人多以二處得地或捨舊城所借之宅擅立為寺知非已有假此一名終恐因習滋甚有虧恆式宜付有司精加隱括且城中舊寺及宅竝有定帳其新立之徒悉從毀廢魏書釋老志普禁天下造寺詔天下牧守令長悉不聽迼寺若有違者不問財之所出并計所營功庸以枉法論魏書釋老志詔高澄既朝野攸憑安危所繫不得令遂本懷須有權奪可復前大將軍餘如故北齊書文襄紀常景去官詔几杖為禮安車致養敬齒尊賢其來尚矣景蓺業該通文史淵洽歷事三京年彌五紀朝章言歸祿俸無餘家徒壁立宜從哀恤以旌元老可特給右光祿事力終其身魏書常景傳景以老疾去官詔詔荅杜弼李君遊神冥窅獨觀恍惚玄同造化宗極群有從中彼外周應可以裁成自已及物運行可以資用隆家寍國義屬斯文卿才思優洽業尚通遠息棲儒門馳騁玄肆既啟專家之學且畼釋老之言戶列門張途通經達理事兼申能用俱表彼賢所未悟遺老所未聞旨極精微言窮深妙朕有味二經倦于舊說歷覽新注所得已多嘉尚之來良非一緒已敕殺青編藏之延閣北齊書杜弼傳弼注老子道德經二卷表上之詔荅
