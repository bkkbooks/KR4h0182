body:
  text: 李瑒上言宜禁絕戶為沙門禮以教世法導將來跡用既殊區流亦別故三千里之罪莫大于不孝不孝之大無過于絕祀然則絕祀之罪重莫甚焉安得輕縱背禮之情而肆其向法之意也正使佛道亦不應然假令聽然猶須裁之以禮一身親老棄家絕養既非人理尤乖禮情堙滅大倫且闕王貫交缺當世之禮而求將來之益孔子云未知生焉知死斯言之至亦為備矣安有棄堂堂之政而從鬼教乎又今南服未靜眾役仍煩百姓之情方多避役若復聽之恐捐棄孝慈比屋而是魏書李孝伯附傳于時民多絕戶而為沙門瑒上言又略見北史三十三廣弘明集六自理竊欲清明佛法使道俗兼通非敢排棄真學妄為訾毀且鬼神之名皆通靈達稱自百代正典敘三皇五帝皆號為鬼天地曰神祇人死曰鬼易曰知鬼神之情狀周公自美亦云能事鬼神禮曰明則有禮樂幽則有鬼神是以明者為堂堂幽者為鬼教佛非天非地本出于人應世導俗其道幽隱名之為鬼愚謂非謗且心無不善以佛道為教者正可未達眾妙之門耳魏書李孝伯附傳瑒上言絕戶不聽為沙門沙門都統僧暹等忿瑒鬼教之言以瑒為謗毀佛法泣訢靈太后太后責之瑒自理云云罰瑒金一兩駮司州斷李憐生事案法例律諸犯死罪若祖父母父母年七十以上無成人子孫旁無朞親者具狀上請流者鞭笞留養其親終則從流不在原赦之例檢上請之言非應府州所決毒殺人者斬妻子流計其所犯實重餘憲準之情律所虧不淺且憐既懷酖毒之心謂不可參鄰人任計其母在猶宜闔門投畀況今死也引以三年之禮乎且給假殯葬足示仁寬今已卒哭不合更延可依法處斬流其妻子實足誡彼氓庶肅是刑章魏書刑罰志河東郡民李憐生行毒藥案以死坐母喪州斷三年服終後乃行決司徒參軍許琰謂州判為允主簿李瑒駮又見通典一百六十七神士賦歌曰周孔重儒教老莊貴無為二途雖如異一是買聲兒生乎意不愜死名用何施可心聊自樂終不為人移脫尋余志者陶然正若斯魏書逸士李謐傳明堂制度論余謂論事辨物當取正于經典之真文援證定疑必有驗于周孔之遺訓然後可以稱準的矣今禮文殘缺聖言靡存明堂之制誰使正之是以後人紛糾競興異論五九之說各信其習是非無準得失相半故歷代紛紜靡所取正乃使裴頠云今群儒紛糾互相掎摭就令其象可得而圖其所以居用之禮莫能通也為設虛器耳況漢氏所作四維之个復不能令各處其辰愚以為尊祖配天其義明著廟宇之制理據未分直可為殿屋以崇嚴父之祀其餘雜碎一皆除之斯豈不以群儒舛互竝乖其實據義求衷莫適可從哉但恨典文殘滅求之靡據而已矣乃復遂去室牖諸制施之于教未知其所隆政求之于情未可喻其所以必須惜哉言乎仲尼有言曰賜也爾愛其羊我愛其禮余以為隆政必須其禮豈彼一羊哉推此而論則聖人之于禮殷勤而重之裴頠之于禮任意而忽之是則頠賢于仲尼矣以斯觀之裴氏之子以不達而失禮之旨也余竊不自量頗有鄙意據理尋義以求其真貴合雅衷不苟偏信乃藉之以禮傳攷之以訓注博采先賢之言廣搜通儒之說量其當否參其同異棄其所短收其所長推義察圖以折厥衷豈敢必善聊亦合其言志矣凡論明堂之制者雖眾然校其大略則二途而已言五室者則據周禮考工之記以為本是康成之徒所執言九室者則案大戴盛德之篇以為源是伯喈之論所持此之二書雖非聖言然是先賢之中博見洽通者也但各記所聞未能全正可謂既盡美矣未盡善也而先儒不能攷其當否便各是所習卒相非毀豈達士之確論哉小戴氏傳禮事四十九篇號曰禮記雖未能全當然多得其衷方之前賢亦無愧矣而月令玉藻明堂三篇頗有明堂之義余故采掇二家參之月令以為明堂五室古今通則其室居中者謂之太廟太室之東者謂之青陽當太室之南者謂之明堂當太室之西者謂之總章當太室之北者謂之玄堂四面之室各有夾房謂之左右个三十六戶七十二牖矣室个之形今之殿前是其遺像耳个者即寢之房也但明堂與寢施用既殊故房个之名亦隨事而遷耳今粗書其像以見鄙意案圖察義略可驗矣故檢之五室則義明于考工校之戶牖則數協于盛德攷之施用則事著于月令求之閏也合周禮與玉藻既同夏殷又符周秦雖乖眾儒儻或在斯矣考工記曰周人明堂度以九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵室中度以凡堂上度以筵余謂記得之于五室而謬于堂之修廣何者當以理推之令愜古今之情也夫明堂者蓋所以告月朔布時令宗文王祀五帝者也然營構之範自當因宜創制耳故五室者合于五帝各居一室之義且四時之祀皆據其方之正又聽朔布令咸得其月之辰可請施政及記二三俱允求之古義竊為當矣鄭康成漢末之通儒後學所宗正釋五室之位謂土居中木火金水各居四維然四維之室既乖其正施令聽朔各失厥衷左右之个棄而不顧乃反文之以美說飾之以巧辭言水木用事交于東北木火用事交于東南火土用事交于西南金水用事交于西北既依五行當從其用事之交出何經典可謂攻于異端言非而博疑誤後學非所望于先儒也禮記玉藻曰天子聽朔于南門之外閏月則闔門左扉立于其中鄭玄注曰天子之廟及路寢皆如明堂制明堂在國之陽每月就其時之堂而聽朔焉卒事反宿路寢亦如之閏月非常月聽其朔于明堂門下還處路寢門終月也而考工記周人明堂玄注曰或舉王寢或舉明堂互言之以明其制同也其同制之言皆出鄭注然則明堂與寢下得異矣而尚書顧命篇曰迎子釗南門之外延入翼室此之翼室即路寢矣其下曰大貝賁鼓在西房垂之竹矢在東房此則路寢有左右房見于經史者也禮記喪大記曰君夫人卒于路寢小斂婦人髽帶麻于房中鄭玄注曰此蓋諸侯禮帶麻于房中則西南天子諸侯左右房見于注者也論路寢則明其左右言明堂則闕其左右个同制之說還相矛楯通儒之注何其然乎使九室之徒奮筆而爭鋒者豈不由處室之不當哉記云東西九筵南北七筵五室凡室二筵置五室于斯堂雖使班倕搆思王爾營度則不能令三室不居其南北也然則三室之閒便居六筵之地而室壁之外裁有四尺五寸之堂焉豈有天子布政施令之所宗祀文王以配上帝之堂周公負扆以朝諸侯之處而室戶之外僅餘四尺而已哉假在儉約為陋過矣論其堂宇則偏而非制求之道理則未愜人情其不然一也余恐為鄭學者苟求必勝競生異端以目訾抑云二筵者乃室之東西耳南北則狹焉余故備論之曰若東西二筵則室戶之外為丈三尺五寸矣南北戶外復如此則三室之中南北裁各丈二尺耳記云四房兩夾窗若為三尺之戶二尺之窗窗戶之閒裁盈一尺繩樞甕牖之室蓽門圭竇之堂尚不然矣假令復欲小廣之則四面之外闊狹不齊東西既深南北更淺屋宇之制不為通矣驗之眾塗略無算焉且凡室二筵丈八地耳然則戶牖之閒不踰二尺也禮記明堂天子負斧扆南向而立鄭玄注曰設斧于戶牖之閒而鄭氏禮圖說扆制曰縱廣八尺畫斧文于其上今之屏風也以八尺扆置二尺之閒此之叵通不待智者較然可見矣且若二筵之室為四尺之戶則戶之兩頰裁各七尺耳全以置之猶自不容矧復戶牖之閒哉其不然二也又復以世代驗之即虞夏尚樸殷周稍文制造之差每加崇飾而夏后世室堂脩二七周人之制反更促狹豈是夏禹卑宮之意周監郁郁之美哉以斯察之其不然三也又云堂崇一筵便基高九尺而壁戶之外裁四尺五寸于營制之法自不相稱其不然四也又云室中度以几堂上度以筵而復云凡室二筵而不以几還自相違其不然五也以此驗之記者之謬抑可見矣盛德篇云明堂凡九室三十六戶七十二牖上圓下方東西九仞南北七筵堂高三尺也余謂盛德篇得之于戶牖失之于九室何者五室之制傍有夾房面各有戶戶有兩牖此乃因事立則非拘異術戶牖之數固自然矣九室者論之五帝事既不合施之時令又失其辰左右之个重置一隅兩辰同處參差出入斯乃義無所據未足稱也且又堂之脩廣裁六十三尺耳假使四尺五寸為外之基其中五十四尺便是五室之地計其一室之中僅可一丈置其戶牖則于何容之哉若必小而為之以容其數則令帝王側身出入斯為怪矣此匪直不合典制抑亦可哂之甚也余謂其九室之言誠亦有由然竊以為戴氏聞三十六戶七十二牖弗見其制靡知所置便謂一室有四戶之窗計其戶牖之數即以為九室耳或未之思也蔡伯喈漢末之時學士而見重于當時即識其脩廣之不當而必未思其九室之為謬更脩而廣之假其法象可謂因偽飾辭順非而澤諒可歎矣余今省彼眾家委心從善庶探其衷不為苟異但是古非今俗閒之常情愛遠惡近世中之恆事而千載之下獨論古制驚俗之談固延多誚脫有深賞君子者覽而揣之儻或存焉魏書逸士李謐傳表言周伏興夢狀門下督周伏興以去七月患假還家至十一日夜夢渡淝水行至草堂寺南遙見七人一人乘馬著朱衣籠冠六人從後興路左而立至便再拜問興何人興對曰李公門下督暫使硤石其人語興君可回我是孝文皇帝中書舍人遣語李憲勿憂賊堰此月破矣興行兩步錄姓字令興速白興寤曉遂還城具言夢狀魏書靈徵志下孝昌二年十月揚州刺史李憲表釋情賦并序釋情賦并序單閼之年無射之月余承乏攝官直于本省對九重之清切望八襲之崢嶸感代序以長懷觀爽氣而軫慮籠樊之念既多寥廓之想彌切含毫有思悲然成賦猶潘生之秋興王子之登閣也廁鄭璞于周寶編魚目于隋珠未敢自同作者蓋亦各言爾志云荷峻極之層構導積石之洪流有馬形而謨舜亦龍德而史周爰相趙之鴻烈逮藩魏之優遊為衢樽于上葉號木鐸于前修若豢龍之不隕似窮桑之世濟故抱玉而懷珠且滋蘭而樹蕙或舟楫以匡時或棲遲以卒歲尚無忝于先人諒貽厥于來裔書金冊以葳蕤布銀繩而昭晰清風忽其緬邈啟皇祖于庚寅逢軒教之方洽遇周命之維新譬龍虎其有合信山川而降神若勝庭之五傑似不速之三人協嗜欲于將至豈物色而方臻荷天寵以來儀步康衢而騁力如乾元之利貞若坤四之方直內弼諧于本朝外闢土于殊域乘紫氛以厲羽負青天而鼓翼既公侯之必復亦慶緒之所融績並樹于八凱道俱升于二宮遂遵流以至海且因岳而為嵩同羽儀于班氏均載德于楊公何日月之逾邁引寒暑而相終委晉會于弱齒遺堂構于微躬嗟蒙昧之無取故告舍而不及已濩落而少成又擁腫而無立愧精堅于百鍊慚忠信于十邑非珪璋之特達詎芳菲之易襲未砥礪以自進寍琢磨而成章乖宋子之萬字異應生之五行不請觀于石室豈借書于晉皇求班莊而不遂況蔡文之可望參四科其未獲入三選而誰許本無聲于梁魏故未聞于陳汝居玉石以多迷宅顯晦而乖所既無懷于四至安有情于再舉雖衣冠之末冑而世祿之緒餘等渤澥之乘雁類九罭之逃魚處江淮而不變對朝市而閒居空闔門以靖軌非論道而脩書少賓客于季彥謝朋交于太初在正光之御厤實明皇之拱已曾問政于上學著為君而我齒叫閽人以望予遂陟降于庭止同崔駰之謁帝若謝兼之來仕逮孝莊之入統乃道喪而時昏水群飛于溟海火載燎于中原延膠船而越水若朽索而乘奔玉羊失而無御金雞亡而不存天步忽其多難橫流且其云始既雲擾而海沸亦岳立而棊峙睇三剛之日紊見四維之不理顧茂草以傷懷視匪車而思起雖風雨之如晦亮膠喈而不已自牽役于宰朝實有懷于胥恥在下僚而栖屑願奮迅于泥滓睠故鄉以臨睨悵有動于思歸越來流以鼓枻溯北風而結騑入成都之舊宅反觀津之故扉乃曲肱而不悶信抱甕而無機且耕而食且蠶而衣恆一日以自省亦三月而無違遊仁義之肴覈采墳素之精微誠因閑而養拙亦有樂于嘉肥及句芒御節姑洗之首散遲遲于麗日發依依于弱柳鳥閒關以呼庭花芬披而落牖聽乃越于笙簧望有踰于新婦襲成服以逍遙願良辰而聊厚乃席壟而踞石遂嘯儔而命偶同浴沂之五六似禊洛之八九或促膝以持肩或援笙而鼓缶賓奉萬年之觴主報千金之壽各笑語而卒獲傳禮儀于不朽斯蓋先民之所樂而余心之所守也至于少昊為帝庚辛處躔視墟里之蕭蕭過寒夜之綿綿積霜靄于近援起沈寥于遠天思多端以類長若臨水而登山幸出遊之或寫冀觀濤之可蠲遂杖策緩步或漁或田弋鳧鴈于清溪釣魴鯉于深泉張廣幕布長筵酌濁酒割芳鮮起白雪于促柱奉綠水于危絃賦湛露而不已歌驪駒而未旋跌蕩世俗之外疏散造化之閒人生行樂聊用永年悟柱下之稱工聞首陽之為拙既有惜于苽懸且自悲于井渫訪鄭詹之格言求季主之高說去衡門以策駟望象魏而投轍服毳衣以從務乘大車而就列比汗海而無紀喻江河而有缺睠重地而懼深念索米而慚結運有折于玉斗時忽亡于金鏡始蒙塵以播蕩卒流彘而居鄭彼上天之降鑒實下民之請命因艱難以隆基據殷憂而啟聖調南風以負扆居北辰而為政創彝倫于九疇班平章于百姓喻繩契以喻蹤援成昭而比盛酌徙鎬之故典究遷亳之遺令奄四海以為家開七百而增慶覩禮樂之方隆信光華之始映百揆鬱以時序四門穆其惟清如得人于漢世比多士于周庭有一匡以作相或十亂而為楨各秉文而經武故天平而地成伊余身之忝穢得再入于承明執綸言之猶紼戴會弁之如星非巡潰以觀井信夕愓而懷驚承周任之有言攬老子之知足奉炯誡以周旋抱徽猷而與屬每有偃于唯塵恆興言于寵辱思散髮以抽簪願全貞而守樸睠疏傅以徘徊望申公而躑躅冀鄙志之獲展庶微願之逢時歌致命而可卜詠歸田而有期揖帝城以高逝與人事而長辭擊壤而頌結草而嬉援巢父以戲穎追許子而升箕供暮餐于沆瀣給朝餌于瓊芝同糟醨而無別混名實而不治放言肆慾無慮無思何鷦鷯之可賦鴻鵠之為詩哉魏書李順附傳
