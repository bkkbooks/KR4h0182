body:
  text: 慕容紹宗檄梁文夫乾坤交泰明聖興作有冥運行之力俱盡變化之途抱識含靈融然竝至呈形賦命混而同往所以玄功潛運至德旁通百姓日用而不知萬國受賜而無迹豈徒鑿其耳目易其心慮悟以風雲一其文軌使夫日月之照不私雨露之施均洽運諸仁壽之域納于福祿之林自晉政多僻金行淪蕩中原作戰鬭之場生民為鳥戰之餌則我皇魏握玄帝之圖納水靈之社駕雲車而自北策龍御以圖南致符上帝援溺下土怪物殛死淫水不作運神器于顧眄定寶命于踟躕恢之以武功振之以文德宇內反可封之俗員首識堯舜之心沙海荒忽之外瀚漠羈縻之表方志所不傳荒經所不綴莫不繩谷釣山依風託水共仰中國之聖同欣大道之行唯夫三吳百越獨阻聲教匪民之咎責有由焉自偽晉之後劉蕭作慝擅僭一隅號令自已惟我祖宗馭宇愛民重戰未極謀臣之畫不窮節將之兵聊遣行人降以尺一圓臺已築黃屋輒去賜其几杖置之度外蕭衍輕險有素士操蔑聞睥睨君親自少而長好亂樂禍惡直醜正巧用其短以少為多詃惑愚賤大言以驚俗驅扇邪僻口兵以作威曲體脅肩搖脣鼓舌候當朝之顧指邀在位之餘論遂汙辱冠帶偷竊藩維及寶卷昏狂下不堪命曾無北面有犯之節遽滅人倫在三之禮憑妖假怪鬼語神言稱兵指闕傾朝鴆主陵虐孤寡聾愚士民天不悔禍姦醜得志內恣彫靡外逞殘賊驅羸國之兵迫糊口之眾南出五嶺北防九江屯戍不解役無寍歲死亡矢刃之下夭折霧露之中哭泣者無已傷痍者不絕託身人上忽下如草遂使頑嚚子弟肆行婬虐狡猾群小縱極貪惏剝創蒼生肌肉略盡刳剔黔首骨髓俱罄猛虎未方其害餓狼詎侔其禍惵惵周餘救死無地至于矯情飾詐事非一緒毒螫滿懷妄敦戒業躁兢盈胸謬治清靜至乃大興寺塔廣繕臺堂昭陽到景垂珠銜璧崢嶸刻削千門萬戶鞭撻疲民盡其筋骨延壤運石悲歌掩途死而可祈甘同仙化智淺謀疏曾不自揆遏桐柏之流翻為已害子亡齊之胤忽為戎首書契迄茲罕聞其事至于廢捐冢嫡崇樹愚子朋黨路開彼我側目疾視扼腕十室而九翹足有待良亦多人二紀于茲王家多故始則車馳之警終有驚墜之哀神祇痛憤寓縣崩震于是故相國齊獻武高王感天壤之慘黷激雲雷以慨然仗高義而率民奮大節以成務爰有匡國定霸之圖非直討賊雪恥之舉于是叡略紛紜靈武冠世盪滌逋孼尊主康邦皇上厤受圖天臨日鏡道隨玄運德與神行既而元首懷舞戚之風上宰薄兵車之會遂解縶南冠喻以好睦舟車遵溯川陸光華亭徼相望欣然自泰反肉還童不待羊陸雖嘉謀長算爰自我始罷戰息民兩獲其泰王者之信明如四時豈或為人君父二三其德書而不法可不惜哉侯景一介役夫出自凡賤聲名淪敝無或可紀直以趨馳便習見愛尒朱小人叨竊遂忝名位及中興之際義旗四指元惡不赦實在群胡景荷人成拔籍其股肱主人有丹頸之期所天蹈族滅之釁雖不能蔽捍左右以命酬恩猶當慘顏後至義形于色而趣利改圖速如覆手投身麾下甘為僕隸獻武王棄其瑕穢錄其小誠得廁五命之末預在一隊之後參迹驅馳庶其來效長鞭利鎩術以制之既關隴逋誅每事經略以河南空虛之地非兵戰之衝薄存掎角聊示旗鼓豈資實效寄以遊聲軍機催勒蓋唯景任總兵統旅別有司存而愚褊有積憍愎遂甚犯違軍紀仍自猜貳禍心潛搆翻為亂階負恩棄德罔恤天討不義不昵厚而必顛委慈母如脫屣棄少弟如遺土群子陸陸妻姪成行慕姜兒之爽言蔑伯春之宛轉咷梁猖蹶夫欲誰欺比之梟獍異類同醜欲擬虵鼠顧匪其倫及遠託關右委命寇逆實炬定君臣之分黑獺結兄弟之親授以名器之尊救其重圍之死憑人繫援假人鼻息俄而忘恩背惠親尋干戈釁暴惡盈側首無託以金陵逋逃之藪江南流禦之地甘辭卑體進熟圖身詭言浮說抑可知矣叛豎救命豈將擇音偽朝大夫幸災忘義主髦千上臣蔽于下逐雀去草曾不是圖竊寶叛邑椒蘭比好人而無禮其能國乎夫安危有大勢成敗有恆兆不假離朱之目不藉子野之聽聊陳刺心之說且吐伐謀之言今帝道休明皇猷允塞四民樂業百靈效祉雖上相云亡而伊陟繼事秉文經武虎視龍驤驅日下之俊雄收一世之英銳擊刺猶雷電合戰如風雨控弦躍馬固敵是求蠕蠕昔遭離亂輻分瓦裂匹馬狐征告困于我國家深敦鄰附愍其入懷盡憂人之禮極繼絕之義保衛出于故地資給唯其多少存其已亡之業成其莫大之基深仁厚德鏤其骨髓引領思報義如手足吐谷渾深執忠孝膠漆不渝萬里仰德奏款屬路竝申以婚好行李如歸蠕蠕境界黃河望通豳夏飛雪千里曾冰洞積北風轉勁實筋角之時沍寒方猛正氈裘之利吐谷渾疾彼凶逆疆兵歲舉傾河及鄯塵通隴峽驅龍池之種藉常勝之氣二方候隙企其移踵加以獨狐如願擁眾秦中治兵劫愶黑獺北備西擬內營腹心救首救尾疲于奔命豈暇稱兵東指出師函谷且秋風揚塵國有恆防關河形勝之際山川襟帶之所猛將精兵基跱岳立又寶炬河陰之北黑獺邙山之走眾無一旅僅以身歸就其不顧根本輕懷進趣斯則一勞永逸天贊我也言之旦旦日月經天舉世所知義非徒語持此量之理有可見則侯景遊辭莫非虛誕夫景繩樞席牖之子阡陌鄙俚之夫遭風塵之會逢馳騖之日遂位在三吏邑啟千社揣身量分久當止足而乃周章去就離跂不己夫豈徒爾事可搉揚度其眾叛親離守死不暇乃聞將棄懸瓠遠赴彭城老賊姦謀復將作矣固揚聲赴助計在圖襲吞淵明之眾招厭虐之民舉長淮以為斷仍鴟張歲月南面假名死而後已此蓋蜯鷸之禍我承其獘且偽主昏悖不惟善鄰賊忍之心老而彌篤納逋叛之詭譎蔑信義以猖狂天喪其神人重其怨將踐瓜圃之蹤且追兒侯之轍今徵發犬羊侵軼徐部築壘擁川覬覦小利此而可忍孰不可懷兵凶戰危出不得已謬奉朝規肅茲九伐扛鼎拔樹之眾超乘投石之旅練甲爭途波聚霧合虎班龍文之逸蘭池蒲梢之駔噓天陸野躡影追風振旅南轅長驅討蹙非直三吳鼠面一麾魚駭乘此而往青蓋將歸且衍虐網蚩蚩兵權在外持險躁之風俗兼輕薄之子孫蕭綸兇狡之魁豈無商臣之佷蕭譽失志之憤當召專諸之客外崩中潰今也其時幕府師行以禮兵動以義弔民伐罪理有存焉其有知機審變翻然鵲起立功立事去危就安賞典未忘事必加等若軍威所至敢有拒違尺兒以上咸從梟戮今三禮四義之將豹虎熊羆之士深銜逋偽信納叛亡違卜愎諫實興伐役莫不含怒作色如赴私讎茹肝涉血義不旋踵攻戰之日事若有神莽積麻亂匪旦伊夕以彼曲師危卒望我軍鋒何異蛣蜣被甲蝍蛆舉尾正恐旗鼓一接芝蓼俱摧先事喻懷備知翰墨王候無種禍福由人斯蓋丈夫內食之秋壯士封侯之會冬冰可折時不再來凡百君子勉求多福檄之所到咸共申省知我國行師之意魏書蕭衍傳武定六年衍寇逼徐州與侯景為聲援仍堰泗水以灌彭城齊文襄遣慕容紹宗高岳潘相樂等率眾討之紹宗檄衍境內云云上言犯盜宜準律令謹詳法若畫一理尚不二不可喜怒由情而致輕重案律公私劫盜罪止流刑而比執事苦違好為穿鑿律令之外更立餘條通相糾之路班捉獲之賞斯乃刑書徒設獄訟更煩法令滋彰盜賊多有非所謂不嚴而治遵守典故者矣臣以為升平之義義在省刑陵遲之獘必由峻法是以漢約三章天下歸德秦酷五刑率土瓦解禮訓君子律禁小人舉罪定名國有常辟至如眚災肆赦怙終賊刑經典垂言國朝成範隨時所用各有司存不宜巨細滋煩令民豫備恐防之彌堅攻之彌甚請諸犯盜之人悉準律令以明恆憲庶使刑殺折衷不得棄本從末魏書刑罰志遷鄴有司奏立嚴制侍中孫騰上言上表乞評議麟趾制母殺父條臣在平州之日蒙班麟趾新制即依朝命宣示所部士庶忻仰有若三章臣聞法象巍巍乃大舜之事政道郁郁亦隆周之軌故元首股肱可否相濟聲教之聞于此為證伏惟陛下應圖臨寓握紀承天克構洪基會昌寶厤式張琴瑟且調官羽去甚刪泰革獘遷澆俾高祖之德不墜于地畫一既歌萬國歡躍臣伏讀至三公曹第六十六條母殺其父子不得告告者死再三返覆之未得其門何者案律子孫告父母祖父母者死又漢宣云子匿父母孫匿大父母皆勿論蓋謂父母祖父母小者攘羊甚者殺害之類恩須相隱律抑不言法理如是足見其道未必指母殺父止子不言也若父殺母乃是夫殺妻母卑于父此子不告是也而母殺父不聽子告臣誠下愚輒以為惑昔楚康王欲殺令尹子南其子棄疾為王御士而上告焉對曰泄命重刑臣不為也王遂殺子南其徒曰行乎曰吾與殺吾父行將焉入曰臣乎曰殺父事讎吾不忍乃縊而死注云棄疾自謂不告父為與殺謂王為讎皆非禮春秋譏焉斯蓋門外之治以義斷恩知君殺父而子不告是也母之于父同在門內恩無可掩義無斷割知母將殺理應告父如其已殺宜聽告官今母殺父而子不告便是知母而不知父識比野人義近禽獸且母之于父作合移天既殺已之天復殺子之天二天頓毀豈容頓默此母之罪義在不赦下手之日母恩即離仍以母道不告鄙臣所以致惑今聖化淳洽穆如韶夏食椹懷音梟獍猶變況承風稟教識善知惡之民哉脫下愚不移事在言外如或有之可臨時識罪何用豫制斯條用為訓誡誠恐千載以下談者諠譁以明明大朝有尊母卑父之論以臣管見實所不取如在淳風厚俗必欲行之且君父一也父者子之天被殺事重宜附父謀反大逆子得告之條父一而已至情可見竊惟聖主有作明賢贊成光國寍民厥用為大非下走頑蔽所能上測但受恩深重輒獻瞽言儻蒙收蔡乞付評議魏書竇瑗傳奏請長廣王禪位天人之望皆在廣陵願行堯舜之事魏書竇蝯傳難封君義判尋局判云子于父母同氣異息終天靡報在情一也今欲論其尊卑辨其優劣推心未忍訪古無據瑗以為易曰天尊地卑乾坤定矣又曰乾天也故稱父坤地也故稱母又曰乾為天為父坤為地為母禮喪服經曰為父斬衰三年為母齊衰朞尊卑優劣顯在典章何言訪古無據局判云母殺其父子復告母母由告死便是子殺天下未有無母之國不知此子將何欲之瑗案典律未聞母殺其父而子有隱母之義既不告母便是與殺父天下豈有無父之國此子獨得有所之乎局判又云案春秋莊公元年不稱即位文姜出故服虔注云文姜通于兄齊襄與殺公而不反父殺母出隱痛深諱朞而中練思慕少殺念至于母故經書三月夫人遜于齊既有念母深諱之文明無讎疾告列之理瑗尋注義隱痛深諱者以父為齊所殺而母與之隱痛父死深諱母出故不稱即位非為諱母與殺也是以下文以義絕其罪不為與殺明矣公羊傳曰君殺子不言即位隱之也朞而中練父憂少衰始念于母略書夫人遜于齊是內諱出奔猶為罪文傳曰不稱姜氏絕不為親禮也注云夫人有與殺桓之罪絕不為親得尊父之義善莊公思大義絕有罪故曰禮也以大義絕有義得禮之衷明有讎疾告列之理但春秋桓莊之際齊為大國通于文姜魯公讁之文姜以告齊襄使公子彭生殺之魯既弱小而懼于齊是時天子衰微又無賢霸故不敢讎之又不敢告列惟得告于齊曰無所歸咎惡于諸侯請以公子彭生除之齊人殺公子彭生案即此斷雖有援引即以情推理尚未遣惑魏書竇瑗傳瑗表乞評議麟趾制母殺父條詔付尚書三公郎中封君義立判瑗復難云云事遂停寢造像記清信士佛弟子馮翊王國典祠令李和之仰為七世父母及自已身敬造像四塸願生生世世恆與善會碑拓本遺敕其子吾本卿葬法必殺犬馬于亡者無益汝宜斷之斂以時服事從儉約北史四十九與彭城王韶啟殿下左右可信任者唯有孟業願專任之餘人不可信也北齊書孟業傳長史劉仁之徵入為中書令臨路啟韶又見北史八十六亭山賦司農張綸造景陽山有若自然天水人姜質遂造亭山賦行傳于世其辭曰夫偏重者愛昔先民之由朴由純然則純朴之體與造化而梁津濠上之客柱下之史悟無為以明心託自然以圖志輒以山水為富不以章甫為貴任性浮沈若淡兮無味今司農張氏實踵其人巨量煥于物表夭矯洞達其真青松未勝其潔白玉不比其珍心託空而棲有情入古以如新既不專流宕又不偏華尚卜居動靜之閒不以山水為忘庭起半丘半壑聽以目達心想進不入聲榮退不為隱放爾乃決石通泉拔嶺巖前斜與危雲等竝旁與曲棟相連下天津之高霧納滄海之遠煙纖列之狀如一古崩剝之勢似千年若乃絕嶺懸坡蹭蹬蹉跎泉水紆徐如浪峭山石高下復危多五尋百拔十步千過則知巫山弗及未審蓬萊如何其中煙花露草或傾或倒霜幹風枝半聳半垂玉葉金莖散滿階坪然目之綺烈鼻之馨既共陽春等茂復與白雪齊清或言神明之骨陰陽之精天地未覺生此異人焉識其名羽徒分泊色雜蒼黃綠頭紫頰好翠連芳白鶴生于異縣丹足出自他鄉皆遠來以臻此藉水木以翱翔不憶春于沙漠遂忘秋于高陽非斯人之感至何候鳥之迷方豈下俗之所務實神怪之異趣能造者其必詩敢往者無不賦或就饒風之地或入多雲之處菊嶺與梅岑隨春之所悟遠為神仙所賞近為朝士所知求解脫于服佩須參次于山陲子英游魚于玉質王喬繫鵠于松枝方丈不足以妙詠歌此處態多奇嗣宗聞之動魄叔夜聽此驚魂恨不能鑽地一出醉此山門別有王孫公子遜遁容儀思山念水命駕相隨逢岑愛曲值石陵欹迺為仁智之田故能種此石山森羅兮草木長育兮風煙孤松既能卻老半石亦可留年若不坐臥兮于其側春夏兮共遊陟白骨兮徒自朽方寸兮何所憶舊寫本洛陽伽藍記造釋迦石像記夫靈跡誕遘必表光大之迹玄功既敷亦標希世之作自雙林改照大千懷綴暵之悲慧日潛暉唅生銜道慕之是以應真悼三乘之靡憑遂騰空以刊像爰暨下代茲容厥作鉅鹿魏靈藏河東辥法紹二人等汞豪光東照之資闕兜率翅頭之益敢輒磬家財造石象一區凡及眾形冈不備列願乾祚興遐万方朝貫願藏等挺三槐于孤峰秀九棘于華菀芳實再繁荊條獨茂合門榮華福流奕葉命終之後飛逢千聖神颺六通智周三達曠世所生元身眷屬捨百鄣則鵬擊龍花悟無生則鳳昇道樹五道群生咸同斯慶碑拓本
