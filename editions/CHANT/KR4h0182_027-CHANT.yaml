body:
  text: 尉元求運粟濟彭城表彭城倉廩虛罄人有飢色求運冀相濟兗四州粟取張永所棄船九百艘沿清運致可以濟救新民魏書尉元傳復表彭城賊之要蕃不有積粟彊守不可以固若儲糧廣戍雖劉彧師徒悉動不敢窺𨵦淮北之地此自然之勢也魏書尉元傳宜釋青冀先定東南表臣受命出疆再罹寒暑進無鄧艾一舉之功退無羊祜保境之略雖淮岱獲振而民情未安臣以愚智屬當偏任苟事宜宣徹敢不以聞臣前表以下邳水陸所湊先規殄滅遣兵屢討猶未擒定然彭城下邳信命未斷而此城之人元居賊界心尚戀土輒相誑惑希幸非望南來息耗壅塞不達雖至窮迫仍不肯降彭城民任玄朗從淮南到鎮稱劉彧將任農夫陳顯達領兵三千來循宿豫臣即以其日密遣覘使驗其虛實如朗所言臣欲自出擊之以運糧未接又恐新民生變遣子都將于沓干劉龍駒等步騎五干將往赴擊但征人淹久逃亡者多迭相扇動莫有固志器仗敗毀無一可用臣聞伐國事重古人所難功雖可立必須經略而舉若賊向彭城必由清泗過宿豫歷下邳趨青州路亦由下邳入沂水經東安即為賊用師之要今若先定下邳平宿豫鎮淮陽戍東安則青冀諸鎮可不攻而剋若四處不服青冀雖拔百姓狼顧猶懷僥倖之心臣愚以為宜釋青冀之師先定東南之地斷劉彧北顧之意絕愚民南望之心夏水雖盛無津途可因冬路雖通無高城可固如此則淮北自舉暫勞永逸今雖向熱猶可行師兵尚神速久則生變若天雨既降或因水通運糧益眾規為進取恐近淮民庶翻然改圖青冀二州卒未可拔臣輒與寮佐共議咸謂可然若隱而不陳懼有損敗之責陳而無驗恐成誣罔之罪惟天鑒懸量照臣愚款魏書尉元傳換兵戍彭城表臣以天安之初奉律總戎廓寍淮右海內既平仍忝徐岳素餐尸祿積有年餘彼土安危竊所具悉每惟彭城水陸之要江南用兵莫不因之威陵諸夏夫國之大計豫備為先且臣初剋徐方青齊未定從河以南猶懷彼此時劉彧遣張永沈攸之陳顯達蕭順之等前後數度規取彭城勢連青兗唯以彭城既固而永等摧屈今計彼戎兵多是胡人臣前鎮徐州之日胡人子都將呼延籠達因于負罪便尒叛亂鳩引胡類一時扇動賴威靈遐被罪人斯戮又團成子都將胡人王敕懃嶞釁南叛每懼姦圖狡誘同黨闕誠所見宜以彭城胡軍換取南豫州徙民之兵轉戍彭城又以中州鮮卑增實兵數于事為宜魏書尉元傳表言戰士見白頭翁臣于彭城遣別將以八月至睢口邀賊將陳顯達有戰士于營外五里芻牧見一白頭翁乘白馬將軍呼之語稱至十八日辰必來到此語汝將軍領眾從東北臨入我當驅賊令走申時賊必大破宿豫淮陽皆剋無疑我當與汝國家淮畔為斷下邳城我當驅出不勞兵力後十日此人復于彭城南戲馬臺東二里見白頭翁亦乘白馬從東北來呼此人謂曰我與東海四瀆太山北嶽神共行淮北助汝二將蕩除己定汝上下喜不因忽然不見魏書靈徵志下皇興三年六月尉元表詔元于老人前後見所為壇表記之對詔問攻戰之計姑臧城外有四部鮮卑各為之援然皆是臣祖父舊民臣願軍前宣國威信示其禍福必相率歸降外援既服然後攻其孤城拔之如反掌耳魏書源賀傳世祖征涼州以賀為鄉導詔問攻戰之計賀對上書請案律斷獄案律謀反之家其子孫雖養他族追還就戮所以絕罪人之類彰大逆之辜其為劫賊應誅者兄弟子姪在遠道隔關津皆不坐竊惟先朝制律之意以不同謀非絕類之罪故特垂不死之詔若年十三已下家人首惡計謀所不及臣愚以為可原其命沒入縣官魏書源賀傳是時斷獄多濫賀上書又北史二十八上書請入死者恕死徙邊臣聞人之所寶莫寶于生全德之厚者莫厚于宥死然犯死之罪難以盡恕權其輕重有可矜恤今勍寇遊魂于北狡賊負險于南其在疆場猶須防戍臣愚以為自非大逆赤手殺人之罪其坐贓及盜與過誤之愆應入死者皆可原命謫守邊境是則己斷之體更受全生之恩徭役之家漸蒙休息之惠刑措之化庶幾在茲虞書曰流宥五刑此其義也臣受恩深重無以仰荅將違闕廷豫增係戀敢上瞽言唯加裁察魏書源賀傳又略見刑罰志上言禦邊長計請募諸州鎮有武健者三萬人復其徭賦厚加賑恤分為三部二鎮之閒築城城置萬人給彊弩十二床武衛三百乘弩一床給牛六頭武衛一乘給牛二頭多造馬槍及諸器械使武略大將二人以鎮撫之冬則講武春則種殖竝戍竝耕則兵未勞而有盈蓄矣又于白道南三處立倉運近州鎮租粟以充之足食足兵以備不虞于宜為便不可歲常舉眾運動京師令朝廷恆有北顧之憂也魏書源賀傳獻文時每歲秋冬遣軍三道竝出以備北寇至春中乃班師賀以勞役京師又非禦邊長計乃上言事寢不報遺令敕諸子吾頃以老患辭事不悟天慈降恩爵逮于汝汝其毋傲吝毋荒怠毋奢越毋嫉妒疑思問言思審行思恭服思度遏惡揚善親賢遠佞目觀必真耳屬必正誠勤以事君清約以行己吾終之後所葬時服單櫝足申孝心芻靈明器一無用也魏書源賀傳求追論勳封表昔世祖昇遐南安在位出拜東廟為賊臣宗愛所弒時高宗避難龍潛苑中宗愛異圖神位未定臣亡父先臣賀與長孫渴侯陸麗等表迎高宗纂徽寶命麗以扶負聖躬親所見識蒙授撫軍大將軍司徒公平原王興安二年追論定策之勳進先臣爵西平王皇興季年顯祖將傳大位于京兆王先臣時都督諸將屯于武川被徵詣京特見顧問先臣固執不可顯祖久乃許之遂命先臣持節授皇帝璽綬于高祖至太和十六年麗息叡狀私書稱其亡父與先臣援立高宗朝廷追錄封叡鉅鹿郡開國公臣時丁艱草土不容及例至二十年除臣雍州刺史臨發奉辭面奏先帝申先臣舊勳時敕旨但赴所臨尋當別判至二十一年車駕幸雍臣復陳聞時蒙敕旨征還當授自宮車晏駕遂爾不白竊惟先臣遠則援立高宗寶厤不墜近則陳力顯祖神器有歸如斯之勳超世之事麗以父功而獲河山之賞臣有家勳不霑茅社之賜得否相懸請垂裁處魏書源賀附傳請以諸鎮水田給民并減吏佐表景明以來北蕃連年災旱高原陸野不任營殖唯有水田少可菑畝然主將參僚專擅腴美瘠土荒疇給百姓因此困敝日月滋甚諸鎮水田請依地令分給細民先貧後富若分付不平令一人怨訟者鎮將已下連署之官各奪一時之祿四人以上奪祿一周北鎮邊蕃事異諸夏住日置官全不差別沃野一鎮自將已下八百餘人黎庶怨嗟僉曰煩猥邊隅事鮮實少畿服請主帥吏佐五分減二魏書源賀附傳增置恆代城戍表蠕蠕不羈自古而爾遊魂鳥集水草為家中國患者皆斯類耳歷代驅逐莫之能制雖北拓榆中遠臨瀚海而智臣勇將力算俱竭胡人頗遁中國以疲于時賢哲思造化之至理推生民之習業量夫中夏粒食邑居之民蠶衣儒步之士荒表茹毛飲血之類鳥宿禽居之徒親校短長因宜防制知城郭之固暫勞永逸自皇魏統極都于平城威震天下德籠宇宙今定鼎成周去北遙遠代表諸蕃北固高車外叛尋遭旱儉戎馬甲兵十分闕八去歲復鎮陰山庶事蕩盡遣尚書郎中韓貞宋世量等檢行要險防遏形便謂準舊鎮東西相望令形勢相接築城置戍分兵要害勸農積粟警急之日隨便翦討如此則威形增廣兵勢亦盛且北方沙漠夏乏水草時有水泉不濟大眾脫有非意要待秋冬因雲而動若至冬日冰沙凝厲游騎之寇終不敢攻城亦不敢越城南出如此北方無憂矣魏書源賀附傳奏免逃吏謹按條例逃吏不在赦限竊惟聖朝之恩事異前宥諸流徙在路尚蒙旋返況有未發而仍遣邊戍按守宰犯罪逃走者眾祿潤既優尚有茲失及蒙恩宥卒得還今獨苦此等恐非均一之法如臣管執謂宜免之魏書源賀附傳景明二年徵源懷為左僕射時有詔奸吏犯罪逃遁雖肆眚不釋源乃奏重奏臣以法貴經通治尚𥳑要刑憲之設所以網羅罪人苟理之所備不在繁典行之可通豈容峻制此乃古人之達政救世之恆規伏尋條制勳品已下罪發逃亡遇恩不宥仍流妻子雖欲抑絕奸途匪為通式謹案事條侵官欺法專據流外豈九品已上人皆貞白也其諸州守宰職任清流至有貪濁事發逃竄而遇恩免罪勳品已下獨乖斯例如此則寬縱上流法切下吏育物有差惠罰不等又謀逆滔天輕恩尚免吏犯微罪獨不蒙赦使大宥之經不通開生之路致擁進違古典退乖今律輒率愚見以為宜停魏書源賀附傳懷書奏門下以成式既頒駮奏不許源重奏世宗納之奏請乘釁伐齊南賊游魂江揚職為亂逆肆厥淫昏月滋日甚貴臣重將靡有孑遺崇信姦回昵比閹豎內外離心骨肉猜叛蕭寶融僭號于荊郢其雍州刺史蕭衍勒兵而東襲上流之眾已逼其郊廣陵京口各持兵而懷兩望鍾離淮陰竝鼎峙而觀得失秣陵孤危制不出門君子小人竝罹災禍延首北望朝不及夕斯實天啟之期吞并之會乘厥蕭牆之釁藉其分崩之隙東據歷陽兼指瓜步緣江鎮戍達于荊郢然後奮雷霆之威布山河之信則江西之地不刃自來吳會之鄉指期可舉昔士治有言皓若暴死更立賢主文武之官各得其任則勍敵也若蕭衍克就上下同心非直後圖之難實亦揚境危逼何則壽春之去建鄴七百而已山川水陸彼所諳利脫江湘無波君臣效職藉水憑舟倏忽而至壽春容不自保江南將若之何今寶卷邑居有土崩之形邊城無繼援之兆清蕩江區實在今日臣受恩既重不敢不言魏書源賀附傳景明二年源懷除車騎大將軍謹奏密遣人齎書與城中文武大軍在近努力圍守必令諸人福流苗裔魏書源賀附傳子雍為夏州刺史被圍自向東夏運糧為朔方胡帥曹阿各拔所邀見執乃密遣人齎書閒行與城中文武討葛榮上書賊中甚飢專仰野掠今朝廷足食兵卒飽煖高壁深壘勿與爭鋒彼求戰則不得野掠無所獲不盈數旬可坐制凶醜魏書源賀附傳子雍討葛榮以冀州不守上書奏訪梁亡人許周徐州表投化人許團并其弟周等究其牒狀周列云己蕭衍黃門侍郎又稱心存山水不好榮宦屢曾辭讓貽彼赫怒遂被出為齊康郡因爾歸國願畢志嵩嶺比加采訪略無證明尋其表狀又復莫落案牒推理實有所疑何者昔夷齊獨往周王不屈其志伯況辭祿漢帝因成其美斯實古先哲王必有不臣之人者也蕭衍雖復崎嶇江左竊號一隅至于處物未甚悖禮豈有士辭榮祿而苟不聽之哉推察情理此則孟浪假蕭衍皆狂不存雅道逼士出郡未為死急何宜輕去生養之土長辭父母之邦乎若言不好榮宦志願嵩嶺者初屆之日即應杖策尋山負帙沿水而乃廣尋知己徧造執事希榮之心已見逃宦之志安在昔昔梁鴻去鄉終傭吳會逢萌浮海遠客遼東竝全志養性逍遙而已攷之事實何其懸哉又其履歷清華名位高達計其家累應在不輕今者歸化何其孤迴設使當時怱遽不得攜將及其來後家貲產業應見簿斂尊卑口累亦當從法而周兄弟怡然嘗無憂慼若無種族理或可通如有不坐便應是衍故遣非周投化推究二三真偽難辨請下徐揚二州密訪必令獲實不盈數旬玉石可覩魏書源賀附傳蕭衍亡人許周自稱為衍給事黃門侍郎朝士翕然咸共信待子恭奏上書請成辟雍明堂臣聞辟臺望氣軌物之德既高方堂布政範世之道斯遠是以書契之重理冠于造化推尊之美事絕于生民至如郊天饗帝蓋以對越上靈宗祀配天是以酬膺下士大孝莫之能加嚴父以慈為大乃皇王之休業有國之盛典竊惟皇魏居震統極總宙馭宇革制土中垂式無外自北徂南同卜維于洛食定鼎遷民均氣候于寒暑高祖所以始基世宗于是恢構案功成作樂治定制禮乃訪遺文修廢典建明堂立學校興一代之茂矩標千載之英規永平之中始創雉構基趾草昧迄無成功故尚書令任城王臣澄案故司空臣沖所造明堂樣并連表詔荅兩京模式奏求營起緣期發旨即加葺繕侍中領軍臣又物動作官宣贊授令自茲厥後方配兵人或給一千或與數百進退節縮曾無定準欲望速了理在難克若使專役此功長得營造委成責辦容有就期但所給之夫本自寡少諸處競借動即干計雖有繕作之名終無就功之實爽塏荒茫淹積年載結架崇構指就無兆仍令肄冑之禮掩抑而不進養老之儀寂寥而不返構廈止于尺土為山頓于一簣良可惜歟愚謂召民經始必有子來之歌興造勿亟將致不日之美況本兵不多兼之牽役廢此與彼循環無極便是輟創禮之重資不急之費廢經國之功供寺館之役求之遠圖不亦闕矣今諸寺大作稍以稍舉竝可徹減專事經綜嚴勒工匠務令克成使祖宗有薦配之期蒼生覩禮樂之富魏書源賀附傳正光元年子恭轉起部郎明堂辟雍竝未建就子恭上書
