body:
  text: 江陽王繼討高車表高車頑黨不識威憲輕相合集背復逃歸計其兇戾事合窮極若悉追戮恐遂擾亂請遣使鎮別推撿斬諐首一人自餘加以慰諭若悔悟從役者即令赴軍魏書江陽王繼傳高祖時除平北將軍高車酋帥樹者擁部民反叛詔繼都督北討諸軍事自懷朔已東悉稟繼節度繼表請議宗室預祭表臣功緦之內太祖道武皇帝之後于臣始是曾孫然道武皇帝傳業無窮四祖三宗功德最重配天郊祀百世不遷而曾玄之孫烝嘗之薦不預拜于廟庭霜露之感闕陪奠于階席今七廟之後非直隔歸胙之靈五服之孫亦不霑出身之敘校之墳史則不然驗之人情則未允何者禮云祖遷于上宗易于下臣曾祖是帝世數未遷便疏同庶族而孫不預祭斯之為屈今古罕有昔堯敦九族周隆本枝故能磐石維城禦侮于外今臣之所親生見隔棄豈所以楨榦根本隆建公族者也伏見高祖孝文皇帝著令銓衡取曾祖之服以為資蔭至今行之相傳不絕而況曾祖為帝而不見錄伏願天鑒有以照臨令皇恩洽穆宗人咸敘請付外博議永為定準魏書禮志二熙平二年十月侍中領軍將軍江陽王繼表言又見通典五十一矯皇太后歸政詔魏有天下奕葉重光高祖孝文皇帝以英聖馭天徙京定鼎世宗宣武皇帝以睿明承業廓寍區夏而鴻勳未半早已登遐乃令車書弗同鯨寇尚熾幼主稚弱夙纂寶厤曾是宗祏莫克祗奉朕所以敬順群請臨朝總政帝年以長久思退身所以往歲殷勤具陳情旨百官內外已照此懷而僉爾眾意苦見勤奪僶俛從事以迄于茲自此春來先疾屢發藥石攝療莫能善瘳夏首及今數加動劇便不堪日釐萬務巨細兼省帝齒周星紀識學逾躋日就月將人君道茂足以撫輯萬邦諧決百揆朕當率前志敬遜別宮遠惟復子明辟之義以自綏養實望群公逮于黎庶深鑒斯理如此則上下休嘉天地清晏魏道熙隆人神慶悅不其善歟魏書孝明紀正光元年七月丙子侍中元叉侍中劉騰奉帝幸前殿矯皇太后詔云云乃幽太后于北宮上疏諫討高麗和龍新定宜優復之使廣脩農殖以饒軍實然後進圖可一舉而滅魏書樂平王丕傳馮弘奔高麗世祖詔遣送之高麗不遣世祖怒將討之丕上疏澄奏配四中郎將兵數靈太后初將從之後議者不同乃止澄又重奏云云不納上奏以柳谷石文宣告四海臣聞帝王之興必有受命之符故能經緯三才維建皇極三五之盛莫不同之伏羲有河圖八封夏禹有洛書九疇至乃神功播于往古聖迹顯于來世伏惟陛下德合乾坤明竝日月固天縱聖應運挺生上靈垂顧徵善備集是以始光元年經天師奉天文圖錄授太平真君之號陛下深執虛沖歷年乃受精誠感于靈物信惠協于天人用能威加四海澤流宇內溥天率士無思不服今張掖郡列言丘池縣大柳谷山大石有青質白章間成文字記國家祖宗之諱著受命厤數之符王公已下群司百辟覩此圖文莫不感動僉曰自古以來禎祥之驗未有今日之煥炳也斯乃上靈降命國家無窮之微也臣等幸遭盛化沐浴光寵無以對揚天休增廣天地謹與群臣參議宜以石文之徵宣告四海令方外僭竊知天命有歸魏書靈徵志下真君五年二月張掖郡上言柳谷山石文于是衛大將軍樂安王範輔國大將軍建寍王崇征西大將軍常山王素征南大將軍恆農王奚斤上奏監國下令周書言任農以耕事貢九穀任圃以樹事貢草木任工以餘材貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其材任虞以澤事貢其物其制有司課畿內之民使無牛家以人牛力相貿墾殖鋤耨其有牛家與無牛家一人種田二十二畝償以私鋤功七畝如是為差至與小老無牛家種田七畝小老者償以鋤功二畝皆以五口下貧家為率各列家別口數所勸種頃畝明立簿目所種者于地首標題姓名以辨播殖之功魏書太武紀下附請依成式公除表上靈不弔大行太皇太后崩背溥天率土痛慕斷絕伏惟陛下孝思烝烝攀號罔極臣等聞先王制禮必有隨世之變前賢刱法亦務適時之宜良以世代不同古今異致故也三年之喪雖則自古然中代已後未之能行先朝成式事在可準聖后終制刊之金冊伏惟陛下至孝發衷哀毀過禮欲依上古喪終三年誠協大舜孝慕之德實非俯遵濟世之道今雖中夏穆清庶邦康靜然萬機事殷不可暫曠春秋烝嘗事難廢闕伏願天鑒抑至孝之深誠副億兆之企望喪期禮數一從終制則天下幸甚日月有期山陵將就請展安兆域以備奉終之禮魏書禮志三太和十四年文明太后崩九月安定王休等率百寮詣闕表又略見通典八十又表臣等聞五帝已前喪期無數三代相因禮制始立名雖虛置行之者寡高宗徒有諒闇之言而無可遵之式康王既廢初喪之儀先行即位之禮于是無改之道或虧三年之喪有缺夫豈無至孝之君賢明之子皆以理貴隨時義存百姓是以君薨而即位不暇改年踰月而即葬豈待同軌葬而即吉不必終喪此乃二漢所以經綸治道魏晉所以綱理攻術伏惟陛下以至孝之性遭罔極之難永慕崩號哀過虞舜誠是萬古之高德曠世之絕軌然天下至廣萬機至殷曠之一朝庶政必滯又聖后終制已有成典宗社廢禮其事尢大伏願天鑒抑哀毀之至誠思在予之深責仰遵先志典冊之文俯哀百辟元元之請魏書禮志三又略見通典八十臣等頻煩上聞仰申誠款聖慕惟遠未垂昭亮伏讀哀灼憂心如焚臣等聞承乾統極者宜以濟世為務經綸天下者特以百姓為心故萬機在躬周康弗獲申其慕漢文作戒孝景不得終其禮此乃先代之成軌近世所不易伏惟太皇太后叡聖淵識慮及始終明誥垂于典策遺訓備干末命聿脩厥德聖人所重遵承先式臣子攸尚陛下雖欲終上達之禮其如黎元何臣等不勝憂懼之誠敢冒重陳乞垂聽訪以副億兆之望魏書禮志三十月休等又表又略見通典八十奉被癸酉詔書述遺誡之旨昭違從之義遵儉葬之重式稱孝思之深誠伏讀未周悲感交切日月有期山陵即就伏惟陛下永慕崩號倍增摧絕臣等具位在官與國休戚庇心之至不敢不陳咸以為天下之至尊莫尊于王業皇極之至重莫重于萬機至尊故不得以常禮任已至重亦弗獲以世典申情是以二漢已降逮于魏晉葬不過踰月服不淹三旬良以叔世事廣禮隨時變不可以無為之法行之于有為之辰文質不同古今異制其來久矣自皇代革命多歷年紀四祖三宗相繼纂業上承數代之故實俯副兆民之企望豈伊不懷理宜然也文明太皇太后欽明稽古聖思淵深所造終制事合世典送終之禮既明遺誥之文載備奉而行之足以垂風百王軌儀萬葉階下以至孝之誠哀毀過禮三御不充半溢晝夜不釋絰帶永思纏緜滅性幾及百姓所以憂懼失守臣等所以肝腦塗地王者之尊躬行一日固可以感徹上靈貫被幽顯況今山陵告終百禮咸畢日已淹月仍不卜練比之前世理為過矣願陛下思大孝終始之義愍億兆悲惶之心抑思割哀遵奉終制以時即吉一日萬機則天下蒙恩率土仰賴謹依前式求定練日以備祔禫之禮魏書禮志三文明太后既葬休又表又略見通典八十請移華州治馮翊表謹惟州治李潤堡雖是少梁舊地晉芮錫壤然胡夷內附遂為戎落城非舊邑先代之名爰自國初護羌小戍改鎮立郡依岳立州因籍倉府未刊名實竊見馮翊古城羌魏兩民之交許洛水陸之際先漢之左輔皇魏之右翼形勝名都實為西蕃奧府今州之所在豈惟非舊至乃居岡飲澗井谷穢雜升降劬勞往還數里譐誻明昏有虧禮教未若馮翊面華渭包原澤井淺池平樵牧饒廣采材華陰陸運七十伐木龍門順流而下陪削舊雉功省力易人各為己不以為勞昔宋民無井穿井而忻得人況合城無水得水而不家慶竊聞前政刺史非是無意或值兵舉或遇年災緣此契闊稽延至此去歲已熟秋方大登四境晏安京師無事丁不十錢之費人無八旬之勤損輕益重乞垂昭鑒魏書安定王休附傳造石窟像記皇魏永年四年歲次辛卯十月十六日假節督華州諸軍事征虜將軍華州刺史安定王仰為亡祖親孟太妃亡考太傅靜王亡妣蔣妃敬造石窟一軀依巖袌宇刊崇沖室妙鐫靈像外相顯發工繢嚴儀凝華紫極敬恃此福上資先尊咸使捨此塵軀即彼真境六通囑值遇早登十地又願居祥照永作山河世一切含生普同斯願碑拓本奏三藩王妻名號親王及始藩二藩王妻悉有妃號而三藩已下皆謂之妻上不得同為妃名面下不及五品已上有命婦之號竊以為疑魏書廣平王洛侯傳求仍屬籍表竊聞聖人所以南面而聽天下其不可得變革者則親也尊也四世而緦服窮五世而袒免六世而親屬竭矣去茲以往猶繫之以姓而弗別綴之以食而弗殊又律云議親者非唯當世之屬親歷謂先帝之五世謹尋斯旨將以廣帝宗重磐石先皇所以變茲事條為此別制者太和之季方有意于吳蜀經始之費慮深在初割減之起蹔出當時也且臨淮王提分屬籍之始高祖賜帛三千匹所以重分離樂良王長命亦賜縑二千匹所以存慈睠此皆先朝殷勤克念不得已而然者也古人有言百足之蟲至死不僵者以其輔已者眾臣誠不欲妄親太階苟求潤屋但傷大宗一分則天子屬籍不過十數人而已在漢諸王之子不限多少皆列土而封謂之曰侯至于魏晉莫不廣胙河山稱之曰公者蓋惡其大宗之不固骨肉之恩疏矣臣去皇上雖是五世之遠于先帝便是天子之孫高祖所以國秩祿賦復給衣食后族唯給其賦不與衣食者欲以別外內限異同也今諸廟之感在心未忘行道之悲儵然已及其諸封者身亡之日三年服終然後改奪今朝廷猶在遏密之中便議此事實用未安魏書京兆王子推附傳初遙大功昆弟皆是恭宗之孫至肅宗而本服絕故除遙等屬籍遙表靈太后不從又見北史十七張智壽陳慶和坐妹流坐議昔哀姜悖禮于魯齊侯取而殺之春秋所譏又夏姬罪濫于陳國但責徵舒而不非父母明婦人外成犯禮之愆無關本屬況出適之妹舋及兄弟乎魏書刑罰志神龜中蘭陵公主駙馬都尉劉輝坐與河陰縣民張智壽妹容妃陳慶和妹慧猛奸亂毆主傷胎輝懼罪逃亡門下處奏各入死刑智壽慶和竝以知情不加防限處以流坐尚書元脩義以為
