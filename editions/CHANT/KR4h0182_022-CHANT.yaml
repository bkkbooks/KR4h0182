body:
  text: 張淵觀象賦并序觀象賦并序易曰天垂象見吉凶聖人則之又曰觀乎天文以察時變觀乎人文以化成天下然則三極雖殊妙本同一顯昧雖遐契齊影響尋其應感之符測乎冥通之數天人之際可見明矣夫機象冥緬至理幽玄豈伊管智所能究畼然歌詠之來偶同風人目閱群宿能不歌吟是時也歲次析木之津日在翼星之分閶闔晨鼓而蕭瑟流火夕暵以摧頹游氣眇其高搴辰宿煥焉華布覩時逝懷川上之感步秋林同宋生之戚歎巨艱之未終抱殷憂而不寐遂彷徨于窮谷之裏粀策陟神巖之側乃仰觀太虛縱目遠覽吟嘯之頃懍然增懷不覽至理拔自近情常韻發于宵夜不任詠歌之末遂援管而為賦其辭曰陟秀峰以遐眺望靈象于九霄覩紫官之環周嘉帝坐之獨標瞻華蓋之蔭藹何虛中之迢迢觀閣道之穹隆想靈駕之電飄爾乃縱目遠覽傍極四維北鑒機衡南覩太微三台皦皦以雙列皇座冏冏以垂暉虎賁執銳于前階常陳屯聚于後闈遂回情旋首次目文昌仰見造父爰及王良登天而乘尾奚仲託精于津陽織女朗列于河湄牽牛煥然而舒光五車亭柱于畢陰兩河俠井而相望灼灼群位落落幽紀設官分職罔不悉置儲貳副天庭延三吏論道納言各有攸司將相次序以衛守九卿珠連而內侍天街分中外之境四七列九土之異左則天紀槍棓攝提大角二咸防奢七公理獄庫樓炯炯以灼明騎官騰驤而奮足天市建肆于房心帝座磥落而電燭于前則老人天社清廟所居明堂配帝靈臺考符丈人極陽而慌忽子孫嘒嘒于參嵎天狗接狼以吠守野雞伺晨于參墟右則少微軒轅皇后之位嬪御相次尊卑有秩御宮典儀女史執筆內平秉禮以伺邪天牢禁愆而察失于後則有車府傳舍匏瓜天津扶匡照曜麗珠珮珍人星麗玄以閑逸哭泣連屬而趨墳河鼓震雷以𥔀磕騰虵蟠縈而輪菌于是周章高眄還旋辰極既覿鉤陳中禁復覩天帝休息漸臺可升離宮可即酒旗建醇醪之旌女床列窈窕之色輦道屈曲以微煥附路立于雲閣之側其列星之表五車之閒乃有咸池鴻沼玉井天淵建樹百果竹林在焉江河炳著于上穹素氣霏霏其帶天神龜曜甲于清泠龍魚摛光以映連又有南門鼓吹器府之官奏彼絲竹為帝娛歡熊羆緜絡于天際虎豹儵煜而暉爛弧精引弓以持滿狼星搖動于霄端其外則有燕秦齊趙列國之名雷電霹靂雨落雲征陳車策駕于氐南天駟騁步于太清園苑周回以曲列倉廩區別而殊形內則尚書大理太一天一之宮柱下著術傳示無窮六甲候大帝之所須內廚進御膳于皇躬天船橫漢以普濟積水候災于其中陰德播洪施以恤不足四輔翼皇極而闡玄風恢恢太虛寥寥帝庭五座竝設爰集神靈乃命熒惑伺彼憍盈執法刺舉于南端五侯議疑于水衡金火時出以成緯七宿匡衛而為經暐曄昱其竝曜粲若三春之榮覩夫天官之羅布故作則于華京及其災異之興出無常所歸邪繽紛飛流電舉妖星起則殃及晉平虵乘龍則禍連周楚或取證于逢公或推變于衝午乃有欽明光被填逆水府洪波滔天功隆大禹此則冥數之大運非治綱之失緒蓋象外之妙不可以麤理尋重玄之內難以熒燎覩至于精靈所感迅踰駭嚮荊軻慕丹則白虹貫日而不徹衛生畫策則太白食昴而摛朗魯陽指麾而曜靈為之回駕嚴陵來游而客氣著于乾象斯皆至感動于神祇誠應效于既往尒乃四氣鱗次斗建辰移雖無聲言三光是知星中定于昏明影度以之不差測水旱于未然占方來之安危陰精乘箕則大飆暮鼓西南入畢則淫雨滂沱譬有晉鍾之應銅山風雲之從班螭若夫冥車潛駕時乘六虬大儀回運萬象俱流北斗俄其西傾群星忽以匿幽望舒縱轡以騁度靈輪浹旦而過周爾乃凝神遠矚矖目八荒察之無象視之眇茫狀若渾元之未判別又似浮海而覩滄浪幽遐迥以希夷寸眸焉能究其傍于是乎夜對山水栖心高鏡遠尋終古攸然獨詠美景星之繼晝大唐堯之德盛嘉黃星之靡鋒明虞舜之不競呂尚之宵夢善登輔而翼聖欽管仲之察微見虛危而知命歎熒惑之舍心高宋景之守政壯漢祖之入秦奇五緯之聚映尒乃厤象既周相佯巖際尋圖籍之所記著星變乎書契覽前代之將淪咸譴告于昏世桀斬諫以星孛紂酖荒而致彗恆不見以周衰枉虵行而秦滅諒人事之有由豈妖災之虛設誠庸主之難悛故明君之所察堯無為猶觀象而況德非乎先哲魏書張淵傳又見十六國春秋六十九無注國號議三皇五帝之立號也或因所生之土或即封國之名故虞夏商周始皆諸侯及聖德既隆萬國宗戴稱號隨本不復更立唯南人屢徒改號曰殷然猶兼行不廢始基之稱故詩云殷商之旅又云天命玄鳥降而生商宅殷土茫茫此其義也昔漢高祖以漢王定三秦滅彊楚故遂以漢為號國家雖統北方廣漠之土逮于陛下應運龍飛雖曰舊邦受命維新是以登極之初改代曰魏又慕容永亦奉進魏土夫魏者大名神州之上國斯乃革命之徵驗利見之玄符也臣愚以為宜號為魏魏書崔玄伯傳冊封沮渠蒙遜為涼王昔我皇祖冑自黃軒總御群才攝服戎夏疊曜重光不殞其舊逮于太祖應期協運大業唯新奄有區宇受命作魏降及太宗廣闢崇基政和民阜朕承天緒思廓宇縣然時運或否雰霧四張赫連跋扈于關西大檀陸梁于漠北戎夷負阻江淮未賓是用自東徂西戎軒屢駕賴宗廟靈長將士宣力克翦兇渠震服彊獷四方漸泰表裏無塵王先識機運經略深遠與朕協同厥功洪茂當今運鍾時季僭逆憑陵有土者莫不跨峙一隅有民者莫不榮其私號不遵眾星拱極之道不慕細流歸海之義而王深悟大體率由典章任土貢珍愛子入待勳義著焉道業存焉惟王乃祖乃父有土有民論功德則無二于當時言氏族則始因于世爵古先帝王襃賢賞德莫不胙土分民建為藩輔是以周成命大公以表東海襄王錫晉文大啟南陽是用割涼州之武威張掖敦煌酒泉西海金城西平七郡封王為涼王受茲素土苴以白茅用建冢社為魏室藩輔盛衰存亡與魏升降夫功高則爵尊德厚則任重又加命王入贊百揆謀謨幃幄出征不懷登攝侯伯其以太傅行征西大將軍仗鉞秉旄鷹揚河右遠祛王略懷柔荒隅北盡于窮髮南極于庸岷西被于崑嶺東至于河曲王實征之以夾輔皇室又命王建國署將相群卿百官承制假授除文官刺史以還武官撫軍以下建天子旌旗出入警蹕如漢初諸侯王故事欽哉惟時往踐乃職祗服朕命協亮天工俾九德咸事無忝庶官用終爾顯德對揚我皇祖之休烈魏書沮渠蒙遜傳崔浩之辭也議軍事表昔漢武帝患匈奴彊盛故開涼州五郡通西域勸農積穀為滅賊之資東西迭擊故漢未疲而匈奴已敝後遂入朝昔平涼州臣愚以為北賊未平征役不息可不徙其民案前世故事計之長者若遷民人則土地空虛雖有鎮戍適可禦邊而已至于大舉軍資必乏陛下以此事闊遠竟不施用如臣愚意猶如前議募徙豪彊大家充實涼土軍舉之日東西齊勢此計之得者魏書崔浩傳上五寅元厤表太宗即位元年敕臣解急就章孝經論語詩尚書春秋禮記周易三年成訖復詔臣學天文星厤易式九宮無不盡看至今三十九年晝夜無廢臣稟性弱劣力不及健婦人更無餘能是以專心思書忘寢與食至乃夢共鬼爭義遂得周公孔子之要術始知古人有虛有實妄語者多直正者少自秦始皇燒書之後經典絕滅漢高祖以來世人妄造厤術者有十餘家皆不得天道之正大誤四干小誤甚多不可言盡臣愍其如此今遭陛下太平之世除偽從真宜改誤厤以從天道是以臣前奏造厤今始成訖謹以奏皇唯恩省察以臣厤術宣示中書博士然後施用非但時人天地鬼神知臣得正可以益國家萬世之名過干三皇五帝矣魏書崔浩傳上疏讚明寇謙之受神誥事臣聞聖王受命則有大應而河圖洛書皆寄言于蟲獸之文未若今日人神接對手筆粲然辭旨深妙自古無比昔漢高雖復英聖四皓猶或恥之不為屈節今清德隱仙不召自至斯誠階下侔蹤軒黃應天之符也豈可以世俗常談而忽上靈之命臣竊懼之魏書釋老志崔浩獨異寇謙之言因師事之授其道術于是上疏讚明其事注易敘國家西平河右敦煌張湛金城宗欽武威段承根三人皆儒者竝有雋才見稱于西州每與余論易余以左氏傳卦解之遂相勸為注故因退朝餘暇而為之解焉魏書張湛傳食經敘余自少及長耳目聞見諸母諸姑所脩婦功無不蘊習酒食朝夕養舅姑四時供祭祀雖有功力不任僮使常手自親焉昔遭喪亂饑饉仍臻饘蔬餬口不能具其物用十餘年間不復備設先妣慮久廢忘後生無所知見而少不習業書乃占授為九篇文辭約舉婉而成章聰辨彊記皆此類也親沒之後值國龍興之會平暴除亂拓定四方余備位台鉉與參大謀賞獲豐厚牛羊蓋澤貲累臣萬衣則重錦食則粱肉遠惟平生思季路負米之時不可復得故序遺文垂示來世魏書崔浩傳浩母盧氏諶孫女也浩著食經敘又北史二十一論諸葛武侯承祚之評亮乃有故義過美之譽案其迹也不為負之非挾恨之矣何以去然夫亮之相劉備當九州鼎沸之會英雄奮發之時君臣相得魚水為喻而不能與曹氏爭天下委棄荊州退入巴蜀誘奪劉璋偽連孫氏守窮崎嶇之地僭號邊夷之間此策之下者可與趙他為偶而以為管蕭之亞匹不亦過乎謂壽貶亮非為失實且亮既據蜀恃山險之固不達時宜弗量勢力嚴威切法控勒蜀人矜才負能高自矯舉欲以邊夷之眾抗衡上國出兵隴右再攻岐山一攻陳倉疏遲失會摧衂而反後入秦川不復攻城更求野戰魏人知其意閉壘堅守以不戰屈之知窮勢盡憤結攻中發病而死由是言之豈合古之善將見可而進知難而退者乎魏書毛修之傳廣德殿碑頌肅清帝道振懾四荒有蠻有戒自彼氐羌無思不服重譯稽顙恂恂南秦斂斂推亡峨峨廣德奕奕焜煌水經河水注三太平真君三年刻石樹碑勒宣時事碑頌云云侍中司徒東郡公崔浩之辭也碑陰題宣城公李孝伯尚書盧遐等從官姓名女儀近古婦人常以冬至日上履韤于舅姑踐長至之義也御覽二十八又六百九十七
