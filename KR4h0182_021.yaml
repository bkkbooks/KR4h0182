body:
  text: 衛操桓帝功德頌碑魏軒轅之苗裔言桓穆二帝馳名域外九譯宗焉治國御衆威禁大行聲著華裔齊光純靈智深謀遠窮幽極明治則清斷沈浮得情仁如春陽威若秋零彊不陵弱隱恤孤煢道教仁行化而不刑國無姦盜路有頌聲自西訖東變化無形威武所向下無交兵南一王室北服丁零招諭六狄咸來歸誠超前絶後致此有成奉承晉皇扞禦邊疆王室多難天網弛綱豪心遠濟靡離其殃歲翦逆命姦盜豺狼永安元年歲次甲子奸黨猶逆東西狼跱敢逼天王兵甲屢起怙衆肆暴虐用將士鄴洛搆隙棄親求疏乃招異類屠各胸奴劉淵奸賊結黨同呼敢擊并土殺害無辜殘破狼籍城邑丘墟交刃千里長蛇塞塗晉道應天言展良謨使持節平北將軍并州刺史護胸奴中郎將東嬴公司馬騰才神絶世規略超遠時逢多難懼損皇祀欲引兵駕獫狁孔熾造設權策濟難奇思欲招外救朝臣莫應高算獨斷決謀盟意爰命外國引軍內備𥳑賢選士命茲良使遣參軍壼倫牙門中行嘉義陽亭侯衛謨協義亭侯衛鞬等馳奉檄書至晉陽城又稱桓穆二帝心在宸極輔相二衛對揚毗翼操展文謀雄奮武烈承命會議咨論奮發昔桓文匡佐功著周室顯名載籍列賞備物大衆回動熙同靈集興軍百萬期不經日兄弟齊契決勝廟算鼓譟南征平夷險難又云二帝列鎮言答合符引接款密信義不渝會盟汾東銘篆丹書永世奉承慎終如初契誓命將精鋭先驅南救涅縣東解壽陽窘迫之邑幽而復光太原西河樂平上黨遽遭寇暴白骨交橫羯賊肆虐六郡凋傷群惡相應圖及華堂旌旗輕指羯黨破喪遣騎十萬前臨淇漳鄴遂振潰凶逆奔亡軍據州南曜鋒太行翼衛內外鎮靜四方志在竭力奉戴天王忠恕用暉外動亦攘于是曜武振旅而旋長路匪夷出入經年毫毛不犯百姓稱傳周覽載籍自古及今未聞外域奔救內患棄家憂國以危易安惟公遠略臨難能權應天順人恩德素宣和戎靜朔危邦復存又云非桓天挺忠孝自然孰能超常不為異端回動大衆感公之言功濟方州勳烈光延升平之日納貢充蕃憑瞻鑾蓋步趾三川有德無祿大命不延年三十有九以永興二年六月二十四寢疾薨殂背棄華殿雲中名都國失惠主哀感欷歔悲痛煩冤載號載呼舉國崩絶攀援靡訴遠近齊軌奔赴梓廬人百其身盈塞門塗高山其頽茂林凋枯仰訴造化痛延悲夫又云桓帝忠于晉室駿奔長衢隆冬淒淒四出行誅蒙犯霜雪疹入脈膚用致薨殞不永桑榆以死勤事經勳同模垂名金石載美晉書平北哀悼祭以豐廚考行論勳諡曰義烈功施于人祀典所說又云桓帝經濟存亡繼絶荒服是賴祚存不輟金龜簫鼓軺蓋殊制反及二代莫與同列并域嘉歎北國感榮各竭其心思揚休名刊石紀功圖像存形靡輟享祀饗以犧牲永垂于後沒有餘靈長存不朽延于億齡其頌又稱桓帝金堅玉剛應期順會王有北方行能濟國武平四荒無思不服區域大康世路紛糾運遭播揚羯胡因釁敢害并土哀痛下民死亡失所率衆百萬平夷險阻存亡繼絶一州蒙祜功烈桓桓龍文虎武朱邑小善遺愛桐鄉勳攘大患六郡無缺悉之來由功而存刊石勒銘垂示後昆魏書衛操傳桓帝崩操立碑于大邗城南以頌功德云云時晉光熙元年秋也皇興初雍州別駕雁門段榮于大邗掘得此碑文雖非麗事宜載焉故録于傳遺楊佛嵩書夫杖順以翦逆乘義而攻昧未有非其運而顯功無其時而著業慕容無道侵我疆埸師老兵疲天亡期至是以遣使命軍必望克赴將軍據方召之任總熊虎之師事與機會今其時也因此而舉役不再駕千載之勳一朝可立然後高會雲中進師三魏舉觴稱壽不亦綽乎魏書許謙傳慕容寶來寇太祖使謙告難于姚興興遣將楊佛嵩率衆來援而佛嵩稽緩太祖使謙為書以遺佛嵩與楊佛嵩盟昔殷湯有鳴條之誓周武有河陽之盟所以藉神靈昭忠信夫親仁善鄰古之令軌歃血割牲以敦永穆今既盟之後言歸其好分災恤患休戚是同有違此盟神祇斯殛魏書許謙傳疾篤上明元帝疏臣既庸人志無殊操值太祖誕膺期運天地始開參戎氛霧之初馳驅革命之會託翼鄧林寄鱗溟海遂荷恩寵榮兼出內陛下龍飛九五仍參顧問曾無微誠塵山露海今舊疾彌留氣力虛頓天罰有罪將填構壑然犬馬戀主敢不盡言方今中夏雖平九域未一西有不賓之羌南有逆命之虜岷蜀殊風遼海異教雖天挺明聖撥亂乘時而因幾撫會實須經略介焉易失功在人謀伏願恢崇睿道克廣德心使揖讓與干戈竝陳文德與武功俱運則太平之化康哉之美復隆于今不獨前古昔子囊將終寄言城郢荀偃辭唅遺恨在齊臣雖暗劣敢忘前志魂而有靈結草泉壤魏書張袞傳永興二年疾篤上疏表諫獻文帝伏見詔書禁尚書以下受禮者刑身糾之者代職伏惟三載考績黜陟幽明斯乃不易之令軌百王之通式今之都曹古之公卿也皆翊扶萬機讚徽百揆風化藉此而平治道由茲而穆且周之下士尚有代耕況皇朝貴仕而服勤無報豈所謂祖襲堯舜憲章文武者乎羊酒之罰若行不已臣恐奸人窺望忠臣懈節而欲使事靜民安治清務𥳑至于委任責成下民難辨如臣愚量請依律令舊法稽同前典班祿酬廉首去亂群常刑無赦苟能如此則升平之軌期月可望刑措之風三年必致矣魏書張袞附傳顯祖詔諸監臨之官所監治受羊一口酒一斛者罪至大辟與者以從坐論糾告得尚書已下罪狀者各隨所糾官輕重而授之白澤上表諫諫文明太后臣聞上天愛物之生明王重民之命故殺一人而取天下仁者不為且周書父子兄弟罪不相及今群凶肆虐轘裂誅盡合城無辜奈何極辟不誣十室而況一州或有忠焉或有仁者若淫刑濫及殺忠與仁斯乃西伯所以歎息于九侯孔子所以回輪于河上伏惟聖德昭明殷鑒水鏡前禮止迅烈之怒抑雷霆之威則溥天知幸矣昔厲防民口卒滅宗姬文聽輿頌終摧彊楚願不以人廢言留神省察魏書張袞附傳太和初懷州民伊祁苟初謀反將殺刺史文明太后欲盡誅一城之民白澤諫諫遣使報蠕蠕表臣聞古之聖王疆理物土辨章要甸荒遐之俗政所不及故禮有一見之文書著羈縻之事太祖以神武之姿聖明之略經略帝圖日有不暇遂令豎子遊魂一方亦由中國多虞急諸華而綏夷狄也高祖光宅土中業隆卜世赫雷霆之威振熊羆之旅方役南轅未遑北伐昔舊京烽起虜使在郊主上案劍璽書不出世宗運籌帷幄開境揚旌衣裳所及舟車萬里于時醜類款關上亦述遵遺志今大明臨朝澤及行葦國富兵彊能言率職何憚而為之何求而行此往日蕭衍通敬求和以誠肅未純抑而不許先帝棄戎于前陛下交夷于後無乃上乖高祖之心下違世宗之意且虜雖慕德亦來觀我懼之以彊儻即歸附示之以弱窺覦或起春秋所謂以我卜也又小人難近夷秋無親疏之則怨狎之則侮其所由來久矣是以高祖世宗知其若此來既莫逆去又不追不一之義于是乎在必其委贄玉帛之辰屈膝蕃方之禮則可豐其勞賄籍以珍物至于王人遠役銜命虜庭優以匹敵之尊加之相望之寵恐徒生虜慢無益聖朝假令選衆而舉使乎稱職資酈生之辨騁終軍之辭憑軾下齊長纓繫越苟異曩時猶為不願而況極之以隆崇申之以宴好臣雖下愚輒敢固執若事不獲已應頒制詔示其上下之儀宰臣致書諷以歸順之道若聽受忠誨明我話言則萬乘之盛不失位于域中天子之聲必籠罩于無外脫或未從焉能損益徐舞干戚以招之敷文德而懷遠如迷心不已或肆犬羊則當命辛李之將勤衛霍之師蕩定雲沙掃清逋孽飲馬浣海之濱鏤石燕然之上開都護置戊己斯亦陛下之高功不世之盛事如思案甲養民務農安邊之術經國之防豈可以戎夷兼并而遽虧典制將取笑于當時貽醜于來葉昔文公請隧襄后有言荊莊問鼎王孫是抑以古方今竊為陛下不取又陛下方欲禮神岷瀆致禮衡山登稽嶺窺蒼梧而反與夷虜之君酋渠之長結昆弟之欣抗分庭之義將何以瞰文命之遐景迹重華之高風者哉臣以為報使甚失如彼不報甚得如此願留須臾之聽察愚臣之言魏書張袞附傳熙平中蠕蠕主遣使來朝抗敵國之書不修臣敬朝議將依漢答胸奴故事遣使報之倫表不從議答吐谷渾慕瑰前者有司所處以為秦王荒外之君本非政教所及來則受之去則不禁皇威遠被西秦王慕義畏威稱臣納貢求受爵號議者以為古者要荒之君雖人土衆廣而爵不擬華夏陛下加寵王官乃越常分容飾車旗班同上國至于繒絮多少舊典所無皆當臨時以制豐寡自漢魏以來撫接荒遐頗有故事呂后遺單于御車二乘馬二駟單于答馬千四其後胸奴和親敵國遺繒絮不過數百呼韓邪稱臣身自入朝始乃至万匹今西秦王若以土無桑蠶便當上請不得言財不周賞昔周室衰微齊侯小白一匡天下有賜胙之命無益土之賞晉侯重耳破楚城濮唯受南陽之田為朝宿之邑西秦所致唯定而已塞外之人因時乘便侵入秦涼未有經略拓境之勳爵登上國統秦涼河沙四州之地而云土不增廓比聖朝于弱周而自同于五霸無厭之情其可極乎西秦王忠款于朝廷原其本情必不至此或左右不敏因致斯纍檢西秦流人賊時所抄悉在蒲坂今既稱藩四海咸泰天下一家可敕秦州送詣京師隨後遣還所請乞佛三人昔為賓國之使來在王庭國破家遷即為臣妾可勿聽許魏書吐谷渾傳慕瑰表言土不增廓財不周賞井請敕遣乞佛等太尉長孫嵩及議郎博士二百七十九人議答奉表自明與琛同在淮南俱當國難琛敗臣全遂生私隙且臨機奪帥非算所長魏書長孫道生附傳鮮于修禮反以稚為大都督北討尋詔稚解行臺遣河間王琛為大都督稚遣子子裕奉表復收鹽池稅表鹽池天資貨賄密邇京畿唯須寶而護之均贍以理今四境多虞府藏罄竭然冀定二州且亡且亂常調之絹不復可收仰惟府庫有出無入必須經綸出入相補略論鹽稅一年之中準絹而言猶不應減三十萬匹也便是移冀定二州置于畿甸今若廢之事同再失臣前仰違嚴旨而先討關賊而解河東者非是間長安而急蒲坂蒲坂一陷沒失鹽池三軍口命濟贍理絶天助大魏茲計不爽昔高祖升平之年無所之少猶創置鹽官而加典護非為物而競利恐由利而亂俗也況今王公素餐百官尸祿租徵六年之粟調折來歲之資此者出入私財奪人膂力豈是願言事不獲巳臣輒符司監將尉還率所部依常收稅更聽後敕魏書長孫道生附傳靈太后時有昭廢鹽池稅稚上表上表乞定樂舞名臣聞安上治民莫善于禮移風易俗莫善于樂易曰先王以作樂崇德殷薦之上帝以配祖考書曰戛擊鳴球搏拊琴瑟以詠祖考來格詩言志律和聲敦敘九族平章百姓天神于焉降歆地祇可得而禮故樂以象德舞以象功干戚所以比其形容金石所以發其歌頌薦之宗廟則靈祇饗其和用之朝廷則君臣協其志樂之時義大矣哉雖復沿革異時晦明殊位周因殷禮百世可知也太祖道武皇帝應圖受命光宅四海義合天經德符地緯九戎荐舉五禮未詳太宗世祖重輝纍耀恭宗顯祖誕隆丕基而猶經營四方匪遑制作高祖孝文皇帝承太平之緒纂無為之運帝圖既遠王度惟新太和中命故中書監高閭草創古樂閭尋去世未就其功閭亡之後故太樂令公孫崇續修遺事十有餘載崇敷奏其功時太常卿劉芳以崇所作體制差舛不合古議請更修營被旨聽許芳又釐綜久而申呈時故東平王元匡共相論駮各樹朋黨爭競紛綸竟無底定及孝昌巳後世屬艱虞內難孔殷外敵滋甚永安之季胡賊入京燔燒樂庫所有之鐘悉畢賊手其餘磬石咸為灰燼普泰元年臣等奉敕營造樂器責問太樂前來郊丘懸設之方宗廟施安之分太樂令張乾龜答稱芳所造六格北廂黃鐘之均實是夷則之調其餘三廂宮商不和共用一笛施之前殿樂人尚存又有姑洗太簇二格用之後宮檢其聲韻復是夷則于今尚在而芳一代碩儒斯文攸屬討論之日必應考古深有明證乾龜之辨恐是歷歲稍遠伶官失職芳久殂沒遺文銷毀無可遵訪臣等謹詳周禮分樂而序之凡樂圜鐘為宮黃鐘為角太簇為徵姑洗為羽若樂六變天神可得而禮函鐘為宮大簇為角姑洗為徵南呂為羽若樂八變地示可得而禮黃鐘為宮大呂為角大簇為徵應鐘為羽若樂九變人鬼可得而禮至于布置不得相生之次兩均異宮竝無商聲而同用一徵書曰於豫擊石拊石百獸率舞八音克諧神人以和計五音不具則聲豈成文七律不備則理無和韻八音克諧莫曉其旨聖道幽玄微言已絶漢魏以來未能作者案春秋魯昭公二十年晏子言于齊侯曰先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也服子慎注云黃鐘之均黃鐘為宮太簇為商姑洗為角林鐘為徵南呂為羽應鐘為變宮蕤賓為變徵一懸十九鐘十二懸二百二十八鐘八十四律即如此義乃可尋究今案周禮小胥之職樂懸之法鄭法云鐘磬編縣之二八十六枚漢成帝時犍為郡于水濱得古磬十六枚獻呈漢以為瑞復依禮圖編懸十六去正始中徐州辥成送玉磬十六枚亦是一懸之器檢太樂所用鐘磬各一懸十四不知何據魏侍中謬龔云周禮以六律六同五聲八音六舞大合樂以致鬼神今之樂官徒知古有此制莫有明者又云樂制既亡漢成謂韶武武德武始大鈞可以備四代之樂奏黃鐘舞文始以祀天地奏太簇舞大武以祀五郊明堂奏姑洗舞武德巡狩以祭四望山川奏蕤賓舞武始大鈞以祀宗廟祀圜丘方澤群廟祫祭之時則可兼舞四代之樂漢亦有雲翹育命之舞罔識其源漢以祭天魏時又以雲翹兼祀圜丘天郊育命兼祀方澤地郊今二舞久亡舞復知者臣等謹依高祖所制尺周官考工記鳧氏為鐘鼓之分磬氏為磬倨闕之法禮運五聲十二律還相為宮之義以律呂為之劑量奏請制度經紀營造依魏晉所用四廂宮懸鐘磬各十六懸塤篪爭筑聲韻區別蓋理三稔于茲始就五聲有節八音無爽笙鏞和合不相奪倫元日備設百寮允矚雖未極萬古之徽蹤實是一時之盛事竊惟古先哲王制禮作樂各有所稱黃帝有咸池之樂顓頊作承雲之舞大章大韶堯舜之異名大夏大濩禹湯之殊稱周言大武秦曰壽人及焚書絶學之後舊章淪滅無可準據漢高祖時叔孫通因秦樂人制宗廟樂迎神廟門奏嘉至皇帝入廟門奏永至登歌再終下奏休成之樂通所作也高祖六年有昭容樂禮容樂又有房中祠樂高祖唐山夫人所作也孝惠二年使樂府令夏侯寬備其簫管更名安世樂高祖廟奏武德文始五行之舞孝文廟奏昭德文始四時五行之舞孝武廟奏盛德文始四時五行之舞武德者高祖四年作也以象天下樂己行武以除亂也文始舞者舜韶舞高祖六年更名曰文始以示不相襲也五行舞者本周舞秦始皇二十六年更名曰五行也四時舞者孝文所作以明天下之安和也孝景以武德舞為昭德孝宣以昭德舞為盛德光武廟奏大武諸帝廟並奏文始五行四時之舞及卯金不祀當塗勃興魏武廟樂改云韶武用虞之大韶周之大武總號大鈞也曹失其鹿典午乘時晉氏之樂更名正德自昔帝王莫不損益相緣徽號殊別者也而皇魏統天百三十載至于樂舞迄未立名非所以聿宣皇風章明功德贊揚懋軌垂範無窮者矣案今后宮饗會及五郊之祭皆用兩懸之樂詳攬先誥大為紕繆古禮天子宮懸諸侯軒懸大夫判懸士特懸皇后禮數德合王者名器所資豈同于大夫哉孝經言嚴父莫大于配天宗祀文王于明堂以配上帝即五精之帝也禮記王制庶羞不踰牲燕衣不踰祭服論語禹卑宮室盡力于溝洫惡衣服致美于黻冕何有殿庭之樂過于天地乎失禮之差遠于千里昔漢孝武帝東巡狩封禪還祀泰一于甘泉祭后土于汾陰皆盡用明其無減普泰元年前侍中臣孚及臣瑩等奏求造十二懸六懸裁訖續復營造尋蒙旨判今六懸既成臣等思鐘磬各四鈲鐏相從十六格宮懸已足今請更營二懸通前為八宮懸兩具矣一具備于太極一具列于顯陽若圓丘方澤上辛四時五郊社稷諸祀雖時日相礙用之無闕孔子曰周道四達禮樂交通傳曰魯有禘樂賓祭用之然則天地宗廟同樂之明證也其升斗權量當時未定請即刊校以為長準周存六代之樂雲門咸池韶夏濩武用于郊廟各有所施但世運遙緬隨時亡缺漢世唯有虞韶周武魏為武始咸熙錯綜風聲為一代禮晉無改造易名正德今聖朝樂舞未名舞人冠服無準稱之文武舞而已依魏景初三年以來衣服制其祭天地宗廟武舞執千戚著平冕黑介幘玄衣裳白領袖絳領袖中衣絳合幅褲襪黑韋鞮文舞執羽籥冠委貌其服同上其奏于廟庭武舞武辨赤介幘生絳袍單衣練領袖皂領袖中衣虎文畫合幅褲白布襪黑韋鞮文舞者進賢冠黑介幘生黃袍單衣白合幅褲服同上其魏晉相因承用不改古之神室方各別所故聲歌各異今之太廟連基接棟樂舞同奏于義得通自中煩喪亂晉室室播蕩永嘉已後舊章湮沒大武皇帝破平統萬得古雅樂一部正音歌五十曲工伎相傳間有施用自高祖遷居世宗晏駕內外多事禮物未周今日所有王夏肆夏之屬二十三曲猶得擊奏足以闡纍聖之休風宣重光之盛美伏惟陛下仁格上皇義光下武道契玄機業隆寶祚思服典章留心軌物反堯舜之淳風復文武之境土飾宇宙之義刑納生人于福地道德熙泰樂載新聲天成地平于是乎在樂舞之名乞垂旨判臣等以愚昧參廁問道呈御之日伏增惶懼魏書樂志普泰中前廢帝詔録尚書長孫稚太常卿祖瑩營理金石永熙二年春稚瑩表
