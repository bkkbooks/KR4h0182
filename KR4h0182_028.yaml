body:
  text: 高允代都賦今佚鹿苑賦啟重基于朔土系軒轅之洪裔武承天以作主熙大明以御世灑靈液以滂沱扇仁風以遐被踵姬文而築苑包山澤以開制植群物以充務蠲四民之常稅暨我皇之繼統誕天縱之明叡追鹿埜之在昔興三轉之高義振幽宗于已永曠千載而可寄于是命匠選工刊茲西嶺注誠端思仰模神影庶真容之髣髴燿金暉之煥炳即靈崖以構宇竦百尋而直正絙飛梁于浮柱列荷華于綺井圖之以萬形綴之以清永若祇洹之瞪對孰道場之塗迥嗟神功之所建超終古而秀出實靈祇之協贊故存貞而保吉鑿仙窟以居禪闢重階以通術澄清氣于高軒佇流芳于王室茂花樹以芬敷涌澧泉之洋溢祈龍宮以降雨侔膏液于星畢若乃研道之倫行業貞𥳑慕德懷風杖策來踐守應真之重禁味三藏之淵典或步林以經行或寂坐而端宴會眾善以竝臻排五難而俱遣道欲隱而彌彰名欲毀而逾顯伊皇輿之所幸每垂心于華囿樂在茲之閒敞作離宮以榮築固爽塏以崇居枕平原之高陸恬仁智之所懷眷山水以肆目玩藻林以遊思絕鷹犬之馳逐眷耆年以廣德縱生生以延福慧愛內隆金聲外發功濟普天善不自伐尚諮賢以問道詢芻蕘以補闕盡敬恭于靈寺遵晦望而致謁奉請戒以畢日兼六時而宵月何精誠之至到良九劫之可越資聖王之遠圖豈循常以明教希縉雲之上升羨頂生之高蹈思離塵以邁俗涉玄門之幽奧禪儲宮以正位受太上之尊號既存無而御有亦執靜以鎮躁覩天規于今日尋先哲之遺誥悟二乾之重蔭審明離之竝照下寍濟于兆民上剋光于七廟一萬國以從風總群生而為導正南面以無為永措心于沖妙夫道化之難期幸微躬之遭遇逢扶桑之初開遘長夜之始曙顧衰年以懷傷惟負忝以危懼敢布心以陳誠效鄙言以自著釋藏策七廣宏明集二十九上上天文災異八篇表往年被敕令臣集天文災異使事類相從約而可觀臣聞箕子陳謨而洪範作宣尼述史而春秋著皆所以章明列辟景測皇天者也故先其善惡而驗以災異隨其得失而效以禍福天人誠遠而報速如響甚可懼也自古帝王莫不尊崇其道而稽其法數以自修飾厥後史官竝載其事以為鑒誡漢成帝時光祿大夫劉向見漢祚將危權歸外戚屢陳妖眚而不見納遂因洪範春秋災異報應者而為其傳覬以感悟人主而終不聽察卒以危亡豈不哀哉伏惟陛下神武則天叡鑒自遠欽若稽古率由舊章前言往行靡不究鑒前皇所不逮也臣學不洽聞識見寡薄懼無以裨廣聖聽仰酬明旨今謹依洪範傳天文志撮其事要略其文辭凡為八篇魏書高允傳承詔議興學校表臣聞經綸大業必以教養為先咸秩九疇亦由文德成務故辟雍光于周詩泮宮顯于魯頌自永嘉以來舊章殄滅鄉閭蕪沒雅頌之聲京邑杜絕釋奠之禮道業陵夷百五十載仰惟先朝每欲憲章昔典經闡素風方事尚殷弗遑克復陛下欽明文思篡成洪烈萬國咸寍百揆時敘申祖宗之遺志興周禮之絕業爰發德音維新文教搢紳黎獻莫不幸甚臣承旨敕竝集二省披覽史籍備究典紀靡不敦儒以勸其業貴學以篤其道伏思明詔玄同古義宜如聖旨崇建學校以厲風俗使先王之道光演于明時郁郁之音流聞于四海請制大郡立博士二人助教四人學生一百人次郡立博士二人助教二人學生八十人中郡立博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人其博士取博關經典世履忠清堪為人師者年限四十以上助教亦與博士同年限三十以上若道業夙成才任教授不拘年齒學生取郡中清望人行修謹堪循名教者先盡高門次及中第魏書高允傳諫皇太子營立田園天地無私故能覆載王者無私故能包養昔之明王以至公宰物故藏金于山藏珠于淵示天下以無私訓天下以至儉故美聲盈溢千載不衰今殿下國之儲貳四海屬心言行舉動萬方所則而營立私田畜養雞犬乃至販酤市廛與民爭利議聲流布不可追掩夫天下者殿下之天下富有四海何求而不獲何欲而弗從而與販夫販婦競此尺寸昔虢之將亡神乃下降賜之土田卒喪其國漢之靈帝不修人君之重好與宮人列肆販賣私立府藏以營小利卒有顛覆傾亂之禍前鑒若此甚可畏懼夫為人君者必審于擇人故稱知人則哲惟帝難之商書云無邇小人孔父有云小人近之則不遜遠之則怨矣武王愛周召齊畢所以王天下殷紂愛飛廉惡來所以喪其國歷觀古今存亡之際莫不由之今東宮誠曰乏人雋乂不少頃來侍御左右者恐非在朝之選故願殿下少察愚言斥出佞邪親近忠良所在田園分給貧下畜產販賣以時收散如此則休聲日至謗議可除魏書高允傳恭宗季年頗親近左右營立田園以取其利允諫不納諫文成帝起宮室臣聞太祖道武皇帝既定天下始建都邑其所營立非因農隙不有所興今建國已久宮室已備永安前殿足以朝會萬國西堂溫室足以安御聖躬紫樓臨望可以觀望遠近若廣脩壯麗為異觀者宜漸致之不可倉卒計斫材運土及諸雜役須二萬人丁夫充作老小供餉合四萬人半年可訖古人有言一夫不耕或受其飢一婦不織或受其寒況數萬之眾其所損廢亦以多矣推之于古驗之于今必然之效也誠聖主所宜思量魏書高允傳郭善明勸高宗大起宮室允諫納之又見北史三十一諫文成帝不釐改風俗前朝之世屢發明詔禁諸婚娶不得作樂及葬送之日歌謠鼓舞殺牲燒葬一切禁斷雖條旨久頒而俗不革變將由居上者未能悛改為下者習以成俗教化陵遲一至于斯昔周文以百里之地脩德布政先于寡妻及于兄弟以至家邦三分天下而有其二明為政者先自近始詩云爾之教矣民胥效矣人君舉動不可不慎禮云嫁女之家三日不息燭娶婦之家三日不舉樂今諸王納室皆樂部給伎以為嬉戲而獨禁細民不得作樂此一異也古之婚者皆揀擇德義之門妙選貞閑之女先之以媒娉繼之以禮物集寮友以重其別親御輪以崇其敬婚姻之際如此之難今諸王十五便賜妻別居然所配者或長少差舛或罪入掖庭而以作合宗王妃嬪藩懿失禮之甚無復此過往年及今頻有檢劾誠是諸王過酒致責跡其元起亦由色衰相棄致此紛紜今皇子娶妻多出宮掖令天下小民必依禮限此二異也凡萬物之生靡不有死古先哲王作為禮制所以養生送死折諸人情若毀生以奉死則聖人所禁也然葬者藏也死者不可再見故深藏之昔堯葬穀林農不易畝舜葬蒼梧市不改肆秦始皇作為地市下錮三泉金玉寶貨不可計數死不旋踵尸焚墓掘由此推之堯舜之儉始皇之奢是非可見今國家營葬費損巨億一旦焚之以為灰燼苟靡費有益于亡者古之人奚獨不然今上為之而不輟而禁下民之必止此三異也古者祭必立尸序其昭穆使亡者有憑致食饗之禮今已葬之魂人直求貌類者事之如父母燕好如夫妻損敗風化瀆亂情禮莫此之甚上未禁之下不改絕此四異也夫大饗者所以定禮儀訓萬國故聖王重之至乃爵盈而不飲肴乾而不食樂非雅聲則不奏物非正色則不列今之大會內外相混酒醉喧譊罔有儀式又俳優鄙褻污辱視聽朝廷積習以為美而責風俗之清純此五異也今陛下當百王之末踵晉亂之獘而不矯然釐改以厲頹俗臣恐天下蒼生永不聞見禮教矣魏書高允傳又北史三十一又略見通典四十八荅宗欽書頃因行李承足下高問延佇之勞為日久矣王途一啟得敘其懷欣于相遇情無有已足下兼愛為心每能存顧養之以風味惠之以德音執翫反覆銘于心抱吾少乏尋常之操長無老成之致憑賴賢勝以自克勉而來喻襃飾有過其分既承雅贈即應有荅但唱高則難和理深則難詶所以留連日月以至于今今往詩一篇誠不足標明來旨且表以心幸恕其鄙滯領其至意魏書宗欽傳筮論昔明元末起白臺其高二十餘丈樂平王嘗夢登其上四望無所見王以問日者董道秀筮之曰大吉王默而有喜色後事發王遂憂死而道秀棄市道秀若推六爻以對王曰易稱亢龍有悔窮高曰亢高而無民不為善也夫如是則上寍于王下保于己福祿方至豈有禍哉今舍于本而從其末咎釁之至不亦宜乎魏書樂平王丕傳名字論魏書高允傳時中書博士索敞與侍郎傅默梁祚論名字貴賤著論紛紜允遂著名字論以釋其惑文今佚塞上公亭詩序延和三年余赴京師發石門北行失道路宿寓代之快馬亭其俗云古塞上翁所遺之邑也曰公有良馬因以命之此其所遺也負長城而面南山皋潭帶其側湧波灌其前停騑策以流目抱遺風以依然仰德音于在昔遂揮毫以寄言代人云塞上公姓李代之李氏竝其後也御覽百九十四徵士頌并序徵士頌并序昔歲同徵零落將盡感逝懷人作徵士頌蓋止于應命者其有命而不至則闕焉群賢之行舉其梗概矣今著之于左中書侍郎固安侯范陽盧玄子真郡功曹史博陵崔綽茂祖河內太守下樂侯廣甯燕崇玄略上黨太守高邑侯廣甯常陟公山征南大將軍從事中郎渤海高毗子翼征南大將軍從事中郎渤海李金道賜河西太守饒陽子博陵許堪祖根中書郎新豐侯京兆杜銓士衡征西大將軍從事中郎京兆韋閬友規京兆太守趙郡李詵令孫太常博士鉅鹿公趙郡李靈虎符中書郎即丘子趙郡李熙仲熙營州刺史建安公太原張偉仲業輔國大將軍從事中郎范陽祖邁征東大將軍從事中郎范陽祖侃士倫東郡太守蒲陰子中山劉策濮陽太守真定子常山許琛行司隸校尉中都侯西河宋宣道茂中書郎燕郡劉遐彥鑒中書郎武垣子河間邢穎宗敬滄水太守浮陽侯渤海高濟叔民太平太守原平子雁門李熙士元祕書監梁郡公廣平游雅伯度廷尉正安平子博陵崔建興祖廣平太守列人侯西河宋愔州主簿長樂潘天符郡功曹長樂杜熙征東大將軍從事中郎中山張綱中書郎上谷張誕叔術祕書郎雁門王道雅祕書郎雁門閔弼衛大將軍從事中郎中山郎苗大司馬從事中郎上谷侯辯陳留郡太守高邑子趙郡呂季才夫百王之御世也莫不資仗群才以隆治道故周文以多士克寍漢武以得賢為盛此載籍之所記由來之常義魏自神麚以後宇內平定誅赫連積世之僭掃窮髮不羈之寇南摧江楚西盪涼域殊方之外慕義而至于是偃兵息甲脩立文學登延雋造酬諮政事夢想賢哲思遇其人訪諸有司以求名士咸稱范陽盧玄等四十二人皆冠冕之冑著聞州邦有羽儀之用親發明詔以徵玄等乃曠官以待之懸爵以縻之其就命三十五人自餘依例州郡所遣者不可稱記爾乃髦士盈朝而濟濟之美興焉昔與之俱蒙斯舉或從容廊廟或游集私門上談公務下盡忻娛以為千載一時始于此矣日月推移吉凶代謝同徵之人凋殲殆盡在者數子然復分張往昔之忻變為悲慼張仲業東臨營州遲其還返一敘于懷齊衿于垂沒之年寫情于桑榆之末其人不幸復至殞歿在朝者皆後進之士居里者非疇昔之人進涉無寄心之所出入無解顏之地顧省形骸所以永歎而不已夫頌者美盛德之形容亦可以長言寄意不為文二十年矣然事切于心豈可默乎遂為之頌詞曰紫氣干霄群雄亂夏王龔徂征戎車屢駕掃盪遊氛克揃妖霸四海從風八垠漸化政教無外既寍且一偃武櫜兵唯文是恤帝乃旁求搜賢舉逸巖隱投竿異人竝出亹亹盧生量遠思純鑽道據德游蓺依仁旌弓既招釋褐投巾攝齊升堂嘉謀日陳自東徂南躍馬馳輪僭馮影附劉以和親茂祖煢單夙罹不造克己勉躬聿隆家道敦心六經遊思文藻終辭寵命以之自保燕常篤信百行靡遺位不苟進任理棲遲居沖守約好讓善推思賢樂古如渴如飢子翼致遠道賜悟深相期以義相和若琴竝參幕府俱發德音優游卒歲聊以寄心祖根運會克光厥猷仰緣朝恩俯因德友功雖後建祿實先受班同舊臣位竝群后士衡孤立內省靡疚言不崇華交不遺舊以產則貧論道則富所謂伊人實邦之秀卓矣友規稟茲淑亮存彼大方擯此細讓神與理冥形隨流浪雖屈王侯莫廢其尚趙實名區世多奇士山岳所鍾挺生三李矯矯清風抑抑容止初九而潛望雲而起詵尹西都靈惟作傅垂訓皇宮載理雲霧熙雖中夭迹階郎署餘塵可挹終亦顯著仲業淵長雅性清到憲章古式綢繆典誥時值險難常一其操納眾以仁訓下以孝化被龍川民歸其教邁則英賢侃亦稱選聞達邦家名行素顯志在兼濟豈伊獨善繩匠弗顧功不獲展劉許履忠竭力致躬出能騁說入獻其功輶軒一舉撓燕下崇名彰魏世享業亦隆道茂夙成弱冠播名與朋以信行物以誠怡怡昆弟穆穆家庭發響九皋翰飛紫冥頻在省闥亦司于京刑以之中政以之平猗歟彥鑒思參文雅率性任真器成非假靡矜于高莫恥于下乃謝朱門歸迹林野宗敬延譽號為四雋華藻雲飛金聲夙振中遇沈痾賦詩以訊忠顯于辭理出于韻高滄朗達默識淵通領新悟異發自心胸質侔和璧文炳雕龍燿姿天邑衣錦舊邦士元先覺介焉不惑振袂來庭始賓王國蹈方履正好是繩墨淑人君子其儀不忒孔稱游夏漢美淵雲越哉伯度出類踰群司言祕閣作牧河汾移風易俗理亂解紛融彼滯義渙此潛文儒道以析九流以分崔宋二賢誕性英偉擢穎閭閻聞名象魏謇謇儀形邈邈風氣達而不矜素而能貴潘符標尚杜熙好和清不潔流渾不同波絕悕龍津止分常科幽而逾顯損而逾多張綱柔謙叔術正直道雅洽聞弼為兼識拔萃衡門俱漸鴻翼發憤忘餐豈要斗食率禮從仁罔愆于式失不繫心得不形色郎苗始舉用均已試智足周身言足為治性協于時情敏于事與今而同與古曷異物以利移人以酒昏侯生潔己唯義是敦日縱醇醪逾敬逾溫其在私室如涉公門季才之性柔而執競屆彼南秦申威致命誘之以權矯之以正帝道用光邊土納慶群賢遭世顯名有代志竭其忠才盡其概體襲朱裳腰紐雙佩榮曜當時風高千載君臣相遇理實難偕昔因朝命舉之克諧披襟散想解帶舒懷此昕如昨存亡奄乖靜言思之中心九摧揮毫頌德潸爾增哀魏書高允傳北伐頌皇矣上天降鑒惟德眷命有魏照臨萬國禮化丕融王猷允塞靜亂以威穆民以則北虜舊隸稟政在蕃往因時逃命北轅世襲凶軌背忠食言招亡聚盜醜類實繁敢率犬羊圖縱猖蹶乃詔訓師興戈北伐躍馬裹糧星馳電發撲討虔劉肆陳斧鉞斧鉞暫陳馘翦厥旅積骸填谷流血成浦元兇狐奔假息窮墅爪牙既摧腹心亦阻周之忠厚存及行葦翼翼聖明有兼斯美澤被京觀垂此仁旨封尸野擭惠加生死生死蒙惠人欣覆育理貫幽冥澤漸殊域物歸其誠神獻其福遐邇斯懷無思不服古稱善兵歷時始捷今也用師辰不及浹六軍克合萬邦以協義著春秋功銘玉牒載興頌聲播之來葉魏書高允傳從顯祖北伐大捷而還至武川鎮上北伐頌其詞曰諸侯箴諸侯箴北史十六東平王翰傳文佚酒訓臣被敕論集往世酒之敗德以為酒訓臣以朽邁遭人倫所棄而殊恩過隆錄臣于將歿之年勖臣于已墜之地奉命驚惶喜懼兼甚不知何事可以上荅伏惟陛下以叡哲之姿撫臨萬國太皇太后以聖德之廣濟育群生普天之下罔不稱賴然日昃憂勤虛求不已思監往事以為警戒此之至誠悟通百靈而況于百官士民不勝踴躍謹竭其所見作酒訓一篇但臣愚短加以荒廢辭義鄙拙不足觀采伏願聖慈體臣悾悾之情恕臣狂瞽之意其詞曰自古聖王其為饗也玄酒在堂而𨣧酒在下所以崇本重源降于滋味雖汎爵旅行不及于亂故能禮章而敬不虧事畢而儀不忒非由斯致是失其道將何以範時軌物垂之于世歷觀往代成敗之效吉凶由人不在數也商辛耽酒殷道以之亡公旦陳誥周德以之昌子反昏酣而致斃穆生不飲而身光或長世而為戒或百代而流芳酒之為狀變惑性情雖曰哲人孰能自競在官者殆于政也為下者慢于令也聰達之士荒于聽也柔順之倫興于諍也久而不悛致于病也豈止于病乃損其命諺亦有云其益如毫其損如刀言所益者止于一味之益不亦寡乎言所損者夭年亂志夭亂之損不亦夥乎無以酒荒而陷其身無以酒狂而喪其倫迷邦失道流浪漂津不師不遵反將何因詩不言乎如切如磋如琢如磨朋友之義也作官以箴之申謨以禁之君臣之道也其言也善則三覆而佩之言之不善則哀矜而貸之此實先王納規之意往者有晉士多失度肆散誕以為不羈縱長酣以為高達調酒之頌以相眩曜稱堯舜有千鍾百觚之飲著非法之言引大聖為譬以則天之明豈其然乎且子思有云夫子之飲不能一升以此推之千鍾百觚皆為妄也今大魏應圖重明御世化之所暨無思不服仁風敦洽于四海太皇太后以至德之隆誨而不倦憂勤備于皇情誥訓行于無外故能道協兩儀功同覆載仁恩下逮罔有不遵普天率土靡不蒙賴在朝之士有志之人宜克己從善履正存貞節酒以為度順德以為經悟昏飲之美疾審敬慎之彌榮遵孝道以致養顯父母而揚名蹈閔曾之前軌遺仁風于後生仰以荅所授俯以保其成可不勉歟可不勉歟魏書高允傳太和二年引就內改定皇誥允上酒訓祭岱宗文維皇興二年敢昭告于岱宗之靈正趾坤元作鎮東夏齊二儀以永固崇至德以配天故能資元氣以造物協陰陽而變化若其嵓嶺峭峙川谷幽深神怪譎詭倏忽百靈吐納風雲育成萬品攝生之所歸焉禎祥之所萃焉是以歷代帝王之崇封禪銘功以告其成七十二君咸在茲焉自非功侔造化應同自然孰能若此者哉自我國家肅恭禋祀懷柔百神邦域之內罔不咸秩往以天路未夷雖望祭有在今大化既同奄有淮岱謹薦于嶽宗之靈尚饗初學記五
