body:
  text: 溫子升孝莊帝殺爾朱榮大赦詔蓋天道忌盈人倫嫉惡疏而不漏刑之無捨是以呂霍之門禍譴所伏梁董之家咎徵斯在頃孝昌之末天步孔艱女主亂政監國無主爾朱榮爰自晉陽同憂王室義旗之建大會盟津與世樂推共成鴻業論其始圖非無勞效但致遠恐泥終之實難曾未崇朝豺聲已露河陰之役安忍無親王公卿士一朝塗地宗戚靡遺內外俱盡假弄天威殆危神器時事倉卒未遑問罪尋以葛賊橫行馬首南向捨過責成用平醜虜及元皓問鼎大駕北巡復致勤王展力行所以此論功且可補過既位極宰衡地踰齊魯容養之至豈復是過但心如猛火山林無以供其暴意等漏卮江河無以充其溢既見金革稍寧方隅漸泰不推天功專為己力與奪任情臧否肆意無君之迹日月以甚拔髮數罪蓋不足稱斬竹書愆豈云能盡方復託名朝宗陰圖釁逆睥睨天居窺覦聖曆乃有裂冠毀冕之心將為拔本塞源之事天既厭亂人亦悔禍同惡之臣密來投告將而必誅罪無容捨又元天穆宗室末屬名望素微遭逢際會頗參義舉不能竭其忠誠以奉家國乃復棄本逐末背同即異為之謀主成彼禍心是而可忍孰不可恕並以伏辜自貽伊戚元惡既除人神慶泰便可大赦天下魏書孝莊紀帝殺爾朱榮元天穆于明光殿及榮子菩提乃升閶闔門詔云云魏書溫子升傳帝殺爾朱榮子升預謀當時赦詔子升詞也又見藝文類聚五十二孝莊帝生皇太子赦詔有國三善事屬元良本枝百世義鍾繼體朕應天纂命握圖受籙景祚唯新卜年以永令月吉辰皇子誕育彩雲映日神光照殿方開博望將起龍樓遠近同歡人神共悅便可大赦天下藝文類聚十六初學記十遷都拜廟鄴宮赦詔建國所先理屬于宗廟立事為大禮歸于禋祀大丞相渤海王神武命世重匡頽曆導塞源于將竭扶神器于已傾立天地之大功成人臣之重義朕以沖昧猥當樂推關路多虞襟帶難固瞻言往事取則前修乃襲去酆用追遷亳定鼎鄴都卜世惟永民用子來功成不日今清廟初興閟宮始就靈祇萃止祖考來格神光夜照香氣朝聞令月吉辰躬展誠敬時和氣婉景麗雲柔四表來庭萬國在位哀樂相交感慶兼集固宜觀象雷雨布寬大之恩取類澤風申肆眚之令可大赦天下藝文類聚五十二孝武帝答高歡敕前持心血遠以示王深冀彼此共相體悉而不良之徒坐生間二近孫騰倉卒向彼致使聞者疑有異謀故遣御史中尉綦雋具申朕懷今得王啓言誓懇惻反覆思之猶所未解以朕眇身遇王武略不勞尺刃坐為天子所謂生我者父母貴我者高王今若無事背王規相攻討則使身及子孫還如王誓皇天后土實聞此言近慮宇文為亂賀拔勝應之故纂嚴欲與王俱為聲援宇文今日使者相望觀其所為更無異迹賀拔在南開拓邊境為國立功念無可責君若欲分討何以為辭東南不賓為日已久先朝已來置之度外今天下戶口減半未宜窮兵極武朕既暗昧不知佞人是誰可列其姓名令朕知也如聞庫狄干語王云本欲取懦弱者為主王無事立此長君使其不可駕御今但作十五日行自可廢之更立餘者如此議論自是王間勳人豈出佞臣之口去歲封隆之背叛今年孫騰逃走不罪不送誰不怪王騰既為禍始曾無愧懼王若事君盡誠何不斬送二首王雖啓圖西去而四道俱進或欲南度洛陽或欲東臨江左言之者猶應自怪聞之者寧能不疑王若守誠不二晏然居北在此雖有百萬之衆終無圖彼之心王脫信邪棄義舉旗南指縱無匹馬隻輪猶欲奮空拳而爭死朕本寡德王已立之百姓無知或謂實可若為他所圖則彰朕之惡假令還為王殺幽辱齏粉了無遺恨何者王既以德見推以義見舉一朝背德舍義便是過有所歸本望君臣一體若合符契不圖今日分疏到此古語云越人射我笑而道之吾兄射我泣而道之朕既親王情如兄弟所以投筆拊膺不覺歔欷北齊書神武紀下帝據胡床拔劍作色子升乃為敕魏帝納皇后群臣上禮章臣聞軒轅乃神西陵以之作合夏后至聖塗山于是來嬪伏惟陛下龍飛纘曆大明理運長秋既建陰教有主景命無窮靈基長世普天之下莫不欣躍藝文類聚十五初學記十為上黨王元天穆讓太宰表臣聞策蹇長途終慚一日之致懸縷層臺詎任千鈞之重固知才弱不可自強力微難以企及智小謀大恐貽折足之憂才輕任重懼有絶臏之悔既慮鑠金固陳匪石藝文類聚四十五御覽二百六為西河王謝太尉表臣聞拂羽決起力謝摩天策蹇載馳功微送日將短翮難以陵高駑乘無由致遠雖復建旟出郡未追楚趙之風捧壺入侍徒踵金張之迹及天祚明德運啓興王六遂始遷九鼎初定于焉承乏有用當官草靡從風未遑克讓常恐執轡傾輪操刀傷錦藝文類聚四十六為安豐王延明讓國子祭酒表臣聞寶劍未砥猶乏切玉之功美箭闕羽尚無衝石之勢況才非會稽之竹質謝昆吾之金至于敷教東序流訓上庠置樽候酌懸鐘待叩必須蘊朱藍以成彩立規矩以為式垂三行于貴遊揚六藝于胄子而臣學愧聚沙問慚攻木雖歷文史不治章句于茲曠官青襟何仰藝文類聚四十六為司徒高敖曹謝表委水橫流群龍交戰徒悲道喪空懷主辱雖復見義援戈臨危奮劍顧慚後衄終謝先鞭事等泣河無救三川之竭有類憂天豈支四極之壞藝文類聚四十七為臨淮王彧謝封開府尚書令表臣道愧山東氣慚隴右激水弗堪摶風無力但以平原帶地資緒極天發趾自高理翮以遠出臨侯服既乏刺舉之能入踐帝閽又無應對之美空復受弋清廟推轂朱門孝闕淚河功慚汗海大寶遠隆橫草未樹顧以有涯願言知止藝文類聚四十八為南陽王寶炬讓尚書令表臣聞立而託乘乃成致遠之功坐以運舟遂有利涉之用若以輕任重課憑虛責實雖欲自勤終焉靡效藝文類聚四十八為廣陽王淵讓吏部尚書表假勢風雲非由羽翮徒得推遷就列僶俯當官曾無辟雍議禮之名詎有銅爵獻賦之敏而政本實繁司會尤切抑揚智地用捨時流實當年之準的乃一世之權衡得其人則分職之任隆非其才則曠官之失起藝文類聚四十八為廣陽王淵北征請大將表今四郊多壘三軍申發率土之濱莫敢寧晏況忝末屬復董元戎臣不盡心誰將竭力豈容飾讓苟違戎重但以軍旅之事實所未學求保重將隨方指麾臣請先驅被堅督戰若使旗鼓相望埃塵相接決機兩陳之間不辭萬死之地脫獨委臣專總戎旅兵術靡常軍機屢變以臣當之必所未達雖奉廟算有均膠柱藝文類聚五十九為御史中丞元匡奏劾于忠臣聞事主不以幽貞革心奉上不以趣捨虧節是以倚秦宮而慟哭復楚之功已多陟盧龍而樹勤廣魏之勳不淺而申包避賞君子于是義之田疇拒命良史所以稱美竊唯宮車晏駕天人位易正是忠臣孝子致節之秋前領軍將軍臣忠不能砥礪名行自求多福方因矯制擅相除假清官顯職歲月隆崇臣等在蕃之時乃心家國書誚往來憤氣成疚傷禮敗德臣忠即主謹案臣忠世以鴻勳盛德受遇纍朝出入承明左右機近幸國大災肆其愚戇專擅朝命無人臣之心裴郭受冤于既往宰輔黜辱于明世又自矯旨為儀同三司尚書令領崇訓衛尉原其此意便欲無上自處既事在恩後宜加顯戮請御史一人令史二人就州行決崔光與忠雖同受召而謂光既儒望朝之禮宗攝心虛遠不關世務但忠以光意望崇重逼光光若不同又有危禍伏度二聖欽明深垂昭恕而自去歲正月十三日世宗晏駕以後八月一日皇太后未親覽以前諸有不由階級而權臣用命或發門下詔書或由中書宣敕擅相拜授者已經恩宥正可免其叨竊之罪既非時望朝野所知冒階而進者並求追奪魏書于栗磾傳熙平元年御史中尉元匡奏為廣陽王淵上書言邊事邊豎構逆以成紛梗其所由來非一朝也昔皇始以移防為重盛簡親賢擁麾作鎮配以高門子弟以死防遏不但不廢仕宦至乃偏得復除當時人物欣慕為之及太和在曆僕射李沖當官任事涼州土人悉免廝役豐沛舊門仍防邊戍自非得罪當世莫肯與之為伍征鎮驅使但為虞候白直一生推遷不過軍主然其往世房分留居京者得上品通官在鎮者便為清途所隔或投彼有北以禦魑魅多復逃胡鄉乃峻邊兵之格鎮人浮遊在外皆聽流兵捉之于是少年不得從師長者不得遊宦獨為匪人言者流涕自定鼎伊洛邊任益輕唯底滯凡才出為鎮將轉相模習專事聚斂或有諸方姦吏犯罪配邊為之指蹤過弄官府政以賄立莫能自改咸言姦吏為此無不切齒憎怒及阿那瓌背恩縱掠竊奔命師追之十五萬衆度沙漠不日而還邊人見此援師便自意輕中國尚書令臣崇時即申聞求改鎮為州將允其願抑亦先覺朝廷未許而高闕戍主率下失和拔陵殺之敢為逆命攻城掠地所見必誅王師屢北賊黨日盛此段之舉指望銷平其崔暹隻輪不反臣崇與臣逡巡復路今者相與還次雲中馬首是瞻未便西邁將士之情莫不解體今日所慮非止西北將恐諸鎮尋亦如此天下之事何易可量魏書廣陽王建閭附傳又上言今六鎮俱叛二部高車亦同惡黨以疲兵討之必不制敵請簡選兵或留守恆州要處更為後圖魏書廣陽王建閭附傳為廣陽王淵具言城陽王徽搆隙意狀往者元叉執權移天徙日而徽託附無翼而飛今大明反政任寄唯重以徽褊心銜臣切骨臣以疏滯遠離京輦被其構阻無所不為然臣昔不在其後自此以來翻成陵谷徽遂一歲八遷位居宰相臣乃積年淹滯有功不録自徽執政以來非但抑臣而已北征之勳皆被擁塞將士告捷終無片賞雖為表請多不蒙遂前留元標據于盛樂後被重圍析骸易子倒懸一隅嬰城二載賊散之後依階乞官徽乃盤退不允所請而徐州下邳戍主賈勳法僧叛後暫被圍逼固守之勳比之未重乃立得州即授開國天下之事其流一也功同賞異不平謂何又驃騎李崇北征之日啓募八州之人聽用關西之格及臣在後依此科賞復言北道征者不得同于關西定襄陵廟之至重平城守國之要鎮若計此而論功亦何負于秦楚但以嫉臣之故便欲望風排抑然其當途以來何直退勳而已但是隨臣征者即便為所嫉統軍袁叔和曾經省訴徽初言有理又聞北征隸臣為統應時變色復令臣兄子仲顯異端訟臣緝緝翩翩謀相誹謗言臣惡者接以恩顏稱臣善者即被嫌責甄琛曾理臣屈乃視之若仇讎徐紇頗言臣短即待之如親戚又驃騎長史祖瑩昔在軍中妄增首級矯亂戎行蠹害軍府獲罪有司避命山澤直以謗臣之故徽乃還雪其罪臣府司馬劉敬比送降人既到定州翻然背叛賊如決河豈其能擁且以臣府參寮不免身首異處徽既怒遷捨其元惡及胥徒從臣行者莫不悚懼頃恆州之人乞臣為刺史徽乃斐然言不可測及降戶結謀臣頻表啓徽乃因執言此事及向定州遠彼姦惡又復論臣將有異志翻覆如此欲相陷沒致令國朝遽賜遷代賊起之由誰使然也徽既優幸任隆一世慕勢之徒于臣何有是故餘人攝選車馬填門及臣居邊賓遊罕至臣近比為慮其為梗是以孜孜乞赴京闕屬流人舉斧元戎垂翅復從後命自安無所僶俯先驅不敢辭事及臣出都行塵未滅已聞在後復生異議言臣將兒自隨證為可疑之兆忽稱此以構亂悠悠之人復傳音響言左軍臣融右軍臣衍皆受密敕伺察臣事徽既用心如此臣將何以自安竊以天步未夷國難猶梗方伯之任于斯為急徽昔臨藩乃有人譽及居端右蔑爾無聞今求出之為州使得申其利用徽若外從所長臣無內慮之切脫蒙公私幸甚魏書廣陽王建閭附傳深除大都督城陽王徽搆深靈太后遣使問深意狀乃具言鐘銘宮商遞變律呂相生立號則起從革以成調之必應擊而不橫銅盤韻響火鳥和聲出入成則明宵有音初學記十六舜廟碑懷山不已龍門未闢大道御世天下為公感夢長人明揚仄陋釐降二女結友九男執耜歷山耕夫所以讓畔施罟雷澤漁父于是讓川亦既登庸以之納録九官咸事百揆時敘有大功于當世集曆數而在躬受文祖之命致昭華之玉班五瑞于群后禋六宗于上玄舞干戚而遠夷賓棄金璧而幽靈應青雲浮洛榮光塞河符瑞必臻休祥咸萃以君人之大德為帝王之稱首陟方之駕遂往蒼梧之窆不歸爰自先民實存舊廟既緝藥房遂鎮瑤席龍駕帝服蓋依稀于慕舜交鼓互瑟實髣佛于聞韶其辭曰虹氣降靈姚墟誕聖樹陰未徙帝圖已定乃賓四門以齊七政天眷功高民歸德盛治既蕩蕩化亦巍巍南風在詠西環有歸疑山永逝湘水長違靈宮肅肅神館微微藝文類聚十一侯山祠堂碑侯山祠堂碑魏書溫子升傳作侯山祠堂碑文常景見而善之常山公主碑啓泰微之層搆闢閶闔之重扉據天下以為家苞率土而光宅然則昆山西峙爰有夜光漢水東流是生明月公主稟靈宸極資和天地芬芳有性溫潤成質自然祕遠若上元之隔絳河直置清高類姮娥之依桂樹令淑之至比光明于宵燭幽間之盛匹穠華于桃李託體宮闈而執心撝順婉然左辟率禮如賓舉華燭以宵征動鳴佩而晨去致肅雍于車乘成好合于琴瑟立行潔于清冰抗志高于黃鵠停輪表信闔門示禮終能成其子姓貽厥孫謀而鍾漏相催日夜不息川有急流風無靜樹奄辭身世從宓妃于伊洛遽捐館舍追帝子于瀟湘銘曰龍轡莫援日車遂往奄離形神忽歸丘壤祖歌薤露出奏巫山永厝中野終掩窮泉蕭瑟神道荒涼墓田松檟徒列琬琰空傳藝文類聚十六齊獻武王碑魏書溫子升傳齊文襄使之作獻武王碑文既成乃餓諸晉陽獄寒陵山寺碑昔晉文尊周績宣于踐土齊桓霸世威著于邵陵並道冠諸侯勳高天下衣裳會同之所兵車交合之處寂寞銷沈荒涼磨滅言談者空知其名遙遇者不識其地然則樹銅表迹刊石記功有道存焉可不尚歟永安之季數鍾百六天災流行人倫交喪爾朱氏既絶彼天綱斷茲地紐祿去王室政出私門銅馬競馳金虎亂噬九嬰暴起十日並出破璧毀圭人物既盡頭會箕斂杼柚其空大丞相渤海王命世作宰惟機成務標格千仞崖岸萬里運鼎阿于襟抱納山嶽于胸懷擁玄雲以上騰負青天而高引鍾鼓嘈囋上聞于天旌旗繽紛下盤于地壯士懍以爭先義夫憤而競起兵接刃于斯場車錯轂于此地轟轟隱隱若轉石之墜高崖硠硠磕磕如激水之投深谷俄而霧卷雲除冰離葉散靡旗蔽日亂轍滿野楚師之敗于柏舉新兵之退自昆陽以此方之未可同日既考茲沃壤建此精廬砥石礪金瑩珠琢玉經始等于佛功制作同于造化息心是歸淨行攸處神異畢臻靈仙總萃鳴玉鸞以來遊帶霓裳而至止翔鳳紛以相嚾飛龍蜿而俱躍雖復高天銷于猛炭大地淪于積水固以傳之不朽終亦記此無忘藝文類聚七十七印山寺碑自結繩運往觀象代興禮樂相因詩書間出喻是非于一指論道德于二篇九流之義遂開百家之言並作皆以賦命有遭隨攝養致夭壽愛惠起于吉凶情偽動于利害雖改張羅之呪未易釁鐘之牲因果之業未申感應之途猶蔽是以修短有命子夏論之而未詳報施在天史遷言之而未悟大丞相渤海王膺嶽瀆之靈感辰象之氣直置與蘭桂齊芳自然共圭璋比潔加以體備百行智周萬象道兼語默思極天人固以兆云非虎自懷公輔之德世稱臥龍實在王佐之器道足以濟天下行足以通神明表立人之上才含廣途之大量永安之末時各異謀蜂蠆有毒豺狼反噬彀弩臨城抽戈犯蹕世道交喪海水群飛既而蒼龍入隱白虎出見命世有期匡時作宰拯沈溺以援手涉波瀾而濡足懸曒日于胸懷起大風于襟袖動之以仁義行之以忠貞附之者影從應之者響起藝文類聚七十七大覺寺碑維天地開闢陰陽轉運明則有日月幽則有鬼神初地遼遠末路悠長自始及終從凡至聖積骨成山祗劫莫數垂衣拂石恆河難計及冠日示夢蒙羅見謁應世降神感物開化顏如滿月心若盈泉體道獨悟含靈自曉居三殿以長想出四門而永慮聲色莫之留榮位不能屈道成樹下光屬天上變化靡窮神通無及置須彌于葶藶納世界于微塵闢慈悲之門開仁壽之路拯煩惱于三塗濟苦難于五濁非但化及天龍教被人鬼固亦福霑行雁道洽遊魚但群生無感獨尊罷應雜色照爛諸山搖動布金沙而弗受建寶蓋而未留遂上微妙之臺永升智慧之殿而天人慕德像法興靈圖影西山承光東壁主上乃據地圖攬天鏡乘六龍朝萬國牢籠宇宙襟帶江山道濟橫流德昌頽歷四門穆穆百僚師師乘法船以徑度駕天輪而高舉神功寶業既被無邊鴻名懋實方在不朽抵掌措言雖不盡意執筆書事其能已乎藝文類聚七十七定國寺碑蓋兩儀交運萬物並生始自苦空終于長樂而緣障未開業塵猶擁漂淪欲海顛墜邪山雖復光華並于日月術數窮于天地有扶危定傾之力為濟世夷難之功登塗山而未歸遊建水而不反並馳于苦樂之境皆入于生死之門幽隱長夜未覩山北之燭沈迷遠路詎見司南之機昔日先民雖云善誘尚習蓋纏未能解脫至如八卦成象示之以吉凶百藥為醫道之以利害衣食有業民免飢寒之憂水土既平人無墊溺之患斯誠事周于世用功濟于生民不論過去之因緣詎辨未來之果報惟無上大覺均悟玄機應現託生方便開教聖靈之至無復等級威神之力不可思議動三乘之駕泛八解之流引諸子于火宅渡群生于海岸自一音輟響雙樹潛神智慧雖徂象法猶在光照金盤言留石室遍諸世界咸用歸仰藝文類聚七十七司徒元樹墓志銘昔樞電降祥姬水成業握八符以馭世膺五命以會昌欽明格于上下光澤被于宇宙卜年永久歷世遐長有文王之孫子啓周公之苗裔積善所及踵武稱賢每以辛李為言恆持韓白自許殫百慮之一致盡能事于生民蒼蒼在上義歸無厚徒有東平避世之意空懷北海自晦之情疾非逢霧終異啓手銘曰明允篤誠發于岐嶷未鏤已雕不扶而直修禮以耕強學為殖孔既歎魯莊亦吟越況以度思有懷明發翻然高舉歸于魏闕長路未窮朝光已沒藝文類聚四十七司徒祖塋墓銘自天命生商王居徙亳源流毖遠枝葉繁華祖德潤于身聲高邦國父行成于己名重京師公鍾美多福資神積善器局間靈志識開悟口含碧雞之辨手握雕龍之文門有善業家傳慶靈礪金成器相遺滿籯琢玉為寶待價聯城匪直也人實惟有道言析秋毫辭連春藻藝文類聚四十七閶闔門上梁祝文維王建國配彼太微大君有命高門啓扉良辰是簡穆卜無違雕梁乃架綺翼斯飛八龍杳杳九重巍巍居宸納祜就日垂衣一人有慶四海攸歸藝文類聚六十三初學記二十四論佛教表三墳五典帝皇之稱首四維六紀終古之規模及漢武祀金人莽新以建國桓靈祀浮圖閹豎以控權三國由茲鼎峙五胡仍其薦食衣冠奔于江東戎教興于中壤使父子之親隔君臣之義乖夫婦之和曠友朋之信絶海內殽亂三百年矣稽古之詔未聞崇邪之命重沓歲時禘祫未嘗親享竹脯麵牲斯誣宗廟違黃屋之尊就蒼頭之役朝夕敬妖怪之胡鬼曲躬供貪淫之賊禿耽信邪胡諂祭淫祀恐非聰明正直而可以福祐陛下者也臣請言得失推校是非案釋氏源流本中國所斥投之荒裔以禦魑魅者也乃至舜時竄檮杌于三峗左傳允姓之姦居于瓜州是也杜預以允姓陰戎之別祖與三苗俱放于三峗漢書西域傳塞種本允姓之戎世居敦煌為月氏迫逐遂任蔥嶺南奔又謂懸度賢豆身毒天毒仍訛轉以塞種為釋種其實一也允姓與三苗比居教迹和洽其釋種不行忠孝仁義貪詐甚者號之為佛佛者戾也或名為勃勃者亂也而陛下以中華之盛胄方尊姚石羌胡之軌躅竊不取一也又案釋迦出戎剖脅而誕摩耶遂殂事符梟獍年長爭立內不自安背父叛君逆節彌甚達多投石難陀引弓變革常道自餓形骸安能濟物聚合凶徒易衣削髮設言虛誕不足承稟九十六道此道最貪叶彼淫愚衆多崇信至如琉璃誅釋瞿曇路左視之在生親尚不存既歿疏何能救斯即不行忠孝若天下習之陛下則無以自處不取者二也今僧尼不耕不偶俱斷生育傲君陵親違禮損化一不經也凡在生靈夫婦配合産育男女胡法反之多營泥木專求布施寧非巨戾二不經也姦胡矯詐自稱大覺而比丘徒黨行淫殺子僧尼悉然害螻蟻而起浮圖費財力而角堂宇若牟尼能照而故縱淫殺便是詐稱慈悲徒能照而不能救又是大覺于群生無益而天下不覺三不經也胡法慳貪唯財是與直是行三毒而害萬方未見修六度而隆三寶四不經也佛家遺教不耕墾田不貯財穀乞食納衣頭陀為務今則不然數十萬衆無心蘭若從教不耕者衆天下有飢乏之憂違教設法不行何須此法進退未為盡理五不經也涅槃發問世尊滅後經教若為得與波旬經別觀此發問則瞿曇存日門徒不能分辨真偽況中華避役姦詐之侶焉不迷惑者涅槃闍王害父耆婆敘狀佛以理除令其迷解俗唯事結惑網愈深故以陰界入中求父不得本唯妄想謂父實人橫生圖害取其重位若先達解知父本空何心起逆國亦非有由佛開化達悟妄心退悔慚謝獲無根信融縝立論無能破之自古帝師諸侯賓友千載一逢猶如旦暮賢明希世宇宙獨立今乃削髮千群不臣萬衆稱為帝師未之可也姚石玉食三千佛寺瓊宮八百供敬厚矣終獲苗胤屠滅宋齊已降莫懲前失僧出寒微規免租役無期詣道志在貪淫竊盜華典傾奪朝權凡有十等一曰營繕廣廈僭擬皇居也二曰興建大室莊飾胡像僭比明堂宗祀也三曰廣譯妖言勸行流布轢帝王之詔敕也四曰交納泉布賣天常五福之虛果奪大君之德賞也五曰豫徵收贖免地獄六極之謬殃奪人主之刑罰也六曰自稱三寶假託四依坐傲君王此取威之術也七曰多建寺像廣度僧尼此定霸之基也八曰三長六紀四大法集此別行正朔密行徵發也九曰設樂以誘愚小俳優以招遠會陳佛土安樂斥王化危苦此變俗移風徵租稅也十曰法席聚會邪謀變通稱意贈金毀破遭謗此呂尚之六韜祕策也凡此十事不容有一萌兆微露即合誅夷今乃恣意流行排我王化方又擊鴻鐘于高臺期闕庭之箭漏挂幡蓋于長剎放充庭之鹵簿徵玉食以齋會雜王公之享燕唱高越之贊唄象食舉之登歌歎功德則比陳詞之祝史受襯施則等束帛之等差設威儀則效旌旗之文物凡諸舉措竊擬朝儀云云陛下方更傾儲供寺萬乘擬附庸之儀肅拜僧尼三事執陪臣之禮寵既隆矣侮亦劇矣臣不取者四也陛下以因果有必定之期報應無遷延之業故崇重像法供施彌隆勞民伐木燒掘螻蟻損傷和氣豈顧大覺之慈悲乎胡鬼堪能致福可廢儒道釋禿足能除禍屏絶干戈今乃重關以備不虞擊柝以爭空地殺螻蟻而營功德既乖釋典崇妖邪而行諂祭又虧名教五尺牧豎猶知不疑四海之尊義無二三其德臣為陛下不取五也秦政受誑于三山漢徹見欺于五利信順妖訛一至于此不察情偽豈懲前失宋齊兩代重佛敬僧國移廟改者但是佛妖僧偽姦詐為心墮胎殺子昏淫亂道故使宋齊磨滅今宋齊寺像見在陛下承事則宋齊之變不言而顯矣今僧尼坐夏不殺螻蟻者愛含生之命也而傲君父妄仁于䖵蟲也墮胎殺子反養于蚊虻也夫易者君臣夫婦父子三綱六紀也今釋氏君不君乃至子不子綱紀紊亂矣云云廣弘明集七見執下辨自傷年幾摧穨恐功名不立舍兒女之情起風雲之事故挾天子誅權臣北史八十三造像記延昌元年歲次壬辰十一月丁亥朔四日清信士弟子劉洛真兄弟為亡父母敬造彌勒像二區使亡父母託生紫微安樂之處還願七世父母師僧眷屬見在居門老者延年少者益笇使法界有生一時成佛咸願如是碑拓本
