body:
  text: 卷四孝文帝為里黨法詔夫任土錯貢所以通有無并乘定賦所以均勞逸有無通則民財不圚勞逸均則人樂其業此自古之常道也又鄰里鄉黨之制所由來久欲使風教易周家至日見以大督小從近及遠如身之使手幹之總條然後口算平均義興訟息是以三典所同隨世汙降二監之行從時損益故鄭僑復丘賦之術鄒人獻盍徹之規雖輕重不同而當時俱適自昔以來諸州戶口籍貫不實包藏隱漏廢公罔私富彊者并兼有餘貧弱者糊口不足賦稅齊等無輕重之殊力役同科無衆寡之別誰建九品之格而豐埆之土未融雖立均輸之楷而蠶績之鄉無異致使淳化未樹民情偷薄朕每思之良懷深慨今革舊從新為里黨之法在所牧守宜以喻民使知去煩即𥳑之要魏書食貨志詳改不孝罪詔三千之罪莫大于不孝而律不遜父母罪止髡刑于理未衷可更詳改魏書刑罰志除門房誅詔前令公卿論定刑典而門房之誅猶在律策違失周書父子異罪推古求情意甚無取可更議之刪除繁酷魏書刑罰志求言詔春旱至今野無青草上天致譴實由匪德百姓無辜將罹饑饉寤寐思來罔知所益公卿內外股肱之臣謀猷所寄其極言無隱以救民瘼魏書孝文紀下聽民出關就食詔今年穀不登聽民出關就食遣使者造籍分遣去留所在開倉賑恤魏書孝文紀下更定律文詔律文刑限三年便入極默坐無大半之校罪有死生之殊可詳案律條諸有此類更一刊定魏書刑罰志重檢戶籍詔去夏以歲旱民饑須遣就食舊籍雜亂難可分𥳑故依局割民閲戶造籍欲令去留得實賑貸平均然乃者以來猶有餓死衢路無人收識良由來部不明籍貫未實廩恤不周以至于此朕猥居民上聞用慨然可重遣精檢勿令遺漏魏書孝文紀下黨里推長者以教民詔鄉飲禮廢則長幼之敘亂孟冬十月民閒歲隙宜于此時導以德義可下諸州黨里之內推賢而長者教其里人父慈子孝兄友弟順夫和妻柔不率長教者具以名聞魏書孝文紀下出府庫以班賚軍民詔罷尚方綿繡綾羅之工四民欲造任之無禁其御府衣服金銀珠玉綾羅錦繡太官雜器太僕乘具內庫弓矢出其太半班賚百官及京師士庶下至工商皂隸逮于六鎮戍士各有差魏書孝文紀下停拷問詔朕惟上政不明令民陷身罪戾今寒氣徑切杖捶難任自今月至來年孟夏不聽拷問罪人又歲既不登民多饑窘輕繫之囚宜速決了無令薄罪久留獄犴魏書孝文紀下大破蠕蠕勞陽平王頤詔王之前言果不虛也魏書陽平王新成附傳頤與陸睿集三道諸將軍過大磧大破蠕蠕頤入朝詔云云報廣陵侯衍詔大破蠕蠕勞陽平王頤詔可謂無厭求也所請不合魏書陽平王新成附傳頤弟衍為梁州刺史表請假王以崇威重詔云云以李彪為祕書丞參著作詔平爾雅志正爾筆端書而不法後世何觀魏書李彪傳還免流徙年老及死刑親老詔鎮戍流徙之人年滿七十孤單窮獨雖有妻妾而無子孫諸如此等聽解名還本諸犯死刑者父母祖父母年老更無成人子孫旁無朞親者具狀以聞魏書孝文紀下月蝕慎刑詔日月薄蝕陰陽之恆度耳聖人懼人君之放怠因之以設誡故稱日蝕修德月蝕修刑乃癸已夜月蝕盡公卿已下宜慎刑罰以答天意魏書孝文紀下斷升樓散物詔升樓散物以賚百姓至使人馬騰踐多有毀傷今可斷之以本所費之物賜窮老貧獨者魏書孝文紀下議祫禘詔禮記祭法稱有虞氏禘黃帝大傳曰禘其祖之所自出又稱不王不禘論曰諦自既灌詩頌長發大禘爾雅曰禘大祭也夏殷四時祭礿禘蒸嘗周改禘為祠祭義稱春祭秋嘗亦夏殷祭也王制稱犆礿祫禘祫嘗祫蒸其禮傳之文如此鄭玄解禘天子祭圓丘曰禘祭宗廟大祭亦曰禘三年一祫五年一禘祫則合群毀廟之主于太廟合而祭之禘則增及百官配食者審諦而祭之天子先禘祫而後時祭諸侯先時祭而後禘祫魯禮三年喪畢而祫明年而禘圓丘宗廟大祭俱稱禘祭有兩禘明也王肅解禘祫稱天子諸侯皆禘于宗廟非祭天之祭郊祀后稷不稱禘宗廟稱禘禘祫一名也合而祭之故稱祫審諦之故稱禘非兩祭之名三年一祫五年一禘總而互舉之故稱五年再殷祭不言一禘一祫斷可知矣禮文大略諸儒之說盡具干此卿等便可議其是非魏書禮志一太和十三年五月王戌高祖臨皇信堂引見群臣詔又見通典五十祫禘互取鄭王二義詔尚書中書等據二家之義論禘祫詳矣然于行事取衷猶有未允監等以禘祫為名義同王氏禘祭圓丘事與鄭同無所間然尚書等與鄭氏同兩名兩祭竝存竝用理有未稱俱據二義一時禘祫而闕二時之禘事有難從夫先王制禮內緣人子之情外協尊卑之序故天子七廟諸侯五廟大夫三廟數盡則毀藏主于太祖之廟三年而祫祭之世盡則毀以示有終之義三年而祫以申追遠之情禘祫既是一祭分而兩之事無所據毀廟三年一祫又有不盡四時于禮為闕七廟四時常祭祫則三年一祭而又不究四時于情為𥳑王以禘祫為一祭王義為長鄭以圓丘為禘與宗廟大祭同名義亦為當今互取鄭王二義禘祫并為一名從王禘是祭圓丘大祭之名上下同用從鄭若以數則黷五年一禘改祫從禘五年一禘則四時盡禘以稱今情則依禮文先禘而後時祭便即施行著之于令永為世法魏書禮志一帝曰云云通典五十作詔曰六宗詔詳定朝令祀為事首以疑從疑何所取正昔石渠虎閣之議皆準類以引義原事以準情故能通百家之要定纍世之疑況今有文可據有本可推而不評而定之其致安在朕躬覽尚書之文稱肆類上帝禋于六宗文相連屬理似一事上帝稱肆而無禋六宗言禋而不別其名以此推之上帝六宗當是一時之祀非別祭之名肆類非獨祭之日焚禋非他祀之用六宗者必是天皇大帝及五帝之神明矣禋是祭帝之事故稱禋以關其他故稱六以證之然則肆類上帝禋于六宗一祭也互舉以成之今祭圓丘五帝在焉其牲幣俱禋故稱肆類上帝禋于六宗一祭而六祀備焉六祭既備無煩復別立六宗之位便可依此附令永為定法魏書禮志一南安王楨削爵詔南安王楨以懿戚之貴作鎮關右不能潔己奉公助宣皇度方肆貪欲殖貨私庭放縱姦囚壅絶訴訟貨遺諸使邀求虛稱二三之狀皆犯刑書昔魏武翦髮以齊衆叔向戮弟以明法克已忍親以率天下夫豈不懷有為而然耳今者所犯事重疇日循古推刑實在難恕皇太后天慈寬篤恩矜國屬每一尋推高宗孔懷之近發言哽塞悲慟于懷且以南安王孝養之名聞于內外特一原恕削除封爵以庶人歸第禁錮終身魏書南安王楨傳為辥虎子辨誣詔夫君臣體合則功業可興上下猜懼則治道替矣沛郡太守邵安下邳太守張攀咸以貪婪獲罪各遣子弟詣闕告刺史虎子縱民通賊妄稱無端安宜賜死攀及子僧保鞭一百配敦煌安息他生鞭一百可集州官兵民等宣告行決塞彼輕狡之源開此陳力之效魏書辥野豬附傳虎子為徐州刺史沛郡太守邵安下邳太守張攀咸以贓汙虎子案之于法安等遣子弟上書誣虎子南通賊虜推驗果虛乃下詔答高閭詔省表聞之當敕有司依此施行魏書高閭傳議五德詔丘澤初志配尚宜定五德相襲分敘有常然異同之論著于往漢未詳之說疑在今史群官百辟可議其所應必令合衷以成萬代之式魏書禮志一祖奠停常從詔自丁荼苦奄踰晦朔仰遵遺旨祖奠有期朕將親侍龍輿奉訣陵隧諸常從之具悉可停之其武衛之官防侍如法魏書孝文紀下答安定王休請展安兆域詔凶禍甫爾未忍所請魏書禮志三文明太后崩安定王休等詣闕表詔答又詔答自遭禍罰慌惚如昨奉侍梓宮猶悕髣佛山陵遷厝所未忍聞魏書禮志三通典八十仰尋遺旨俯聞所奏倍增號絶山陵可依典冊如公卿所議衰服之宜情所未忍別當備敘在心魏書禮志三通典八十葬文明馮太后詔尊旨從儉不申罔極之痛稱情允禮仰損儉訓之德進退思惟倍用崩感又山陵之節亦有成命內則方丈外裁掩坎脫于孝子之心有所不盡者室中可二丈墳不得過三十餘步今以山陵萬世所仰復廣為六十步辜負遺旨益以痛絶其幽房大小棺槨質約不設明器至于素帳縵茵瓷瓦之物亦皆不置此則遵先志從冊令俱奉遺事而有從有違未達者或以致怪梓宮之裏玄堂之內聖靈所憑是以一一奉遵仰昭儉德其餘外事有所不從以盡痛慕之情其宣示遠近著告群司上明儉誨之善下彰違命之失魏書文成文明馮后傳又詔答安定王休比當別敘在心魏書禮志三文明太后既葬休又表詔答詔李沖宣旨于東陽王丕等仰惟先后平日近集群官共論政治平秩民務何圖一旦禍酷奄鍾獨見公卿言及喪事追惟荼毒五內崩摧魏書禮志三詔答東陽王丕等追惟慈恩昊天罔極哀毀常事豈足關言既不能待沒而朝夕食粥粗亦支任二公何足以至憂怖所奏先朝成事亦所具聞祖宗情專武略未修文教朕今仰稟聖訓庶習古道論時比事又與先世不同太尉等國老政之所寄于典記舊式或所未悉且可知朕大意其餘喪禮之儀古今異同漢魏成事及先儒所論朕雖在衰服之中以喪禮事重情在必行故暫抑哀慕躬自尋覽今且以所懷別問尚書游明根高閭等公且可任之魏書禮志三詔游明根高閭等卿等猶以朕之未除于上不忍專釋于下奈何令朕獨忍于親舊論云王者不遂三年之服者屈已以寬群下也先后之撫群下也念之若子視之猶傷卿等哀慕之思既不求寬朕欲盡罔極之慕何為不可但逼遺冊不遂乃心將欲居廬服衰寫朝夕之慕升堂襲素理日吳之勤使大政不荒哀情獲遂吉不害于凶凶無妨于吉以心處之謂為可爾遺旨之文公卿所議皆服終三旬釋衰襲吉從此而行情實未忍遂服三年重違旨誥今處二理之祭望望至期使四氣一周寒暑代易雖不盡三年之心得一經忌日情結差申案禮卒哭之後將受變服于朕受日庶民及小官皆命即吉內職羽林中郎已下虎賁郎已上及外職五品巳上無衰服者素服以終三月內職及外臣衰服者變從練禮外臣三月而除諸王三都駙馬及內職至來年三月晦朕之練也除凶即吉侍臣比服斯服隨朕所降此雖非舊式推情即理有貴賤之差遠近之別魏書禮志三通典八十詔李彪等太伯之言有乖今事諸情備如前論更不重敘古義亦有稱王者除衰而諒暗終喪者若不許朕衰朕則當除衰暗默委政冢宰二事之中惟公卿所擇魏書禮志三通典八十詔東陽王丕太尉國老言先朝舊事誠如所陳但聰明正直唯德是依若能以道不召自至苟失仁義雖請弗來大禍三月而備行吉禮深在難忍縱即吉之後猶所不行況數旬之中而有此理恐是先朝萬得之一失未可以為常式朕在不言之地不應如此但公卿執奪朕情未忍從遂成往復追用悲絶魏書禮志三通典八十變服從練禮詔公卿屢依金冊遺旨中代權式請過葬即吉朕思遵遠古終三年之制依禮既虞卒哭此月二十一日授服以葛易麻既衰復在上公卿不得獨釋于下故于朕之授服變從練禮已下服為節降斟酌今古以制厥衷且取遺旨速除之一端粗申臣子罔極之巨痛魏書孝文紀下公卿屢上啓事依據金冊遺旨中代成式求過葬即吉朕仰惟恩重不勝罔極之痛思遵遠古終三年之禮比見群官具論所懷今依禮既虞卒哭剋此月二十日受服以葛易麻既衰服在上公卿不得獨釋于下故于朕之授變從練已下復為節降斷度今古以情制衷但取遺旨速除之一節粗申臣子哀慕之深情欲令百官同知此意故用宣示便乃變禮感痛彌深魏書禮志三通典八十詔答穆亮苟孝弟之至無所不通今飄風亢旱時雨不降實由誠慕未濃幽顯無感也所言過哀之咎諒為未衷省啓以增悲愧魏書穆崇附傳衰服過朞詔朕遠遵古式欲終三年之禮百辟群官據金冊顧命將奪朕心從先朝之制朕仰惟金冊俯自推省取諸二衷不許衆議以衰服過朞終四節之慕又奉聖訓聿修誥旨不取暗默自居以曠機政庶不愆遺令之意差展哀慕之情普下州鎮長至三元絶告慶之禮魏書孝文紀下答群官詔群官以萬機事重請求聽政朕仰祗遺命亦思無怠但哀慕纏綿心神迷塞未堪自力以親政事近侍先掌機衡者皆謀猷所寄且可任之如有疑事當時與論決魏書孝文紀下冬至入臨詔垂及至節咸慕崩摧凡在臣列誰不哽切內外職人先朝班次及諸方雜客冬至之日盡聽入臨三品已上衰服者至夕復臨其餘旦臨而已其拜哭之節一依別儀魏書孝文紀下依議魏為水德詔越近承遠情所未安然放次推時頗亦難繼朝賢所議豈朕能有違奪便可依為水德祖申臘辰魏書禮志一還吐谷渾俘獲詔朕在哀疚之中未存征討而去春枹罕表取其洮陽埿和二戍時以此既邊將之常即便聽許及偏師致討二戍望風請降執訊二千餘人又得婦女九百口子婦可悉還之魏書吐谷渾傳北史九十六以李彪為祕書令詔歷觀古事求能非一或承藉微蔭著德當時或見拔幽陋流名後葉故毛遂起賤奮抗楚之辨苟有才能何必拘族也彪雖宿非清第本闕華資然識性嚴聰學博墳籍剛辨之才頗堪時用兼憂吏若家載宣朝美若不賞庸敘績將何以勸獎勤能可特遷祕書令以酬厥款魏書李彪傳旱災責己詔昔成湯遇旱齊景逢災竝不由祈山川而致雨皆至誠發中澍潤千里萬方有罪在子一人今普天喪恃幽顯同哀神若有靈猶應未忍安饗何宜四氣未周便欲祀事唯當考躬責已以待天譴魏書孝文紀下下尚書思慎營建明堂詔夫覆載垂化必由四氣運其功曦曜望舒亦須五星助其暉仰惟聖母睿識自天業高曠古稽詳典範日新皇度不圖罪逆招禍奄丁窮罰追惟罔極永無逮及思遵先旨敕造明堂之樣卿所制體含六合事越中古理圓義備可軌之千載信是應世之材先固之器也群臣瞻見模樣莫不僉然欲速造朕以寡昧亦思造盛禮卿可即于今歲停宮城之作營建此構興皇代之奇制遠成先志近副朕懷南齊書魏虜傳改營太廟定昭穆詔祖有功宗有德自非功德厚者不得擅祖宗之名居二祧之廟仰惟先朝舊事舛駮不同難以取準今將述遵先志具詳禮典宜制祖宗之號定將來之法烈祖有創基之功世祖有開拓之德宜為祖宗百世不遷而遠祖平文功未多于昭成然廟號為太祖道武建業之勳高于平文廟號為烈祖比功校德以為未允朕今奉尊道武為太祖與顯祖為二祧餘者以次而遷平文既遷廟唯有六始今七廟一則無主雖當朕躬此事亦臣子所難言夫生必有終人之常理朕以不德忝承洪緒若宗廟之靈獲全首領以沒于地為昭穆之次心願畢矣必不可豫設可垂之文示後必令遷之魏書禮志一經始明堂改營太廟詔云云又見通典四十七答穆亮詔理或如此比有閒隙當為文相示魏書禮志一長樂王穆亮等奏言七廟無宜闕一無主以自待詔云云
