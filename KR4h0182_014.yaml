body:
  text: 文成文明馮后答高閭令六軍電發有若摧朽何慮四難也魏書高閭傳太和三年出師討淮北閭表請速返旆文明太后令答元丕令臣哉鄰哉鄰哉臣哉君則亡逸于上臣則履冰于下若能如此太平豈難致乎魏書宗室元丕傳太后親造勸戒歌辭以賜群官丕上疏贊謝太后令答程駿表上慶國頌令省詩表聞之歌頌宗祖之功德可爾當世之言何其過也所針下章戢之不忘魏書程駿傳答程駿表上得一頌令省表并頌十篇聞之鑒戒既備良用欽玩養老乞言其斯之謂魏書程駿傳王睿子襲承襲令都曹尚書曹百寮之首民所具瞻襲年少智思末周其都曹尚書令可權記使間習政事後用不晚睿薨高祖詔襲代領都曹為尚書令依典承襲文明太后令為咸陽王禧選師傅令自非生知皆由學誨皇子皇孫訓教不立溫故求新蓋有闕矣可于間靜之所別置學館選忠信博聞之士為之師傅以匠成之魏書咸陽王禧傳定樂章令先王作樂所以和風改俗非雅曲正聲不宜庭奏可集新舊樂章參探音律除去新聲不典之曲禪增鍾縣鏗鏘之韻魏書樂志罪汝陰南安二王令汝陰王天賜南安王楨不順法度黷貨聚斂依犯論坐將至不測卿等為當存親以毀令為欲滅親以明法魏書南安王楨傳文明太后高祖並臨皇信堂引見王公太后令報辥虎子令俸制已行不可以小有不平便虧通式魏書辥野豬附傳虎子為徐州上疏請寬省徵調文明太皇太后令樹碑旌美任城國孟太妃令鴻功盛美實宜垂之永年魏書列女傳太妃孟氏任城王澄之母澄為揚州率衆出討于後賊帥薑慶真襲陷羅城孟乃勒兵登陴賊不能克澄以狀表聞屬世宗崩事寢靈太后後令車不更造令群官以後議折中者便可如奏魏書禮志四咨訪五時朝服令太傅博學洽通多識前載既綜朝儀彌悉其事便可咨訪以決所疑魏書禮志四崔光表定五時朝服靈太后令原于忠令直繩所糾實允朝憲但忠事經肆宥又蒙特原無宜進罪餘如奏魏書于栗磾附傳報田益宗令卿誠著二朝勳光南服作藩萬里列土承家前朝往恩酬敘不淺兼子弟荷榮中表被澤相輕重卿所知悉先帝以卿勞舊州小祿薄故遷牧華壤爰登顯級于時番兵交換不生猜疑而卿息魯賢等無事外叛忠孝俱乖翻為戎首以卿誠重不復相討今臥護征南榮以金紫朝廷處遇又甚于先且卿年老方就間養焉得以本州為念魯賢來否豈待自往也但遣慰納足相昭亮若審遣信當更啓聞別敕東豫聽卿喻曉魯賢魏書田益宗傳熙平初益宗又表乞東豫以招二子靈太后令禁私度僧令年常度僧依限大州應百人者州郡于前十日解送三百人其中州二百人小州一百人州統維那與官及精練簡取充數若無精行不得濫探若取非人刺史為首以違旨論太守縣令綱寮節級連坐統及維那移五百里外異州為僧自今奴婢悉不聽出家諸王及親貴亦不得輒啓請有犯者以違旨論其僧尼輒度他人奴婢者亦移五百里外為僧僧尼多養親識及他人奴婢子年大私度為弟子自今斷之有犯還俗被養者歸本等寺主聽容一人出寺五百里二人千里私度之僧皆由三長罪不及己容多隱濫自今有一人私度皆以違旨論鄰長為首里黨各相降一等縣滿十五人郡滿三十人州鎮滿三十人免官寮吏節級連坐私度之身配當州下役魏書釋老志議宗室預祭令付八座集禮官議定以聞魏書禮志二江陽王繼表言道武曾孫不得預祭靈太后令許江陽王繼助祭令議親律注云非唯當世之屬籍歷謂先帝之五世此乃明親親之義篤骨肉之恩重尚書以遠及諸孫太廣致疑百寮助祭可得言狹也祖廟未毀曾玄不預壇堂之敬便是宗人之昵反外干附庸王族之近更疏于群辟先朝舊儀草創未定刊制律憲垂之不朽琰之援據甚允情理可依所執魏書禮志二又見通典五十一報清河王懌乞議定喪禮令禮者為政之本何得不同如此可依表定議魏書禮志四謫劉景暉令景暉既經恩宥何得議加橫罪可謫略陽民餘如奏魏書刑罰志裴延俊上言月光童子劉景暉妖言惑衆赦後亦宜死坐崔纂以為不合死坐靈太后令判侯刪掠殺試射羽林事令廷尉執處侯剛于法如猛剛既意在為公未宜便依所執但輕勦民命理無全捨可削封三百戶解尚書衣典御魏書恩幸侯剛傳答于忠令于忠表如此既誠勳宜録又無子可矜臨危所祈不容致奪可特聽如請以彰殊效魏書于栗磾附傳忠疾病表乞以弟子永超為後靈太后令宣令張普惠朕向詔卿與群臣對議往復既終皆不同卿表朕之所行孝子之志卿之所陳忠臣之道群公巳有成議卿不得苦奪朕懷後有所見勿得難言魏書張普惠傳普惠表議太后父不可稱太上議者奏依前詔太后復遣元叉賈璨宜令謂普惠報李平表糾崔亮令亮為臣不忠去留自擅既損威稜違我經略雖有小捷豈免大咎但吾攝御萬幾庶茲惡殺可特聽以功補過魏書崔亮傳報李崇令省表具悉體國之誠配饗大禮為國之本比以戎馬在郊未遑修繕今四表晏寧年和歲稔當敕有司別議經始魏書李崇傳崇表請修學校靈太后令答楊愔魏收邢劭等令配饗大禮為國之本比以戎馬在郊未遑修繕今四表晏寧當敕有司別議經始北齊書邢劬傳封于忠為靈壽縣公詔忠以往年天諱之際開崇邑士然酬庸理垂有司執奪豈宜一謬棄其餘勳也但忠歷任禁要誠節皎然宜褒錫山河以安厥望可靈壽縣開國公邑五百戶魏書于粟磾附傳報元修義詔收葬之恩事由上旨藩嶽何得越職干陳魏書汝陰王天賜附傳第五子修義遷秦州刺史肅宗初表陳庶人禧庶人愈等請宥前愆賜葬陵城靈太后詔賜路雍詔雍蒞政清勤善綏民俗比經年儉郡內飢饉群庶嗷嗷將就溝壑而雍自出家粟賑賜貧窘民以獲濟雖古之良守何以尚茲宜見霑錫以垂獎勸可賜龍廄馬一匹衣一襲被褥一具班宣州鎮咸使聞知魏書良吏路雍傳報崔光求補治石經詔此乃學者之根源不朽之永格垂範將來憲章之本便可依公表魏書崔光傳報任城王澄詔自今已後內外之事嘗經先朝者不得重聞魏書任城王澄傳又報任城王澄詔省奏深體毗贊之情三皇異軌五代殊夙一時之制何必詮改必謂虛文設旨理在可申者何容不同來執可依往制魏書任城王澄傳聽任城王澄以西域馬付太僕詔王廉貞之德有過楚相可敕付廄以成君子大哉之美魏書任城王澄傳西域咽噠波斯諸國各因公使並遺澄駿馬一匹澄請付太僕以充國間詔云云贈元叉女鄉主詔叉長女年垂弱笄奄致夭喪悼念兼懷可贈鄉主魏書元叉傳叉女夭靈太后詔定權衡詔謹權審度自昔令典定章革曆往代良規匡宗室賢亮留心既久可今更集儒貴以時驗決必令權衡得中令寸籥不舛魏書廣平王洛侯附傳第五子匡屢請更權衡不已于是詔元匡襲封東平郡王詔故廣平殤王洛侯體自恭宗茂年薨殞國除祀廢不祀忽諸匡親同若子私繼歲久宜樹維城永茲磐石可特襲王爵封東平郡王魏書廣平王洛侯附傳禁錮元願平詔願平志行輕疏每乖憲典可還于別館依前禁錮魏書安定王休附傳廢元琛詔琛在定州惟不將中山宮來自餘無所不致何可更復敘用魏書河間王若附傳琛在定州貪婪之極及還朝靈太后詔別封彭城王協三子為縣公詔故太師彭城武宣王道隆德盛功高微管協契先朝導揚末命扶痾濟難效漢北之誠送往奉居盡魯南之節宗社賴之以安皇基由之永固而謙光守約屢撝增邑之賞辭多受少終保初錫之封非所謂追舊報恩念勳酬德者也可以前後所封戶別封三子為縣公食邑各一千戶庶以少慰仁魂微申朝典魏書彭城王協附傳皇子踐阼大赦詔皇家握曆受圖年將二百祖宗纍聖社稷載安高祖以文思光天世宗以下武經世股肱惟良元首穆穆及大行在御重以寬仁奉養率由溫明恭順朕以寡昧親臨萬國識謝塗山德慚文母屬妖逆遞興四郊多故實望穹靈降祐麟趾衆繁自潘充華有孕椒宮冀誕儲兩而熊羆無兆維虺遂彰于時直以國步未康假稱統胤欲以砥定物情係仰宸極何圖一旦弓劍莫追國道中微大行絶祀皇曾孫故臨洮王寶暉世子釗體自高祖天表卓異大行平日養愛特深義齊若子事符當璧及翊日弗悆大漸彌留乃延入青蒲受命玉几暨陳衣在庭登策靡及允膺大寶即日踐阼朕是用惶懼忸怩心焉靡洎今喪君有君宗祏惟固宜崇賞卿士爰及百辟凡厥在位並加陟敘內外百官文武督將征人遭艱解府普加軍功二階其禁衛武官直閣以下直從以上及主帥可軍功三階其已官失爵聽復封位謀反大逆削除者不在斯限清議禁錮亦悉蠲除若二品以上不能自受任授兒弟可班宣遠邇咸使知之魏書孝明紀武泰元年正月皇女生祕言皇子大赦改元二月帝崩皇子即位大赦天下皇太后詔賜崔亮璽書硤石既平大勢全舉淮堰孤危自將奔遁若仍敢遊魂此當易以立計摛翦蟻徒應在旦夕將軍推轂所憑親對其事處分經略宜共協齊必令得掃蕩之理盡彼遺燼也隨便守禦及分渡掠截扼其咽喉防塞走路期之全獲無令漏逸若畏威降首者自加蠲宥以仁為本任之雅算一二往使別宣魏書崔亮傳
