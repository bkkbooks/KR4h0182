body:
  text: 江式求撰集古今文字表臣聞庖羲氏作而八卦列其畫軒轅氏興而龜策彰其彩古史倉頡覽二象之爻觀鳥獸之跡別創文字以代結繩用書契以維事宣之王庭則百工以敘載之方冊則萬品以明迄于三代厥體頗異雖依類取制未能悉殊倉氏矣故周禮八歲入小學保氏教國子以六書一曰指事二曰象形三曰形聲四曰會意五曰轉注六曰假借蓋是史頡之遺法也及宣王太史史籀著大篆十五篇與古文或同或異時人即謂之籀書至孔子定六經左丘明述春秋皆以古文厥意可得而言其後七國殊軌文字乖別暨秦兼天下丞相李斯乃奏蠲罷不合秦文者斯作倉頡篇中車府令趙高作爰厤篇太史令胡毋敬作博學篇皆取史籀大篆或頗省改所謂小篆者也于是秦燒經書滌除舊典官獄繁多以趣約易始用隸書古文由此息矣隸書者始皇使下杜人程邈附于小篆所作也以邈徒隸即謂之隸書故秦有八體一曰大篆二曰小篆三曰刻符書四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書漢興有尉律學復教以籀書又習八體試之課最以為尚書史吏民上書省字不正輒舉劾焉又有草書莫知誰始攷其書形雖無厥誼亦是一時之變通也孝宣時召通倉頡讀者獨張敞從受之涼州刺史杜鄴沛人爰禮講學大夫秦近亦能言之孝平時徵禮等百餘人說文字于未央宮中以禮為小學元士黃門侍郎揚雄采以作訓纂篇及亡新居攝自以應運制作使大司空甄豐校文字之部頗改定古文時有六書一曰古文孔子壁中書也二曰奇字即古文而異者三曰篆書云小篆也四曰佐書秦隸書也五曰繆篆所以摹印也六曰鳥蟲所以幡信也壁中書者魯恭王壞孔子宅而得禮尚書春秋論語孝經也又北平侯張倉獻春秋左氏傳書體與孔氏相類即前代之古文矣後漢郎中扶風曹喜號曰工篆小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵修理舊文殊蓺異術王教一端苟有可以加于國者靡不悉集逵即汝南許慎古文學之師也後慎嗟時人之好奇歎儒俗之穿鑿惋文毀于譽痛字敗于訾更詭任情變亂于世故撰說文解字十五篇首一終亥各有部屬包括六蓺群書之詁評釋百氏諸子之訓天地山川草木鳥獸昆蟲雜物奇怪珍異王制禮儀世間人事莫不畢載可謂類聚群分雜而不越文質彬彬最可得而論也左中郎將陳留蔡邕采李斯曹喜之法為古今雜形詔于太學立石碑刊載五經題書楷法多是邕書也後開鴻都書畫奇能莫不雲集于時諸方獻篆無出邕者魏初博士清河張揖著埤倉廣雅古今字訓究諸埤廣綴拾遺漏增長事類抑亦于文為益者然其字詰方之許慎篇古今體用或得或失矣陳留邯鄲淳亦與揖同時博古開蓺特善倉雅許氏字指八體六書精究閑理有名于揖以書教諸皇子又建三字石經于漢碑之西其文蔚炳三體復宣校之說文篆隸大同而古字少異又有京兆韋誕河東衛覬二家竝號能篆當時臺觀榜題寶器之銘悉是誕書咸傳之子孫世稱其妙晉世義陽王典祠令任城呂忱表上字林六卷尋其況趣附託許慎說文而案偶章句隱別古籀奇惑之字文得正隸不差篆意也忱弟靜別放故左校令李登聲類之法作韻集五卷宮商角徵羽各為一篇而文字與兄便是魯衛音讀楚夏時有不同皇魏承百王之季紹五運之緒世易風移文字改變篆形謬錯隸體失真俗學鄙習復加虛巧談辯之士又以意說炫惑于時難以釐改故傳曰以眾非非行正信哉得之于斯情矣乃曰追來為歸巧言為辯小兒為神蟲為蠶如斯甚眾皆不合孔氏古書史籀大篆許氏說文石經三字也凡所關古莫不惆悵焉嗟夫文字者六蓺之宗王教之始前人所以垂今今人所以識古故曰本立而道生孔子曰必也正名乎又曰述而不作書曰子欲觀古人之象皆言遵修舊中而不敢穿鑿也臣六世祖瓊家世陳留往晉之初與從父兄應元俱受學于衛覬古篆之法倉雅方言說文之誼當時竝收善譽而祖官至太子洗馬出為馮翊郡值洛陽之亂避地河西數世傳習斯業所以不墜也世祖太延中皇威西被牧犍內附臣亡祖文威杖策歸國奉獻五世傳掌之書古篆八體之法時蒙襃錄敘列于儒林官班文省家號世業暨臣闇短識學庸薄漸漬家風有忝無顯但逢時來恩出願外每承澤雲津廁霑漏潤驅馳文閣參預史官題篆宮禁猥同上哲既竭愚短欲罷不能是以敢藉六世之資奉遵祖考之訓竊慕古人之軌企踐儒門之轍輒求撰集古來文字以許慎說文為主爰采孔氏尚書五經音注籀篇爾雅三倉凡將方言通俗文祖文宗埤倉廣雅古今字詁三字石經字林韻集諸賦文字有六書之誼者皆以次類編聯文無復重糾為一部其籀奇惑俗隸諸體咸使班于篆下各有區別詁訓假借之誼僉隨文而解音讀楚夏之聲並逐字而注其所不知者則闕如也脫蒙遂許冀省百氏之觀而同文字之域典書祕書所須之書乞垂敕給竝學士五人嘗習文字者助臣披覽書生五人專令抄寫侍中黃門國子祭酒一月一監評議疑隱庶無紕繆所撰名目伏聽明旨魏書江式傳又見北史三十四樂舞名議夫樂所以乘靈通化舞所以象物昭功金石播其風聲絲竹申其歌詠郊天祠地之道雖百世而可知奉神育民之理經千載而不昧是以黃帝作咸池之樂顓頊有承雲之舞堯為大章舜則大韶禹為大夏湯為大濩周曰大武秦曰壽人漢為大予魏名大鈞晉曰正德雖三統互變五運代降莫不述作相因徽號殊別者也皇魏道格三才化清四字弈世載德累葉重光或以文教興邦或以武功平亂功成治定于是乎在及主上龍飛載造景命惟新書軌自同典刑罔二覆載均于兩儀仁澤被于四海五聲有序八音克諧樂舞之名宜以詳定案周兼六代之樂聲律所施咸有次第滅學以後經禮散亡漢來所存二舞而已請以韶武為崇德武舞為章烈總名曰嘉成漢樂章云高張四縣神來燕饗宗廟所設宮懸明矣計五郊天神尊于人鬼六宮陰極體同至尊理無減降宜皆用宮懸其舞人冠服制裁咸同舊式庶得以光贊鴻功敷揚大業魏書樂志永熙二年春長孫稚祖瑩表乞定樂舞名其年夏集群官議之瑩復議又略見通典一百四十二請以高肇監樂務表伏惟皇魏龍躍鳳舉配天光宅世祖太武皇帝革靜荒嵎廓寍宇內兇醜尚繁戎軒仍動制禮作樂致有闕如高祖孝文皇帝德鍾後仁之期道協先天之日顧雲門以興言感蕭韶而忘味以故中書監高閭博識明敏文思優洽紹蹤成均實允所寄乃命閭廣程儒林究論古樂依據六經參諸國志錯綜陰陽以制聲律鐘石管絃略以完具八音聲韻事別粗舉值遷邑崧瀍未獲周密五權五量竟不就果自爾迄今率多褫落金石虛懸宮商未會伏惟陛下至聖承天纂戎鴻烈以金石未協詔臣緝理謹即廣搜秬黍選其中形又采梁山之竹更裁律呂制磬造鍾依律竝就但權量差謬其來久矣頃蒙付并州民王顯進所獻古銅權稽之古範攷以今制鍾律準度與權參合昔造猶新始刱若舊異世同符如合規矩樂府先正聲有王夏肆夏登歌鹿鳴之屬六十餘韻又有皇始五行勺舞太祖初興置皇始之舞復有吳夷東夷西戎之舞樂府之內有此七舞太和初郊廟但用文始五行皇始三舞而已竊惟周之文武頌聲不同漢之祖宗廟樂又別伏惟皇魏四祖三宗道邁隆周功超鴻漢頌聲廟樂宜有表章或文或武以旌功德自非懿望茂親雅量淵遠博識洽聞者其孰能識其得失衛軍將軍尚書右僕射臣高肇器度徽雅神賞入微淹讚大猷聲光海內宜委之監就以成皇代典謨之美昔晉中書監荀勖前代名賢受命成均委目樂務崇述舊章儀刑古典事光前載豈遠乎哉又先帝明詔內外儒林亦任高閭申請今之所須求依前比魏書樂志正始四年春太樂令公孫崇復表言上景明厤表臣頃自太樂詳理金石及在祕省攷步三光稽覽古今研其得失然四序遷流五行變易帝王相踵必奉初元改正朔殊徽號服色觀千時變以應天道故易湯武革命治厤明時是以三五迭隆厤數名異伏惟皇魏紹天明命家有率土戎軒仍動未遑厤事因前魏景初厤術數差違不協晷度世祖應期輯寍諸夏乃命故司徒東郡公崔浩錯綜其數浩博涉淵通更修厤術兼著五行論是時故司空咸陽公高允該覽群籍贊明五緯并述洪範然浩等攷察未及周密高宗踐阼乃用敦煌趙䢖甲寅之厤然其星度稍為差遠臣輒鳩集異同研其損益更造新厤以甲寅為元攷其盈縮晷象周密又從約省起自景明因名景明厤然天道盈虛豈曰必協要須參候是非乃可施用太史令辛寶貴職司玄象頗閑祕數祕書監鄭道昭才學優贍識覽該密長兼國子博士高僧裕乃故司空允之孫世綜文業尚書祠部郎中宗景博涉經史前兼尚書郎中崔彬微曉法術請此數人在祕省參候而伺察晷度要在冬夏二至前後各五日然後乃可取驗臣區區之誠冀效萬分之一魏書律厤志上世宗景明中詔太樂令公孫崇趙樊生等同共攷驗正始四年冬崇表修律令上表臣聞建國有計雖危必安施化能和雖寡必盛治乖人理雖合必離作用失機雖成必敗此乃古今同然百王之定法也伏惟大魏應天明命兆啟無窮畢世後仁祚隆七百今二虢京門下無嚴防南北二中復闕固守長安鄴城股肱之寄穰城上黨腹背所憑四軍五校之軌領護分事之式徵兵儲粟之要舟車水陸之資山河要害之權緩急去來之用持平赴救之方節用應時之法特宜修置以固堂堂之基持盈之體何得而忽居安之辰故應危懼矣且法開清濁而清濁不平申滯理望而卑寒亦免士庶同悲兵徒懷怨中正賣望于下里主案舞筆于上臺真偽混淆知而不糾得者不欣失者倍怨使門齊身等而涇渭淹殊類應同役而苦樂懸異士人居職不以為榮兵士役苦心不忘亂故有競棄本出飄藏他土或詭名託養散在人閒或亡命山藪漁獵為命或投仗彊豪寄命依食又應遷之戶逐樂諸州應留之徒避寒歸暖兼職人子弟隨逐浮遊南北東西卜居莫定關禁不修任意取適如此之徒不可勝數爪牙不復為用百工爭棄其業混一之計事實闕如攷課之方責辦無日流浪之徒決須精校今彊敵窺時邊黎伺隙內民不平久戍懷怨戰國之勢竊謂危矣必造禍源者北邊鎮戍之人也若夫一統之年持平用之者大道之計也亂離之期縱橫作之者行權之勢也故道不可久須文質以換情權不可恆隨洿隆以牧物文質應世道形自安洿隆獲衷權勢亦濟然則王者計法之趣化物之規圓方務得其境人物不失其地又先帝時律令竝議律尋施行令獨不出十餘年矣臣以令之為體即帝王之身也分處百揆之儀安置九服之節經緯三才之倫包羅六卿之職措置風化之門作用賞罰之要乃是有為之樞機世法之大本也然脩令之人亦皆博古依古撰置大體可觀比之前令精麤有在但主議之家太用古制若全依古高祖之法復須昇降誰敢措意有是非哉以是爭故久廢不理然律令相須不可偏用今律班令止于事甚滯若令不班是無典法臣下執事何依而行臣等脩律非無勤止署下之日臣乃無名是謂農夫盡力他食其秋功名之所實懷於悒魏書孫紹傳與常景等共脩律令延昌中紹表又北史四十六陳軍國利害又表臣聞文質互用治道以之緝熙洿隆得時人物以之通濟故能事恢三靈仁洽九服伏惟陛下應靈踐阼沖明照物宰輔忠純伊霍均美既致昇乎之基應成無為之業而漠北叛命隴右構逆中州驚擾民庶竊議其故何哉皆由上法不通下情怨塞故也臣雖愚短具鑒始末往在代都武質而治安中京以來文華而政亂故臣昔于太和極陳得失具論四方華夷心態高祖垂納文應可尋延昌正光奏疏頻上主者收錄不蒙報問即日事勢乃至于此盡微臣豫陳之驗今東南有竊號之豎西北有逆命之寇豈得怨天實尢人矣臣今不憂荒外正慮中畿急須改張以寍其意若仍持疑變亂尋作肘腋一乖大事去矣然臣奉國四世欣戚是同但職在𤕠散不關樞密寍濟之計欲陳無所可謂經緯甚多無機可織夫天下者大器也一正難傾一傾難正當今之危躡足之急臣備肉食痛心無已泣血上陳願垂采察若得言參執事獻可替否寇逆獲除社稷稱慶雖死如生犬馬情畢魏書孫紹傳紹為徐兗和糴使還朝大陳軍國利害不報紹又表
