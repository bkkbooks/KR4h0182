body:
  text: 高祐奏請修國史臣等聞典謨興話言所以光著載籍作成事所以昭揚然則尚書者記言之體春秋者録事之辭尋覽前志斯皆言動之實録也夏殷以前其文弗具自周以降典章備舉史官之體文質不同立書之旨隨時有異至若左氏屬詞比事兩致並書可謂存史意而非全史體逮司馬遷班固皆博識大才論敘今古曲有條章雖周達未兼斯實前史之可言者也至于後漢魏晉咸以放焉惟聖朝創制上古開基長發自始均以後至于成帝其間世數久遠是以史弗能傳臣等疏陋忝當史職披覽國記竊有志焉愚謂自王業始基庶事草創皇始以降光宅中土宜依遷固大體今事類相從紀傳區別表志殊貫如此修綴事可備盡伏惟陛下先天開物洪宣帝命太皇太后淳曜二儀惠和王度聲教之所漸洽風譯之所覃加固已義振前王矣加太和以降年未一紀然嘉符禎瑞備臻于往時洪功茂德事萃于曩世會稽佇玉牒之章岱宗想石記之列而祕府策勳述美未盡將令皇風大猷或闕而不載功臣懿績或遺而弗傳著作郎已下請取有才用者參造國書如得其人三年有成矣然後大明之德功光于帝篇聖后之勳業顯于皇策佐命忠貞之倫納言可直之士咸以備著載籍矣魏書高祐傳又北史卅一上疏論選舉今之選舉不採職治之優劣專簡年勞之多少斯非盡才之謂宜停此薄藝棄彼朽勞唯才是舉則官方斯穆又勳舊之臣雖年勤可録而才非撫人者則宜加之以爵賞不宜委之以方任所謂王者可私人以財不私人以官者也魏書高祐傳通典十六致裴諏之書相屈為戶曹參軍北齊書裴諏之傳司空高乾致書祭河伯河伯水中之神高敖曹地上之虎行經君所故相決酹北史三十一大乘賦大乘者蓋如來之道埸也故緣覺聲聞謂之小乘言法駕之通馳如舟車之致遠也夫合抱興于毫末九層作于纍土從淺以高大理妙在于不有迹粗由乎不無舉有以希無則無無以畼忘無以統有則有有以通無無以畼則乘斯小矣有有以通則乘斯大矣夫總福佑之會者莫尚于法身宣一切之知者莫貴乎如來故神稟靈照以觀三達之權思周深妙以入四持之門知色之空任而不敗起禍無崖終始無際形寄于宇宙之中而心包乎一象之外目察于芥子之細而識鑒乎須彌之大美哉淵乎其源固不量也嗟歎不足遂作賦曰建大乘之靈駕兮震法鼓之雷音除行蓋之欲疑兮餐微妙以悅心滿覺意之如海兮演般若之淵深平八道之坦蕩兮遊總持之苑林定禪思于三昧兮滅色想于五陰執抵羅之引弓兮操如意之喻琴破衆網之將裂兮剗貪垢而絶淫危泡沫之暫結兮焉巧風之足欽或明行而善逝兮積功勳以迄今收薩云之空義兮運十萬而魔擒開止觀之光焰兮消邪見之沈吟閉必固之垣牆兮同影響之難尋廣弘明集二十九上案釋道宣編此賦于魏高允鹿苑賦之後題為魏李顒檢魏書北史未見其人東晉李顒字長林有賦論誄等文八篇在全晉文卷五十三疑此賦亦晉李顒所作今姑從廣弘明集録于魏高允後上疏乞班崔浩所注經馬鄭王賈雖注述六經並多疏謬不如浩之精微乞收境內諸書藏之祕府班浩所注命天下習業并求敕注禮傳令後生得觀正義魏書高允傳是時著作令史閔湛郤檦見浩所注詩論語尚書易遂上疏言浩亦表薦湛有著作之才與高允書昔皇綱未振華裔殊風九服分隔金蘭莫遂希懷寄契延想積久天遂其願爰遘京師才非季札而眷深孫喬德乖程子而義均傾蓋曠齡罕遇會之一朝比公私理異酬咨路塞端拱蓬宇慨歎如何不量鄙拙貢詩數韻若夫泉江相忘之談遺言存意之美雖莊生之所尚非淺識所宜循愛敬既深情期往返思遲德意以祛鄙吝若能紆鳳彩以耀榛薈回連城以映瓦鑠者是所望也魏書宗欽傳東宮侍臣針恢恢玄古悠悠生民五才迭用經敘彝倫匡父維子弼君伊臣顛而能扶屈而能伸昔在上聖妙鑒厥趣不曰我明而乖其度不曰我新而忽其故如彼在泉臨深是懼如彼覆車望途改步是以令問宣流英風遠布及于三季道喪純遷桀起瓊臺紂醊糟山周滅妖姒羿喪以田險詖蔽其耳目鄭衛陳于其前怙才肆虐異端是纏豈伊害身厥胤殲焉茫茫禹迹畫為九區昆蟲鳥獸各有巢居雲歌唐后垂橫美虞疏網改祝殷道攸敷龍盤應德隋蛇銜珠勿謂無心識命不殊勿謂理絶千載同符爰在子桓靈數攸臻儀刑徐阮左右劉陳披文採友叩典問津用能重離襲曜魏鼎維新於昭儲后運應玄籙夕惕朝乾虛襟遠屬外撫幽荒內懷煢獨猶懼思不逮遠明不遐燭君有諍臣庭立謗木本枝克昌永符天祿微臣作針敢告在僕魏書宗欽傳太華殿賦闕上皇太子疏請罪人徙邊殿下親覽百揆經營內外昧旦而興咨詢國老臣職忝疑承可是獻替漢武時始啓河右四郡議諸疑罪而謫徙之十數年後邊郡充實並修農戍孝宣因之以服北方此近世之事也帝王之于罪人非怒而誅之欲其徙善而懲惡謫徙之苦其懲亦深自非大逆正刑皆可從徙雖舉家投遠欣喜赴路力役終身不敢言苦且遠流分離心或思善如此姦邪可息邊垂足備魏書刑罰志貞君五年命恭宗總百揆監國少傅遊雅上疏恭宗善其言然未之行論高允夫喜怒者有生所不能無也而前史載卓公寬中文饒洪量褊心者或之弗信余與高子遊處四十年矣未嘗見其是非喜慍之色不亦信哉高子內文明而外柔弱其言訥訥不能出口余嘗呼為文子崔公謂余云高生豐才博學一代佳士所乏者矯矯風節耳余亦然之司徒之譴起于纖微及于詔責崔公聲嘶股戰不能言宗欽已下伏地流汗都無人色高子敷陳事理申釋是非辭義清辨音韻高亮明主為之動容聽者無不稱善仁及寮友保茲元吉向之所謂矯矯者更在斯乎宗愛之任勢也威振四海嘗召百司于都坐王公以下望庭畢拜高子獨升階長揖由此觀之汲長孺可臥見衛青何抗禮之有向之所謂風節者得不謂此乎知人固不伯牙夷吾見明于鮑叔良有以也魏書高允傳又北史三十一昭皇太后碑文闕對詔議祫禘鄭氏之義禘者大祭之名大祭圓丘謂之禘者審諦五精星辰也大祭宗廟謂之禘者審諦其昭穆圓丘常合不言祫宗廟時合故言祫斯則宗廟祫禘並行圜丘一禘而已宜于宗廟俱行禘祫之禮二禮異故名殊依禮春廢犆礿于嘗于蒸則祫不于三時皆行禘祫之禮魏書禮志上太和十三年詔議祫禘尚書遊明根左丞郭祚中書侍郎封琳著作郎崔光等對又見通典五十對詔問夕月考案舊式推校衆議宜從朏月魏書禮志一太和十五年諫赴援郁洲表玄明之款雖奔救是當然事有損益或憚舉而功多或因小而生患不可必也今六里朐山地實接海陂湖下溼人不可居郁洲又在海中所謂雖獲石田終無所用若不待連兵六里雖剋尚不可守況方事連兵面爭非要也且六里于賊逾要去此間遠若以間遠之兵攻逼近之衆其勢既殊不可敵也災儉之年百姓飢敝餓死者亦復不少何以得宜靜之辰興干戈之役軍糧資運取濟無所唯見其損未覩其益且新附之民服化猶近特須安帖不宜勞之勞則怨生怨生則思叛思叛則不自安不安則擾動脫爾則連兵難解事不可輕宜損茲小利不使大損魏書遊明根附傳遊肇遷侍中梁徐玄明斬其青冀二州刺史張稷首以郁洲內附朝議遣兵赴援肇表世宗不納諫伐蜀臣聞遠人不服則修文德以來之兵者凶器不得已而後用當今治雖太平論征未可何者山東關右殘傷未復頻年水旱百姓空虛宜在安靜不宜勞役然往昔開拓皆因城主歸款故有征無戰今之據者雖假官號真偽難分或有怨于彼不可全信且蜀地險隘稱之自古鎮戍晏然更無異趣豈得得虛承浮説而動大軍舉不慎始悔將何及討蜀之略願俟後圖魏書遊明根附傳大將軍高肇伐蜀肇諫世宗又不納奏請更議劉輝事臣等謬參樞轄獻替是司門下出納謨明常則至于無良犯法職有司存劾罪結案本非其事容妃等姦狀罪止于刑並處極法準律未當出適之女坐及其兄推據典憲理實為猛又輝雖逃刑罪非孥戮募同大逆亦謂加重乖律之案理宜陳請乞付有司重更詳議魏書刑罰志神龜中蘭陵公主駙馬都尉劉輝坐與河陽縣民張智壽妹容妃陳慶和妹慧猛姦亂毆主傷胎輝懼罪逃亡門下處奏容妃慧猛各入死刑智壽慶和並以知情不加防限處以流坐詔容妃慧猛恕死髡鞭付宮餘如奏尚書三公郎中執不下右僕射遊肇奏言上疏求立學校臣聞至治之隆非文德無以經綸王道太平之美非良才無以光贊皇化是以昔之明主建庠序于京畿立學官于郡邑教國子弟習其道藝然後選其俊異以為造士今聖治欽明道隆三五九服之民咸仰德化而所在州土學校未立臣雖不敏誠願備之使後生聞雅頌之音童幼覩經教之本臣昔蒙思寵長管中祕時課修學有成立之人髦俊之士已蒙進用臣今重荷榮遇顯任方嶽思闡帝猷光宣于外自到以來訪諸文學舊德已老後生未進歲首所貢雖依制遣對問之日懼不克堪臣愚欲仰依先典于州郡治所各立學官使士望之流冠冕之胄就而受業庶必有成其經藝通明者貢之王府則郁郁之文于是不墜魏書李欣傳欣為相州刺史上疏上四序堪輿表臣以姚氏之世行學伊川時遇遊遁大儒成公興從求九章要術興宇廣明自云膠東人也山居隱迹希在人間興時將臣南到陽翟九崖巖沙門釋曇影間興即北還臣獨留住依止影所求請九章影復將臣向長廣東山見道人法穆法穆時共影為臣開述九章數家雜要披釋章次意況大旨又演隱審五藏六府心髓血脈商功大算端部變化玄象土圭周髀練精鋭思蘊習四年從穆所聞粗皆髣佛穆等仁矜特垂憂閔復以先師和公所注黃帝四序經文三十六卷合有三百二十四章專説天地陰陽之本其第一孟序九卷八十一章説陰陽配合之原第二仲序九卷八十一章解四畤氣王休殺吉凶第三叔序九卷八十一章明日月辰宿交會相生為表裏第四季序九卷八十一章具釋六甲刑禍福德以此等文傳授于臣山神禁嚴不得齎出尋究經年粗舉綱要山居險難無以自供不堪窘迫心生懈怠以甲寅之年日維鶉火月呂林鍾景氣鬱盛感物懷歸奉辭影等自爾至今四十五載歷觀時俗堪輿八會徑世已久傳寫謬誤吉凶禁忌不能備悉或考良日而值惡會舉吉用凶多逢殃咎又史遷郝振中吉大儒亦各撰注流行于世配會大小序述陰陽依如本經猶有所闕臣前在東宮以狀奏聞奉被景穆皇帝聖詔敕臣撰録集其要最仰奉明旨謹審先所見四序經文鈔撮要略當世所須吉凶舉動集成一卷上至天子下及庶人又貴賤階級尊卑差別吉凶所用罔不畢備未及內呈先帝晏駕臣時狼狽幾至不測停廢以來徑由八載思欲上聞莫能自徹加年夕齒頽餘齡旦暮每懼殂殞填仆溝壑先帝遺志不得宣行夙夜悲憤理難違匿依先撰録奏謹以上聞請付中祕通儒達士定其得失事若可施乞即班用魏書殷紹傳太安四年夏上四序堪輿表其書遂大行于世喻崔道固書天棄劉彧禍難滋興骨肉兄弟自相誅戮君臣上下靡復紀綱徐州刺史辥安都豫州刺史常珍奇兗州刺史畢衆敬等深覩存亡翻然歸義故朝廷納其誠款委臣南蕃皆目前之見事東西所備聞也彼無鹽戍主申纂敢縱姦慝劫奪行人官軍始臨一時授首房崇吉固守升城尋即潰散自襄陽以東至于淮海莫不風靡服從正化謂東陽歷城有識之士上思安都之榮顯下念申纂之死亡追悔前惑改圖後悟然執守愚迷不能自革猥總戎旅掃定北方濟黃河知十二之處説臨齊境想一變之清風踟蹰周覽依然何極故先馳書以喻成敗夫見機而動周易所稱去危就安人事常理若以一介為高不悛為美則微子負嫌于時紀季受譏于世我皇魏重光纍葉德懷無外軍威所拂無不披靡固非三吳弱卒所能擬抗況于今者勢已土崩劉彧威不制秣陵政不出閫外豈復能浮江越海赴危救急恃此為援何異于碲涔之魚冀拯江海夫蝮蛇螫手則斷手螫足則斷足誠忍肌體以救性命若推義以行之無割身之痛也而可以保家寧宗長守安樂此智士所宜深思重慮自求多福魏書慕容白曜傳
