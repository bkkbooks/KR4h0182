body:
  text: 李崇請減佛寺功材以修學校表臣聞世室明堂顯于周夏二黌兩學盛自虞殷所以宗配上帝以著莫大之嚴宣布下士以彰則天之軌養黃髮以詢格言育青襟而敷典式用能享國久長風徽萬祀者也故孔子稱巍巍乎其有成功郁郁乎其有文章此其盛矣爰暨亡秦政失其道坑儒滅學以蔽黔首國無黌序之風野有非時之役故九服分崩祚終二世炎漢勃興更修儒術文景巳降禮樂復彰化致升平治幾刑措故西京有六學之美東都有三本之盛莫不紛綸掩藹響流無巳逮自魏晉撥亂相因兵革之中學校不絶遺文燦然方軌前代仰惟高祖孝文皇帝稟聖自天道鏡今古徙馭嵩河光宅函洛模唐虞以革軌儀規周漢以新品制列教序于鄉黨敦詩書于郡國使揖讓之禮橫被于崎嶇歌詠之音聲溢于仄陋但經始事殷戎軒屢駕未遑多就弓劍弗追世宗統曆聿遵先緒永平之中大興板築續以水旱戎馬生郊雖逮為山還停一簣竊以皇遷中縣垂二十祀而明堂禮樂之本乃鬱荊棘之林膠序德義之基空盈牧豎之迹城隍嚴固之重闕磚石之功庸堞顯望之要少樓榭之飾加以風雨稍侵漸致虧墜又府寺初營頗亦壯美然一造至今更不修繕廳宇凋朽牆垣頽壞皆非所謂追隆堂構儀刑萬國者也伏聞朝議以高祖大造區夏道侔姬文擬祀明堂式配上帝今若基宇不修仍同丘畎即使高皇神享闕于國陽宗事之典有聲無實此臣子所以匪寧億兆所以失望也臣又聞官方授能所以任事事既任矣酬之以祿如此上無曠官之譏下絶尸素之謗今國子雖有學官之名而無教授之實何異兔絲燕麥南箕北斗哉昔劉向有言王者宜興辟雍陳禮樂以風化天下夫禮樂所以養人刑法所以殺人而有司勤勤請定刑法至于禮樂則曰未敢是則敢于殺人不敢于養人也臣以為當今四海清平九服寧晏經國要重理應先營脫復稽延則劉向之言徵矣但事不兩興須有進退以臣愚量宜罷尚方雕靡之作頗省永寧土木之工并減瑤光材瓦之力兼分石窟鐫琢之勞及諸事役非急者三時農隙修此數條使辟雍之禮蔚爾而復興諷誦之音煥然而更非美榭高墉嚴壯于外槐宮棘宇顯麗于中道發明令重遵鄉飲敦進郡學精課經業如此則元凱可得之于上序遊夏可致之于下國豈不休歟誠知佛理淵妙含識所宗然比之治要容可小緩苟使魏道熙緝元首唯康爾乃經營未為晚也魏書李崇傳奏更申集考公孫崇所調音律前被旨敕以兼太樂令公孫崇更調金石并其書表付外考試登依旨敕以去八月初詣署集議但六樂該深五聲妙遠至如仲尼淵識故將忘味吳札善聽方可論辨自斯已降莫有詳之今既草創悉不窮解雖微有詰論略無究悉方欲商榷淫濫作範將來寧容聊爾一試便垂竹帛今請依前所召之官并博聞通學之士更申一集考其中否研窮音律辨括權衡若可施用別以聞請魏書樂志正始元年十月尚書李崇奏辭北伐啓臣實無用猥蒙殊寵位妨賢路遂充北伐徒勞將士無勳而還慚負聖朝于今莫已臣以六鎮幽垂與賊接對鳴柝聲弦弗離旬朔州名差重于鎮謂實可悅彼心使聲教日揚微塵去塞豈敢導此凶源開生賊意臣之愆負死有餘責屬陛下慈寬賜全腰領今更遣臣北行正是報恩改過所不敢辭但臣年七十自惟老疾不堪敵場更願英賢收功盛世魏書李崇傳諫幸鄴表伏見己丑詔書雲軒鑾輅行幸有期鳳服龍驂剋駕近日將欲講武淇陽大習鄴魏馳驌驦于緑竹之區騁驎驥于漳滏之壤斯誠幽顯同欣人靈共悅臣之愚管竊有惑焉何者嵩京創構洛邑俶營雖年跨十稔根基未就代民至洛始欲向盡資産罄于遷移牛畜斃于輦運陵太行之險越長津之難辛勤備經得達京闕富者猶損太半貧者可以意知兼歷歲從戎不遑啓處自景明以來差得休息事農者未積二年之儲築室者裁有數間之屋莫不肆力伊瀍人急其務實宜安靜新人勸其稼穡令國有九年之糧家有水旱之備若乘之以羈紲則所廢多矣一夫從役舉家失業今復秋稼盈田禾菽遍野鑾駕所幸騰踐必殷未若端拱中天坐招四海耀武嵩原禮射伊洛士馬無跋涉之勞兆民有康哉之詠可不美歟魏書李平傳世宗將幸鄴平上表諫表糾崔亮臣以蕭衍將湛僧珍田道龍遊魂境內猶未收迹義之神念尚住梁城令都督崔亮權據下蔡別將瓫生即住東岸與亮接勢以防橋道臣發欠向堰舍人曹道至奉敕更有處分而亮已輒還京案亮受付東南推轂是託誠應憂國忘家致命為限而始屆汝陰盤桓不進暨到寇所停淹八旬所營土山攻道並不克就損費糧力坐延歲序賴天威遠被士卒憤激東北騰上垂至北門而亮遲回仍不肯上臣逼以白刃甫乃登陟及平硤石宜聽處分方更肆其專恣輕輒還歸此而不糾法將焉寄案律臨軍征討而敨留不赴者死又云軍還先歸者流軍罷先還尚有流坐況亮被符令停委棄而反失乘勝之機闕水陸之會緣情據理咎深故留今處亮死上議魏書崔亮傳李平部分諸軍將水陸兼進以討堰賊亮違平節度以疾請還隨表而發平表奏張回轉賣費羊皮女罪冀州阜城民費羊皮母死家貧無以葬賣七歲女子與同城人張回為婢回轉賣于鄃縣民梁定之而不言良狀案盜律掠人掠賣人和賣人為奴婢者死回故買羊皮女謀以轉賣依律處絞刑魏書刑罰志延昌三年尚書李平奏又見通典一百六十七奏請河國臣為臣母服禮臣為君黨妻為夫黨俱為從服各降君夫一等故君服三年臣服一期今司空臣懌自以尊厭之禮奪其罔極之心國臣厭所不及當無隨降之理禮記大傳云從輕而重鄭玄注云公子之妻為其皇姑既舅不厭婦明不厭者還應服其本服此則是其例魏書禮志四延昌三年清河王懌所生母羅太妃薨侍中崔光議以為君厭降大功國臣服期博士封偉伯等清河國郎中令韓子熙議以為君大功國臣宜小功尚書李平奏奏立宗室犯法定式帝宗磐固周在于天下其屬籍疏遠蔭官卑末無良犯憲理須推究請立限斷以為定式魏書刑罰志通典一百六十七述身賦夫休咎相躡禍福相生龜筮迷其兆聖達蔽其萌覽成敗于前迹料趣捨于人情咸爭途以走利罕外己以逃名連從車以載禍多廄馬以取刑豈知夫一介獨往乃千乘所不能傾伊薄躬之悔吝無性命之淑靈藉休庸于祖武仰餘烈于家聲徒從師以下學乏遊道于上京洎方年之四五實始筮之弱齡爰釋巾而從吏謬激寵于時明彼之赫赫乃陋周而小漢帝文篤其成功我武治其未亂掩四奧而同軌穆三辰而貞觀威北畼而武戢鼎南遷而文燠異人相趨于終闕鴻生接武于儒館總群雅以同歸果方員而殊貫伊濫吹之所從初竊服于宰旅奉聖王之高義遊兔園而容與綴鴻鷺之末行連英髦之茂序乃伯舅之西伐赫靈旗之東舉復奉役于前轅仍執羈于後距迫玄冬之暮歲歷關山之遐阻風激沙而破石雪浮河而漫野樂在志其無端悲涉物而多緒俄宮車之宴駕改乘轅而歸豫屬推恩之在今自傍枝而禔福既獻以命宗叨微躬于侯服禮空文于俯饗賦無征于湯沐思守位而匪懈每屏居而自肅忽忝命于建禮遊丹綺之重復信茲選之為難乃上應于列宿陽源猶且自免何稱仲治與太叔余生之蕭散本寓名而為仕好不存于吏法才實疏于政理竟火燭之不事徒博奕其賢已竊自託于諸生頗馳騁于文史通人假其餘論士林察于理乃妄涉于風流遂飾輩于士子且以自託雖邇傒塵滓而賞許雲霞栖間虛以築館背城闕而為家帶二學之高宇遠三市之狹邪事雖儉而未陋製有度而不奢山隱勢于復石水回流于激沙樹先春而動色草迎歲而發花座有清談之客門交好事之車或林嬉于夜月或水宴于景斜肆雕章之腴旨咀文藝文英華羞緑芰與丹藕薦朱李及甘瓜雖慚洛水之名致有類金谷之喧譁聊自足于所好豈留連于或號思炯戒而自反勗身名于所蹈奉哲后之淵猷讚崇麾于華奧豈干乘之乏使感一眄之相勞竟不留于三月因病滿而休告彼東觀之清華乃任隆于載筆蔡一去而貽恨張再還而有述忽牽短而濫官司惇史于藏室慚班子之繁麗微馬生之簡實復通籍而延寵陪帝扃之華密信儀鳳之所棲乃絲文之自出歷五載而徘徊猶官命之不改謝能飛于無翼故同滯于有待晚加秩于戎章乃號之所在屬運道之將季諒冠屨之無礙奄升御于鼎湖忽流哀于四海昔漢室之中微皇統于是三絶暨孝昌之陵陂亦繼而禍結將小雅之詩廢復三綱之道滅思𨄅蹐于時昏獨沈吟于運閉遂退處于窮里不外交于人世及數反于中興驅時雄而電逝既藉取亂之權方乘轉圓之勢俄隙開而守廢遂冠冕之毀裂彼膏原而塗野嗟衛旰與嵇血何古今之一揆每治少而亂多慮遁身于東掖荀窘迹于南羅時獲逃于阜仍竄宿于巖阿首丘急于明發東路長其如何遽登舟而鼓柂乃沿洛而泛河騖寸陰于不測競征鳥于歸波時在所而放命連百萬于山東何信都之巨猾若封豕與大風肆吞噬于嘴距咸邑燼而野空徑黎陽之寇聚迫崖壘之渢隆躁通川而鼎沸矢交射于舟中備百罹于茲日諒陳蔡之非窮乘虎口而獲濟陵陽侯而迅往得投憩于濮陽實陶衛之舊壤望鄉村而佇立曾不遙之河廣聞虜馬之夕嘶見胡塵之晝上王略恢而廟勝車徒發而雷響扇風師之猛氣張天罼之層網裁一鼓而冰銷俄氛祲之廓蕩昔蘧生之出奔視亡徵于亂政及季子之來反乃君立而位定伊吾人之蕞爾本無傒于衰盛欣草茅而偃伏且優遊于宸慶復推斥于宦流延光華于璽命甫聞內侍之忝復奉優加之令何金紫之陸離鬱貂玉之相映時權定之云初尚民心之易擾何建武之明傑茂雄姿于天表忽靈命之有歸藉親均而爭紹師出楚而飆發旆陵江而雲矯闢閶闔之崢嶸端冕旒于億兆神駕逝以流越翠華飆而繚繞苟命舛而數違雖功深而祚天時難忽然已及網羅周其四張非五三之親昵罕殉節于漢陽彼百寮之冠帶咸北面于西王矧恩疏而任遠固身存而義亡及宸居之反正振天網于頽綱甄大義以明罰虛半列于周行乃褫帶而來反驅下澤于故鄉探宿志以內求撫身途而自計不詭遇以邀合豈釣名以干世獨浩然而任已同虛舟之不繫既未識其所以來亦豈知其所以逝于是得喪同遣忘懷自深遇物棲息觸地山林雖因西浮之迹何異東都之心願自託于魚鳥永得性于飛沈庶保此以獲沒不再罪于當今魏書李附傳元皓入洛以李諧為給事黃門待郎影敗除名乃為述身賦
