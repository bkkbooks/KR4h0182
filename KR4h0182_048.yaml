body:
  text: 袁翻思歸賦日色黯兮高山之岑月逢霞而未皎霞值月而成陰望他鄉之阡陌非舊國之池林山有木而蔽月川無梁而復深悵浮雲之弗限何此恨之難禁于是雜石為峰諸煙共色秀出無窮煙起不極錯翻花而似繡網遊絲其如織蝶兩戲以相追燕雙飛而鼓翼怨驅馬之悠悠歎征夫之未息余乃臨峻壑坐層阿北眺羊腸詰屈南望龍門嵯峨疊千重以聳翠橫萬里而揚波遠𤟤鼯與麇麝走鰩鱉及龜鼉彼曖然兮鞏洛此邈矣兮關河心鬱鬱兮徒傷思搖搖兮空滿思故人兮不見神翻覆兮魂斷斷魂兮如亂憂來兮不散俯鏡兮白水水流兮漫漫異色兮縱橫奇光兮爛爛下對兮碧沙上覩兮青岸岸上兮氤氳駮霞兮絳氛風搖枝而為弄日照水以成文行復行兮川之畔望復望兮望夫君君之門兮九重門余之別兮千里分願一見兮導我意我不見兮君不聞魄惝悅兮知何語氣繚戾兮獨縈縕彼鳥馬之無知尚有情于南北雖吾人之固鄙豈忘懷于上國去上國之美人對下邦之鬼域形既同于魍魎心匪殊于蝥賊欲修之而難化何不殘之云剋知進退之非可徒終朝以默默願生還于洛濱荷天地之厚德魏書袁翻傳出為乎陽太守甚不自得遂作思歸賦安置蠕蠕表謬以非才忝荷邊任猥垂訪逮安置蠕蠕主阿那瓌婆羅門等處所遠近利害之宜竊惟匈奴為患其來久矣雖隆周盛漢莫能障服衰弱則降富彊則叛是以方叔召虎不遑自息衛青去病勤亦勞止或修文德以來之或興干戈以伐之而一得一失利害相侔故呼韓來朝左賢入侍史籍謂之盛事千載以為美談至于皇代勃興威馭四海爰在北京仍梗疆埸自卜惟洛食定鼎伊瀍高車蠕蠕迭相吞噬始則蠕蠕衰微高車彊盛蠕蠕則自救靡暇高車則僻遠西北及蠕蠕復振反破高車主喪民離不絕如綫而高車今能終雪其恥復摧蠕蠕者正由種類繁多不可頓滅故也然鬭此兩敵即卞莊之筭得使境上無塵數十年中者抑此之由也今蠕蠕內為高車所討滅外憑大國之威靈兩主投身一朞而至百姓歸誠萬里相屬進希朝廷哀矜剋復宗社退望庇身有道保其妻兒雖乃遠夷荒桀不識信順終無純固之節必有孤負之心然興亡繼絕列聖同規撫降䘏附綿經共軌若棄而不受則虧我大德若納而禮待則損我資儲來者既多全徙內地非直其情不願迎送艱難然夷不亂華殷鑒無遠覆車在于劉石毀轍固不可尋且蠕蠕尚存則高車猶有內顧之憂未暇窺窬上國若蠕蠕全滅則高車跋扈之計豈易可知今蠕蠕雖主奔于上民散于下而餘黨實繁部落猶眾處處碁布以望今主耳高車亦未能一時并兼盡令率附又高車士馬雖眾主甚愚弱上不制下下不奉上唯以掠盜為資陵奪為業河西捍禦彊敵唯涼州敦煌而已涼州土廣民希糧仗素闕敦煌酒泉空虛尢甚若蠕蠕無復豎立令高車獨擅北垂則西顧之憂匪旦伊夕愚謂蠕蠕二主皆宜存之居阿那瓌于東偏處婆羅門于西裔分其降民各有攸屬那瓌住所非所經見其中事勢不敢輒陳其婆羅門請修西海故城以安處之西海郡木屬涼州今在酒泉直北張掖西北千二百里去高車所住金山一千餘里正是北虜往來之要衝漢家行軍之舊道土地沃衍大宜耕殖非但今處婆羅門于事為便即可永為重戊鎮防西北宜遣一良將加以配衣仍令監護婆羅門凡諸州鎮應徙之兵隨宜割配且田且戍雖外為置蠕蠕之舉內實防高車之策一二年後足食足兵斯固安邊保塞之長計也若婆羅門能自克厲使餘燼歸心收離聚散復興其國者乃漸令北徙轉渡流沙即是我之外蕃高車勍敵西北之虞可無過慮如其姦回反覆孤恩背德者此不過為逋逃之寇于我何損今不早圖戎心一啟脫先據西海奪我險要則酒泉張掖自然孤危長河以西終非國有不圖厥始而憂其終噬臍之恨悔將何及愚見如允乞遣大使往涼州敦煌及于西海躬行山谷要害之所親閱亭障遠近之宜商量士馬校練糧仗部分見定處置得所入春西海之閒即令播種至秋收一年之食使不復勞轉輸之功也且西海北垂即是大磧野獸所聚千百為群正是蠕蠕射獵之處殖田以自供藉獸以自給彼此相資足以自固今之豫度微似小損歲終大計其利實多高車豺狼之心何可專信假令稱臣致款正可外加優納而復內備彌深所謂先人有奪人之心者也管窺所陳懼多孟浪魏書袁翻傳又見通典一百九十六正光二年十月朝廷問安置蠕蠕之宜于涼州刺史袁翻翻表乞加金紫表臣往忝門下翼侍帳幄同時流輩皆以出離左右蒙數階之陟唯臣奉辭非但直去黃門今為尚書後更在中書令下于臣庸朽誠為叨濫準之倫匹或有未盡竊惟安南之與金紫雖是異品之隔實有半階之校加以尚書清要位遇通顯準秋論資似加少進語望比官人不願易臣自揆自顧力極求此伏願天地成造有始有終矜臣疲病乞臣骸骨願以安南尚書換一金紫魏書袁翻傳奏駮太常議甄琛諡案禮諡者行之迹也號者功之表也車服者位之章也是以大行受大名細行受細名行生于已名生于人故闔棺然後定諡皆累其生時美惡所以為將來勸戒身雖死使名常存也凡薨亡者屬所即言大鴻臚移本郡大中正條其行迹功過承中正移言公府下太常部博士評議為諡列上諡不應法者博士坐如選舉不以實論若行狀失實中正坐如博士自古帝王莫不殷勤重慎以為襃貶之實也今之行狀皆出自其家任其臣子自言君父之行無復相是非之事臣子之欲光揚君父但苦迹之不高行之不美是以極辭肆意無復限量觀其狀也則周孔聯鑣伊顏接衽論其諡也雖竊文盡武罔或加焉然今之博士與古不同唯知依其行狀又先問其家人之意臣子所求便為議上都不復斟酌與奪商量是非致號諡之加與汛階莫異專以極美為稱無復貶降之名禮官之失一至于此案甄司徒行狀至德與聖人齊蹤鴻名共大賢比迹文穆之諡何足加焉但比來贈諡于例普重如甄琛之流無不複諡謂宜依諡法慈惠愛民曰孝宜諡曰孝穆公自今已後明勒太常司徒有行狀如此言辭流宕無復節限者悉請裁量不聽為受必準人立諡不得甚加優越復仍踵前來之失者付法司科罪魏書甄琛傳正光五年琛卒贈司徒太常議諡文穆吏部郎袁翻奏從之明堂議謹案明堂之義今古諸儒論之備矣異端競構莫適所歸故不復遠引經傳傍採紀籍以為之證且論意之所同以詶詔口耳蓋唐虞已上事難該悉夏殷已降校可知之謂典章之極莫如三代郁郁之盛從周斯美制禮作樂典刑在焉遺風餘烈垂之不朽案周官考工所記皆記其時事具論夏殷名制豈其紕繆是知明堂五室三代同焉配帝象行義則明矣及淮南呂氏與月令同文雖布政班時有堂个之別然推其體例則無九室之證既而世衰禮壞法度淆弛正義殘隱妄說斐然明堂九室著自戴禮探緒求源罔知所出而漢氏因之自欲為一代之法故鄭玄云周人明堂五室是帝一室也合于五行之數周禮依數以為之室德行于今雖有不同時說昞然本制著存而言無明文欲復何責本制著存是周五室也于今不同是漢異周也漢為九室略可知矣但就其此制猶竊有懵焉何者張衡東京賦云乃營三宮布教班常複廟重屋八達九房此乃明堂之文也而辥綜注云房室也謂堂後有九室堂後九室之制非巨異乎裴頠又云漢氏作四維之个不能令各據其辰就使其像可圖莫能通其居用之禮此為設虛器也甚知漢世徒欲削滅周典捐棄舊章改物創制故不復拘于載籍且鄭玄之詁訓三禮及釋五經異義竝盡思窮神故得之遠矣覽其明堂圖義皆有悟人意察察著明確乎難奪諒足以扶微闡幽不墜周公之舊法也伯喈損益漢制章句繁雜既違古背新又不能易玄之妙矣魏晉書紀亦有明堂祀五帝之文而不記其經始之制又無坦然可準觀夫今之基址猶或髣髴高卑廣狹頗與戴禮不同何得以意抑心便謂九室可明且三雍異所復乖盧蔡之義進退亡據何用經通晉朝亦以穿鑿難明故有一屋之論竝非經典正義皆以意妄作茲為不典學家常談不足以範時軌世皇代既乘乾統厤得一馭宸自宜稽古則天憲章文武追蹤周孔述而不作四彼三代使百世可知豈容虛追子氏放篇之浮說徒損經紀雅誥之遺訓而欲以支離橫議指畫妄圖儀刑宇宙而貽來葉者也又北京制置未皆允怗繕脩草創以意良多事移禮變所存者無幾理苟宜革何必仍舊且遷都之始日不遑給先朝規度每事循古是以數年之中悛換非一良以永法為難數改為易何為宮室府庫多因故迹而明堂辟雍獨遵此制建立之辰復未可知矣既猥班訪逮輒輕率瞽言明堂五室請同周制郊建三雍求依故所庶有會經誥無失典刑識偏學疏退慚謬浪魏書袁翻傳正始初脩明堂辟雍翻議選邊戍事議臣聞兩漢警于西北魏晉備在東南是以鎮邊守塞必寄威重伐叛柔服實賴溫良故田叔魏尚聲高于沙漠當陽鉅平績流于江漢紀籍用為美談今古以為盛德自皇上以叡明纂御風凝化遠威厲秋霜惠霑春露故能使淮海輸誠華陽即序連城革面比屋歸仁懸車劍閣豈伊曩載鼓譟金陵復在茲日然荊揚之牧宜盡一時才望梁郢之君尤須當今秀異自比緣邊州郡官至便登疆埸統戍階當即用或值穢德凡人或遇貪家惡子不識字民溫恤之方唯知重役殘忍之法廣開戍邏多置帥領或用其左右姻親或受人貨財請屬皆無防寇禦賊之心唯有通商聚斂之意其勇力之兵驅令鈔掠若值彊敵即為奴虜如有執獲奪為已富其羸弱老小之輩微解金鐵之工少閑草木之作無不搜營窮壘苦役百端自餘或伐木深山或耘草平陸販貿往還相望道路此等祿既不多資亦有限皆收其實絹給其虛粟窮其力薄其衣用其工節其食綿冬歷夏加之疾苦死于溝瀆者常十七八焉是以吳楚閒伺審此虛實皆云糧匱兵疲易可乘擾故驅率犬羊屢犯疆埸頻年以來甲冑生蟣十萬在郊千金日費為獘之深一至于此皆由邊任不得其人故延若斯之患賈生所以痛哭良有以也夫潔其流者清其源理其末者正其本既失之在始庸可止乎愚謂自今以後荊揚徐豫梁益諸蕃及所統郡縣府佐統軍至于戍主皆令朝臣王公已下各舉所知必選其才不拘階級若能統御有方清高獨著威足臨戎信能懷遠撫循將士得其忻心不營私潤專脩公利者則就加爵賞使久于其任以時襃賚厲其忠款所舉之人亦垂優異獎其得士嘉其誠節若不能一心奉公才非捍禦貪惏日富經略無聞人不見德兵厭其勞者即加顯戮用彰其罪所舉之人隨事免降責其謬薦罰其偽薄如此則舉人不得挾其私受任不得孤其舉善惡既審沮勸亦明庶邊患永消譏議攸息矣魏書袁翻傳上闕鉅鹿郡開國公之子也下闕前涼州刺史兼吏部郎中陳郡袁翻字景翔制銘碑拓本駮元端等羊祉諡臣聞惟名與器不可妄假安諡準行必當其迹案祉志性急酷所在過威布德罕聞暴聲屢發而禮官虛述諡之為景非直失于一人實毀朝則請還付外準行更量虛實魏書酷吏羊祉傳元端劉臺龍議諡曰景侍中侯剛給事黃門侍郎元纂等駮慧成造像銘夫靈蹤啟則攀宗靡尋容像不陳則崇之必於以真於上齡遺形敷于下葉暨于大代茲功厥作比丘慧成自以影濯玄流激逢昌運率竭誠心為國造石窟系荅皇恩有資來業父使持節光祿大夫洛州刺史始平公奄焉薨放仰顏以摧躬匪烏在遂亡父造石像一區願亡父神飛三智周十地玄照則万震慧嚮則大千斯元世師僧父母眷屬鳳翥道場鸞騰兜率若悟落人閒三槐獨秀九棘雲敷五群生咸同斯願太和廿二年九月十四日訖朱義章書孟達文碑拓本奏請以元和子伯宗襲爵河南王和太和中出為沙門讓爵于鑒鑒後以和子顯年在弱冠宜承基緒求遜王爵以歸正胤先朝詔終鑒身聽如其請鑒既薨逝和求襲封謹尋詔旨聽傳子顯不許其身和先讓後求有乖道素請令伯宗承襲魏書河南王曜附傳元和與弟鑒子伯宗競求承襲尚書令肈奏奏定大枷臣等聞王者繼天子物為民父母導之以德化齊之以刑法小大必以情哀矜而勿喜務于三訊五聽不以木石定獄伏惟陛下子愛蒼生恩侔天地疏網改祝仁過商后以枷杖之非度愍民命之或傷爰降慈旨廣垂昭恤雖有虞慎獄之深漢文惻隱之至亦未可共日而言矣謹案獄官令諸察獄先備五聽之理盡求情之意又驗諸證信事多疑似猶不首實者然後加以拷掠諸犯年刑已上枷鎖流徙已上增以杻械失用不俱非大逆外叛之罪皆不大枷高杻重械又無用石之文而法官州郡因緣增君遂為恆法進乖五聽退違令文誠宜案劾依旨科處但踵行已久計不推坐檢杖之大小鞭之長短令有定式但枷之輕重先無成制臣等參量造大枷長一丈三尺喉下長一丈通頰木各方五寸以擬大逆外叛杻械以掌流刑己上諸臺寺州郡大枷請悉焚之枷本掌囚非拷訊所用從今斷獄皆依令盡聽訊之理量人彊弱加之拷掠不聽非法拷人兼以拷石魏書刑罰志永平元年七月尚書令高肈尚書僕射清河王懌尚書邢巒李平江陽王繼等奏又見通典一百六十四奏使劉芳更造樂器案太樂令公孫崇所造八音之器竝五度五量太常卿劉芳及朝之儒學執諸經傳攷辦合否尺寸度數悉與周禮不同問其所以稱必依經文聲則不協以情增減殊無準據竊惟樂者皇朝治定之盛事光贊祖宗之茂功垂之後王不刊之制宜憲章先聖詳依經史且二漢魏晉歷諸儒哲未聞器度依經而聲調差謬臣等參議請使臣芳準依周禮更造樂器事訖之後集議竝呈從其善者魏書樂志永平二年秋尚書令高肈尚書僕射清河王懌等奏言奏請推處僧暹等逼召僧祗戶謹案故沙門統曇曜昔于承明元年奏涼州軍戶趙苟子等二百家為僧祇戶立課積粟擬濟飢年不限道俗皆以拯施又依內律僧祇戶不得別屬一寺而都維那僧暹僧頻等進違成旨退乖內法肆意任情奏求逼召致使吁嗟之怨盈于行道棄子傷生自縊溺死五十餘人豈是仰贊聖明慈育之意深失陛下歸依之心遂令此等行號巷哭叫訴無所至乃白羽貫耳列訟宮闕悠悠之人尚為哀痛況慈悲之士而可安之請聽苟子等還鄉課輸儉乏之年周給貧寡若有不虞以擬邊捍其暹等違旨背律謬奏之愆請付昭玄依僧律推處魏書釋老志尚書令高肈奏言奏請勒銘射所伏見親御弧矢臨原弋遠弦動羽馳矢鏃所逮三百五十餘步臣等伏惟陛下聖武自天神蓺夙茂巧會騶虞之節妙盡矍圃之儀威稜攸疊甝兕懾氣才猛所振勍憝弭心足以肅截九區赫服八宇矣盛事奇迹必宜表述請勒銘射宮永彰聖蓺魏書高聰傳世宗于河南懷界親射矢一里五十餘步侍中高顯等奏
