body:
  text: 卷七孝文帝原沈保沖詔保沖文秀之子可特原命配洛陽作部終身魏書沈文秀附傳子保沖坐援漣口退敗有司處之死刑高祖詔手詔李崇為梁州刺史今仇隴剋清鎮捍以德文人威惠既宣實允遠寄故敕受梁州用寧邊服便可善思經略去其可除安其可育公私所患悉令芟夷魏書李崇傳餞北海王詳還洛詔昔者淮夷叛命故有三年之舉鬼方不令乃致淹載之師況江吳竊命于今十紀朕必欲蕩滌南海然後言歸今夏停此故與汝相見善守京邑副我所懷魏書北海王詳傳車駕南伐詳朝于行宮及還洛高祖餞之詔詳詔王肅夫知己貴義君臣務恩不能矜災恤禍恩義焉措卿情同伍員懷酷歸朕然未能翦一讎人馘彼凶帥何嘗不興言憤歎羡吳閭而長息比獲蕭鸞輔國將軍黃瑤起乃知是卿怨也尋當相付微望紓泄使吾見卿之日差得緩懷魏書王肅傳既平漢陽詔肅云云初齊武之收肅父奐也司馬黃瑤起攻奐殺之故詔云然詔房伯玉朕承天馭宇方欲清一寰域卿蕞爾小戍敢拒六師卿之愆罪理在不赦魏書房法壽附傳詔答王肅得表覽之憮然觀卿意非專在水當是以藻等鋭兵新敗于前事往勢難故也朕若分兵遣之非多會無所制多遣則禁旅難闕今日之計唯當作必剋之舉不可為狐疑之師徒失南兗也卿便息意停彼以圖義陽之寇宜止則止還取義陽宜下則下鎮軍淮北深量二途勿致重爽若孟表糧盡軍不及致失渦陽卿之過也魏書王肅傳肅討義陽未剋而齊將裴叔業寇渦陽劉藻等救之為叔業所敗肅表求更遣軍援渦陽詔云云肅乃解義陽之圍以赴渦陽孝明紀乙未詔將軍鄭思明嚴虛敬宇文福等三軍繼援以傅永為汝潁鎮將詔修期在後少有擒殺可揚武將軍汝陰鎮將帶汝陰太守魏書傅永傳裴叔業又圍渦陽遣永為統軍與高聰劉藻成道益任莫問等往救之戰敗高祖俱鎖之聰藻徙為邊民永免官爵而已不旬日詔云云減損恆供詔朕以寡德屬茲靖亂實賴群英凱清南夏宜約躬賞效以勸茂績后之私府便可損半六宮嬪御五服男女常恤恆供亦令減半在戎之親三分省一魏書孝文紀下詔南陽太守鄭長猷昔曹公剋荊州留滿寵于後朕今委卿此郡兼統戎馬非直綏初附以扞城相託魏書劉芳附傳酬賚徐謇詔夫神出無方形稟有礙憂喜乖適理必傷生朕覽萬機長鍾革運思芒芒而無怠身忽忽以興勞仲秋動痾心容頓竭氣體羸瘠玉几在盧侍御師右軍將軍徐成伯馳輪太室進療汝蕃方窮丹英藥盡芝石誠術兩輸忠妙俱至乃令沈勞勝愈篤瘵克痊論勤語效實宜褒録昔晉武暴疾程和應增封辛疚數朝錢爵大墜況疾深于曩辰業難于疇日得不重加陟賞乎宜順群望錫以山河且其舊徑高秩中暫解退比雖銓用猶未準舊量令事合顯進可鴻臚卿金鄉縣開國伯食邑五百戶賜錢一萬貫魏書徐謇傳又詔錢府未充須以雜物絹二千匹雜物一百匹四十匹出御府穀二千斛奴婢十口馬十匹一匹出驊騮牛十頭所賜雜物奴婢牛馬皆經內呈魏書徐謇傳贈李沖詔沖貞和資性德義樹身訓業自家道素形國太和之始朕在弱齡早委機密實康時務鴻漸瀍洛朝選開清升冠端右惟允出納志肅柔明足敷睿範仁恭信惠有結民心可謂國之賢也朝之望也方升寵秩以旌功舊奄致喪逝悲痛于懷既留勤應陟兼良宿宜褒可贈司空公給東園祕器朝服一具衣一襲贈錢三十萬布五百匹蠟二百斤魏書李沖傳推列韓顯宗詔顯宗斐然成章甚可怪責進退無檢虧我清風此而不糾或長敝俗可付尚書推列以聞魏書韓麒麟附傳奪韓顯宗見官詔顯宗雖浮矯致愆才猶可用豈得永棄之也可以白衣守咨議展其後效但鄙很之性不足參華可奪見口并禁問訊諸王魏書韓麒麟附傳轉辥真度為豫州刺史詔獻忠盡心人臣令節標善賞功有國徽範故一言可以興邦片辭可以喪國得無遠録前謀以褒厥善真度爰自遷京每在戎役沔北之計恆所與聞知無不言頗見采納及六師南邁朕欲超據新野群情皆異真度獨與朕同撫蠻寧夷實有勤績可增邑二百戶轉征虜將軍豫州刺史魏書辥安都附傳報廣陵侯衍詔先君餘尊之所厭禮之明文季末陵遲斯典或廢侯既親王之子宜從餘尊之義便可大功魏書陽平王新成附傳衍為徐州刺史所生母雷氏卒表請解州詔云報元修議詔修短有命吉凶由人何得過致憂憚以乖維城之寄違凶就吉時亦有之可聽更立館宇魏書汝陰王天賜附傳第五子修義遷齊州刺史以齊州頻喪刺史纍表固辭詔云為六弟娉室詔夫婚姻之義曩葉攸崇求賢擇偶綿代斯慎故剛柔著于易經鵲巢載于詩典所以重夫婦之道美尸鳩之德作配君子流芳後昆者也然則婚者合二姓之好結他族之親上以事宗廟下以繼後世必敬慎重正而後親之夫婦既親然後父子君臣禮義忠孝于斯備矣太祖龍飛九五始稽遠則而撥亂創業日昃不暇至于諸王娉合之儀宗宗婚姻之戒或得賢淑或乖好逑自茲以後其風漸缺皆人乏窈窕族非百兩擬匹卑濫舅氏輕微違典滯俗深用為歎以皇子茂年宜簡令正前者所納可為妾媵將以此年為六弟娉室長弟咸陽王禧可娉故潁川太守隴西李輔女次弟河南王幹可娉故中散代郡穆明樂女次弟廣陵王羽可娉驃騎咨議參軍滎陽鄭平城女次弟潁川王雍可娉故中書博士范陽盧神寶女次弟始平王協可娉廷尉卿隴西李沖女季弟北海王詳可娉吏部郎中滎陽鄭懿女魏書咸陽王禧傳詔答有司利建雖古未必今宜經野由君理非下請邑采之封自有別式魏書咸陽王禧傳有司奏冀州人蘇僧瓘三千人稱禧清明有惠政請世胙冀州詔云云又見北史十七停教武詔雖云教武未練其方既逼北行臣聞教武脫生群惑且可停之魏書咸陽王禧傳臨韓太妃喪詔太妃韓氏薨逝情以傷慟太妃先朝之世位擬九殯豫班上族誕我同氣念此孤稚但用感側明當暫往臨哭可敕外備辦遣侍御史假節監護喪事贈綵八百匹魏書趙郡王幹傳敦諭河南王幹詔季世多務情緣理奪幹既居要任銓衡是荷豈容遂其私志致曠所司可遣黃門郎敦諭令勉從王事朕尋當與之相見魏書趙郡王幹傳餞趙郡王幹詔夫刑獄之理先哲所難然既有邦國得不自勵也汝我之懿弟當聿修厥德光崇有魏深思遠圖如臨深履薄罔恃親重不務世政國有常憲方增悲感魏書趙郡王幹傳幹除冀州刺史高祖親餞于近郊詔幹推問斬盜馬賊詔夫刑以節人罪必無濫故刑罰不中民無措手足若必以威殺為良則應汛通衆牧苟須有禁何得不稽之正典又律令條憲無聽新君加戮之文典禮舊章不著始臨專威之美尚書曲阿朕意實傷皇度幹暗于治理律外重刑並可推聞魏書趙郡王幹傳幹為冀州刺史州表斬盜馬人于律過重而尚書以幹初臨縱而不劾詔云云詔酈範卿身非功舊位無重班所以超遷顯爵任居方夏者正以勤能致遠雖外無殊效亦未有負時之愆而鎮將伊利妄生姦撓表卿造船市玉與外賊交通規陷卿罪窺覦州任有司推驗虛實自顯有罪者今伏其辜矣卿其明為算略勿復懷疑待卿別犯處刑及鞭今恕刑罷鞭止罰五十卿宜克循綏輯邊服稱朕意也魏書酈範傳經李沖墓遣祭詔司空文穆公德為時宗勳簡朕心不幸阻逝託墳邙嶺旋鑾覆舟躬睇塋域悲仁惻舊有慟朕衷可遣太牢之祭以申吾懷魏書李沖傳諡高祐詔不遵上命曰靈可諡為靈魏書高祐傳褒升崔振詔振在郡著績宜有褒升魏書雀挺附傳挺弟振為高陽內史徵兼尚書左丞後改定職令振本資惟擬五品詔云云詔任城王澄顯達侵亂沔陽不安朕不親行莫攘此賊朕疾患淹年氣力惙敝如有非常委任城大事是段任城必須從朕魏書任城王傳高祖不豫引澄入見清徽堂詔云云遂從駕南伐齊王簡喪詔叔父薨背痛慕摧絶不自勝任但虛頓床枕未堪奉赴當力疾發哀魏書齊郡王簡傳薨時高祖不豫黜張彝為守尚書詔阿倪愚騃誰引為郎北史秦王翰傳陪斤子昭小字阿倪尚書張彝引兼殿中郎孝文將為齊郡王簡舉哀而昭乃作宮懸帝大怒詔云云于是黜彝白衣守尚書昭遂停廢手詔皇太子汝弟六叔父協清規懋賞與白雲俱潔厭榮捨紱以松柏為心吾少與綢繆提攜道趣每請解朝纓恬真丘壑吾以長兄之重未忍離遠何容仍屈素業長嬰世網吾百年之後其聽協辭蟬捨冕遂其沖挹之性無使成王之朝翻疑姬旦之聖不亦善乎汝為孝子勿違吾敕魏書彭城王協傳以僧顯為沙門都統詔門下近得録公等表知欲早定沙門都統比考德選賢寤寐勤心繼佛之任莫知誰寄或有道高年尊理無勞紆或有器玄識邈高挹塵務今以思遠寺主法師僧顯仁雅欽韻澄風柔鏡深敏潛明道心清亮固堪茲任式和妙衆近已口白可敕令為沙門都統及副儀二事緇素攸同頃因曜統獨濟遂廢茲任今欲毗德贊善固須其人皇舅寺法師僧義行恭神畼溫聰議正業茂道優用應副翼可都維那以光賢徒廣弘明集二十四聽諸法師一月三入殿詔門下崇因贊業莫若宗玄裨神染志誰先英哲故周旦著其朋之誥釋迦唱善知之文然則位尊者以納賢為貴德優者以親仁為尚朕雖寡昧能無庶幾也先朝之世經營六合未遑內範遂令皇庭闕高邈之容紫闥簡超俗之儀于欽善之理福田之資良為未足將欲令懿德法師時來相見進可餐稟道味退可飾光朝廷其敕殿中聽一月三入人數法諱別當牒付廣弘明集二十四令諸州衆僧安居講説詔門下憑玄歸妙固資冥風餐慧習慈實鍾果智故三炎檢攝道之恆規九夏溫詮法之嘉猷可敕諸州令此夏安居清衆大州三百人中州二百人小州一百人任其數處講説皆僧祗粟供備若粟鮮徒寡不此數者可令昭玄量減還聞其各欽旌賢匠良推睿德勿致濫濁情茲後進廣弘明集二十四贈徐州僧統并設齋詔門下徐州道人統僧逞風識淹通器尚倫雅道業明博理味淵澄清聲茂譽早彰于徐沛英懷玄致夙流于譙宋比唱法北京德芬道俗應供皇筵美敷宸宇仁睿之良朕所嘉重依因既終致茲異世近忽知聞悲怛于懷今路次兗濮青泗豈遙愴然念德又增厥心可下徐州施帛三百匹以供追福又可為設齋五千人廣弘明集二十四歲施道人應統帛詔門下應統仰紹前哲繼道門徽佇玄範沖猷是託今既讓俗名理宜別供可取八解之義歲施帛八百匹準四輩之貺隨四時而給又修善之本實依力命施食之因內典所美可依朝官上秩當月而施所以遠譬深理者匪獨開崇俗心抑亦獎勵道意耳廣弘明集二十四為慧紀法師亡施帛設齋詔門下徐州法師慧紀凝量貞遠道識淳虛英素之操超然世外綜涉之功斯焉罕倫光法彭方聲茂華裔研論宋壤宗德遠邇爰于往辰唱啼鹿苑作匠京緇延賞賢叢倏矣死魔忽殲良器聞之悲哽傷慟于懷可敕徐州施帛三百匹并設五百人齋以崇追益廣弘明集二十四敕副使王清石卿莫以本是南人言語致慮若彼先有所知所識欲見便見須論即論盧昶正是寬柔君子無多文才或主客命卿作詩可率卿所知莫以昶不作便復罷也凡使人之體以和為貴勿遞相矜誇見于色貌失將命之體卿等各率所知以相規誨魏書盧玄附傳詔盧昶使于蕭昭業又敕副使王清石敕王肅劉昶聞蕭衍善用兵勿與爭鋒待吾至若能禽此人則江東吾有也南史六建武二年肅昶單騎走得肅昶巾箱中魏帝敕密敕宕昌公王遇太師萬一即可監護喪事魏書馮熙傳敕答成淹諫泛泗入河朕以恆代無運漕之路故京邑民貧今移都伊洛欲通運四方而黃河急浚人皆難涉我因有此行必須乘流所以開百姓之心知卿至誠而今者不得相納魏書成淹傳高祖幸徐州將況泗入河泝流還洛軍次碻磝淹乃上疏陳諫高祖敕宣旨彭城王協協翼弼六師纂戎荊楚沔北之勳每毗廟算從征新野有克城之謀受命鄧城致大捷之效功為群將之最也別賞授賞不替厥庸魏書彭城王協傳車駕還京會百寮于宣極堂行飲至策勳之禮命舍人宣旨戒南安王楨翁孝行著于私庭令聞彰于邦國每欽忠懿思一言展故因講武遠徵赴闕仰戀仁慈情在未已但長安鎮年飢民儉理須綏撫不容久留翁今還州其勤隱恤無令境內有飢餒之民翁既國之懿親終無貧賤之慮所宜慎者略有三事一者恃親驕矜違禮僭度二者傲慢貪奢不恤政事三者飲酒遊逸不擇交友三者不去患禍將至但能慎此足以全身遠害光國榮家終始之德成矣魏書南安王楨傳誡高陽王雍相州乃是舊都自非朝賢德望無由居此是以使汝作牧為政之道非難非易其身正不令而行故便是易其身不正雖令不從故便是難又當愛賢士存信約無用人言而輕與奪也魏書高陽王雍傳雍除相州刺史高祖誠雍誡河南王幹司空穆亮年器可師散騎常侍盧淵才堪詢訪汝其師之魏書趙郡王幹傳太和九年封河南王及車駕南伐以幹緦戎別道誡之誡太子恂以冠義夫冠禮表之百代所以正容體齊顏色順辭令容體正顏色齊辭令順故能正君臣親父子和長幼然母見必拜兄弟必敬責以成人之禮字汝元道所寄不輕汝當尋名求義以順吾旨魏書廢太子恂傳太和十七年冠恂于廟高祖臨光極東堂引恂入見誡以冠義戒上谷侯贊贊化畿甸可宣孝道必令風教洽和文禮大備自今有不孝不弟者比其門標以刻其柱北史十五秦王翰傳初置司州以贊為刺史賜爵上谷侯孝文戒云云于是賜名贊賜北海王詳璽書比遊神何業也丘墳六籍何事非娛善正風猷肅是禁旅魏書北海王詳傳遺曹虎書皇帝謝偽雍州刺史神運兆中皇居闡洛化總元天方融八表而南有未賓之吳治為兩主之隔幽顯含嗟人靈壅閼且漢北江邊密邇乾縣故先動鳳駕整我神邑卿進無陳平歸漢之智退闕關羽殉節之忠嬰閉窮城憂頓長沔機勇兩缺何其嗟哉朕比乃欲造卿逼𤕠未果且還新都饗厥六戎入彼春月遲遲揚旆善修爾略以俟義臨南齊書曹虎傳為家人書與彭城王協教風密微禮政嚴嚴若不深心日勸何以敬諸每欲立一宗師肅我元族汝親則宸極位乃中監風標才器實足師範屢有口敕仍執沖遜難違清挹荏苒至今宗制之重捨汝誰寄便委以宗儀責成汝躬有不遵教典隨事以聞吾別肅治之若宗室有愆隱而不舉鍾罰汝躬綱維相厲庶有勸改吾朝聞夕逝不為恨也魏書彭城王協傳顧命宰輔粵爾太尉司空尚書令左右僕射吏部尚書惟我太祖丕丕之業與四象齊茂纍聖重明屬鴻曆于寡昧兢兢業業思纂乃聖之遺蹤遷都嵩極定鼎河瀍庶南蕩甌吳復禮萬國以仰光七廟俯濟蒼生困窮早滅不永乃志公卿其善毗繼子隆我魏室不亦善歟可不勉之魏書孝文紀下祭恆嶽文維太和十八年敬昭告于恆嶽之靈天極搆高人暉肇啓幽明合歡百神同悅今龍旆鳴鑾載還伊室邁歷恆巒路鄰陰嶽惟靈作鎮出納炎冰帝道資功坤儀憑德故遣兼官以牲玉薦于恆嶽之靈尚饗初學記五祭嵩高山文維太和十八年敬昭告于嵩高中嶽之靈太極分渾兩儀是生辰作乾寶嶽樹坤靈昭彰天地吐納五精唯中挺神祥契幽經日月交暉寒暑遞成萬象合和兆類孳盈爰自化闢俶慶胥庭軒轅曜哲伊祁載形逮于有周實光洛禎川潛龍光山隱鳳停三才憑微七曜依明人倫傾首百神柔誠造厥區夏歷茲三正應符代績孰不斯營曰乎皇魏飛虬玄并螭騰穹象川九黔嬴新邦興略不猷罔清他瓊指陰淹翠濕亭河圖曠覽升中闕銘朕承法統誕邀休宏開物成務載鑠盛齡遷宇柳方闡繩廛城則直之興百堵若星日躔流馥月陸芬馨鏘旋紫宿景曜黃衡鸞聲嘒嘒鳥和嚶哸歸蓋如雲還輈若霆惟嵩嵓嵓峻極昊青惟邑翼翼長啓魏京薦玉告于用昭永貞納茲多福萬國以寧初學記五弔殷比干墓文唯皇搆遷中之元載歲御次乎閹茂望舒會于星紀十有四日日唯甲申子揚和淇右蹀駟鄘西指嵩原而搖步順京途以啓征路歷商區輨屆衛壤泛目睇川縱覽觀陸遂傍睨古迹遊瞰曩風覩殷比干之墓悵然悼懷焉乃命馭駐輪策驥躬矚荊蕀荒朽工為綿薨而遺猷明密事若對德慨狂后之猖穢傷貞臣之婞節聊興其韻貽弔云爾曰三才之肇元兮敷五靈以扶德念剛柔于金木兮資明暗于南北重離耀其炎暉兮曾坎司玄以秉黑伊常之懷生兮昏睿遞其啓則晝皎皎其何朗兮夜幽幽而致蔽哲人昭昭而澄光兮狂夫黕黕其若翳咨堯舜之耿介兮何桀紂之猖敗沈湎而不知甲兮終或已以貽戾謇謇兮比干藉胄兮殷宗含精兮誕冥樹兮英風蘭露以滌神餐英而㒈容茹薜荔以蕩識佩江蘺以麗躬履霜以結冰兮卒窘忠而彌濃千金豈其吾珍兮皇輿實余所鍾奮誠諫而燼軀兮導危言以釁鋒嗚呼哀哉嗚呼哀哉惟子在殷實為梁棟外贊九功內徽辰共匡率𤇯職德音遐洞周師還旆非子誰貢否哉悖運遘此不辰三綱道沒七曜輝泯負乘竊器怠棄天倫懷誠齎怒讜言焉陳嵬侯已醢子不見歟邢侯已脯子不聞歟微子去矣子不知歟萁子奴矣子不覺歟何其輕生一致斯歟何其愛義勇若歸歟遺體既灰不其惜歟永矣無返不其痛歟嗚呼哀哉嗚呼哀哉夫天地之長遠兮嗟人生短多殃往者子弗及兮來者子不報當胡契闊之屯亶兮值昏化而永良曷不相時以卷舒兮徒委質而巔亡雖虛名空傳于千載詎何勳之可揚奚若騰魂以遠逝飛足而歸昌得比肩于尚父卒同協于周王建鴻績于盛辰啓骨宇于齊方闡穆音乎萬祀傳冤業以修長而乃自受茲斃視竅殷親剖心無補迷機喪身脫非武發封墓誰因嗚乎介士胡不我臣重曰世惛惛而溷濁兮日藹藹其無光時坎廩而險隘兮氣憭𩗭以飛霜子奚其不遠逝兮他傺而址故鄉可乘以浮滄兮求蓬萊而為粻銜芝條以升虛兮與赤松而𦒡翔被芰荷之輕衣兮曳扶容之帕裳循海波而漂颻兮望會稽以歸禹紐蕙芷以為紳兮扈荃佩而容與寫鬱結于聖人兮畼中心之祕語執垂益而談弄兮交良朋而攄苦言既而東騰兮吸朝霞而長舉登巖而悵望兮眺扶桑以停佇謁靈威以問路兮乘谷風而扳宇遂假載于羲和兮馮六螭以南處翥衡嶽而顧步兮濯沅湘以自潔嚼炎州之八桂兮踐九疑而遙裔即蒼梧而宗舜兮拂埃霧以就列采輕越而肅兮切寶屖以貫介訴淳風之淪覆兮話蕭韶之湮滅召熊狸而敘釋兮問重華之風桀爾乃令正陽之精氣兮遊丹丘而明視揖祝融而求鳥兮御朱鸞以循指因景風而凌天兮回靈𪀩以西履降黃渚而造稷兮慰稼穡之艱難訪有邰之詵詵兮遇何主而獲安然後陟崑崙之翠嶺兮攬瓊枝而槃桓步懸圃以溜湸兮咀玉英以折蘭歷崦嵫而一顧兮府沐髮于洧盤仰徙倚于閶闔兮請帝閽而啓關天沈寥而廓落兮地寂漻而遼閬餐淪陰以椑氣兮佩瑤玕而鳴鏘拜招矩而修節兮少躊躇以相羊祈騶虞而總韁兮隨泰風以飄揚瞰不周而左旋兮縱神駟以北望尋流沙而騁轡兮暨陽周以緤駕靡藝芳以馥體兮索夷杜而枑衙奉軒轅而陳辭兮申時俗之不暇適岐伯而修命兮展力牧而問霸歙沆瀣之純粹兮窺寒門之層冰聆廣莫之瑟兮覿黔羸而回凝擁玄武以涉虛兮神冥而威陵象曖曃而暗鬱兮途曼曼其難勝策飛廉而前驅兮使燭龍以輝澄歸中樞而睇睨兮想玄漠之已周慨飛魂之無寄兮颯翾袂而上浮引雄虹而登峻兮揚雲旗以軒遊躍八龍之蜿蜿兮振玉鸞之啾啾搴彗星以朗導兮委升軔乎大儀敖重陽之帝宮兮凝精魄于旋曦扈陽曜而靈修兮豈傅説之足奇但至之不悛兮寧溘死而不移碑拓本又南齊書魏虜傳引脫非武發四句祭岱嶽文維太和十九年敢昭告于泰山東嶽之靈造化氛氳是生二儀玄黃既闢山川以離四流含靈五嶽苞祗并兼萬象出納望儀岱宗穹崇梁甫盤崛青丘崎嶬春址鬱筆肇生庶類啓光品物上敷神工下融靈秩載協化文四氣以溢百王鐫成莫不茲室初學記五祭河文維太和十九年皇帝敢昭告于河瀆之靈坤元涌溢黃瀆作珍浩浩洪流實裨陰淪通源導物含介藏鱗啓潤萬品承育蒼旻惟聖作則惟禹克遵浮楫飛帆洞厥百川朕承寶曆克纂乾文勝鸞淮方旋鷁河濆龍舲御瀆鳳旆乘雲泛泛棹舟翾翾沂津宴我皇遊光餘夷濱肇開水利漕典載新千艫桓桓萬艘斌斌保我大義惟爾作神初學記六祭濟文維太和十九年皇帝遣太常寺守散騎常侍敢昭告于濟瀆之靈乾光資曜坤載播液惟瀆畼靈協輝陰辟庶象憑和降升芳瀝蘊神包化比士宣績溫芳涌瑞沇源導濟引流通滄實侔四體作潤岱宗含雲吐澧潤波湛湛川風濔濔瞻洪津而懷德乘長波而欽智汛龍儀之郁穆璨玉軒而浮被沈璋璧之明物翼牲潔以歸寄初學記六
