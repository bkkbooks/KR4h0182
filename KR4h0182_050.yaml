body:
  text: 孫景雍陳終德為祖母持重議嫡孫後祖持重三年不為品庶生二終德宜先諸父魏書禮志四永平四年十二月員外將軍兼尚書都令史陳終德有祖母之喪欲服齊衰三年以無世爵之重不可陵諸父若下同衆孫恐違後祖之義請求詳正國子博士孫景雍劉懷義封軌高綽太學博士袁升四門博士陽寧居等議又見通典八十九又議喪服雖以士為主而必下包庶人何以論之自大夫以上每條標列逮于庶人含而不述此同士制不復疑也唯有庶人為國君此則明義服之輕重不涉于孫祖且受國于曾祖廢疾之祖父亦無重可傳而猶三年不必由世重也夫霜感露濡異識咸感承重主嗣寧甄寢廟嫡孫之制固不同殊又古自卿以下皆不殊承襲末代僭妄不可以語通典是以春秋譏于世卿王制稱大夫不世此明訓也喪服經雖無嫡孫為祖三年正文而有祖為嫡孫周豈祖以嫡服己己與庶孫同為祖服期于義可乎服祖三年此則近世未嘗變也準古士官不過二百石以上終德即古之廟士也假令終德未班朝次苟曰志仁必也斯遂況乃官歷士流當訓章之運而以庶叔之嫌替其嫡重之位未是成人之善也魏書禮志四通典八十九喪服正文大夫以上每事顯列唯有庶人含而不言此通下之義了然無惑且官族者謂世有其功食舊德者謂德侯者世位興滅國繼絶世主謂諸侯卿大夫無罪誅絶者耳且金貂七眊楊氏四公雖以位相承豈得言世祿乎晉太康中令史殷遂以父祥不及所繼求還為祖母三年時政以禮無代父追服之文亦無不計三年之制此即晉世之成規也魏書禮志四通典八十九上書請定巴蜀昔晉室數否華戎鼎沸三燕二秦咆勃中夏九服分崩五方圮裂皇祚承曆自北而南誅滅姦雄定鼎河洛唯獨荊揚尚阻聲教今令德廣被于江漢威風遠振于吳楚國富兵強家給人足以九居八之形有兼弱攻味之勢而欲逸豫遺疾子孫違高祖之本圖非社稷之深慮誠宜商度東西戍防輕重之要計量疆埸險易安危之理探測南人攻守窺覦之情籌算卒乘器械征討之備然後去我所短避彼所長釋其至難攻其甚易奪其險要割其膏壤數年之內荊揚可并若捨舟楫即平原斂後疏前則江淮之所短棄車馬遊飛浪乘流馳逐非中國之所長彼不敢入平陸而爭衡猶我不能越巨川而趣利若俱去其短各恃其長則東南未見可滅之機而淮沔方有相持之勢且夫滿昃相傾陰陽恆理盛衰遞襲五德常運今以至強攻至弱必見并吞之理如以至弱禦至強焉有全濟之術故明王聖主皆欲及時立功為萬世之業去高而就下百川以之常流取易而避難兵家以之恆勝今巴蜀孤懸去建鄴遼遠偏兵獨戍泝流十千牧守無良專行劫剝官由財進獄以貨成士民思化十室而九延頸北望日覬王師若命一偏將弔民伐罪風塵不接可傳檄而定守白帝之厄據上流之險循士治之迹蕩建鄴之逋然後偃武修文制禮作樂天下幸甚豈不盛哉魏書李苗傳上書言秦隴兵事臣聞食少兵精利于速戰糧多卒衆事宜持久今隴賊猖狂非有素蓄雖據兩城本無德義其勢在于疾攻日有降納遲則人情離阻坐受崩潰夫飆至風起逆者求萬一之功高壁深壘王師有全制之策但天下久泰人不曉兵奔利不相待逃難不相顧將無法令士非教習以憍將御惰卒不思長久之計務奇正之通必有莫敖輕敵之志恐無充國持重之規如令隴東不守汧軍敗散則二秦遂強三輔危弱國之右臂于斯廢矣今且宜勒大將深溝高壘堅守勿戰別命偏師精兵數千出麥積崖以襲其後則汧岐之下群妖自散魏書李苗傳正光末二秦反叛苗以隴兵強悍且群聚無資乃上書又北史四十五叔母及兄子喪出入作鼓吹議凡三司之尊開國之重其于王服皆有厭絶若尊同體敵雖疏尚宜徹樂如或不同子姓之喪非嫡者既殯之後義不闕樂魏書禮志四可以展耳目之適絲竹可以肆遊宴之娛故于樂貴縣有哀則廢至若德儉如禮升降有數文物昭旗旗之明鍚鸞為行動之響所以辨等列明貴賤非措哀樂于其間矣謂威儀鼓吹依舊為允魏書禮志四上書言李謐學行竊見故處士趙郡李謐十歲喪父哀號罷鄰人之相幼事兄瑒恭順盡友于之誠十三通孝經論語毛詩尚書曆數之術尢盡其長州閭鄉黨有神童之號年十八詣學受業時博士即孔璠也覽始要終論端究緒授者無不欣其言矣于是鳩集諸經廣校同異比三傳事例名春秋叢林十有二卷為璠等判析隱伏垂盈百條滯無常滯纖毫必舉通不長通有枉斯屈不苟言以違經弗飾辭而背理辭氣磊落觀者忘疲每曰丈夫擁書萬卷何假南面百城遂絶迹下帷杜門卻掃棄産營書手自刪削卷無重復者四千有餘矣猶括次專家搜比讜議隆冬達曙盛暑通宵雖仲舒不窺園君伯之閉戶高氏之遺漂張生之忘食方之斯人未足為喻謐嘗詣故太常卿劉芳推問音義語及中代興廢之由芳乃歎曰君若遇高祖侍中太常非僕有也前河南尹黃門侍郎甄琛內贊近機朝野傾目于時親識求官者答云趙郡李謐耽學守道不悶于時常欲致言但未有次耳諸君何為輕自媒衒謂其子曰昔郊玄盧植不遠數千里詣扶風馬融今汝明師甚邇何不就業也又謂朝士曰甄琛行不愧時但未薦李謐以此負朝廷耳又結宇依巖憑崖鑿室方欲訓彼青襟宣揚墳典冀西河之教重興北海之風不墜而祐善空聞暴疾而卒邦國銜殄瘁之哀儒生結摧梁之慕況璠等或服議下風或親承音旨師儒之義其可默乎魏書逸士李謐傳延昌四年卒四門小學博士孔璠等學官四十五人上書詔諡曰貞靜處士白上黨王伏承世子聰慧之姿發于天性目所一見誦之于口此既歷世罕有竊願驗之周書長孫紹遠傳父稚作牧壽春紹遠年甫十三稚管記王碩聞紹遠強記心以為不然遂白稚乞贈諡徐遵明表臣聞行道樹德非求利于當年服義履仁豈邀恩于沒世但天爵所存果致式閭之禮民望攸屬終有祠墓之榮伏見故處士兗州徐遵明生在衡泌弗因世族之基長于原野匪乘雕鏤之地而託心淵曠置情恬雅處靜無悶居約不憂故能垂簾自精下帷獨得纘經緯之微言研聖賢之妙旨莫不入其門戶踐其堂奧信稱大儒于海內擅明師于日下矣是故眇眇四方知音之類延首慕德跂踵依風每精廬暫闢杖策不遠千里束修受業編録將踰萬人固已企盛烈于西河擬高蹤于北海若慕奇好士愛客尊賢罷吏遊梁紛而成列遵明以碩德重名首蒙禮命曳裾雅步眷同置醴黃門李郁具所知明方申薦奏之恩處心守壑之志潛居樂道遂往不歸故北海王入洛之初率土風靡遵明確然守志忠潔不渝遂與太守李湛將誅叛逆時有邂逅受斃凶險至誠高節湮沒無聞朝野人士相與嗟悼伏惟陛下遠應龍序俯執天衷每端聽而忘昃常坐思而候曉雖微功小善片言一行莫不衣裳加室玉帛在門況遵明冠蓋一時師表當世溘焉冥沒旌紀寂寥逝者長辭無論榮價文明敘物敦厲斯在臣託迹諸生親承顧盼惟伏膺之義感在三之重是以越分陳愚上喧幄座特乞加以顯諡追以好爵仰申朝廷尚德之風下示學徒稽古之利若宸鑒昭回曲垂矜採則荒墳千載式貴生平魏書徐遵明傳永熙二年遵明弟子通直散騎常侍李業興表卒無贈諡對信都芳駮新曆歲星行天伺候以來八九餘年恆不及二度今新曆加二度至于夕伏晨見纖毫無爽今日仰看如覺二度及其出沒還應如術鎮星自造壬子元以來歲常不及故加壬子七度亦知猶不及五度適欲并加恐出沒頓校十度十日將來永用不合處多太白之行頓疾頓遲取其會歸而己近十二月二十日晨見東方新舊二曆推之分寸不異行星三日頓校四度如此之事無年不有至其伏見還依術法又芳唯嫌十二月二十日星有前卻業興推步已來三十餘載上算千載之日月星辰有見經史者與涼州趙建劉義隆廷尉卿何承天劉駿南徐州從事史祖沖之參校業興甲子元曆長于三曆一倍考洛京己來四十餘歲五星出沒歲星鎮星太白業興曆首尾恆中及有差處不過一日二日一度兩度三曆之失動校十日十度熒惑一星伏見體自無常或不應度祖沖之曆多甲子曆十日六度何承天曆不及三十日二十九度今曆還與壬子同不有加增辰星一星沒多見少及其見時與曆無舛今此亦依壬子元不改太白辰星唯起夕合為異業興以天道高遠測步難精五行伏留推考不易入目仰窺未能盡密但取其見伏大歸略其中間小謬如此曆便可行若專據所見之驗不取出沒之效則曆數之道其幾廢矣夫造曆者節之與朔貫穿于千年之間閏餘斗分推之于毫釐之內必使盈縮得衷間限數合周日小分不殊錙銖陽曆陰曆纖芥無爽損益之數驗之交會日所居度考之月蝕上推下減先定衆條然後曆元可求猶甲子難值又雖值甲子復有差分如此踳駮參錯不等今曆發元甲子七卒同遵合璧連珠其言不失法理分明情謂為可如芳所言信亦不謬但一合之裏星度不驗者至若合終必還依術鎮星前年十二月二十日見差五度今日差三度太白前差四度今全無差以此準之見伏之驗尋效可知將來永用大體無失芳又云以去年十二月中算新曆其鎮星以十二月二十日在角十一度留天上在亢四度留是新曆差天五度太白歲星並各有差校于壬子舊曆鎮星差天五度太白歲星亦各有差是舊曆差天為多新曆差天為少凡造曆者皆須積年纍日依法候天知其疏密然後審其近者用作曆術不可一月兩月之間能正是非若如熒惑行天七百七十九日一遲一疾一留一逆一順一伏一見之法七頭一終太白行天五百八十三日晨夕之法七頭一終歲星行天三百九十八日七頭一終鎮星行天三百七十八日七頭一終辰星行天一百一十五日晨夕之法七頭一終造曆者必須測知七頭然後作術得七頭者造曆為近不得頭者其曆甚疏皆非一二日能知是非自五帝三代以來及秦漢魏晉造曆者皆積年久測術乃可觀其倉卒造者當時或近不可久行若三四年作者初雖近天多載恐失今甲子新曆業興潛構積年雖有少差校于壬子元曆近天者多若久而驗天十年二十間比壬子元曆元星行天其差為密魏書律曆志下興平元年命李業興立甲子元新曆事訖詔以示信都芳芳駮業興對云詔付外施行陳兵事疏臣聞國之大事惟祀與戎戎之有功在于將帥三代不必別民取治不等五霸不必異兵各能剋定有湯武之賢猶須伊望之佐堯舜之聖尚有稷契之輔得其人也六合唾掌可清失其人也三河方為戰地何者動之甚易靖之至難竊以比年以來將帥多是寵貴子孫軍幢統領亦皆故義託附貴戚子弟未經戎役至于銜杯躍馬志逸氣浮軒眉攘腕便以攻戰自許及臨大敵怖懼交懷雄圖鋭氣一朝頓盡乃令羸弱在前以當鋭強壯居後以安身兼復器械不精進止不集任羊質之將驅不練之兵當負險之衆敵數戰之虜欲令不敗豈有得哉是以兵知必敗始集而先逃將又怖敵遷延而不進國家便謂官號未滿重爵屢加復疑賞賚之輕金帛日賜帑藏空虛民財殫盡致使賊徒更增膽氣益盛生民損耗荼毒無聊主歎臣哀何心寢食臣雖位微竊不遑舍臣聞孝行出于忠貞節義率多果決德可感美夫恩可勸死士今若捨上所輕求下所重黜陟幽明賞罰善惡搜徒簡卒練兵習武甲密弩強弓調矢徑謀夫既設辨士先陳曉以安危示其禍福如其不悛以我義順之師討茲悖逆之豎豈異厲蕭斧而伐朝菌鼓洪爐而燎毛髮雖愚者知其不旋踵矣敢以愚短昧死陳誠魏書路恃慶附傳
