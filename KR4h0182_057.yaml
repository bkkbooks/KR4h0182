body:
  text: 卷五十七闕名魏故寧朔將軍固州鎮將鎮東將軍漁陽太守宜陽子司馬元興墓誌銘君諱紹字元興河內溫人也晉河閒王右衛將軍遷散騎常侍中護軍使持節侍中太尉公贈車騎大將軍儀同三司諡曰武王欽之玄孫晉河閒王右衛將軍遷散騎常侍中護軍使持節侍中太尉公贈車騎大將軍儀同三司諡曰武王欽之玄孫晉河閒王侍中左衛將軍贈使持節鎮西將軍荊州刺史諡曰景王曇之之會孫晉淮南王祕書監遷使持節鎮北將軍徐兗二州刺史晉祚流移姚授冠軍將軍殿中尚書大魏蒙授安遠將軍丹陽侯贈平西將軍雍州刺史諡曰𥳑公叔璠之孫寍朔將軍宜陽子驃騎府從事中郎鎮西將軍略陽王府長史道壽之子君夙稟明規纂承徽烈洪業方隆生志未遂以太和十七年歲次戊申七月庚辰朔十二日壬子薨于第以永平四年歲次辛卯十月癸亥朔十一日癸酉遷葬在溫城西北廿里記之遙哉遠裔緬矣鴻冑承符紹夏作賓于周貞明代襲奕世宣流誕生夫子剋纂徽猷崇基方構嘉業始脩蘭摧始夏桂折未秋感戀景行式述遺休碑拓本司馬景和妻孟氏墓誌銘夫人姓孟字敬訓清河入也蓋中散大夫之幼女陳郡府君之季妹夫人資含章之淑氣廩懷叡之奇風芬芳特出英華秀生婉問河洲鼓鐘千里年十有七而作嬪于司馬氏自笄髮從人撿無違度四德孔脩婦宜純奉舅姑以恭孝興名接娣姒以謙慈作稱恆寬心靜質舉成物軌謹言慎行動為人範斯所謂三宗厲矩九族承規者矣又夫人性氵妒𡜱多于容納敦桃天之宜上篤小星之逯下故能慶螽斯五男三女出入閨闈諷誦崇禮義方之誨既形幽閑之教亦著然盡力事上夫人之懃夫婦有別夫人之識捨惡從善夫人之志內宗加密夫之之恤姻于外親夫人之仁夫人有五器而加之以躬儉節用豈悟天道無知與善徒言享年不永凶啚橫集春秋冊有二以延昌二年夏六月甲申朔廿日癸卯遘疾奄忽薨于壽春嗚呼哀哉粵三年正月庚戌朔十二日辛酉歸葬于鄉墳河內溫縣溫城之西寔以營原興壟竁野成丘故式述清高而為頌云穆二夫人乘和誕生蘭藂蕙糅玉潤金聲令聞在室徽音事庭方孚洪烈範古流名如何不淑早世徂傾思聞後葉刊石題誠碑拓本洛州刺史刁遵墓誌銘高祖協元亮晉侍中尚書左僕夫人彭城曹氏父羲晉梁國曾祖彝太倫晉侍中徐州牧司空義陽祖畼仲遠晉中書令金紫左光祿大夫平父雍淑和皇魏使持節侍中都督揚豫兗徐四州徐豫冀三州刺史東安𥳑公夫人琅邪王氏父公諱遵字奉國勃海饒安人也姓氏之興錄于帝圖中葉廣淵謨明有晉祖父以忠肅恭懿䏈輝建見者世往傳聞之外不復銘于幽泉也公稟惟岳之靈挺基仁之德忠本于立以小節而求名無虛譽以眩世少能和俗于人無際但昂然愕然者侍中中書監司空文公高允皇代之儒宗見而異之便以女焉太和中尋拜魏郡太守寬明臨下而德洽于民正始中徵為太尉高陽王諮議參軍事王以公有古人之風器而禮焉俄而轉大司農少卿均節九賦以豐邦用莅事未幾遷使持節都督洛州諸軍事龍驤將軍洛州刺史公之立政惠流兩疆平陽慕化辟地二百方一江沔成功告老上天不弔忽焉降疾熙平元年秋七月廿六日春秋七十有六薨于位朝廷痛悼百寮追惜贈使持節都督兗州諸軍事平東將軍兗州刺史侯如故加諡曰惠禮也惟公為子也孝為父也慈在臣也忠居蕃也治兄弟穆常棣之親朋友著必然之信尊賢容眾博施無窮載仁抱義行藏罔滯溫恭好善桑榆彌篤小子整等泣徂年之箭駿痛龜筮之告祥奉靈轜而號慟遷神柩于故鄉以二年歲次丁酉冬十月己丑朔九日丁酉窆于饒安城之西南孝義里皇考儀同𥳑公之左松門永閟深扃長鍵庶鐫石于下壤仰誌德于幽泉其辭曰攸攸緜緒帝之胤驛代貞賢自唐暨晉明哲迭興忠能繼儁在洛雲居徂揚岳鎮氛鯨興虐金厤道亡於昭我祖違難來翔位班鼎列朝望斯光顯顯懿考奉構腰璜依仁挺信據德摽明紐龜出守入讚台衡惠霑千里道懋槐庭清風遙被徽音遠盈曰登農貳播稼是司巍巍高廩禮教將怡邊城俟捍戎氓佇治秉旄肅命董牧宣威方叔剋壯燕奭遐齡庶乘和其必壽泣信順而徂傾攀號兮罔訴摧裂兮崩聲銘遺德兮心以糜刊泉石兮慟深扃夫人同郡高氏父允侍中中書監司空咸陽文公碑拓本崔敬邕墓誌銘祖秀才諱殊字敬異夫人從事中郎趙國李烋女父雙護中書侍郎冠軍將軍豫州刺史安平敬侯夫人中書趙國李誥女魏故持節寵驤將軍督營州諸軍事營州刺史征虜將軍大中大夫臨青男崔公之墓誌銘君諱敬邕博陵安平人也夫其殖姓之始蓋炎帝之胤其在隆周遠祖尚父實作太師秉旄鷹揚剋佐揃殷若乃遠源之富奕世之美故以備之前冊不待詳錄君即豫刺史安平敬侯之子冑積仁之基累榮構之峻特稟清貞少播令譽然諾之信著于童孺瑤音玉震聞于弱冠年廿八而儁華茂實以響流于京夏矣被旨起家召為司徒府主簿納贊槐衡能和鼎味俄而轉尚書都官郎中時高祖孝文皇帝將改制創物大崇革正復以君兼吏部郎詮敘彝倫九流斯順太和廿二年春宣武皇帝副光崇正妙蕑宮衛復以君為東朝步兵景明初丁母憂還家居喪致毀幾于滅性服終朝廷以君膽量凝果善謀好成臨事發奇前略無滯徵君拜為左中郎將大都督中山王刺史出圍偽義陽城拔凱旋君有協規之效功績隆盛授龍驤將軍太府少卿臨青男忠懃之稱實顯于茲永平初聖主以遼海戎夷宣化佇賢肅慎契丹必也綏接于是除君持節營州刺史將軍如故君軒鑣始邁聲猷以先麾蓋踐疆而溫膏均被于是殊俗知仁荒嵎識澤惠液達于逋遐德潤潭于𨕙服延昌四年以君清政懷柔宣風自遠徵君為征虜將軍太中大夫方授美任而君嬰疾連歲遂以熙平二年十一月廿一日卒于位縉紳痛惜絪舊咸酸依君績行蒙贈左將軍濟州刺史君諡曰貞禮也孤息伯茂銜哀在疚摧號冈訴泣庭訓之崩沈淚松楊之以樹洞抽絕其何言刊遺德于泉路其辭曰緜哉遐冑帝炎之緒爰歷姬初祖惟尚父曰周曰漢榮光繼武邁德傳輝儒賢代舉於穆叡考誕質含靈秉仁岳峻動智淵明育善以和獎幹以貞響發邽丘翼起槐庭廉鍾盛世皇澤遠融入參彝敘出佐邊戎謀成轅幕績著軍功偽城飆偃蠢境懷風王恩流賞作捍東荒惠沾海服愛洽遼鄉天情方渥蕑爵惟良如何倉昊國寶淪光白楊晦以籠雲松區杳而煙邃藐孤叫其崩惌親賓颯而垂淚仰層穹而摧號痛尊靈之長祕誌遺德兮何陳篆幽石兮深遂嗚呼哀哉碑拓本君諱植字子建勃海蓧人也下闕茂烈皆備之國籍家傳不復更錄下闕之子君稟靈原之秀下闕慧機者顧暘下闕求至道于司衿始此下闕宣武皇帝下闕皇帝已下闕衛下闕理沈下闕絕白駞之下闕我以方約我以下闕心始姦詐之輩下闕君在下闕神翻然下闕泉下闕至德虛麋下闕名山衢下闕贖兮下闕豪痛彼蒼者天喪此明公瓊矣哲人惟義是依每見我君終始許師大魏神龜下闕碑拓本司馬昞墓誌銘君諱昞字景和河內溫人也晉武帝之八世孫淮南王播之曾孫魏平北將軍固州鎮大將魚陽郡宜陽子興之子先室屯離宗胤介否乃祖歸國賞以今爵奕世承華休榮彌著君有拔群之奇挺世之用神風魁崖機悟高絕少被朝命為奉朝請牧王主簿員外散騎侍郎給事中從龍驤府上佐遷揚州車騎大將軍府長史帶梁郡太守在邊有暐略之稱轉授清河內史此郡名重特以人舉不幸遇疾以正光元年七月廿五日薨于河內城朝廷追美詔贈持節左將軍平州刺史非至行感時孰能若此以庚子之年玄枵之月廿六日丙申葬于本鄉溫城西十五都鄉孝義之里刊石誌文而為辭曰君侯烈烈玉操金聲高風愕愕屢歷徽榮奄然辭住沒有餘馨鐫茲泉石用銘休貞碑拓本懷令李超墓誌銘君諱超字景昇本字景宗後承始族叔在江左者懸同故避改云秦州隴西郡吠道縣都鄉華風里人也雅著高節敦襲世風言行足師興作成準脩情孝友困心名義安貧樂道息詭遇之襟介然峻特標礭焉之操弱冠舉司州秀才拜奉朝請除恆農郡冠軍府錄事參軍事宰沁水縣巨政崇治綽居尤最為受罪者所誣章憲臺誤聽被茲深劾除名為民于是廿年中浮沈閭巷玉潔金志卓爾無悶到熙平二年甫更從宦補荊州前將軍騎兵參軍事復作懷令已受拜垂垂述職遭疾正光五年八月十八日卒于洛陽縣之永年里宅時年六十一孤貞華首訖于二邑門從無兩遠邇酸恨懷之百姓長慕喪氣雖陳留之哀望胡季叡不是過也越六年正月丙午朔十六日幸酉葬洛陽縣覆舟山之東南玄壤難窮陵谷時異刻茲陰石照序光塵泱泱顯斂蔓西垂代襲清則沓炳羽儀道妙之門緒風屬斯惟祖惟考倜儻瓌奇昌謨迭駕高矱明規杳量无隄玄契不貲揔脩異貫員應紛枝灼灼伊君山立淵渟棲真宅正寢繩履程懿鑠為質醇素用情均冶禮世氣重財輕亦既從招旁溢鴻聲隨牒出入密勿力誠爰莅近邑先邁儀形絕交獨坐化動陰窴尚德貽咎眾實叵蓋拂衽歸來餝轅裙帶恂恂鄉閈万殊一會優柔善成无小无大垂白再仕汛爾浴流階倫稍降盛業愈遒逯作後城士女承休轡頓方馳盡士悲愁剋節炯言弔賞靡徵端恭妄家俗虛膺攉彼圮跡事罕篇繒長源未輸深啚乍卷薀此逸機空生徒返茲窟易削疇毒難遣楨掬疏竦泉房寒遠孀孤內爛妹弟摧咺式鏤沈石託注幽篆妻恆農楊氏父談為郟州主簿息女孟宜年卅六適恆農王始儁郡中正息女媛姿適遼西常彪侍御史息女仲妃適武威賈子謐涼州治中息道沖息女婉華息女烋顏息女四輝息道逸年十六息道栖年十三南秦州刺史司馬昇墓誌銘君諱昇字進宗河內溫縣孝敬里人也其先晉帝之苗裔曾祖彭城王禪金聲于晉閣作蕃牧于家邦祖荊州才地孤雄震玉譽于江左來賓大魏為白駒之客始踐北都逢授待中使持節征南大將軍開府儀同三司十州諸軍事封琅邪王後遷司徒公父鎮剖隴西關右著雖良之績君帝王之資憑萬乘之胤夙慧早成絕于群輩君志性貞明稟操鯁直又能孝敬閨門肅雍九族鴻才峻邁聲溢洛中以孝昌二年釋褐太尉府衛參軍又除懷縣令雖牛刀恥雞且錦遊邦里莅政未幾禮教大行君臨茲百里承流敷化故能申述典謨奉遵皇猷使盜息如姦藏令行如禁止懷邑之民咸稱良翰方縻好爵而窮仕路極纓冤以官王寮如天道無徵弔善徒言遘疾一朝哲人云亡以天平二年歲次乙卯二月廿一日春秋卌有一薨于懷縣贈使持節冠軍將軍都督南秦州諸軍事南秦州刺史以其年十一月七日葬于溫縣但以日月不停遷窆有期墓門刊誌勒銘泉扉其詞曰盛矣修源發業晉軒隴西之子琅邪之孫如冰斯潔如玉之溫往賢謝美今儁何言武彭城承流全晉萬乘之冑龍德之胤辰極方高蒼海比潤崇基卓立鬱矣孤峻少播令問弱冠飛聲克壯集譽讚彼槐庭帝嘉明德作邑懷城義風烟舒道化雲行才明不壽自古在先顏生二九萎哲殲賢之子之亡如仕之年永辭白日萇歸黃泉遠送平原葬于溫縣隴樹冬寒夏凝霜霰勒銘德埏誌其鄉縣萬歲千齡誰聞誰見碑拓本齊州刺史高湛墓誌銘君諱湛字子澄勃海滌人也靈根遠秀啟慶兆于渭川芳德遐流宣大風于東海作範百王垂聲萬古者矣故清公勢重鄭伯捐師元卿位尊管仲辭禮皆所以讓哲推賢遠明風軌祖冀州刺史勃海公文昭武烈望檦中夏惠沾朝野愛結周行考侍中尚書令司徒公英風秀逸儁氣雲馳虯顧帝鄉威流宇縣君稟慶緒于綿基挹餘灡于海澳幼尚端凝長子文雅非道弗親唯德是與逍遙儒素之閒申穆之遺風俳佪文史之際追牧馬之逸藻至于憑春灑翰席月抽琴邁昔哲以孤遊超時流而獨遠熙平啟運起家為司空參軍事轉揚烈將軍羽林監天平之始襄城阻命君文武兩兼忠義奮發還城斬將蠻左同歸朝廷嘉其能縉紳服其義假龍驤將軍行襄城郡事君著績既崇賞勞未允尋除使持節都督南荊州諸軍事鎮軍將軍南荊州刺史于時偽賊陳慶率𧙿攻圍孤城獨守載離寒暑終能剋保邊隍全怗民境復除大都督行廣州事享年不永春秋卌三元象元年正月廿四日終于家皇上動哀能言灑淚迺有詔曰故持節都督南荊州諸軍事假鎮軍將軍揚烈將軍員外羽林監行南荊州諸軍事南荊州刺史當州大都督高子澄識用開敏氣幹英發擁攝蕃翰誠效剋宣臨難殉軀奄從非命言命遺績有悼于懷宜申追寵式光往烈可贈假節督齊州諸軍事輔國將軍齊州刺史粵元象二年十月十七日遷葬于故鄉司徒公之塋千秋易往萬古難留故鐫石泉門以彰之久其詞曰丹虯降祉姜水載清大人應期命世挺生垂竿起譽罷釣流聲經綸宇宙莫之與京胤司下蕃公衡上宰既顥營丘復摽東海四履流芳五城降綵繁柯茂葉傳華無改伊宗作輔忠義是依清盪昏霧橫埽塵飛日月再朗六合更暈玉帛斯集福祿修歸仁壽無遠積善空施風酸夏草霜結春池崑山墜玉桂樹摧枝悲哉永慕痛矣長離碑拓本
