body:
  text: 高閭宣命賦闕諫討淮北表伏見廟算有事淮海雖成事不說猶可思量臣君愚劣本非武用至于軍旅尤所不學直以無諱之朝敢肆狂瞽區區短見竊有所疑臣聞兵者凶器不得已而用之今天下開泰四方無虞豈宜盛世干戈妄動疑一也淮北之城凡有五處難易相兼皆須攻擊然攻守難圖力懸百倍反復思量未見其利疑二也縱使如心于國無用發兵遠入費損轉多若不置城是謂空爭疑三也脫不如意當延日月屯衆聚費于何不有疑四也伏願思此四疑時速反旆魏書高閭傳太和三年出師討淮北閭表議斷祿表天生蒸民樹之以君明君不能獨理必須臣以作輔君使臣以禮臣事君以忠故車服有等差爵命有分秩德高者則位尊任廣者則祿重下者祿足以代耕上者俸足以行義庶民均其賦以展奉上之心君王聚其材以供事業之用君班其俸垂惠則厚臣受其祿感思則深于是貪殘之心止竭效之誠篤兆庶無侵削之煩百辟備禮容之美斯則經世之明典為治之至術自堯舜以來逮于三季雖優劣不同而斯道弗改自中原崩否天下幅裂海內未一民戶耗減國用不充俸祿遂廢此則事出臨時之宜良非久長之道大魏應期紹祚照臨萬方九服既和八表咸謐二聖欽明文思道冠百代動遵禮式稽考舊章準百王不易之勝法述前聖利世之高軌置立鄰黨班宣俸祿事設令行于今已久苛慝不生上下無怨姦巧革慮窺覦絶心利潤之厚同于天地以斯觀之如何可改又洪波奔激則堤防宜厚姦悖充斥則禁網須嚴且飢寒切身慈母不保其子家給人足禮讓可得而生但廉清之人不必皆富豐財之士未必悉賢今給其俸則清者足以息其濫竊貪者足以感而勸善若不班祿則貪者肆其姦情清者不能自保難易之驗灼然可知如何一朝便欲去俸淮南之議不亦謬乎魏書高閭傳淮南王他奏求依舊斷祿文明太后令召群臣議之閭表詔從閭議請築長城表臣聞為國之道其要有五一曰文德二日武功三曰法度四曰防固五曰刑賞故遠人不服則修文德以來之荒狡放命則播武功以威之民未知戰則制法度以齊之暴敵輕侵則設防固以禦之臨事制勝則明刑賞以勸之用能闢國寧方征伐四剋北狡悍愚同于禽獸所長者野戰所短者攻城若以狄之所短奪其所長則雖衆不能成患雖來不能內逼又狄散居野澤隨逐水草戰則與家産竝至奔則與畜牧俱逃不齎資糧而飲食足是以古人伐北方攘其侵掠而已歷代為邊患者良以倏忽無常故也六鎮勢分倍衆不鬭互相圍逼難以制之昔周命南仲城彼朔方趙靈秦始長城是築漢之孝武踵其前事此四代之君皆帝王之雄傑所以同此役者非智術之不長兵衆之不足乃防狄之要事其理宜然故也易稱天險不可升地險山川丘陵王公設險以守其國長城之謂歟今宜依故于六鎮之北築長城以禦北虜雖有暫勞之勤乃有永逸之益如其一成惠及百世即于要害往往開門造小城于其側因地卻敵多置弓弩狄來有城可守有兵可捍既不攻城野掠無獲草盡則走終必懲艾宜發近州武勇四萬人及京師二萬人合六萬人為武士于苑內立征北大將軍府選忠勇有志幹者以充其選下置官屬分為三軍二萬人專習弓射二萬人專習戈楯二萬人專習騎矟修立戰場十日一習采諸諸亮八陳之法為平地禦寇之方使其解兵革之宜識旌旗之節器械精堅必堪禦寇使將有定兵兵有常主上下相信晝夜如一七月發六部兵六萬人各備戎作之具敕臺北諸屯倉庫隨近作米俱送北鎮至八月征北部率所領與六鎮之兵直至磧南揚威漠北狄若來拒與之決戰若其不來然後散分其地以築長城計六鎮東西不過千里若一夫一月之功當三步之地三百人三里三千人三十里三萬人三百里則千里之地彊弱相兼計十萬人一月必就運糧一月不足為多人懷永逸勞而無怨計築長城其利有五罷遊防之苦其利一也北部放牧無鈔掠之患其利二也登城觀敵以逸待勞其利三也省境防之虞息無時之備其利四也歲常遊運永得不匱其利五也又任將之道特須委信遣之以德恕之以情閫外之事有利輒決赦其小過要其大功足其兵力資其給用君臣相體若身之使臂然後忠勇可立制勝可果是以忠臣盡其心征將竭其力雖三敗而踰榮雖三背而彌寵魏書高閭傳北史三十四又見通典一百九十六作皇興中征南將軍刁雍上獻文帝表其文全同據閭傳乃上孝文帝表竝非為刁雍代作也今從閭傳編入閭集中應詔陳損益表奉癸未詔書以春夏少雨憂饑饉之方臻愍黎元之傷瘁同禹湯罪已之城齊堯舜引咎之德虞災致懼詢及卿士今各上書極陳損益深恩被于蒼生厚惠流于后土伏惟陛下天啓聖姿利見纂極欽若昊天光格宇宙太皇太后以睿哲贊世稽合三才高明柔克道被無外七政昭宣于上九功咸序于下君人之量逾高謙光之旨彌篤修復祭儀宗廟所以致敬飾正器服禮樂所以宣和增儒官以重文德𥳑勇士以昭武功慮獄訟之未息定刑書以理之懼蒸民之姦宄置鄰黨以穆之究庶官之勤劇班俸祿以優之知勞逸之難均分民土以齊之甄忠明孝矜貧恤獨開納讜言抑絶讒佞明訓以體率土移風雖未勝殘去殺成無為之化足以仰答三靈者矣臣聞皇天無私降鑒在下休咎之徵咸由人召故帝道昌則九疇敘君德衰而彝倫斁休瑞竝應享以五福則康于其邦咎徵屢臻罰以六極則害于其國斯乃洪範之實徵神祇之明驗及其厄運所纏世鍾陽九數乖于天理事違于人謀時則有之矣故堯湯逢歷年之災周漢遭水旱之患然立功修行終能弭息今孝治則有如此之風計運未有如彼之害而陛下殷勤引過事邁前王從星澍雨之徵指辰可必消災滅禍之符灼然自見雖王畿之內頗為少雨關外諸方禾稼仍茂苟動之以禮綏之以和一歲不收未為大損但豫備不虞古之善政安不忘危有國常典竊以北鎮新徙家業未就思親戀本人有愁心一朝有事難以禦敵可寬其往來頗使欣慰開雲中馬城之食以賑恤之足以感德致力邊境矣明察畿甸之民飢甚者出靈丘下館之粟以救其乏可以安慰孤貧樂業保土使幽定安并四州之租隨運以溢其處開關弛禁薄稅賤糴以消其費清道路恣其東西隨豐逐食貧富相贍可以免度凶年不為患苦又聞常士困則濫竊生匹婦餒則慈心薄凶儉之年民輕違犯可緩其使役急其禁令宜于未然之前申敕外牧又一夫幽枉王道為虧京師之獄或恐未盡可集見囚于都曹使明折庶獄者重加究察輕者即可決遣重者定狀以聞罷非急之作放無用之獸此乃救凶之常法且以見憂于百姓論語曰不患貧而患不安苟安而樂生雖遭凶年何傷于民庶也愚臣所見如此而已魏書高閭傳諫應曹虎表洛陽草創虎既不遣質任必非誠心無宜輕舉魏書高閭傳曹虎據襄陽請降詔劉昶辥真度等四道南伐車駕親幸懸瓠閭表諫不納論淮南不宜留戍表南土亂亡僭主屢易階下命將親征威陵江左望風慕化剋拔數城施恩布德攜民襁負可謂澤流邊方威惠普著矣然元非大舉軍興後時本為迎降戎卒實少兵法十則圍之倍則攻之所率既寡東西懸闊難以竝稱伏承欲留戍淮南招撫新附昔世祖以回山倒海之威步騎數十萬南臨瓜步諸郡盡降而盱眙小城攻而弗剋班師之日兵不戍一郡土不闢一廛夫豈無人以大鎮未平不可守小故也堰水先塞其源伐木必拔其本源不塞本不拔雖翦枝竭流終不可絶矣壽陽盱眙淮陰淮南之源本也三鎮不剋其一而留兵守郡不可自全明矣既逼敵之大鎮隔深淮之險少置兵不足以自固多留衆糧運難可充又欲修渠通漕路必由于泗口泝淮而上須經角城淮陰大鎮舟船素畜敵因先積之資以拒始行之路若元戎旋旆兵士挫怯夏雨水長救援實難忠勇雖奮事不可濟淮陰東接山陽南通江表兼近江都海西之資西有盱眙壽陽之鎮且安土樂本人之常情若必留戍運還之後恐為敵擒何者鎮戍新立懸在異境以勞禦逸以新擊舊而能自固者未之有也昔彭城之役既剋其城戍鎮已定而思叛外向者猶過數方角城蕞爾處在淮北去淮陽十八里五固之役攻圍歷時卒不能剋以今比昔事兼數倍今以向熱水雨方降兵刃既交難以恩恤降附之民及諸守令亦可徙置淮北如其不然進兵臨淮速度士卒班師還京踵太武之成規營皇居于伊洛畜力以待敵釁布德以懷遠人使中國清穆化被遐裔淮南之鎮自效可期天安之捷指辰之遠魏書高閭傳高祖攻鍾離未剋將于淮南修故城而置鎮戍以撫新附之民賜閭璽書具論其狀閭表請使公孫崇韓顯宗參知音律表書稱同律度量衡論云謹權量審法度此四者乃是王者之要務生民之所由四者何先以律為首豈不以取法之始求天地之氣故也孔子曰移風易俗莫尚于樂然則樂之所感其致遠矣今調音制樂非律無以克和然則律者樂之本也臣前被敕理樂與皇宗博士孫惠蔚太樂祭酒公孫崇等考周官國語及後漢律曆志案京房法作準以律吹律以調絲案律寸以孔竹八音之別事以粗舉書既三奏備在前聞臣年垂七十日就衰頽恐一朝先犬馬竟無絲髮之益使律法長絶遺恨沒世是以慺慺惓惓不敢忘怠近在鄴見崇臣先以其聰敏精勤有挈瓶之智雖非經國之才頗長推考之術故臣舉以教樂令依臣先共所論樂事自作鐘磬志議二卷器數為備可謂世不乏賢令崇徒教樂童書學而已不恭樂事臣恐音律一曠精賞實難習業差怠轉乖本意今請使崇參知律呂鐘磬之業觸類而長之成益必深求持臣先所奏三表勘後漢律曆志陛下親覽以求厥衷俱然易了又著作郎韓顯宗博聞彊識頗有史才粗解音律亦求令時往參知臣雖在外官竊慕古人舉善之義愚意所及不能自已雖則越分志在補益願不以言廢人魏書律曆志上太和中詔中書監高閭修正音律久末能定閭出為相州刺史十八年閭表請裁鄴中密后廟應罷應新表伏惟太武皇帝發孝思之深誠同渭陽之遠感以鄴士舅氏之故鄉有歸魂之舊宅故為密皇后立廟于城內歲時祭祀置廟戶十家齊官三十人春秋蒸嘗冠服從事刺史具滅儀親行薦酌升降揖讓與七廟同儀禮畢撤會而罷今廟殿虧漏門牆傾毀簠簋故敗行禮有闕臣備職司目所親覩若以七廟惟新明堂初制配饗之儀備于京邑者便應罷壞輟其常祭如以功高特立宜應新其靈宇敢陳所見伏請恩裁魏書禮志一太和十九年六月相州刺史高閭表言對詔議祫禘禘祭圓丘之禘與鄭義同其宗廟禘祫之祭與王義同與鄭義同者以為有虞禘黃帝黃帝非虞在廟之帝不在廟非圓丘而何又大傳稱祖其所自出之祖又非在廟之文論稱禘自既灌事似據爾雅稱禘大祭也頌長發大禘也殷王之祭斯皆非諸侯之禮諸侯無禘禮唯夏殷夏祭稱禘又非宗廟之禘魯行天子之儀不敢專行圓丘之禘取其禘名于宗廟因先有祫道生兩名據王氏之義祫而禘祭之故言禘祫總謂再殷祭明不異也禘祫一名也其禘祫止于一時止于一時者祭不欲數數則黷一歲而三禘愚以為過數魏書禮志一大和十三年詔議祫禘中書監高閭儀曹令李韶中書侍郎高遵等十三人對稱云云又見通典五十作中書監高閭又言云云六宗議書稱肆類于上帝禋于六宗六宗之祀禮無明文名位壇兆歷代所疑漢魏及晉諸儒異說或稱天地四時或稱六者之閒或稱易之六子或稱風雷之類或稱星辰之屬或曰世代所宗或云宗廟所尚或曰社稷五祀凡十有一家自晉已來逮于聖世以為論者雖多皆有所闕莫能詳究遂相因承別立六宗之兆總為一位而祭之比敕臣等評議取衷附之祀典臣等承旨披究往說各有其理較而論之長短互有若偏用一家事或差舛衆疑則從多今或則仍古請依先別處六宗之兆總為一祀而祭之魏書禮志一五德議帝王之作百代可知運代相承書傳可驗雖祚命有長短德政有優劣至于愛終嚴祖殷薦上帝其致一也故敢述其前載舉其大略臣聞居尊據極允應明命者莫不以中原為正統神州為帝宅苟位當名全化亦流洽則不專以世數為與奪善惡為是非故堯舜禪揖一身異尚魏晉相代少紀運殊桀紂至虐不廢承曆之敘厲惠至昏不闕周晉之録計五德之論始自漢劉一時之議三家致別故張蒼以漢為水德賈誼公孫臣以漢為土德劉向以漢為火德以為水德者正以嘗有水溢之應則不推運代相承之數矣以為土德者則以亡秦繼曆相即為次不推順逆之異也以為火德者懸證赤帝斬蛇之符棄秦之暴越惡承善不以世次為正也故以承周為火德自茲厥後乃以為帝魏承漢火生土故魏為土德晉承魏土生金故晉為金德趙承晉金生水故趙為水德燕承趙水生木故燕為木德秦承燕木生火故秦為火德秦之未滅皇魏未克神州秦氏既亡大魏稱制玄朔故平文之廟始稱太祖以明受命之證如周在岐之陽若繼晉晉亡已久若棄秦則中原有寄推此而言承秦之理事為明驗故以魏承秦魏為土德又五緯表驗黃星曜彩考氏定實合德軒轅承土祖未事為著矣又秦趙及燕雖非明聖各正號赤縣統有中土郊天祭地肆類咸秩明刑制禮不失舊章奄岱踰河境被淮漢非若齷齪邊方僭擬之屬遠如孫權劉備近若劉裕道成事繫蠻夷非關中夏伏惟聖明德配天地道被四海承乾統曆功侔百王光格同于唐虞享祚流于周漢正位中境奄有萬方今若并棄三家遠承晉氏則蔑中原正次之實存之無損于此而有成于彼廢之無益于今而有傷于事臣愚以為宜從尚黃定為土德又前代之君明賢之史皆因其可褒褒之可貶貶之今議者偏據可絶之義而不録可全之禮所論事大垂之萬葉宜竝集中祕群儒人人別議擇其所長于理為悉魏書禮志一太和十四年八月中書監高閭議以為既葬即吉議君不除服于上臣則釋服于下從服之義有違為臣之道衰麻朝政吉凶事雜通典八十太和十四年至德頌臣聞刑制改物者應天之聖君齷齪順常者守文之庸主故五帝異規而化興三王殊禮而致治用能憲章萬祀垂範百王歷葉所以挹其遺風後君所以酌共軌度伏惟太上皇帝道光二儀明齊日月至德潛通武功四畼霜威南被則淮徐來同齊斧北斷則獫狁覆斃西摧三危之酋東引肅慎之貢荒遐款塞九有宅心于是從容間覽希心玄奧尚鼎湖之奇風崇巢由之高潔疇咨熙載亮采群后爰挹大位傳祚聖人開古之高範爰萃于一朝曠葉之希事載見于今日昔唐虞禪舜前典大其成功太伯讓季孔子稱其至德苟位以聖傳臣子一也謹上至德頌一篇其詞曰茫茫大極悠悠遐古三皇刑制五帝垂祜仰察璿璣俯鑒后土雍容端拱惟德是與夏殷世傳周漢纂烈道風雖邈仍誕明哲爰暨三季下陵上春九服三分禮樂四缺上靈降鑒思皇反正及眷有魏配天承命功冠前王德侔往聖移風革俗天保載定於穆太皇克廣聖度玄化外畼惠鑒內悟遺此崇高挹彼沖素道映當今慶流後祚明明我皇承乾紹煥比誦熙周方文隆漢重光麗天晨暉疊旦六府孔修三辰貞觀功均乾造雲覆雨潤養之以仁敦之以信綏之斯和動之斯震自西徂東無思不服禎候立應福祿來格嘉穀秀町素文表石玄鳥呈皓醴泉流液黃龍蜿蜿遊鱗奕奕沖訓既布率土咸寧穆穆四門灼灼典刑勝殘豈遠朞月有成翹翹東嶽庶見翠旌先民有言千載一泰昔難其運今易其會沐浴淳澤被服冠帶飲和陶潤載欣載賴文以寫意功由頌宣吉甫作歌式昭永年唐政緝熙康哉垂篇仰述徽烈被之管絃魏書高閭傳顯祖傳位閭上表頌鹿苑頌闕北伐碑闕濟陰太守魏悅頌德碑祖母房年在弱笄囏貞守志秉恭姜之操著自毀之誠頌曰爰及處士遘疾夙凋伉儷秉志識茂行高殘形顯操誓敦久要誕茲令胤幽感乃昭魏書巨鹿魏溥妻房氏傳
