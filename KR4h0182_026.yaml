body:
  text: 刁雍為薄骨律鎮將至鎮上表臣蒙寵出鎮奉辭西藩總統諸軍戶口殷廣又總勒戎馬以防不虞督課諸屯以為儲積夙夜惟憂不遑寧處以今年四月末到鎮時以夏中不及東作念彼農夫雖復布野官渠乏水不得廣殖乘前以來功不充課兵人口纍率皆飢儉略加檢行知此土稼穡艱難夫欲育民豐國事須大田此土乏雨正以引河為用觀舊渠堰乃是上古所制非近代也富平西南三十里有艾山南北二十六里東西四十五里鑿以通河似禹舊迹其兩岸作溉田大渠廣十餘步山南引水入此渠中計昔為之高于河水不過一丈河水激急沙土漂流今日此渠高于河水二丈三尺又河水侵射往往奔頽渠溉高懸水不得上雖復諸處案舊引水水亦難求今艾山北河中有洲渚水分為二西河小狹水廣百四十步臣今求入來年正月于河西高渠之北八里分河之下五里平地鑿渠廣十五步深五尺築其兩岸令高一丈北行四十里還入古之高渠即循高渠而北復八十里合百二十里大有良田計用四千人四十日功渠得成訖所欲鑿新渠口河下五尺水不得入今求從小河東南岸斜斷到西北岸計長二百七十步廣十步高二丈絶斷小河二十日功計得成畢合計用功六十日小河之水盡入新渠水則充足溉官私田四萬餘頃一旬之間則水一遍水凡四溉穀得成實官課常充民亦豐贍魏書刁雍傳通典二表請水運奉詔高平安定統萬及臣所守四鎮出牛車五千乘運屯穀五十萬斛付沃野鎮以供軍糧臣鎮去沃野八百里道多深沙輕車來往猶以為難設令載穀不過二千石每涉深沙必致滯陷又穀在河西轉至沃野越渡大河計車五千乘運十萬斛百餘日乃得一返大廢生民耕墾之業車牛艱阻難可全至一歲不過二運五十萬斛乃經三年臣前被詔有可以便國利民者動靜以聞臣聞鄭白之渠遠引淮海之粟沂流數千周年乃得一至猶稱國有儲糧民用安樂今求于牽屯山河水之次造船二百艘二船為一舫一船勝穀二千斛一舫十人計須千人臣鎮內之兵率皆習水一運二十萬斛方舟順流五日而至自沃野牽上十日還到合六十日得一返從三月至九月三返運送六十萬斛計用人功輕于車運十倍有餘不費牛力又不費田魏書刁雍傳北堂書鈔一百五十九通典十表請河西造城臣聞安不忘危先聖之政也況綏服之外帶接邊城防守不備無以禦敵者也臣鎮所綰河西爰在邊表常懼不虞平地積穀實難守護兵人散居無所依恃脫有妖姦必致狼狽雖欲自固無以得全今求造城儲穀置兵備守鎮自建立更不煩官又于三時之隙不令廢農一歲二歲不訖三歲必成立城之所必在水陸之次大小高下量力取辦魏書刁雍傳興禮樂表臣聞有國有家者莫不禮樂為先故樂記云禮所以制外樂所以修內和氣中釋恭敬溫文是以安上治民莫善于禮易俗移風莫善于樂且于一民一俗尚須崇而用之況統御八方陶鈞六合哉故帝堯修五禮以明典章作咸池以諧萬類顯皇軌于云岱揚鴻化于介丘令木石革心鳥獸率舞包天地之情達神明之德夫感天動神莫近于禮樂故大樂與天地同和大禮與天地同節和故百物阜生節故祀天祭地禮行于郊則上下和肅肅者禮之情和者樂之致樂至則無怨禮至則不違揖讓而治天下者禮樂之謂歟唯聖人知禮樂之不可以已故作樂以應天制禮以配地所以承天之道治人之情故王者治定制禮功成作樂虞夏殷周易代而起及周之末王政陵遲仲尼傷禮樂之崩亡痛文武之將墜自衛返魯各得其中逮乎秦皇翦棄道術灰滅典籍坑燼儒士盲天下之目絶象魏之章簫韶來儀不可復矣賴大漢之興改正朔易服色協音樂制禮儀正聲古禮粗欲周備至于孝章每以三代損益優劣殊軌歎其薄德無以易民視聽博士曹褒覩斯詔也知上有制作之意乃上疏求定諸儀以為漢禮終于休廢寢而不行及魏晉之日修而不備伏惟陛下無為以恭己使賢以御世方鳴和鸞以陟岱宗陪群后以升中嶽而三禮闕于唐辰象舞春于周日夫君舉必書古之典也柴望之禮帝王盛事臣今以為有其時而無其禮有其德而無其樂史闕封石之文工絶清頌之饗良由禮樂不興王政大缺致也臣聞樂由禮所以象德禮由樂所以防淫五帝殊時不相沿三王異世不相襲事與時並名與功偕故也臣識昧儒先管窺不遠謂宜修禮正樂以光大聖之治魏書刁雍傳行孝論古之葬者衣之以薪不封不樹後世聖人易之以棺椁至秦以後生則不能致養死則厚葬過度及于未世至籧篨裹尸倮而葬者確而為論並非折衷既知二者之失豈宜同之當令所存者棺厚不過三寸高不過三尺弗用繒綵斂以時服轜車止用白布為幔不加畫飾名為清素車又去挽歌方相并明器雜物魏書刁沖傳北史二十六乞遣高平兵赴仇池表義隆增兵運糧剋必送死臣所領之衆本自不多唯仰民兵專恃防固其統萬安定二鎮之衆從戎以來經三四歲長安之兵役過期月未有代期衣糧俱盡形頻枯悴窘切戀家逃亡不已既臨寇難不任攻戰士民姦通知臣兵弱南引文德共為脣齒計文德去年八月與義隆梁州刺史劉秀之同征長安聞臺遣大軍勢援雲集長安地平用馬為便畏國騎軍不敢北出但承仇池局人稱臺軍不多戍兵鮮少諸州雜人各有還思軍勢若及必自奔逃進軍取城有易反掌承信其語回趣長安之兵遣文德蕭道成王虬等將領來攻武都仇池望連秦隴進圍武都已經積日畏臣截後斷其糧路關鎮少兵未有大損今外寇兵強臣力寡弱拒賊備敵非兵不擬乞選壯兵增戍武都牢城自守可以無患今事已切急若不馳聞損失城鎮恐招深責願遣高平突騎二千齎糧一月速赴仇池且可抑折逆民支對賊虜須長闕上邽安定戍兵至可得自全糧者民之命也雖有金城湯池無糧不守仇池本無儲積今歲不收若高平騎至不知云何以得供援請遣秦州之民送軍祁山臣隨迎致魏書皮豹子傳上表請伐蜀臣聞在生所以重生實有生理可保臣之情地生途巳竭所以末淪于泉壤借命于朝露者以日月貞照有兼映之輝庶憑天威誅夷讎逆自提戈西赴備嘗時難遂使齊斧停柯狡豎假息誠由經路有暨亦緣制不自巳撫影窮號泣望西路益州刺史陋始以四月二十九日達巴東頓白帝以俟廟略可乘之機宜踐投袂之會屢愆臣雖效死寇庭而理絶救援是以束骸載馳訴冤象魏昔宋害申舟楚莊有遺履之情況忘家殉國鮮有臣門節冠風霜人所矜悼伍員不虧君義而申包不忘國艱俟會佇鋒因時乃發今臣庸踰在昔未蒙宵邁之旗是以仰宸極以希照眷西士以灑淚也公私懷恥仰望洪恩豈宜遂享名器比肩人伍求情既所不容即實又非所繼但以方仗威靈要須綜攝乞解金紫寵私之榮賜以鷹揚折衝之號臣之于國理無虛請自臣涉道情慮荒越疹毒交纏常慮性命隕越要當躬先士卒身馳賊庭手斬凶醜以攄莫大之釁然後就死之日即化如歸闔門靈爽豈不謝先帝于玄宮宋書毛修之傳時益州刺史鮑陋不肯進討修之于都上表移書梁益二州我大魏之興德配二儀與造化並立夏殷以前功業尚矣周秦以來赫赫堂堂垂耀先代逮我烈祖重之聖明應運龍飛廓清燕趙聖朝承王業之資奮神武之略遠定三秦西及蔥嶺東平遼碣海隅服從北暨鍾山萬國納貢威風所扇想彼朝野備聞威德往者劉石符姚遞據三郡司馬琅邪保守揚越綿綿連連綿歷年紀數窮運改宋氏受終仍晉之舊遠通聘享故我朝廷解甲息心東南之略是為不欲違先故之大信也而彼方君臣苞藏禍心屢為邊寇去庚午年密結赫連侵我牢洛致師徒喪敗舉軍囚俘我朝廷仁弘不窮人之非不遂人之過與彼交和前好無改昔南秦王楊玄識達天運于大化未及之前度越赫連遠歸忠款玄既即世弟難當忠節愈固上請納女連婚宸極任土貢珍自比內郡漢南白雉登俎御羞朝廷嘉之授以專征之任不圖彼朝朝計疆埸之小疵不相關移竊興師旅亡我賓屬難當將其妻子及其同義告敗關下聖朝憮然顧謂群臣曰彼之違信背和與牢洛為三一之為甚其可再乎是若可忍孰不可忍是以分命吾等磬聲之臣助難當報復使持節侍中都督雍秦三州諸軍事安西將軍建興公吐奚愛弼率南秦王楊難當自祁山南出直衝建安命南秦自遣信臣招集舊戶使持節侍中都督雍梁益四州諸軍事安西將軍開府儀同三司淮陰公皮豹子員外散騎常侍平南將軍南益州刺史建德公庫拔阿浴河引出科谷厄白馬之險散騎常侍安南將軍雍州刺史南平公娥後延出自駱谷直截漢水冠軍將軍南蠻校尉荊州刺史建平公宗𦋎使持節員外散騎常侍冠軍將軍梁州刺史順陽公劉買德平遠將軍永安侯若干內亦十出自子午東襲梁漢使持節侍中都督荊梁南雍二州諸軍事領護南蠻校尉征南大將軍開府儀同三司荊州刺史故晉譙王司馬文思寧遠將軍荊州刺史襄陽公魯軌南趨荊州使持節都督洛豫州及河內諸軍事鎮南大將軍開府儀同三司淮南王直勒宅大翰為其後繼使持節侍中都督梁益寧三州諸軍事領護西戎校尉鎮西大將軍開府儀同三司揚州刺史晉琅邪王司馬楚之南趣壽春使持節侍中都督揚豫兗徐四州諸軍事征南將軍徐兗二州刺史東安公刁雍東趣廣陵南至京口使持節侍中都督青兗徐三州諸軍事征東將軍青徐二州刺史東海公故晉云顯子司馬天助直趣濟南十道並進連營五千步騎百萬隱隱桓桓以此屠城何城不潰以此奮擊何堅不摧邵陵踐土區區齊晉尚能克勝強楚以致一匡況大魏以沙漠之突騎兼咸夏之徑卒哉若衆軍就臨將令南海北泛江湖南溢高岸墊為浦澤深谷積為丘陵晉餘黎民將雲集霧聚仇池之師佹嶇山谷之中何能自固彼之所謂肆忿于目前之小得以至于敗亡之大失也昔信陵君濟窮鳩之危義士歸之故我朝廷欲救難當投命之誠為此舉動既而愛惜前好猶復沈吟多殺生生在之一亡十仁者之所不為吾等別愛後自馳檄相譬書若攝兵還反復南秦之國則諸軍同罷好穆如初若岠我義言狠愎遂往敗國亡身必成噬臍之悔望所列上彼朝惠以報告宋書索虜傳虜鎮東將軍武昌王宜勒庫莫提移書梁益二州往伐仇池侵其附屬而移書越詣徐州移書豫州僕以不德荷國榮寵受任邊州經理民物宣播政化鷹揚萬里雖盡節奉命未能令上化下布而下情上達也比者以來邊民擾動互有反逆無復為害自取誅夷死亡之餘雉莬逃竄南人宋界聚合逆黨頻為寇掠殺害良民略取資財大為民患此之界局與彼通連兩民之居煙火相接來往不絶情偽繁興是以南姦北入北姦南叛以類推之日月彌甚姦究之人數得侵盜之利雖加重法可不禁止僕常申令境局料其姦源而彼國牧守縱不禁御是以遂至滋蔓寇擾疆埸譬猶蚤蝨疥癬雖為小疴令人終歲不安當今上國和通南北好合雖邊境民庶要約不明自古列國封疆有畔各自禁斷無復相侵如是可以保之長久垂之永世故上表臺閣馳書明曉自今以後魏宋二境宜使人迹不過自非聘使行人無得南北邊境之民煙火相望雞狗之聲相聞至老死不相往來不亦善乎又能此亡彼歸彼亡此致則自我國家所望于仁者之邦也宋書索虜傳虜寧南將軍豫州刺史北井侯若庫辰樹蘭移書豫州乞遣大軍助擊梁會表安定逆賊帥路那羅遣使齎書與逆帥梁會會以那羅書射于城中那羅稱纂集衆旅剋期助會又仇池城民李洪自稱應王天授玉璽擅作符書誑惑百姓梁會遣使招引楊文德而文德遣權壽胡將兵二千人來到會間扇動州土云李洪自稱應王兩雄不並若欲須我先殺李洪我當自往梁會欲引致文德誘説李洪來入東城即斬洪首送與文德仇池鎮將淮陽公臣豹子遣使潛行以今月二十四日來達臣鎮稱楊文德受劉義隆職爵領兵聚衆在仇池境中沮動民人規竊城鎮且梁會反逆以來南句文德援勢相連武都氐羌盡相脣齒為文德起軍所在屯結兵衆已集剋來不遠臣備邊鎮與賊相持賊在東城隔牆而已但以腹背有敵攻城有疑計度文德剋來助會若文德既至百姓響應賊黨遂盛用功益難今文德未到麥復未熟事宜速擊于時為便伏願天鑒特遣大軍助臣誅翦魏書封敕文傳敕文表未及報梁會逃遁敕文縱騎躡之死者大半密表請南征皇天輔德命集大魏臣等祖父翼贊初興勤過蜀漢誓固山河享茲景福寵辱休戚與國均焉臣以凡近識無遠達階藉先寵遂荷今任彼己之譏播于群口仰感生成俯自策厲顧省駑鈍終于無益然飲冰驚寐實懷慚負至于願天高地厚何日忘之自永嘉之末封豕橫噬馬睿南據奄有荊楚及桓劉跋扈禍難相繼岱宗隔望秩之敬青徐限見德之風獻文皇帝髫齔龍飛道光率土干戚暫舞淮海從風車書既同華裔將一昊天不弔奄背萬邦竊聞劉昱天亡權臣殺害思正之民翹想罔極愚謂時不再來機宜易失毫分之差致悔千里天與不取反受其咎所謂見而不作過在介石者也宜簡雄將號令八方義陽王臣昶深悟存亡遠同孫氏苟歷運響從則吳會可定脫事有難成則振旅而返進可以揚義聲于四海退可以通德信于遐裔宜乘之會運鍾今日如合聖聽乞速施行脫忤天心願存臣表徐觀從驗賞罰隨焉魏書陳建傳高祖初建與侍中尚書晉陽侯元仙德殿中尚書長樂王穆亮比部尚書平原王陸睿密表讓封平原王啓臣父歷奉先朝忠勤著稱今年至西夕未登王爵臣幼荷寵榮于分己過愚款之情未申犬馬之效未展願裁過恩聽遂所請魏書陸俟附傳請班師表臣聞先天有弗違之天後天有順時之規今蕭鸞盜有名目竊據江左惡盈罪稔天人棄之取亂攻昧誠在茲日愚以長江浩蕩彼之巨防可以德招難以力屈又南土昏霧暑氣鬱蒸師人經夏必多疾病而鼎遷草創庶事甫爾臺省無論政之館府寺靡聽治之所百寮居止事等行路沈雨炎陽自成癘疫且兵徭並舉聖王所難今介胄之士外攻讎寇羸弱之夫內動土木運給之費日損千金驅罷敝之兵討堅城之虜將何以取勝乎陛下往冬之舉政欲曜武江漢示威衡湘自春幾夏理宜釋甲願櫜旌卷旆為持久之方崇成帝居深重本之固聖懷無內念之虞兆庶休斤板之役修禮華區諷風洛浦然簡英略之將任猛毅之雄南取荊湘據其要府則梁秦以西覩機自服撫附振威回麾東指則義陽以左馳聲可制然後布仁化以綏近播恩施以懷遠凡在有情孰不思奮還遣慕德之人效其餘力乘流而下勢勝萬倍蕞爾閩甌敢不稽顙豈必茲年競斯寸尺惟願顧存近敕納降而旋不紓鑾輿久臨炎暑魏書陸俟附傳太和十九年睿表
