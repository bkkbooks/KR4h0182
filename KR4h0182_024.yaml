body:
  text: 卷二十四崔光乞降階授張彝李韶汎級表彝及李韶朝列之中唯此二人出身官次本在臣右器能幹世又竝為多近來參差便成替後計其階途雖應遷陟然恐班秩猶未賜等昔衛之公叔引下同舉晉之士丐推長伯游古人所高當時見許敢緣斯義乞降臣位一階授彼汎級齊行聖庭帖穆選敘魏書張彝傳肅宗初侍中崔光表上婦人文章錄表孔子云士志于道據于德依于仁游于蓺蓺謂禮樂書數射御明前四業丈夫婦人所同修者若射御唯主男子事不及女古之賢妃烈媛母儀家國垂訓四海宣教九宗可秉道懷率遵仁禮是以漢后馬鄧術邁祖考羊嬪蔡氏具體伯喈伏惟皇太后含聖履仁臨朝闡化肅雍愷悌靖徽齊穆孝祀通于神明和風溢于區宇因時暇豫清暑林園遠藐姑射眷言矍相弦矢所發必中正鵠威靈遐畼義震上下文武懾心左右悅目吾王不遊吾何以休不窺重仞安見富美天情沖謙動容祗愧以為舉非蠶織事存無功豈謂應乾順民裁成輔相者哉臣不勝慶幸謹上婦人文章錄一帙其集具在內伏願以時披覽仰裨未聞息彎挾之勞納閑拱之泰頤精養壽栖神翰林魏書崔光傳時靈太后臨朝每于後園親執弓矢光乃表上中古婦人文章因以致諫諫靈太后頻幸王公第宅表禮記云諸侯非問疾弔喪而入諸臣之家是謂君臣為謔不言王后夫人明無適臣家之義夫人父母在有時歸寍親沒使卿大夫聘春秋紀陳宋齊之女竝為周王后無適本國之事是制深于士大夫許姬唁兄又義不得衛女思歸以禮自抑載馳竹竿所為作也漢上官皇后將廢昌邑霍光外祖也親為宰輔后猶御武帷以接群臣示男女之別國之大節伯姬待姆安就炎燎樊姜俟命忍赴洪流傳皆綴集以垂來訓昨軒駕頻出幸馮翊君任城王第雖漸中秋餘熱尚蒸衡蓋往還聖躬煩倦豐廚嘉醴罄竭時羞上壽弗限一觴方丈甘踰百品旦及日斜接對不憩非謂順時而遊奉養有度縱雲輦崇涼御筵安畼左右僕侍眾過千百扶衛跋涉袍鉀在身蒙曝塵日渙汙流離致時飢渴餐飯不贍賃馬假乘交費錢帛昔人稱陛下甚樂臣等至苦或其事也伏惟皇太后月靈炳燿坤儀挺茂誕育帝躬維興魏道德踰文母仁邁和熹親以天至遠異莫問愛由真固非俟虛隆紆屈鑾駕降臨闉里榮光帝京士女藻悅白首之耋欣遇犧年青衿之童慶屬唐日千載之所難一朝之為易非至明超古忘驕釋吝孰能若斯者哉魏元以來莫正斯美興居出入自當坦然豈同往嫌曲有矯避但帝族方衍勳貴增遷祗請遂多將成彝式階下遵酌前王貽厥後矩天下為公億兆己任專薦郊廟止決大政輔養神和𥳑息遊幸以德為車以樂為御攷仁聖之風習治國之道則率土屬賴含生仰悅矣臣過荷恩榮所知必盡嘿嘿唯唯愚竊未敢輕陳狂瞽分貽憲坐魏書崔光傳又北史四十四求補綴石經表詩稱蔽芾甘棠勿翦勿伐召伯所茇又云雖無老成人尚有典刑傳曰思其人猶愛其樹況用其道不恤其人是以書始稽古易本山火觀于天文以察寺變觀于人文以化成天下孟子實匡張訓說安世記篋于汾南伯山抱卷于河右元始孤論充漢帝之坐孟皇片字懸魏王之帳前哲之寶重墳藉珍愛分篆猶若此之至也矧迺聖典鴻經炳勒金石理為國楷義成家範迹實世模事則人軌千載之格言百王之盛烈而今焚荒汙毀積榛棘而弗埽為鼯鼬之所棲宿童豎之所登踞者哉誠可為痛心疾首拊膺扼腕伏惟皇帝陛下孝敬日休自天縱睿垂心初學儒業方熙皇太后欲明慈淑臨制統化崇道重教留神翰林將披雲臺而問禮拂麟閣以招賢誠宜遠開闕里清彼孔堂而使近在城闉面接宮廟舊校為墟子衿永替豈所謂建國君民教學為先京邑翼翼四方是則也尋石經之作起自炎劉繼以曹氏典論初乃三百餘載計末向二十紀矣昔來雖屢經戎亂猶未大崩侵如聞往者刺史臨州多構圖寺道俗諸用稍有發掘基蹗泥灰或出于此皇都始遷尚可補復軍國務殷遂不存檢官私顯隱漸加剝撤播麥納菽秋春相因生蒿杞時致火燎由是經石彌減文子增缺職忝冑教參掌經訓不能繕修頹墜興復生業倍深慚恥今求遣國子博士一人堪任幹事者專主周視驅禁田牧制其踐穢料閱碑牒所失次第量厥補綴魏書崔光傳神龜元年夏光表上神龜厤表春秋載天子有日官諸侯有日御又曰履端于始歸餘于終皆所以推三氣攷五運成六位定七曜審八卦立三才正四序以授百官于朝萬民于野陰陽剛柔仁義之道罔不畢備繇是先代重之垂于典籍及史遷班固司馬彪著立書志所論備矣謹案厤之作也始自黃帝辛卯為元迄于大魏甲寅紀首十有餘代歷祀數千軌憲不等造近殊術其消息盈虛覘步疏密莫得而識焉去延昌四年冬中堅將軍屯騎校尉張洪故太史令張明豫息盪寇將軍龍祥校書郎李業興等三家竝上新厤各求申用臣學缺章程蓺謝籌運而竊職觀閣謬忝厥司奏請廣訪諸儒更取通數兼通經義者及太史竝集祕書與史官同驗疏密并請宰輔群官臨檢得失至于歲終密者施用詔聽可時太傅太尉公清河王臣懌等以天道至遠非卒可量請立表候影期之三載乃採其長者更議所從又蒙敕許于是洪等與前鎮東府長史祖瑩等研窮其事爾來三年再歷寒暑積勤構思大功獲成謹案洪等三人前上之厤并駙馬都尉盧道虔前太極採材軍主衛洪顯殄寇將軍太史令胡榮及雍州沙門統道融司州河南人樊仲遵定州鉅鹿人張僧豫所上總合九家共成一厤元起壬子律姑黃鐘攷古合今謂為最密昔漢武帝元封中治厤改年為太初即名太初厤魏明帝景初中治厤即名景初厤伏惟陛下道惟先天功邈稽古休符告徵靈蔡炳瑞壬子北方水之正位龜為水畜實符魏德脩母子應義當麟趾請定名為神龜厤今封以上呈乞付有司重加攷議事可施用并藏祕府附于典志魏書律厤志上神龜初光復表諫靈太后登永寧寺九層佛圖表伏見親昇上級佇蹕表剎之下祗心圖構誠為福善聖躬玉趾非所踐陟臣庶恇惶竊謂未可案禮記為人子者不登高不臨深古賢有言策畫失于廟堂大人蹶于中野漢書上欲西馳下峻坂爰盎攬轡停輿曰臣聞千金之子不垂堂百金之子不倚衡如有車敗馬驚奈高廟太后何又云上酎祭廟出欲御樓舩辥廣德免冠頓首曰宜從橋陛下不聽臣臣以血汗車輪樂正子春曾參弟子亦稱至孝固自謹慎堂基不過一尺猶有傷足之愧永寍累級閣道回隘以柔懦之寶體乘至峻之重峭萬一差跌千悔何追禮將祭宗廟必散齋七日致齋三日然後入祀神明可得而通今雖容像末建已為神明之宅方加雕繢飾麗丹青人心所祇銳觀滋甚登者既眾異懷若面縱一人之身恆盡誠潔豈左右侍妾各竭虔仰不可獨昇必有扈侍懼或忘慎非飲酒茹葷而已昨風霾暴興紅塵四塞白日晝昏特可驚畏春秋宋衛陳鄭同日而災伯姬待姆致焚如之禍去皇興中青州七級亦號崇壯夜為上火所焚雖梓慎裨竈之明尚不能逆剋端兆變起倉卒豫備不虞天道幽遠自昔深誡墟墓必哀廟社致敬望塋悽慟入門聳慄適墓不登隴未有昇陟之事傳云公既視朔遂登觀臺其下無天地先祖之神故可得而乘也內經寶塔高華堪室千萬唯盛言香花禮拜豈有登上之義獨稱三寶階從上而下人天交接兩得相見超世奇絕莫可而擬恭敬拜跪悉在下級遠存矚眺周見山河因其所眄增發嬉笑未能級級加虔步步崇慎徒使京邑士女公私湊集上行下從理勢以然迄于無窮豈長世競慕一登而可抑斷哉蓋心信為本形敬乃末重實輕根靖實躁君恭己南面者豈月乘峻極旬御層階今經始既就子來自勸基構已興雕絢漸起紫山華臺即其宮也伏願息躬親之勞廣風靡之化因立制防班之條限以遏囂汙永歸清寂下竭肅穆之誠上展瞻仰之敬勿踐勿履顯固億齡融教闡悟不其博歟魏書崔光傳神龜二年八月靈太后幸永寍寺躬登九層佛圖光表諫諫靈太后幸嵩高表伏聞明后當親幸嵩高往還累宿鑾遊近旬存省民物誠足為善雖漸農隙所獲棲畝飢貧之家指為珠玉遺秉滯穟莫不寶惜步騎萬餘來去經踐駕輦雜遝競騖交馳縱加禁護猶有侵耗士女老幼微足傷心秋末久旱塵壤委深風霾一起紅埃四塞轅關峭嶮山路危狹聖駕清道當務萬安乘履㵎壑蒙犯霜露出入半旬途越數百飄曝彌日仰虧和豫七廟上靈容或未許億兆下心實用悚慄且藏蟄節遠昆蟲布列蠉蠕之類盈于川原車馬輾蹈必有類殺慈矜好生應垂未測誠恐悠悠之議將謂為福興罪廝役困于負檐爪牙窘于賃乘供頓候迎公私擾費廚兵幕士衣履敗穿晝暄夜淒罔所覆藉監帥驅捶泣呼相望霜旱為災所在不稔饑饉薦臻方成儉敝為民父母所宜存恤靖以撫之猶懼離散乃于收斂初辰致此行舉自近及遠交興怨嗟伏願遠覽虞舜恭己無為近遵老易不出戶牖罷勞形之遊息傷財之駕動循典防納諸軌儀委司責成寄之耳目人神幸甚朝野抃悅魏書崔光傳神龜二年九月靈太后幸嵩高光上表諫不從荅詔示禿鶖表蒙示十四日所得大鳥此即詩所謂有鶖在梁解云禿鶖也貪惡之鳥野澤所育不應入于殿廷昔魏氏黃初中有鵜鶘集于靈芝池文帝下詔以曹恭公遠君子近小人博求賢俊大尉華歆由此遜位而讓管寍者也臣聞野物入舍古人以為不善是以張珔惡鴟賈誼忌鵩鵜鶘暫集而去前王猶為至誡況今親入宮禁為人所獲方被畜養晏然不以為懼準諸往義信有殊矣且饕餮之禽必資魚肉菽麥稻粱時或餐啄一食之費容過斤鎰今春夏陽旱穀糴稍貴窮窘之家時有菜色陛下為民父母撫之如傷豈可棄人養鳥留意于醜形惡聲哉衛侯好鶴曹伯愛雁身死國滅可為塞心陛下學通春秋親覽前事何得口詠其言行違其道誠願遠師殷宗近法魏祖修德延賢消災集慶放無用之物委之川澤取樂琴書頤養神性魏書崔光傳正光二年八月獲禿鶖鳥于宮內詔以示光光表肅宗覽表大悅即棄之池澤又見北史四十四御覽九百二十五上言文昭太后改葬服制被臺祠部曹符文昭皇太后改葬議至尊皇太后群臣服制輕重四門博士劉季明議云案喪服記雖云改葬緦文無指據至于注解乖異不同馬融王肅云本有三年之服者鄭及三重然而後來諸儒符融者多與玄者少今請依馬王諸儒之議至尊宜服緦案記外宗為君夫人猶內宗鄭注云為君服斬夫人齊衰不敢以親服至尊也今皇太后雖上奉宗廟下臨朝臣至于為姑不得過朞計應無服其清河汝南二王母服三年亦宜有緦自餘王公百官為君之母妻唯朞而已竝應不服又太常博士鄭六議云謹撿喪服并中代雜論記云改葬緦鄭注臣為君子為父妻為夫親見屍柩不可以無服故服緦三年者緦則朞已下無服竊謂鄭氏得服緦之旨謬三月之言如臣所見請依康成之服緦既葬而除愚以為允魏書禮志四神龜元年十一月侍中國子祭酒儀同三司崔光上言詔可又見通典一百二奏免趙霸不遵憲度威虐任情至乃手擊吏人寮屬奔走不可以君人字下納之軌物輒禁止在州魏書酷吏張赦提傳又有華山太守趙霸酷暴非理大使崔光奏霸奏𥳑高顯碑銘常景名位乃處諸人之下文出諸人之上魏書常景傳世宗季舅高顯卒其兄右僕射肈私託景及尚書邢巒并州刺史高聰通直郎徐紇各作碑銘竝以呈御世宗悉付侍中崔光𥳑之光以景所造為最乃奏奏停刑元愉妾李氏伏聞當刑元愉妾李加之屠割妖惑扇亂誠合此罪但外人竊云李今懷妊例待分產且臣尋諸舊典兼推近事戮至刳胎謂之虐刑桀紂之主乃行斯事君舉必書義無隱昧酷而乖法何以示後陛下春秋已長未有儲體皇子襁褓至有天失臣之愚識知無不言乞停李獄以俟育孕魏書崔光傳永平元年秋將刑元愉妾李氏敕光為詔光逡巡不作奏云云世宗納之又見北史四十四奏定五時朝服奉詔定五時朝服案北京及遷都以來未有斯制輒勒禮官詳據太學博士崔瓚議云周禮及禮記三冠六冕承用區分璅玉五綵配飾亦別都無隨氣春夏之異唯月令有青旂赤玉黑衣白輅隨四時而變復不列弁冕改用之玄黃以此而推五時之冠禮既無文若求諸正典難以經證案司馬彪續漢書輿服及祭祀志云迎氣五郊自永平中以禮讖并月令迎氣服色因采元始故事兆五郊于洛陽又云五郊衣幘各如方色又續漢禮儀志立春京都百官皆著青衣服青幘秋夏悉如其色自漢逮于魏晉迎氣五郊用幘從服改色隨氣斯制因循相承不革冠冕仍舊未聞有變今皇魏憲章前代損益從宜五時之冠愚謂如漢晉用幘為允魏書禮志四熙寍元年九月侍中儀同三司崔光奏奏上太后母諡案漢高祖母始諡曰昭靈夫人後為昭靈后薄太后母曰靈文夫人皆置園邑三百家長丞奉守今秦太上君未有尊諡陵寢狐立即秦君名宜上終稱兼設埽衛以慰情典請上尊諡曰孝穆權置園邑三十戶立長丞奉守魏書胡國珍傳奏免劉昺子孫碎役臣聞大上立德其次立功立言死而不朽前哲所尚思人愛樹自古稱美故樂平王從事中郎敦煌劉昞著業涼城遺文茲在篇籍之美頗足可觀如或愆釁當蒙數世之宥況乃維祖逮孫相去未遠而令久淪皁隸不獲收異儒學之士所為竊歎臣忝職史敢冒以聞奏乞敕尚書推檢所屬甄免碎役用廣聖朝旌善繼絕敦化厲俗于是乎在魏書劉昞傳正光三年太保崔光奏臨廣川王諧喪議三臨之事乃自古禮爰及漢魏行之者稀陛下至聖慈仁方遵則軌志必哀喪慮同寍戚臣等以為若朞親三臨大功宜再始喪之初哀之至極既以情降宜從始喪大殮之臨伏如聖旨魏書廣川王略傳略子諧太和十九年薨黃門侍郎崔光宋弁通直常侍劉芳典命下大夫李元凱中書侍郎高敏等議又議東堂之哭蓋以不臨之故今陛下躬親撫視群臣從駕臣等參議以為不宜復哭魏書廣川王略附傳光等議清河王懌為所生母服議喪服大功章云公之庶昆弟為母傳曰先君餘尊之所厭不得過大功記公子為其母練冠麻衣縓緣既葬除之傳曰何以不在五服中也君之厭不得申其罔極依禮大功據喪服厭降之例竝無從厭之文今太妃既捨六宮之稱加太妃之號為封君之母尊崇一國臣下固宜服朞不得以王服厭屈而更有降禮有從輕而重義包于此魏書禮志四延昌三年清河王懌所生母羅太妃薨表求申齊衰三年詔禮官博議侍中中書監太子少傅崔光議為壻乞徐州長史敬徽為荊州五隴戍主女隨夫行常慮寇鈔南北分張乞為徐州長史兼別駕暫集京師魏書崔光傳自從貴達罕所申薦曾啟其女壻彭城劉敬徽云云肅宗從之疾甚敕子姪等諦聽吾言聞曾子有云人之將死其言也善啟予手啟予足而今而後吾知免夫吾荷先帝厚恩位至于此史功不成沒有遺恨汝等以吾之故竝得名位勉之勉之以死報國修短命也夫復何言速可送我還宅魏書崔光傳十地經論序十地經者蓋是神覺之玄苑靈慧之妙宅億善之基輿萬度之綱紀理苞群藏之祕義冠眾典之奧積漸心行窮忍學之源崇廣住德極道慧之府所以厚集肇慮朗成圓種離怖首念赫為雷威其為教也微密精遠究淨照之宗融冶瑩練盡性靈之妙自寂場啟旭固林輟暉雖復聖訓充感金言滿世而淵猷沖賾莫不網羅于其中矣至于光宣真軌融畼玄門始自信仁終泯空寂因果既周化業彌顯嘿耀大方影煥八極豈直日月麗天洞燭千象溟壑帶地混納百川而已哉既理富瀛岳局言靡測廓明洪旨是係淵儒北天竺大士婆藪槃豆魏云天親挺高悟于象運拔英規于季俗故徽蹤馬鳴繼迹龍樹每恨此經文約而義豐言邇而旨遠乃超然遠概邈爾悠想慕釋迦之餘範追剛藏之遺軌誠復歲踰五百處非六天人梵乖遼正像差迴而妙契環中神協靡外通法貫玄莫愧往列遂乃準傍大宗爰製茲論發趣精微根由睿哲旨奧音殊宣譯俟賢固以義囑中興時憑聖代大魏皇帝儁神天凝玄情漢遠揚治風于宇縣之外敷道化于千載之下每以佛經為遊心之場釋典為栖照之囿搜隱訪缺務乎照揚有教必申無籍不備以永平元年歲次玄枵四月上日命三藏法師北天竺菩提留支魏云道希中天竺勒那摩提魏云寶意及傳譯沙門北天竺伏陀扇多并義學緇儒一十餘人在太極紫庭譯出斯論十有餘卷斯二三藏竝以邁俗之量高步道門群藏淵部罔不研攬善會地情妙盡論旨皆手執梵文口自敷唱片辭隻說辯詣懱遺于是皇上親紆玄藻飛翰輪首臣僚僧徒毗贊下風四年首夏翻譯周訖洋洋亹亹莫得其門義富趣玄孰云窺測剛藏妙說更興于像世天親玄旨再光于季運忝廁末筵敢竊祗記耳釋藏惻一
