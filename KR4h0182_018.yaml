body:
  text: 元順蠅賦余以仲秋休沐端坐衡門寄想琴書託情紙翰而蒼蠅小蟲往來床几疾其變白聊為賦云遐哉大道廓矣洪氛肇立秋夏爰啓冬春既含育於萬姓又芻狗而不仁隨因緣以授禮齊美惡而無分生茲穢類靡益于人名備群品聲損衆倫敧脛纖翼紫首蒼身飛不能迥聲若遠聞點緇成素變白為黑寡愛芳蘭偏貪穢食集桓公之尸居平叔之側亂鳴雞之響毀皇宮之飾習習戶庭營營榛棘反覆往還譬彼讒賊膚受既通譖潤罔極緝緝幡幡交亂四國于是妖姬進邪士來聖賢擁忠孝摧周昌拘于牖里天乙囚于夏臺伯奇為之痛結申生為之蒙災鴟梟悲其室采葛懼其懷小辨隕其涕靈均表其哀自古明哲猶如此何況中庸與凡才若夫天生地養各有所親獸必依地鳥亦憑雲或來儀以呈祉或自擾而見文或負圖而歸德或銜書以告真或天胎而奉味或殘軀以獻珍或主皮而興禮或牢豢以供神雖死生之異質俱有益于國人非如蒼蠅之無用雖構亂于蒸民魏書任城王附傳奏事尚書百揆之本令僕納言之責不宜下令中尉送名通典二十四謀舉沔南表蕭寶卷骨肉相殘忠良先戮臣下囂然莫不離背君臣攜二干戈日尋流聞寶卷雍州刺史蕭衍兄懿于建業阻兵與寶卷相持荊郢二州刺史竝是寶卷之弟必有圖衍之志臣若遣書相聞迎其本謀冀獲同心并力除衍一衍之後彼必旋師赴救丹陽當不能復經營疆陲全固襄沔臣之軍威已得臨據則沔南之地可一舉而收緣漢曜兵示以滅德思歸有道者則引而納之受疑告危者則援而接之總兵佇鋭觀釁伺隙若其零落之形已彰怠懈之勢已著便可順流摧鋒長驅席卷魏書任城王附傳與梁請和移文侍中大驃騎同尚書令武陽子元世俊移梁執事乃眷江漢襟帶南土疆埸相望交錯如繡輶軒未通革車屬起一彼一此或利或鈍亡載得輿所獲蓋寡爭雞失牛所損更大空使干戈未戢戎馬生郊髓腦塗于原野骸骨暴于草澤二國不和百姓何罪靜言思之良所未悟我皇帝以聖明啓運禮樂惟新澤漏原泉道光日月方欲寢榆關之高烽罷輪臺之遠戍鑄劍戟為農器納蒼生于仁壽而前益州刺史傅和往處西蕃逢時多難歸途多阻流寓江濱亦既來朝具陳彼意知以止戈在念去殺為心留情灌爪遲存通樂夙期所望實協虛想猶恐失詞或乖其實眷言在茲佇聞良信至彼假節開遠軍李稜昔經垂翅遂掛天網矜是南寇拾之還書故因其致書用宣朝旨若覆前言共敦鄰好當拂逆旅以待行人文苑英華六百五十乞乘虛取沔南表臣聞取亂侮亡有國之常道陳師鞠旅因機而致發竊以區區寶卷罔顧天常憑恃山河敢抗中國今妖逆數亡驕縱日甚威侮五行怠棄三正浮刑以逞虐害無辜其雍州刺史蕭衍東伐秣陵掃土興兵順流而下唯有孤城更無重衛此則皇天授我之日曠載一逢之秋事易走丸理同拾芥此而不乘將欲何待臣乞躬率步騎三萬直指沔陰據襄陽之城斷黑水之路昏虐君臣自相魚肉我居上流威震遐邇長驅南山進拔江陵其路既近不盈五百則三楚之地一朝可數岷蜀之道自成斷絶又命揚徐二州聲言俱舉緣江焚毀靡使所遺建業窮蹙魚遊釜內士治之師再興孫皓之縛重至齊文軌而大同混天地而為一伏惟陛下暫闢旒纊少垂聽覽獨決聖心無取疑議此期脫爽并吞未日魏書南安王楨附傳又奏臣聞乘虛討弱事在速舉因危攻昧徼捷可期今寶卷亂常骨肉相賊蕃戍鼎立莫知所歸義陽狐絶密邇天境外靡糧援之期內無兵儲之固此乃臨焚之鳥不可去薪授首之寇何容緩斧若此行有果則江右之地斯為經略之基如脫否也非直後舉難圖亦或居要生疾今豫州刺史司馬悅已戒嚴垂邁而東豫州刺史田益宗方擬守三關請遣軍司為之節度魏書南安王楨附傳圖鍾離未克乞寬假日期表臣奉辭伐罪志殄逋寇想敵量攻期至二月將末三之之初理在必克但自此月一日以來霖雨連併可謂天違人願然王者行師舉動不易不可以少致睽淹便生異議臣亦諦思若入三月已後天晴志燥憑陵是常如其連雨仍接不得進攻者臣已更高邵陽之橋防汛突意外洪長慮其破橋臣亦部分造船復于鍾離城隨水狹處營造浮橋至三月中旬橋必克成晴則攻騰雨則圍守水陸二圖以得為限實願朝廷特開遠略少復賜寬假以日月無使為山之功中途而廢魏書南安王楨附傳奏請遣使就郡校練學生謹案學令諸州郡學生三年一校所通經數因正使列之然後遣使就郡練考臣伏惟聖明崇道顯成均之風蘊義光膠序之美是以太學之館久置于下國四門之教方構于京廛計習訓淹年聽受纍紀然俊造之流應問于魏闕不革之輩宜返于齊民使就郡練考核其最殿頃以皇都遷構江揚未一故鄉校之訓弗遑正試致使薰蕕之質均誨學庭蘭蕭之體等教文肆今外宰京官銓考向訖求遣四門博士明通五經者道別校練依令黜陟魏書南安王楨附傳舉兵上表討元叉臣聞安危無常時有休否臣早屬休明晚逢多難自皇基綿茂九葉承光高祖世宗徽明相襲皇太后聖敬自天德同馬鄧至尊神睿纂御神鑒燭遠四海晏如八表歸化而領軍將軍元叉寵藉外親叨榮左右豺狼為心飽便反囓遂使二宮阻隔溫清闕禮又太傅清河王橫被屠害致使忠臣烈士喪氣闕庭親賢宗戚憤恨內外妄指鹿馬孰能踰之王董權逼方此非譬臣仰瞻雲闕泣血而生以細草不除將為爛漫況又悖逆如此孰可忍之臣忝藉枝萼思盡力命碎首屠肝甘之若薺今輒起義兵實甲八萬大徒既進文武爭先與并州刺史城陽王徽恆州刺史廣陽王淵徐州刺史齊王蕭寶夤等同以今月十四日俱發庶仰憑祖宗之靈俯罄義夫之命掃翦凶醜更清京邑臣親總三軍星萬赴難置兵溫城伏聽天旨王公宰輔或世著忠烈或宿佩恩顧如能同力翦除元叉使太后至尊欣然奉對者臣即解甲散兵赴謝朝闕臣雖才乖昔人位居藩屏寧容坐觀姦醜虛受榮祿哉魏書南安王楨附傳將死與知故書吾與弟竝蒙皇太后知遇兄據大州弟則入侍殷勤言色恩同慈母今皇太后見廢北宮太傅清河王橫受屠酷主上幼年獨在前殿君親如此無以自安故率兵民建大義于天下但智力淺短旋見囚執上慚朝廷下愧相知本以名義于心不得不爾流腸碎首復何言哉昔李斯憶上蔡黃犬陸機想華亭鶴唳豈不以恍惚無際一去不還者乎今欲對秋月臨春風藉芳草蔭花樹廣召名勝賦詩洛濱其可得乎凡百君子各敬爾宜為國為身善勖名節立功立事為身而已吾何言哉魏書南安王楨附傳上孝莊帝啓辭官封河上之功將士之力求回所封加諸勳義魏書城陽王長壽附傳人日登壽張安仁山銘正月七日厥日惟人策我良駟陟彼安仁御覽三十諫孝莊帝以高祖為伯考表漢祖創業香街有太上之廟光武中興南頓立春陵之寢元帝之于光武疏為絶服猶尚身奉子道入繼太宗高祖之于聖躬親實猶子陛下既纂洪緒豈宜加伯考之名且漢宣之繼孝昭斯乃上後叔祖豈忘宗承考妣蓋以大義斯奪及金德將興宣王受寄自茲而降世秉威權景王意存毀冕文王心規裂冠雖祭則魏主而權歸晉室昆之與季實傾曹氏且子元宣王冢胤文王成其大業故晉武繼文祖宣景王有伯考之稱以今類古恐或非儔又臣子一例義彰舊典禘祫失序著譏前經高祖德溢寰中道超無外肅祖雖勳格宇宙猶曾奉贄稱臣穆皇后稟德坤元復將配享乾位此乃君臣竝筵嫂叔同室歷觀墳籍未有其事魏書臨淮王談附傳莊帝追崇武宣王為文穆皇帝廟號肅祖將遷神主于太廟以高祖為伯考彧表諫又表爰自中古迄于下葉崇向君親褒明功懿乃有皇號終無帝名今若去帝直留皇名求之古義少有依準魏書臨淮王談附傳奏言宋遊道事狀臣忝冠百寮遂使一郎攘袂高聲肆言頓挫乞解尚書令北齊書宋遊道傳
