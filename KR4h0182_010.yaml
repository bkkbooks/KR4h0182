body:
  text: 卷十宣武帝立醫館詔朕乘乾御曆年周一紀而道謝擊壤教慚刑厝至于下民之煢鰥疾苦心常愍之此而不恤豈為民父母之意也可敕太常于間敞之處別立一館使京畿內外疾病之徒咸令居處嚴敕醫署分師療治考其能否而行賞罰雖齡數有期修短分定然三疾不同或賴針石庶秦扁之言理驗今日又經方浩博流傳處廣應病投藥卒難窮究更令大司集諸醫工尋篇推𥳑務存精要取三十餘卷以班九服郡懸備寫布下鄉邑使知救患之術耳魏書宣武紀詔盧昶彭宋地接邊疆勢連淮海威禦之術功在不易朐山險塞寇之要防水陸交湊揚郁路衝畜聚凶徒虔劉邊鄙青光齊兗每罹其患卿妙算既敷克城殄衆展疆闢土何善如之庸勳之懋朕用嘉止故遣左右直長閻遵業具宣往懷此戍郁洲之本存亡所繫今既失守有不存之心彼見扼喉將圖救援之計今水雨盛行宜須防守卿可深思擬捍之規攘敵之略使還具聞魏書盧玄附傳盧昶為徐州刺史表言掩據朐山宣武詔報盧昶請兵詔克獲朐山計本于昶乘勝之規終宜有寄是以起兵之始即委處分前機經略一以任之今既請兵理宜速遂可遣冀定瀛相四州中品羽林虎賁四千人赴之魏書盧玄附傳東堂餞蕭寶夤詔蕭衍送死連兵再離寒暑卿忠規內挺孝誠外亮必欲鞭尸吳墓戮衍江陰故授卿以總統之任仗卿以克捷之規宜其勉歟魏書蕭寶夤傳令刺史監括僧祇穀詔僧祗之粟本期濟施儉年出貸豐則收入山林僧尼隨以給施民有窘敝亦即賑之但主司冒利規取贏息及其徵責不計水旱或償利過本或翻改券契侵蠹貧下莫知紀極細民嗟毒歲月滋深非所以矜此窮乏宗尚慈拯之本意也自今已後不得傳委維那都尉可令刺史共加監括尚書檢諸有僧祇穀之處州別其元數出入贏息賑給多少并貸償歲月見在未收上臺録記若收利過本及翻改初券依律免之勿復徵責或有私債轉施償僧即以丏民不聽收檢後有出貸先盡貧窮徵債之科一準舊格富有之家不聽輒貸脫仍冒濫依法治罪魏書釋老志原僧暹等詔暹等特可原之餘如奏魏書釋老志尚書令高肇奏言僧暹等違旨乖法逼令趙苟子等課輸詔云云遣兵赴盧昶詔胸山之克實由于卿開疆拓土實為長策然經討未服非卿而誰而蟻徒送死規侵王略天亡小賊數在無遠故前者命卿親臨指授尋以卿疾未瘳且待消息今既痊復宜遵前旨秉戈揮鋭殄寇為懷已發虎旅五萬應機電赴指辰而至遂卿本請截彼東南亮委高算魏書盧玄附傳又詔盧昶取朐置戍竝是卿計始終成敗悉歸于卿卿以兵少請益今已遂卿本意如聞東唐陸道甚狹一軌之外皆是大水彼必據之以斷軍路若已如此更設何策其軍奇兵變遽以表聞又聞衍軍將帥每有流言云魏博淮揚宿豫乃是兩宜若實有此卿可量朐山薪水得支幾時脫事容往返馳驛速聞如薪水少急即可量計若理不可爾亦將軍截決魏書盧玄附傳以李崇為揚州刺史詔應敵制變算非一途救左擊右疾雷均勢今朐山蟻寇久結未殄賊衍狡詐或生詭劫宜遺鋭兵備其不意崇可都督淮南諸軍事坐敦威重遙軍聲算魏書李崇傳崇出除征南將軍揚州刺史詔云云通考景明二年以來功過詔進善退惡治之通規三載考察政之明典正始二年以來于今未考功過難齊寧無升降從景明二年至永平四年通考以聞魏書宣武紀許陳終德為祖母持重詔鏑孫為祖母禮令有據士人通行何勞芳致疑請也可如國子博士孫景雍所議通典八十九魏書禮志四載此詔有脫誤答安定王燮詔一勞永逸便可聽移魏書安定王休附傳燮為華州刺史表移華州治馮翊詔云云密遣中使詔于忠比股肱褫落心膂無寄方任雖重比此為輕故輟茲外任委以內務當勤夙無怠稱朕所寄也魏書于栗磾附傳詔田益宗風聞卿息魯生在淮貪暴擾亂細民又橫殺梅伏生為爾不已損卿誠效可令魯生與使赴闕當加任使如欲外祿便授中畿一郡魏書田益宗傳益宗衰老諸子及孫競規賄貨部內咸言欲叛世宗詔之又見北史三十七嚴敕立學成限詔遷京嵩縣年將二紀虎闈闕唱演之音四門絶講誦之業博士端然虛祿歲祀貴遊之胄歎同子襟靖言念之有兼愧慨可嚴敕有司國子學孟冬使成大學四門明年暮春令就魏書宣武紀遣醫就治肆州傷民詔肆州地震陷裂死傷甚多言念毀沒有酸懷抱亡者不可復追生病之徒宜加療救可遣太醫折傷醫并給所須之藥就治之魏書宣武紀詔免盧昶官朐山之敗傷損實深推始究末罪鍾元帥雖經大宥輕重宜別昶一人可以免官論坐自餘將統以下悉聽依赦復任魏書廬玄附傳朐山失利世宗遣黃門甄琛馳馹鎖盧昶窮其敗狀詔云云檢校艱敝詔去歲水災今春炎旱百姓饑餒救命靡寄雖經蠶月不能養績今秋輸將及郡縣期于責辦尚書可嚴勒諸州量民資産明加檢校以救艱敝魏書宣武紀立皇太子恩賜詔朕運承天休統御宸宇太子體藉靈明肇建宮華明兩既孚三善方洽宜澤均率壤榮泛庶胤其賜天下為父後者爵一級孝子順孫廉夫節婦旌表門閭量給粟帛魏書宣武紀定孝格詔考在上中者得泛以前有六年以上遷一階三年以上遷半階殘年悉除考在上下者得泛以前六年以上遷半階不滿者除其得泛以後考在上下者三年遷一階散官從盧昶所奏魏書郭祚傳又詔獨著超倫及才備寡咎皆謂文武兼上下之極言耳自此以降猶有八等隨才為次令文已具其積負纍殿及守平得濟皆含在其中何容別疑也所云通考者據總多年之言至于黜陟之體自依舊來年斷何足復請其罰贖已決之殿固非免限遇赦免罪惟記其殿者除之魏書郭祚傳北史四十三水旱減降徒流已下詔頃水旱互侵頻年饑儉百姓窘敝多陷罪辜煩刑之愧朕用懼矣其殺人掠賣人群彊盜首及雖非首而殺傷財主曾經再犯公斷道路劫奪行人者依法行決自餘恕死徒流已下各準滅降魏書宣武紀聽高季賢赦後復仕詔死者既在赦前又員外非在正侍之限便可悉聽復仕魏書刑罰志報李崇詔卿居藩纍年威懷兼畼資儲豐溢足制勍寇然夏雨泛濫斯非人力何得以此辭解今水涸路通公私復業便可繕甲積糧修復城雉勞恤士庶務盡綏懷之略也魏書李崇傳崇以洪水為災請罪解任世宗詔地震寬刑詔肆州秀容容郡敷城縣雁門郡原平縣竝自去年四月以來山鳴地震于今不已告譴彰咎朕甚懼焉祗畏兢兢若臨淵谷可恤瘼寬刑以答災譴魏書宣武紀答江式詔可如所請并就太常冀兼教八書史也其有所須依請給之名目待書成重聞魏書江式傳式上表詔云云于是撰集字書號曰古今文字凡四十卷大體依許氏說文為本上篆下隸其書竟未能成贈高貞詔故太子洗馬高貞器業始茂方加榮級而秀穎未實奄雕夏采今宅兆有期宜蒙追陟可特贈龍驤將軍營州刺史以旌戚俊其墓次所須悉仰本州營辦高貞碑拓本宮臣直從詔自今已後若非朕手敕勿令兒輒出宮臣在直者從至萬歲門魏書楊播附傳肅宗在懷抱之中至于出入左右乳母而已不令宮寮聞知楊昱諫于是詔清河王懌為生母服詔禮有從無服而有服何但從輕而重乎懌今自以厭故不得申其過隙衆臣古無疑厭之論而有從輕之據曷為不得申其本制也可從尚書及景林等議魏書禮志四又詔比決清河國臣為君母服期臣禮事至重故追而審之今更無正據不可背章生條但君服既促而臣服仍遠禮緣人情遇厭須變服可還從前判既葬除之魏書禮志四費羊皮張回事詔羊皮賣女葬母孝誠可嘉便可特原張回雖買之于父不應轉賣可刑五歲魏書刑罰志又見通典一百六十七羊皮作羌皮宗室犯罪依常法詔雲來綿遠繁衍世滋植籍宗氏而為不善量亦多矣先朝既無不訊之格而空相矯恃以長違暴諸在議請之外可悉依常法魏書刑罰志通典一百六十七冊諡李謐詔謐屢辭徵辟志守沖素儒隱之操深可嘉美可遠傍惠康近準玄晏諡曰貞靜處士并表蕷門閭以旌高節遣謁者奉冊魏書逸士李謐傳以田益宗為濟州刺史詔益宗先朝耆艾服勤邊境不可以地須其人遂令久屈可使持節鎮東將軍濟州刺史常侍如故魏書田益宗傳報田益宗上表自理詔既經大宥不容方更為獄魏書田益宗傳三藩妻從妃例詔夫貴于朝妻容于室婦女無定升從其夫三藩既啓王封妃名亦宜同等妻者齊也理與己齊可從妃例魏書廣平王洛侯附傳賞封軌詔權宜徵口使人常體但光揚有稱宜賞一階魏書封懿附傳報崔楷詔頻年水旱為患黎民阻饑靜言念之昃不遑食鑒此事條深協在慮但計畫功廣非朝夕可合宜付外量聞魏書崔辨附傳詔崔鴻聞卿撰定諸史甚有條貫便可隨成者送呈朕當于機事之暇覽之魏書崔光附傳世宗聞崔鴻撰録十六國春秋遣散騎常侍趙雍詔鴻詔報甄琛里正可進至勳品經途從九品六部尉正九品諸職中𥳑取何必須武人也魏書甄琛傳監庫莫奚國交市詔庫莫奚去太和二十一年以前與安營二州邊民參居交易往來竝無疑二至二十二年叛逆以來遂爾遠竄今欲款附猶在塞表每請入塞與民交易若抑而不許乖其歸向之心聽而不虞或有萬一之警不容依先任其交易事直限節交市之日州遣上佐監之魏書庫莫奚國傳賜奚康生棗奈果面敕果者果如朕心棗者早遂朕意北史三十七賜裴叔業璽書前後使返有敕想卿具一二寶卷昏狂日月滋甚虐遍宰輔暴加戚屬淫刑既逞朝無孑遺國有瓦解之形家無自安之計卿兼茲智勇深懼禍萌翻然高舉去彼危亂朕興居在念深嘉乃勳前即敕豫州緣邊諸鎮兵馬行往赴援楊大眼奚康生鐵騎五千星言即路彭城王協尚書令肅精卒十萬絡繹繼發將以長驅淮海電擊衡巫卿其并心戮力同斯大舉殊勳茂績職爾之由崇名厚秩非卿孰賞并有敕與州佐吏及彼土人士其有微功片效必加褒異魏書裴叔業傳賜夏侯道遷璽書得表具誠節之懷卿忠義夙挺期委自昔中有書因以致乖舛知能乘機豹變翻然改圖獎率同心萬里投順遠舉漢中為開蜀之始洪規茂略深有嘉焉今授卿持節散騎常侍平南將軍豫州刺史豐縣開國侯食邑千戶并同義諸人尋有別授王師數道絡繹電邁遣使持節散騎常侍都督征梁漢諸軍事鎮西將軍尚書邢巒指授節度卿其善建殊效稱朕意焉魏書夏侯道遷傳賜邢巒璽書知大龕醜虜威振賊庭淮外霧披徐方卷壒王略遠恢混一維始公私慶泰何快如之賊衍此舉實為傾國比者宿豫陷沒淮陽嬰城凶狡侜張規抗王旅將軍忠規協著火烈霜摧電動岱陰風掃沂澤遂令逋誅之寇一朝殲夷元鯨大憝千里折首殊勳茂捷自古莫二但揚區未安餘燼宜蕩乘勝掎角勢不可遺便可率厲三軍因時經略申威東南清彼江介忘此仍勞用圖永逸進退規度委之高算魏書邢巒傳與彭城王協書恪奉辭暨今悲戀嗚咽歲月易遠便迫暮冬每思聞道奉承風教父既辭榮間外無容頓違至德出蕃纍朔荒馳實深今遣王書劉道斌奉宣悲戀願父來望必當屆京展泄哀窮指不云遠魏書彭城王協傳修家人書與彭城王協恪言奉還告承猶執沖遜恪實暗寡政術多粃匡弼之寄仰屬親尊父德望兼重師訓所歸豈得近遺家國遠崇清尚也便望紆降時副傾注之心魏書彭城王協傳
