body:
  text: 蘇綽奏行六條詔書其一先治心曰凡今之方伯守令皆受命天朝出臨下國論其尊貴竝古之諸侯也是以前世帝王每稱共治天下者唯良宰守耳明知百僚卿尹雖各有所司然其治民之本莫若宰守之最重也凡治民之體先當治心心者一身之主百行之本心不清淨則思慮妄生思慮妄生則見理不明見理不明則是非謬亂是非謬亂則一身不能自治安能治民也是以治民之要在清心而已夫所謂清心者非不貪貨財之謂也乃欲吏心氣清和志意端靜心和志靜則邪僻之慮無因而作邪僻不作則凡所思念無不皆得至公之理率至公之理以臨其民則彼下民孰不從化是以稱治民之本先在治心其次又在治身凡人君之身者乃百姓之表一國之的也表不正不可求直影的不明不可責射中今君身不能自治而望治百姓是猶曲表而求直影也君行不能自修而欲百姓修行者是猶無的而責射中也故為人君者必心如清水形如白玉躬行仁義躬行孝悌躬行忠信躬行禮讓躬行廉平躬行儉約然後繼之以無倦加之以明察行此八者以訓其民是以其人畏而愛之則而象之不待家教日見而自興行矣其二敦教化曰天地之性唯人為貴明其有中和之心仁恕之行異于木石不同禽獸故貴之耳然性無常守隨化而遷化于敦朴者則質直化于澆僞者則浮薄浮薄者則衰斃之風質直者則淳和之俗衰斃則禍亂交興淳和則天下自治治亂興亡無不皆由所化也然世道雕喪已數百年大亂滋甚且二十歲民不見德唯兵革是聞上無教化惟刑罰是用而中興始爾大難未平加之以師旅因之以饑饉凡百草創率多權宜致使禮讓弗興風俗未改比年稍登稔徭賦差輕衣食不切則教化可修矣凡諸牧守令長宜洗心革意上承朝旨下宣教化矣夫化者貴能扇之以淳風浸之以太和被之以道德示之以朴素使百姓亹亹日遷于善邪僞之心嗜欲之性潛以消化而不知其所以然此之謂化也然後教之以孝悌使民慈愛教之以仁順使民和睦教之以禮義使民敬讓慈愛則不遺其親和睦則無怨于人敬讓則不競于物三者既備則王道成矣此之謂教也先王之所以移風易俗還淳反素垂拱而治天下以至太平者莫不由此此之謂要道也其三盡地利曰人生天地之閒以衣食為命食不足則飢衣不足則寒飢寒切體而欲使民興行禮讓者此猶逆坂走丸勢不可得也是以古之聖王知其若此故先足其衣食然後教化隨之夫衣食所以足者在于地利盡地利所以盡者由于勸課有方主此教者在乎牧守令長而已民者冥也智不自周必待勸教然後盡其力諸州郡縣每至歲首必戒敕部民無問少長但能操持農器者皆令就田墾發以時勿失其所及布種既訖嘉苗須理麥秋在野蠶停于室若此之時皆宜少長悉力男女併功若援溺救火寇盜之將至然後可使農夫不廢其業蠶婦得就其功若有遊手怠惰早歸晚出好逸惡勞不勤事業者則正表牒名郡縣守令隨事加罰罪一勸百此則明宰之教也夫百畝之田必春耕之夏種之秋收之然後冬食之此三時者農之要也若失其一時則穀不可得而食故先王之戒曰一夫不耕天下必有受其飢者一婦不織天下必有受其寒者若此三時不務省事而令民廢農者是則絶民之命驅以就死然單劣之戶及無牛之家勸令有無相通使得兼濟三農之隙及陰雨之暇又當教民種桑植果藝其菜蔬修其園圃畜育雞豚以備生生之資以供養老之具夫為政不欲過碎碎則民煩勸課亦不容太𥳑𥳑則民怠善為政者必消息時宜而適煩𥳑之中故詩曰不剛不柔布政優優百祿是求如不能爾則必陷于刑辟矣其四擢賢良曰天生蒸民不能自治故必立君以治之人君不能獨治故必置臣以佐之上自帝王下及郡國置臣得賢則治失賢則亂此乃自然之理百王不能易也今刺史守令悉有僚吏皆佐治之人也刺史府官則命于天朝其州吏以下竝牧守自置自昔以來州郡大吏但取門資多不擇賢良末曹小吏唯試刀筆竝不問志行夫門資者乃先世之爵祿無妨子孫之愚瞽刀筆者乃身外之末材不廢性行之澆僞若門資之中而得賢良是則策騏驥而取千里也若門資之中而得愚瞽是則土牛木馬形似而用非不可以涉道也若刀筆之中而得志行是則金相玉質內外俱美實為人寶也若刀筆之中而得澆僞是則飾畫朽木悅目一時不可以充榱椽之用也今之選舉者當不限資蔭唯在得人苟得其人自可起廝養而為卿相伊尹傅說是也而況州郡之職乎苟非其人則丹朱商均雖帝王之胤不能守百里之封而況于公卿之胄乎由此而言官人之道可見矣凡所求材藝者為其可以治民若有材藝而以正直為本者必以其材而為治也若有材藝而以姦僞為本者將由其宮而為亂也何治之可得乎是故將求材藝必先擇志行其志行善者則舉之其志行不善者則去之而今擇人者多云邦國無賢莫知所舉此乃未之思也非適理之詮所以然者古人有言明主聿興不降佐于昊天大人基命不擢才于后土常引一世之人治一世之務故殷周不待稷契之臣魏晉無假蕭曹之佐仲尼曰十室之邑必有忠信如丘者焉豈有萬家之都而云無士但求之不勤擇之不審或用之不得其所任之不盡其材故云無耳古人云千人之秀曰英萬人之英曰雋今之智效一官行聞一邦者豈非英雋之士也但能勤而審之去虛取實各得州郡之最而用之則民無多少皆足治矣孰云無賢夫良玉未玉石駑驥然後始分彼賢士之未用也混于凡品竟何以異要任之以事業責之以成務方與彼庸流較然不同昔呂望之屠釣百里奚之飯牛寧生之扣角管夷吾之三敗當此之時悠悠之徒豈謂其賢及升王朝登霸國積數十年功成事立始識其奇士也于是後世稱之不容于口彼瓌偉之林不世之傑尚不能以未遇之時自異于凡品況降此者哉若必待太公而後用是千載無太公必待夷吾而後任是百世無夷吾所以然者士必從微而至著功必積小以至大豈有未任而已成不用而先達也若識此理則賢可求士可擇得賢而任之得士而使之則天下之士何向而不可成也然善官人者必先省其官官省則善人易充善人易充則事無不理官煩則必雜不善之人雜不善之人則政必有得失故語曰官省則事省事省則民清官煩則事煩事煩則民濁清濁之由在于官之煩省案今吏員其數不少昔民殷事廣尚能克濟況今戶口減耗依員而置猶以為少如聞在下州郡尚有兼假擾亂細民甚為無理諸如此輩悉宜罷黜無得習常非直州郡之官宜須善人爰至黨族閭里正長之職皆當審擇各得一鄉之選以相監統夫正長者治民之基基不傾者上必安凡求賢之路自非一途然所以得之審者必由任而試之考而察之起于居家至于鄉黨訪其所以觀其所由則人道明矣賢與不肖別矣率此以求則庶無愆悔矣其五恤獄訟曰人受陰陽之氣以生有情有性性則為善情則為惡善惡既分而賞罰隨焉賞罰得中則惡止而善勸賞罰不中則民無所措手足民無所措手足則怨叛之心生是以先王重之特加戒慎夫戒慎者欲使治獄之官精心悉意推究事源先之以五聽參之以證驗妙覩情狀窮鑒隱伏使姦無所容罪人必得然後隨事加刑輕重皆當赦過矜愚得情勿喜又能消息情理斟酌禮律無不曲盡人心遠明大教使獲罪者如歸此則善之上也然宰守非一不可人人皆有通識推理求情時或難盡唯當率至公之心去阿枉之志務求曲直念盡平當聽察之理必窮所見然後栲訊以法不苛不暴有疑則從輕未審不妄罰隨事斷理獄無停滯此亦其次若乃不仁恕而肆其殘暴同民木石專任捶楚巧詐者雖事彰而獲免辭弱者乃無罪而被罰有如此者斯則下矣非共治所寄今之宰守當勤于中科而慕其上善如在下條則刑所不赦矣當深思遠大念存德教先王之制曰與殺無辜寧赦有罪與其害善寧其利淫明必不得中寧濫捨有罪不謬害善人也今之從政者則不然深文巧劾寧致善人于法不免有罪于刑所以然者皆非好殺人也但云為吏寧酷可免後患此則情存自便不念至公奉法如此皆姦人也夫人者天地之貴物一死不可復生然楚毒之下以痛自誣不被申理遂陷刑戮者將恐往往而有是以自古以來設五聽三宥之法著明慎庶獄之典此皆愛民甚也凡伐木殺草田獵不順尚違時令而虧帝道況刑罰不中濫害善人寧不傷天心犯和氣也天心傷和氣損而欲陰陽調適四時順序萬物阜安蒼生悅樂者不可得也故語曰一夫吁嗟王道為之傾覆正謂此也凡百宰守可無慎乎若有深姦巨猾傷化敗俗悖亂人倫不忠不孝故為背道者殺一勵百以清王化重刑可也識此二途則刑政盡矣其六均賦役曰聖人之大寶曰位何以守位曰仁何以聚人曰財明先王必以財聚人以仁守位國而無財位不可守是故三五以來皆有征稅之法雖輕重不同而濟用一也今逆寇未平軍用資廣雖未遑減省以恤民瘼然宜令平均使下無匱夫平均者不捨豪強而徵貧弱不縱姦巧而困愚拙此之謂均也故聖人曰蓋均無貧然財貨之生其功不易織紝紡績起于有漸非旬日之閒所可造次必須勸課使預營理絹鄉先事織紝麻土早修紡績先時而備至時而輸故王賦獲供下民無困如其不預勸戒臨時迫切復恐稽緩以為已過捶朴交至取辨目前富商大賈緣茲射利有者從之貴買無者與之舉息輸稅之民于是斃矣租稅之時雖有大式至于斟酌貧富差次先後皆事起于正長而繫之于守令若斟酌得所則政和而民悅若檢理無方則吏姦而民怨又差發徭役多不存意致令貧弱者或重徭而遠戍富強者或輕使而近防守令用懷如此不存恤民之心皆王政之罪人也周書蘇綽傳又北史六十三大誥惟中興十有一年仲夏庶邦百辟咸會于王庭柱國泰洎群公列將罔不來朝時乃大稽百憲敷于庶邦用綏我王度皇帝若曰昔堯命羲和允釐百工舜命九官庶績咸熙武丁命說克號高宗時惟休哉朕其欽若格爾有位胥暨我太祖之庭朕將丕命女以厥官六月丁巳皇帝朝格于太廟凡厥具僚罔不在位皇帝若日咨我元輔群公列將百辟卿士庶尹御事朕惟寅敷祖宗之靈命稽于先王之典訓以大誥于爾在位昔我太祖神皇肇膺明命以創我皇基烈祖景宗廓開四表底定武功暨乎文祖誕敷文德龔惟武考不霣其舊自時厥後陵夷之斃用興大難于彼東土則我黎人咸墜塗炭惟台一人纘戎下武夙夜祗畏若涉大川罔識攸濟是用稽于帝典揆于王庭拯我民瘼惟彼哲王示我通訓曰天生蒸民罔克自乂上帝降鑒睿聖植元后以乂之時惟元后弗克獨乂博求明德命百辟群吏以佐之肆天之命辟辟之命官惟以恤民弗克逸念辟惟元首庶黎惟趾股肱惟弼上下一體各勤攸司茲用克臻于皇極故其彝訓曰后克艱厥后臣克艱厥臣政乃乂今台一人膺天之嘏既陟元后股肱百辟又服我國家之命罔不咸守厥職嗟后弗艱厥后臣弗艱厥臣政于何弗斁嗚呼艱哉凡爾在位其敬聽命皇帝若曰柱國唯四海之不造載繇二紀天末絶我太祖列祖之命用錫我以元輔國家將墜公惟棟梁皇之弗極公惟作相百揆愆度公惟大録公其允文允武克明克乂迪七德敷九功龕暴除亂下綏我蒼生旁施于九土若伊之在商周之有以說之相丁用保我無疆之祚皇帝若曰群公太宰太尉司徒司空惟公作朕鼎足以弼乎朕躬宰惟天官克諧六職尉惟司武武在止戈徒惟司衆敬敷五教空惟司土利用厚生惟時三事若三階之在天惟茲四輔若四時之成歲天工人其代諸皇帝若曰列將汝惟鷹揚作朕爪牙寇賊姦究蠻夷猾夏汝徂征綏之以惠董之以威刑期于無刑萬邦咸寧俾八表之內莫違朕命時汝功皇帝若曰庶邦列辟汝惟守土作民父母民惟不勝其飢故先王重農不勝其寒故先王貴女功民之不率于孝慈則骨肉之恩薄弗惇于禮讓則爭奪之萌生于茲六物實惟教本嗚乎為上在寬寬則民怠齊之以禮不剛不柔稽極于道皇帝若曰卿士庶尹凡百御事王省惟歲卿士惟月庶尹惟日御事惟時歲月日時罔易其度百憲咸貞庶績其凝嗚呼惟若王官陶鈞萬國若天之有斗斟元氣酌陰陽弗失其和蒼生永賴悖其序萬物以傷時惟艱哉皇帝若曰惟天地之道一陰一陽禮俗之變一文一質爰自三五以迄于茲匪惟相革惟其救斃匪惟相襲惟其可久惟我有魏承乎周之未流接秦漢遺斃襲魏晉之華誕五代澆風因而未革將以穆俗興化庸可暨乎嗟我公輔庶僚列辟朕惟否德其一朕心力祗慎厥艱克遵前王之丕顯休烈弗敢怠荒咨爾在位亦協于朕心惇德允元惟厥難是務克捐厥華即厥實背厥僞崇厥誠勿愆勿忘一乎三代之彝典歸于道德仁義用保我祖宗之丕命荷天之休克綏我萬方永康我黎庶戒之哉戒之哉朕言不再柱國泰洎庶僚百辟拜手稽首曰亶聰明作元后元后作民父母惟三五之王率由此道用臻于刑措自時厥後歷千載而未聞惟帝念功將反叔世逖致于雍熙庸錫降丕命于我群臣博哉王言非言之難行之實難罔不有初鮮克有終商書曰終始惟一德乃日新惟帝敬厥始慎厥終以躋日新之德則我群臣敢不夙夜對揚休哉惟茲大誼未光于四表以邁種德俾九域幽遐咸昭奉元后之明訓率遷于道永膺無疆之休帝曰欽哉周書蘇綽傳自有晉之季文章競為浮華遂成風俗太祖欲革其斃因魏帝祭廟群臣畢至乃命綽為大誥奏行之其詞曰云云自是之後文筆皆依此體又見北史六十三七經論闕佛性論闕獨孤信復職議邊將董戎龔行天罰喪師敗績國刑無捨荊州刺史獨孤如願任當推轂遠襲襄宛斬賊帥辛纂傳首京師論功語效實合嘉賞但庸績不終旋致淪沒責成之義朝寄有違然孤軍數千後援未接賊衆我寡難以自固既經恩降理絶刑書昔秦宥孟明漢捨廣利卒能改過立功垂芳竹帛以今方古抑有成規臣等參議請赦罪復其舊職周書獨狐信傳信為荊州刺史東魏遣高敖曹侯景等奄至信以衆寡不敵奔梁大統三年還至長安自以虧損國威上書謝罪文帝付尚書議之七兵尚書陳郡王正言等議造像碑大魏大統五年歲次己未二月乙酉朔草五日己酉威烈將軍富平令頻陽縣開國男曹續生息延慶直閣都夫至道空玄非言無以申其宗真容絶相非刑像何以表其算是以現治富平令曹并邑子卌四人等各減割家珍造像四塸上為帝王永隆諸王公長壽下及邑子下闕碑拓本大統十六年九月一日佛弟子岐法起造百石像一區為七世父母所生父母家口大小無病萇年常與善俱一時成佛碑拓本造須彌塔記大魏天平三年歲次丙辰正月癸卯朔合邑等敬造須彌塔一區仰為皇帝陛下師僧七世父母所生父母因緣眷屬後邊邊地衆生常與善居彌勒三會唱在初首下生人閒侯王長者合邑諸人所願如是教化主王方略邑師法顯邑師道寶比丘道景比丘僧惠賈仲郭阿石曹和唯郱劉碑拓本判竇瑗表改麟趾制母殺父條身體髮膚受之父母生我勞悴續莫大焉子于父母同你異息終天靡報在情一也今忽欲論其尊卑辨其優劣推心未忍訪古無據母殺其父子復告母母由告死便是子殺天下未有無母之國不知其子將欲何之案春秋莊公元年不稱即位文姜出故服虔注云文姜通兄齊襄與殺公而不反父殺母出隱痛深諱朞而中練思慕少殺念至于母故經書三月夫人遜于濟既有念母深諱之文明無讎疾告列之理且聖人設法所以防淫禁暴極言善惡使知而避之若臨事議刑則陷罪多矣惡之甚者殺父害君著之律令百王罔革此制何嫌獨求削去既于法無違于事非害宣布有年謂不宜改魏書竇瑗傳瑗表言麟趾新制母殺父子不得告告者死此條乞付評議詔付尚書三公郎中封君義立判云駮李業興甲子元曆今年十二月二十日新曆歲星在營室十三度順疾天上歲星在營室十一度今月二十日新曆鎮星在角十一度留天上鎮星在亢四度留今月二十日新曆太白在斗二十五度晨見逆行天上太白在斗二十一度逆行便為差殊魏書律曆志下興和元年命李業興改立甲子元曆事訖詔以新曆示田曹參軍信都芳芳駮四術周髀宗序漢成帝時學者問蓋天揚雄曰蓋哉未幾也問渾天曰洛下閎為之鮮于妄人度之耿中丞象之幾乎莫之息矣此言蓋差而渾密也蓋器測影而造用之日久不同于祖故云未幾也渾器量天而作乾坤大象隱見難變故云幾乎是時太史令尹咸窮研晷蓋易古周法雄乃見之以為難也自昔周公定影王城至漢朝蓋器一改焉渾天覆觀以靈憲為文蓋天仰觀以周髀為法覆仰雖殊大歸是一古之人制者所表天效玄象芳以渾算精微術幾萬首故約本為之省要凡述二篇合六法名四術周髀宗北史八十九與楊愔書高王欲送卿于帝所北齊書楊愔傳武德郡建沁水石橋記夫梵燈遐廓長夜龔其明慧教洞開群迷啓其目是以神光未滅感膺于西胡金儀雖謝夢現于東漢抑亦愍世多艱下生思土運濟貫心慈悲注意歸依者塵霧莫侵回向者雷電不撓信是苦海之靈丹酷旱之甘露矣惟此區域號稱舊邦舜禹懷談之地殷周畿甸之土晉啓山陽鄭錫河後趙稱都入魏為鎮及秦吞六雄跨有四海罷侯置守乙統九服項羽改名殷國漢高復立為郡自茲以還河內下邑屬皇朝遷鼎卜食漳濱遂方割四縣在古州城置武德郡焉北通燕趙堂堂之風相洽南引鞏雒穆穆之化清西瞻軹塞則連山萬疊東望平皋則曠野千里長河帶其前太行環其後車馬之所混舳艫之所湊集頗是一都之要害實為三魏之逵道若其沇溴雙吐丹絶竝納勢等周原美齊陸海袂散成帷人榮若繡禮樂尚繁風儀未革然郡士遼廓沁水橫流源自羊頭之山發于麻谷之口滔滔晉域作紀懷方引溉過于鄭白流穢踰于汾澮但波漸臺雉岸崢嶸揭厲多危往來受害至于秋雨時降水潦口騰馬牛雖辨公私頓廢岨乘車之義事切朝涉之艱宣威將軍懷州長史行武德郡事河南于子建車騎將軍左光祿大夫平皋令京兆杜護宗前將軍懷縣令趙郡李同賓征西將軍州縣令扶風馬周洛殄難將軍溫縣令廣寧燕景裕征虜將軍郡丞東平李思哲或分竹專城或木百里鵲起來官共治民瘼況同覩艱辛俱看危滯一物可矜納隍在念敬思包鹿濟難之仁俯龜報恩之惠雖無武庫造梁之工術且沙彌訪津之殷勤音啚問俗便獲軌躅雖亡遺柱在目父傳咸屬周時稱其板構與城俱廢乃于農隙之月各率祿力及朝文武懷熹願七月六日經始此橋助福者比肩獻義丈聯轂人百其功共陳心力至草四日所便訖不煩遐邇荷擔之勞未傷士民尺寸之木雖無匪日之美庶省浹晨之費修柱揭以插泉華表鬱而軼漢紅交架以綺蘭聯綿而雲布引北山之饒則人無遺力積南市之富而家有餘資昔伯度記功勒燕然文淵表象林之銅作述之理雖殊刊録之情不異況四生踳駮同悲欣之境十𡆮還匝徑風電之力若不歸依寶神教遠擬彼岸之喻近取成務之言恐沮勸之道未宣畫扴之功虛燼乃運石立碑敬鐫啚像窮般馬之巧盡金雘之餝使四部往來起歎慕之心六道奔趣識風雲之會其詞曰清虛曰道正直為神有一于此用表生民淵乎大覺至矣能仁行成元吉德伏波旬芒芒禹績眇眇桓功為魚左衽逖聽前風九州咸載五等攸同分疆敷土俾侯樹公美茲舊甸麗其新邑憑帶山河苞苴原隰禮樂仍賁風徽猶緝青芻可翦潢流可挹粵余承乏謬廁官方政慚春雨威愧秋霜情深履虎意等納隍慕彼醫藥眷此津梁渾渾沁水冀道名川既難揭厲又阻口船爰始經謀義勸競填辰不再浹斯搆已宣落落太虛繞繞群有來同聚沫去齊過牖敬託三尊資憑四部髣佛彼岸依悕可久大魏武定七年歲次己巳四月丙戌朔八日癸己建碑拓本奏請定中宮車制中宮僕刺列車興朽敗自昔舊都禮物頗異遷京已來未復更造請集禮官以裁其制魏書禮志四熙平元年六月中侍中劉騰等奏詐為胡玄度等列誣清河王懌許度等金帛令以毒藥置御食中以害帝自望為帝許度兄弟以富貴魏書元叉傳誡諸子自我為汝家婦未見汝父一日不讀書汝等宜各修勤勿替先業魏書高崇附傳造釋迦像記大魏普太二年四月草四日清信士路僧妙為亡夫造釋迦象一區願令亡夫捨穢從真神超蔭海面奉慈顏願見在眷屬鍾善集舍門辨比丘僧者文碑拓本
