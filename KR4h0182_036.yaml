body:
  text: 李沖諫預召兵戍南鄭表秦州險厄地接羌夷自西師出後餉援連續加氐胡叛逆所在奔命運糧擐甲迄茲未已今復豫差戍卒懸擬山外雖加優復恐猶驚駭脫終攻不剋徒動民情連胡結夷事或難測輒依旨密下刺史待軍剋鄭城然後差遣如臣愚見猶謂末足何者四道險厄單徑千里今欲深戍絶界之外孤據群賊之口敵攻不可卒援食盡不可運糧古人有言雖鞭之長不及馬腹南鄭于國實為馬腹也且昔人攻伐或城降而不取仁君用師或撫民而遺地且王者之舉情在拯民夷寇所守意在惜地校之二義德有淺深惠聲已遠何據于一城哉且魏境所掩九州過八民人所臣十分而九所未民者惟漠北之與江外耳羈之在近豈急急于今日也宜待大開疆宇廣拔城聚多積資糧食足支敵然後置邦樹將為吞并之舉今鍾離壽陽密邇未拔諸誠新野跬步弗降所剋者舍之而不取所降者撫之而旋戮東道既未可以近力守西蕃寧可以遠兵固若果欲置者臣恐終以資敵也又今建都士中地接寇壤方須大收死士平蕩江會輕遣單寡棄令陷沒恐後舉之日衆以留守致懼求其死效未易可獲推此而論不戍為上魏書李沖傳答詔表臣等徼逢幸會生遇昌辰才非利用坐班位列功無汗馬猥受山河叨忝之寵終古無比莫大之施萬殞靡酬而睿丕識乖犬馬心同梟獍潛引童稚構茲妖逆違悖天常罪踰萬殞睿結釁在心陰構不息閒說戚蕃擬窺乾象雖覩休平未懷疑惑何嘗片辭披露宿志原心語迹實為賊首丕之二子從惡纍年交扇東西窺擾并夏測觀此狀無容不知惟聖慈含育恕其生命其若天地何其若神祇何夫效誠盡節為下之恆分刑茲無赦在上之常法況曲蒙莫大之恩獎以忠貞之義而更違天背道包藏奸逆求情推理罪乃常誅而慈造寬渥更流恩貸續睿三斷之骸還丕已絶之魄二三縱宥實虧憲典猶復上延天眷言念疇日不以臣等背負餘黨別垂明詔再申齊信之恩重喻日之旨伏讀悲慚惟深愧惕魏書陸俟附傳陸睿構送賜死高祖詔僕射李沖領軍于烈云云沖烈表表彈李彪臣聞範國匡人光化升治輿服典章理無暫失故晉文功建九合猶見抑于請隧季氏藉政三世尚受譏于璵璠固知名器之重不可以妄假先王既憲章于古陛下又經綸于今用能車服有敘禮物無墜案臣彪昔于凡品特以才拔等望清華司文東觀綢繆恩眷繩直憲臺左加金璫右珥蟬冕闕東省宜感恩厲節忠以報德而竊名忝職身為違傲矜勢高亢公行僭逸坐輿禁省冒取居官材輒駕乘黃無所憚懾肆志傲然愚聾視聽此而可忍誰不可懷臣輒集尚書以下令史以上并治書侍御史麗道元等于尚書都座以彪所犯罪狀告彪訊其虛實若或不知須訊部下彪答臣言事見在目實如所劾皆彪所知何須復召部下臣今請以見事免彪所居職付廷尉治獄魏書李彪傳又表臣與彪相識以來垂二十載彪始南使之時見其色厲辭辨才優學博臣之愚識謂是拔萃之一人及彪位宦升達參與言燕聞彪評章古今商略人物興言于侍筵之次啓論于衆英之中賞忠識正發言懇惻惟直是語辭無隱避雖復諸王之尊近侍之要至有是非多面抗折酷疾矯詐毒愆非違厲色正辭如鷹鸇之逐鳥雀懍懍然實似公清之操臣雖下才輒亦尚其梗概欽其正直微識其褊急之性而不以為瑕及其初登憲臺始居可直首復騶唱之儀肇正直繩之體當時識者僉以為難而彪秉志信行不避豪勢共所彈劾應弦而倒赫赫之威振于下國肅肅之稱著自京師天下改目貪暴斂手臣時見其所行信謂言行相符忠清內發然時有私于臣云其威暴者臣以直繩之官人所忌疾風謗之際易生音謠心不承信往年以河陽事曾與彪在領軍府共太尉司空及領軍諸卿等集閲廷尉所問囚徒時有人訴枉者二公及臣少欲聽采語理未盡彪便振怒東坐攘袂揮赫口稱賊奴叱吒左右高聲大呼云南臺中取我木手去搭奴肋折雖有此言終竟不取即言南臺所問唯恐枉活終無枉死但可依此時諸人以所枉至重有首實者多又心難彪遂各默爾因緣此事臣遂心疑有濫審加情察知其威虐猶未體其采訪之由訊檢之狀商略而言酷急小罪肅禁為大會而言之猶謂益多損少故懷寢所疑不以申徹實失為臣知無不聞之義及去年大駕南行以來彪兼尚書日夕共事始乃知其言與行舛是己非人專恣無忌尊身忽物安以身作之過深劾他人已方事人好人佞己聽其言同振古忠恕之賢校其行是天下佞暴之賊臣與任城卑躬曲己若順弟之奉暴兄其所欲者事雖非理無不屈從依事求實悉有成驗如臣列得實宜殛彪于有北以除姦矯之亂政如臣無證宜投臣于四裔以息青蠅之白黑魏書李彪傳上書言宜立三長宜準古五家立一鄰長五鄰立一里長五里立一黨長長取鄉人彊謹者鄰長復一夫里長二黨長三所復復征戍餘若民三載亡愆則陟用陟之一等其民調一夫一婦帛一匹粟二石民年十五以上未娶者四人出一夫一婦之調奴任耕婢任績者八口當未娶者四耕牛二十頭當奴婢八其麻布之鄉一夫一婦布一匹下至牛以此為降大率十匹為工調二匹為調外費三匹為內外百官俸此外雜調民年八十以上聽一子不從役孤獨癃老篤疾貧窮不能自存者三長內迭養食之魏書食貨志太和十年給事中李沖上言云云書奏高祖從之奏録劉昞子孫昞河右碩儒今子孫沈屈未有祿潤賢者子孫宜蒙顯異魏書劉昞傳太和十四年尚書李沖奏于是除其一子為郢州鄖陽令奏養子不從坐前彭城鎮將元拔與穆泰同逆養子降壽宜從拔罪而太尉咸陽王禧等以為律文養子而為罪父及兄弟不知情者不坐謹審律意以養子于父非天性于兄弟非同氣敦薄既差故典刑有降是以養子雖為罪而父兄不預然父兄為罪養子不知謀易地均情豈獨從戮乎理固不然臣以為依據律文追戮于所生則從坐于所養明矣又律惟言父不從子不稱于不從父當是優尊厲卑之義臣禧等以為律雖不正見互文起制于乞也舉父之罪于養也見子坐是為互起互起兩明無罪必矣若以嫡繼養與生同則父子宜均祗明不坐且繼養之注云若有別制不同此律又令文云諸有封爵若無親子及其身卒雖有養繼國除不龔是為有福不及己有罪便預坐均事等情律令之意便相矛盾伏度律旨必不然也臣沖以為指例條尋罪在無疑準令語情頗亦同式魏書李沖傳奏獄成許家人訴枉使雖結案處上廷尉解送至省及家人訴枉尚書納辭連解下鞫未檢遇宥者不得為案成之獄推之情理謂崔纂等議為允魏書刑罰志兼廷尉卿元志上言獄成不許家人陳訴大理正崔纂等以為宜許陳訴尚書李韶奏詔從之宗室助祭議案然統曰有事于太廟群昭群穆咸在鄭氏注昭穆咸在謂同宗父子皆來古禮之制如是其廣而當今儀注唯限親廟四愚竊疑矣何以明之設使世祖之子男于今存者既身是戚蕃號為重子可得賓于門外不預碑鼎之事哉又因宜變法禮有其說記言五廟之孫祖廟未毀為庶人冠娶必告死必赴注曰實四廟而言五者容顯考始封之君子今因太祖之廟在仍通其曾玄侍祠與彼古記甚相符會且國家議親之律指取天子之玄孫乃不旁準于時后至于助祭必謂與世主相倫將難均一壽有長短世有延促終當何時可得齊同謂宜入廟之制率從議親之條祖祧之裔各聽盡其玄孫使得駿奔堂壇肅承禘礿則情差通不宜復各為例令事事舛駮魏書禮志二江陽王繼表言道武曾孫宜得預祭李琰之議又見通典五十一奏定常侍員限比因多故常侍遂無員限今以王元景等為常侍定限八員北史二十四王昕傳太昌初吏部尚書李神俊奏言乞黜落子登表臣上或近臣下不決引一人而恩出分外冀荷榮祿當今聖明之朝理應謙讓而臣子登引人求進是臣素無教訓請乞黜落魏書于栗磾附傳太和十九年大選百僚烈子登引例求進烈表因子忠奏事臣雖朽邁心力猶可此等猖狂不足為慮願緩蹕徐還以安物望魏書于栗磾附傳咸陽王禧謀反世宗敕烈子忠馳覘虛實因忠奏矯詔誅裴植凶謀既爾罪不合恕雖有歸化之誠無容上議亦不須待秋分也魏書裴叔業附傳時于忠專擅朝權既構成其禍又矯為此詔疾病上胡太后表先帝録臣父子一介之誠昭臣家世奉公之節故申之以婚姻重之以爵祿至乃位亞三槐秩班九命自大明利見之始百官總己之初以復得猥攝禁戎緝寧內外斯誠社稷之靈兆民之福臣何力之有焉但陛下以睿明御寓皇太后以聖善臨朝衽席不遺簪屨弗棄復乃寵窮出內榮遍宮閨外牧兩河入參百揆顧服知妖省躬識戾而臣將慎靡方致慈疴疚自去秋苦痢纏綿迄今藥石備嘗日增無損又今年以來力候轉惡微喘緒息振復良難鴻慈未酬伏枕涕咽臣薄福無男遺體莫嗣貪及餘生謹陳宿抱臣先養亡第四弟第二子司徒掾永超為子猶子之念實切于心乞立為嫡傳此山河魏書于栗磾附傳懷田賦闕上言葬埋戰亡者自遷都以來凡戰陳之處及軍罷兵還之道所有骸骼無人覆藏者請悉令州郡戍邏檢行埋掩并符出兵之鄉其家有死于戎役者使皆招魂復魄祔祭先靈復其年租調身被傷痍者免其兵役魏書裴駿附傳裴宣遷太尉長史上言豫州大饑表去歲不收饑饉十五今又災雪三尺民人萎餧無以濟之臣輒日別出州倉米五十斛為粥救其甚者魏書辥安都附傳真度為豫州刺史景明初豫州大饑真度表博譜烏曹作博其所由來尚矣雙箭以象日月之照臨十二博以象十二辰之纏次則天地之運動法陰陽之消息表人事之窮達窮變化之機微履謙謝則知沖退以致福觀殺罰則知當路而速禍行其道則掎鹿有歸保其家乃瞻鳥爰集隱顯藏用莫不合道龍潛雀起率皆趣良足以諧畼至娛洽協妙賞者也御覽七百五十四
