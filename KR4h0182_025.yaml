body:
  text: 崔鴻呈奏十六國春秋表臣聞帝王之興也雖誕應圖籙然必有驅除蓋所以翦彼厭政成此樂推故戰國紛紜年過十紀而漢祖夷殄群豪開四百之業歷文景之懷柔蠻夏世宗之奮揚威武始得涼朔同文牂越一軌于是談遷感漢德之盛痛諸史放絶乃鈐括舊書著成太史所謂緝茲人事光彼天時之義也昔晉惠不競華戎亂起三帝受制于姦臣二皇晏駕于非所五都蕭條鞠為煨燼趙燕既為長蛇遼海緬成殊域窮兵鋭進以力相雄中原無主八十餘年遺晉僻遠勢略孤微民殘兵革靡所歸控皇魏龍潛幽代世篤公劉內修德政外抗諸偽并冀之民懷寶之士繈負至者日月相尋雖邠岐之赴太王謳歌之歸西伯實可同年而語矣太祖道武皇帝以神武之姿接金行之運應天順民龍飛受命太宗必世重光業隆玄默世祖雄才睿略闡曜威靈農戰兼修掃清氛穢歲垂四紀而寰宇一同儋耳文身之長卉服斷髮之酋莫不請朔率職重譯來庭隱愍鴻濟之澤三樂擊壤之歌百姓始得陶然蘇息欣于堯舜之世自晉永寧以後雖所在稱兵競自尊樹而能建邦命氏成為戰國者十有六家善惡興滅之形用兵乖會之勢亦足以垂之將來昭明勸戒但諸史殘缺體例不全編録紛謬繁略失所宜審正不同定為一書伏惟高祖以大聖應期欽明御運合德乾坤同光日月建格天之功創不世之法開作生民惟新大造陛下以青陽繼統睿武承天應符屈已則道高三五頤神至境則洞彼玄宗剖判百家斟酌六籍遠邁石渠美深白虎至如導禮革俗之風昭文變性之化固以感彼禽魚穆茲寒暑而況愚臣沐浴太和懷音正始而可不勉強難革之性砥礪木石之心哉誠知敏謝允南才非承祚然國志史考之美竊亦輒所庶幾始自景明之初搜集諸國舊史屬遷京甫爾率多分散求之公私驅馳數歲又臣家貧祿薄唯任孤力至于紙盡書寫所資每不周接暨正始元年寫乃向備謹于吏案之暇草構此書區分時事各繫本録破彼異同凡為一體約損煩文補其不足三豕五門之類一事異年之流皆稽以長曆考諸舊志刪正差謬定為實録商校大略著春秋百篇至三年之末草成九十五卷唯常璩所撰李雄父子據蜀時書尋訪不獲所以未及繕成輟筆私求七載于今此書本江南撰録恐中國所無非臣私力所能終得其起兵僭號事之始末乃亦頗有但不得此書懼簡略不成久思陳奏乞敕緣邊求采但愚賤無因不敢輕輒散騎常侍太常少卿荊州大中正臣趙雍忽宣明旨敕臣送呈不悟九皋微志乃得上聞奏敕欣惶慶懼兼至今謹以所訖者附臣雍呈奏臣又別作序例一卷年志一卷仰表皇朝統括大義俯明愚臣著録微體徒竊慕古人立言美意文致疏鄙無一可觀簡御之日伏深慚悸魏書崔光附傳鴻以其書有與國初相涉言多失體且既未訖迄不奏聞鴻後典起居乃妄載其表又見北史四十四大考百寮議竊惟王者為官求才使人以器黜陟幽明揚清激濁故績效能官才必稱位者朝升夕進年歲數遷豈拘一階半級閡以闕寮等位者哉二漢以降太和以前苟必官須此人人稱此職或超騰升陟數歲而至公卿或長兼試守稱允而遷進者披卷則人人而是舉目則朝貴皆然故能時收多士之譽國號豐賢之美竊見景明以來考格三年成一考一考轉一階貴賤內外萬有餘人自非犯罪不問賢愚莫不上中才與不肖比肩同轉雖有善政如黃龔儒學如王鄭史才如班馬文章如張蔡得一分一寸必為常流所攀選曹亦抑為一概不曾甄別琴瑟不調改而更張雖明旨已行猶宜消息魏書崔光附傳延昌二年將大考百寮鴻以考令于體例不通乃建議又見北史四十四通典十五駮元珍議乙龍虎罪三年之喪二十五月大祥諸儒或言祥月下旬而禫或言二十七月各有其義未知何者會聖人之旨龍虎居喪已二十六月若依王杜之義便是過禫即吉之月如其依鄭玄二十七月禫中復可以從御職事禮云祥之日鼓素琴然則大祥之後喪事終矣既可以從御職事求上何為不可若如府判禫中鼓琴復有罪乎求之經律理實未允魏書禮志四延昌二年偏將軍乙龍虎喪父給假二十七月而龍虎并數閏月詣府求上領軍元珍上言冒哀求仕五歲刑三公府郎中崔鴻駮云云又見通典一百又駮案三年之喪沒閏之義儒生學士猶或病諸龍虎生自戎馬之鄉不蒙稽古之訓數月成年便懼違緩原其本心非貪榮求位而欲責以義方未可便爾也且三年之喪再期而大祥中月而禫鄭玄以中為間王杜以為是月之中鄭亦未為必會經旨王杜豈于必乖聖意既諸儒探賾先聖後賢見有不同晉武後雖從宋昌許猛之駮同鄭禫議然初亦從程猗贊成王杜之言二論得否未可知也聖人大祥之後鼓素琴成笙歌者以喪事既終餘哀之中可以存樂故也而樂府必以干戚羽毛施之金石然後為樂樂必使工為之庶民凡品于祥前鼓琴可無罪乎律之所防豈必為貴士亦及凡庶府之此義彌不通矣魯人朝祥而暮歌孔子以為踰月則可矣爾則大祥之後喪事已終鼓琴笙歌經禮所許龍虎欲宿衛皇宮豈欲合刑五歲就如鄭義二十七月而禫二十六月十五升布深衣素冠縞紕及黃裳綵纓以居者此則三年之餘哀不在服數之內也衰絰則埋之于地杖則棄之隱處此非喪事終乎府以大祥之後不為喪事之終何得復言素琴以示終也喪事尚遠日誠如鄭義龍虎未盡二十七月而請宿衛實為匆匆于戚之理合在情責便以深衣素縞之時而罪同杖絰苫凷之日于禮憲未允詳之律意冒喪求仕謂在斬焉草土之中不謂除衰杖之後也又龍虎具列居喪日月無所隱冒府應告之以禮遣還終月便幸彼昧識欲加之罪豈是遵禮敦風愛民之致乎正如猷義龍虎罪亦不合刑匆匆之失宜科鞭五十魏書禮志四元珍又上言鴻又駮云云又略見通典一百費羊皮張回罪議律稱和賣人者謂兩人詐取他財今羊皮賣女告回稱良張回利賤知良公買誠于律俱乖而兩各非詐此女雖父賣為婢體本是良回轉賣之日應有遲疑而賣者既以有罪買者不得不坐但賣者以天性難奪支屬易遺尊卑不同故罪有異買者知良故買又于彼無親若買同賣者即理不可何者賣五服內親屬在尊長者死此亦非掠從其真買暨于致罪刑死大殊明知買者之坐自應一例不得全如鈞識云買者之罪不過賣者之咎也且買者于彼無天性支屬之義何故得有差等之理又案別條知人掠盜之物而故買者以隨從論依此律文知人掠良從其宜買罪止于流然其親屬相賣坐殊凡掠至于買者亦宜不等若處同流坐于法為深準律斟降合刑五歲至如買者知是良人決便真賣不語前人得之由緒前人謂真奴婢更或轉賣因此流漂罔知所在家人追贖求訪無處永沈賤隸無復良期案其罪狀與掠無異且法嚴而姦易息政寬而民多犯水火之喻先典明文今謂買人親屬而復決賣不告前人良狀由緒處同掠罪魏書刑罰志延昌三年案律賣子一歲刑五服內親屬在尊長者死賣周親及妾與子婦者流蓋天性難奪支屬易遺又尊卑不同故殊以刑且買者于天性無支屬罪應一例明知是良決便真賣因此流漂家人不知追贖無迹永沈賤隸案其罪狀與掠無異通典一百六十七三公郎中崔鴻議奏上父鴻十六國春秋臣亡考故散騎常侍給事黃門侍郎前將軍齊州大中正鴻不殞家風式纘世業古學克明在新必境多識前載博極群書史才富洽號稱籍甚年止壯立便斐然懷著述意正始之未任屬記言撰緝餘暇乃刊著趙燕秦夏涼蜀等遺載為之贊序褒貶評論先朝之日草構悉了唯有李雄蜀書搜索未獲闕茲一國遲留未成去正光三年購訪始得討論適訖而先臣棄世凡十六國名為春秋一百二卷近代之事最為備悉未曾奏上弗敢宣流今繕寫一本敢以仰呈儻或淺陋不回睿賞乞藏祕閣以廣異家魏書崔光附傳鴻子子元永安中乃奏其父書上疏請平赫連昌赫連昌亡保上邽鳩合餘燼未有盤據之資今因其危滅之為易請益鎧馬平昌而還魏書奚斤傳伐涼州議河西王牧犍西垂下國雖內不純臣而外修職貢宜加寬宥恕其微愆去歲新征士馬疲敝未可大舉宜且羈縻其地鹵薄略無水草大軍既到不得久停彼聞軍來必嬰城固守攻則難拔野無所掠終無克獲魏書奚斤傳世祖大集群臣于西堂議伐涼州斤等三十餘人議又見魏書崔浩傳北史崔浩傳並小異豫備宋軍表臣前遣沙門僧護詣彭城僧護還稱賊發軍向北前鋒將徐卓之已至彭城大將軍到彥之軍在泗口發馬戒嚴必有舉斧之志臣聞為國之道存不忘亡宜繕甲兵增益屯戊先為之備以待其來若不豫設卒難擒殄且吳越之衆便于舟楫今至北土舍其所長逆順既殊榮逸不等平寇定功在于此日臣雖衰敝謀略寡淺過蒙殊寵忝荷重任討除寇暴臣之志也是以秣馬枕戈思效微節顠陛下不以南境為憂魏書叔孫建傳至并州上明元帝表竊見并州所部守宰多不奉法又刺史擅用御府針工古彤為晉陽令交通貨賄共為姦利請案律治罪魏書安同傳臨刑上疏臣聞聖不獨明而治鼎不單足而立是以熒火之光猶增日月之曜先臣同往因聖運歸身太祖竭誠戮力立效于險難之中臣以頑暗忝備股肱陛下恩育委以朝政思展微誠仰報恩澤而魯元姦佞構成貝錦天威遂加合門俱戮此乃命也非臣之枉但魯元外類忠貞內懷姦詐而陛下任以腹心恐釁發肘腋臣與魯元生為怨人死為讎鬼非以私故謗毀魯元不復眷眷披露誠款魏書安同附傳奏恤南州災民臣聞天地至公故萬物咸育帝王無私而黎民戴賴伏惟陛下以神武之資紹重光之緒恢隆大業育濟群生威之所振無思不服澤之所洽無遠不懷太平之治于是而在自頃邊寇內侵戎車屢駕天資聖明所在克殄方難既平皆蒙酬錫勳高者受爵功卑者獲賞寵賜優崇有過古義而郡國之民雖不征討服勤農桑以供軍國實經世之大本府庫之所資自山以東偏遇水害頻年不收就食他所臣聞率土之濱莫非王臣應加哀矜以鴻覆育今南摧強寇西敗醜虜四海晏如人神協畼若與兆民共饗其福則惠感和氣蒼生悅樂矣魏書劉潔傳太武時南州大水百姓阻飢潔奏乞停發車牛表今秋穀懸黃麻菽布野豬鹿竊食鳥雁侵費風波所耗朝夕參倍乞賜矜緩使得收載魏書古弼傳世祖畋于山北大獲麋鹿數千頭詔發車牛五百乘以運之弼表遣使請降表江淮以北聞王師南首無不抃舞思奉德化而逼于寇逆無由自致臣因民之欲請率慕義為國前驅今皆白衣無以制服人望若蒙偏裨之號假王威以唱義則莫不率從魏書司馬楚之傳上疏請乘勝南伐臣奉命南伐受任一方而智力淺短誠節未效所以夙夜憂惶忘寢與食臣纍遣人至荊揚所在陳説具論天朝盛化之美莫不欣承聖德傾首北望而義隆兄弟知人情搖動遣臣私讎順為司州刺史統淮北七郡代垣苗守懸瓠自鞏洛滑臺敗散以來義隆恥其敗北多加罪罰到彥之削位退同卒伍殺姚縱夫于垝春斬竺靈秀于彭城王休元託疾檀道濟斤放凡在腹心悉懷疑阻民怨臣猜可謂今日臣間平殄寇逆必乘戰勝之威建立功勳亦因離二之勢伏惟陛下聖德膺符道光四海神旌所指莫不摧服其未賓者義隆而已今天網遐舉殊方仰德固宜掃清東南齊一區宇使濟濟之風被于江漢魏書司馬楚之傳上太武帝表楚之渡河百姓思舊義衆雲集汝潁以南望風翕然回首革面斯誠陛下應天順民聖德廣被之所致也魏書司馬楚之傳上言廟祭有神異臣聞聖人能饗帝孝子能饗親伏惟陛下孝誠之至通于神明近嘗于太祖廟有車騎聲從北門入殷殷轞轞震動門闕執事者無不肅栗斯乃國祚永隆之兆宜告天下使咸知聖德之深遠魏書禮志一泰常四年帝嘗于白登廟將薦熟有神異焉太常博士許鍾上言
