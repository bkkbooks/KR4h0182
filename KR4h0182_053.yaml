body:
  text: 爾朱榮抗表請赴闕伏承大行皇帝背棄萬方奉諱號踴五內摧剝仰尋詔旨實用驚惋今海內草草異口一言皆云大行皇帝鴆毒致禍臣等外聽訟言內自追測去月二十五日聖體康愈至于二十六日奄忽升遐即事觀望實有所惑且天子寢疾侍臣不離左右親貴名醫瞻仰患狀面奉音旨親承顧託豈容不豫初不召醫崩棄曾無親奉欲使天下不為怪愕四海不為喪氣豈可得乎復皇后女生稱為儲兩疑惑朝野虛行慶宥宗廟之靈見欺兆民之望已失使七百危于纍卵社稷墜于一朝方選君嬰孩之中寄治乳抱之日使姦豎專朝賊臣亂紀惟欲指影以行權假形而弄詔此則掩眼捕雀塞耳盜鐘今秦隴塵飛趙魏霧合寶夤醜奴勢逼豳雍葛榮就德憑陵河海楚兵吳卒密邇在郊古人有言邦之不臧鄰之鄰之福也一旦聞此誰不窺𨵦竊惟大行皇帝聖德馭宇繼體正君猶邊烽迭舉妖寇不滅況今從佞臣之計隨親戚之談舉潘嬪之女以誑百姓奉未言之兒而臨四海欲使海內安乂愚臣所未聞也伏願留聖善之慈回須臾之慮照臣忠誠録臣至款聽臣赴闕須參大議問侍臣帝崩之由訪禁旅不知之狀以徐鄭之徒付之司敗雪同天之恥謝遠近之怨然後更召宗親推其年德聲副遐邇改承寶祚則四海更蘇百姓幸甚魏書爾朱榮傳肅宗崩事出倉卒榮聞之大怒謂鄭儼徐紇為之與元天穆等密議稱兵入匡朝廷討定之乃抗表上言陳兵事臣前以二州頻反大軍喪敗河北無援實慮南侵故令精騎三千出援相州京師影響斷其南望賊聞此衆當亦息圖使還奉敕云念生梟戮寶夤受擒醜奴明達並送誠款三輔告謐關隴載寧費穆虎旅大翦妖蠻兩絳狂蜀漸已稽顙又承北海王皓率衆二萬出鎮相州北海皇孫名位崇重鎮撫鄴城實副群望惟願廣其配衣及機早遣今關西雖平兵未可役山南鄰賊理無發召王師雖衆頻被摧北人情危怯實謂難用若不更思方略無以萬全如臣愚量蠕蠕主阿那瓌荷國厚恩宋應忘報求乞一使慰喻那瓌即遣發兵東引直趣下口揚威振武以躡其背北海之軍鎮撫相部嚴加警備以當其前臣麾下雖少輒盡力命自井陘以北隘口以西分防險要攻其肘腋葛榮雖并洛周威恩未著人類差異形勢可分魏書爾朱榮傳葛榮吞洛周凶勢轉盛榮上書遂嚴勒部曲北捍馬邑東塞井陘上書乞追贈河陰死者臣世荷蕃寄征討纍年奉忠王室志存效死直以太后淫亂孝明暴崩遂率義兵扶立社稷陛下登祚之始人情未安大兵交際難可齊一諸王朝貴橫死者衆臣今粉軀不足塞往責以謝亡者然追榮褒德謂之不朽乞降天慈微申私責無上王請追尊帝號諸王刺史乞贈三司其位班三品請贈令僕五品之官各贈方伯六品已下及白民贈以鎮郡諸死者無後聽繼即授封爵均其高下節級別科使恩洽存亡有慰生死魏書爾朱榮傳上言置行臺中正將統參佐人數不足事須在道更僕以充其員竊見比來行臺采募者皆得權立中正在軍定第斟酌授官今求兼置權濟軍要若立第亦爽關京之日任有司裁奪魏書爾朱榮附傳又北史四十八為匿名書自榜其門天子與侍中楊侃黃門高道穆等為計欲殺天柱北史四十八求鑄三銖錢表蓋錢貨之立本以通有無便交易故錢之輕重世代不同太公為周置九府圜法至景王時更鑄大錢秦兼海內錢重半兩漢輿以秦錢重改鑄榆莢錢至文帝五年復為四銖孝武時悉復銷壞更鑄三銖至元狩中變為五銖又造赤仄之錢以一當五王莽攝政錢有六等大錢重十二銖次九銖次七銖次五銖次三銖次一銖魏文帝罷五銖錢至明帝復立孫權江左鑄大錢一當五百權赤烏年復鑄大錢一當千輕重大小莫不隨時而變竊以食貨之要八政為首聚財之貴詒訓典文是以昔之帝王乘天地之饒御海內之富莫不腐紅粟于太倉藏朽貫于泉府儲蓄既盈民無困敝可以寧謐四極如身使臂者矣昔漢之孝武地廣財豐外事四戎遂虛國用于是草萊之臣出財助國興利之計納稅廟堂市列榷酒之官邑有告緡之令鑒鐵既興錢幣屢改少府遂豐上林饒積外闢百蠻內不增賦者皆計利之由也今群妖未息四郊多壘徵稅既煩千金日費資儲漸耗財用將竭誠楊氏獻稅之秋桑兒言利之日夫以西京之盛錢猶屢改並行小大子母相權況今寇難未除州郡淪敗民物凋零軍國用少別鑄小錢可以富益何揖于政何妨于人也且政興不以錢大政衰不以錢小惟貴公私得所政化無虧既行之于古亦宜效之于今矣昔禹遭大水以歷山之金鑄錢救民之困湯遭天旱以莊山之金鑄錢贖民之賣子者今百姓窮悴甚于曩日欽明之主豈得垂拱而觀之哉臣今此鑄以濟交乏五銖之錢任使並用行之無損國得其益穆公之言于斯驗矣臣雖術愧計然識非心算暫充錢官頗覩其理苟有所益不得不言脫以為疑求下公卿博議如謂為允即乞施行魏書高謙之傳又見通典九乞復舊制京令得面陳得失疏臣以無庸謬宰神邑實思奉法不撓稱是官方酬朝廷無資之恩盡人臣守器之節但豪家支屬戚里親媾縲緤所及舉目多是皆有盜僧之色咸起怨上之心縣令輕弱何能克濟先帝昔發明詔得使面陳所懷臣亡父先臣崇之為洛陽令常得入奏是非所以朝貴斂手無敢干政近日以來此制遂寢致使神宰威輕下情不達今二聖遠遵堯舜憲章高祖愚臣望策其駑蹇少立功名乞新舊典更明往制度姦豪知禁頗自屏心魏書高謙之傳孝昌中除河陰令舊制二縣令得面陳得失時佞幸之輩惡其有所發聞遂共奏罷謙之乃上疏陳時務疏臣聞夏德中微少康成克復之主周道將廢宣王立中興之功則知國無常安世無恆敝惟在明主所以變之有方化之有道耳自正光已來邊城屢擾命將出師相繼于路軍費戎資委輸不絶至如弓格賞募咸有出身槊刺斬首又蒙階級故四方壯士願征者多各各為己公私兩利若使軍帥必得其人賞勳不失其實則何賊不平何征不捷也諸守帥或非其才多遣親者妄稱入募別倩他人引弓格虛受征官身不赴陳惟遣奴客充數而已對寇臨敵曾不彎弓則是王爵虛加征夫多闕賊虜何可殄除忠貞何以勸誡也且近習侍臣戚屬朝士請託官曹擅作威福如有清貞奉法不為回者咸共譖毀橫受罪罰在朝顧望誰肯申聞蔽上擁下虧風壞政使讒諂甘心忠讜息義況且頻年以來多有徵發民不堪命動致流離苟保妻子競逃王役不復顧其桑井憚此刑書正由還有必困之理歸無自安之路若聽歸其本業徭役微甄則還者必衆墾田增闢數年之後大獲課民今不務以理還之但欲嚴符切勒恐數年之後走者更多安業無幾故有國有家者不患民不我歸唯患政之不立不恃敵不我攻惟恃吾不可侮此乃千載共遵百王一致且琴瑟不韻知音改絃更張騑驂未調善御執轡成組諺云迷而知反得道不遠此言雖小可以諭大陛下一日萬機事難周覽元凱結舌莫肯明言臣雖庸短世受榮祿竊慕前賢匪躬之義不避斧鉞之誅以希一言之益伏願少垂覽察略加推采使朝章重舉軍威更振海內起惟新之歌天下見復禹之績則臣奏之後笑人下泉魏書高謙之傳涼書述釋氏之化聞其風而悅之義生天地之外詞出耳目之表斯獎教之洪致九流之一家而好之既深則其術亦高而圖寺極壯窮海陸之財造者弗吝金碧殫生民之力豈大覺之意乎然至敬無文至神不飾未能盡天下之牲故祭天以繭栗未能極天下之文故藉神以稟秸苟有其誠則蘋藻侔于百品明德匪馨則烹牛下于礿祭而況鷲山之術彼岸之奇而可以虛求乎乃有浮遊都鄙避苦逃劇原其誠心百裁一焉既朱紫一亂城社狐鼠穢大法之精華損農蠶之要務執契者不以為患當衡者不以為言有國者宜鑒而節之廣弘明集七請鑄永安五銖錢表四民之業錢貨為本救斃改鑄王政所筅自頃以來私鑄薄濫官司糾繩挂網非一在市絧價八十一文得銅一斤私造薄錢斤踰二百既示之以深利又隨之以重刑罹罪者雖多姦鑄者彌衆今錢徒有五銖之文而無二銖之實薄甚榆莢上貫便破置之水上殆欲不沈此乃因循有漸科防不切朝廷之愆彼復何罪昔漢文帝以五分錢小改鑄四銖至武帝復改三銖為半兩此皆以大易小以重代輕也諭今據古宜改鑄大錢文載年號以記其始則一斤所成止七十六文銅價至賤五十有餘其中人功食料錫炭鉛沙縱復私營不能自潤直置無利自應息心況復嚴刑廣設也以臣測之必當錢貨永通公私獲允魏書高恭之傳又見通典九請復置司直疏臣聞舜命皋陶姦宄是託禹泣辜人堯心為念所以舉直錯枉事切曩賢明德慎罰議存先典高祖太和之初置廷尉司直論刑辟是非雖事非古始交濟時要所謂禮樂互興不相沿襲者矣臣以無庸忝當今任所思報效未忘寢興但識謝知今業慚稽古未能進一言以利國説一策以興邦索米長安豈不知愧至于職司其憂猶望僶俯竊見御史出使悉受風聞雖時獲罪人亦無枉濫何者得堯之罰不能不怨守令為政容有愛憎姦猾之徒恆思報惡多有妄造無名共相誣謗御史一經檢究恥于不成杖木之下以虛為實無罪不能自雪者豈可勝道哉臣雖愚短守不假器繡衣所指冀以清肅若仍踵前失或傷善人則尸祿之責無所逃罪所以夙夜為憂思有悛革如臣鄙見請依太和故事還置可直十人名隸廷尉秩臣五品選歷官有稱心平性正者為之御史若出糾劾即移廷尉令知人數廷尉遣司直與御史俱發所到州郡分居別館御史檢了移付司直覆問事訖與御史俱還中尉彈聞廷尉科案一如舊式庶使獄成罪定無復稽寬為惡取敗不得稱枉若御史司直糾劾失實悉依所斷獄罪之聽以所檢迭相糾發如二使何曲有不盡理聽罪家詣門下通訴別加案檢如此則肺石之傍怨訟可息叢棘之下受罪吞聲者矣魏書高恭之傳奏記御史中尉元匡道穆生自蓬簷長于陋巷頗獵群書者無純碩之德尚好章詠乏雕掞之工雖欲廁影髦徒班名俊伍其可得哉然凝明獨斷之主雄才不世之君無藉朽株之資求人屠釣之下不牽暗投之誚取士商歌之中是以聞英風而慷慨望雲路而低佪者天下皆是也若得身隸繡衣名充直指雖謝周生騎上之敏實有茅氏就鑊之心魏書高恭之傳造像記大魏孝昌二年歲次丙午正月辛丑朔草四日甲子滎陽太守元寧仰為二聖敬造石像一塸願主上萬祚臣僚盡忠後宮皆潤願天下太平四方慕義又願亡考生天安養國土上下延壽兄弟眷屬含靈有識蠢動衆生普同斯福鬼龍山嶽靡不慈仁所願如是碑拓本復行臺楊津書今與諸人密議欲殺普賢願公聽之又賊欲圍城正為取北人耳城中所有北人必須盡殺公若置之恐縱敵為患矣願公察之魏書楊播附傳楊津為北道行臺與賊帥元洪業及與賊中督將尉靈根程殺鬼潘法顯等書曉諭之并授鐵劵許以爵位令圖賊帥毛普賢洪業等感悟復書臨終與宇文大冢手書勝萬里杖策歸身闕庭冀望與公掃除逋寇不幸殞斃微志不申願公內先協和順時而動若死而有知猶望魂飛賊庭以報恩遇耳周書賀拔勝傳臨終遺誡其子升明等昔人以窾木為櫝葛纍為緘下不亂泉上不泄臭實吾平生之志也但事既矯枉恐為世士所譏今可斂以時服葬于磽確之地勿用明器芻塗及儀衛等爾其念哉北史七十上文帝疏論史官古者人君立史官非但記事而已蓋所以為監誡也動則左史書之言則右史書之彰善疸惡以樹風聲故南史抗節表崔杼之罪董狐書法明趙盾之愆是知直筆于朝其來久矣而漢魏已還密為記注徒聞後世無益當時非所謂將順其美匡救其惡者也且著述之人密書其事縱能直筆人莫之知何止物生橫議亦自異端互起故班固致受金之名陳壽有求米之論著漢魏者非一氏造晉史者至數家後代紛紜莫知準的伏惟陛下則天稽古勞心庶政開誹謗之路納忠讜之言諸史官記事者請皆當朝顯言其狀然後付之史閣庶令是非明著得失無隱使聞善者日修有過者知懼敢以愚管輕冒上聞乞以瞽言訪之衆議周書柳虯傳北史柳虯傳文苑英華六百九十書簡廢帝文皇帝之嗣子年七歲文皇帝託于安定公曰是子才由于公不才亦由于公宜勉之公既受茲重寄居元輔之任又納女為皇后遂不能訓誨有成致令廢黜負文皇帝付屬之意此咎非安定公而誰周書文帝紀下魏文帝崩皇太子嗣位三年太祖與公卿定議廢帝尊立齊王廓是為恭帝元年帝大饗群臣魏史柳虯執簡書于朝
