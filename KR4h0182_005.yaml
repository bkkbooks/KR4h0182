body:
  text: 卷五孝文帝立崇虛寺詔夫至道無形虛象為主自有漢以後置立壇祠先朝以其至順可歸用立寺宇昔京城之內居舍尚希今者里宅櫛比人神猥湊非所以祗崇至法清敬神道可移干都南桑乾之陰嶽山之陽永置其所給戶五十以供齊祀之用仍名為崇虛寺可召諸州隱士員滿九十人魏書釋老志令郡國送時果詔郡國有時果可薦者並送京師以供廟饗魏書禮志一罷幕中設五帝座詔禮云自外至者無主不立先朝以來以正月吉日于朝廷設幕中置松柏樹設五帝座此既無可祖配揆之古典實無所取可去此祀又探策之祭既非禮典可悉罷之魏書禮志一減省群祀詔國家自先朝以來饗祀諸神凡有一千二百餘處今欲減省群祀務從簡約昔漢高之初所祀衆神及寢廟不少今日至于元成之際匡衡執論乃得減省後至光武之世禮儀始備饗祀有序凡祭不欲數數則黷黷則不敬神聰明正直不待煩祀也魏書禮志一敕雍州借祭馮誕廟詔明堂太廟並祀祖宗配祭配享于斯備矣白登崞山雞鳴山廟唯遣有司行事馮宣王誕生先后復因在官長安立廟宜異常等可敕雍州以時供祭魏書禮志一罷祀水火等神詔先恆有水火之神四十餘名及城北星神今圓丘之下既祭風伯雨師司中司命明堂祭門戶并竈中霤每神皆有此四十神計不須立悉可罷之魏書禮志一又通典五十五議朝日夕月詔近論朝日夕月皆欲以二分之日于東西郊行禮然月有餘閏行無常準今若一以分日或值月出于東而行禮于西尋情即理不可施行昔曹魏祕書監辥靖等嘗論此事以為朝日取月一日為朔夕月三日為朏朔者月形始著卿等意謂朏朔二分何者為是魏書禮志一又通典四十四祥日不卜詔便及此期覽以摧絶敬祭卜祥乃古之成典但世失其義筮曰永吉既乖敬事之志又違永慕之心今將屈禮厲衆不訪龜兆已企及此晦寧敢重違册旨以異群議尋惟永往言增崩裂魏書禮志三有司上言求卜祥日高祖詔遷主大廟詔具聞所奏尋惟平日倍增痛絶今遵述先旨營建寢廟既而粗就先王制禮職司有分移廟之日遷奉神主皆太尉之事朕亦親自行事不得越局專委大姓王諶所司惟贊板而已時運流速奄及縞制復不得哀哭于明堂後當親拜山陵寫泄哀慕魏書禮志三太尉丕奏高祖詔五品詔王爵非庶姓所僭伯號是五等常秩烈祖之胄仍本王爵其餘王皆為公公轉為侯侯即為伯子男如舊雖名異于本而品不異昔公第一品侯第二品伯第三品子第四品男第五品南齊書魏虜傳罷小歲賀詔季冬朝賀典無成文以褲褶事非禮敬之謂若置寒朝服徒成煩濁自今罷小歲賀歲初一賀南齊書魏虜傳考課詔二千石考在上上者假四品將軍賜乘黃馬一匹上中者五品將軍上下者賜衣一襲魏書孝文紀下為高麗王槤舉哀詔高麗王槤守藩東隅纍朝貢職年喻期頤勤德彌著今既不幸其赴使垂至將為之舉哀而古者同姓哭廟異姓隨其方皆有服制今既久廢不可卒為之衰且欲素委貌白布深衣于城東為盡一哀以見其使也朕雖不嘗識此人甚悼惜之有司可申敕備辦事如別儀魏書禮志三是歲高麗王槤死簡置樂官詔樂者所以動天地感神祇調陰陽通人鬼故能關山川之風以播德于無外由此言之治用大矣逮乎末俗陵遲正聲頓廢多好鄭衛之音以悅耳目故使樂章散缺伶官失守今方釐革時弊稽古復禮庶令樂正雅頌各得其宜今置樂官實須任職不得仍令濫吹也魏書樂志答元丕請立東宮詔年尚幼小有何急之魏書宗室元丕傳召見李安祖兄弟四人詔卿之先世內外有犯得罪于時然官必用才以親非興邦之選外氏之寵超于末葉從今已後自非奇才不得復外戚謬班抽舉既無殊能今且可還魏書李惠附傳詔南平王霄自今奏事諸臣相稱可云姓名惟南平王一人可直言其封魏書廣平王連附傳祭用孟月詔夫四時享祀人子常道然祭薦之禮貴賤不同故有邑之君祭以首時無田之士薦以仲月況七廟之重而用中節者哉自頃蒸嘗之禮頗違舊義今將仰遵遠式以此孟月犆礿于太廟但朝典初改衆務殷湊無遑齋潔遂及于今又接神饗祖必須擇日今禮律未宣有司或不知此可敕太常令剋日以聞魏書禮志一又通典四十九營改太極殿詔昔軒皇誕御垂棟宇之構爰歷三代興宮觀之式然茅茨土階昭德于上代層臺廣廈崇威于中葉良由文質異宜華朴殊禮故也是以周成繼業營明堂于東都漢祖聿興建未央于咸鎬蓋所以尊嚴皇威崇重帝德豈好奢惡儉苟敝民力者哉我皇運統天協纂乾曆鋭意四方未遑建制宮室之度頗為未允太祖初基雖粗有經式自茲厥後復多營改至于三元慶饗萬國充庭觀光之使具瞻有闕朕以寡德猥承洪緒運屬休期事鍾昌運宜遵遠度式茲宮宇指訓規模事昭于平日明堂太廟已成于昔年又因往歲之豐資藉民情之安逸將以今春營改正殿違犯時令行之惕然但朔土多寒事殊南夏自非裁度當春興役徂暑則廣制崇基莫由克就成功立事非委賢莫可改制規模非任能莫濟尚書沖器懷淵博經度明遠可領將作大匠司空長樂公亮可與大匠共監興繕其去故崇新之宜修復太極之制朕當別加指授魏書李沖傳祀先代諸聖詔夫崇聖祀德遠代之通典秩中古之近規故三五至仁唯德配享夏殷私已稍用其姓且法施于民祀有明典立功垂惠祭有恆式斯乃異代同途奕世共軌今遠遵明令憲章舊則比于祀令已為決之其孟春應祀者頃以事殷遂及今日可令仍以仲月而饗祀焉凡在祀令者其數有五帝堯樹則天之功興巍巍之治可祀于平陽虞舜播太平之風致無為之化可祀于廣寧夏禹禦洪水之姦建天下之利可祀于安邑周文公制禮作樂垂範萬葉可祀于洛陽其宣尼之廟祀于中省當別敕有司行事饗薦之禮自文公已上可令當界牧守各隨所近攝行祀事皆用清酌尹祭也魏書禮志一又通典五十三躬臨千畝詔剋吉亥備小駕躬臨千畝官別有敕魏書禮志一令高閭與大樂詳采古今音律詔禮樂之道自古所先故聖王作樂以和中制禮以防外然音聲之用其致遠矣所以通感人神移風易俗至乃簫韶九奏鳳皇來儀擊石拊石百獸率舞有周之季斯道崩缺故夫子忘味于聞韶正樂于返魯逮漢魏之間樂章復闕然博采音韻粗有篇條自魏室之興太祖之世尊崇古式舊典無墜但干戈仍用文教未淳故令司樂失治定之雅音習不典之繁曲比太樂奏其職司求與中書參議攬其所請愧感兼懷然心喪在躬未忍關此但禮樂事大乃為化之本自非通博之才莫能措意中書監高閭器識詳富志量明允每聞陳奏樂典頗體音律可令與太樂詳采古今以備茲典其內外有堪此用者任其參議也魏書樂志答尉元換兵戍彭城詔公之所陳甚合事機魏書尉元傳檢察農民詔務農重穀王政所先勸率田疇君人常事今四氣休序時澤滂潤宜用天分地悉力東畝然京師之民遊食者衆不加督勸或藝耨失時可遣明使撿察勤惰以聞魏書孝文紀下選舉詔王者設官分職垂拱責成振網舉綱衆目斯理朕德謝知人豈能一見覽識徒乖為君委授之義自今選舉每以季月本曹與吏部銓簡魏書孝文紀下許尉元致仕詔元年尊識遠屢表告退朕以公秉德清挹體懷平隱仁雅淵廣謀猷是仗方委之以政用康億兆故頻文纍札仍違沖志而謙光逾固三請彌切若不屈從高謨復何以成其美德也已許其致仕主者可出表付外如禮申遂魏書尉元傳以尉元遊明根為三老五更詔夫天道凝虛至德沖挹故尹王法玄猷以御世聖人崇謙光而降美是以天子父事三老兄事五更所以明孝悌于萬國垂教本于天下自非道高識博孰能處之是故五帝憲德三王乞言若求備一人同之古哲叔世之老孰能克堪師上聖則難為其舉傳中庸則易為其選朕既虛寡德謝曩哲更老之選差可有之前司徒山陽郡開國公尉元前大鴻臚卿新泰伯遊明根並元享利貞明允誠素少著英風老敷雅迹位顯台宿歸終私第可謂知始知卒希世之賢也公以八十之年宜處三老之重卿以七十之齡可充五更之選魏書尉元傳給三老五更俸祿詔夫尊老尚更列聖同致欽年敬德綿哲齊軌朕雖道謝玄風識昧睿則仰稟先誨企遵猷旨故推老以德立更以元父焉斯彰兄焉斯顯矣前司徒公元前鴻臚卿明根並以沖德懸車懿量歸老故尊老以三事更以五雖更老非官耄耋罔祿然況事既高宜加殊養三老可給上公之祿五更可食元卿之俸供食之味亦同其例魏書尉元傳講武詔文武之道自古並行威福之施必稽往籍故三五至仁尚有征伐之事夏殷明睿未捨兵甲之行然則天下雖平忘戰者殆不教民戰可謂棄之是以周立司馬之官漢置將軍之職皆所以輔文強武威肅四迫者矣國家雖崇文以懷九服修武以寧八荒然于習武之方猶為未盡今則訓文有典教武闕然將于馬射之前先行講武之式可敕有司豫修場埒其列陳之儀五戎之數別俟後敕魏書孝文紀下省白登廟祀詔夫先王制禮所以經綸萬代貽法後昆至乃郊天享祖莫不配祭然而有節白登廟者有為而興昭穆不次故太祖有三層之宇巴陵無方丈之室又常用季秋躬駕展虔祀禮或有褻慢之失嘉樂頗涉野合之譏今授衣之旦享祭明堂玄冬之始奉蒸太廟若復致齋白登便為一月再駕事成褻瀆回詳二埋謂宜省一白登之高未若九室之美幃次之華未如清廟之盛將欲廢彼東山之祀成此二享之敬司具敕有司但令內典神者攝行祭事獻明道武各有廟稱可具依舊式自太宗諸帝昔無殿宇因停之魏書禮志一又通典四十七聽遊明根致仕詔明根風度清幹志尚貞敏溫恭靜密乞言是寄故抑其高蹈之操至于再三表請殷勤不容違奪便已許其告辨可出前後表付外依禮施行魏書遊明根傳諡鄭羲詔蓋棺定諡先典成式激揚清濁治道明範故何曾幼孝良史不改繆醜之名賈充寵晉直士猶立荒公之稱羲雖宿有文業而治闕廉清稽古之效未光于朝策昧貨之談已形于民聽諡以善問殊乖其衷又前歲之選匪由備行充舉自荷後任勳績未昭尚書何乃情遺至公愆違明典依諡法博文多見曰文不勤成名曰靈可贈以本官加諡文靈魏書鄭羲傳元會優賜邊蕃詔夫駿奔入覲臣下之常式錫馬賜車君人之恆惠今諸邊君蕃胤皆虔集象魏趨蹡紫庭貢饗既畢言旋無遠各可依秩賜車旗衣馬務令優厚其武興宕昌各賜錦繒纊一千吐谷世子八百鄧至世子雖因緣至都亦宜賚及可賜三百命數之差皆依別牒魏書孝文紀下報盧淵議親伐江南詔至德雖一樹功多塗三聖殊文五帝異律或張或弛豈必相因遠惟承平之主所以不親旆五戎者蓋有由矣英明之主或以同軌無征守庸之君或緣志劣寢伐今若喻之英皇時非昔類比之庸后意有恧焉脫元極之尊本不宜駕二公之徒革輅之戎寧非謬歟尋夫昔口若必須己而濟世豈不克廣先業也定火之雄未聞不武世祖之行匪皆疑懾且曹操勝袁蓋由德義內舉苻堅瓦解當緣立政未至定非敝卒之力強十萬之衆寡也今則驅馳先天之術駕用仁義之師審觀成敗庶免斯咎長江之阻未足可憚踰紀之略何必可師洞庭彭蠡竟非殷固奮臂一呼或成漢業經略之義當付之臨機足食之籌望寄之蕭相將希混一豈好輕動利見之事何得委人也又水旱之運未必由兵堯湯之難詎因興旅頗豐之後雖靜有之關左小紛已敕禁勒流言之細曷足以紓天功深録誠心勿恨不相遂耳魏書盧玄附傳行職員令詔六職備于周經九列炳于漢晉務必有恆人守其職比百秩雖陳事典未敘自八元樹位窮加省覽遠依往籍近采時宜作職員令二十一卷事迫戎期未善周悉雖不足綱範萬度永垂不朽且可釋滯目前釐整時務須待軍回更論所闕權可付外施行其有當局所疑而令文不載者隨事以聞當更附之魏書孝文紀下起陸睿為征北將軍詔睿猶執私痛致違往旨金革方馳何宜曲遂也加領衛尉可重敕有司速令敦喻魏書陸俟附傳睿以母憂解尚書令高祖將南伐起授征北將軍固辭高祖詔詔太尉元丕廣陵王元羽留守非賢莫可太尉年尊德重位總阿衡羽朕之懿弟溫柔明斷故使二人留守京邑授以二節賞罰在手其祗允成憲以稱朕心魏書宗室元丕傳車駕南伐丕與廣陵王羽留守京師並加使持節詔丕羽賜諡尉元詔元至行寬純仁風美富內秉越群之武外挺溫懿之容自少暨長勳勤備至歷奉五朝美隆四葉南曜河淮之功北光燕然之效魯宋懷仁中鉉載德所謂立身備于本末行道著于終始勳書王牒惠結民志者也爰及五福攸集懸車歸老謙損既彰遠近流詠陟茲父事儀我萬方謂極眉壽彌贊王業天不遺老奄爾薨逝念功惟善抽怛于懷但戎事致奪恨不盡禮耳可賜布泉綵物二千匹溫明祕器朝衣一襲並為營造墳域諡曰景桓公以彰殊禮給羽葆鼓吹假黃鉞班劍四十人賜帛一千匹魏書尉元傳詔崔休北海年少未間政績百揆之務便以相委魏書崔休傳高祖南伐以北海王詳為尚書僕射統留臺事以休為尚書左丞高祖詔休停宮人從駕詔臨戎不語內事宜停來請魏書孝文紀下車駕南伐步騎百餘萬太尉丕奏請以宮人從詔云云詔辛琛委卿郡事如太守也魏書辛雄附傳雄族祖琛為榮陽郡丞高祖南征太守元麗從輿駕詔琛云云原三盜詔大司馬執憲誠應如是但因緣于朕聞王者之體亦時有非常之澤雖違軍法可特原之魏書安定王休傳車駕南伐領大司馬以三盜人徇于六軍將斬之有詔赦之休執請行刑詔云云以高道悅為主爵下大夫詔道悅資性忠篤稟操貞亮居法樹平肅之規處諫著必犯之節王公憚其風鯾朕實嘉其一至謇諤之誠何愧黯鮑也其以為主爵下大夫諫議如故魏書高道悅傳退師詔皇師雷舉搖旆南指誓清江祲志廓衡靄以去月下旬濟次河洛會前使人邢巒等至審知彼有大艾以春秋之義聞喪寢伐爰敕有司輟鑾止軔休馬華陽戢戈嵩北便肇經周制光宅中區永皇基于無窮恢盛業乎萬祀宸居重正鴻化增新四海承休莫不銘慶故以往示如律令南齊書魏虜傳詔群官卿等或以朕無為移徙也昔平文皇帝棄背率土昭成營居盛樂太祖道武皇帝神武應天遷居平城朕雖虛寡幸屬勝殘之運故移宅中原肇成皇宇卿等掌奉先君令德光迹洪規北人比及十年使其徐移朕自多積倉儲不令窘乏魏書宗室元丕傳又見北史十五追詔高聰等比于河陽敕卿仍屈瀍洛周視舊業依然有懷固欲先之營之後乃薄伐且以頤喪甫爾使通在昔乘危幸凶君子弗取是用輟茲前圖遠圖來會爰息六師三川是宅將砥居成周永恢皇宇今更造璽書以代往詔比所敕授隨宜變之善勗皇華無替指意魏書高聰傳聰使于蕭昭業高祖定都洛陽追詔聰等賜遊明根穀帛詔遊五更光素蓬簷歸終衡里可謂朝之舊德國之老成可賜帛五百匹穀五百斛魏書遊明根傳車駕幸鄴明根朝于行宮詔詔答彭城王協蟬貂之美待汝而光人乏之秋何容方退也克念作聖庶必有資耳魏書彭城王協傳協表解侍中詔答詔任城王澄遷移之旨必須訪衆當遣任城馳馹向代問彼有司論擇可否近日論革今真所謂革也王其勉之魏書任城王雲附傳初置司州以元贊為刺史詔司州刺史官尊位重職總京畿選屬懿親以允具瞻之望但諸干年少末間政體故以授贊庶能助暉道化今司州始立郡縣初置公卿已下皆有本屬可人率子弟用相展敬北史十五秦王翰傳立僧尼制詔門下凝覺澄沖事超俗外揣摸莞頤理寄忘言然非言何以釋教非俗何能表真是三藏舒風必資戒典六度摛化固憑尸波自象教東流千齡以半秦漢俗革禁制彌密故前代英人隨宜興引時輕時重以闡玄奧先朝之日嘗為僧禁小有未詳宜其修立近見沙門統僧顯等自云欲更一刊定朕聊以淺識共詳正典事起忩忩觸未詳究且可設法一時粗救俗習須玄白一同更釐厥喪初學記二十三
