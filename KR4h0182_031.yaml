body:
  text: 韓麒麟推用新附表齊土自屬僞方歷載久遠舊州府寮動有數百自皇威開被并職從省守宰闕任不聽土人監督竊惟新人未階朝宦州郡扃任甚少沈塞者多願言冠冕輕為去就愚謂守宰有闕宜推用豪望增置吏員廣延賢哲則華族蒙榮良才獲敘懷德安土庶或在茲魏書韓麒麟傳陳時務表古先哲王經國立治積儲九稔謂之太平故躬籍千畝以勵百姓用能衣食滋茂禮教興行逮于中代亦崇斯業入粟者與斬敵同爵力田者與孝悌均賞實百王之常軌為治之所先今京師民庶不田者多遊食之口三分居二蓋一夫不耕或受其飢況于今者動以萬計故頃年山東遭水而民有餒終今秋京都遇旱穀價踊貴實由農人不勸素無儲積故也伏惟陛下天縱欽明道高三五昧旦憂勤思恤民敝雖帝虞一日萬幾周文昃不暇食蔑以為喻上垂覆載之澤下有凍餒之人皆由有司不為明制長吏不恤其本自承平日久豐穰積年競相矜夸遂成侈俗車服第宅奢僭無限喪葬婚娶為費實多貴富之家童妾袨服工商之族玉食錦衣農夫餔糟糠蠶婦乏裋褐故令耕者日少田有荒蕪穀帛罄于府庫寶貨盈于市里衣食匱于室麗服溢于路飢寒之本實在于斯愚謂凡珍玩之物皆宜禁斷吉凶之禮備為格式令貴賤有別民歸朴素制天下男女計口受田宰司四時巡行臺使歲一按檢勤相勸課嚴加賞賜數年之中必有盈贍雖遇災凶免于流亡矣往年校比戶貫租賦輕少臣所統齊州租粟才可給俸略無入倉雖于民為利而不可長久脫有戎役或遭天災恐供給之方無所取濟可減絹布增益穀租年豐多積歲儉出賑所謂私民之穀寄積于官官有宿積則民無荒年矣魏書韓麒麟傳上書陳時務其一曰竊聞輿駕今夏若不巡三齊當幸中山竊以為非計也何者當今徭役宜早息洛京宜速成省費則徭役可𥳑并功則洛京易就往冬輿駕停鄴是閒隙之時猶編戶供奉勞費為劇聖鑒矜愍優旨殷勤爵浹高年賚周鰥寡雖賑普霑今猶恐來夏菜色況三農要時六軍雲會其所損業實為不少雖調斂輕省未足稱勞然大駕親臨誰敢寧息往來承奉紛紛道路田蠶暫廢則將來無資此國之深憂也且向炎暑而六軍暴露恐生厲疫此可憂之次也臣願輿駕早還北京以省諸州供帳之費并功專力以營洛邑則南州免雜徭之煩北都息分析之歎洛京可以時就遷者僉爾如歸其二曰自古聖帝必以儉約為美亂主必以奢侈貽患仰惟先朝皆卑宮室而致力于經略故能基宇開廣業祚隆泰今洛陽基址魏明帝所營取譏前代伏願陛下損之又損頃來北都富室競以第宅相尚今因遷徙宜申禁約令貴賤有檢無得踰制端廣衢路通利溝渠使寺署有別四民異居永垂百世不刊之範則天下幸甚矣其三曰竊聞輿駕還洛陽輕將數千騎臣甚為陛下不取也夫千金之子猶坐不垂堂況萬乘之尊富有四海乎警蹕于闈闥之內者豈以為儀容而已蓋以戒不虞也清道而後行尚恐銜蹶之或失況履涉山河而不加三思哉此愚臣之所以悚息伏願陛下少垂省察其四曰伏惟陛下耳聽法音目玩墳典口對百辟心虞萬幾晷昃而食夜分而寢加以孝思之至隨時而深文章之業日成篇卷雖睿明所用未足為煩然非所以嗇神養性頤無疆之祚莊周有言形有待而智無涯以有待之形役無涯之智殆矣此愚臣所不安伏願陛下垂拱司契委下責成唯冕旒垂纊而天下治矣魏書韓麒麟附傳既定遷都顯宗上書上言時務進賢求才百王之所先也前代取士必先正名故有賢良方正之稱今之州郡貢察徒有秀孝之名而無秀孝之實而朝廷但檢其門望不復彈坐如此則可令別貢門望以敘士人何假冒秀孝之名也夫門望者是其父祖之遺烈亦何益于皇家益于時者賢才而已苟有其才雖屠鈞奴虜之賤聖皇不恥以為臣苟非其才雖三后之胤自墜于皂隸矣是以大才受大官小才受小官各得其所以致雍熙議者或云今世等無奇才不若取士于門此亦失矣豈可以世無周邵便廢宰相而不置哉但當校其有寸長銖重者即先敘之則賢才無遺矣魏書韓麒麟附傳又見通典十六御覽六百二十八夫帝皇所以居尊以御下者威也兆庶所以徙惡以從善者法也是以有國有家必以刑法為治生民之命于是而在有罪必罰罰必當辜則雖箠撻之刑而人莫敢犯也有制不行人得僥幸則雖參夷之誅不足以肅自太和以來多坐盜棄市而遠近肅清由此言之止姦在于防檢不在嚴刑也今州郡牧守邀當時之名行一切之法臺閣百官亦咸以深酷為無私以仁恕為容盜迭相敦厲遂成風俗陛下居九重之內視人如赤子百司分萬務之要遇下如仇讎是則堯舜止一人而桀紂以千百和氣不至蓋由于此書曰與其殺不辜寧失不經實宜敕示百寮以惠元元之命昔周王為犬戎所逐東遷河洛鎬京猶稱宗周以存本也光武雖曰中興實自創革西京尚置京尹亦不廢舊今陛下光隆先業遷宅中土稽古復禮于斯為盛豈若周漢出于不得已哉案春秋之義有宗廟曰都無則謂之邑此不刊之典也況北代宗廟在焉山陵託焉王業所基聖躬所載其為神鄉福也實亦遠矣今便同之郡國臣竊不安愚謂代京宜建畿置尹一如故事崇本重舊以光萬葉伏見洛京之制居民以官位相從不依族類然官位非常有朝榮而夕悴則衣冠淪于廝豎之邑臧獲騰于膏腴之里物之顛倒或至于斯古之聖王必使四民異居者欲其業定而志專業定則不僞志專則不淫故耳目所習不督而就父兄之教不肅而成仰惟太祖道武皇帝創基撥亂日不假給然猶分別士庶不令雜居伎作屠沽各有攸處但不設科禁賣買任情販貴易賤錯居混雜假令一處彈箏吹笛緩舞長歌一處嚴師苦訓誦詩講禮宣令童齔任意所從其走赴舞堂者萬數往就學館者無一此則伎作不可雜居士人不宜異處之明驗也故孔父云里仁之美孟母弘三徒之訓賢聖明誨若此之重今令伎作家習士人風禮則百年難成令士人兒童效伎作容態則一朝可得是以士人同處則禮教易興伎作雜居則風俗難改朝廷每選舉人士則校其一婚一宦以為升降何其密也至于開伎作宦途得與膏粱華望接閈連甍何其略也此愚臣之所惑今稽古建極光宅中區凡所徙居皆是公地分別伎作在于一言有何為疑而闕盛美自南僞相承竊有淮北欲擅中華之稱且以招誘邊民故僑置中州郡縣自皇風南被仍而不改凡有重名其數甚衆疑惑書記錯亂區宇非所以疆域物土必也正名之謂也愚以為可依地理舊名一皆釐革小者并合大者分置及中州郡縣昔以戶少并省今人口既多亦不可復舊君人者以天下為家不得有所私也故倉庫儲貯以俟水旱之災供軍國之用至于有功德者然後加賜爰及末代乃寵之所隆賜賚無限自比以來亦為太過在朝諸貴受祿不輕土木被錦綺童妾厭粱肉而復厚賚屢加動以千計若分賜鰥寡贍濟實多如不悛革豈周急不繼富之謂也愚謂事有可賞則明旨褒揚稱事君賜以勸為善不可以親近之昵猥損天府之儲諸宿衛內直者宜令武官習弓矢文官諷書傳無令繕其蒱博之具以成褻狎之容長矜爭之心恣喧囂之慢徒損朝儀無益事實如此之類一宜禁止魏書韓麒麟附傳北史四十伏闕上書理清河王懌竊惟故主太傅清河王職綜樞衡位居論道盡忠貞以奉公竭心膂以事國自先皇崩殂陛下沖幼負扆當朝義同分陝宋維反常小子性若青蠅汙白點黑讒佞是務以元叉皇姨之壻權勢攸歸遂相附託規求榮利共結圖謀坐生眉眼誣告國王枉以大逆賴明明在上赫赫臨下泥漬自消玉質還潔謹案律文諸告事不實以其罪罪之維遂無罪出為大郡刑賞僭差朝野怪愕若非宋維與叉為計豈得全其身命方撫千里王以權在寵家塵謗紛雜恭慎之心逾深逾厲去其本宅移住殿西闔門靜守親賓阻絶于時吏部咨稟劉騰奏其弟官郡戍兼補及經內呈為王駮退騰由此生嫌私深怨怒遂乃擅廢太后離隔二宮栲闕一字胡定誣王行毒令齒戴髮莫不悲惋及會公卿議王之罪莫不俯眉飲氣唯咨是從僕射游肇亢言厲氣發慎成疾為王致死王之忠誠款篤節義純貞非但蘊藏胸襟實乃形于文翰搜括史傳撰顯忠録區目十篇分卷二十既欲彰忠心于萬代豈可為逆亂于一朝乞追遺志足明丹款叉籍寵姻戚恃握兵馬無君之心實懷皂白擅廢太后枉害國王生殺之柄不由陛下賞罰之詔一出于叉名藩重地皆其親黨京官要任必其心腹中山王熙本興義兵不圖神器戮其大逆合門滅盡遂令元略南奔為國巨患奚康生國之猛將盡忠棄市其餘枉被屠戮者不可稱數緣此普天喪氣匝地憤傷致使朔隴猖狂歷歲為亂荊徐蠢動職是之由昔趙高秉秦令關東鼎沸今元叉執權使四方雲擾自古及今竹帛所載賊子亂臣莫此為甚開逆之始起自宋維成禍之未良由騰矣而令凶徒姦黨迭相樹置高官厚祿任情自取非但臣等痛恨終身抑為聖朝懷慚負愧以臣赤心慺慺之見宜梟諸兩觀汙其舍廬騰合斫棺斬骸沈其五族上謝天人幽隔之憤下報忠臣冤酷之痛方乃崇亞三事委以樞端所謂虎也更傅其翼朝野切齒遐邇扼腕蔓草難除去之宜盡臣歷觀曠代緬追振古當斷不斷其禍更生況叉猜忍更居衡要臣中宵九歎竊以寒心實願宸鑒早為之所臣等潛伏閭閻于茲六載旦號白日夕泣星辰叩地寂寥呼天無響衛野納肝秦庭夜哭千古之痛何足相比今幸遇陛下睿聖親覽萬幾太后仁明更撫四海臣等敢詣闕披陳乞報冤毒靈太后反政子熙與懌中大夫劉定興學官令傅靈摽賓客張子慎伏闕上書清河國臣為君母服議謹案喪服大功章云公之庶昆弟為其母妻傳曰何以大功先君餘尊之所厭不敢過大功也夫以一國之費子猶見厭況四海之尊固無申理頃國王遭太妃憂議者援引斯條降王之服尋究義例頗有一途但公之庶昆弟或為士或為大夫士之卑賤不得仰匹親王正以餘厭共同可以奪情相擬然士非列土無臣從服今王有臣復不得一準諸士矣議者仍令國臣從服以朞嚚昧所見未曉高趣案不杖章云為君之父母妻長子祖父母傳曰父母長子君服斬妻則小君父卒然後為祖後者服斬傳所以深釋父卒為祖服斬者蓋恐君為祖朞臣亦同朞也明臣之後朞由君服斬若由君服斬然後朞則君服大功安得亦朞也若依公之庶昆弟不云有臣從朞若依為君之父母則出應申三年此之二章殊不相干引彼則須去此引此則須去彼終不得兩服功朞渾雜一圖也議者見餘尊之厭不得過大功則令王依庶昆弟見不杖章有為君之父母便令臣從服以朞此乃據殘文守一隅恐非先聖之情達禮之喪矣且從服之體自有倫貫雖秩微閽寺位卑室老未有君服細絰裁踰三時臣著疏衰獨涉兩歲案禮天子諸侯之大臣唯服君之父母妻長子祖父母其餘不服也唯近臣閽寺隨君而服耳若大夫之室老君之所服無所不從而降一等此三條是從服之通旨較然之明例雖近臣之賤不過隨君之服未有君輕而臣服重者也議者云禮有從輕而重臣之從君義包于此愚謂服問所云有從輕而重公子之妻為其皇姑直是禮記之異獨此一條耳何以知其然案服問經云有從輕而重公子之妻為其皇姑而大傳云從服有六其六曰有從輕而重注曰公子之妻為其皇姑若從輕而重不獨公子之妻者則鄭君宜更見流輩廣論所及不應還用服問之文以釋大傳之義明從輕而重唯公子之妻臣之從君不得包于此矣若復有君為母大功臣從服朞當云有從輕而重公子之妻為其皇姑為母大功臣從服朞何為不備書兩條以杜將來之惑而偏著一事彌結今日之疑且臣為君母乃是徒從徒從之體君亡則已妻為皇姑既非徒從雖公子早沒可得不制服乎為君之父母妻子君已除喪而後聞喪則不稅蓋以恩輕不能追服假令妻在遠方姑沒遙域過朞而後聞喪復可不稅服乎若姑亡必不關公子有否聞喪則稅不計日月遠近者則與臣之從君聊自不同矣又案臣服君黨不過五人悉是三年其餘不服妻服夫黨可直五人乎朞功以降可得無服乎臣妻事殊邈然胡越苟欲引之恐非通例也愚謂臣有合離三諫待決妻無去就一醮終身親義既有參差喪服固宜不等故見厭之婦可得申其本服君屈大功不可過從以朞所以從麻而齊專屬公子之妻隨輕而重何關從服之臣尋理求途儻或在此必以臣妻相準未覩其津也子熙誠不能遠探墳籍曲論長智請以情理校其得失君遭母憂臣創之痛臣之為服從君之義如何君至九月便蕭然而即吉臣猶朞年仍衰哭于君第創巨而反輕從義而反重緣之人情豈曰是哉侍中崔光學洞今古達禮之宗頃探幽立義申三年之服雖經典無文前儒未辨然推例求旨理亦難奪若臣服從朞宜依侍中之論脫君仍九月不得如議者之談耳嬴氏焚坑禮經殘缺故今追訪靡據臨事多惑愚謂律無正條須準傍以定罪禮缺舊文定準類以作憲禮有朞同緦功而服如齊疏者蓋以在心實輕于義乃重故也今欲一依喪服不可從君九月而服周年如欲降一等兄弟之服不可以服君母詳諸二途以取折衷謂宜麻布可如齊衰除限則同小功所以然者重其衰麻尊君母蹙其日月隨君降如此衰麻猶重不奪君母之嚴日月隨降可塞從輕之責矣魏書禮志四延昌三年清河王懌所生母羅太妃薨表求申齊衰三年詔禮官博議侍中崔光議君厭降大功國臣服朞博士封偉伯等議以為國臣宜小功清河國郎中令韓子熙議云云
