body:
  text: 卷五十六闕名上前廢帝勸進表否泰沿時殷憂啓聖故六飛任御三石興符伏惟陛下運屬千齡智周萬物獨昭繫象妙極天人寶曆有歸光宅攸屬而將安獨善不務兼濟靈命徘徊幽明載佇伏願時順謳謠念慈宗祏用捨勞疾允答人神魏書前廢帝紀長廣王曄建明二年三月至邙南爾朱世隆奉廣陵王東門之外行禪讓之禮群臣上表云云上太武帝書苑囿過度民無田業乞減大半以賜貧人魏書古弼傳太武時上谷民上書為太武帝讓沮渠牧犍書王外從正朔內不捨僭罪一也民籍地圖不登公府任土作貢不入司農罪二也既荷王爵又受偽官取兩端之榮邀不二之寵罪三也知朝廷志在懷遠固違聖略切稅商胡以斷行旅罪四也揚言西戎高自驕大罪五也坐自封殖不欲入朝罪六也北託叛虜南引仇池憑援谷渾提挈為姦罪七也承敕過限輒假征鎮罪八也欣敵之全幸我之敗侮慢王人供不以禮罪九也既婚帝室寵踰功舊方恣欲情蒸淫其嫂罪十也既違伉儷之體不篤婚姻之義公行鴆毒規害公主罪十一也備防王人候守關要有如寇讎罪十二也為臣如是其可恕乎先令後誅王者之典也若親率群臣委贄郊迎遏拜馬首上策也六軍既臨面縛輿櫬又其次也如其守迷窮城不時悛悟身死族滅為世大戮宜思厥中自求多福也魏書沮渠牧犍傳世祖親征之詔公卿為書讓之上言賈相遇石人事晉昌民賈相昔年二十二為雁門郡吏入句注西陘見一老父謂相曰自今以後四十二年當有聖人出于北方時當大樂子孫永長吾不及見之言終而過相顧視之老父化為石人相今七十下檢石人見存魏書靈徵志下天興四年春新興太守上言上言大石文往曹氏之世丘池縣大柳谷山石表龍馬之形石馬脊文曰大討曹而晉氏代魏今石文記國家祖宗諱著受命之符乃遣使圖寫其文大石有五皆青質白章間成文字其二石記張呂之前已然之效其三石記國家祖宗以至于今其文記昭成皇帝諱繼世四六天法平天下大安凡十四字次記太祖道武皇帝諱應王載記千歲凡七字次記太宗明元皇帝諱長子二百二十年凡八字次記太平天王繼世主治凡八字次記皇太子諱昌封太山凡五字初上封太平王天文圖録又授太平真君之號與石文相應太宗名諱之後有一人象攜一小兒見者皆曰上愛皇孫提攜臥起不離左右此即上象靈契真天授也魏書靈徵志下真君五年二月張掖郡上言上言積穀請析州郡常調九分之二京都度支歲用之餘各立官司豐年糴貯于倉時儉則加私之一糶之于民如此民必力田以買絹積財以取粟官年登則常積歲凶則直給又別立農官取州郡戶十分之一以為屯民相水陸之宜斷頃畝之數以贓贖雜物市牛科給令其肆力一夫之田歲責六十斛甄其正課并征戍雜役行此二事數年之中則穀積而民定矣魏書食貨志太和十二年詔群臣求安民之術有司上言奏上太上皇帝尊號昔三皇之社淡泊無為故稱皇是以漢高祖既稱皇帝尊其父為太上皇明不統天下今皇帝幼沖萬機大政猶宜陛下總之謹上尊號太上皇帝魏書獻文帝紀皇興五年八月禪位太子于是群公奏奏尸異上谷郡比丘尼惠香在北山松樹下死尸形不壞爾來三年士女觀著有千百于時人皆異之魏書大和九年有司奏奏檢罷僧尼前被敕以勒籍之初愚民僥幸假稱入道以避輸課其無籍僧尼罷遣還俗重被旨所檢僧尼寺主維那當事隱密其有道行精勤者聽仍在道為行凡粗者有籍無籍悉罷歸齊民今依旨簡選其諸州還俗者僧尼合一千三百二十七人魏書太和十年有司奏云云奏可奏長孫慮乞代父死慮于父為孝子于弟為仁兄尋究情狀特可矜感魏書長孫慮傳慮列辭尚書乞代父命尚書奏高祖詔恕其父死罪奏處裴植死刑羊祉告植姑子皇甫仲達云受植旨詐稱被詔率合部曲欲圖領軍于忠臣等窮治辭不伏引然衆證明昞案律在邊合率部衆不滿百人以下身猶尚斬況仲達公然在京稱詔聚衆喧惑都邑駭動人情量其本意不可測度案詐律詐稱制者死今依衆證處仲達入死金紫光祿大夫尚書崇義縣開國侯裴植身居納言之任為禁司大臣仲達又稱其姓名募集人衆雖名仲達切讓無忿懼之心衆證雖不見植皆言仲達為植所使召仲達責問而不告列推論情狀不同之理不可分明不得同之常獄有所降減計同仲達處植死刑又植親率城衆附從主化依律上議唯恩裁處魏書裴叔業附傳兄子植為度支尚書會韋伯昕告植欲謀廢黜尚書又奏奏尼太后喪儀案舊事皇太后崩儀自復魂斂葬百官哭臨其禮甚多今尼太后既存委俗尊憑居道法凶事簡速不依配極之典寺庭局狹非容百官之位但昔經奉接義成君臣終始情禮理無廢絶輒準故式立儀如別內外群官權改常服單衣邪巾奉送至墓列位哭拜事訖而除止在京師更不宣下魏書禮志四神龜元年九月尼高皇太后崩于瑤光寺有司奏云云又見通典八十奏太后父依前詔稱太上張普惠辭雖不屈然非臣等所同渙汗已流請依前詔魏書張普惠傳靈太后父司徒胡國珍薨贈相國太上秦公普惠以前世后父無太上之號密表太后博議議者以太后當朝志相黨順遂奏奏請許崔光伯解職案禮始封之君不臣諸父昆弟封君之子臣昆弟不臣諸父封君之孫得盡臣計始封之君即是世繼之祖尚不得臣況今之刺史既非世繼而得行臣吏之節執笏稱名者乎檢光伯請解率禮不愆請宜許遂以明道教魏書崔亮附傳亮父弟光伯為青州別駕後以從弟休臨州遂申牒求解尚書奏靈太后令從之奏請優賚閻慶胤案慶胤自臨此郡惠政有聞又能自以己粟贍恤飢饉乃有子愛百姓之義如不少加優賚無以厲彼貪殘又案齊州東魏郡太守路雍在郡治能與之相埒語其分贍又亦不殊而聖旨優隆賜以衣馬求情即理謂合同賞魏書良吏閻慶胤傳有司奏靈太后卒無褒賞焉奏置齊獻武王陵官齊獻武王勳高德重禮絶群辟昔霍光陵邑亦置長丞主陵今請置長一人丞二人録事一人戶曹史一人禁備史一人侍一人皆降帝陵官品一等其侍依舊魏書官氏志武定二年十一月有司奏國號議昔周秦以前世居所生之士有國有家及王天下即承為號自漢以來罷侯置守時無世繼其應運而起者皆不由尺土之資今國家萬世相承啓基雲代臣等以為若取長遠應以代為號魏書道武紀天興元年六月丙子詔有司議定國號群臣曰白狼見太平郡議古今瑞應多矣然白狼見于成湯之世故殷道用興太平嘉名也又先帝本封之國而白狼見焉無窮之徵也周宣王得之而犬戎服魏書靈徵志下太安三年三月有白狼一見于太平郡議者日遣師援于闐議于闐去京師幾萬里蠕蠕之性惟習野掠不能攻城若為所拒當已旋矣雖欲遣師勢無所及魏書于闐傳顯祖末蠕蠕寇于闐于闐遣使素目伽上表求援顯祖詔公卿議之公卿奏議撰親祀七廟儀昔有虞親虔祖考來格殷宗躬謁介福逌降大魏七廟之祭依先朝舊事多不親謁今陛下孝誠發中思親祀事稽合古王禮之常典臣等謹案舊章并採漢魏故事撰祭服冠屨牲牢之具罍洗簠簋俎豆之器百官助祭位次樂官節奏之引升降進退之法別集為親拜之儀魏書禮志一太和六年十一月將親祀七廟詔有司依禮具儀于是群官議又見通典四十九王公五等爵有罪降本爵一等議官人若罪本除名以職當刑猶有餘資復降階而敘至于五等封爵除刑若盡永即甄削便同之除名于例實爽愚謂自王公以下有封邑罪除名三年之後宜各降本爵一等王及郡公降為縣公公為侯侯為伯伯為子子為男至于縣男則降為鄉男五等爵者亦依此而降至于散男其鄉男無可降授者三年之後聽依其本品之資出身魏書刑罰志延昌二年詔議律之制與八坐門下參議皆以為答諸儒問諸儒問云日月已過或父已亡獨聞喪當稅之不若宜稅稅何服答曰父卒而為祖後服斬與父在異者也通典九十人野王縣孔子廟記仲尼傷道不行欲北從趙鞅聞殺鳴鐸遂旋車而反及其後也晉人思之于太行嶺南為之立廟蓋往時回轅處也水經沁水注魏太和元年孔靈度等以舊宇毀落上求修復野王令范衆愛河內太守元真刺史咸陽公高允表聞立碑于廟治中劉明別駕呂次文王簿向班虎劉靈龜以宣尼大聖非碑頌所稱宜立記焉魯國孔氏官于洛陽因居廟下以奉蒸嘗同上邑主仇池楊大眼為孝文皇帝造象記夫靈光弗曜大千懷永夜之悲玄蹤不遘葉生唅靡導之懺是以如來應群緣以顯迹爰暨像遂著降及後王茲功厥作輔國將軍直閣將軍梁州大中正安戎縣開國子仇池楊大眼誕承龍曜之資遠踵應符之胤稟英奇于弱年挺超群于始冠其也垂仁聲于未聞揮光也摧百万于一掌震英勇則九宇咸駭存侍納則朝野必附𩇕王衢于三紛掃雲于天路南穢既澄震歸闕軍次行路徑石窟覽先皇之明蹤覩盛聖之麗迹矚目霄泫然流感遂為孝文皇帝造石像一區凡及衆形网不備列刊石記功示之云爾碑拓本巨鹿太守呂顯頌時惟府君剋己清明緝我荒土民胥樂生願壽無疆以享長齡魏書呂羅漢傳祖顯為慕容垂河間太守皇始初以郡來降拜巨鹿太守民頌之季洪演造像頌邑子季洪演夫靈光郁烈雖體洞埃塵然一乘運則十躔競發故釋迦出沒有其四也是以邑義等皆籍出蘭蕙秀貫煙霞悼純暉之日削悢重暗之年深遂相率捨爰圖嘉石于此爽塏營像一區庶踵万品等階十號頌曰湛矣澄源修哉寶觀息彼摸擬邁茲陳讚事等手足道猶花杆遠邇分津清濁交判有釋迥興體苞聖達淨樂蕭然常我無遏三徑是填五蓋修脫六度告離雙林顯末於穆邑義廣夏之梁爰樹瓊像房佛遺光功崇先祀福潤見方咸踵六吉永拔宿霜武定二年三月一日造訖碑拓本弩機銘正始二年二月卅日左尚方信帖作吏李貞亘待詔孟朝師左轉除待詔李昌師造拓本石門銘此門蓋漢永平中所穿將五百載世代綿迥屯夷遞作乍開乍閉通塞不恆自晉氏南遷斯路廢矣其崖岸崩淪澗閣堙褫門南北各數里車馬不通者久之攀蘿捫葛然後可至皇魏正始元年漢中獻地裒斜始開至于門北一里西上鑿山為道峭岨槃迂九折無以加經途巨礙行者苦之梁秦初附實仗才賢朝難其人褎蕳良牧三年詔假節龍驤將軍督梁秦諸軍事梁秦二州刺史泰山羊祉建旟嶓漾撫境綏邊蓋有叔子之風焉以天嶮難升轉輸難阻表求自迥車已降開創舊路釋嶺磴之勞就方軌之逸詔遣左校令賈三德領人共成其事三德巧思機發精解冥會雖元凱之梁河德衡之損躡未足偶其奇起四年十月十日訖永平二年正月畢功閣廣四丈路廣六丈皆填磎棧豁碎嶮梁及自迥車至谷口二百餘里連輈駢轡而進往哲所不工前賢所輟思莫不夷通焉王生履之可無臨深之歎葛氏若存幸息木牛之勞于是畜産鹽鐵之利紈錦罽毼之饒充仞川內四民富實百姓息肩壯矣自非思埒班爾籌等張蔡忠公玄私何能成其事哉乃作銘曰龍門斯鑿大禹所彰茲巖乃穴肇自漢皇導此中國以宣四方其功伊何既逸且康去深去阻匪閣匪梁西帶汧隴東控樊襄河山雖嶮惟德是強昔惟畿甸今則關疆永懷在人亡不逢殊績何用再光水眺悠皛林望幽長夕凝曉露晝含𥌓霜秋風夏起寒鳥春傷穹窿高閣有車轔轔威夷石道駟牡其駰千載絶軌百兩更新敢刊巖曲以紀鴻塵魏永平二年太歲己丑正月己卯朔卅日戊申梁秦典籤太原郡王遠書石師河南郡洛陽縣武阿仁鑿字案西壁文後漢永平中開石門今大魏改正始五年為永平元年餘功至二年正月訖手開復之年同曰永平今古同前極矣哉後之君子異世同聞焉碑拓本齊郡王祐造像銘夫玄宗沖邈迹遠于鹿關靈範崇虛理絶于埃境若不圖色相以表光儀尋聲教以陳妙軌將何以依希至象髣佛神功者哉持節督涇州諸軍事征虜將軍涇州刺史齊郡王祐體蔭宸儀天縱淑茂達成實之通途識真假之高韻精善惡二門明生滅之一理資祏有由歸道無礙于是依雲山之逸狀即林水之仙區啓神像于青山鏤禪形于玄石締慶想于幽津結嘉應于冥運乃作銘曰芒芒玄極眇眇幽宗靈風潛被神化冥通舟輿為本廣濟為功德由世重道以人鴻臨觀淨境絶塵封圖形泉石構至雲松福田有慶嘉應無躬熙平二年七月草日造碑拓本
