body:
  text: 道武帝定國號為魏詔昔朕遠祖總御幽都控制遐國雖踐王位未定九州逮于朕躬處百代之季天下分裂諸華之主民俗雖殊撫之在德故躬率六軍埽平中土凶逆蕩除遐邇率服宜仍先號以為魏焉布告天下咸知朕意魏書道武紀修建佛寺詔夫法佛之興其來遠矣濟益之功冥及存沒神蹤遺軌信可依憑其敕有司于京城建飾容範修整官舍令信向之徒有所居止魏書釋老志天命詔世俗謂漢高起于布衣而有天下此未達其故也夫劉承堯統曠世繼德有蛇龍之徵致雲彩之應五緯上聚天人俱協明革命之主大運所鍾不可以非望求也然狂狡之徒所以顛蹶而不已者誠惑于遂鹿之說而迷于天命也故有踵覆車之軌蹈釁逆之蹤毒甚者傾州郡害微者敗邑里至乃身死名頹殃及九族從亂隨流死而不悔豈不痛哉春秋之義大一統之美吳楚僭號久加誅絕君子賤其偽名比之塵垢自非繼聖載德天人合會帝王之業夫豈虛應歷觀古今不義而求非望者徒喪其保家之道而伏刀鋸之誅有國有家者誠能推廢興之有期審天命之不易察徵應之潛授杜競逐之邪言絕姦雄之僭肆思多福于止足則幾于神智矣如此則可以保榮祿于天年流餘慶于後世夫然故禍悖無緣而生甲兵何由而起凡厥來世勖哉戒之可不慎歟魏書道武紀官號詔上古之治尚德下名有任而無爵易治而事序故邪謀息而不起姦慝絕而不作周姬之末下陵上替以號自定以位制祿卿世其官大夫遂事陽德不畼議發家陪故釁由此起兵由此作秦漢之獘捨德崇侈能否混雜賢愚相亂庶官失序任非其人于是忠義之道寢廉恥之節廢退讓之風絕毀譽之議興莫不由乎貴尚名位而禍敗及之矣古置三公職大憂重故曰待罪宰相將委任責成非虛寵祿也而今世俗儉以台輔為榮貴企慕而求之夫此職司在人主之所任耳用之則重捨之則輕然則官無常名而任有定分是則所貴者至矣何取于鼎司之虛稱也夫桀紂之南面雖高而可薄姬旦之為下雖卑而可尊一官可以效智蓽門可以垂範苟以道德為實賢于覆餗蔀家矣故量力者令終而義全昧利者身陷而名滅利之與名毀譽之疵競道之與德神識之家寶是故道義治之本名爵治之末名不本于道不可以為宜爵無補于時不可以為用用而不禁為病深矣能通其變不失其正者其惟聖人乎來者誠思成敗之理察治亂之由鑒殷周之失革秦漢之獘則幾于治矣魏書道武紀與朗法師書皇帝敬問太山朗和尚承妙聖靈要須經略已命元戎上人德同海嶽神算遐長冀助威謀克寍荒服今遣使者送素二十端白氈五十領銀鉢二枚到願納受廣弘明集二十八上即位告祭天地祝文皇帝臣珪敢用玄牡昭告于皇天后士之靈上天降命乃眷我祖宗世王幽都珪以不德纂戎前緒思寍黎元龔行天罰殪劉顯屠衛辰平慕容定中夏群下勸進謂宜正位居尊以副天人之望珪以天時人謀不可久替謹命禮官擇吉日受皇帝璽綬惟神祇其丕祚于魏室永綏四方魏書禮志一詔賜王洛兒爵士處家必以孝敬為本在朝則以忠節為先不然何以立身于當世揚名于後代也散騎常侍王洛兒車路頭等服勤左右十有餘年忠謹恭肅久而彌至未嘗須臾之頃有廢替之心及在艱難人皆易志而洛兒等授命不移貞操踰懇雖漢之樊灌魏之許典無以加焉勤而不賞何以獎勸將來為臣之節其賜洛兒爵新息公加直意將軍魏書王洛兒傳簡出宮人詔衣食足知榮辱夫人飢寒切已惟恐朝夕不濟所急者溫飽而已何暇及于仁義之事乎王教之多違蓋由于此也非夫耕婦織內外相成何以家給人足矣其𥳑宮人非所當御及執作伎巧自餘悉出以配鰥民魏書明元紀貲調詔刺史守宰率多逋慢前後怠惰數加督罰猶不悛改今年貲調懸違者譴出家財充之不聽徵發于民魏書明元紀賑貧窮詔古人有百姓足則君有餘未有民富而國貧者也頃者以來頻遇霜旱年穀不登百姓飢寒不能自存者甚眾其出布帛倉穀以賑貧窮魏書明元紀遣使巡省詔九州之民隔遠京邑時有壅滯守宰至不以聞今東作方興或有貧窮失農務者其遣使者巡行天下省諸州觀民風俗問民疾苦察守宰治行諸有不能自申皆因以聞魏書明元紀贈諡司馬休之詔司馬休之率其同義萬里歸誠雅操不遂中年殞喪朕甚愍焉其追贈征西大將軍右光祿大夫諡始平聲公魏書司馬休之傳改諡宣武皇帝為道武詔宣武皇帝體道得一天縱自然大行大名未盡美非所以光揚洪烈垂之無窮也今因啟緯圖始覩尊號天人之意煥然著明其改宣曰道更上尊諡曰道武皇帝以彰露命之先啟聖德之玄同告祀郊廟宣于八表魏書明元紀詔有司先所知者皆軍國大事自今常宿于內魏書李先傳太宗召先讀韓子連珠二十二篇太公兵法十一事詔有司敕有司勸課前志有之人生在勤勤則不匱凡庶民之不畜者祭無牲不耕者祭無盛不樹者死無槨不蠶者衣無帛不續者喪無衰教行三農生殖九穀教行園囿毓長草木教行虞衡山澤作材教行藪牧養蕃鳥獸教行百工飭成器用教行商賈阜通貨賄教行嬪婦化治絲枲教行臣妾事勤力役魏書食貨志帝以饑𥳑尤貧者就食山東敕有司勸課留農者敕長孫嵩𥳑精兵為戰備若裕西過者便率精銳南出彭沛如不時過但引軍隨之彼庄崤陜閒必與姚泓相持一死一傷眾力疲敝比及秋月徐乃乘之則裕首可不戰而懸魏書長孫嵩傳鐵渾儀銘於皇大代配天比祚赫赫明明聲烈遐布爰造茲器攷正宿度貽法後葉永垂典故隋書天文志上明元永興四年壬子詔造大史候部鐵儀以為渾天法攷璇璣之正其銘曰云云報公卿議荅吐谷渾慕瑰制報公卿議荅吐谷渾慕瑰制公卿之議未為失體西秦王所收金城枹罕隴西之地彼自取之朕即與之便是裂土何須復廓西秦款至綿絹隨使疏數增益之非一匹而已魏書吐谷渾傳報樂安王範秦柳谷石文制此天地況施乃先祖父之遺徵豈朕一人所能獨致可如所奏魏書靈徵志下頒下新字詔在昔帝軒刱制造物乃命倉頡因鳥獸之跡以立文字自茲以降隨時改作故篆隸草楷竝行于世然經歷久遠傳習多失其真故令文體錯謬會義不愜非所以示軌則于來世也孔子曰名不正則事不成此之謂矣今制定文字世所用者頒下遠近永為楷式魏書太武紀上初造新字千餘詔誅賞詔夫士之為行在家必孝處朝必忠然後身榮于時名揚後世矣近遣尚書封鐵翦除亡命其所部將士有盡忠竭節以殞軀命者今皆追贈爵號或有蹈鋒履難以自效者以功次進位或有故違軍法私離幢校者以軍法行戮夫有功蒙賞有罪受誅國之常典不可暫廢自今以後不善者可以自改其宣敕內外咸使聞知魏書太武紀上聽鎮將王公開府辟召詔昔太祖撥亂制度草刱太宗因循未遑改作軍國官屬至乃闕然今諸征鎮將軍王公使節邊遠者聽開府辟召其次增置吏員魏書太武紀上徵盧玄崔綽等詔頃逆命縱逸方夏未寍戎車屢駕不遑休息今二寇摧殄士馬無為方將偃武修文遵太平之化理廢職舉逸民拔起幽窮延登雋乂昧旦思求想遇師輔雖殷宗之夢板築罔以加也訪諸有司咸稱范陽盧玄博陵崔綽趙郡李靈河閒邢穎渤海高允廣乎游雅太原張偉等皆賢儁之冑冠冕州邦有羽儀之用詩不云平鶴鳴九皋聲聞于天庶得其人任之政事共臻邕熙之美易曰我有好爵吾與爾縻之如玄之比隱跡衡門不耀名譽者盡敕州郡以禮發遣魏書太武紀上行慶賞詔朕以眇身獲奉宗廟思闡洪基廓清九服遭值季運天下分崩是用屢征罔或寍息自始光至今九年之閒戎車十舉群帥文武荷戈披甲櫛風沭雨蹈履鋒刃與朕均勞賴神祇之助將士宣力用能摧折彊豎克翦大憝兵不極武而二寇俱滅師不違律而遐方以寍加以時氣和洽嘉瑞竝降遍于郡國不可勝紀豈朕一人獨應此祜斯亦群后協同之所致也公卿因茲稽諸天人之會請建副貳夫慶賞之行所以襃崇勳舊旌顯賢能以永無疆之休其王公將軍以下普增爵秩啟國承家修廢官舉儁逸蠲除煩苛更定科制務從輕約除故革新以正一統群司當深思效績直道正身立功立事無或懈怠稱朕意焉魏書太武紀上禁州郡逼遣賢良詔朕除偽平暴征討累年思得英賢緝熙治道故詔州郡搜揚隱逸進舉賢俊古之君子養志衡門德成業就才為世使或雍容雅步三命而後至或棲棲遑遑負鼎而自達雖徇尚不同濟時一也諸召人皆當以禮申諭任其進退何逼遣之有也此刺史守宰宣揚失旨豈復光益乃所以彰朕不德自今以後各令鄉閭推舉守宰但宣朕虛心求賢之意既至當待以不次之舉隨才文武任之政事其明宣敕咸使聞知魏書太武紀上先是辟召賢良而州郡多逼遣之詔云云賜丘堆子爵詔堆國之肺腑勳著先朝西征喪師遂從軍法國除祀絕朕甚愍之可賜其子跋爵淮陵侯加安遠將軍魏書丘堆傳議來大千喪入城詔大千忠勇盡節功在可嘉今聽喪入殯城內魏書來大千傳寬徭賦詔朕承統之始群凶縱逸四方未賓所在逆僭蠕蠕陸梁于漠北鐵弗肆虐于三秦是以旰食忘寢抵掌扼腕期在埽清逋殘寍濟方寓故頻年屢征有事西北運輸之役百姓勤勞廢失農業遭離水旱致使生民貧富不均未得家給人足或有寒窮不能自贍者朕甚愍焉今四方順軌兵革漸寍宜寬徭賦與民休息其令州郡縣隱括貧富以為三級其富者租賦如常中者復二年下窮者復三年刺史守宰當務盡平當不得阿容以罔政治明相宣約咸使聞知魏書太武紀上襃于什門詔什門奉使和龍值狂豎肆虐勇志壯厲不為屈節雖昔蘇武何以加之賜羊干口帛千匹進為上大夫策告宗廟頒示天下咸使聞也魏書節義于什門傳什門太宗時為謁者使諭馮跋拘留二十四年至馮文通上表稱臣乃送什門歸拜治書侍御史世祖下詔禎瑞詔頃者寇逆消除方表漸晏思崇政化敷洪治道是以屢詔有司班宣恩惠綏理百揆群公卿士師尹牧守或未盡導揚之美致令陰陽失序和氣不平去春小旱東作不茂憂勤克己祈請靈祇上下咸秩豈朕精誠有感何報應之速雲雨震灑流澤霑渥有鄙婦人持方寸玉印詣潞縣侯孫家既而亡去莫知所在玉色鮮白光照內映印有三字為龍鳥之形要妙奇巧不類人迹文曰旱疫平推尋其理蓋神靈之報應也朕用嘉焉比者已來禎瑞仍臻所在甘露流液降于殿內嘉瓜合蔕生于中山野木連理殖于魏郡在先后載誕之鄉白鷰集于盛樂舊都玄鳥隨之蓋有千數嘉禾頻歲合秀于恆農白雉白兔竝見于渤海白雉三隻又集于平陽太祖之廟天降嘉貺將何德以酬之所以內省驚震欣懼交懷其令天下大酺五日禮報百神守宰祭界內名山大川上荅天意以求福祿魏書太武紀上攷課詔操持六柄王者所以統攝平政理訟公卿之所司存勸農平賦宰民之所專急盡力三時黔首之所克濟各修其分謂之有序今更不然何以為治越職侵局有紊綱紀上無定令民知何從自今以後亡匿避難羈旅他鄉皆當歸還舊居不問前罪民相殺害牧守依法平決不聽私輒報者誅及宗族鄰伍相助與同罪州郡縣不得妄遣吏卒煩擾民庶若有發調縣宰集鄉邑三老計貲定課裒多益寡九品混通不得縱富督貧避彊侵弱太守覆檢能否覈其殿最列言屬州刺史明攷優劣抑退姦吏升進貞良歲盡舉課上臺牧守荷治民之任當宣揚恩化奉順憲典與國同憂直道正身肅居官次不亦善乎魏書太武紀上令吏民得舉告守令詔方今寇逆消殄天下漸晏比年以來屢詔有司班宣惠政與民寍息而內外群官及牧守令長不能憂勤所司糾察非法廢公帶私更相隱置濁貨為官政存苟且夫法之不用自上犯上其令天下吏民得舉告守令不如法者魏書太武紀上西征涼州與太子晃詔姑臧城東西門外涌泉令于城北其大如河自餘溝渠流入澤中其閒乃無燥地澤草茂盛可供大軍數年人之多言亦可惡也故有此敕以釋汝疑魏書太武紀下附又見十六國春秋九十五命崔浩綜理史務詔昔皇祚之興世隆忠士積德累仁多歷年載澤流蒼生義聞四海我太祖道武皇帝協順天人以征不服應期撥亂奄有區夏太宗承統光隆前緒釐正刑典大業惟新然荒域之外猶未賓服此祖宗之遺志而貽功于後也朕以眇身獲奉宗廟戰戰兢兢如臨淵海懼不能負荷至重繼名丕烈故即位之初不遑寍處揚威朔裔埽定赫連逮于神麚始命史職注集前功以成一代之典自爾已來戎旗仍舉秦隴克定徐兗無塵平逋寇于龍川討孼豎于涼域豈朕一人獲濟于此賴宗廟之靈群公卿士宣力之效也而史闕其職篇籍不著每懼斯事之墜焉公德冠朝列言為世範小大之仕望君存之命公留臺綜理史務述成此書務從實錄焉魏書崔浩傳復民貲賦詔朕承天子民憂理萬國欲令百姓家給人足興于禮義而牧守令宰不能助朕宣揚恩德勤恤民隱至乃侵奪其產加以殘虐非所以為治也今復民貲賦三年其田租歲輪如常牧守之徒各厲精為治勸課農桑不得妄有徵發有司彈糾勿有所縱魏書太武紀下令皇太子總百揆詔朕承祖宗重光之緒思闡洪基恢隆萬世自經營天下平暴除逆埽清不順武功既昭而文教未闡非所以崇太平之治也今者域內安逸百姓富昌軍國異容宜定制度為萬世之法夫陰陽有往復四時有代序授子任賢安全相附所以休息疲勞式固長久成其祿福古今不易之典也諸朕功臣懃勞日久皆當致仕歸第雍容高爵頤神養壽朝請隨時饗宴朕前論道陳謀而已不須復親有司苦劇之職其令皇太子嗣理萬機總統百揆更舉賢良以備列職皆取後進明能廣啟選才之路擇人授任而黜陟之故孔子曰後生可畏焉知來者之不如今主者明為科制宣敕施行宋書索虜傳朕承祖宗重光之緒思闡洪基恢隆萬世自經營天下平暴除亂埽清不順二十年矣夫陰陽有往復四時有代謝授子任賢所以休息優隆功臣式圖長久蓋古今不易之令典也其令皇太子副理萬機總統百揆諸朕功臣勤勞日久皆當以爵歸第隨時朝請饗宴朕前論道陳謨而已不直復煩以劇職更舉賢俊以備百官主者明為科制以稱朕心魏書太武紀下下太子晃詔王者大業纂承為重儲宮嗣紹百王舊例自今己往事無巨細必經太子然後上聞南齊書魏虜傳禁容匿沙門師巫詔愚民無識信惑妖邪私養師巫挾藏讖記陰陽圖緯方伎之書又沙門之徒假西戎虛誕生致妖孼非所以壹齊政化布淳德于天下也自王公已下至于庶人有私養沙門師巫及金銀工巧之人在其家者皆遣詣官曹不得容匿限今年二月十五日過期不出師巫沙門身死主人門誅明相宣告咸使聞知魏書太武紀下又略見釋老志禁私立學校詔自頃以來軍國多事未宣文教非所以整齊風俗示軌則于天下也今制自王公以下至于卿士其子息皆詣太學其百工伎巧騶卒子息當習其父兄所業不聽私立學校違者師身死主人門誅魏書太武紀下賜張黎等布帛詔侍中廣平公黎東郡公浩等保傅東宮有老成之勤朕甚嘉焉其賜布帛各千匹以襃舊勳魏書張黎傳報刁雍詔卿憂國愛民知欲更引河水勸課大田宜便興立以克就為功何必限其日數也有可以便國利民者動靜以聞魏書刁雍傳滅佛法詔昔後漢荒君信惑邪偽妄假睡夢事胡妖鬼以亂天常自古九州之中無比也夸誕大言不本人情叔季之世闇君亂主莫不眩焉由是政教不行禮義大壞鬼道熾盛視王者之法蔑如也自此以來代經亂禍天罰亟行生民死盡五服之內鞠為丘虛千里蕭條不見人迹皆由于此朕承天緒屬當窮運之敝欲除偽定真復羲農之治其一切盪除胡神滅其蹤跡庶無謝于風氏矣自今以後敢有事胡神及造形像泥人銅人者門誅雖言胡神問今胡人共云無有皆是前世漢人無賴子弟劉元真呂伯彊之徒乞胡之誕言用老莊之虛假附而益之皆非真實至使王法廢而不行蓋大姦之魁也有非常之人然後能行非常之事非朕孰能去此歷代之偽物有司宣告征鎮諸軍刺史諸有佛圖形像及胡經盡皆擊破焚燒沙門無少長悉坑之魏書釋老志報刁雍詔知欲造船運穀一冬即成大省民力既不費牛又不費田甚喜非但一運自可永以為式今別下統萬鎮出兵以供運穀卿鎮可出百兵為船工豈可專廢千人雖遣船匠猶須卿指授未可專任也諸有益國利民如此者續復以聞魏書刁雍傳通典十詔刁雍卿深思遠慮憂勤盡思知城已周訖邊境無不虞之憂千載有永安之固朕甚嘉焉即名此城為刁公城以旌爾功也魏書刁雍傳增損律令詔夫刑網太密犯者更眾朕甚愍之有司其案律令務求厥中自餘有不便于民者依比增損魏書太武紀下又見刑罰志詔車伊洛歇年尚幼能固守城邑忠節顯著朕甚嘉之可遣歇詣闕魏書車伊洛傳先是伊洛征焉耆留子歇守城為沮渠天周所陷走奔伊洛世祖嘉之詔伊洛詔高車使者慕容坦卿遠據沙外頻申誠款覽揖忠志特所欽嘉蠕蠕咽噠與吐谷渾所以交通者皆路由高昌國掎角相接今高昌內附遣使迎引蠕蠕既與吐谷渾往來路絕姦勢亦沮于卿彼蕃便有所益行途經由宜相供俟不得妄令群小敢有陵犯擁塞王人罪在不赦魏書高車國傳詔使者慕容坦賜彌俄突雜綵六十匹世祖詔又見通典一百九十七敕諸尚書凡軍國大計卿等所不能決皆先諮浩然後施行魏書崔浩傳賜諡景穆太子冊嗚呼惟爾誕資明叡岐嶷夙成正位少陽克荷基構賓于四門百揆時敘允釐庶績風雨不迷宜享無疆隆我皇祚如何不幸奄焉殂殞朕用悲慟于厥心今使使持節兼太尉張黎兼司徒竇瑾奉策即柩賜諡曰景穆以顯昭令德魂而有靈其尚嘉之魏書太武紀下附賜王慧龍璽書義隆畏將軍如虎欲相中害朕自知之風塵之言想不足介意也魏書王慧龍傳又北史三十五賜崔浩書萬度歸以五千騎經萬餘里拔焉耆三城獲其珍奇異物及諸委積不可勝數自古帝王雖云即序西戎有如指注不能控引也朕今手把而有之如何魏書焉耆國傳世祖幸陰山北宮萬度歸破焉耆露板至世祖省訖賜可徒崔浩書與臧質書吾今所遣鬭兵盡非我國人城東北是丁零與胡南是三秦氐羌設使丁零死者正可減常山趙郡賊胡死正減并州賊氐羌死正減關中賊卿若殺丁零胡無不利宋書臧質傳與宋主書彼前使閒諜詃略姦人竊聞朱修之申謨近復得胡崇之敗軍之將國有常刑乃皆用為方州虞我之隙以自慰慶得我普鍾蔡一豎子何所損益無異得我舉國之民厚加奉養禽我卑將衛拔非其身各便鎖腰苦役以辱之觀此所行足知彼之大趣辨校以來非一朝一夕也頃關中蓋吳反逆煽動隴右氐羌彼復使人就而誘勸之丈夫遺以弓矢婦人遺以環釧是曹正欲譎誑取賂豈有遠相順從為大丈夫之法何不自來取之而以貨詃引誘我邊民募往者復除七年是賞姦人也我今來至此土所得多少孰與彼前後得我民戶邪彼今若欲保全社稷存劉氏血食者當割江以北輸之攝守南度如此釋江南使彼居之不然可善敕方鎮剌史守宰嚴供張之具來秋當往取揚州大勢已至終不相縱頃者往索真珠璫略不相與今所馘截髑髏可當幾許珠璫也彼往日北通芮芮西結赫連蒙遜吐谷渾東連馮弘高麗凡此數國我皆滅之以此而觀彼豈能獨立芮芮吳提已死其子菟害真襲其凶迹以今年二月復死我今北征先除有足之寇彼若不從命來秋當復往取以彼無足故不先致討諸方已定不復相釋我往之日彼作何方計為塹城自守為築垣以自障也彼土小雨水便迫掖彼能水中射我也我顯然往取揚州否彼翳行竊步也彼來偵諜我已禽之放還其人目所盡見委曲善問之彼前使裴方明取仇池既得疾其勇功不能容有臣如此尚殺之烏得與我校邪彼非敵也彼常願欲共我一過交戰我亦不癡復不是苻堅何時與彼交戰晝則遣騎圍繞夜則離彼百里宿去彼人民好降我者驅來不好者盡刺殺之近有穀米我都噉盡彼軍復欲食噉何物能過十日邪彼吳人正有所營伎我亦知彼情離彼百里止宿雖彼軍三里安邏使首尾相次募人裁五十里天自明去此募人頭何得不輸我也彼謂我攻城日當掘塹圍守欲出來斫營我亦不近城圍彼止築隄引水灌城取之彼揚州城南北門有兩江水此二水引用自可如人意也知彼公時舊臣都已殺盡彼臣若在年幾雖老猶有智策今已殺盡豈不天資我也取彼亦須我兵刃此有能祝婆羅門使鬼縛彼送來也宋書索虜傳燾雖不克懸瓠而擄掠甚多南師屢無功為燾所輕侮與太祖書又與宋主書彼此和好居民連接為日已久而彼無厭誘我邊民其有往者復之七年去春南巡因省我民即使驅還自天地啟闢已來爭天下者非唯我二人而已今聞彼自來設能至中山及桑乾川隨意而行來亦不迎去亦不送若厭其區宇者可來平城居我往揚州住且可博其土地傖人謂換易為博彼年已五十未嘗出戶雖自力而來如三歲嬰兒復何知我鮮卑常馬背中領上生活更無餘物可以相與今送獵白鹿馬十二匹井氈藥等物彼來馬力不足可乘之道里來遠或不服水土藥自可療宋書索虜傳此後復來通和聞太祖有北伐意又與書
