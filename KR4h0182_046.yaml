body:
  text: 辛雄明賞罰疏凡人所以臨堅陳而亡身觸白刃而不憚者一則求榮名二則貪重賞三則畏刑罰囡則避禍難非此數事雖聖王不能勸其臣慈父不能厲其子明主深知其情故賞必行罰必信使親疏貴賤勇怯賢愚聞鍾鼓之聲見旌旗之列莫不奮激競赴敵場豈厭久生而樂早死也利害懸于前欲罷不能耳自秦隴逆節將歷數年蠻左亂常稍已多載凡在戎役數十萬人三方師衆敗多勝少迹其所由不明賞罰故也陛下欲天下之早平愍征夫之勤悴乃降明詔賞不移時然兵將之勳歷稔不決亡軍之卒晏然在家致令節士無所勸慕庸人無所畏懾進而繫賊死交而賞賒退而逃散身全而無罪此其所以望敵奔沮不肯進力者矣若重發明詔更量賞罰則軍威必張賊難可弭臣聞必不得已去食就信以此推之信不可斯須廢也賞罰陛下之所易尚不能全而行之攻敵士之所難欲其必死寧可得也臣既庸弱忝當戎使職司所見輒敢上聞惟陛下審其可否魏書辛雄傳選舉疏帝王之道莫尚于安民安民之本莫加于禮律禮律既設擇賢而行之天下雍熙無非任賢之功也故虞舜之盛穆穆摽美文王受命濟濟以康高祖孝文皇帝天縱大聖開復典謨選三代之異禮采二漢之典法端拱而四方安刑措而兆民治世宗重光繼軌每念聿修官人有道萬里清謐陛下劬勞日昃躬親庶政求瘼恤民無時暫憩而黔首紛然兵車不息以臣愚見可得而言自神龜末來專以停年為選士無善惡歲久先敘職無劇易名到授官執案之吏以差次日月為功能銓衡之人以間用老舊為平直且庸劣之人莫不貪鄙委斗筲以共治之重託碩鼠以百里之命皆貨賄是求肆心縱意禁制雖煩不勝其欲致令徭役不均發調違謬箕斂盈門囚執滿道二聖明詔寢而不遵畫一之法懸而不用自此夷夏之民相將為亂豈有餘憾哉蓋由官授不得其人百姓不堪其命故也當今天下黔黎久經寇賊父死兄亡子弟淪陷流離艱危十室而九白骨不收弧煢靡恤財殫力盡無以卒歲宜及此時早加慰撫蓋助陛下治天下者惟在守令最須簡置以康國道但郡縣選舉由來共輕貴遊俊才莫肯居此宜改其斃以定官方請上等郡縣為第一清中等為第二清下等為第三清選補之法妙盡才望如不可並後地先才不得拘以停年竟無銓革三載黜陟有稱者補在京名官如前代故事不歷郡縣不得為內職則人思自勉上下同心枉屈可申強暴自息刑政日平民俗奉化矣復何憂干不治何恤于逆徒也竊見今之守令清慎奉治則政平訟理有非其才綱維荒穢伏願陛下暫留天心校其利害則臣言可驗不待終朝昔杜畿寬惠河東無警蘇則分糧金城剋復略觀今古風俗遷訛罔不任賢以相化革朝任夕治功可立待若遵常習故不明選典欲以靜民便恐無日魏書辛雄傳通典十四上書論祿養仲尼陳五孝自天子至庶人無致仕之文禮記八十一子不從政九十家不從政鄭玄注云復除之然則止復庶民非公卿大夫士之謂以為宜聽祿養不約其年魏書辛雄傳又為祿養論稱云云書奏肅宗納之奏理元匡竊惟白衣元匡歷奉三朝每蒙寵遇謇諤之性簡自帝心鷹鸇之志形于在昔故高祖錫之以匡名陛下任之以彈糾至若茹皓升輦匡斥宜下之言高肇當政匡陳擅權之表剛毅忠款群臣莫及骨鯁之迹朝野共知當高肇之時匡造棺致諫主聖臣直卒以無咎假欲重造先帝已容之于前陛下亦宜寬之于後況其玄列由緒與罪案不同也脫終貶黜不在朝廷恐杜忠臣之口塞諫者之心乖琴瑟之至和違鹽梅之相濟祁奚云叔向之賢可及十世而匡不免其身實可嗟惜魏書卒雄傳御史中尉東平王元匡復欲輿棺諫諍尚書令任城王澄劾匡大不敬詔恕死為民雄奏理匡獄成訴枉宜復斷理議春秋之義不幸而失寧僭不濫僭則失罪人濫乃害善人今議者不忍罪姦吏使出入縱情令君子小人薰蕕不別豈所謂賞善罰惡殷勤隱恤者也仰尋周公不減流言之愆俯惟釋之不加驚馬之辟所以大小用情貴在得所失之千里差在毫釐雄久執案牘數見疑訟職掌三千願言者六一曰御史所糾有注其逃走者及其出訴或為公使本曹給過所有指如不推檢文案灼然者雪之二曰御史赦前注獲見贓不辨行賕主名檢無賂以置直之主宜應洗復三曰經拷不引傍無三證比以獄案既成至即除削或有據令奏復者與奪不同未獲為通例又須定何如得為證人若必須三人對見受財然後成證則于理太寬若傳聞即為證則于理太急今請以行賕後三人俱見物及證狀顯著準以為驗四曰赦前斷事或引律乖錯使除復失衷雖案成經赦宜追從律五曰經赦除名之後或邀駕訴枉被旨重究或訴省稱冤為奏更檢事付有司未被研判遂遇恩宥如此之徒謂不得異于常格依前案為定若不合拷究已復之流請不追奪六曰或受辭下檢反覆使鞠獄證占分明理合清雪未及告案忽逢恩赦若從證占而雪則違正格如除其名罪濫潔士以為罪須案成雪以占定若拷未畢格及要證一人不集者不得為占定古人雖患察獄之不精未聞知冤而不理今之所陳實士師之深疑朝夕之急務願垂察焉魏書辛雄傳初延尉少卿袁翻奏曾染風聞者不問曲直推為獄成悉不斷理詔令門下尚書廷尉議之雄議奉使慰勞關西啓六事臣聞王者愛民之道有六一曰利之二曰成之三曰生之四曰與之五曰樂之六曰喜之缺一句則利之也使民不失其時則成之也省刑罰則生之也薄賦斂則與之也無多徭役則樂之也吏靜不苛則喜欴也伏惟陛下道邁前王功超往代敷春風而鼓俗旌至德以調民生之養之正當茲日悅近來遠亦是今時臣既忝將命宣揚聖澤前件六事謂所宜行若不除煩收疾惠孤恤寡便是徒乘官驛虛號王人往還有費于郵亭皇恩無逮于民俗謹率愚管敢以陳聞乞垂覽許魏書辛雄傳莊帝反洛詔雄以本官兼侍中關西慰勞大使將發請事五條仍啓奏劾石榮抱老壽風聞前洛州刺史陰平子石榮積射將軍抱老壽恣蕩非軌易室而姦臊聲布于朝野醜音被于行路即攝鞫問皆與風聞無差犯禮傷化老壽等即主謹案石榮籍貫兵伍地隔宦流處世無入朝之期在生絶冠冕之望遭時之運逢非次之擢以犬馬延慈簪履恩念自微至貴位階方嶽不能懷恩感德上酬天施乃咎彰遐邇嚮穢京墟老壽種類無聞氏姓莫紀丏乞刑餘之家覆養閹人之室蒙國殊澤預班爵序正宜治家假內教誡閨庭方恣其淫姦換妻易妾榮前在洛州遠迎老壽妻常氏兵人千里疲于道路老壽同敝笱之在梁若其原之無別男女三人莫知誰子人理所未聞鳥獸之不若請以見事免官付廷尉理罪鴻臚削爵魏書抱疑傳奏劾元匡自金行失御群偽競興禮壞樂崩彝倫攸斁大魏應期奄有四海高祖孝文皇帝以睿聖統天克復舊典乃命故中書監高閭廣旌儒林推尋樂府依據六經參諸國志以黍裁寸將均周漢舊章屬雲構中遷尚未云就高祖睿思玄深參考經記以一黍之大用成分體準之為尺宣布施行暨正始中故太樂令公孫崇輒自立意以黍十二為寸別造尺度定律刊鍾皆向成訖表求觀試時敕太常卿臣芳以崇造既成請集朝英議其得否芳疑崇尺度與先朝不同察其作者于經史復異推造鮮據非所宜行時尚書令臣肇清河王懌等以崇造乖謬與周禮不同遂奏臣芳依周禮更造成訖量校從其善者而芳以先朝尺度事合古典乃依前詔書以黍刊寸並請朝廷用裁金石于時議者多云芳是唯黃門侍郎臣孫惠蔚與崇扶同二途參差頻經考議而尚書令臣肇以芳造崇物故之後而惠蔚亦造一尺仍云扶以比崇尺自相乖背量省二三謂芳為得而尚書臣匡表云劉孫二尺長短相傾稽考兩律所容殊異言取中黍校彼二家云並參差抑中無所自立一途請求議判當時議者或是于匡兩途舛駮未即時定肇又云權斛斗尺班行已久今者所論豈喻先旨宜仰依先朝故尺為定自爾以後而匡與肇厲言都座聲色相君高下失其常倫噂競無復彝序匡更表列據已十是云芳十非又云肇前被敕旨共芳營督規立鍾石之名希播製作之譽乃憑樞衡之尊藉舅氏之勢與奪任心臧否自已阿黨劉芳遏絶臣事望勢雷同者接以恩言依經案古者即被怒責雖未指鹿化馬移天徙日實使蘊藉之士聳氣坐端懷道之夫結舌筵次又言芳昔與崇競恆言自作今共臣論忽稱先朝豈不前謂可行輒欲自取後知錯謬便推先朝殊非大臣之體深失為下之義復考校勢臣之前量度偏頗之手臣必刖足內朝抱璞人外囂言肆意彰于朝野然匡職當出納獻替所在斗尺權度正是所司若已有所見能練臧否宜應首唱義端早辨諸惑何故默心隨從不關一言見芳成事方有此語計芳才學與匡殊懸所見淺深不應相匹今乃始發恐此由心借智于人規成虛譽況匡表云所據銅權形如古志明是漢作非莽別造及案權銘云黃帝始祖德布于虞虞帝始祖德布于新若莽佐漢時事寧有銘偽新之號哉又尋莽傳云莽居攝即變漢制度考校二證非漢權明矣復云芳之所造又短先朝之尺臣既比之權然相合更云芳尺與千金堰不同臣復量比因見其異二三浮濫難可據準又云共構虛端妄為疑似託以先朝云非已製臣案此欺詐乃在于匡不在于芳何以言之芳先被敕專造鍾律管籥優劣是其所裁權斛尺度本非其事比前門下索芳尺度而芳牒報云依先朝所頒新尺復應下黍更不增損為造鍾律調正分寸而已檢匡造時在牒後一歲芳于爾日匡未共爭已有此牒豈為詐也計崇造寸積黍十二群情共知而芳造寸唯止十黍亦俱見先朝詔書以黍成寸首尾歷然寧有輒欲自取之理肇任居端大右百寮是望言行動靜必副具瞻若恃權阿黨詐託先詔將指鹿化馬徙日移天即是魏之趙高何以宰物肇若無此匡既誣毀宰相訕謗明時豈應談議之間便有鹿之事可否之際輕生刖足之言趙高矯惑事屬衰秦卞和抱璞時遇暴楚何宜以濟濟之朝而有斯謗者哉阻惑朝聽不敬至甚請以肇匡並禁尚書推窮其原付廷尉定罪魏書廣平王洛侯附傳第五子匡與尚書令高肇不平後因與太常劉芳議爭權量遂與肇聲色御史中尉王顯奏匡云云詔曰可請乘機取義陽表臣聞機之所在聖賢弗之疑兼弱攻昧前王莫之捨皆拯群生于湯炭盛武功于方來然霜葉將淪非徑飆無以速其籜天之所棄非假手無以殲其人竊惟蕭衍常君臣交爭江外州鎮中分為兩東西抗峙已淹歲時民庶窮于轉輸甲兵疲于戰鬭事救于目前力盡于麾下無外維州鎮綱紀庶方藩城棊立孤存而已不乘機電掃廓彼蠻疆恐後之經略未易于此且壽春雖平三面仍梗鎮守之宜實須豫設義陽差近淮源利涉津要朝廷行師必由此道若江南一乎有事淮外須乘夏水泛長列舟長淮師赴壽春須從義陽之北便是居我喉要在慮彌深義陽之滅今實時矣度彼衆不過須精卒一萬二千然行師之法貴張形勢請使兩荊之衆西擬隨雍揚州之卒頓于建安得捍三關之援然後二豫之軍直據南關對抗延頭遣一都督總諸軍節度季冬進師迄于春未弗過十旬剋之必矣上表自理臣昔在南仰餐王化擁率部曲三千餘家棄彼邊榮歸投樂土兄弟荼炭釁結賊朝高祖孝文皇帝録臣乃誠授臣藩任方欲仰憑國威冀雪冤恥豈容背寵向讎就險危命昔郢豫紛擾臣躬率義兵擁絶賊路竊謂誠心仰簡朝野但任重據邊易招塵謗致使桃符橫加讒毀説臣恆欲投南暴亂非一乞檢事原以何為驗復云虐害番兵殺賣過半如其所言未審死失之家所訟有幾又云耗官粟帛倉庫傾盡御史覆檢曾無損折初代之日二子魯生魯賢從子超秀等並在城中安然無二而桃符密遣積射將軍鹿永固私將甲士打息魯生僅得存命唱云我被面敕若能得魯生魯賢首者各賞本郡士馬圍繞騰城唱殺二息戰怖實由于此殘害居業為生蕩然乃復毀發墳墓露泄枯骸存者罹生離之苦亡魂遭粉骨之痛昔歲朝廷頻遣桃符數加慰勞而桃符凶姦擅生禍福云雖我相申致降恩旨及返京師復欺朝廷説臣父子全無忠誠誣陷貞良惑亂朝聽乞攝桃符與臣並對若臣罪有狀分從憲網如桃符是謬坐宜有歸魏書田益宗傳奏請依舊考檢考以顯能陟由績著升明退暗于是乎在自百寮曠察四稔于茲請依舊式考檢能否魏書王肅傳奏增彭城王協邑戶臣等聞旌功表德道貫前王庸勳親親義高盛典是故姬旦翼周光宅曲阜東平宰漢寵絶列蕃彭城王協景思內昭英風外發協廓乾規掃氛漢沔屬先帝在天鳳旌旋旆靜一六師肅寧南服登聖皇于天衢開有魏之靈祐論道中鉉王猷以穆七德丕宣九功在詠臣等參詳宜增邑一千五百戶魏書彭城王協傳與故舊李神俊等書論盧義僖盧冠軍在此時復惠存輒留連數日得以咨詢政道魏書盧玄附傳又見北史三十刺稱羊祉諡景無虧體例案祉歷官纍朝當官允稱委捍西南邊隔靖遏準行易名獎誡攸在竊謂無虧體例魏書酷史羊祉傳元端等議諡日景侯剛等駮靈太后令重議元端如前議司徒右長史張烈主簿李瑒刺稱
