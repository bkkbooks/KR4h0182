body:
  text: 李彪表上封事七條臣聞昔之哲王莫不亹亹孜孜思納讜言以康黎庶是以訪童問師不避淵澤詢謀咨善不棄芻蕘用能光茂實于竹素播徽聲于金石臣屬生有道遇無諱之朝敢修往式竊揆時宜謹冒死上封事七條狂瞽之言伏待刑戮其一曰自太和建號踰于一紀典刑德政可得而言也立圓丘以昭孝則百神不乏饗矣舉賢才以酬咨則多士盈朝矣開至誠以軌物則朝無佞人矣敦六順以教人則四門無凶人矣制冠服以明秩則典式復彰矣作雅樂以協人倫則人神交慶矣深慎罰以明刑則庶獄得衷矣薄服味以示約則約德光昭矣單宮女以配鰥則人無怨曠矣傾府藏以賑錫則大賚周渥矣省賦役以育人則編戶巷歌矣宣德澤以懷遠邇則華荒舞矣垂至德以畼幽顯則禎瑞效質矣生生得所事事惟新巍巍乎猶造物之曲成也然臣愚以為行儉之道猶自闕何者今四人豪富之家習華既深敦朴情淺夫識儉素之易長而行奢靡之難久壯制第宅美飾車馬僕妾衣綾綺土木被文繡僭度違衷者衆矣古先哲王之為制也自天子以至公卿下及抱關擊柝其宮室車服各有差品小不得踰大賤不得踰貴夫然故上下序而人志定今時浮華相競情無常守大為消功之物巨制費力之事豈不謬哉消功者錦繡雕文是也費力者廣宅高宇壯制麗飾是也其妨男業害女工者焉可勝言哉漢文時賈誼上疏云今之王政可為常太息者六此即是其一也夫上之所好下必從之故越王好勇而土多輕死楚靈好瘠而國有飢人今二聖躬行儉素詔令殷勤而百姓之奢猶未革者豈楚越之人易變如彼大魏之士難化如此蓋朝制弗宣人未見德使之然耳臣愚以為第宅車服自百官以至于庶人宜為其等制使貴不逼賤卑不僭高不可以稱其侈意用違經典今或者以為習俗日久不可卒革臣謹言古人革之之漸昔子産為政一年百姓歌之曰我有田疇子産伍之我有衣冠子産貯之孰殺子産吾其與之及三年乃改歌曰我有田疇子産殖之我有子弟子産誨之子産若死其誰繼之然則鄭人之智豈前昏而後明哉且從政者須漸受化者難頓故也今若為制以差品之始末之情魏士與鄭人同矣既同鄭人是為卒有善歌豈可憚其初怨而不為終善哉夫尚儉者開福之源好奢者起貧之兆然則儉約易以教行華靡難以財滿是以聖人留意焉賢人希準焉故夏禹卑宮室而惡衣服殷湯寢黃屋而乘輅輿此示儉于後王後王所宜觀其意而取折衷也孔子為魯司寇乘柴車而駕駑馬晏嬰為齊正卿冠濯冠而衣故裘此示儉于後臣後臣所宜識其情而消息之也前志云作法于涼其斃猶貪此言雖略有達治道臣之瞽言戃或可采比及三年可以有成有成則人務本人務本則奢費除奢費除則穀帛豐穀帛豐則人逸樂人逸樂則皇基固矣其二曰易稱主器者莫若長子傳曰太子奉冢嫡之粢盛然則祭亡主則宗廟無所饗冢嫡廢則神器無所傳聖賢知其如此故垂誥以為長世之法昔姬王得斯道也故恢崇儒術以訓世嫡世嫡于是乎習成懿德用大協于黎蒸是以世統生人載祀八百䢖嬴氏之君于秦也殆棄德政坑焚儒典弗以義方教厥冢子于是習成凶德肆虐以臨黔首是以享年不永二世而亡亡之與興其道在于師傅師傅之損益可得而言益者周公傅成王教以孝仁禮義逐去邪人不使見惡人選天下之端士孝悌博聞有道術者以為衛翼衛翼良成王正周道之所以長久也損者趙高傅胡亥教以刑戮斬劓及夷人族逐去正人不得見善士諂佞讒賊者為其左右左右邪胡亥僻秦祚之所以短促也夫皇天輔德者也豈私周而疏秦哉由所行之道殊故禍福之途異耳昔光武議為太子置傅以聞其群臣群臣望意皆言太子舅執金吾新陽侯陰就可博士張佚正色曰今立太子為陰氏乎為天下乎即為陰氏則陰侯可為天下則固宜用天下之賢才光武稱善曰置傅以正太子也今博士不難正朕況太子乎即拜佚為太子太傅漢明卒為賢主然則佚之傅漢明非乃生之漸也尚或有稱而況乃生訓之以正道其為益也固以大矣故禮曰太子生因舉以禮使士負之有司齊肅端冕見于南郊明冢嫡之重見乎天也過闕則下過廟則趣明孝敬之道也然古之太子自為赤子而教固以行矣此則遠世之鏡也高宗文成皇帝慨少時師不勤教嘗謂群臣曰朕始學之日年尚幼沖情未能專既臨萬機不遑溫習今而思之豈唯子咎抑亦師傅之不勤尚書李欣免冠而謝此則近日之可鑒也伏惟太皇太后翼贊高宗訓成顯祖使巍巍之功邈乎前王陛下幼蒙鞠誨聖敬日躋及儲宮誕育復親撫誥日省月課實勞神慮今誠宜準古立師傅以訓導太子訓導正則太子正太子正則皇家慶皇家慶則人幸甚矣其三曰臣聞國本黎元人資粒食是以昔之哲王莫不勤勸稼穡盈畜倉廩故堯湯水旱人無菜色者蓋由備之有漸積之有素暨于漢家以人食少乃設常平以給之魏氏以兵糧乏制屯田以供之用能不匱當時軍國取濟又記云國無三年之儲謂國非其國光武以一畝不實罪及牧守聖人之憂世重穀殷勤如彼明君之恤人勸農相切如此頃年山東饑去歲京師儉內外人庶出入就豐既廢營産疲而乃達又于國體實有虛損若先多積穀安而給之豈有驅督老弱糊口千里之外以今況古或可懼也臣以為宜析州郡常調九分之二京都度支歲用之餘各立官司年豐糴積于倉時儉則加私之二糶之于人如此民必力田以買官絹又務貯財以取官粟年登則常積歲凶則直給又別立農官取州郡戶十分之一以為屯人相水陸之宜料頃畝之數以贓贖雜物餘財市牛科給令其肆力一夫之田歲責六十斛蠲其正課并征戍雜役行此二事數年之中則積穀而人足雖災不為害臣又聞前代明主皆務懷遠人禮賢引滯故漢高過趙求樂毅之胄晉武廓定旌吳蜀之彥臣謂宜于河表七州人中擢其門才引令赴闕依中州官比隨能序之一可以廣聖朝均新舊之義二可以懷江漢歸有道之情其四曰昔帝舜命咎繇惟刑之恤周公誥成王勿誤于庶獄斯皆君臣相誡重刑之至也今二聖哀矜罪辜小大二情讞決之日多從降恕時不得已必垂惻隱雖前王之勤聽肆赦亦如斯而已至若行刑犯時愚臣竊所未安漢制舊斷獄報重常盡季冬至孝章時改盡十月以育三微後歲旱論者以一月斷獄陰氣微陽氣泄以故致旱事下公卿尚書陳寵議冬至陽氣始萌故十一月有射千藝荔之應周以為春十二月陽氣上通雉雊雞乳殷以為春十三月陽氣巳至蟄蟲皆震夏以為春三微成著以通三統三統之月斷獄流血是不稽天意也月令中冬之月身欲寧事欲靜以起隆怒不可謂寧以行大刑不可謂靜章帝善其言卒以十月斷今京都及四方斷獄報重常竟季冬不推三正以育三微寬宥之情每過于昔遵時之憲猶或闕然豈所謂助陽發生垂奉微之仁也誠宜遠稽周典近采漢制天下斷獄起自初秋盡于孟冬不于三統之春行斬絞之刑如此則道協幽顯仁垂後昆矣其五曰古者大臣有坐不廉而廢者不謂之不廉乃曰簠簋不飾此君之所禮貴臣不明言其過也臣有大譴則白冠氂纓盤水加劍造請室而請死此臣之所以知罪而不敢逃刑也聖朝賓遇大臣禮同古典自太和以降有負罪當陷大辟者多得歸第自盡遣之日深垂隱愍言發悽淚百官莫不見四海莫不聞誠足以感將死之心慰戚屬之情然恩發至衷未著永制此愚臣所以敢陳末見昔漢文時人有告丞相周勃謀反者逮繫長安獄頓辱之與皂隸同賈誼乃上書極陳君臣之義不宜如是夫貴臣者天子為其改容而禮貌之吏人為其俯伏而敬貴之其有罪過廢之可也賜之死可也若束縛之輸之司寇榜笞之小吏詈罵之殆非非所以令衆庶見也及將刑也臣則北面再拜跪而自裁天子曰子大夫自有過耳吾遇子有禮矣上不使人抑而刑之也孝文深納其言是後大臣有罪皆自殺不受刑至孝武稍復入獄良由孝文行之當時不為永制故耳伏惟聖德慈惠豈與漢文比隆哉今天下有道庶人不議之時臣安可陳瞽言于朝但恐萬世之後繼體之主冇若漢武之事焉夫道貴長久所以樹之風聲也法尚不虧所以貽厥孫謀也焉得行恩當時而不著長世之制乎其六曰孝經稱父子之道天性書云孝平惟孝友于兄弟二經之旨蓋明一體而同氣可共而不可離者也及其有罪罪不相及者乃君上之厚恩也至若有懼懼應相連者固自然之恆理也無情之人父兄繫獄子弟無慘惕之容子弟逃刑父兄無愧恧之色宴安榮位遊從自若車馬仍華衣冠猶飾寧是同體共氣分憂均戚之理也昔秦伯以楚人圍江素服而示懼宋仲子以失舉桓談免冠而謝罪然則子弟之于父兄父兄之于子弟惟其情至豈與結盟相知者同年語其深淺哉二聖清𥳑風俗孝慈是先臣愚以為父兄有犯宜令子弟素服肉袒詣闕謝罪子弟有坐宜令父兄露板引咎乞解所司若職任必要不宜許者慰免留之如此足以敦厲凡薄使人知有所恥矣其七曰禮云臣有大喪君三年不呼其門此聖人緣情制禮以終孝子之情者也周季陵夷喪禮稍亡是以要絰即戎素冠作刺逮于虐秦殆皆泯矣漢初軍旅屢興未能遵古至宣帝時民當從軍屯者遭大父母父母死未滿三月皆弗徭役其朝臣喪制未有定聞至後漢元初中大臣有重憂始得去官終服暨魏武孫劉之世日尋干戈前世禮制復廢而不行晉時鴻臚鄭默喪親固請終服武帝感其孝誠遂著令以為常聖魏之初揆亂反正未遑建終喪之制今四方無虞百姓安逸誠是孝慈道洽禮教興行之日也然愚臣所懷竊有未盡伏見朝臣丁大憂者假滿赴職衣錦乘軒從郊廟之祀鳴玉垂緌同節慶之宴傷人子之道虧天地之經愚謂如有遭大父母父母喪者皆聽終服若無其人有曠庶官者則優旨慰喻起令視事但綜司出納敷奏而已國之吉慶一令無預其軍戎之警墨縗從役雖愆于禮事所宜行也如臣之言少有可采願付有司別為條制魏書李彪傳求復修國史表臣聞龍圖出而皇道明龜書見而帝德昶斯實冥中之書契也自瑞官文而卑高陳民師建而賤貴序此乃人閒之繩式也是以唐典篆欽明之冊虞書銘慎徽之篇傳著夏氏之針詩録商家之頌斯皆國史明乎得失之迹也逮于周姬鑒乎二代文王開之以兩經公旦申之以六聯郁乎其文典章大略也故觀雅頌識文武之丕烈察歌音辨周公之至孝是以季札聽風而知始基聽訟而識盛德至若尼父之別魯籍丘明之辨孔志可謂婉而成章盡而不污者矣自餘乘志之比其亦有趣焉暨史班之録乃文窮干秦漢事盡于哀平懲勸兩書華實兼載文質彬彬富哉言也令大漢之風美類三代炎崇道冠來事降及華馬陳于咸有放焉四敷贊弗遠不可力致豈虛也哉其餘率見而書覩事而作者多矣尋其本末可往來焉唯我皇魏之奄有中華也歲越百齡年幾十紀太祖以弗違開基武皇以奉時拓業虎嘯域中龍飛字外小往大來品物咸亨自茲以降世濟其光史官敘録未充其盛加以東觀中圯冊勳有闕美隨日落善因月稀故諺曰一日不書百事荒蕪至于太和之十一年先帝先后遠惟景業綿綿休烈若不恢史闡録懼上業茂功殆有缺矣于是召名儒博達之士充麟閣之選于時忘臣衆短采臣片志令臣出納授臣丞職猥屬斯事無所與讓高祖時詔臣曰平爾雅志正爾筆端書而不法後世何觀臣奉以周旋不敢失墜與著作等鳩集遺文并取前記撰為國書假有新進時賢制作于此者恐閨門既異出入生疑弦柱既易善者或謬自十五年以來臣使國遷頻有南轅之事故載筆遂寢𥳑牘弗張其于書功録美不其闕歟伏惟孝文皇帝承天地之寶崇祖宗之業景功未就奄焉崩殞凡百黎萌若無天地賴遇陛下體明睿之真應保合之量恢大明以燭物履靜恭以安邦天清其氣地樂其靜不愆不忘率由舊章可謂重明疊聖元首康哉惟先皇之開創造物經綸浩曠加以魏典流製藻繢垂篇窮理于有象盡性于衆變可謂日月出矣無幽不燭也記曰善跡者欲人繼其行善歌者欲人繼其聲故傅曰文王基之周公成之又曰無周公之才不得行周公之事今之親王可謂當之矣然先皇之茂猷聖達今王之懿美洞鑒準之前代其德靡悔也時哉時哉可不光昭哉合德二儀者先皇之陶鈞也齊明日月者先皇之洞照也慮周四時者先皇之茂功也合契鬼神者先皇之玄燭也遷都改邑者先皇之達也變是協和者先皇之鑒也思同書軌者先皇之遠也守在四夷者先皇之略也海外有截者先皇之威也禮田岐陽者先皇之義也張樂岱郊者先皇之仁也鑾幸幽漠者先皇之智也燮伐南荊者先皇之禮也升中告成者先皇之肅也親虔宗社者先皇之敬也袞實無闕者先皇之德也開物成務者先皇之貞也觀乎人文者先皇之蘊也革斃創新者先皇之志也孝慈道洽者先皇之衷也先皇有大功二十加以謙尊而光為而弗有可謂四三皇而六五帝矣誠宜功書于竹素聲播于金石臣竊謂史官之達者大則與日月齊明小則與四時竝茂其大者孔子左丘是也小者史遷班固是也故能聲流于無窮義昭于來裔是以金石可滅而流風不泯者其唯載籍乎諺曰相門有相將門有將斯不唯其惟蓋言習之所得也竊謂天文之官太史之職如有其人宜其世矣故尚書稱羲和世掌天地之官張衡賦曰學乎舊史氏斯蓋世傳之義也若夫良冶之子善知為裘良弓之子善知為箕物豈有定習慣則知耳所以言及此者史職不修事多淪曠天人之際不可須臾闕載也是以談遷世事而功立彪固世事而名成道爭乃前鑒之軌轍後鏡之蓍龜也然前代史官之不終業者有之皆陵遲之世不能容善是以平子去史而成賦伯喈違閣而就志近僭晉之世有佐郎王隱為著作虞預所毀亡官在家晝則樵薪供爨夜則觀文屬綴集成晉書存一代之事司馬紹敕尚書唯給筆札而已國之大籍成于私家未世之斃乃至如此史官之不遇時也今大魏之史職則身貴祿則親榮優哉游哉式穀爾休矣而典謨弗恢者其有以也而故著作漁陽傅毗北平陽尼河閒邢産廣平宋辨昌黎韓顯宗等竝以文才見舉注述是同皆登年不永弗終茂績前著作程靈虯同時應舉共掌此務今從他職官非所司唯崔光一人雖不移任然侍官兩兼故載述致闕臣聞載籍之興由于大業雅頌垂薦起于德美雖時有文質史有備略然歷世相仍不改此度也昔史談戒其子遷曰當世有美而不書汝之罪也是以久而見美孔明在蜀不以史官留意是以久而受譏取之深衷史談之志賢亮遠矣書稱無曠庶官詩有職思其憂臣雖今非所司然昔忝斯任故不以草茅自疏敢言及于此語曰患為之者不必知知之者不得為臣誠不知彊欲為之耳竊尋先朝賜臣名彪者遠則擬漢史之叔皮近則準晉史之紹統推名求義欲罷不能荷恩佩澤死而後已今求都下乞一靜處綜理國籍以終前志官給事力以充所須雖不能光啓大録庶不為飽食終日耳近則朞月可就遠也三年有成正本蘊之麟閣副二藏之名山魏書李彪傳五德議尚書閭議繼近秦氏臣職掌國籍頗覽前書惜此正次慨彼非緒輒仰推帝始遠尋百王魏雖建國君民兆朕振古祖黃制朔綿迹有因然此帝業神元為首案神元晉武往來和好至于桓穆洛京破亡二帝志摧聰勒思存晉氏每助劉琨申威并冀是以晉室銜扶救之仁越石深代王之請平文太祖抗衡苻石終平燕氏大造中區則是司馬祚終于郟鄩而元氏受命干雲代蓋自周之滅及漢正號幾六十年著苻尚赤後雖張賈殊議暫疑而卒從火德以繼周氏排虐嬴以比共工蔑暴項而同吳廣近蠲謬僞遠即神正若此之明也寧使白蛇徒斬雕雲空結哉自有晉傾淪暨登國肇號亦幾六十餘載物色旗幟卒多從黑是又自然合應玄同漢始且秦并天下革創法度漢仍其制少在變易猶仰推五運竟踵隆姬而況劉石苻燕世業促褊綱紀弗立魏接其斃自有彝典豈可異漢之承木舍晉而為土邪夫皇統崇極承運至重必當推協天緒考審王次不可雜以僭竊參之彊狡神元既晉武同世桓穆與懷愍接時晉室之淪乎文始大廟號太祖抑亦有由紹晉定德孰曰不可而欲次茲僞僭豈非惑平臣所以慺慺惜之唯垂察納魏書禮志一太和十四年中書監高閭議以為魏承秦定為土德祕書丞李彪著作郎崔光等議以為拜散騎常侍啓伯石辭卿子産所惡臣欲之已久不敢辭讓魏書郭祚傳
