body:
  text: 釋法生造像記夫抗音投澗美惡必酬振服依河長短交目斯乃德音道俗水鏡古今法生徼逢孝文皇帝專心于三寶又遇北海母子崇信于二京妙演之際屢叨末筵一降淨心忝充五戒思樹芥子庶幾須彌今為孝文并北海母子造像表情以申生以始王夙歸功帝主万品衆生一切同福魏景明四年十二月一日比丘法生為孝文皇帝并北海王母子造碑拓本上言立僧尼制僧尼浩曠清濁混流不遵禁典精粗莫別輒與經律法師群議立制諸州鎮郡維那上坐寺主各令戒律自修咸依內禁若不解律者退其本次又出家之人不應犯法積入不淨物然經律所制通塞有方依律車牛淫人不淨之物不得為己私蓄唯有老病年六十以上者限聽一乘又比來僧尼或因三寶出貸私財緣州外又出家捨著本無凶儀不應廢道從俗其父母三師遠聞凶問聽哭三日若在見前限以七日或有不安寺舍遊止民間亂道生過皆由此等若有犯者脫服還民其有造寺者限僧五十以上啓聞聽造若有輒營置者處以違敕之罪其僧寺僧衆擯出外州僧尼之法不得為俗人所使若有犯者還配本屬其外國僧尼來歸化者求精檢有德行合三藏者聽住若無德行遣還本國若其不去依此僧制治罪魏書釋老志永平二年沙門統惠深上言詔從之法勝阿毗曇心論序今欲解釋阿毗曇心利益弟子故問曰不須解釋所以者何古昔論師已釋阿毗曇心利益弟子故不須釋答曰不然應須解釋所以者何古昔論師雖釋阿毗曇心太廣太略彼未學者迷惑煩勞無由能取我今離于廣略但先顯修多羅自性是故須釋問曰何故釋阿毗曇心利益弟子邪答曰彼中已説不顛倒法相釋不顛倒法相令彼覺悟真實是故離諸過惡生諸功德得勇猛第一義利問曰若如是者隨意解釋答曰我當解釋但諸師造論以吉為初一切吉中三寶最勝是故本師為顯三寶少分功德故于論初先説此偈釋藏承五造定光像記永平三年四月四日比丘尼法衍用敬心造定定石像一區并二菩薛願永離無有苦患願七世父母緣眷屬現在師亦共福普令一切衆生咸同斯慶碑拓本造彌勒像記永平四年十月七日企和寺尼道僧略造彌勒像一區生生世世見佛問法清信女周阿足願現世安隱一切衆生普同斯願碑拓本正光三年九月九日比丘慧畼仰為皇大師僧父母兄弟姊妹一切衆生敬造彌勒像一區願同時成佛碑拓本明圓始終常妙極真離性情緣理空忘照寂身至淨頌二十字回環讀成五言四十首每首用韻四至俱通深密解脫經序夫至迹虛微理包言像之外幽宗沖祕旨絶名相之域是以大聖秉獨悟之靈姿鏡寰中之妙趣實相廓然與虛無齊其量法性憺爾與幽冥同其源神輝潛應而不滅萬相俱應而不生然此之生也生所不能生此之滅也滅所不能滅顯既非有隱豈為無寂焉而動動焉而寂出沒無方教迹星羅者矣蓋深密解脫經者乃兆聖之玄源億善之淵府論其旨也則真相不二語其教也則湛然理一義盡沖籍文窮祕典妙絶熙怡包括群藏自非詮于理教何以顯茲深致但東西音殊理憑翻譯非翻非譯文義斯壅所以久蘊而不顯者良俟嘉運而光通矣大魏皇帝總六合以統天包百王以馭宇道邁羲唐德超古哲而每遊神覺典妙玩大乘思在翻演鴻宣遐代時有北天竺三藏法師菩提留支魏音道晞會為此地之沙門都統也識性內融神機外朗沖文玄藏罔不該洞以永熙二年龍次星紀月呂蕤賓詔命三藏于顯陽殿高升法座披匣揮塵口自翻譯義語無滯皇上尊經祇法執翰輪首下筆成句文義雙顯旨包群籍之祕理含衆典之奧但萬機淵曠無容終訖捨筆之後轉授沙門都法師彗光曇寧在永寧上寺共律師僧辨居士李廓等遵承上軌歲常翻演新經諸論津悟恆沙帝亦時紆尊儀飾茲玄席同事名儒招玄大統法師僧令沙門都法師僧澤律師慧顒等十有餘僧緇俗詵詵法事隆盛一言三覆慕盡窮微是使深密祕藏光宣于景運解脫妙義永流于遐劫理教淵廓罔測共源旨趣中絶焉究其宗所謂鹿苑之唱再興祇園之風更顯者也寧雖識昧忝廁倫末敢罄庸管祗記云爾釋藏常三造像記夫大覺神遷非經像無以表其真益世閏時憑形質如取利然僧演減割衣鉢之資造石像一區金像三區浮圖三級大般涅槃經兩部雜經三百部供養僧卅人上為國主百僚師徒所生法界之類咸同正覺大統四年歲次戊午七月十五日比丘僧演敬造供養碑拓本張法壽造像銘夫靈真玄廓妙絶難測非言莫能宣其旨非像無以表其狀言宣二六之教像迹四八之𤫚豈不淵玄沖漠巍巍惟極者哉是以務聖寺檀主張去壽能于五蓋重羅之下契斷恩愛塵勞之繒網于熙平二年捨宅造寺宿願嶄像福不止已規度法界尋其羅絡情苞聖境自非藉因積劫莫貴纍世者孰能發茲宏闊善行者焉息榮遷修和行慈仁孝世習精懿志慕幽寂妙真遐願刊石建像釋迦文佛觀音文殊仰述亡考平康舊願復于像側隱出無量壽佛福浛法界考妣等神捨茲質形悉稟淨境同曉薛雲覺道成佛大魏天平二年歲次乙卯四月十一日比丘洪寶銘碑拓本解脫戒本經序戒律者建定慧之妙幢殄暗惑之明燈杜危嶮之蹊徑開淡泊之梁津寶殿之功罔初弗起踚越重閣非梯靡升正法住滅驗之常典大聖泯暉萬餘千紀法澤遐流猶未周備令文學之徒異論競興薄俗之士訕音滿也余聽斯談輒窺慈範昧攬玄言乃矚大集聖所嗟歎言迦葉毗妙觀我人善摧惱結間邪辨正極聖沖典每尋斯文慨五數闕敢以追訪獲斯戒本雖未廣具敬以洗心翦世浮辭大魏武定癸亥之年在鄴京都侍中尚書令高澄請為出焉釋藏傳九善住意天子所問經翻譯記夫法留正像惟聖是依季行于此非賢豈伏三藏法師毗目智仙出自鳥萇剎利王種幼履慈蹤長躡悲迹攝化群迷誡惡導善常為衆生不請之友執此法燈照彼昏暗魏皇都鄴崇福以資興和二年歲次實沈佛法加持出此經典名善住意天子所問建午閏月朔次丁丑戊寅建功乙巳畢功助譯弟子矍曇流支對譯沙門曇林之筆庶俟存道敬法之賢如實印記示令不惑耳釋藏裳九回諍論翻譯記回諍論者龍樹菩薩之所作也數舒盧迦三十二字此論正本凡有六百大魏都鄴興和三年歲次大梁建辰之月朔次癸酉辛卯之日烏萇國人剎利王種三藏法師毗目智仙共天竺國婆羅門人矍曇流支在鄴城內金華寺譯時日所費二十餘功大數凡有一萬一千九十八字對譯沙門曇林之筆驃騎大將軍開府儀同三司御史中尉勃海高仲密啓請供養具記時事以彰以聞令樂法者若見若聞同崇翻譯矣釋藏華三業成就論翻譯記大國將寧必感靈瑞以為喜兆鄴隍方盛聖降神寶以為祥徵天親菩薩造業成論出于今世以示太平此乃大魏都鄴安國之兆也法行有時寄必得人興和三年歲次大梁七月辛未朔二十五日驃騎大將軍開府儀同三司御史中尉渤海高仲密衆聖加持法力資發誠心敬請三藏法師烏萇國人毗目智仙共天竺國婆羅門人瞿曇流支釋曇林等在鄴城內金華寺譯凡四千八百七十二字釋藏爵九轉法輪經翻譯記轉法輪經如來初説優波提舍義門之名天親菩薩之所開示佛説為誰憍陳如等義行此方必主其人魏驃騎大將軍開府儀同三司御史中尉渤海高仲密善求義方選真揀偽故請法師毗目智仙并其弟子瞿曇流支于鄴城內在金華寺出此義門優波提舍興和三年歲次大梁建酉之月朔次庚子十一日譯三千九百四十二言沙門曇林對譯録記釋藏次十一三具足經翻譯記施戒聞三備攝衆行是以如來説名具足法門深邃淺識未窺天親菩薩慈心開示唯顯經義弗釋章句是故名為優波提舍昔出中國今現魏都三藏法師毗目智仙婆羅門人瞿曇流支愛敬法人沙門曇林于鄴城內在金華寺興和三年歲次辛酉月建在戍朔次庚午十三日譯千百十言驃騎大將軍開府儀同三司御史中尉渤海高仲密啓請供養守護流通釋藏造十毗邪娑問經翻譯記菩薩方便攝化衆生必以大悲引邪從正毗邪娑仙即其人也為導群迷令識因果將諸異見至如來所歸命咨啓聽聞正法因其請説即以名經故因此部為毗邪娑問魏尚書令儀同高公愍諸錯習示其歸則簡集能人善辭義者在宅上面出此經典求正法人沙門曇林婆羅門名瞿曇流支興和四年歲次壬戌月建在申朔次乙丑建功辛巳甲午畢功凡有一萬四千四百五十七字釋藏推九奮迅王問經翻譯記一初菩薩功德普修依德立名字號平等隨所顯發稱謂不同説法問論多依自宇故奮迅王問奮迅法如來為説四種奮迅其有人能具此奮迅則于一切皆能奮迅魏尚書令儀同高公今欲以此四種奮迅于一切處普奮迅故置能譯人在宅上面出此四種奮迅法門沙門曇林瞿曇流支興和四年歲次壬戌月建在申朔次乙丑甲午之日啓夾創筆凡有一萬八千三百四十一字釋藏發九金色王經翻譯記釋迦如來本生無量且于一時作金色王檀行因緣自致成佛説施法門引彼為證因名此經為金色王魏尚書令儀同高公敦捨之心往齊金色為開此門普示一切嚴宅上面出斯妙典沙門曇林瞿曇流支興和四年歲次壬戌月建在酉朔次乙未癸丑日譯乙卯畢功三千五百一十四字釋藏忘九第一義法勝經翻譯記夫愛法者必深種善根涅槃經云供佛二恆魏尚書令儀同高公重法心成生上財想博采梵文廣崇翻譯且第一義法勝經者諸法門中此其髓也公意殷誠感之題額沙門曇林瞿曇流支興和四年歲次壬戌九月一日甲子換文始末四功質義乃定五千五百七十六字釋藏貞七順中論翻譯記諸國語言中天音正彼言那伽夷離淳那此云龍勝名味皆足上世德人言龍樹者另合一箱未是全當龍勝菩薩通法之師依大般若而造中論衆典于義包而不悉大乘論師名阿僧佉解未解處別為此部魏尚書令儀同高公延國上賓瞿曇流支在第供養正通佛法對譯曇林出斯義論武定元年歲次癸亥八月十日丙寅揮辭凡有一萬三千七百二十七字釋藏移四寶髻經四法優波提舍翻譯記寶髻經者是大集中之一集也其宗四法玄深奧密天親菩薩略開其門是故名為優波提舍聖自在力行之彼古時人處會出于此今興和三年歲次辛酉九月朔旦庚午之日烏萇國人剎利王種三藏法師毗目智仙中天竺國婆羅門人瞿曇流支護法大士魏驃騎大將軍開府儀同三司御史中尉渤海高仲密愛法之人沙門曇林道俗相假于鄴城內金華寺譯四千九百十七字釋藏弗十一不必定入定入印經翻譯記出世智道亦名為印此經印義或然不然私情有指未許官用何者私情今且當向發心修行證會名入所乘強劣有定不定聖説定入説不定入言義如是決定名印説如是故名如是經其門要密通必有寄魏尚書令儀同高公深知佛法出自中天翻為此典萬未有一采揀集人在第更譯沙門曇林瞿曇流支興和四年歲次降婁月建在戌朔次甲子壬午之日出此如左九千一百九十三字釋藏法闕名道行經後記光和二年十月八日河陽洛陽孟元士口授天竺菩薩竺朔佛時傳言譯者月支菩薩支謙時侍者南陽張少安南海子碧勸助者孫和周提立正光二年九月十五日洛陽城西菩薩寺中沙門佛大寫之釋藏迹七正法念處經序夫域中之名四等道之所生萬殊名蓋衆名之假生非有生之實然則修促共盡小大同期而金字絲編緗交素篆分途列道門張戶設既昧斷惑之境未接息言之路詎能探神測妙苞總無邊有聖將應露因曠遠志遺髮膚施單城國及繁星駐綵夕馬騰空出四門以結念屬三夜而圓果十力在已八解俱照智兼一切慈洽萬方既而法吼傍震甘露降灑鷲山祇樹之下鹿苑連河之地衆出恆沙徒繁林竹反窮迷以升極啓重昏于燈炬雖鵠林興慕檀薪已然教義不忘風聲逾被壽陵仰丹素之工清臺寫金玉之質冰骨流輝園閭加等遺契餘旨薄傳前載幽宗絶唱方備茲辰使持節大將軍領中書監攝吏部尚書京畿大都督渤海王世子高公道風虛邁神襟峻遠負日月于中衢擊雷霆于上路德表生民作舟梁于夷夏器含群物制天淵于廟堂殊流共委酌而不竭異軫同騖仰以知歸黃扇南闢鈴閣東啓則有高士通才幽人偉器懱其漢爵之重鄙其南嶽之遊曳裾高步自得門下俱中前趣之理並應卻行之眷蓋以書奏多方術呈異等或披卷而止或一貫獨得每留神釋典洞叩玄門以夫照壁瀉瓶遺文必舉非徒九部寧止十二逖矣西方路超百宿精力苦心不憚重趼故能法藏流行異聞俱湊爰有舍城妙説時將感通法螺良藥響授斯在從善業之本極身念之際標品有七明義者五至如違俗絶世託想菩提眷彼天人深嗟鬼畜鑒茲因果冥心是緣篤誠修行又悟前旨載懷依仰形殊理一大覺下臨照然獨曉四攝六通網羅群智贊揚妙德事屬斯文直以風殊俗舛詞翰乖絶傾耳注目隔若山河將恐靈教有虧玄旨多墜有婆羅門人矍曇流支比丘曇林僧昉等並鉤深索隱言通理接延居第館四事無違乃譯明茲典名正法念處起自興和歲陽玄黓終于武定淵獻之年條流積廣合七十卷微言不沫弘之在我大崇覺典克宣靈迹此乃濟四部于法橋涮六塵于定水心殷業重無德而言雖龍樹不追馬鳴日遠申法尊道夫豈異昔所以緇素擊節雅俗傾首義有存焉永法三界云爾釋藏非一表天曹自天師張陵去世已來地上曠誠修善之人無所師授嵩嶽道士上谷寇謙之立身直理行合自然才任軌範首處師位魏書釋老志寇謙之守志嵩嶽以神瑞二年十月乙卯忽遇大神乘雲加龍集止山頂稱太上老君謂謙之曰往辛亥年嵩嶽鎮靈集仙宮主表天曹稱云云授寇謙之為內宮太真太寶九州真師誥吾處天宮敷衍真法處汝道年二十二歲除十年為竟蒙其餘十二年教化雖無大功且有百授之勞今賜汝遷入內宮太真太寶九州真師治鬼師治民師繼天師四録修勤不懈依勞復遷賜汝天中三真太文録劾召百神以授弟子文録有五等一曰陰陽太宮二曰正府真官三曰正房真官四曰宿宮散官五曰並進録主壇位禮拜衣冠儀式各有差品凡六十餘卷號曰録圖真經付汝奉持轉佐北方泰平真君出天宮靜論之法能興造克就則起真仙矣又地上生民末劫垂及其中能修身練藥學長生之術即為真君魏書釋老志泰常八年十月戊戌有收圭師李譜文來臨嵩嶽遣弟子宣教云嵩嶽所統廣漢平土萬萬里以授謙之作誥曰云云奏請至道壇受符今陛下以真君御世建靜輪天宮之法開古以來未之有也應登受符書以彰聖德魏書釋老志真君三年謙之奏
