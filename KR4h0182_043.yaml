body:
  text: 邢虯駮奏害母事君親無將將而必誅今謀逆者戮及朞親害親者令不及子既逆甚梟獍禽獸之不若而使禋祀不絕遺育永傳非所以勸忠孝之道存三綱之義若聖教含容不加孥戮使父子罪不相及惡止于其身不則宜投之四裔敕所在不聽配匹盤庚言無令易種于新邑漢法五月食梟羹皆欲絕其類也魏書邢巒附傳時雁門人有害母者八座奏轘之而瀦其室宥其二子邢虯駮奏云云世宗從之與王昕王暉書賢弟彌郎意識深遠曠達不羈𥳑于造次言必詣理吟詠情性往往麗絕當世恐足下方難為兄不暇慮其不進也北齊書王晞傳魏未邢子良愛其清悟與其在洛兩兄書又見北史二十四特進甄琛行狀闕請增兵糧圖蜀表揚州成都相去萬里陸途既絕唯資水路蕭衍兄子淵藻去年四月十三日發揚州今歲四月四日至蜀水軍西上非周年不達外無軍援一可圖也益州頃經劉李連反叛鄧元起攻圍資儲散盡倉庫空竭今猶未復兼民人喪贍無復守固之意二可圖也蕭淵藻是裙屐少年未洽治務及至益州便戮鄧元超曹亮宗臨戎斬將則是駕馭失方范國惠津渠退敗鎖執在獄今之所任竝非宿將重名皆是左右少年而已既不厭民望多行殘暴民心離解三可圖也蜀之所恃唯阻劍閣今既剋南安已奪其險據彼界內三分已一從南安向涪方軌任意前軍累破後眾喪魄四可圖也昔劉禪據一國之地姜維為佐鄧艾既出綿竹彼即投降及苻堅之世楊安朱彤三月取漢中四月至涪城兵未及州仲孫逃命桓溫西征不旬月而平蜀地昔來恆多不守況淵藻是蕭衍兄子骨月至親若其逃亡當無死理脫軍剋涪城淵藻復何宜城中坐而受困若其出鬭庸蜀之卒唯便刀矟弓箭至少假有遙射弗至傷人五可圖也臣聞乘機而動武之善經攻昧侮亡春秋明義未有捨干戚而康時不征伐而混一伏惟陛下纂武文之業當必世之期跨中州之饒兼甲兵之盛清蕩天區在于今矣是以踐極之初壽春馳款先歲命將義陽剋闢淮外謐以風清荊沔于焉肅晏方欲偃甲息兵候機而動而天贊休明時來斯速雖欲靖戎理不獲已至使道遷歸誠漢境佇拔臣以不才屬當戎寄內省文使不以軍謀自許指臨漢中惟規保疆守界事屬艱途東西寇竊上憑國威下仗將士邊帥用命頻有薄捷藉勢乘威經度大劍既剋南安據彼要險前軍長邁已至梓潼新化之民翻然懷惠瞻望涪益旦夕可屠正以兵少糧匱未宜前出為爾稽緩懼失民心則更為寇今若不取後圖便難輒率愚管庶幾殄剋如其無功分受憲坐且益州殷實戶餘十萬比壽春義陽三倍非匹可乘可利實在于茲若朝廷志存保民未欲繮略臣之在此便為無事乞歸侍養微展烏鳥魏書邢巒傳又表昔鄧艾鍾會率十八萬眾傾中國資給裁得平蜀所以然者鬭實力故也況臣才絕古人智勇又闕復何宜請二萬之眾而希平蜀所以敢者正以得據要險士民慕義此往則易彼來則難任力而行理有可剋今王足前進已逼涪城脫得涪城則益州便是成擒之物但得之有早晚耳且梓潼已附民戶數萬朝豈得不守之也若守也直保境之兵則已一萬臣今請二萬五千所增無幾又劍閣天險古來所稱張載銘云世亂則逆世清斯順此之一言良可惜矣臣誠知征戎危事不易可為自軍度劍閣以來鬢髮中白憂慮戰懼寍可一日為心所以勉強者既得此地而自退不守恐辜先皇之恩遇負陛下之爵祿是以孜孜頻有陳請且臣之意算正欲先圖涪城以漸而進若剋涪城便是中分益州之地斷水陸之衝彼外無援軍城自守復何能持久哉臣今欲使軍軍相次聲勢連接先作萬全之計然後圖彼得之則大剋不得則自全又巴西南鄭相離一千四百去州迢遞恆多生動昔在南之日以其統綰勢難故增立巴州鎮靜夷獠梁州藉利因而表罷彼土民望嚴蒲何楊非唯五三族落雖在山居而多有豪右文學箋啟往往可觀冠帶風流亦為不少但以去州既遠不能仕進至于州綱無由廁迹巴境民豪便是無梁州之分是以鬱快多生動靜比建議之始嚴玄思自號巴州刺史剋城以來仍使行事巴西廣袤一千戶餘四萬若彼立州鎮攝華獠則大帖民情從墊江已還不復勞征自為國有魏書邢巒傳巒又表世宗不從請不渡淮表奉被詔旨今臣濟淮與征南犄角乘勝長驅實是其會但愚懷所量竊有未盡夫圖南因于積風伐國在于資給用兵治戎須先計校非可抑為必幸其無能若欲掠地誅民必應萬勝如欲攻城取邑未見其果得之則所益未幾不獲則虧損必大蕭衍傾竭江東為今歲之舉疲兵喪眾大敗而還君臣失計取笑天下雖野戰非人敵守城足有餘今雖攻之未易可剋又廣陵懸遠去江四十里鍾離淮陰介在淮外假其歸順而來猶恐無糧艱守況加攻討勞兵士乎且征南軍士從戎二時疲敝死病量可知已雖有乘勝之資懼無遠用之力若臣之愚見謂宜修復舊伐牢實邊方息養中州擬之後舉又江東之釁不患久無畜力待機謂為勝計魏書邢巒傳言鍾離必無剋狀表蕭衍侵境久勞王師今者奔走實除邊患斯由靈贊皇魏天敗寇豎非臣等弱劣所能剋勝若臣之愚見今正宜修復邊鎮俟之後動且蕭衍尚在凶身未除螳螂之志何能自息唯應廣備以待其來實不宜勞師遠入自取疲困今中山進軍鍾離實所未解若能為得失之計不顧萬全直襲廣陵入其內地出其不備或未可知正欲屯兵蕭密餘軍猶自在彼欲言無糧運船復至而欲以八十日糧圖城者臣未之前聞且廣陵任城可為前戒豈容今者復欲同之今若往也彼牢城自守不與人戰城壍水深非可填塞空坐至春則士自敝苦遣臣赴彼糧何以致夏來之兵不齎冬服說遇冰雪取濟何方臣寍苛怯懦不進之責不受敗損空行之罪鍾離天險朝貴所具若有內應則所不知如其無也必無剋狀若其不復其辱如何若信臣言也願賜臣停若謂臣難行求回臣所領兵統悉付中山任其處分臣求單騎隨逐東西且俗諺云耕則問田奴絹則問織婢臣雖不武忝備征將前宜可否頗實知之臣既謂難何容強遣魏書邢巒傳奏蕃貢非要須者不受臣聞昔者明王之以德治天下莫不重粟帛輕金寶然粟帛安國育民之方金玉是虛華損德之物故先王深觀古今去諸奢侈服御尚質不貴雕鏤所珍在素不務奇綺至乃以紙絹為帳扆銅鐵為轡勒訓朝廷以節儉示百姓以憂務日夜孜孜小大必慎輕賤珠璣示其無設府藏之金裁給而已更不買積以費國資逮景明之初承升平之業四疆清晏遠邇來同于是蕃貢繼路商賈交人諸所獻貿倍多于常雖加以節約猶歲損萬計珍貨常有餘國用恆不足若不裁其分限便恐無以支歲自今非為要須者請皆不受魏書邢巒傳世宗初巒奏奏議王公五等爵犯罪竊詳王公已下或析體宸極或著勳當時咸胙土授民維城王室至于五等之爵亦以功錫雖爵秩有異而號擬河山得之至難失之永墜刑典既同名復殊絕請議所宜附為永制魏書刑罰志延昌二年春尚書邢巒奏奏高季賢赦後不宜復官案季賢既受逆官為其傳檄規扇幽瀛遘茲禍亂據律準犯罪當孥戮兄叔坐法法有明典賴蒙大宥身命獲全除名還民于其為幸然反逆坐重故支庶相及體既相及事同一科豈有赦前皆從流斬之罪赦後獨除反者之身又緣坐之罪不得以職除流且貨賕小愆寇盜微戾贓狀露驗者會赦猶除其名何有罪極冠釁均毀冕父子齊刑兄弟共罰赦前同斬從流赦後有復官之理依律則罪合孥戮準赦則例皆除名古人議無將之罪者毀其室洿其宮絕其蹤滅其類其宅猶棄而況人乎請依律處除名為民魏書刑罰志延昌二年秋符璽郎中高賢弟員外散騎侍郎仲賢叔司徒府主簿六珍等坐弟季賢同元愉逆除名為民會赦之後被旨勿論尚書邢巒奏護軍將軍高顯碑銘闕太尉韓公墓誌銘立事立言是為勿替且公正德實兮不朽雖將相無種而公卿有門是以萬鍾四牡舄奕于往代長組高冠陸離于前祀及負笈追陪結友從師先難後易身佚功倍皆神遊隅隩理合精微非存寍越廢寢食以存道久殊高鳳忘冠履以成業皎皎獨照旁絕囂滓亭亭孤鶴入自雲霞忘情譽毀同嗣宗之于善惡齊心得喪若叔夜之于慍喜方將受任三九追蹤二八弘大道以事一人敷至理以安百姓而天德不厚神聽多愆仁勇一亡辯智同盡蓺文類聚四十六
