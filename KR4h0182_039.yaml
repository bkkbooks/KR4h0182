body:
  text: 賈思伯明堂議案周禮考工記云夏后氏世室殷重屋周明堂皆五室鄭注云此三者或舉宗廟或舉王寢或舉明堂互言之以明其制同也若然則夏殷之世已有明堂矣唐虞以前其事未聞戴德禮記云明堂凡九室十二堂蔡雍云明堂者天子太廟饗功養老教學選士皆于其中九室十二堂案戴德撰記世所不行且九室十二堂其于規制恐難得厥衷周禮營國左祖右社明堂在國之陽則非天子太廟明矣然則禮記月令四堂及太室皆謂之廟者當以天子暫配饗五帝故耳又王制云周人養國老于東膠鄭玄注云東膠即辟雍在王宮之東又詩大雅云雍雍在宮肅肅在廟鄭注云宮謂辟雍宮也所以助王養老則尚和助祭則尚敬又不在明堂之驗矣案孟子云齊宣王謂孟子曰吾欲毀明堂若明堂是廟則不應有毀之問且蔡雍論明堂之制云堂方一百四十尺象坤之策屋圓徑二百一十六尺象乾之策方六丈徑九丈象陽陰九六之數九室以象九州屋高八十一尺象黃鍾九九之數二十八柱以象宿外廣二十四丈以象氣案此皆以天地陰陽氣數為法而室獨象九州何也若立五室以象五行豈不快也如此蔡氏之論非為通典九室之言或未可從竊尋考工記雖是補闕之書相承已久諸儒注述無言非者方之後作不亦優乎且孝經援神契五經要義舊禮圖皆作五室及徐劉之論同考工者多矣朝廷若獨絶今古自為一代制作者則所願也若猶祖述舊章規摹前事不應捨殷周成法襲近代妄作且損益之極極于三王後來疑議難可準信鄭玄云周人明堂五室是帝各有一室也合于五行之數周禮依數以為之室施行于今雖有不同時說然耳尋鄭此論非為無當案月令亦無九室之文原其制置不乖五室其青陽右個即明堂左個明堂右個即總章左個總章右個即玄堂左個玄堂右個即青陽左個如此則室猶是五而布政十二五室之理謂為可案其方圓高廣自依時量戴氏九室之言蔡子廟學之議子幹靈臺之說裴逸一屋之論及諸家紛紜竝無取焉魏書賈思伯傳齊民要術序蓋神農為耒耜以利天下堯命四子敬授民時舜命后稷食為政首禹制土田萬國作乂殷周之盛詩書所述要在安民富而教之管子曰一農不耕民有飢者一女不織民有寒者倉廩實知禮節衣食足知榮辱丈人曰四體不勤五穀不分孰為夫子傳曰人生在勤勤則不匱語曰力能勝貧謹能勝禍蓋言勤力可以不貧謹身可以避禍故李悝為魏文侯作盡地利之教國以富彊秦孝公用商君急耕戰之賞傾奪鄰國而雄諸侯淮南子曰聖人不恥身之賤也愧道之不行也不憂命之長短而憂百姓之窮是故禹為治水以身解于陽旰之河湯由苦旱以身禱于桑林之祭神農憔悴堯瘦臞舜黎黑禹胼胝由此觀之則聖人之憂勞百姓亦甚矣故自天子以下至于庶人四肢不勤思慮不用而事治求贍者未之聞也故田者不彊囷倉不盈將相不彊功烈之成仲長子曰天為之時而我不農穀亦不可得而取之青春至焉時雨降焉始之耕田終之簠簋惰者釜之勤者鍾之矧夫不為而尚乎食也哉譙子曰朝發而夕異宿勤則菜盈傾筐且苟有羽毛不織不衣不能茹草飲水不耕不食安可以不自力哉朝錯曰聖王在上而或不凍不飢者非耕而食之織而衣之為開其資財之道也夫寒之于衣不待輕媛飢之于飧不待甘旨飢寒至身不顧廉恥一日不再食則飢終歲不製衣則寒夫腹飢不得食體寒不得衣慈母不能保其子君亦安得以有民夫珠玉金銀飢不可食寒不可衣粟米布帛一日不得而飢寒至是故明君貴五穀而賤金玉劉陶曰民可百年無貨不可一朝有飢故食為至急陳思王曰寒者不貪尺玉而思裋褐飢者不願千金而美一食千金尺玉至貴而不若一食裋褐之惡者物時有所急也誠哉言乎神農倉頡聖人者也其于事也有所不能矣故趙過始為牛耕實勝耒耜之利蔡倫立意造紙豈方縑牘之煩且耿壽昌之常平倉桑弘平之均輸法益國利民不朽之術也諺曰智如禹湯不如常耕是以樊遲請學稼孔子答曰吾不如老農然則聖賢之智猶有所未達而況于凡庸者乎猗頓魯窮士聞陶朱公富問術焉告之曰欲速富畜五牸乃畜牛羊子息萬計九真廬江不知牛耕每致困乏任延王景乃令鑄作田器教之墾闢歲歲開廣百姓充給敦煌不曉作耬犂及種人牛功力既費而收穀更少皇甫隆乃教作耬犂所省傭力過半得穀加五又敦煌俗婦女作裙攣縮如羊腸用布一匹隆又禁改之所省復不資茨充為桂陽令俗不種桑無蠶織絲麻之利類皆以麻枲頭貯衣民惰窳少粗履足多剖裂血出盛冬皆然火燎炙充教民益種桑柘養蠶織履復令種苧麻數年之閒大賴其利衣履溫暖今江南知桑蠶織履皆充之教也五原土宜麻枲而俗不知績織民冬月無衣積細草臥其中見吏則衣草而出崔實為作紡績織衽之具以教民得免寒苦安在不教乎黃霸為潁川使郵亭鄉官皆畜雞豚以贍鰥寡貧窮者及務耕桑節用殖財種樹鰥寡孤獨有死無以葬者鄉部書言霸具為區處某所大木可以為棺某亭豚子可以為祭吏往皆如言龔遂為渤海勸民務農桑令口種一株榆百本薤五十本蔥一畦韭家二母彘五母雞民有帶持刀劍者使賣劍買牛賣刀買犢曰何如帶牛佩犢春夏不得不趣田畝秋冬課收斂益畜果實菱芡吏民皆富實召信臣為南陽好為民興利務在富之躬勸耕農出入阡陌止舍鄉訂稀有安居時行視郡中水泉開通溝瀆起水門提閼凡數十處以廣溉灌民得其利畜積有餘禁止嫁娶送終奢靡務出于儉約郡中莫不耕稼力田吏民親愛信臣號曰召父童恢為不其令率民養一豬雌雞四頭以供祭祀買棺木顏裴為京兆乃令整阡陌樹桑果又課以閒月取材使得轉相告戒教匠作車又課民無牛者令畜豬投貴時賣以買牛始者民以為煩一二年閒家丁車大牛整頓豐足王丹家纍千金好施與周人之急每歲時後察其強力收多者輒歷載酒肴從而勞之便于田頭樹下飲食勸勉之因留其餘肴而去其惰者獨不見勞各自恥不能致丹其後無不力田者聚落以致殷富杜畿為河東課勸耕桑民畜牸牛草馬下逮雞豚皆有章程家家豐實此等豈好為頓擾而輕費損哉蓋以庸人之性率之則自力縱之則惰窳耳故仲長子曰叢林之下為倉庾之坻魚鱉之堀為耕稼之場者此君長所用心也是以太公封而斥鹵播喜穀鄭白成而關中無饑年蓋食魚鱉而藪澤之形可見觀草木而肥墝之勢可知又曰稼穡不修桑果不茂畜産不肥鞭之可也柂落不完垣牆不牢掃除不淨笞之可也此督課之方也且天子親耕皇后親蠶況夫田父而懷窳惰乎李衡于武陵龍陽泛洲上作宅種甘橘千樹臨卒敕兒曰吾州里有千頭木奴不責汝衣食歲上一匹絹亦可是用矣吳末甘橘成歲得絹數千匹恆稱太史公所謂江陵千樹橘與千戶侯等者也樊重欲作器物先種梓漆時人嗤之然積以歲月皆得其用向之笑者咸求假焉此種植之不可已也諺曰一年之計莫如種穀十年之計莫如樹木此之謂也書曰稼穡之艱難孝經曰用天之道因地之利論語曰百姓不足君孰與足漢文帝曰朕為天下守財矣安敢妄用哉孔子曰居家理故治可移于官然則家猶國國猶家是以家貧思良妻國亂思良相其義一也夫財貨之生既艱難矣用之又無節凡人之性好懶惰矣率之又不篤加以政令失所水旱為災一穀不登胔腐相繼古今同患所不能止也嗟乎且飢者有過甚之願渴者有兼量之情既飽而後輕食既暖而後輕衣或由年穀豐穰而忽于蓄積或由布帛優贍而輕于施與窮窘之來所由有漸故管子曰桀有天下而用不足湯有七十里而用有餘天非獨為湯雨菽粟也蓋言用之以節仲長子曰鮑魚之肆不自以氣為臭四夷之人不自以食為異生習然也居積習之中見生然之事孰自知也斯何異蓼中之蟲而不知藍之甘乎今采捃經傳爰及歌謠詢之老成驗之行事起自耕農終于醯醢資生之業靡不畢書號曰齊民要術凡九十二篇分為十卷卷首皆有目録于文雖煩尋覽差易其有五穀困蓏非中國所植者存其名目而已種植之法蓋無聞焉捨本逐末賢哲所非日富歲貧飢寒之漸故商賈之事闕而不録花草之流可以悅目徒有春華而無秋實匹諸浮僞蓋不足存鄙意曉示家童未敢聞之有識故丁寧周室言提其耳每事指斥不尚浮辭覽者無或嗤焉賈思協序請弛鹽禁表王者道同天壤施齊造化濟時拯物為民父母故年穀不登為民祈祀乾坤所惠天子順之山川祕利天子通之苟益生民損躬無吝如或所聚唯為賑恤是以月令稱山林藪澤有能取蔬食禽獸者皆野虞教導之其迭相侵奪者罪之無赦此明導民而弗禁通有無以相濟也周禮雖有川澤之禁正所以防其殘盡必令取之有時斯所謂障護雖在公更所以為民守之耳且一家之長惠及子孫一運之君澤周天下皆所以厚其所養以為國家之富未有尊居父母而醯醢是吝富有萬品而一物是規今者天為黔首生鹽國與黔首障護假獲其利是猶富專口斷不及四體也且天下夫婦歲貢粟帛四海之有備奉一人軍國之資取給百姓天子亦何患乎貧而苟禁一池也古之王者世有其民或水火以濟其用或巢宇以誨其居或教農以去其飢或訓衣以除其敝故周詩稱教之誨之飲之食之皆所以撫覆導養為之求利者也臣性昧知識無遠尚每觀上古愛民之迹時讀中葉驟稅之書未嘗不歎彼遠大惜此近狹今僞斃相承仍崇關鄽之稅大魏恢博唯受穀帛之輸是使遠方聞者罔不歌德昔亶父以棄寶得民碩鼠以受財失衆君王之義宜其高矣魏之𥳑稅惠實遠矣語稱出內之吝有司之福施惠之難人君之禍夫以府藏之物猶以不施而為災況府外之利而可吝之于黔首且善藏者藏于民不善藏者藏于府藏于民者民欣而君富藏于府者國怨而民貧國怨則示化有虧民貧則君無所取願弛茲鹽禁使沛然遠乃依周禮置川衡之法使之監導而已魏書甄琛傳世宗踐阼以琛兼御史中尉琛表請取武官領里尉以清輦轂表詩稱京邑翼翼四方是則者京邑是四方之本安危所在不可不清是以國家居代患多盜竊世祖太武皇帝親自發憤廣置主司里宰皆以下代令長及五等散男有經略者乃得為之又多置吏士為其羽翼崇而重之始得禁止今遷都已來天下轉廣四遠赴會事過代都五方雜沓難可備𥳑寇盜公行劫害不絶此由諸坊混雜釐比不精主司暗弱不堪檢察故也凡使人攻堅木者必為之擇良器今河南郡是陛下天山之堅木盤根錯節亂植其中六部里尉即攻堅之利器非貞剛精鋭無以治之今擇尹既非南金里尉鉛刀而割欲望清肅都邑不可得也里正乃流外四品職輕任碎多是下才人懷苟且不能督察故使盜得容姦百賦失理邊外小縣所領不過百戶而令長皆以將軍居之京邑諸坊大者或千戶五百戶其中皆王公卿尹貴勢姻戚豪猾僕隸蔭養姦徒高門邃宇不可干問又有州郡俠客蔭結貴遊附黨連群陰為市劫比之邊縣難易不同今難彼易此實為未愜王者立法隨時從宜改弦易調明主所急先朝立品不必即定施而觀之不便則改今間官靜任猶懸長兼況煩劇要務不得𥳑能下領請取武官中八品將軍已下幹用貞濟者以本官俸恤領里尉之任各食其祿高者領六部尉中者領經途尉下者領里正不爾請少高里尉之品選下品中應遷之者進而為之則督責有所輦轂可清魏書甄琛傳甄遷河南尹表奏彈張彝邢巒非武非兕率彼曠野北史四十三張彝傳宣武親政罷六輔彝與兼尚書邢巒聞處分非常懼出京奔走為御史中尉甄琛所彈上宣武帝疏諫專心釋典不事墳籍臣聞有堯文思欽明稽古媯舜體道慎典作聖漢光神睿軍中讀書魏武英規馬上玩籍先帝天縱多能克文克武營遷謀伐手不釋卷良以經史義深補益處廣雖則劬勞不可暫輟斯乃前王之美實後王之水鏡善足以遵惡足以誡也陛下道悟自深淵鑒獨得升法座于宸闈釋覺善于日宇凡在聽矚塵蔽俱開然五經治世之模六籍軌俗之本蓋以訓物有漸應時匪妙必須先粗後精乘近即遠伏願經書互覽孔釋兼存則內外俱周真俗斯畼魏書裴延俊傳上言王買劉景暉赦後復合死坐法例律諸逃亡赦書斷限之後不自歸首者復罪如初依賊律謀反大逆處置梟首其延陵法權等所謂月光童子劉景暉者妖言惑衆事在赦後亦合死坐魏書刑罰志熙平中有冀州妖賊延陵王買負罪逃亡赦書限斷之後不自歸首廷尉卿裴延俊上言豁情賦序余攝養舛和服餌寡術自春徂夏三嬰湊疾雖桐君上藥有時致效而草木下性實縈襟抱故復究覽莊生具體齊物物我兩忘是非俱遣斯人之達吾所師焉故作是賦所以託名豁情寄之風謠矣魏書裴伯茂傳曾為豁情賦其序略遷都賦闕求樹漢魏石經表臣竊以為崇治之道必也須才養才之要莫先于學今國子學堂房粗置弦誦闕爾城南太學漢魏石經丘墟殘毀藜藿蕪穢遊兒牧豎為之歎息有情之輩實亦悼心況臣親司而不言露伏願天慈回神紆眄賜垂鑒察若臣微意萬一合允求重敕尚書門下考論營制之模則五雍可翹立而興毀銘可不日而就樹舊經于帝京播茂範于不朽斯有天下者之美業也魏書鄭羲附傳道昭遷國子祭酒上表不從請置學官生徒表臣聞唐虞啓運以文德為本殷周致治以道藝為先然則禮樂者為國之基不可斯須廢也是故周敷文教四海宅心魯秉周禮彊齊歸義及至戰國紛紜干戈遞用五籍灰焚群儒坑殄賊仁義之經貴戰爭之術遂使天下分崩黔黎荼炭數十年閒民無聊生者斯之由矣爰暨漢祖于行陳之中尚優引叔孫通等光武中興于撥亂之際乃使鄭衆范升校書東觀降逮魏晉何嘗不殷勤于篇籍罵學于戎伍伏惟大魏之興也雖群凶未殄戎馬在郊然猶招集英儒廣開學校用能闡道義于八荒布盛德于萬國教靡不懷風無不偃今者承休平之基開無疆之祚定鼎伊瀍惟新寶曆九服感至德之和四垠懷繫壤之慶而蠢爾閩吳阻化江湫先帝爰震武怒戎車不息而停鑾佇蹕留心典墳命故御史中尉臣李彪與吏部尚書任城王臣澄等妙選英儒以宗文教澄等依旨置四門博士四十人其國子博士大學博士及國子助教宿已𥳑置伏尋先旨意在速就但軍國多事未遑營立自爾迄今垂將一紀學官凋落四術寢廢遂使碩儒耆德卷經而不談俗學後生遺本而逐未進競之風實由于此矣伏惟陛下欽明文思玄鑒洞遠越會未疑務修道以來之遐方後服敷文教而懷之垂必經素優柔墳籍將使化越軒唐德隆虞夏是故屢發中旨敦營學館房宇既修生徒未立臣學陋全經識蔽篆素然往年刪定律令謬預議筵謹依準前修尋訪舊事參定學令事訖封呈自爾迄今未蒙報判但廢學歷年經術淹滯請學令并制早敕施行使選授有依生徒可準魏書鄭羲附傳又見北史三十五又表竊惟鼎遷中縣年將一紀搢紳褫業俎豆闕聞遂使濟濟明朝無觀風之美非所以光國宣風納民軌義臣自往年以來頻請學令竝置生員前後纍上未蒙一報故當以臣識淺濫官無能有所感悟者也館宇既修生房初構博士見員足可講習雖新令未班請依舊權置國子學生漸開訓業使播教有章儒風不墜後生覩徙義之機學徒崇知新之益至若孔廟既成釋奠告始揖讓之容請俟令出魏書鄭羲附傳道昭又表不報天柱山銘孤峰秀峙高冠霄星實曰天柱鎮帶萊城懸崖萬仞峻極霞亭據日開月麗景流精朝暉岩室夕曜松青九仙儀彩餘用棲形龍遊鳳集斯處斯寧淵綿窮想照燭空溟道畼時乘曄光幽明雲門煙石登之長生天下名勝志齊亭銘申嶽先生鄭道昭之白雲堂北齊書鄭述祖傳初述祖父為兗州于城南小山起齊亭刻石為記述祖時年九歲及為刺史往尋舊迹得一破石有銘云
