body:
  text: 卷八宣武帝詔答王肅覽奏倍崩絶未足以上酬勳德且可如奏魏書彭城王協傳聽高閭致仕詔閭貞幹早聞儒雅素著出內清華朝之俊老以年及致仕固求辭任宜聽解宗伯遂安車之禮特加優授崇老成之秩可光祿大夫金印紫綬使散騎常侍兼吏部尚書邢巒就家拜授魏書高閭傳世宗踐阼閭纍表遜位詔云云賜餞高閭詔閭歷官六朝著勳五紀年禮致辭義光進退歸軒首路感悵兼懷安駟籯金漢世榮貺可賜安車几杖輿馬繒綵衣服布帛事從豐厚百寮餞之猶昔群公之祖二疏也魏書高閭傳裴叔業以壽春內屬下詔叔業明敏秀發英款早悟馳表送誠功高振古宜加褒授以彰先覺可使持節散騎常侍都督豫雍兗徐司五州諸軍事征南將軍豫州刺史封蘭陵郡開國公食邑三千戶魏書裴叔業傳復授彭城王協司徒詔五教治樞古難其選自非親賢兼切莫應斯舉王以明德懋親任屬保傳出居蕃陜入御袞章內外克諧民神攸屬今董率戎麾威號宜重可復授司徒以光望實魏書彭城王協傳答元嵩謀取沔南詔所陳嘉謀深是良計如當機形可進任將軍裁之魏書任城王附傳淮南平遣鄭道昭勞彭城王協詔王戚尊上輔德勳莫二孤心昧識訓保攸憑比以壽春初開鎮壓任重故令王親董元戎遠撫淮外冒茲炎蒸衡蓋飄颻經略踰時必有虧損淹達詣覿夙夜係情兼制勝宣規威效兼著公私允稱義所欽嘉雖凱旋有期無申延屬可遣給事黃門侍郎鄭道昭就彼祗勞魏書彭城王協傳東堂引見彭城王協詔比鳳凰末一蒼黎二化故仰屈尊謨綏懷邊附而寇豎昏迷敢鬭淮楚叔父英略高明應機殄定凱旋今辰伏慰悲佇魏書彭城王協傳分陳郡儲粟賑豫州詔真度所表甚有憂濟百姓之意宜在拯恤陳郡儲粟雖復不多亦可分贍尚書量賑以聞魏書辥安都附傳豫州大飢辥真度表詔云云詔責吐谷渾伏連壽梁州表送卿報宕昌書梁彌雍與卿並為邊附語其國則鄰藩論其位則同列而稱書為表名報為旨有司以國有常刑殷勤請討朕慮險遠多虞輕相搆惑故先宣此意善自三思魏書吐谷渾傳詔答郭祚企向成立且為本鄉所樂何為捨此世襲更求一限周書泉企傳企襲父爵丹水伯世領本縣令時吏部尚書郭祚以企年少未堪宰民請別選遣終此一限令企代之宣武帝詔報任城王澄立學詔胄子崇業自古盛典國均之訓無應久廢尚書更可量宜修立魏書任城王傳分遣大使黜陟詔朕幼承寶曆艱憂在疚庶事不親風化未洽今始覽政務義協維新思使四方風從率善可分遣大使黜陟幽明魏書宣武紀詔于烈諸父慢怠漸不可任今欲使卿以兵召之卿其行乎魏書于栗磾附傳聽彭城王協釋位歸第詔王宿尚間靜志捐世務先帝愛亮之至弗奪此情遺敕炳然許遂沖退雅操不移朕亦未敢違奪今乃釋位歸第丘園是營高尚之節確爾貞固賁履之操邈焉難追而王宅初構財力多闕成立之期歲月莫就可量遣工役分給材瓦稟王所好速令制辦務從簡素以稱王心魏書彭城王協傳遣咸陽王禧等還府司詔恪雖寡昧忝承寶曆比纏尪疹實憑諸父苟延視息奄涉三齡父等歸遜殷勤今便親攝百揆且還府司當別處分魏書咸陽王禧傳咸陽王禧北海王詳進位詔朕以寡昧夙罹閔凶憂煢在疚罔知攸濟實賴先帝聖帝遺澤所覃宰輔忠賢劬勞王室用能撫和上下肅清內外乃式遵復子歸政告遜辭理懇至邈然難奪便當勵茲空乏親覽機務王尊惟元叔道理潚凝可進位太保領太尉司空北海王季父英明聲略茂舉可大將軍録尚書事魏書咸陽王禧傳答盧昶奏鼠咎詔朕纂承鴻緒伏膺寶曆思靖八方惠康四海當必世之期麟鳳不降屬勝殘之會白鼠告咎萬邦有罪實惟朕躬尚書敷納機猷獻替是寄讜言有聞朕實嘉美魏書盧玄附傳正調外蠲罷詔比年以來連有軍旅役務既多百姓雕敝宜時矜量以拯民瘼正調之外諸妨害損民一時蠲罷魏書宣武紀嚴勒守宰詔諸州刺史不親民事緩于督察郡縣稽逋旬月之間才一覽決淹獄久訟動延時序百姓怨嗟方城困敝尚書可明條制申下四方令日親庶事嚴勒守宰不得因循寬怠虧政魏書宣武紀省官詔治尚簡靜任貴應事州府佐史除板稍多方成損政無益政道又京師百司寮局殷雜官有間長者亦同此例荀非稱要悉從蠲省魏書宣武紀報北海王詳詔一人之身愆不纍德形乖性別忠逆固殊是以父殛子興義高唐世弟戮兄登迹顯周魯禧之與國異體同氣既肆無君之逆安顧弟友之親叔父忠顯二朝誠貫廟社實勗贊沖昧保乂鴻猷豈容以微介之慮忘阿衡之重貂章即以敕還願不再述祚屬眇躬言及斯事臨紙慚恨惋慨兼深魏書北海王詳傳咸陽王禧之謀反也詳表求解任詔云云敦諭彭城王協詔蓋二儀分象君臣之位形焉上下既位唱和之義生焉自古統天位主曷嘗不賴明師仗賢輔而後燮和陰陽彝倫民物者哉往而不返者先民誠有之斯所謂欲潔其身而亂大倫山林之士耳賢人君子則不然也屈已以安民艱身以濟物所謂以先知覺後知同塵而與天下俱潔者也朕偎以沖年纂臨寶曆實賴叔父匡濟之功誠宜永兼將相以綱維內外但逼奪先旨憚違沖挹俯志割心以遂高素自比水旱乖和陰陽失序是以屈王論道庶燮茲玉燭且師宰從容無廢清尚故周旦復辟而居之尚父期頤以終位王義兼家國理絶獨高可遣侍中敦諭魏書彭城王協傳參定祫禘儀注詔禮貴循古何必改作且先聖久遵綿代恆典豈朕沖暗所宜革之且禮祭之議國之至重先代碩儒論或不一可代八座五省太常國子參定以聞魏書禮志二遣賻王肅詔肅奄至不救痛惋兼懷可遣中書侍郎賈思伯兼通直散騎常侍撫慰厥孤給東園祕器朝服一襲錢三十萬帛一千匹布五百匹蠟三百斤并問其卜遷遠近專遣侍御史一人監護喪事務令優厚魏書王肅傳令王肅葬京陵詔死生動靜卑高有域勝達所居存亡崇顯故杜預之歿窆于首陽司空李沖覆舟是託顧瞻斯所誠亦二代之九原也故揚州刺史肅誠義結于二世英惠符于李杜平生本意願終京陵既有宿心宜遂先志其令葬于沖預兩墳之間使之神遊相得也魏書王肅傳詔報源懷不君不臣江南常斃有粟不食其在斯矣上天將欲亡之諸蕃又願取之人事天道孰云匪會但以義害人者不為且十月五日衍軍已達大航其大傷小亡之勢久應有決假令天罰寶卷衍兵獲進則衍之主佐又是亂亡遺孽皇靈其能久祐之乎今之所矜者正以南黔企德邊書繼至殄悴之氓理須救接若爾者揚州兵力配積不少但可速遣任城委以處分別加慰勉令妙盡邊算也魏書源賀附傳報裴衍請隱嵩高詔知欲養痾中嶽鍊石嵩嶺棲素雲根餌芝清壑騰迹之操深用嘉焉但治缺古風有愧山客耳既志往難裁豈容有抑便從來請魏書裴叔業附傳埋瘞骸骨詔自比陽旱積時農民廢殖寤言增愧在豫良多申下州郡有骸骨暴露者悉可埋瘞魏書宣武紀遣迎蕭寶夤詔蕭寶夤深識機運歸誠有道冒險履屯投命絳闕微子陳韓亦曷以過也可遣羽林監領主事劉桃符詣彼迎接其資生所須之物及衣冠車馬在京邸館付尚書悉令預備魏書蕭寶夤傳報高顯等請勒銘射宮詔此乃弓弧小藝何足以示後葉而喉脣近侍苟以為然亦豈容有異便可如請魏書高聰傳世宗幸鄴還于河內懷界帝親射矢一里五十餘步侍中高顯等奏請勒銘射宮詔云云遂刊銘于射所聰為之詞徙御舊都詔京洛兵蕪歲踰十紀先皇定鼎舊都惟新魏曆翦掃榛荒創茲雲構鴻功茂績規模長遠今廟社乃建宮極斯崇便當以來月中旬蠲吉徙御仰尋遺意感慶交衷既禮盛周宣斯干之制事高漢祖壯麗之儀可依典故備茲考吉以稱遐邇人臣之望魏書宣武紀詔任城王澄將軍文德內昭武功外畼奮揚大略將蕩江吳長旌始舒賊徒懾氣兌旅方馳東關席捲想江湖弭波在旦夕耳所送首虜並已聞之魏書任城王澄傳躬勸農桑詔民本農桑國重蠶籍粢盛所憑冕織攸寄比京邑初基耕桑暫缺遺規往旨宜必祗修今寢殿顯成移御維始春郊無遠拂羽有辰便可表營千畝開設宮壇秉耒援筐躬勸億兆魏書宣武紀旱災察冤獄詔酷吏為禍綿古同患孝婦淫刑東海燋壞今不雨十旬意者其有冤獄乎尚書鞫京師見囚務盡聽察之理魏書宣武紀詔百司先朝制立軌式庶事惟允但歲積人移物情乖惰比或擅有增損廢墜不行或守舊遺宜時有舛妨或職分錯亂互相推委其下百司列其疑闕速以奏聞魏書宣武紀報元英詔學業墜廢為日已久非一使能勸比當別敕魏書南安王禎附傳元英奏求遣使就郡校練學生仕詔報詔奪元鸞祿一周鸞親唯宗懿作牧大州民物殷繁綏寧所屬宜克已厲誠崇清樹惠而乃驟相徵發專為煩擾編戶嗷嗷家懷嗟怨北州土廣姦亂是由準法尋愆應加肅黜以鸞戚屬情有未忍可遣使者以義督責奪祿一周微示威罰也魏書城陽王長壽附傳長壽次子鸞為青州刺史轉定州刺史繕起佛寺公私費擾頗為民患世宗聞而詔詔依禮治趙郡王母子罪妾之于女君猶婦人事舅姑君臣之禮義無乖二妾子之于君母禮加如子之恭何得黷我風政可付宗正依禮治罪魏書趙郡王幹附傳幹妃穆氏表謐母趙等悖禮愆常不遜日甚尊卑義阻母子道絶詔云云授源懷為馮翊公詔宿老元臣云如所訴訪之史管頗亦言此可依比授馮翊郡開國公邑九百戶魏書源賀附傳報源懷詔省表具恤民之懷已敕有司一依所上下為永準如斯之比不便千民損化害政者其備列以聞魏書源附傳原裴植詔植闔門歸款子昕愚昧為人誘諂雖刑書有常理宜矜恤可特恕其罪以表勳誠魏書裴叔業附傳叔業兄子植入為大鴻臚卿後以長子昕南叛有司處之大辟詔云云詔詰宋翻卿故違朝法豈不欲作威以買名魏書宋翻傳初翻為河陰令縣有大枷號曰彌尾青內監楊小駒詣縣請事命取尾青以鎮之既免入訴于世宗詔云云以侯剛為右衛大將軍詔太和之季蟻寇侵疆先皇于不豫之中命師出討撫戎暴露觸御乖和朕屬當監國弗獲隨侍而左右服侍唯藉忠勤剛于違和之中卒勤行飪追遠録誠宜先推敘其以剛為右衛大將軍魏書恩幸侯剛傳盧道將襲爵詔長嫡承重禮之大經何得輒授也魏書盧玄附傳盧淵子道將襲父爵而讓其第八弟道舒有司奏聞宣武詔徙趙修詔小人難育朽棘不雕長惡不悛豈容撫養散騎常侍鎮東將軍領扈左右趙修昔在東朝選充臺皂幼所經見長難遺之故纂業之初仍引西禁雖地微器陋非所宜采然識早念生遂升名級自蒙洗濯凶昏日甚驟佞薦憍恩加輕慢不識人倫之體不悟深淺之方陵獵王侯輕觸卿相門賓巷士拜叩不接囂氣豪心仍懷鄙塞比聽葬父侈暴繼聞居京造宅殘虐徒旅又廣張形勢妄生矯託與雍州人趙僧摽等陰相傳納許受玉印不軌不物日月滋甚朕猶愍其宿隸每加覆護而擅威弄勢侏張不已法家耳目並求憲綱雖欲捨之辟實難爽然楚履既墜江君徘徊鐘牛一聲東向改釁修雖小人承侍在昔極辟之奏欲加未忍何鞭之一百徙敦煌為兵其家宅作徒即仰停罷所親在內者悉令出禁朕昧于處物育茲豺虎顧尋往謬有愧臣民便可時敕申沒以謝朝野魏書趙修傳又詔任城王澄鍾離若食盡三月已前固有可剋如至四月淮水泛長舟行無礙宜善量之前事捷也此實將軍經略勳有常焉如或以水盛難圖亦可為萬全之計不宜昧利無成以貽後悔也魏書任城王澄傳免北海王詳為庶人詔王位兼台輔親懿莫二朝野屬賴具瞻所歸不能勵德存道宣融軌訓方乃肆茲貪靦穢暴顯聞遠負先朝友愛之寄近乖家國推敬所期理官執憲實合刑典天下為公豈容私抑但朕諸父傾落存者無幾便極逮坐情有未安可免為庶人別營坊館如法禁衛限以終身邦家不造言尋感慨魏書北海王詳傳為北海王詳舉哀詔北海叔奄至傾背哀慕抽慟情不自任明便舉哀可敕備辦喪還南宅諸王皇宗悉令奔赴給東園祕器賵物之數一依廣陵故事魏書北海王詳傳憂旱詔朕以匪德政刑多舛陽旱歷旬京甸枯瘁在豫之責夙宵疚懷有司可循案舊典祗行六事囹圄冤滯乎處決之庶尹廢職重加修舉鰥寡困窮在所存恤役賦殷煩咸加蠲省賢良讜直以禮進之貪殘佞諫時加屏黜男女怨曠務令媾會稱朕意焉魏書宣武紀詔元鑒知摧角城威謀展稱良以欣然此城襟帶淮滸川路衝要自昔經算未能剋之蟻固積紀每成邊害將軍淵規潛運妙略克宣闢境剋城功著不日據要扼喉津徑勢阻可謂勳高三捷朕甚嘉焉守御諸宜善以量度矜慰之使尋當別遣魏書河南王曜附傳令群官集太樂署考論音律詔太樂令公孫崇更調金石燮理音準其書二卷并表悉付尚書夫禮樂之事有國所重可依其請八座已下四門博士以上此月下旬集大樂署采論同異博采古今以成一代之典也魏書樂志先是高閭引給事中公孫崇共考音律景明中崇乃上言樂事正始元年秋詔
