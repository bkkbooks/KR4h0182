body:
  text: 釋僧懿伐魔詔夫生在三界恆為四魔所嬈沈淪生死遍在六趣若一得人身及聞經法譬見優曇喻值浮孔尋惟聖教實開心目懿身處下流元希彼岸直因生有惡此漏身心去志恭徒然無補略因愚管除剿四魔昔在年幼嘗作破魔露布文雖鄙拙頗為好事者所傳自遷都之後寓在洛陽忽于故塔之中得此本文時值今國都師尚在金剛般若寺講聖鬘經輒以呈示法師學涉內外甚好文彩乃更披經卷賜示魔事兼得擬苻氏釋道安檄魔文共尋玩之復竭愚淺修改舊文更作平魔赦重薦法師更無嫌也但安公檄文直推天魔凡為世患經列有四且天魔權變非浮情所能測煩惱陰死為患實深輒更起伐魔詔慰勞文冠之于初是以前後不同又頗繁重冀信心君子兩得行之輒并編安法師檄文為次合為一卷門下偽魔逋誅于茲曠劫鷹跱四山狼顧五道心頑縱毒常懷返噬固守一隅擁隔聲教自大通已降爰暨賢劫雖百王繼踵千聖相尋威懷百途獎導千計猶不能遏彼邪心息此異見得使貪競相緣癲癡互舉常結四生終歸六趣眷言斯瘼實用傷懷今原燎方邇浸潤有漸無宜自寬以致顛覆可簡將練卒隨機殛撲勿使蒼生懷子復之歎主者告下時速施行廣弘明集三十八奉伐魔啓臣信相等言奉被詔書如右臣聞見機者則承風以先附守迷者必加威而後降是以舜舞于戚有苗自縛于王庭目連援弓則金地相園之日故能斬伏心王塞靜樓觀身被忍鎧手挈浮囊棄所保之貨賄設禪悅之名肴宴彼奇將集此雄勇志有所規則無往不摧心之所向則無思不服四魔區區焉足以規慮哉但今聚結未散事須平蕩輒依分處星焉宿駕謹重申聞請可付外施行謹啓廣弘明集三十八慰勞魔書告三界五道有識群生等夫曦和迭駕盲者尚迷其光雷霆震響聾者猶惑其聽雖照屬理均而稟受道異致令法音擁于殊聞慈光敝于異見昏痼相仍長迷永夜劫石有磷此緣無竭故我高祖愍此橫流心存拯溺體韞殊光口含異響開宏基于未前廓元覺于有始故一闡洪猷則巨犉競馳再擇道教則羊鹿服御證無生于胸襟戢寂滅于懷抱但年德推移心存靜定爰命皇儲紹隆大業先帝藉此洪資纂我前緒積德三大纍功塵劫心變冥機遊神赴會身固舟囊淩波拯接出沒任情權旨自在故能超彼九劫降此四天跨據一方威攝萬國八十年中刑措不用但時不我與聖上遷化教迹道殊人懷異念卿等或是日種輪王世跨四域或是月性高良忠貞不二享三界之名宦保一時之榮祿但爵命難恆時有否泰或因憍慢而喪家或由貪殘而失國故令後胤波流奄然忘返遵彼邪源泛此欲海而使天魔承釁作患于上方煩惱因茲浸淫于下國或縈中陰于未生或馳五衰以告老終疲升降長勤往沒幕府因機傑起英略超群緯文經武體真練俗承百王之洪規稟萬代之遺則履道居彼龍象扣此津門方當馳光上下候騎八維總括群邪羅絡萬有籠三界于一身抗百綱于無外推拔須彌翻波巨海顛倒宇宙回易日月使人天倒懸水陸燋沸然復塞其心我之心開其子來之路扇清風于塗炭布同愛于無間平蕩三途攝茲四有威以動之福以綏之蕞爾小醜焉足以語哉卿等既為所誤沈淪日久宜藉此時機早建良圖夫時難得而易失機尚速而後悔若得時也則福祿競臻如失機也則敗捷爭及故竇融享爵事歸于先覺公孫嬰戮所敗于後機此皆往事之高鑒當今之軌轍且智者處危以謀安愚者臨成以致敗成敗安危在于時機非降自天抑亦人謀今三車佇駕寶藏初開懸重爵以俟功設天官以命哲正是大士縱橫之秋智勇獻功之日與卿等同發遐原枝流異土追維在昔猶或依依言念四魔不覺撫劍故先遣白書略陳成敗曾改迷途尋光赴命相與齊轡道場比肩輪下咨稟未聞受教君子友朋好合不亦善乎無宜大安斯趣盤桓遊逸恐此生滅相尋有無繼作若三毒一馳則義無怨親四凶互出則夭壽俱翦雖欲保全其可得哉今善牙己建六軍啓途出彼火宅尋討未服梟斬之期非旦即夕幸體往意時作出計勿懷猶豫濫嬰斯禍臨路遣書匆匆無盡廣弘明集三十八檄魔文彌天釋道安頓首魔將軍輪下相與雖復玄徒殊津人天一統宗師雖異三界大同每規良集伸其曩積然標榜未宣所以致隔今法王御世九服思順靈網方伸宏綱彌布大通有期高會在近不任翹想並伸預意釋道安頓首夫時有通塞否終則泰千里相尋萬師迭襲昔我高祖本元天王體化應符龍飛初域杖權刑以部萬邦奮慧柯以伏六合咸蕩四邪掃清三有方當抗宏綱于八區亙靈網于宇宙夷靜七荒寧一九土但冥宗不弔真容容凝靜重明寢輝虛舟覆浪故令蛇蟻煩興梟獍競起翳染真徒塵惑清衆虐被蒼生毒流萬劫怪道有情異心同忿我法王體運應期理物上藉高貴下託群心秉玄機以籠三千握聖徒而隆大業雲起四宮鸞翔天竺降神迦夷為法城塹撫育黎元善安卿士匠導群賢慰喻有疾嚴慧柯于胸中被神鉀于身外愍十八之無辜哀三空之路絶志匡大業情必平難百域千邦高伏風化承君久抱惑心重迷自覆深執愚懷固守偽見狼據欲天梟鳴神闕畔換疆埸抗拒靈節謂天位可登洪規可改覽茲二三遠為難息何者大通統世則群方影從而偽天魔不遵正節忤忤聖聽塵撓神心領卒塞虛其形萬變精甲曜曦霜戈拂日靈鼓競鼕響衝方外高步陸亮自謂強威而王師一奮群邪殄喪衆迷革心望風內附況君單將僥然一介士無方尋衆不成旅而欲背理違常陵虛華邑篡奪靈權勝常取信以偽忝真可不謬乎今釋迦統世道隆初劫妙化堂堂神羅遠御智士雍雍元算蓋世武夫龍超捉鞙千隊協略應真奇謀超拔故命使持節前鋒大將軍閻浮都督歸義侯薩陀波崙獨稟天姿義陳玄覺神高須彌猛志籠世善武經文忠著皇闕領衆四十萬億揚鑣路首故命使持節威遠大將軍四天都督忉利公導師曇無竭武勝群標文超隨夏宏謀絶塵心栖夢表每憂時忘身志必匡世領衆百萬億虎眄須彌故命使持節征魔大將軍六天都督兜率王解脫月妙思虛元高步塵表略並童真功侔九地悼愍三塗忿君縱害援劍慷慨龍回思奮衆五百萬億鸞鳴天衢故命使持節通微將軍七天都督四禪天王金剛藏朗志虛元金顏遐矚恩殊九錫力傾山海左顧則濛泛飛波右眄乃扶桑落曜德無不施威無不伏領衆七百萬億雲回天門故命使持節鎮城將軍九天都督十地大王維摩詰奇算不思法柯遠雲體合神姿權象萬變呼吸則九服雲崩叱吒則十方風靡威被下愚愍辜酸楚領衆九百億飲馬靈津故命使持節鑒復大將軍十九天都督十住大士文殊師利承胄遐元形暉三曜身自金剛神高體大應適千途元算萬計群動感于一身衆慮靜于一念深抱慈悲情兼四攝領衆塵沙翱翔斯土故命使持節匡教大將軍十九天都督録魔諸軍事群邪校尉中千王觀世音智略淵深慧綱遐網明達六通朗鑒三固或託迹群邪耀奇峰起或權形二九息彼塗炭揮手則鐵圍摧嚴噓吸則浮雲頽崿能為十方作不請之益領衆不思風吟虎嘯故命使持節撫化大將軍十方三界大都督補處王大慈氏妙質從容天姿標朗體喻金剛心籠塵表猛志衝天慧柯遠奮無生轉于胸中權智應于事外志有所規往無不就威恩雙行真俗並説領衆八百萬億嚴駕待命勇士之徒充盈大千金剛之士彌塞八極咸思助征席卷六合乘諸度之寶軒守八正之修路跨六通之良馬捉虛宗之神轡彎四禪之良弓放權慧之利箭鳴驥浩浩輕步矯矯撫劍飛戈長吟命敵而將軍纍世重光匡濟帝業歷奉聖庭曾無有闕貴即導師身子五百幽鑒天命秉受王化聖上開襟皆授名爵封賞列土功侔舊臣聲蓋萬域而君何心橫生異見偃蹇邊荒頑顧帝位毒害勃于蒼生災禍流于永劫可不哀哉可不謬哉君昔因時荒為物所惑狂迷君心投偽外竄百行一愆賢達尚失久謂君覽智返愚歸罪魏象束身抽簪同遊群俊以道自娛榮名終始仍執愚守惑偷安邪位託癡山以自高恃見林以遊思耽六欲之穢塵玩邪迷以娛性建憍慢之高幢列無明之凶陳闊步長塗輕弄神器盜篡天宮抗拒日月恐不異舉手欲障三光抱土而填四海打鼓與雷爭音把火共電競耀雖擬心虛標事難就矣然將軍植德元津原承彌遠暉華昞然群下矚目望貴之基易登由來之功可惜可改往修來翻然徠順誅過朱門與道齊好家國並存君臣俱顯取名獲安曉目達觀眷屬晏然可不美與大師剋舉萬方矯轡手提法蠡齊撫慧劍道柯輝耀于前驅靈鼓震音于後隊神鐘一扣則十方遍覆海浪飛波則原陸湯沸當爾之時須彌籠為微塵天地迥為一粟無動安于左襟妙樂握于右掌神力若斯豈可當哉我法王體大仁慈未欲便襲權停諸軍暫頓靈轡臨路遣書庶回迷駕可蚤定良圖面縳歸闕委命王庭逍遙間境上方宰任非君而誰夫聖人上智識機明哲免禍窮而知返君子所美此乃轉福之高秋取功之良節昔夏桀無道殷王致伐商紂首亂周武建師此則古今之常軌將軍之明誡相與雖復形乖于當年風流于道味人天崎嶇何足致隔想便霍然隨書投命所以切痛其詞委曲往久者不欲芳蘭夏凋翠柯摧穎深思至言善從良計勿使君身傾住三概勿使六天深生禾莠迅目仰眺助情畼然臨紙多懷文不表意釋道安頓首頓首廣弘明集卅八魔主報檄文大夢國長夜郡未覺縣寱語里六自在主他化皇帝報檄于高座大將軍南閻浮提道綏撫大使佛尚書安法師節下音耗自遠喜同暫接尋覽句味良用欣然方見大國之臣禮義高矣承將軍虛心豁達密行淵元襟帶山河牢籠宇宙慮深宗廟憂及生民秀氣千尋真心萬仞諒疾風之徑草也亂世之忠臣也冀道遇則鄰彼我非隔依從人事聊此報章昔周室既衰六國鼎沸漢朝運滅三分天下或外夷侵叛毒被中原或內禍潛伯殃及良善應期鵲起達時豹變有之自古豈止今日惟蒼生釁積上天降禍釋迦皇帝奄然登遐哀纏臣妾悲浹率土皇太子彌勒養德心宮滿月停山深叢隱藥數鍾百六之世將虧九五之君諸侯姦猾猜忌相處一十八部教軌參差九十六道樽俎回互狼噬海濱梟鳴山曲左不記言右不記事國憲朝典與霜露而凋零天璽帝璧同冰銷而葉散臣怨民怒衆叛親離逃逝無歸竛竮長往竊謂數屬太平沐浴朝化時逢亂世濟難干戈蓋乃通人之權變也謹率義兵發慎忘食並登山拉虎臨河斬龍緯武經文輕身重義社稷是所不圖也天位非所傾望也直以心城無主邪戲塵勞沓沱欲流將心源而共遠恍惚大夢與永夜而俱長還因假寐弔心伐罪先遣聚沫大將軍黃元侯率空華之卒策陽炎之馬即乾城之隅結浮雲之陳戈甲昱爍弓戟參差鋒刃未交服兵先敗次命接響大將軍絲竹公領宮商之衆據聲傳之谷隨聞隨翦次命百和大將軍蘭麝伯領馨香之旅乘風抒陳千里無雲次命六味大將軍領肥美之卒為面門都督安滄溟之口吞噬無遺次命七觸大將軍領細滑之衆戰鼓才擊身城瓦解五軍前討百戰恆捷自天是祐罄無不宜朕慮未窮巢穴躬行問罪戎衣既整出自空窟發淵泉之智動山嶽之威承妄想之兵數盈兆載並潛神識海隱影心山命將元帥案劍城旅徵兵士卒擎刀結陳排空塞回煙飛霧集莫不雄氣衝天吐妄雲于真際高風駭地驚塵浪于性海擊道品官軍霜夜抒籜一心既沒還源彌遠六愛已然宅火逾盛縱橫翦掠腹背羅討六奇三略先蘊胸襟百步千尺本無橫陳遂雲消霧卷吾道興焉于是分官置職行我風化敕無廉驃騎虎踞貪山性澀將軍龍蟠慳海贍恤之士水陸無寄敕繫地郎將置陰陽之府情塵駙馬觀伉儷之兵愛水暫流身城被漬欲火才發天廟遭燒繕性將軍已從焚溺敕咆𠷺校尉弓劍隨身鴆毒鷹揚戈戟在手嚴毅士卒警固賄城使平忿將軍銷聲剗迹敕正勒御史且停監察隨眠武侯安撫朝猷放蕩無明縱恣有待使精進一馬罷行四勤之路迦留二箭不射三空之門勇猛將軍風煙歇滅敕覺觀大司馬置府初禪邪思惟都尉列陳三有以心原未靜頻被風波禪枝欲茂再遭霜雪安靜將軍埋身亂境敕我見行高鎮陀那之嶺惑山萬仞疑戍百重討返還迷問津天路使觀身實相伸如羊角緣寂妄業密若魚鱗故毒動狂子酒醒醉客覆真金藏隱肥膩草博通將軍元焉如醉斯則率土之濱皆吾民也今十軍意氣五將英雄乘機廢立成國宗廟朕俯仰即位臨軒御宇纂成王業握圖受命因弱之輪無際足擬金輪心與駿䭿有餘聊充紺馬衣冠統二車書已一方扇長風于火宅奮高車于門外解釋甲胄與民更始將軍士卒並亡智力俱喪路窮箭盡棄馬焚舟螳蜋舉臂良可愍也良可恥也豈盜跖率卒侵暴諸侯孔丘冒陳流汗反府即將軍之明誡也皇太子彌勒代邸龍飛朕汗馬歸朝銜罪庭闕將軍見徵未敢聞命也情深筆短不能多白冀歸高君子相期于言外焉波旬頓首死罪廣弘明集三十八破魔露布文廣緣將軍流蕩校尉都督六根諸軍事新除惡建善王臣心賑惠將軍善散子都督廣濟諸軍事臣施繕性將軍剋欲界都督攝志諸軍事司馬臣戒平忿將軍蕩恚侯都督洪裕諸軍事行臺臣進安靜將軍志念都尉都督觀纍諸軍事攝散侯臣禪博通將軍周物大夫都督洞達諸軍事監照王智行宮謹案臣等聞治靜泰平凶徒有時以興化清去殺逆黨因之而作是以文命引狩于九圍遇死魔于塗山頂生騰輪于六合值貪賊于忉利故使身滅知威魂散閩越淪蕩他鄉退失尊位良由內挾姦邪外樹塵軌賞差信功罰乖臣惡故也自世宗釋迦文皇帝晏駕固林倏餘千載太子慈氏阿逸多有事兜率未遑紹襲法城暫空梵輪無主塵域外叛沙州弗貢遂使三界風驚六天烽起邪徒詭説翻成異俗偽自在天主賊王波旬稟質昏精體襲邪氣我慢在心愛結盈慮矯奪慧命竊弄神器放縱欲界窺𨵦皇境且其正教陵替內外相違姊妹同姦千子二志三女邪蕩邀我上宮姿態未施自貽伊耋又波旬既習小道頗有才辨愎諫飾非好是奰怒不用順子之言專從佞臣之計伺國間隙乘釁來侵偽結使大將諸煩惱等因聖道消運鍾八百光音無間十纏斯作遂陳欲兵于愛海策疑馬于高原控轡于二見之域馳騁于無明之境值聖則卷迹高栖遇惡則馳據中區負險重關觀時而設或志求榮利假寐權門或含忿威衆專行毒害意氣稜層固守方寸憍慢邊隅未識正朔方復假遣七使傳車三障詭宣六條以致殊俗愚者承教而濯纓智人棄之而澗飲畜卒俟前儲烽候進偽四天大都督五陰魔等置宅于無始之原十居于有形之裏浮遊于苦海之中放逸于火宅之畔竊號躬身假署六腑偷榮瞬息耽樂時頑元首未幾徒役無算飢兵始卒流川遍野怖士愁人亙山滿谷同惡相求輯結一方異類群聚阻兵三界偽署行臺有生賊王死觀兵五道置卒三途在生逆命處老作寇五衰告期四生應世壅塞泉源杜絶飄炎業力咆𠷺丁危脆以先馳三毒趑趄策群有而長逝安忍無親禍連九族威怒互行戮及忠孝方乃忽聖誣賢斯真枉正陷穽黎元羅絡凡庶妄計若空以為已有驟驚之勢謂固同金石者也以正月三十日黃昏時有一人姓善字知識從道場來告云賊去此不遠宜急翦撲不爾當為大患臣聞此語未迷敬信單駕羊車轉軍化城深修塹柵自備而已賊方于後夜遣一使來多貢珍異求結和好臣知此賊勢若泡焰智計莫出意性狂勃難可親近弗與之言抱恨而去方多設詭計欲來侵逼即以月七日向晨出方便門頓解脫處馳信郵以深入徵群迷以出海纂集三昧以致一塹冀蕩五陰戒清諸有賊方恃固一川拒抗皇威其水彌漫廣深難際又值旋嵐傾勃雹霰瀉注擊浪揚波海神競涌七等雜類或飛或沈夜叉守途羅剎決津流瞽流聾覆沒善財其欲淜泳鮮不沈溺又臨折阻涘大築城壘壁立隍峻險閣惟有一門四垂幽谷一人執戈萬夫懾志四果怯憚辟支戰栗遂集衆唱識規望進擊驟度能僉曰或可即勒軍士為渡水故備取諸草木編以為符附令抱踏橫波直進臣等手案浮囊泝流而往固護無非遂登彼岸部分將土修備兵車齊心戮力驅馳往撲即遣安靜將軍領觀纍之卒據散亂之原又使平忿將軍率洪裕之兵塞怒谷之口復令賑惠將軍引廣濟之衆截懢貪之硌更勒博通將軍整洞達之士守狂癡之徑督師羅張四面交侵積戰告捷不月而三行臺恐衆懈怠不得競進乃催厲六軍置阿惟越地而餘燼遊魂偷安他化驅率犬羊欲來拒戰乃假虎兕以為威招熊羆而自衛異首別面之徒吐風火而待發擔山戴樹之類方蟻聚以齊衡希進皇家膺符受命啓土塵劫疊聖重光享祚無窮先帝鼎湖之日顧命殷勤專令文德已來不許戰爭而致幕府受詔之初依敕而行略設六奇斷絶而已但狂豎輈張散亡逆節雖遣逸多曉喻都無悛心乃更命將大權徵兵十萬嘗未浹辰大淨那土資無畏以嚴身兼衆好而獨拔龍蟠道樹虎視娑婆十號一宣則四八應期言教暫設則二九雲集遂擊法鼓而出三空建慈幢以臨八難講武大千曜威萬域神戈暫指則魔徒失膽慧劍一揮則群邪俱斃現道身而斬魔因般若以戮煩惱推波旬于不動之林滅五陰于計性之境然後蹙巢守穴于不到處巡伏隱身者唯一人而已遠處膏肓非勇力攻及也遂乃竄生死于寂滅之原流老病于常樂之境排三障于六通之衢投十使于薩婆之域元凶既梟徒黨伏誅自餘從者並不追問諸有誠心先款者悉令解甲去鋒編戶民例授以遠號移之樂土為拔五箭並以善醫療除垢病施慧湯藥于時業風息吹六塵勿起祥雲四舒靈禽翥翼引八部而自娛嚴四七以守衛垂拱間堂無為而已大覺天王等好尚風軌志存拔擢援昔舊謨殷勤諫誥辭不獲免默許敷奏爾乃開甘露門出入正道千輻雲回來儀鹿苑四天獻器于高掌二商薦肴于兩謂故緣行録勳則陳如先封真諦開賞則邪舍繼襲或朋類蒙榮或兄弟感澤揖不肖于初表有德于十地依準古禮巡省方嶽振旅六城治兵八國理怨于三天之上聞罪于九地之下徵英傑于十中會萬國于鷲嶽華萇剋臻異十勇出于是啓寶藏以賑貧窮出三車以給諸子撫納黔黎寧堵復業乃身安一乘心固磐石據林眄水宣揚皇澤依恆説逸召集未賓仁風匝宇道光遐照四面交通化流無外聽訟于中路之域決判于寶山之所無量之威遠震城嶽無礙之智洞徹山河故士無二統車書一軌日月重光天地清朗六萬之衆解長圍以從正十仙之徒棄大河以就秩不動之賢不遠千里意樂之哲應感而至工人率簞食于尸城捷獸奉壼漿于長源內外剋清表裏咸泰實由道音四敷餘波東訓主上至心群僚深敬稟承神規殄茲凶醜豈臣智力所能剋感也冀憑此一勳漸望更進方事前計凱旋未日並露布以聞臣等死罪死罪廣弘明集三十八平魔赦文門下首區同源因派異緒窪隆代興信背千途故智勝標宗歷塵劫而尚三燈明啓教經九中而未一況乃邪徒偽見駕刺犢于自然之原結賊妄根御形色于顛倒之境以茲偏師抗衡中道眷言一二良用憮然自先帝升遐寶曆無主淳風漸虧靈教異設偽魔乘間充斥神邑假變真容妄談空有驅役四生周還六趣畔渙欲天狼戾愛地毒被邊荒虐流華夏雖獫狁之侵宗周凶奴之陵災漢未為喻也朕以神昧主自塵劫幼齒參元弱冠從政班名于大通之年驅驟于賢劫之下荷百億之重任忝三界之特尊人天樂推無所與讓遂陟靈壇受茲封禪顧唯多闕有慚庶政明發孜孜不遑啓處常恨邪境未清正教無一致使群生沈淪魔境每一撫念用廢寢食遂命將徵兵以清時難上藉三昧之士下憑六度之師控清方夏大戡荒服故六軍雷動則三有雲消慈施電馳則四凶面縛降附若塵生摛萬計唯波旬一人單馬奔迸百道截羅組繼不久且令五道告清宇外咸一思與天下同茲福慶可大赦天下與同更始改像教之號為即真之歲自二月八日昧爽已前幾組見徒悉皆原放若為四魔所誤浮遊三界犯十惡五逆毀經壞像三世所作一切衆罪能改過自新者一問往愆若亡命欲山挾藏姦器百劫不自首者伏罪如初其殺父害君傷兄蒸母隨時投竄以息後犯其闡提一人不在赦書擯罪遙責神速可乘意驛遍告十方主者施行廣弘明集三十八奉平魔赦文啓即真元年二月八日中書令補處王臣逸多宣臣文殊等言奉被詔書如右臣聞毀忠謗善經千葉而不無邪臣逆子歷百代而常有是以三監流言伏罪于明時五世背道甘誅于聖世故王威必震慶當于周邦正教暫加福歸于露鼓伏惟陛下慈兼百王智齊千聖秉瑞靈津握圖元化出沒動于大千馳騁應于群有服微形以引愚迷吼法音以警聾俗至乃刎身志道釘體求經析骸貿禽委命降獸捨塵劫之危體收一生之妙質龍潛四天利見閻浮輕彼七寶重此一乘撤玩深宮減膳河側去寶冠于苦林貿法衣于獵士故能駕御四禪時乘六度殄服群邪易于返掌三界無熾然之警四生絶深溺之憂方復情存解網志尚宥愆十八來蘇萬國幸甚謹重申聞詣可付外施行謹啓廣弘明集三十八平心露布文即真元年二月八日侍中臣文殊師利侍中臣薩陀波崙黃門臣獅子吼黃門臣舍利弗黃門臣須菩提擬唯釋道行軍府謹奏平心露布事擬使持節儀同三司領十二住本將軍唯釋道行軍元帥上柱國晉國公臣般若等言臣聞四魔放命歷代以之為鯁五住遊魂含識囚其致患是以三明聖智十力雄尊莫不屢動偏師頻行薄伐伏惟陛下乘大慈而啓運應冥感而赴期奄宅神區光臨法海述前王之令典演衆妙于圓音考列聖之玄謀會群生于淨國三千剎土共稟威靈百億類洲同遵聲教唯有偽心主阿黎耶識擅假名器叨竊生民跨有乾城綿歷年祀逐窮迷于夢境長夜不歸縱極亂于空花終年如醉權攀緣為藩屏之任引戲論為帷幄之臣陷溺黎元干擾鋒鏑陛下應真理物調俗御民念此鯨鯢愍斯塗炭遂詔臣揚旌色野問罪心庭臣敢效庸虛稟承奇略去四月十六日軍次心境即以其夜初更與賊相見臣于是潛機密會玄契冥馳集戈船于六度之津命戎車于一乘之轍屯營三月揚清梵以伸威列陳九旬擊鳴鐘而作氣阿黎耶識固重昏而莫曉報窮計而不移譬螳螂之拒輪等蜂蠆之含毒乃遣偽恆行大將軍阿陀那識率無名之子弟恃無賴之胸襟據守乾城與臣抗敵又遣偽自性大都督迦毗羅仙偽執此大將軍迦旃延子招引烏合聚結蟻徒搖蕩邊郵邀揚聲勢臣遂分布諸將指麾籌策遣擬使持節拔塵大將軍領四念處諸軍事率道品縣開國公臣求知擬使持節寧境大將軍領八正道諸軍事通真縣開國公臣如實知部勒驍雄星流電轉從方便諸道靜緣邊之界臣求知等尋名討義躡影追蹤乍橫行于密室之間或轉戰于鄰虛之隙事窮理絶域盡途殫冥宗所以冰消數論于斯瓦解迦毗羅等知大乘之有在識玄統之所歸各將羸卒數千咸來請命臣哀其晚悟許以自新即令慈悲觀道士畢無緣隨便安養偽諫議大夫郅諦懷逸群之思負出世之奇將全國以效忠反危身而被繫臣以此月十五日夜挾中軍之勇氣乘外敵之離心手抗干戈躬先士卒爰命擬使持節兜率大將軍娑婆道招慰大使上柱國翅頭未開國公臣阿逸多擬使持節閻浮大將軍天竺大都督天竺諸軍事上柱國富婁沙開國公臣婆藪槃豆並以道邁三空神遊四辨使其招揚勝負曉喻是非又遣擬使持節平等大將軍兼行軍長史上柱國清涼縣開國公臣正念擬使持節遍滿大將軍兼行軍司馬上柱國常樂縣開國公真如與臣表裏玄同更相應接于斯時也邊秋氣爽塞月光寒旌旗共雲漢齊高鋒鍔與霜天比淨披弘誓駕圓通超兩觀而爭前排千門而並入雖生死無際一念覩其濱涯塵勞有儔須臾見其崩潰偽丞相陳顯偽僕射慮思無計求生闔門自縊偽司空師子鎧偽司隸達磨多羅各擁餘師自嬰深壘狐疑競起猜詐萌生忍顛危而不見扶遂淪亡而莫能濟阿陀那與其偽主外無強援內寡深謀師旅困窮城池陷露君臣失色進退無依銜璧叩頭輿櫬待罪臣即梟陀那之首釋郅諦之囚廢彼昏王立其賢嗣方使宗禋不絶永為茅士之君世德相承恆修職貢之禮于是氛祲開蕩若和氣之泮春冰醜穢殲夷似涼風之卷秋籜六根超絶不開亭障之虞三界寂寥無復風塵之警斯乃威光遠被士衆齊心豈臣微劣所能致此不勝慶快之至謹遣厚德府別將臣隰重知奉露布馳驛以聞廣弘明集三十八
