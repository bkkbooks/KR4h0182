body:
  text: 卷九宣武帝克三關勞元英詔知賊城已下復克三關展威闢境聲略宣振公私稱泰良以欣然將軍淵規內斷忠謨外舉受律揚旌克申廟算雖方叔之制蠻荊召虎之掃淮浦匹茲蔑如也新州初附宜廣經略想善加檢督必令周固有所委付然後凱旋耳魏書南安王楨附傳下梁將蔡靈恩等詔中山王英所執蕭衍冠軍將軍監司州事蔡靈恩等隨才擢敘魏書宣武紀會平江南此等便可放歸也魏書南安王楨附傳報鄭道昭詔具卿崇儒敦學之意良不可言新令尋班施行無遠可謂職思其憂無曠官矣魏書鄭羲附傳建國學詔古之哲王創業垂統安民立化莫不崇建膠序開訓國胄昭宣三禮崇明四術使道畼群邦風流萬宇自皇基徙構光宅中區軍國務殷未遑經建靖言思之有慚古烈可敕有司依漢魏舊章營繕國學魏書宣武紀增減律令詔議獄定律有國攸慎輕重損益世或不同先朝垂心典憲刊革令軌但時屬征役未之詳究施于時用猶致疑舛尚書門下可于中書外省論律令諸有疑事斟酌新舊更加思理增減上下必令周備隨有所立別以申聞庶于循變協時永作通制魏書刑罰志報夏侯道遷詔得表聞之將軍前識機運已投誠款而中逢猜間致有播越復翻然風返建茲殊效忠貫古烈義動遐邇漢鄭既開劫翦庸蜀混同之略方自斯始擒凶掃惡何快如之想餘黨悉平西南清蕩經算淹朔當有劬勞所請軍宜別敕一二魏書夏侯道遷傳聽司馬悅赴闕詔司馬悅首謀義陽征略有捷且違京既久屢請入朝可遂此志聽其赴闕魏書司馬楚之附傳詔田益宗懸瓠要藩密邇嵩潁南疆之重所寄不輕而群小猖狂忽搆釁逆殺害鎮主規成反叛此而可忍孰不可容即遣尚書邢巒總精騎五萬星馳電驅征南將軍中山王英統馬步七萬絡繹繼發量此蟻寇唯當逃奔知將軍志翦豺狼以清邊境節義慷慨良在可嘉非蹇蹇之至何以能爾深戢誠款方相委託故遣中書舍人趙文相具宣朕懷往還之規口別指授便可善盡算略隨宜追掩勿令此豎得有竄逸遲近清蕩更有別旨魏書田益宗傳答劉芳請遷易郊壇詔所上乃有明據但先朝置立已久且可從舊魏書劉芳傳詔邢巒巒至彼須有板官以懷初附高下品第可依征義陽都督之格也魏書邢巒傳審議貢舉詔任賢明治自昔通規宣風贊務實惟多士而中正所銓但存門第吏部彝倫仍不才舉遂使英德罕升司務多滯不精厥選將何考陟八座可審議往代貢士之方擢賢之體必令才學並申資望兼致魏書宣武紀銓授勳臣子孫詔先朝勳臣或身罹譴黜子孫沈滯或宦途途失次有替舊流因而弗采何以獎勸言念前績情有親疏宗及庶族祖曾功績可紀而無朝官有官而才堪優引者隨才銓授魏書宣武紀分遣大使省方詔朕纂馭寶曆于今七載德澤未敷鑒不燭遠人之冤瘼所在猶滋而糾察之獄未畼于下賢愚靡分皂白均貫非所以革民耳目使善惡勵心今分遣大使省方巡檢隨其愆負與風響相符者即加糾黜以明雷霆之威以申旄軒之舉因以觀風辨俗采訪功過褒賞賢者糾罰淫慝理窮恤斃以稱朕心魏書宣武紀報邢巒詔若賊敢窺𨵦觀機翦撲如其無也則安民保境以悅邊心子蜀之舉更聽後敕方將席卷岷蜀電掃西南何得辭以戀親中途告退宜勗令圖務申高略魏書邢巒傳因夏侯道遷未拜封下詔道遷至止既淹未恭州封可敕吏部速令召拜魏書夏侯道遷傳求言詔昔虞戒面從昌言屢進周任諫輔王闕必針朕仰纘鴻基伏膺寶曆思康庶績一日萬幾是以側望忠言虛求讜直而良策弗進規畫無聞豈所謂弼諧元首匡救不逮者乎可詔王公已下其有嘉謀深圖直言忠諫利國便民矯時厲俗者咸令指事陳奏無或依違魏書宣武紀詔問元英克敵事機賊勢滋甚圍逼肥梁邊將後規以至于此故有斯舉必期勝捷而出軍淹滯肥梁已陷聞之惋悶實乖本圖今衆軍雲集十有五萬進取之方其算安在克殄之期復當遠近竟以幾日可至賊所必勝之規何者為先故遣步兵校尉領中書舍人王雲指取機要魏書南安王楨附傳議甄琛請弛鹽禁詔民利在斯深如所陳付八座議可否以聞魏書甄琛傳司鹽之稅乃自古通典然興制利民亦代或不同苟可以富氓益化唯理所在甄琛之表實所謂助政毗治者也可從其前計使公私並宜川澤無擁尚書嚴為禁豪強之制也魏書甄琛傳棺埋暴骨詔掩骼埋胔古之令典順辰修令朝之恆式今時澤未降春稼已旱或有狐老餒疾無人贍救因以致死暴露溝塹者洛陽部尉依法棺理魏書宣武紀諡源懷詔府寺所執並不克允愛民好與曰惠可諡惠公魏書源賀附傳太常寺議諡靖公司徒府議諡穆公詔云破陰陵勞元英詔知大摧鯨寇威振南海江浦無塵三楚卷壒聲被荒隅同軌斯始公私慶慰良副朕懷便當乘威藉響長驅吳會翦拉遺燼截彼東南也魏書南安王楨附傳命邢巒渡淮詔淮陽宿豫雖已清復梁城之賊猶敢聚結事宜乘勝并勢摧殄可率二萬之衆渡淮與征南掎角以圖進取之計魏書邢巒傳詔有司敕蠕蠕使人勿六跋蠕蠕遠祖社崙是大魏叛臣往者包容暫時通使今蠕蠕衰微有損疇日大魏之德方隆周漢跨據中原指清八表正以注南未平權寬北掠通和之事未容相許若修藩禮款誠昭著者當不孤爾也魏書蠕蠕傳他汗可汗伏圖遣使紇奚勿六跋朝獻請求通和世宗不報其使詔有司敕勿六跋遣邢巒速進軍詔濟淮掎角事如前敕何容猶爾盤桓方有此請可速進軍經略之宜聽征南至要魏書邢巒傳圍鍾離與元英詔師行已久士馬疲瘠賊城險固卒難攻屠冬春之交稍非勝便十萬之衆日費無資方圖後舉不待今事且可密裝徐嚴為振旅之意整疆完土開示威略左右蠻楚素應逃亡或竄山湖或難制掠若凶渠黠黨有須翦除者便可撲掃以清疆界如其強狡憑阻未易致力者亦不煩肆兵凱旋遲近不復委曲魏書南安王楨附傳報賞隴右誠義詔往歲隴右扇逆合境不民其中猶有卒能自守無豫釁亂疾風知徑良在可嘉尚書可甄量報賞以表誠義魏書宣武紀又詔邢巒安東頻請罷軍遲回未往阻異成規殊乖至望士馬既殷無容停積宜務神速東西齊契乘勝掃殄以赴機會魏書邢巒傳令劉芳與主樂務詔王者功成治定制禮作樂以宣風化以通明神理萬品贊陰陽光功德治之大本所宜詳之可令太常卿劉芳亦與主之魏書樂志太樂令公孫崇表請高肇監就樂務世宗知肇非才詔云云圍鍾離未克又與元英詔大軍野次已成勞久攻守之方理可豫見比頻得啓制勝不過暮春及省後表復期孟夏之末彼土蒸濘無宜久淹勢雖必取乃將軍之深計兵久力殆亦朝廷之所憂故遣主書曹道往觀軍勢使還王具聞魏書南安王楨附傳原蕭寶夤詔寶夤因難投誠宜加矜貸可恕死免官削爵還第魏書蕭寶夤傳寶夤與中山王英攻鍾離淮水泛濫寶夤與英狼狽引退士卒死沒者十四五有司奏寶夤守東橋不固軍敗由之處以極法宣武詔立學詔高祖德格兩儀明並日月播文教以懷遠人調禮學以旌俊造徙縣中區光宅天邑總霜露之所均一姬卜于洛涘戎繕兼興末遑儒教朕纂承鴻緒君臨寶曆思模聖規述遵先志今天清地寧方隅無事可敕有司準訪前式置國子立太學樹小學于四門魏書宣武紀進高陽王雍等官位詔朕秉曆承天履年將紀徙正宮極歲浹歸餘台懿茂親祗勤已久列司英彥庸績未酬非所謂有功見知賞以時及其以司空高陽王雍為太尉尚書令廣陽王嘉為司空百官悉進位一級魏書宣武紀定五校等官員數詔五校昔統營位次于列卿奉車都尉禁侍美官顯加通貴世移時變遂為𤕠職既典名猶昔宜有定員并殿中二司馬亦須有常數今五校可各二十人奉車都尉二十人騎都尉六十人殿中司馬二百人員外司馬三百人魏書官氏志令劉芳等詳察公孫崇新曆詔測度晷象考步宜審可令太常卿芳率太學四門博士等依所啓者悉集詳察魏書律曆志上公孫崇表上景明曆世宗詔聽元和襲爵河南王詔和初以讓鑒而鑒還讓其子交讓之道于是乎著其子早終可聽和襲魏書河南王曜附傳改元亮名字詔仕明風神運吐常自以比荀文若可名彧以取定體相倫之美魏書六武子臨淮王談附傳彧字文若本名亮字仕明時侍中穆紹與彧同署避紹父諱啓求改名詔云云報酈道元請立魯陽學詔魯陽本以蠻人不立大學今可聽之以成良守文翁之化北史酈道元傳修聽訟觀詔慎獄重刑著于往誥朕御茲寶曆明鑒未遠斷決煩疑實有攸愧可依洛陽舊圖修聽訟觀農隙起功及冬令就當與王公卿士親臨録問魏書宣武紀精檢枷杖詔察獄以情審之五聽枷杖小大各宜定準然比廷尉司州河南洛陽及諸獄官鞠訊之理未盡矜恕掠拷之苦每多切酷非所以祗憲量衷慎刑重命者也推濫究枉良軫于懷可付尚書精檢枷杖違制之由斷罪聞奏魏書宣武紀僧犯付昭玄詔緇素既殊法律亦異故道教彰于互顯禁勸各有所宜自今已後衆僧犯殺人已上罪者仍依俗斷餘犯悉付昭玄以內律僧制之魏書釋老志先是立監福曹又改為昭玄備有官屬以斷僧務世宗詔北海王詳復爵營厝詔故太傅北海王體自先皇特鍾友愛受遺訓輔沖昧攸託不圖暮節晦德終缺哀榮便可追復王封剋日營厝少慰幽魂以旌陰戚魏書北海王詳傳詔尚書司馬悅暴罹橫酷身首異所國戚舊勳特可悼念主書董紹銜命公行囚漂殊域事可矜愍尚書可量賊將齊苟兒等四人之中分遣二人敕揚州為移以易悅首及紹迎接還本用慰亡存魏書司馬楚之附傳答高肇奏水都等官詔使者道二可如所奏其下屬司惟須充事耳亦何勞多也參軍録事並更置一謁者加二令史依舊魏書官氏志尚書令高肇奏都水臺請依舊二使者參軍事謁者并録事令史亦隨事史立宣武詔造雜使詔比軍役頻興使多毀敗在庫戎器現有無幾安不忘危古人所戒五兵之器事須充積經造既殷非衆莫舉今可量造四萬人雜仗魏書宣武紀放樊襄已南掠民詔聖人濟世隨物汙隆或正或權理無恆在先朝以雲駕甫遷嵩基始構河洛民庶徙舊未安代來新宅尚不能就伊闕西南群蠻填聚沔陽賊城連邑作戍蠢爾愚巴心未純款故暫抑造育之仁權緩肅姦之法今京師天固與昔不同揚郢荊益皆悉我有保險諸蠻罔不歸附商洛民情誠倍往日唯樊襄已南仁乖道政被拘隔化非民之咎而無賴之徒輕相劫掠屠害良善離人父兄衍之為酷實亦深矣便可放彼掠民示其大惠捨此殘賊未令之愆并敕緣邊州鎮自今已後不聽境外寇盜犯者罪同境內若州鎮主將知容不糾坐之如律魏書宣武紀同軌詔江海方同車書宜一諸州軌轍南北不等今可申敕四方使遠近無二魏書宣武紀郤韓務獻七寶床象牙席詔晉武帝焚雉頭裘朕常嘉之今務所獻亦此之流也奇麗之物有乖風素可付其家人魏書韓秀附傳秀子務除郢州刺史獻七寶床象牙席宣武詔五等選式詔五等諸侯比無選式其同姓者出身公正六下侯從六上伯從六下子正七上男正七下異族出身公從七上侯從七下伯正八上子正八下男從八上清修出身公從八下侯正九上伯正九下子從九上男從九下可依此序之魏書宣武紀
