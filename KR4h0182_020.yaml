body:
  text: 元端上言集議郊禘配謹案禮記祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭玄注大禘郊祖宗謂祭祀以配食也有虞氏以上尚德禘郊祖宗配用有德者自夏以下稍用其姓代之是故周人以后稷為始祖文武為二祧訖于周世配祭不毀案禮嚳雖無廟配食禘祭謹詳聖朝以太祖道武皇帝配圜丘道穆皇后劉氏配方澤太宗明元皇帝配上帝明密皇后杜氏配地祗又以顯祖獻文皇帝配雩祀太宗明元皇帝之廟既毀上帝地祇配食有式國之大事唯祀與戎廟配事重不敢專決請召群官集議以聞魏書禮志二熙平二年三月太常少卿元端上言宗室助祭議禮記祭法云王立七廟曰孝廟曰王考廟曰皇考廟曰顯考廟曰祖考廟遠廟為祧有二祧而祖考以功重不遷二祧以盛德不毀迭遷之義其在四廟也祭統云祭有十倫之義六曰見親疏之殺焉夫祭有昭穆昭穆者所以別父子遠近長幼親疏之序而無亂也是故有倫注云昭穆咸在同宗父子皆來指謂當廟父子為群不繫于昭穆也若一公十子便為群公子豈待數公而立稱乎文王世子云五廟之孫祖廟未毀雖為有所援引然與朝議不同如依其議匪直太祖曾玄諸廟子孫悉應預列既無正據竊謂太廣臣等愚見請同僧奇等議魏書禮志二熙平二年江陽王繼表求預祭王僧奇等議不得預祭李琰之議得預祭太常少卿元端議又見通典五十一羊祉諡議祉志存埋輪不避強禦及贊戎律熊武斯裁使節撫藩邊夷識德化沾殊類襁負懷仁謹依諡法在德行剛曰景宜諡為景魏書酷吏羊祉傳太常少卿元端博士劉臺龍議諡上言羊祉諡應如前議竊惟諡者行之迹狀者迹之稱然尚書銓衡是司釐品庶物若狀與迹乖應抑而不受録其實狀然後下寺依諡法準狀科上豈有捨其行迹外有所求去狀去稱將何所準檢祉以母老辭藩乃降手詔云卿綏撫有年聲實兼著安邊寧境實稱朝望及其歿也又加顯贈言祉誠著纍朝效彰內外作牧岷區字萌之績驟聞詔册褒美無替倫望然君子使人器之義無求備德有數德優劣不同剛而能克亦為德焉謹依諡法布德行剛曰景謂前議為允魏書羊祉傳元端劉臺龍議諡曰景侯剛元纂等駮靈太后令依駮更議元端臺龍上言奏請內考京官外考令文每歲終州鎮列牧守治狀及至再考隨其品第以彰黜陟去十五年中在京百寮盡己經考為三等此年便是三載雖外有成令而內令未班內外考察理應同等臣輒推準外考以定京官治行魏書廣陵王羽傳上孝文帝諡議謹案諡法協時肇享曰孝五宗安之曰孝道德博聞曰文經緯天地曰文仰惟大行皇帝義實該之宜上尊號為孝文皇帝廟曰高祖陵曰長陵魏書彭城王協傳奏駮甄琛弛鹽禁議琛之所列富乎有言首尾大備或無可貶但恐坐談則理高行之則事闕是用遲回未謂為可竊惟古之善為治者莫不昭其勝途悟其遠理及于救世升降稱時欲令豐無過溢儉不致敝役養消息備在厥中節約取足成其性命如不爾者焉用君為若任其生産隨其啄食便是芻狗萬物不相有矣自大道既往恩惠生焉下奉上施卑高理睦然恩惠既交思拯之術廣恆恐財不賙國澤不厚民故多方以達其情立法以行其志至乃取貨山川輕在民之貢立稅關市裨十一之儲收此與彼非利己也回彼就此非為身也所謂集天地之産惠天地之民藉造物之富賑造物之貧徹商賈給戎戰賦四民贍軍國取乎用乎各有義已禁此淵池不專大官之御斂此匹帛豈為後官之資既潤不在已彼我理一猶積而散之將焉所吝且稅之本意事有可求固以希濟生民非為富賄藏貨不爾者昔之君子何為然哉是以後來經圖未之或改故先朝商校小太以情降鑒之流疑興復鹽禁然自以來典司多怠出入之間事不如法遂令細民怨嗟商販輕議此乃用之者無方非興之者謬至使朝廷明識聽營其間今而罷之懼失前旨一行一改法若易棊參論理要宜依前式魏書甄琛傳世宗踐阼琛表請弛鹽禁詔付八座議可否以聞司徒録尚書彭城王協兼尚書邢巒等奏奉家財以充軍用表偽豎遊魂窺覦邊境勞兵兼時日有千金之費臣仰藉先資紹饗厚秩思以埃塵用裨山海臣國封徐州去軍差近謹奉粟九千斛絹六百匹國吏二百人以充軍用魏書彭城王協附傳奏劾甄琛李憑臣聞黨人為患自古所疾政之所忌雖寵必誅皆所以存天下之至公保靈基于永業者也伏惟陛下纂聖前暉淵鑒幽慝恩斷近習憲軌唯新大政蔚以增光鴻猷于焉永泰謹案侍中領御史中尉甄琛身居直法糾擲是司風邪響黷猶宜劾糾況趙修奢暴聲著內外侵公害私野廾切齒而琛嘗不陳奏方更往來綢繆結納以為朋黨中外影響致其談譽令布衣之父超登正四之官七品之弟越陟三階之祿虧先皇之選典塵聖明之官人又與武衛將軍黃門郎李憑相為表裏憑兄叨封知而不言及修釁彰方加彈奏生則附其形勢死則就地排之竊天之功以為已力仰欺朝廷俯罔百司其為鄙詐于茲甚矣不實不忠實合貶黜謹依律科徒請以職除其父中散實為叨越雖皇族帝孫未有此例既得不以倫請下收奪李憑朋附趙修是親是仗交遊之道不依恆度或晨昏從就或吉凶往來至乃身拜其親妻見其子每有家事必先請託緇點皇風塵鄙正化此而不糾將何以肅整阿諛獎厲忠概請免所居官以肅風軌魏書甄琛傳趙修死之明日琛與李憑以朋黨被召詣尚書兼尚書元英邢巒窮其阿附之狀司徒録尚書北海王詳等奏奏請改制修還附律處竊惟姦劫難除為蠹日久群盜作患有國攸病故五刑為用猶陷獨網之誅道幾勝殘寧息狗竊之響是以班制垂式名為治本整綱提目政之大要謹尋奪祿事條班已周歲然京吧尹令善惡易聞邊州遠守或難聽審皆上下同情迭相掩沒設有賊發隱而不言或以劫為偷或遏掠成盜更令賊發難知攘竊惟甚臣等參議若依制削奪則縣無期月之宰附條貶黜郡靡歲稔之守此制必行所謂法令滋章盜賊多有昔黃龔變風不由削祿張趙稱美豈憚貶退然綏導之體得失在人乃可重選慎官依律劾禁不宜輕改法令削黜群司今請改制條還附律處其勵己公清賞有常典風謠黷賄案為考第魏書北海王詳傳景明二年詳與八座奏上言集議祫禘儀注奉旨集議僉以為禘祫之設前代彝典惠蔚所陳有允舊義請依前剋敬享清宮其求省時祭理實宜爾但求之解注下逼列國兼時奠之敬事難輒省請移仲月擇吉重聞魏書禮志二景明二年七月侍中録尚書事北海王詳等言詔可入洛上梁武帝表河北河南一時已定唯爾朱榮尚敢跋扈臣與慶之自能摛討今州郡新服正須綏撫不宜更復加兵搖動百姓梁書陳慶之傳乞議定喪禮表臣聞百王所尚莫尚于禮于禮之重喪紀斯極世代沿革損益不同遺風餘烈景行終在至如前賢往哲商確有異或並證經文而諭情別緒或各言所見而討事共端雖憲章祖述各自名家而論議紛綸理歸群正莫不隨時所宗各為一代之典自上達下罔不遵用是使叔孫之儀專擅于漢朝王肅之禮獨行于晉世所謂共同軌文四海畫一者也至乃折旋俯仰之儀哭泣升降之節去來閫巷之容出入閨門之度尚須疇咨禮官博訪儒士載之翰紙著在通法辨答乖殊證據不明即詆訶疵謬糾劾成罪此乃簡牒成文可具閲而知者也未聞有皇王垂範國無一定之章英賢贊治家制異同之式而欲流風作則永貽來世比學官雖建庠序未修稽考古今莫專其任暨乎宗室喪禮百僚凶事冠服制裁日月輕重率令博士一人輕爾議之廣陵王恭北海王皓同為庶母服恭則治重居廬皓則齊期堊室論親則恭皓俱是帝孫語貴則二人並為蕃國不知兩服之證據何經典俄為舛駮莫有裁正懿王昵戚尚或如斯自茲已降何可紀極歷觀漢魏喪禮諸儀卷盈數百或當時名士往復成規或一代詞宗較然為則況堂堂四海藹藹如林而令喪禮參差始于帝族非所以儀刑萬國綴旒四海臣忝官台傅備位喉脣不能秉國之鈞致斯爽缺具瞻所誚無所逃罪謹略舉恭皓二國不同之狀以明喪紀乖異之失乞集公卿樞納內外儒學博議定制班行天下使禮無異準得失有歸并因事而廣永為條例庶塵嶽沾河微酬萬一魏書禮志四熙平二年十一月太傅清河王懌表官人失序表孝文帝制出身之人本以門品高下有恆若準資蔭自公卿令僕之子甲乙丙丁之族上則散騎祕著下逮御史長兼皆條例昭然無有虧沒自此或身非三事之子解褐公府正佐地非甲乙之類而得上宰行僚自茲以降亦多乖舛且參軍事專非出身之職今必釋褐而居祕著本為起家之官今或遷轉以至斯皆仰失先準有違明令非所謂式遵遺範奉順成規此雖官人之失相循已久然推其彌漫抑亦有由何者信一人之明當九流之廣必令該鑑氏族辨昭人倫才識有限固難審悉所以州置中正之官清定門胃品藻高卑四海畫一專尸衡石任實不輕故自置中正以來暨于太和之日莫不高擬其人妙盡茲選皆須名位重于鄉國才德允于具瞻然後可以品裁州郡綜核人物今之所置多非其人乞明為敕制使官人選才備依先旨無令能否乖方違才易務并革選中正一依前軌庶清源有歸流序允穆通典十六孝明帝時清河王懌以官人失序上表奏立表伺晷度天道至遠非人情可量曆數幽微豈以意輒度而議者紛紜競起端緒爭指虛遠難可求衷自非建標準影無以驗其真偽頃永平中雖有考察之利而不周歲窮究遂不知影之至否差失少多臣等參詳謂宜今年至日更立表木明伺晷度三載之中足知當否令是非有歸爭丈息競然後采其長者更議所從魏書律曆志上延昌四年太傅清河王懌司空尚書令任城王澄散騎常侍尚書僕射元暉侍中領軍江陽王繼奏奏請追奪于忠賞爵竊惟先帝升遐之初皇上登極之始四海謐然宇內晏清至于奉迎乘輿侍衛省闥斯乃臣子之常節職司之恆理不容以此為功妄開井邑臣等前議所以廣建茅土者正以畏迫威權苟免暴戾故也是以中議之際以十三日夜入為無勳唯以拒違矯令抑黜姦回微可褒敘以前侍中臣忠總攝文武侍中臣光久在樞密讚同其意故唯常賞二人今尚書臣昭等無涯上訴奉敕重議案王顯陰結姦徒志為不逞高肇遠同凶逆遙構禍端無將之罪事合汙戮而忠等徵罪唯以厥身不至孥戮又出罪人窮治不盡案律準憲事在不輕暨皇上纂曆聖后別宮母子隔異溫凊道絶皆忠等之咎過方厥勳功微罪重又忠專權之後擅殺樞納輒廢宰輔令朝野駭心遠近怪愕功過相除悉不合賞請悉追奪魏書于栗磾附傳靈太后臨朝解于忠侍中領軍崇訓衛尉旬餘太傳清河王等奏奏定五時冠服謹案前敕制五時朝服嘗訪國子議其舊式太學博士崔瓚等議自漢逮于魏晉迎氣五郊用幘從服改色隨氣斯制因循相承不革冠冕舊末聞有變今皇魏憲章前代損益從宜五時之冠謂如漢晉用幘為允尚書以禮式不經請訪議事奉敕付臣令加考決臣以為帝王服章方為萬世則不可輕裁請更集禮官下省定議蒙敕聽許謹集門下及學官以上四十三人尋考史傳量古校今一同國子前議幘隨服變冠冕弗改又四門博士臣王僧奇蔣雅哲二人以為五時冠冕宜從衣變臣等謂從國子前議為允魏書禮志四熙平二年九月太傅清河王懌給事黃門侍郎韋延祥奏胡太后父廟制議太后博士王延業及盧觀等各率異見案禮記王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五並是後世追論備廟之文皆非當時據立神位之事也良田去聖久遠經禮殘缺諸儒注記典制無因雖稽考異聞引證古誼然用捨從世通塞有時折衷取正固難詳矣今相國秦公初搆國廟追立神位唯當仰祀二昭二穆上極高曾四世而已何者秦公身是始封之君將為不遷之祖若以功業隆重越居正室恐以卑臨尊亂昭穆也如其權立始祖以備五廟恐數滿便毀非禮意也昔司馬懿立功于魏為晉太祖及至子晉公昭乃立五廟亦祀四世止于高曾太祖之位虛俟宣文侍其後裔數滿乃止此亦前代之成事方今所殷鑒也又禮緯云夏四廟至子孫五殷五廟至子孫六周六廟至子孫七明知當時太祖之神仍依昭穆之序要待子孫世世相推然後太祖出居正位耳遠稽禮緯諸儒所説近循晉公之廟故事宜依博士王延業議定立四主親止高曾且虛太祖之位以待子孫而備五廟焉又延業盧觀前經詳議並據許慎鄭玄之解謂天子諸侯作主大夫及士則無意謂此議雖出前儒之事實未允情禮何以言之原夫作主之禮木以依神孝子之心非主莫依今銘旌紀柩設重憑神祭必有尸神必有廟皆所以展事孝敬想象平存上自天子下逮于士如此四事並同其禮何至于主惟謂王侯禮云重主道也此為理重則立主矣故王肅曰重未立主之禮也士喪禮亦設重則士有主明矣孔悝反祏載之左史饋食設主著于逸禮大夫及士既得有廟題紀祖考何可無主公羊傳君有事于廟聞大夫之喪去樂卒事大夫聞君之喪攝主而往今以為攝主者攝神斂主而已不暇待徹祭也何休云宗人攝行主事而往也意謂不然君聞臣喪尚為之不繹況臣聞君喪豈得安然代主終祭也又相國立廟設主依神主無貴賤紀座而已官位擬諸侯者則有主位為大夫者則無主便是三神有主一位獨闕求諸情禮實所未安宜通為主以銘神位魏書禮志二神龜初靈太后父胡國珍薨贈太上秦公時疑其廟制侍中太傅清河王懌議又見通典四十八又議古者七廟廟堂皆別光武已來異室同堂故先朝祀堂令云廟皆四袱五架北廂設坐東昭西穆是以相國構廟唯制一室同祭祖考比來諸王立廟者自任私造不依公令或五或一參差無準要須議行新令然後定其法制相國之廟已造一室實合朝令宜即依此展其享祀魏書禮志二通典四十八作主議原夫作主之禮本以依神孝子之心非主草展今銘旌紀柩設重憑神祭必有尸神必有廟皆所以展事孝敬想像生存上自天子下達于士如此四事並同其禮何至于主唯謂王侯若位擬諸侯者則有主位為大夫者則無主是使三神有主一位獨闕求諸情理實所未安宜通為主以銘神位通典四十八承制大赦晦為明始亂實治期爰著天道又符人事故姬祚終微踐士有勤王之役劉氏將傾北軍致左袒之舉用能隆此遠年克茲卜世永熙之季權佞擅朝群小是崇勳賢見害官緣價以責賤獄因貨而死生宗祏飄若綴旒民命棄如草莽大丞相位居晉鄭任屬桓文興甲汾川問罪伊洛群姦畏威擁迫人主以自蔽衛遠出秦方雖車駕流移未即返御然權佞將除天下延頸魏邦雖舊其化惟新思與兆民同茲更始可大赦天下魏書出帝紀帝出于長安八月推司徒公清河王亶為大司馬承制總萬機居尚書省戊辰制
