body:
  text: 蕭寶夤考功表臣聞堯典有黜陟之文周書有考績之法雖其源難得而尋然條流抑亦可知矣大較在于官人用才審于所蒞練迹校名驗于虛實豈不以臧否得之餘論優劣著于歷試者乎既聲窮于月旦品定于黃紙用效于名輩事彰于臺閣則賞罰之途差有商準用捨之宜非無依據雖復勇進忘退之儔奔競于市里過分亡涯之請馳騖于多門猶且顧其聲第慎其與奪器分定于下爵位懸于上不可妄叨故也今竊見考功之典所懷未喻敢竭無隱試陳萬一何者竊惟文武之名在人之極地德行之稱為生之最首忠貞之美立朝之譽仁義之號處身之端自非職惟九官任當四嶽授曰爾諧讓稱俞往將何以克厭大名允茲令問自比已來官罔高卑人無貴賤皆飾辭假説用相褒舉涇渭同波薰蕕共器求者不能量其多少與者不復核其是非遂使冠履相貿名與實爽謂之考功事同泛涉紛紛漫漫焉可勝言又在京之官積年一考其中或所事之主遷移數四或所奉之君身亡廢絶或具寮離索或同事凋零雖當時文簿記其殿最日久月深駮落都盡人有去留誰復掌其勤墮或停休積稔或分隔數千纍年之後方求追訪聲迹立其考第無不苟相悅附共為脣齒飾垢掩疵妄加丹素趣令得階而已無所顧惜賢達君子未免斯患中庸已降夫復何論官以求成身以請立上下相蒙莫斯為甚又勤恤人隱咸歸守令厥任非輕所責實重然及其考課悉以六載為程既而限滿代還復經六年而敘是則歲周十二始得一階于東西兩省文武間職公府散佐無事冗官或數旬方應一直或朔望止于暫朝及其考日更得四年為限是則一紀之中便登三級彼以實勞劇任而遷貴之路至難此以散位虛名而升陟之方甚易何內外之相懸令厚薄之如是又聞之聖人大寶曰位何以守位曰仁孟子亦曰仁義忠信天爵也公卿大夫人爵也古之人修其爵而人爵從之故雖文質異時污隆殊世莫不寶茲名器不以假人是以賞罰之柄恆自持也至乃周之藹藹五叔無官漢之察察館陶徒請豈不重骨肉私親親誠以賞罰一差則無以懲勸至公暫替則覬覦相欺故至慎至惜殷勤若此況乎親非肺腑才乖秀逸或充單介之使始無汗馬之勞或説興利之規終慚十一之潤皆虛張無功妄指贏益坐獲數階之官藉成通顯之貴于是巧詐萌生偽辨鋒出役萬慮以求榮開百方而逐利握樞秉鈞者亦知其苦斯但抑之則其流已注引之則有何紀極夫琴瑟在于必和更張求其適調去者既不可追來者猶或宜改案周官太宰之職歲終則令官府各正所司受其會計聽其致事而詔于王三歲則大計群吏之治而誅賞之愚謂今可粗依其準見居官者每歲終本曹皆明辨在官日月具核才行能否審其實用而注其上下遊辭宕説一無取焉列上尚書覆其合否如有紕謬即正而罰之不得方復推詰委否容其進退既定其優劣善惡交分庸短下第黜凡以明法幹務忠清甄能以記賞總而奏之經奏之後考功曹別書于黃紙油帛一通則本曹尚書與令僕印署留于門下一通則以侍中黃門印署掌在尚書嚴加緘密不得開視考績之日然後對共裁量如此則少存實録薄止姦回其內外考格裁非庸管乞求博議以為畫一若殊謀異策事關廢興遐邇所談物無異議者自可臨時斟酌匪拘恆例至于暖流引比之訴貪榮求級之請如不限以關鍵肆其傍通則蔓草難除涓流遂積穢我彝章撓茲大典謂宜明加禁斷以全至治開返本之路杜澆敝之門如斯則吉士盈朝薪槱載煥矣魏書蕭寶夤傳又略見通典十五論蕭正德來降表伏見揚州表蕭正德自云避禍遠投宸掖背父叛君駭議衆口深心指趣厥情難測臣聞立身行道始于事親終于事君故君親盡之以恆敬嚴父兼之以博愛斯人倫之所先王教之盛典三千之罪莫大于不孝毀則藏姦常刑靡赦所以晉恭獲謗無所逃死衛伋受誣二子繼沒親命匪棄國孰無父況今封豕尚存長蛇未滅偷生江表自安毒鴆而正德居猶子之親竊通侯之貴父榮于國子爵于家履霜弗聞去就先結隔絶山淮溫清永盡定省長違報復何日以此為心心可知矣皇朝綿基纍葉恩均四海自北徂南要荒仰澤能言革化無思不韙賁玉帛于丘園標忠孝以納賞築藁街于伊洛集華裔其歸心被髮鐻身之酋屈膝而請吏交趾文身之渠款關而效質至如正德宜甄義以致貶昔越栖會稽賴宰嚭以獲立漢困彭宋實丁公而獲免吳項已平二臣即法豈不録其情哉欲明責以示後況遺君忽父狼子是心既不親親安能親人中間變詐或有萬等伏惟陛下聖敬自天欽光纂曆昭德塞違以臨群后脫包此凶醜置之列位百官是象其何誅焉臣釁結禍深痛纏肝髓日暮途遙復報無日豈區區于一豎哉但才雖庸近職居獻替愚衷寸抱敢不申陳伏願聖慈少垂察覽訪議槐棘論其是非使秋霜春露施之有在相鼠攸刺遄死有歸無令申伋受笑于苟存曾閔淪名于盛世魏書蕭寶夤傳奏不許陳仲儒再造樂器金石律呂制度調均中古已來鮮或通曉仲儒雖粗述書文頗有所説而學不師授云出已心又言舊器不任必須更造然後克諧上違成敕用舊之旨輒持已心輕欲制作臣竊思量不合依許魏書樂志神龜二年陳仲儒言宜依京房立準以均樂器時尚書蕭寶夤奏言陳兵事啓所統十萬食唯一月魏書朱元旭傳請拔漢中歸誠表臣聞知機其神趨利如響臣雖不武敢忘機利伏惟陛下澤被區宇德濟蒼生八表同欣品物咸賴臣頃亡蟻賊匹馬歸闕自斯搏噬罄竭丹款但中于壽陽橫為韋纘所謗事之曲直並是楊集朗王秉所悉臣實愚短豈能自安便逃竄江吳苟存視息蕭衍梁州刺史莊丘黑與臣早舊申臣為長史值黑亡沒專任天時素願機會在茲遇武興私署侍郎鄭洛生來此臣即披露誠款與其共契機要報武興王楊紹先并其中叔集起等請其遣軍以為腹背即遣左天長由寒山路馳啓復會通直散騎常侍臣集朗還至武興臣聞其至知事必剋集朗果遣鄭右留使至臣間密參機舉會有蕭衍使人吳公之至知臣懷誠將歸大化遂與府司馬嚴思臧恭典籤吳宗肅王勝等共楊靈珍父子密臣臣幸先覺悉得戮思恭等臣集朗急求軍援而武興軍未到戍主尹天寶不識天命固執愚丁敢為不逞臣即遣軍主席靈坦龐樹等領義勇應時裁違悅之節度輕進失脫天重圍州城梁秦士庶僉云危棘以義逼臣勸為刺史須籍此威鎮靖內外臣赤誠奉國苟敢濟事輒捐小迹且從權宜假當州位重遣皇甫選由斜谷道以事啓聞臣即親率士卒四日三夜交鋒苦戰武興之軍乘虛躡後天寶凶徒因宵鳥散進既摧破退失巢穴潛捨軍衆依山傍險突入白馬集朗與二弟躬擐甲胄率其所領登即擒載戍內戶口即放還民斯由皇威遐振罪人授首凶狡時殄公私慶快非但梁秦竭力實關集朗赴接之機臣前已遣軍主杜法先還洵陽構合徒黨誘結鄉落令晉壽土豪王僧承王文粲等還至西關共興大義當今庸蜀虛弱楚鄧懸危開拓九區掃清六合形要之利在于此時進趣之略願速處分臣以愚陋猥當推舉事定之後便即束身馳歸天闕但物情草創猶有參差蕭衍魏興太守范珣安康太守范泌共前巴西太守薑修屯聚川東尚規舉斧登遣討襲具于別啓集朗兄弟並議曰臣往曰歸誠誓盡心力超蒙榮獎灰殞匪報但留臣權相綏獎須得撲滅珣等便即首路伏願聖慈特垂鑒照謹遣兼長史臣張天亮奉表略聞魏書夏侯道遷傳表毀田益宗華夷異類不應在百世衣冠之上魏書裴叔業附傳又北史四十五臨終遺令子弟命盡之後翦落鬚髮被以法服以沙門禮葬于嵩高之陰同上請隱嵩高表臣幸乘昌運得奉盛化沐藉炎風餐佩唐德于生于運已溢已榮但攝性乖和恆苦虛弱比風露增加精形侵耗小人愚懷有願間養伏見嵩岑極天苞育名草修生救疾多遊此岫臣質無靈分性乖山水非敢追踵輕舉髣佛高蹤誠希藥此沈痾全養稟氣耳若所療微痊庶偶影風雲永歌至德荷衣葛屨裁營已整搖策納屣便陟山途謹附陳聞乞垂昭許魏書裴叔業附傳上言安撫州城事諸城人本非罪坐而來者悉求聽免魏書自序正光五年莫折念生等構逆僉以州城之人莫不徑勇同類悉反宜先收其器械子建上言從之密與張普惠書公熙舊是蕃國之胤而諸氐與相見者必有陰私言宜加圖防魏書張普惠傳普惠持節運租別遣員外常侍楊公熙宣勞東益氐民東益州刺史魏子建密與普惠書疾篤敕子收祚死生大分含氣所同世有厚葬吾平生不取蘧蒢裸身又非吾意氣絶之後斂以時服吾生年契闊前後三娶合葬之事抑又非古且汝二母先在舊塋墳地久固已有定別唯汝次母墓在外耳可遷入兆域依班而定行于吾墓之後如此足矣不須祔合當順吾心勿令吾有遺恨魏書自序説李崇緣遏諸鎮控攝長遠昔時初置地廣人稀或徵發中原強宗子弟或國之肺腑寄以爪牙中年以來有司乖實號曰府戶役同廝養官婚班齒致失清流而本宗舊類各各榮顯顧瞻彼此理當憤怨更張琴瑟今也其時靜境寧邊事之大者宜改鎮立州分置郡縣凡是府戶悉免為民入仕次敘一準其舊文武兼用威恩並施此計若行國家庶無北顧之慮矣北齊書魏蘭根傳又北史五十六正光未李崇討蠕蠕以蘭根為長史因説崇崇以奏聞事寢不報孫秋生等造像銘大魏太和七年新城縣功曹孫秋生新城縣功曹劉起祖二百人等敬造石像一區願國祚永隆三寶彌顯有願弟子等榮茂春葩庭槐獨秀蘭條鼓馥於昌年金暉誕照於聖歲現世眷屬萬福雲歸洙輪疊駕元世父母及弟子等來身神騰九空迹登十地五道群生咸同此願孟廣達文蕭顯慶書景明三年歲在壬午五月戊子朔草七日造訖碑拓本上書求擊蕭寶夤臣當出瞎巴三千生噉蜀子魏書董紹傳蕭寶夤反于長安紹上書求擊之云御天馬頌闕
