body:
  text: 程駿神主祔廟執事官不必賜爵表臣聞名器為帝王所貴山河為區夏之重是以漢祖有約非功不侯必當屬有命于大君之辰展心力于戰謀之日然後可以應茅土之錫未見預事于宗廟而獲賞于疆土徒見晉鄭之后以夾輔為至勳吳鄧之儔以征伐為重績周漢既無文于遠代魏晉亦靡記于往年自皇道開符乾業創統務高三五之規思隆百王之軌罰頗減古賞實增昔時因神主改祔清廟致肅而授群司以九品之命顯執事以五等之名雖復帝王制作弗相沿襲然當時恩澤豈足為長世之範乎乖眾之愆伏待罪譴魏書程駿傳顯祖崩有司奏舊事廟中執事之官例皆賜爵今宜依舊駿獨以為不可表請停兵招諭淮南表春秋有云見有禮于其君者若孝子之養父母見無禮于其君者若鷹鸇之逐鳥雀所以勸誡將來垂範萬代昔陳恆弒君宣尼請討雖欲宴逸其得己乎今廟算天回七州雲動將水蕩鯨鯢陸埽凶逆然戰貴不陳兵家所美宜先遣劉昶招諭淮南若應聲響悅同心齊舉則長江之險可朝服而濟道成之首可崇朝而懸苟江南之輕薄背劉氏之恩義則曲在彼矣何負神明哉宜義檄江南振旅回旆亦足以示救患之大仁揚義風于四海且攻難守易則力懸百倍不可不深思不可不熟慮今天下雖謐方外猶虞拾夤僥倖于西南狂虜何舋于漠北脫攻不稱心恐兵不卒解兵不卒解則憂慮逾深夫為社稷之計者莫不先于守本臣愚以為觀兵江滸振曜皇威宜特君撫慰秋毫無犯則民知德信民知德信則襁負而來襁負而來則淮北可定淮北可定則吳寇異圖吳寇異圖則禍釁出然後觀釁而動則不晚矣請停諸州之兵且待後舉所謂守本者也伏惟陛下太皇太后英算神規彌綸百勝之外應機體變獨悟方寸之中臣影頹虞淵昏耄將及雖思憂國終無云補魏書程駿傳慶國頌并表慶國頌并表臣聞詩之作也蓋以言志邇之事父遠之事君關諸風俗靡不備焉上司以頌美聖德下可以申厚風化言之者無罪聞之者足以誡此古人用詩之本意臣以垂沒之年得逢盛明之運雖復昏耄將及猶慕廉頗彊飯之風伏惟陛下太皇太后道合天地明侔日月則天與唐風斯穆順帝與周道通靈是以狂妖懷逆無隱謀之之地冥靈潛翦伏發覺之誅用能七廟幽贊人神扶助者已臣不勝喜踴謹竭老鈍之思上慶國頌十六章并序巡狩甘雨之德焉其頌曰乾德不言四時迭序於皇大魏則天承祜疊聖三宗重明四祖豈伊殷周遐契三五明明在上聖敬日新汪汪叡后體治垂仁德從風穆教與化津干載昌運道隆茲辰歲惟巡狩應運遊田省方問苦訪政高年咸柣百靈柴望山川誰云禮滯遇聖則宣王業初定中山是由臨幸之盛情特綢繆仰歌祖業府欣春柔大哉肆眚蕩民百憂百憂既蕩與之更切邕邕億兆戶詠來蘇忽有狂豎謀逆聖都明靈幽告發覺伏誅羿浞為亂祖龍干紀狂華冬茂有自來矣美哉皇度道固千祀百靈潛翦姦不遑起姦不遑起罪人得情憲章刑律五秩猶輕於穆二聖仁等春生除棄周漢遐軌犧庭周漢奚棄忿彼苛刻犧庭曷軌希仁尚德徽音一振聲教四塞豈惟京甸化播萬國誠信幽贊陰陽以調谷風扇夕甘雨降朝嘉生含穎深盛熙苗鰥貧巷詠寡婦室謠聞諸詩者雲漢賦宣章句迥秀英昭雅篇矧乃盛明德隆道玄豈唯雨施神徵豐年豐年盛矣化無不濃有禮有樂政莫不通咨臣延躍欣詠時邕誰云易遇曠齡一逢上天無親唯德是在思樂盛明雖疲勿怠差之毫釐千里之倍願言勞謙求仁不悔人亦有言聖主慎微五國連兵踰年歷時鹿車而運廟算失思有司不惠蠶食役煩民不堪命將家逃山宜督厥守威德是宣威德如何聚眾盈川民之從令實賴衣食農桑失本誰耕誰織饑寒切身易子而食靜言念之實懷歎息昔聞典論非位不謀漆室憂國遺芳載臭咨臣昏老偏蒙恩祐忽忘狂瞽敢獻愚陋魏書程駿傳沙門法秀謀反伏誅駿表得一頌闕遺令吾存尚儉薄豈可沒為奢厚哉昔王孫裸葬有感而然士安籧篨頗亦矯厲今世既休明百度循禮彼非吾志也可斂以時服明器從古魏書程駿傳北史四十六經略注序傳稱立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義然則仁義者人之性也經典者身之文也皆以陶鑄神情啟悟耳目未有不由學而能成其器不由習而能利其業是故季路勇士也服道以成忠烈之概甯越庸夫也講蓺以全高尚之節蓋所田者習也所因者本也本立而道生身文而德備焉昔者先王之訓天下也莫不導以詩書教以禮樂移其風俗和其人民故恭儉莊敬而不煩者教深于禮也廣博易良而不奢者教深于樂也溫柔敦厚而不愚者教深于詩也疏通知遠而不誣者教深于書也潔靜精微而不賊者教深于易也屬辭比事而不亂者教深于春秋也夫樂以和神詩以正言禮以明體書以廣聽春秋以斷事五者蓋五常之道相須而備而易為之源故曰易不可見則乾坤其幾乎息矣由是言之六經者先王之遺烈聖人之盛事也安可不遊心寓目習性文身哉頃因暇日屬意蓺林略撰所聞討論其本名曰六經略注以訓門徒焉魏書常爽傳爽因教授之暇述六經略注以廣制作甚有條貫其序云云家令為公主無服議喪紀之本實稱物以立情輕重所因亦緣情以制禮雖理關盛衰事經今古而制作之本降殺之宜其實一焉是故臣之為君所以資敬而崇重為君母妻所以從服而制義然而諸侯大夫之為君者謂其有地土有吏屬無服文者言其非爵也今王姬降適雖加爵命事非君邑理異列土何者諸王開國備立臣吏生有趣奉之勤死盡致喪之禮而公主家令唯有一人其丞已下命之屬官既無接事之儀實闕為臣之禮原夫公主之貴所以立家令者蓋以主之內事脫須關外理無自達必也因人然則家令唯通內外之職及典主家之事耳無關君臣之理名義之分也由是推之家令不得為純臣公主不可為正君明矣且女人之為君男子之為臣古禮所不載先朝所未議而四門博士裴道廣孫榮乂等以公主為之君以家令為之臣制服以斬乖謬彌甚又張虛景吾難羈等不推君臣之分不尋致服之情猶同其議準母制齊求之名實理未為允竊謂公主之爵既非食采之君家令之官又無純臣之式若附如母則情義罔施若準小君則從服無據案如經禮事無成文即之愚見謂不應服魏書常景傳高肇尚平陽公主主薨肇欲使公主家令居廬制服景執議朝廷從之中書監高允遺德頌闕司馬相如讚長卿有豔才直致不群性鬱若春煙舉皎如秋月映遊梁雖好仁仕漢常稱病清貞非我事窮達委天命王襃讚王子挺秀質逸氣干青氣明珠既絕俗白鵠信驚群才世苟不合遇否途自分空枉碧雞命徒獻金馬文嚴君平讚嚴公體沈靜立志明霜雪味道綜微言端蓍演妙說才屈羅仲口位結李強舌素尚萬金貞清標陵玉澈揚雄讚蜀江導清流揚子挹餘休含光絕後彥覃思邈前修世輕久不賞玄談物無求當途謝權寵置酒獨閑遊竝魏書常景傳圖古像讚述周雅云謂天蓋高不敢不跼謂地蓋厚不敢不蹐有朝隱大夫監戒斯文乃惕焉而懼曰夫道喪則性傾利重則身輕是故乘和體遜式銘方冊防微慎獨載象丹青信哉辭人之賦文晦而理明仰瞻高天聽卑視諦俯測厚地岳浚川渟誰其戴之不私不畏誰其踐之不陷不墮故善惡是徵物罔同異論亢匪久人咸敬忌嗟乎唯地厚矣尚亦兢兢浩浩名位孰識其親搏之弗得聆之無聞故有戒于顯而急于微好爵是冒聲奢是基身陷于祿利言溺于是非或求欲而未厭或知足而不辭是故位高而勢逾迫正立而邪愈欺安有位極而危不萃邪榮而正不凋故悔多于地厚禍甚于天高夫悔未結誰肯曲躬夫禍未加誰肯累足固機發而後思圖車覆而後改躅改之無及故狡兔失穴思之在後故逆鱗易觸君子則不然體舒則懷卷視溺則思濟原夫人之度邈于無階之天勢位之危深于不測之地餌厚而躬不競爵降而心不係守善于已成懼愆于未敗雖盈而戒沖通而慮滯以知命為遐齡以樂天為大惠以戢智而從時以懷愚而遊世曲躬焉累足焉苟行之書已決矣猶夜則思其計誦之口亦明矣故心必賞其契故能不同不誘而弭謗于群小無毀無譽而貽信于上帝託身與金石俱堅立名與天壤相敝囂競無侵優遊獨逝夫如是故綺閣金門可安其宅錦衣玉食可頤其形柳下三黜不慍其色子文三陟不喜其情而惑者見居高可以持勢欲乘高以據榮見直道可以修己欲專道以邀聲夫去聲然後聲可立豈矜道之所宣慮危然後安可固豈遐道之所全是以君子監恃道不可以流聲故去聲而懷道監專道不可以守勢故去勢以宗道何者履道雖高不得無亢求聲雖道不得無悔然則聲奢繁則實儉凋功業進則身迹退如此則精靈遂越憍侈自親情與道絕事與勢鄰方欲役思以持勢乘勢以求津故利欲誘其情禍難嬰其身利欲交則幽明以之變禍難搆則智術無所陳若然者雖縻爵帝扃焉得而寍之雖結珮皇庭焉得而榮之故身道未究而崇邪之徑巳形成功未立而脩正之術已生福祿交蹇于人事屯難頓萃于時情忠介剖心于白日耿節沈骨于幽靈因斯愚智之所機倚伏之所係全亡之所依其在遜順而已哉嗚呼監之嗚呼監之魏書常景傳洛橋銘浩浩大川泱泱清洛道源熊耳控流巨壑納穀吐伊貫周淹亳近達河宗遠朝海若兆惟洛食實曰土中上映張柳下據河嵩寒暑鞗叶日月載融帝世光宅圅夏同風前臨少室卻負太行制巖東邑峭峘西疆四嶮之地六達之莊恃德則固失道則亡詳觀古昔列見丘墳乃禪乃革或質或文周餘九裂漢季三分魏風衰晚晉景彫曛天地發輝圖書受命皇建有極神功無競魏籙仰天玄符握鏡璽運會昌龍圖受命乃睠書軌永懷保定敷茲景迹流美洪模襲我冠冕正我神樞水陸兼會周郊交衢爰勒洛汭敢告中區洛陽伽藍記護軍將軍高顯碑銘闕告祭石廟祝文天子壽謹遣敞等用駿足一元大武武昭告于皇天之靈自啟闢之初祐我皇祖于彼土田歷載億年聿來南遷惟祖惟父光宅中原克翦凶醜拓定四邊沖人纂業德聲弗彰豈謂幽遐稽首來王具知舊廟弗毀弗亡悠悠之懷希仰餘光王業之興起自皇祖綿綿瓜瓞時惟多祐敢以丕功配饗于天子子孫孫福祿永延魏書禮志一魏先居幽鑿石為祖宗之廟于烏洛侯國西北真君中烏洛侯國遺使朝獻云石甫如故遣中書侍郎李敞詣石室告祭天地以皇祖先妣配祝云云奏留程駿為著作郎夫君之使臣必須終效駿實史才方申直筆千里之任十室可有請留之數載以成前籍後授方伯愚以為允魏書程駿傳皇興中除高密太守尚書李敷奏從之上孝明帝疏請均田臣聞量地畫野經國大式邑地相參致治之本井稅之興其來日久田萊之數制之以限蓋欲使士不曠功民罔游力雄擅之家不獨膏腴之美單陋之夫亦有頃畝之分所以恤彼貧微抑茲貪欲同富約之不均一齊民于編戶竊見州郡之民或因年儉流移棄賣田宅漂居異鄉事涉數世三長既立始返舊墟廬井荒毀桑榆改植事已歷遠易生假冒強宗豪族肆其侵陵遠認魏晉之家近引親舊之驗又年載稍久鄉老所惑群證雖多莫可取據各附親知互有長短兩證徒具聽者猶疑爭訟遷延連紀不判良疇委而不開柔桑枯而不采僥倖之徒興繁多之獄作欲令家豐歲儲人給資用其可得乎愚謂今雖桑井難復宜更均量審其徑術令分藝有準力業相稱細民獲資生之利豪右靡餘地之盈則無私之澤乃播均于兆庶如阜如山可有積于比戶矣又所爭之田宜限年斷事久難明悉屬今主然後虛妄之民絕望于覬覦守分之士永免于陵奪矣魏書李孝伯附傳又見通典一上孝明帝書乞襲爵竊惟庸勳賞勞有國恆典興滅繼絕哲后所先是以積德累忠春秋許宥十世立功著節河山誓其永久伏惟世祖太武皇帝英叡自天籠罩日域東清遼海西定玉門陵滅漠北飲馬江水臣亡父故尚書宣城公先臣孝伯冥基感會邀幸昌辰綢繆幃幄繾綣侍從廟算嘉謀每蒙顧采于時儲后監國奏請徵賢詔報曰朕有一孝伯足以治天下何用多為其見委遇乃至如此是用寵以元凱爵以公侯詔冊曰江陽之巡奇謀屢進六師大捷亦有勳焉出內勤王寵遇隆厚方開大賞而世祖登遐梓宮始遷外任名岳高宗沖年纂運未及追敘臣行舛百靈先臣棄世微績未甄誠志長奪搢紳僉傷早世朝野咸哀不永臣亡兄襲無子封除永惟宗構五情崩圮先臣榮寵前朝勳書王府同之常倫爵封堙墜準古量今實深荼苦竊惟朝例廣川王遵太原公元大曹等竝以勳重先朝世絕繼祀或以傍親或聽弟襲皆傳河山之功垂不世之賞況先臣在蒙委任運籌幃帟勳著于中聲傳于外事等功均今古無易是以漢賞信布裁重良平魏酬張徐不棄荀郭今數族追賞于先朝之世先臣絕封于聖明之詩瞻流顧侶存亡永恨竊見正始中爰發存亡之詔襃賢報功之旨熙平元年故任城王澄所請十事復新前澤成一時之盛事垂曠代之茂典凡在纓紱誰不感慶蓋以獎勸來今菙範萬古且劉氏偽書翻流上國尋其訕謗百無一實前後使人不書姓宇亦無名爵至于張畼傳中略敘先臣對問雖改脫略盡自欲矜高然逸韻難虧猶見稱載非直存益于時沒亦有彰國美乞覽此書昭然可見則微微衰構重起于一朝先臣潛魂結草于千載矣魏書李孝伯傳孝伯封宣城公子安民襲爵壽光侯無子爵除正光三年安民弟豹子上書云云卒不得襲
