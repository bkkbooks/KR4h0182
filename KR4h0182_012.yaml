body:
  text: 孝莊帝大赦改元詔太祖誕命應期龍飛燕代纍世重光載隆帝緒冀欲闡茲洪業永在無窮豈圖多難遘茲百六致使妖悖四起內外競侵朝無恤政之臣野多怨酷之士實由女主專朝致茲顛覆孝明皇帝天情沖順深存隱忍奄棄萬國衆用疑焉苟求胡出入守神器凡厥有心莫不解體太原王榮世抱忠孝功格古今赴義晉陽大會河洛乃推翼朕躬應茲大命德謝少康道愧前緒猥以眇身君臨萬國如涉淵海罔知所濟可大赦天下改武泰為建義元年從太原王督將軍士普加五階在京文官兩階武官三級復天下租役三年魏書孝莊紀答爾朱榮乞贈河陰死者詔覽表不勝鯁塞朕德行無感致茲酷濫尋繹往事實切于懷可如所表魏書爾朱榮傳親理冤獄詔自孝昌之季法令昏泯懷忠守素擁隔莫申深怨宿憾控告靡所其有事在通途橫被疑異名例無爽枉見排抑或選舉不平或賦役煩苛諸如此者不可具説其有訴人經公車注不合者悉集華林東門朕當親理冤獄以申積滯魏書孝莊紀討葛榮詔朕將親馭六戎掃淨燕代大將軍太原王爾朱榮率精甲十萬為左軍上黨王天穆總衆八萬為前軍司徒公楊椿勒兵十萬為右軍司徒公穆紹統卒八萬為後軍魏書孝莊紀以爾朱榮為柱國大將軍詔乾坤統物星象贊其功皇王御運股肱匡其業是以周道中缺齊晉立濟世之忠殷祚或虧彭韋振救時之節自前朝失御厄運荐臻太原王榮爰戴朕躬推臨萬國勳踰伊霍功格二儀王室不壞伊人是賴可封柱國大將軍兼録尚書事餘如故魏書爾朱榮傳下羊深詔羊侃作逆霧起瑕丘擁集不逞扇擾疆埸傾宗之禍侃乃自貽纍世之節一朝毀汙羊深血誠奉國秉操罔二聞弟猖勃自劾請罪此之丹款實戢于懷且叔向復位春秋稱美深之慷慨氣同古人忠烈遠彰赤心已著可令還朝面受委敕魏書羊深傳爾朱榮殺害朝士深第七弟侃為太山太守外託蕭衍深在彭城得侃書斬侃使人并書表聞莊帝乃下詔加蠕蠕主阿那瓌殊禮詔夫勳高者賞重德厚者名隆蠕蠕主阿那瓌鎮衛北藩禦侮朔表遂使陰山息警弱水無塵刊迹狼山銘功瀚海至誠既篤勳緒莫酬故宜標以殊禮何容格以常式自今以後讚拜不言名上書不稱臣魏書蠕蠕傳以爾朱榮為大丞相詔功格天地錫命之位必崇道濟生民褒賞之名宜大是以有莘贊亳不次之號爰歸渭叟翼周殊世之班載集況導源積石襲構崑山門踵英猷弼成鴻業抗高天之摧柱振厚地之絶維德冠五侯勳高九伯者哉太原王榮代荷蕃寵世載忠烈人匡頽運出剿元凶使積年之霧倏焉滌蕩數載之塵一朝清謐燕恆既泰趙魏還蘇比績況功古今莫二若不式稽舊典增是禮數將何以昭德報功遠明國範可大丞相都督河北畿外諸軍事增邑一萬戶通前三萬餘官悉如故魏書爾朱榮傳爾朱榮進位太師詔我皇魏道契神元德光靈範源先二象化穆三才玉曆與日月惟休金鼎共乾坤俱永而正光之末皇運時屯百揆咸亂九宮失敘朝野撫膺士女嗟怨遂使四海土崩九區瓦解遂賊杜周虔劉燕代妖寇葛榮假噬魏趙常山易水戎鼓夜驚冰井叢臺胡塵晝合朔南久已丘墟河北殆成灰燼宗廟懷匪安之慮社稷急不測之憂大丞相太原王榮道鏡域中德光區外神昭藏往思實知來義踵先勳忠資曩烈遂能大建義謀收栠忠勇熊罷競逐虎豹爭先軒翥南溟摶風北極氣震林原勢動山嶽弔民伐罪殲此鯨鯢戮卒多于長平積器高于熊耳秦晉聞聲而喪膽齊莒側聽而讋息中興之業是乎再隆太平之基茲焉更始雖復伊霍宣翼之功桓文崇贊之道何足以髣佛鴻蹤比勳盛烈道格普天仁沾率土振古以來未有其比若不廣錫山河大開土宇何以表大義之崇高標盛德之廣遠可以冀州之長樂相州之南趙定州之博陵滄州之浮陽平州之遼西燕州之上谷幽州之漁陽等七郡各萬戶通前滿十萬戶為大原國邑又進位太師餘如故魏書爾朱榮傳詔報臨淮王彧文穆皇帝勳格四表道邁百王是用考循舊軌恭上尊號王表云漢大上于香街南頓于舂陵漢高不因瓜瓞之緒光武又無世及之德皆身受符命不由父祖別廟異寢于理何差文穆皇帝天眷人宅曆數有歸朕忝承下武遂主神器既帝業有統漢氏非倫若以昔況今不當移寢則魏太祖晉景帝雖王迹已顯皆以人臣而終豈得與餘帝別廟有闕餘序漢郡國立廟者欲尊高祖之德使饗遍天下非關太廟神主獨在外祠薦漢宣之父亦非勳德所出雖不追尊不亦可乎伯考之名自是尊卑之稱何必準古而言非類也復云君臣同列嫂叔共室當以文穆皇帝昔遂臣道以此為疑禮天子元子猶士禘祫豈不得同室乎且晉文景共為一代議者云世限七主無定數昭穆既同明有共室之理禮既有祔嫂叔何嫌禮士祖禰一廟豈無婦舅共室也若專以共室為疑容可更議遷毀魏書臨淮王彧傳莊帝追尊武宣王為文穆皇帝廟號肅祖以高祖為伯考彧與吏部尚書李神俊並有表聞詔報以爾朱榮為天柱大將軍詔周武春時藉十亂以纂曆漢祖先天資三傑以除暴理民濟治斯道未爽使持節柱國大將軍大丞相太原王榮蘊伏風煙抱含日月總奇正以成術兼文武而為資昔處亂朝韜光戢翼秣馬冀北厲兵晉陽佇龍顏而振腕想日角以歎息忠勇奮發虎士如林義功始立所向風靡故能芟夷群惡振此頽綱俾朕寡昧獲承鴻緒雖大位克正而衆盜未息葛榮跋扈仍亂中原建旗伐罪授首殲馘元皓凶頑構成巨釁阻弄吳楚虧汙宗社朕徙御北徂劬勞鞍甲王聞難星奔一舉大定下洽民和上匡王室鴻勳巨績書契所未紀飲至策勳事絶干比況非常之功必有非常之賞可天柱大將軍此官雖訪古無聞今員未有太祖已前增置此號式遵典故用錫殊禮又宜開土宇可增封十萬通前二十萬加前後羽葆鼓吹餘如故魏書爾朱榮傳允楊椿致仕詔椿國之老成方所尊尚遽以高年願言致仕顧懷舊德是以未從但告謁頻煩辭理彌固以茲難奪又所重違今便允其雅志可服侍中朝服賜服一具衣一襲八尺床帳几杖不朝乘安車駕駟馬給扶傳詔二人仰所在郡縣時以禮存問安否方乖詢訪良用憮然魏書楊潘附傳詔答元子思國異政不可據之古事付司檢高祖舊格推處得失以聞魏書宗室元子思傳又見北史十五通典二十四令高道穆總集祕書目録詔祕書圖籍所在內典書又加繕寫緗素委積蓋有年載出內繁蕪多致零落可令御史中尉兼給事黃門侍郎道穆總集帳目并牒儒學之士編比次第魏書高崇附傳敕侍中元祉宗室喪亡非一不可周贍元僕射清苦之節死乃益彰特贈絹百匹餘不得為例魏書任城王附傳元順遇害家徒四壁無物殮尸門下通事令吏王才裂裳覆之莊帝還宮敕侍中祉喻旨爾朱榮帝王迭襲盛衰無常既屬屯運四方瓦解將軍仗義而起前無橫陳此乃天意非人力也我本相投規存性命帝王重位豈敢妄希直是將軍見逼權順所請耳今璽運已移天命有在宜時即尊號將軍必若推而不居存魏社稷亦任更擇親賢共相輔戴魏書爾朱榮傳榮遷帝于河穚至夜四更中復奉帝南還營幕帝憂憤無計乃令人喻旨于榮答群臣勸進自量眇身是以讓執然王公勤至不可拒違今敬承所陳惟愧弗堪負荷耳魏書前廢帝紀大赦改元詔朕以寡薄撫臨萬邦思與億兆同茲慶泰可大赦天下以魏為大魏改建明二年為普泰元年其稅市及稅鹽之官可悉廢之百雜之戶貸賜民名官任仍舊天下調絹四百一匹內外文武普泛四階合敘耒定第者亦沾級除名免官者特復本資品封依舊魏書前廢帝紀改皇帝稱帝詔朕以眇身臨王公之上夕惕祗懷若履冰谷賴七廟之靈百辟忠誠之舉庶免墜歿夫三皇稱皇五帝云帝三代稱王迭沖挹也自秦之末競為皇帝忘負乘之深殃垂貪鄙于萬葉豫今稱帝已為褒矣可普告令知魏書前廢帝紀追贈爾朱榮假黃鉞相國司州牧詔故使持節侍中都督河止諸軍事天柱大將軍大丞相太師領左右兼録尚書北道大行臺太原王榮功濟區夏誠貫幽明天不慦遺奄從物化追終褒績列代通謨紀德銘勳前王令範可贈假黃鉞相國録尚書事司州牧使持節侍中將軍主如故魏書爾朱榮傳追封爾朱榮晉王加九錫詔故假黃鉞持節侍中相國録尚書都督中外諸軍事天柱大將軍司州牧太原王榮惟嶽降靈應期作輔功侔伊霍德契桓文方藉楝梁永康國命道長運短震悼兼深前已褒增用彰厥美然禮數弗窮文物有闕遠近之望猶或未盡宜循舊典更加殊錫可追號為晉王加九錫給九旒鑾輅虎賁班劍三百人轀輬車準晉太宰安平獻王故事諡曰武同上爾朱榮配享高祖廟庭詔武泰之末乾樞中圮丕基寶命有若綴旒晉王榮固天所縱世秉忠誠一匡邦國再造區夏俾我頽綱于斯復振雖勳銘王府德被管絃而從祀之禮于茲尚闕非所以酬懋賞于當時騰殊績于不朽宜遵舊典配享高祖廟庭同上沙汰之徒預參選限詔頃官方失序仍令沙汰定員簡賸已有判決退下之徒微亦可愍諸在簡下可特優一級皆授將軍預參選限隨能補用魏書前廢帝紀標榜刁思遵妻魯氏詔貞夫節婦古人同尚可令本司依式標榜魏書列女傳禁虛增官號詔王度創開彝倫方始所班官秩不改舊章而無識之徒因茲僥幸璆增軍級虛名顯位皆言前朝所授理難推抑自非嚴為條制無以防其偽竊諸有虛增官號為人發糾罪從軍法若八格檢核無名者退為平民終身禁錮魏書後廢帝紀糾罰郡縣漁獵詔自中興草昧典制權輿郡縣之官率多行督假有正者風化未均眷彼周餘專為漁獵朕所以夙興夜寐有惕于懷有司明加糾罰稱朕意焉魏書後廢帝紀
