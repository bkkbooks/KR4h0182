body:
  text: 張彝上歷帝圖表臣聞元天高朗尚假列星以助明洞庭淵湛猶藉衆流以增大莫不以孤照不詣其幽獨深未盡其廣先聖識其若此必取物以自誡故堯稱則天設謗木以曉未明舜稱盡善懸諫鼓以規政闕虞人獻針規之旨盤盂著舉動之銘庶幾見善而思齊聞惡以自改眷眷于悔往之衢孜孜于不逮之路用能聲高百王卓絶中古經十氏而不渝歷二千以孤鬱伏惟太祖揆亂奕代重光世祖以不世之才開蕩函夏顯祖以溫明之德潤伏九區高祖大聖臨朝經營云始未明求衣日昃忘食開翦荊棘徙御神縣更新風軌冠帶朝流海東雜種之渠衡南異服之帥沙西氈頭之戎漠北辮髮之虜重譯納貢請吏稱藩積德懋于夏殷富仁盛于周漢澤教既周武功亦匝猶且發明詔思求直士信是蒼生薦言之秋祝史陳辭之日況臣家自奉國八十餘年紆金鏘玉及臣四世過以小才藉蔭出仕學慚專門武闕方略早荷先帝眷仗之恩末蒙陛下不遺之施侍則出入兩都官歷納言常伯忝牧秦藩號兼安撫實思碎首膏原仰酬二朝之惠輕塵碎石遠增嵩岱之高輒私訪舊書竊觀圖史其帝皇興起之元配天隆家之業修造益民之奇龍麟雲鳳之瑞卑宮愛物之仁釋網改祝之澤前歌後舞之應囹圄寂寥之美可為輝風景行者輒謹編丹青以摽睿範至如太康好田遇窮后迫禍武乙逸禽罹震雷暴酷夏桀淫亂南巢有非命之誅殷紂昏酣牧野有倒戈之陳周厲逐獸滅不旋踵幽王遇惑死亦相尋暨于漢成失御亡新篡奪桓靈不綱魏武遷鼎晉惠暗弱骨肉相屠終使聰曜梟視并州勒虎狼據燕趙如此之輩罔不畢載起元庖犧終于晉末凡十六代百二十八帝歷三千二百七十年雜事五百八十九合成五卷名曰歷帝圖亦謗木諫鼓虞人盤盂之類脫蒙置御坐之側時復披覽冀或起豫左右上補未萌伏願陛下遠惟宗廟之夏近存黎民之念取其賢君棄其惡主則微臣雖沈淪地下無異乘雲登天矣魏書張彝傳上采詩表竊惟皇王統天必以窮幽為美盡理作聖亦假廣采成明故詢于芻蕘著之周什輿人獻針流于夏典不然則美刺無以得彰善惡有時不達逮于兩漢魏晉雖道有隆污而被繡傳檄未始闕也及惠帝失御中夏崩離劉苻專據秦西燕趙獨制關左姚夏繼起五涼競立至使九服搖搖民無定主禮儀典制此焉堙滅暨大魏應曆撥亂登皇翦彼鯨鯢龕靖神縣數紀之間天下寧一傳輝七帝積聖如神高祖遷鼎成周永茲八百偃武修文憲章斯改實所謂加五帝登三王民無德而名焉猶且慮獨見之不明欲廣訪于得失乃命四使觀察風謠臣時忝常伯充一使之列遂得仗節揮金宣恩東夏周歷于齊魯之間遍馳于梁宋之域詢采詩頌研檢獄情實庶片言之不遺美刺之俱顯而才輕任重多不遂心所採之詩並始申目而值鑾輿南討問罪宛鄧臣復忝行軍樞機是務及輦駕之返膳御未和續以大違奄臻四海崩慕遂爾推遷不及聞徹未幾改牧秦蕃違離闕下繼以譴疾相纏寧丁八歲常恐所采之詩永淪丘壑是臣夙夜所懷以為深憂者也陛下垂日月之明行雲雨之施察臣枉罪之濫矜臣貧病之切既蒙崇以祿養復得拜掃丘墳明日友朋無所負愧且臣一二年來所患不劇尋省本書粗有髣佛凡有七卷今寫上呈伏願昭鑒敕付有司使魏代所采之詩不堙于丘井臣之願也魏書張彝傳臨終口占上啓臣自奉國及孫六世尸祿素餐負恩唯靦徒思竭智盡誠終然靡效臣第二息仲瑀所上之事益治實多既日有益寧容默爾通呈有日未簡神聽豈國衆忿乃至于此臣不能禍防未萌慮絶殃兆致令軍衆橫囂攻焚臣宅息始均仲瑀等叩請流血乞代臣死始均即陷塗炭仲瑀經宿方蘇臣年以六十宿被榮遇垂暮之秋忽見此苦顧瞻災酷古今無比臣傷至重殘氣假延望景顧時推漏就盡頃刻待終臣之命也知復何言若所上之書少為益國臣便是生以理全死與義合不負二帝于地下臣無餘恨矣一歸泉壤長離紫庭戀仰天顏誠痛無已不勝眷眷力喘奉辭伏願二聖加御珍膳覆露黔首壽保南嶽德與日升臣宿被芻豢先後銜恩欲報之期昊天罔極亡魂有知不忘結草魏書張彝傳表請伐梁蕭衍狂悖擅斷川瀆役苦民勞危亡已兆然古諺有之敵不可縱夫以一酌之水或為不測之淵如不時滅恐同原草宜命一重將率統軍三十人領羽林一萬五千人并科京東七州虎旅九萬長驅電邁遄令撲討擒斬之勳一如常制賊資雜物悉入軍人如此則鯨鯢之首可不日而懸誠知農桑之時非發衆之日苟事理宜然亦不得不爾昔韋顧跋扈殷后起昆吾之師玁狁孔熾周王興六月之伐臣職忝樞衡獻納是主心之所懷寧敢自默并宜敕揚州選一猛將遣當州之兵令赴浮山表裏夾攻魏書郭祚傳先是蕭衍遣將康絢遏淮將灌揚徐祚表朝議從之奏姦吏逃刑止徙妻子慎獄審刑道煥先古垂憲設禁義纂惟今是以先王沿物之情為之軌法故八刑備于昔典姦律炳于來制皆所以謀其始迹訪厥成罪敦風厲俗永資世範者也伏惟旨義博遠理絶近情既懷愚異不容不述誠以敗法之原起于姦吏姦吏雖微敗法實甚伏尋詔旨信亦斷其逋逃之路為治之要實在于斯然法貴止姦不在過酷立制施禁為可傳之于後若法猛而姦不息禁過不可永傳將何以載之刑書垂之百代若以姦吏逃竄徙其兄弟罪人妻子復應從之此則一人之罪禍傾二室愚謂罪人既逃止徙妻子走者之身懸名永配于眚不免姦途自塞魏書郭祚傳世宗詔以姦吏逃刑懸配遠戍若永避不出兄弟代之祚奏詔從之奏請定考格謹案前後考格雖班天下如臣愚短猶有未悟今須定職人遷轉由狀超越階級者即須量折景明初考格五年者得一階半正始中故尚書中山王英奏考格被旨但可正滿三周為限不得計殘年之勤又去年中以前二制不同奏請裁決旨云黜陟之體自依舊來恆斷今未審從舊來之旨為從景明之斷為從正始為限景明考法東西省文武間官悉為三等考同任事而前尚書盧昶奏上第之人三年轉半階今之考格復分為九等前後不同參差無準魏書郭祚傳北史四十三又奏考察令公清獨者德績超倫而無負殿者為上上一殿為上中二殿為上下纍計八殿品降至九未審今諸曹府寺凡考在事公清然才非獨著績行稱務而德非超倫幹能粗可而守堪任或人用小劣處官濟事并全無負殿之徒為依何第景明三年以來至今十有一載準限而判三應升退今既通考未審為十年之中通其殿最積以為第隨前後年斷各自除其善惡而為升降且負注之章數成殿為差此條以寡愆為最多戾為殿未審取何行是寡愆何坐為多戾結纍品次復有幾等諸文案失衷應杖十者為一負罪依律次過隨負記十年之中三經肆眚赦前之罪不問輕重皆蒙宥免或為御史所彈案驗未周遇赦復任者未審記殿得除以不魏書郭祚傳奏停營明堂國學今雲羅西舉開納岷蜀戎旗東指鎮靖淮荊漢沔之間復須防捍徵兵發衆所在殷廣邊郊多壘烽驛未息不可于師旅之際興板築之功且獻歲云暨東作將始臣愚量謂宜待豐靖之年因子來之力可不時而就魏書郭祚傳時詔營明堂國學詐奏從之奏敕撰祭郭淮廟文闕議親伐江南表臣誠識不周覽頗尋篇籍自魏晉以前承平之世未有皇輿親御六軍決勝行陳之間者勝不足為武弗勝有虧威德明千鈞之弩不為鼷鼠發機故也昔魏武以敝卒一萬而袁紹土崩謝玄以步兵三千而苻堅瓦解勝負不由衆寡成敗在于須臾若用田豐之謀則坐制孟德矣魏既并蜀迄于晉世吳介有江水居其上流大小勢殊德政理絶然猶居臣協謀垂數十載逮孤皓暴戾上下攜爽水陸俱進一舉始克今蕭氏以篡殺之燼政虐役繁又支屬相屠人神同棄吳會之民延踵皇澤正是齊軌之期一同之會若大駕南巡必左衽革面閩越倒戈其猶運山厭卵有征無戰然愚謂萬乘親戎轉漕難繼千里饋糧士有飢色大軍之後必有凶年不若命將簡鋭蕩滌江右然後鳴鸞巡省告成東嶽則天下幸甚率土戴賴臣又聞流言關右之民自比年以來競設齋會假稱豪貴以相扇惑顯然于衆坐之中以謗朝廷無上之心莫此之甚愚謂宜速懲絶戮其魁帥不爾懼成黃巾赤眉之禍育其微萌不芟之毫末斧斤一加恐蹈害者衆臣世奉皇家義均休戚誠知干忤之愆實深然不忠之罪莫大魏書盧玄附傳掩據朐山表蕭衍琅邪郡民王萬壽等款誠內結潛來詣臣云朐山戍今將交換有可圖之機臣即許以旌賞遣其還入至三月二十四夜萬壽等獎率同盟攻掩朐城斬衍輔國將軍琅邪東莞二郡太守帶朐山戍主劉晣并將士四十餘人傳首至州臣即遣兼郯城戍副張天惠率驍勇二百徑往赴之琅邪諸戍絡繹繼援而衍郁洲己遣二軍以拒天惠天惠與萬壽等內外齊擊俘斬數百便即據城魏書盧玄附傳請增兵表蕭衍將張稷馬仙玭陰虔和等各領精兵分屯諸堰昌義之張惠紹王神念王茂光承彼傳信續發建鄴自存之計并歸于此量力準寇事恐不輕何者此兵九千駥衆四萬名將健士遠近畢集邀憑兩熱決死來戰藉衆乘凶希固巢穴所以傾國而舉非為朐山將恐王師固六里據湖衝南截淮浦勢崩難測海利鹽物交闕常貢所慮在大有必爭之心若皇家經略方有所討必須簡將增兵加益糧仗與之亢擬相持至秋天麾一動開拓為易圖南之計事本在今請增兵六千米十萬石如其不也伏聽朝議魏書盧玄附傳又表賊徒大集衆旅強盛置柵朐山屯守門井并圍固城晝夜連戰恐狡勢既強後難除揃輒欲令征虜將軍趙遐率勒見兵與之決勝遐慮衆少不敵若一舉失利則衆心挫怯求待大衆俱至奮鋭擊之竊謂此謀非為孟浪且臣本奉朝規令相拒守以待涼月今歲已云秋高風漸舉經算大圖時事既至且鮑口以東陸運無閡朐固之間本無停潦宜時掩擊邊陲而賊自夏以來貫甲不歇從六里以北城柵相連役使兵人便已疲殆若大衆臨之必可擒捷一城退潰衆壘士崩乘勝圖之易于振朽脫兵不速至長彼熾心軍士憂惶自生異議請速簡配以及事機魏書盧玄袝傳奏白鼠見宜飭吏治謹案瑞典外鎮刺史二千石令長不祗上命刻暴百姓人民怨嗟則白鼠至臣聞禎不虛見德合必符妖不妄出咎彰則至是以古之人君或怠瑞以失德或祗變而立功斯乃萬古之殷鑒千齡之炯誠比者災氣作沴恆陽虧度陛下流如傷之慈降納隍之旨哀百姓之無辜引在豫之深責舉賢黜佞之詔道映于堯先進思納諫之言事光于舜右伏讀明旨俯觀徵譴敢布庸瞽以陳萬一竊惟一夫之耕食裁充口一婦之織衣止蔽形年租歲調則惟常理此外徵求干何取足然自比年以來兵革屢動荊揚二州屯戍不息鍾離義陽師旅相繼兼荊蠻凶狡王師薄伐暴露原野經秋淹夏汝潁之地率戶從戎河冀之境連丁轉運又戰不必勝加之退負死喪離曠十室而九細役煩徭日月滋甚苛兵酷吏因逞威福至使通原遙畛田蕪罕耘連村接閈蠶飢莫食而監司因公以貪求豪強恃私而逼掠遂令鬻裋褐以益千金之資制口腹而充一朝之急此皆由牧守令長多失其人郡闕黃霸之君縣無魯恭之宰不思所以安民正思所以潤屋故士女呼嗟相望于道路守宰暴貪風聞于魏闕往歲法官案驗多挂刑網謂必顯戮以明勸誡然後遣使覆訊公違憲典或承風挾請輕樹私恩或容情受賄輒施己惠御史所劾皆言誣枉申雪罪人更云清白長侮上之源滋陵下之路忠清之人見之而自怠犯暴之夫聞之以益快白鼠之至信而有徵矣伏願陛下垂睿哲之鑒察妖災之起延對公卿廣詢庶政引見樞納博求民隱存問孤寡去其苛碎輕徭省賦與民休息貞良忠讜置之于朝姦回貪佞棄之于市則九官勿戒而恆敬百縣不嚴而自肅士女欣欣人有望矣魏書盧玄附傳盧昶遷散騎常侍兼尚書時洛陽縣獲白鼠昶奏奏府寺議源懷諡不同太常寺議諡曰懷體尚寬柔器操平正依諡法柔直考終曰靖宜諡靖公司徒府議懷作牧陝西民餘惠化入總端二朝列歸仁依諡法布德執義曰穆宜諡穆公二諡不同魏書源賀附傳景明三年源懷卒兼吏部尚書慮昶奏請杜冒功竊階表竊見吏部勳簿多皆改換乃校中兵奏案並復乖舛臣聊爾揀練已得三百餘人明知隱而未露者動有千數愚謂罪雖恩免猶須刊定請遣一都令史與令僕省事各一人總集吏剖中兵二局勳簿對句奏案若名級相應者即于黃素楷書大字具件階級數令本曹尚書以朱印印之明造兩通一關吏部一留兵局與奏案對掌進則防揩洗之偽退則無改易之理從前以來勳書上省唯列姓名不載本屬致令竊濫之徒輕為苟且今請征職白民具列本州郡縣三長之所其實官正職者亦列名貫別録歷階仰本軍印記其上然後印縫各上所司統將都督並皆印記然後列上行臺行臺關太尉太尉檢練精實乃始關刺省重究括然後奏申奏出之日黃素朱印關付吏部頃來非但偷階冒名改換勳簿而已或一階再取或易名受級凡如此者其人不少良由吏部無薄防塞失方何者吏部加階之後簿不注記緣此之故易生僥幸自今敘階之後名薄具注加補日月尚書印記然後付曹郎中別作鈔目印記一如尚書郎中自掌遞代相付此制一行差止姦罔魏書盧同傳肅宗世多竊冒軍功同乃表言云云詔從之又北史三十又奏造勳簿格臣頃奏以黃素為勳具注官名戶屬及吏部換勳之法事目三條已蒙旨許臣伏思黃素勳簿政可粗止姦偽然在軍虛詐猶未可盡請自今在軍閲簿之日行臺軍司監軍都督各明立文案處處記之斬首成一階已上即令給券其券一紙之上當中大書起行臺統軍位號勳人甲乙斬三賊及被傷成階已上亦具書于券各盡一行當行豎裂其券前後皆起年號日月破某處陳某官某勳印記為驗一支付勳人一支付行臺記至京即送門下別函守録又自遷都以來戎車屢捷所以征勳轉多敘不可盡者良由歲久生姦積年長偽巧吏階緣偷增遂甚請自今為始諸有勳簿已經奏賞者即廣下遠近云某處勳判咸令知聞立格酬敘以三年為斷其職人及出身限內悉令銓除實官及外號隨才加授庶使酬勤者速申立功者勸事不經久僥幸易息或遭窮難州無中正者不在此限又勳簿之法征還之日即應申送頃來行臺督將至京始造或一年二歲方上勳書姦偽之原實自由此于今以後軍還之日便通勳簿不聽隔月魏書盧同傳又北史三十幽居賦闕劇鼠賦跖實排虛巢居穴處惟飲噬于山澤悉潛決于林蘌故寢廟有處茂草別所矧乃微蟲乖群異侶干紀而進于情難許爾雅所載厥類多種詳其容質並不足重或處野而隔陰山或同穴而鄰嶓冢或飲河以求飽腹或吸煙而遊森聳然今者之所論出于人家之壁孔嗟乎在物最為可賤毛骨莫充于玩賞脂肉不登于俎膳故淮南輕舉遂嘔腸而莫追東阿體拘徒稱仙而被譴其為狀也憯惔咀吁雎離睒睗鬚似麥穟半垂眼如豆角中劈耳類槐葉初生尾若酒杯餘瀝乃有老者羸髖疥癩偏多姦計衆中無敵託社忌器妙解自惜深臧厚閉丏能推覓或尋繩而下或自地高躑登機緣匱蕩扉動帟切切終朝轟轟竟夕是以詩人為辭實云其碩盜干湯之珍俎傾留髡之香澤傷繡領之斜制毀羅衣之重襲曹舒由是獻規張湯為之被謫亦有間居之士倦遊之客絶慶弔以養真素屏左右而尋詩易庭院肅清房櫳虛寂爾乃群鼠乘間東西擸擲或床上捋髭或戶間出額貌甚舒暇情無畏惕又領其黨與欣欣奕奕欹覆箱奩騰踐茵席共相侮慢特無宜適訝天壤之含弘産此物其何益初學記二十九御覽九百十一嵩高山廟記有神人以玉為形像長數寸或出或隱出則令世延長隋書崔廓傳廊子賾答詔云臣見魏大司農盧元明撰嵩高山廟記案魏書及北史元明未嘗為大司農當是漏落胡太后父廟制議案王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三士一自上已上降殺以雨庶人無廟死為鬼焉故曰尊者統遠卑者統近是以諸侯及太祖天子及其祖之所自出祭法曰諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠去墠為鬼至于禘祫方合食太祖之宮大傳曰別子為祖喪服傳曰公子不得禰先君公孫不得祖諸侯鄭説不得祖禰者不得立其廟而祭之也世世祖是人者謂世世祖受封之君不得祖公子者後世為君者祖此受封之君不得祀別子也公子若在高祖以下則如其親服後世遷之乃毀其廟耳愚以為遷者遷于太祖廟毀者從太祖而毀之若不遷太祖不須廢祖是人之文明非始封故復見乃毀之節何以知之案諸侯有祖考之廟祭五世之禮五禮正祖為輕一朝頓立而祖考之廟要待六世之君六世以前虛而蔑主求之聖旨未為通論曾子問曰廟無虛主虛主唯四祖考不與焉明太祖之廟必不空置禮緯曰夏四廟至子孫五殷五廟至子孫六周六廟至子孫七見夏無始祖待禹而五殷人郊契得湯而六周有后稷及文王至武王而七言夏即大禹之身言子謂啓誦之世言孫是迭遷之時禹為受命不毀親湯為始君不遷五主文武為祧亦不去三昭三穆三昭三穆謂通文武若無文武親不過四觀遠祖漢侍中植所説云然鄭玄馬昭亦皆同爾且天子逆加二祧得并為七諸侯頂立太祖何為不得為五乎今始封君子之立禰廟頗似成王之于二祧孫卿曰有天下者事七世有一國者事五世假使八世天子乃得事七六世諸侯方通祭五推情準理不其謬乎雖王侯用禮文節不同三隅反之自然昭灼且文宣公方為太祖世居子孫今立五廟竊謂為是禮緯又云諸侯五廟親四始封之君或上或下雖未居正室無廢四祀之親小記曰王者禘其祖之所自出以其祖配之而立四廟此實殷湯時制不為難也聊復標榜略引章條愚戇不足以待大問魏書禮志二神龜初靈太后父司徒胡國珍薨贈太上秦公時疑其廟制博士盧觀議
