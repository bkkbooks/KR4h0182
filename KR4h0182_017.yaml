body:
  text: 任城王澄請修立宗室四門學表臣參訓先朝藉規有日前言舊軌頗亦聞之又昔在恆代親習皇宗熟祕序庭無闕日臣每于侍坐先帝未嘗不以書典在懷禮經為事周旋之則不輟于時自鳳舉中京方隆禮教宗室之範每蒙委及四門之選負荷銓量自先升遐未遑修述學宮虛荷四門之名宗人有闕四時之業青襟之緒于茲將廢臣每惟其事竊所傷懷伏惟聖略宏遠四方罕務宴安之辰于是乎在何為太平之世而令子襟之歎興焉聖明之日而使宗人之訓闕焉愚謂可敕有司修復皇宗之學開闢四門之教使將落之族日就月將魏書任城王澄傳討梁表蕭衍頻斷東關欲令巢湖泛溢湖周回四百餘里東關合江之際廣不過數十步若賊計得成大湖傾注者則淮南諸戍必同晉陽之事矣又吳楚便水且灌且掠淮南之地將非國有壽陽去江五百餘里衆庶惶惶竝懼水害脫乘民之願攻敵之虛豫勒諸州纂集士馬首秋大集則南瀆可為飲馬之津霍嶺必成徙倚之觀事貴應機經略須早縱混一不可必果江西自是無虞若猶豫緩圖不加除討關塞既成襄陵方及平原民戍定為魚矣魏書任城王澄傳上表言革世事不宜案校臣聞三季之斃由于煩刑火德之興在干三約是以老聃云法令滋彰盜賊多有又曰其政察察其民缺缺又曰天網恢恢疏而不漏是故欲求治本莫若省事清心昔漢文斷獄四百幾致刑措省事所致也蕭曹為相載其清靜畫一之歌清心之本也今欲求之于本宜以省事為先使在位群官纂蕭曹之心以毗聖化如此則上下相安遠近相信百司不怠事無愆失豈宜擾世教以深文烹小鮮以煩手臣竊惟景明之初暨永平之末內外群官三經考課逮延昌之始方加黜陟五品以上引之朝堂親決聖目六品以下例由敕判自世宗晏駕大宥三行所以蕩除故意與物更始革世之事方相窮核以臣愚見謂為不可又尚書職分樞機出納昔魏明帝卒至尚書門陳矯亢辭帝慚而返夫以萬乘之重非所宜行猶屈一言慚而回駕群官百司而可相亂平故陳平不知錢穀之數丙吉不問僵道之死當時以為達治歷代用為美談但宜各守其職思不出位潔已以勵時靖恭以致節又尋御史之體風聞是司至于冒勳妄考皆有處別若一處有風謠即應攝其一簿研檢虛實若差舛不同僞情自露然後繩以典刑人孰不服豈有移一省之案取天下之簿尋兩紀之事窮革世之尢如此求過誰堪其罪斯實聖朝所宜慎重也魏書任城王澄傳御史中尉東平王匡奏取景明元年以來內外考簿吏部除書中兵勳案并諸殿最欲以案校竊階盜官之人靈太后許之澄表上表諫加女侍中貂蟬高祖世宗皆有女侍中官未見綴金蟬于象珥極鼲貂于鬢髮江南僞晉穆何后有女尚書而加貂璫此乃衰亂之世祅妄之服且婦人而服男子之服至陰而陽故自穆哀以降國統二絶因是劉裕所以纂逆禮容舉措風化之本請依常儀追還前詔北史十八神龜元年詔加女侍中貂蟬同外侍中之飾澄上表諫帝從之畜力聚財表伏惟世宗宣武皇帝命將授旗隨陸啓顙運籌制勝淮漢自賓節用勞心志清六合是故纘武修文仍世彌盛陛下當周康靖治之時豈得晏安于玄默然取外之理要由內彊圖人之本先在自備蕭衍雖虐使其民而窺覦不已若遇我虛疲士民凋窘賊衍年老志張思播虺毒此之弗圖恐受其病伏惟陛下妙齡在位聖德方升皇太后總御天機乾乾夕惕若留意于負荷忿車書之未一進賢拔能重官人之舉標賞忠清旌養人之器修干戈之用畜熊虎之士愛時鄙財輕寶重穀七八年閒陛下聖略方剛親王德幹壯茂將相膂力未衰愚臣猶堪戎伍荷戈帶甲之衆蓄鋭于今燕孤冀馬之盛充牣在昔又賊衍惡積禍盈勢不能久子弟暗悖釁逆已彰亂亡之兆灼然可見兼弱有徵天與不遠大同之機宜須蓄備昔漢帝力疾討滅英布高皇臥病親除顯達夫以萬乘之主豈妄宴安實以侵名亂正計不得已今宜慕二帝之遠圖以肅寧為大任然頃年以來東西難寇艱虞之興首尾連接雖尋得翦除亦大損財力饑饉之氓散亡莫保收入之賦不增出用之負彌衆不愛力以悅民無豐資以待敵此臣所以夙夜懷憂悚息不寧者也易曰何以守位曰仁何以聚人曰財故曰財者非天不生非地不長非時不成非人不聚生聚之由如此其難集人守位若此之重興替之道焉可不慮又古者使民歲不過三日食壯者之糧任老者之智此雖太平之法難卒而因然妨民害財不亦宜戒今墉雉素修廄庫崇列雖府寺膠孰少有未周大抵省府粗得庇憩理務諸寺靈塔俱足致虔講道唯明堂辟雍國禮之大來冬司徒兵至請籌量減徹專力經營務令早就其廣濟數施之財酬商互市之幣凡所營造自非供御切須戎仗急要亦宜微減以務阜積庶無橫損民有全力夫食土簋而媯德昭寢卑室而禹功盛章臺麗而楚力衰阿宮壯而秦財竭存亡之由灼然可覩願思前王一同之功畜力聚財以待時會魏書任城王澄傳靈太后繕興佛寺齊會費損庫藏曲賚左右澄表上言太和五銖與新鑄五銖及古錢宜竝通用臣聞洪範八政貨居二焉易稱天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財財者帝王所以聚人守位成養群生奉順天德治國安民之本也夏殷之政九州貢金以定五品周仍其舊太公立九府之法于是圜貨始行定銖兩之楷齊桓循用以霸諸侯降及秦始漢文遂有輕重之異吳濞鄧通之錢收利遍于天下河南之地猶甚多焉逮于孝武乃更造五銖其中毀鑄隨利改易故使錢有小大之品竊尋大和之錢高祖留心創制後與五銖竝行此乃不刊之式但臣竊聞之君子行禮不求變俗因其所宜順而致用太和五銖雖利于京邑之肆而不入徐揚之市土貨既殊貿鬻亦異便于荊郢之邦者則礙于兗豫之域致使貧民有重困之切王道貽隔化之訟去永平三年都座奏斷天下用錢不依準式者時被敕云不行之錢雖有常禁其先用之處權可聽行至來年末悉令斷之暨延昌二年徐州民儉刺史啓奏求行土錢旨聽權依舊用謹尋不行之錢律有明式指謂雞眼鐶鑿更無餘禁計河南諸州今所行者悉非制限昔來繩禁愚竊惑焉又河北州鎮既無新造五銖設有舊者而復禁斷竝不得行專以單絲之縑疏縷之布狹幅促度不中常式裂匹為尺以濟有無至今徒成杼軸之勞不免飢寒之苦良由分截布帛壅塞錢貨實非救恤凍餒子育黎元謹惟自古以來錢品不一前後纍代易變無常且錢之為名欲泉流不已愚意謂今之太和與新鑄五銖及諸古錢方俗所便用者雖有大小之異竝得通行貴賤之差自依鄉價庶貨環海內公私無壅其不行之錢及盜鑄毀大為小巧僞不如法者據律罪之魏書食貨志熙平初尚書令任城王澄上言又見通典九臣猥屬樞衡庶罄心力常願貨物均通書軌一範謹詳周禮外府掌邦布之入出布猶泉也其藏曰泉其流曰布然則錢之興也始于一品欲令世匠均同圜流無極爰暨周景降逮亡新易鑄相尋參差百品遂令接境乖商連邦隔貿臣比奏求宣下海內依式行錢登被旨敕錢行已久且可依舊謹重參量以為太和五銖乃大魏之通貨不朽之恆模寧可專貿于京邑不行于天下但今戎馬在郊江疆未一東南之州依舊為便至于京西京北域內州鎮未用錢處行之則不足為難塞之則有乖通典何者布帛不可尺寸而裂五穀則有負擔之難錢之為用貫繈相屬不假斗斛之器不勞稱尺之平濟世之宜謂為深允請竝下諸方州鎮其太和及新鑄五銖并古錢內外全好者不限大小悉聽行之雞眼鐶鑿依律而禁河南州鎮先用錢者既聽依舊不在斷限唯太和五銖二錢得用公造新者其餘雜種一用古錢生新之類普同禁約諸方之錢通用京師其聽依舊之處與太和錢及新造五銖竝行若盜鑄者罪重常憲既欲均齊物品廛市斯和若不繩以嚴法無以肅茲違犯符旨一宣仍不遵用者刺史守令依律治罪魏書食貨志又見通典九奏停祫祭應待年終太常卿崔亮上言秋七月應祫祭于太祖今世宗宣武皇帝主雖人廟然丞嘗時祭猶別寢室至于殷祫宜存古典案禮三年喪畢祫于太祖明年春禘于群廟又案杜預亦云卒器而除三年喪畢而禘魏武宣后以太和四年六月崩其月既葬除服即吉四時行事而猶未禘王肅韋誕竝以為今除即吉故特時祭至于禘祫宜存古禮高堂隆亦如肅議于是停不殷祭仰尋太和二十三年四月一日高祖孝文皇帝崩其年十月祭廟景明二年秋七月祫于太祖三年春禘于群廟亦三年乃祫謹準古禮及晉魏之議并景明故事愚謂來秋七月祫祭應停宜待年終乃後祫禘魏書禮志二延昌四年三月甲子尚書令任城王澄奏奏參李琰之等議宗室助祭臣等參量琰之等議雖為始封君子又祭統曰有事于太廟群昭群穆咸在而不失其倫鄭注云昭穆謂同宗父子皆來也言未毀及同宗則共四廟之辭云未絶與父子明崇五屬之稱天子諸侯繼立無殊吉凶之赴同止四廟祖祧雖存親級彌遠告赴拜薦典記無文斯由祖遷于上見仁親之義疏宗易于下著五服之恩斷江陽之于今帝也計親而枝宗三易數世則廟應四遷吉凶尚不告聞拜薦寧容輒預高祖孝文皇帝聖德玄覽師古立政陪拜止于四廟哀恤斷緦宗即之人情冥然符一推之禮典事在難違此所謂明王相沿今古不革者也魏書禮志二熙平二年江陽王繼表言道武曾孫宜得預祭王僧奇議不得祭李琰之議得祭侍中司空領尚書令任城王澄侍中尚書左僕射元暉奏奏請移禘祀在中旬謹案禮記曾子問曰諸侯旅見天子不得成禮者幾孔子曰四太廟火日蝕后之喪雨沾服失容則廢臣等謂元日萬國賀應是諸侯旅見之義若禘廢朝會孔子應云五而獨言四明不廢朝賀也鄭玄禮注云魯禮三年喪畢祫于太祖明年春禘群廟又鄭志檢魯禮春秋昭公十一年夏五月夫人歸氏薨十三年五月大祥七月釋禫公會劉子及諸侯于平丘八月歸不及于祫冬公如晉明十四年春歸祫明十五年春乃禘經曰二月癸酉有事于武宮傳曰禘于武公謹案明堂位曰魯王禮也喪畢祫禘似有退理詳考古禮未有以祭事廢元會者禮云吉事先近日脫不吉容改筮三旬尋攝太史令趙翼等列稱正月二十六日祭亦吉請移禘祀在中旬十四日時祭移二十六日猶曰春禘又非退義祭則無疏怠之譏三光有順軌之美既被成旨宜即宣行臣等伏度國之大事在祀與戎君舉必書恐貽後誚輒訪引古籍竊有未安臣等學缺通經識不稽古備位樞納可不必陳冒陳所見伏聽裁衷魏書禮志二熙平二年十二月侍中司空領尚書令任城王澄度支尚書崔亮奏奏請賞陟及守宰竊惟雲構鬱起澤及百司企春望榮內外同慶至于賞陟不及守宰邇來十年冤訟不絶封回自鎮遠安州入為太尉長史元匡自征虜恆州入作宗卿二人遷授竝在先詔應蒙之理備在于斯兼州佐停私之徒陪臣郡丞之例尚蒙天澤下降榮及當時然參佐之來皆因府主今府主不霑佐官獨預棄本賞末愚謂未允今計刺史守宰之官請準封回悉同泛限上允初旨百司之章下覆訟者元元之心魏書任城王澄傳初正始之末詔百司普升一級而執事者不達旨意刺史守令限而不及澄表重奏臣聞堯懸諫諍之鼓舜置誹謗之木皆所以廣耳目于芻蕘達四聰于天下伏惟太祖開基化隆自遠纍聖相承于今九帝重光疊照污隆必同與奪隨時道無恆體思過如渴言重千金故稱無諱之朝邁蹤三五高祖沖年纂曆文明協統變官易律未為違典及慈聖臨朝母儀寓縣爰發慈令垂心滯獄深枉者仰日月于九泉微屈者希曲照于盆下今乃格以先朝限以一例斯誠奉遵之本心實乖元元之至望在于謙挹有乖舊典謹尋抱枉求直或經纍朝毫釐之差正之宜速謬若千里駟馬弗追故禮有損益事有可否父有諍子君有諫臣琴瑟不調理宜改作是以防川之論小決則通鄉校之言擁則敗國矧伊陳屈而可抑以先朝且先朝屈者非故屈之或有司愛憎或執事澤僻空文致法以誤視聽如此冤塞彌在可哀僭之與濫寧失不經乞收今旨還依前詔魏書任城王澄傳澄奏賞陟宜及守宰詔云事經先朝不得重聞澄重奏奏利國濟民所宜振舉者十條一曰律度量衡公私不同所宜一之二曰宜興學校以明黜陟之法三曰宜興滅繼絶各舉所知四曰五調之外一不煩民任民之力不過三日五曰臨民之官皆須黜陟以旌賞罰六曰逃亡代輸去來年久者若非伎作任聽即住七曰邊兵逃走或實陷沒皆須精檢三長及近親若實隱之徵其代輸不隱勿論八曰工商世業之戶復徵租調無以堪濟今請免之使專其業九曰三長禁姦不得隔越相領戶不滿者隨近并合十曰羽林虎賁邊方有事暫可赴戰常戍宜遣蕃兵代之魏書任城王澄傳奏配四中郎將兵數宜以東中帶滎陽郡南中帶魯陽郡西中帶恆農郡北中帶河內郡選二品三品親賢兼稱者居之省非急之作配以彊兵如此則深根固本彊幹弱枝之義也魏書任城王澄傳時四中郎將兵數寡弱不足以襟帶京師澄奏又重奏固本宜彊防微在豫故雖有文事不忘武功況今南蠻仍獷北妖頻結來事難圖勢同往變脫暴勃忽起振動關畿四府羸卒何以防擬平康之世可以寄安遺之久長恐非善策如臣愚見郎將領兵兼總民職省官實祿于是乎在求還依前增兵益號將位既重則念報亦深軍郡相依則表裏俱濟朝廷無四顧之憂姦宄絶窺覦之望矣魏書任城王澄傳澄奏配四中郎將兵數靈太后初將從之後議者不同乃止澄又重奏云云不納奏修都城府寺都城府寺猶未周悉今軍旅初寧無宜發衆請取諸職人及司州郡縣犯十杖已上百鞭已下收贖之物絹一匹輸磚二百以漸修造魏書任城王澄傳奏劾高陽王雍臣聞賞必以道用防淫人之姦罰不濫及以戒良士之困刑者侀也每垂三宥秉律執請不得已而用之是小大之獄察之以情一人呼嗟或虧王道刑罰得失乃興廢之所由也竊聞司州牧高陽王臣雍栲殺奉朝請韓元昭前門下録事姚敬賢雖因公事理實未盡何者太平之世草不橫伐行葦之感事驗隆周若昭等狀彰死罪以定應刑干都市與衆棄之如其疑似不分情理未究不宜以三清九流之官杖下便死輕絶民命傷理敗法往年在州于大市鞭殺五人及檢贓狀全無寸尺今復酷害一至于此朝野云云咸懷驚愕若殺生在下虐專于臣人君之權安所復用自開古以來明明之世未聞斯比也武王曰吾不以一人之命而易天下蓋重民命也請以見事付廷尉推究驗其為劫之狀察其栲殺之理使是非分明幽魂獲雪魏書任城王澄傳又略見北史十八任城王雲傳奏言尚書奏事防宣露尚書政本特宜遠慎故凡所奏事閣道通之蓋以祕要之切防其宣露寧有古制所重今反輕之內猶設禁外更寬也宜繕寫事意以付公車魏書任城王澄傳奏請以胡國珍參咨大務安定公屬尊望重親賢群矚宜出入禁中參咨大務魏書胡國珍傳尚書令任城王澄奏奏禁私造僧寺仰惟高祖定鼎嵩瀍卜世悠遠慮括終始制洽天人造物開符垂之萬葉故都城制云城內唯擬一永寧寺地郭內唯擬尼寺一所餘悉城郭之外欲令永遵此制無敢踰矩逮景明之初微有犯禁故世宗仰修先志爰發明旨城內不造立浮圖僧尼寺舍亦欲絶其希覬文武二帝豈不愛尚佛法蓋以道俗殊歸理無相亂故也但俗眩虛聲僧貪厚潤雖有顯禁猶自冒營至正始三年沙門統惠深有違景明之禁便云營就之寺不忍移毀求自今已後更不聽立先旨含寬抑典從請前班之詔仍卷不行後來私謁彌以奔競永平二年深等復立條制啓云自今已後欲造寺者限僧五十已上聞徹聽造若有輒營置者依俗違敕之罪其寺僧衆擯出外州爾來十年私營轉盛罪擯之事寂爾無聞豈非朝格雖明恃福共毀僧制徒立顧利莫從者也不俗不道務為損法人而無厭其可極乎夫學迹沖妙非浮識所辨玄門曠寂豈短辭能究然淨居塵外道家所先功緣冥深匪尚華遁苟能誠信童子聚沙可邁于道場純陀儉設足薦于雙樹何必縱其盜竊資營寺觀此乃民之多幸非國之福也然比日私造動盈百數或乘請公地輒樹私福或啓得造寺限外廣制如此斯罔非可稍計臣以才劣誠忝工務奉遵成規裁量是總所以披尋舊旨研究圖格輒遣府司馬陸昶屬崔孝芬都城之中及郭邑之內檢括寺舍數乘五百空地表剎未立塔宇不在其數民不畏法乃至于斯自遷都已來年踰二紀寺奪民居三分且一高祖立制非徒欲使緇素殊途抑亦防微深慮世宗述之亦不錮禁營福當在杜塞未萌今之僧寺無處不有或比滿城邑之中或連溢屠沽之肆或三五少僧共為一寺梵唱屠音連簷接響像塔纏于腥臊性靈沒于嗜欲真僞混居往來紛雜所司因習而莫非僧曹對制而不問其于汙染真行塵穢練僧薰蕕同器不亦甚歟往在北代有法秀之謀近日冀州遭大乘之變皆初假神教以惑衆心終設姦誑用逞私悖太和之制因法秀而杜遠景明之禁慮大乘之將亂始知祖宗睿聖防遏處深履霜堅冰不可不慎昔如來闡教多依山林今此僧徒戀著城邑豈湫隘是經行所宜浮誼必栖禪之宅當由利引其心莫能自止處者既失其真造者或損其福乃釋氏之糟糠法中之社鼠內戒所不容王典所應棄矣非但京邑如此天下州鎮僧寺亦然侵奪細民廣占田宅有傷慈矜用長嗟苦且人心不同善惡亦異或有栖心真趣道業清遠者或外假法服內懷悖德者如此之徒宜辨涇渭苦雷同一貫何以勸善然覩法贊善凡人所知矯俗避嫌物情同趣臣獨何為狐議獨發誠以國典一廢追理至難法網暫失條綱將亂是以冒陳愚見兩願其益臣聞設令在于必行立罰貴能肅物令而不行不如無令罰不能肅孰與亡罰頃明詔屢下而造者更滋嚴限驟施而違犯不息者豈不以假福託善幸罪不加人殉其私吏難苟劾前制無追往之辜後旨開自今之恕悠悠世情遂忽成法今宜加以嚴科特設重禁糾其來違懲其往失脫不峻檢方垂容借恐今旨雖明復如往日又旨令所斷標榜禮拜之處悉聽不禁愚以為樹榜無常禮處難驗欲云有造立榜證公須營之辭指言嘗禮如此則徒有禁名實通造路且徙御已後斷詔四行而私造之徒不懼制旨豈是百官有司怠于奉法將由網漏禁寬容託有他故耳如臣愚意都城之中雖有標榜營造粗功事可改立者請依先制在于郭外任擇所便其地若買得券證分明者聽其轉之若官地盜作即令還宮若靈像既成不可移撤請依今敕如舊不禁悉令坊內行止不聽毀坊開門以妨里內通巷若被旨者不在斷限郭內準此商量其廟像嚴立而逼近屠沽請斷旁屠殺以潔靈居雖有僧數而事在可移者令就間敞以避隘陋如今年正月赦後造者求依僧制案法科治若僧不滿五十者共相通容小就大寺必令充限其地賣還一如上式自今外州若欲造寺僧滿五十已上先令本州表列昭玄量審奏聽乃立有違犯悉依前科州郡已下容而不禁罪同違旨庶仰遵先皇不朽之業俯奉今旨慈悲之令則繩墨可全聖道不墜矣魏書釋老志神龜元年冬司空公尚書令任城王澄奏云云奏可皇太后輿駕議皇太后稱制臨朝躬親庶政郊天祭地宗廟之禮所乘之車宜同至尊不應更有制造周禮魏晉雖有文辭不辨刑制假令欲作恐未合古制而不可以為一代典臣以太常國子二議為疑重集群官竝從今議惟恩裁決魏書禮志四熙平元年六月司空領尚書令任城王澄等五十人議答張普惠書文武之道自昔成規明恥教戰振古常軌今雖非公制而此州承前已有斯式既不勞民損公任其私射復何失也且纂文習武人之常藝豈可于常藝之間要須令制乎比適欲依前州府相率王務之暇肄藝良辰亦未言費用庫物也禮兄弟內除明哀已殺小功客至主不絶樂聽樂則可觀武豈傷直自事緣須罷先以令停方獲此請深具來意魏書張普惠傳澄功衰在身欲于七月七日集會文武北園馬射普惠奏記于澄澄意納其言託辭自罷及答
