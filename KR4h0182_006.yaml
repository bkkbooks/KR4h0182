body:
  text: 卷六孝文帝追贈彭城王協母潘為國太妃詔弟協所生母潘早齡謝世顯號末加協禍與身具痛隨形起今因其展思有足悲矜可贈彭城國太妃以慰存亡魏書彭城王協傳考績黜陟詔三載考績自古通經三考黜陟以彰能否今若待三考然後黜陟可黜者不足為遲可進者大成賒緩是以朕今三載一考考即黜陟欲令愚滯無妨于賢者才能不壅于下位各令當曹考其優劣為三等六品以下尚書重問五品以上朕將親與公卿論其善惡上上者遷之下下者黜之中中者守其本位魏書孝文紀下又通典十五詔太傅元丕中原始稱須朕營視在代之事一委太傅魏書宗室元丕傳帝將北巡遷太傅録尚書事及車駕發代丕留守詔云云敕勒蠻民勿侵暴詔比聞緣邊之蠻多有竊掠致有父子乖離室家分絶既虧和氣有傷仁厚方一區宇子育萬姓若苟如此南人豈知朝德哉可詔荊郢東荊三州敕勒蠻民勿有侵暴魏書孝文紀下詔免元嵩官嵩不能克已復禮企心典憲大司馬薨殂甫爾便以鷹鷂自娛有如父之痛無猶子之情捐心棄禮何其太速便可免官魏書任城王附傳大司馬安定王休薨未及卒哭嵩使遊田高祖聞而大怒詔詔答樓毅時不自來因人則合今年人事殊非昔歲守株之唱便可停也陽九利涉豈卿所知也魏書樓伏連附傳車駕南伐毅表諫詔答報劉芳注弔比干文詔覽卿注殊為富博但文非屈宋理慚張賈既有雅致便可付之集書魏書劉芳傳邢巒策秀詔秀孝殊問經權異策邢巒才清可令策秀魏書邢巒傳有司奏策秀孝高祖詔詔成淹此前車之鑒得不慎乎魏書成淹傳車駕濟淮淹于路左請見詔云云報高道悅詔省所上事深具乃心但卿之立言半非矣當須陳非以示謬稱是以彰得然後明所以而不用有由而為之不爾則未相體耳回材都水暫營嬉遊終為棄物修繕非務舟楫無鄣士女雜亂此則卿之失辭矣深薄之危撫後之重斯則卿之得言也魏書高道悅傳諡馮誕詔案諡法善行仁德曰元柔克有光曰懿昔貞惠兼美受三諡之榮忠武雙徽錫兩號之茂式準前迹宜契具瞻既自少綢繆知之惟朕案行定名諡曰元懿魏書馮熙附傳遷都奉迎靈主詔知太和廟已就神儀靈主宜時奉寧可剋三月三日已巳內奉遷于正廟其金墉之儀一準出代都太和之式入新廟之典可依近至金墉之軌其威儀鹵簿如出代廟百官奉遷宜可省之但令朝官四品已上侍官五品已上及宗室奉迎魏書禮志一通典四十七詔諡馮熙可以威彊恢遠曰武奉諡于公魏書馮熙傳報廣陵王羽內考京官詔雖內考未宣績已久著故明堂月令載公卿大夫論考屬官之治職區分著三公尚書三載殿最之義此之考內已為明矣但論考之事理在不輕問績之方應關朕聽輒爾輕發殊為躁也每考之義應在年終既云此年何得春秋也今始維夏旦待至秋後魏書廣陵王羽傳手詔徵王肅入朝不見君子中心如醉一日三歲我勞如何飾館華林拂席相待卿欲以何日發汝墳地故復此敕魏書王肅傳肅為豫州刺史徵入朝高祖手詔又見北史四十二又詔肅丁荼暴世志等伍胥自拔吳州膺求魏縣躬操忘禮之本而同無數之喪誓雪怨恥方展申復窮諭再期蔬縕不改誠季世之高風末代之孝節也但聖人制禮必均愚智先王作則理齊盈虛過之者俯而就之不及者企而行之曾參居罰寧其哀終吳員處酷豈聞四載夫三年者天下之達喪古今之所一其雖欲過禮朕得不制之以禮乎有司可依禮諭之為裁練禫之制魏書王肅傳臨馮誕墓詔馮大司馬已就墳塋永潛幽室宿草之哭何能忘之魏書馮熙附傳詔太傅元丕今洛邑肇構跂望成勞開闢暨今豈有以天子之重遠赴舅國之喪朕縱欲為孝其如大孝何縱欲為義其如大義何天下至重君臣道懸豈宜苟相誘引陷君不德令僕已下可付法官貶之魏書宗室元丕傳丕又以馮熙薨于代都表求鑾駕親臨詔云云皇太子冠禮有三失詔比冠子恂禮有所闕當思往失更順將來禮古今殊制三代異章近冠恂之禮有三失一朕與諸儒同誤二諸儒違朕故令有三誤今中原兆建百禮惟新而有此三失殊以愧歎春秋襄公將至衛以同姓之國問其季幾而行冠禮古者皆灌地降神或有作樂以迎神昨失作樂至廟庭朕以意而行拜禮雖不得降神于理猶差完司馬彪云漢帝有四冠一緇布二進賢三武辨四通天冠朕見家語冠頌篇四加冠公也家語雖非正經孔子之言與正經何異諸儒忽司馬彪志致使天子之子而行士冠禮此朝廷之失冠禮朕以為有賓諸儒皆以為無賓朕既從之復令有失孔子云斐然成章其斯之謂魏書禮志四十九年五月冠皇太子恂于廟六月高祖臨光極堂引見群官詔又見通典五十六除薛真度為荊州刺史詔真度之罪誠如所奏但頃與安都送款彭方開闢徐宋外捍沈攸道成之師內寧邊境烏合之衆淮海來服功頗在茲言念厥績每用嘉美赭陽百敗何足計也宜異群將更由申後效可還其元勳之爵復除荊州刺史自餘徽號削奪進足彰忠退可明失魏書辥安都附傳真度攻赭陽為房伯玉所敗有司奏免官爵詔云云罷祀鄴中密皇后廟詔婦人外成理無獨祀陰必配陽以成天地未聞有莘之國立太姒之饗此乃先皇所立一時之至感非經世之遠制便可罷祀魏書明元密皇后傳高祖時相州刺史高閭表修后廟詔云云舊墓不聽墾植詔諸有舊墓銘志見存昭然為時人所知者三公及位從公者去墓三十步尚書令僕九列十五步黃門五校十步各不聽墾植魏書孝文紀下賜高閭詔閭昔在中禁有定禮正樂之勳作藩于州有廉清公幹之美自大軍停軫庶事咸豐可謂國之老成善始令終者也每惟厥德朕甚嘉焉可賜帛五百匹粟一千斛馬一匹衣一襲以褒厥勤魏書高閭傳車駕至鄴高祖頻幸其州館詔以高閭為幽州刺史詔閭以懸車之年方求錦知進忘退有塵謙德可降號平北將軍朝之老成宜遂情願徙授幽州刺史令存勸兩修恩法竝舉魏書高閭傳閭每請本州以自效詔云云臨廣川王諧喪詔朕宗室多故從弟諧喪逝悲痛摧割不能已已古者大臣之喪有三臨之禮此蓋三公已上至于卿司已下故應闕自漢已降多無此禮朕欲遵古典哀感從時雖以尊降伏私痛寧爽欲令諸王有朞親者為之三臨大功之親者為之再臨小功緦麻為之一臨廣川王于朕大功必欲再臨再臨者欲于大殮之日親臨盡哀成服之後緦麻而弔既殯之緦麻理在無疑大殮之臨當否如何為須撫柩于始喪為應盡哀于闔棺早晚之宜擇其厥中魏書廣川王略附傳又詔魏晉已來親臨多闕至于戚臣必于東堂哭之頃大司馬安定王薨朕既臨之後復更受慰于東堂今日之事應更哭否魏書廣川王略附傳若大司馬戚尊位重必哭于東堂而廣川既是諸王之子又年位尚幼卿等議之朕無異焉魏書廣川王略附傳廣川王不得就妃葬代詔遷洛之人自茲厥後悉可歸骸邙嶺皆不得就塋恆代其有夫先葬在北婦今喪在南婦人從夫宜還代葬若欲移父就母亦得任之其有妻墳于恆代夫死于洛不得以尊就卑欲移母就父宜亦從之若異葬亦從之若不在葬限身在代喪葬之彼此皆得任之其戶屬恆燕身官京洛去留之宜亦從所擇其屬諸州者各得任意魏書廣川王略附傳有司奏廣川王妃薨于代京未審以新尊從于卑舊為宜卑舊來就新尊詔云議圓丘禮詔朝集公卿欲論圓丘之禮今短晷斯極長日方至案周官祀昊天上帝于圓丘禮之大者兩漢禮有參差魏晉猶亦未一我魏氏雖上參三皇下考叔世近代都祭圓丘之禮復未考周官為不刊之法令以此祭圓丘之禮示卿等欲與諸賢考之厥衷魏書禮志一詔廣陵王羽吾因天曆運乘時樹功開荊拓沔威振楚越時暨三炎息駕汝潁勢臨荊徐聲遏江外未容解甲凱入三川纂兵修律俟秋方舉海服之寄故惟宗良善開經策寧我東夏敬慎汝儀勿墜嘉問唯酒唯田可不戒歟魏書廣陵王羽傳羽為青州刺史高祖親餞之華林園後詔詔于登朕今創禮新邑明揚天下卿父乃行謙讓之表而有直士之風故進卿為太子翊軍校尉魏書于栗磾附傳烈子登引例求進烈表乃引見登詔吏民為刺史服詔今古時殊禮或隆殺專古也理與今違專今也大乖曩義當斟酌兩途商量得失吏民之情亦不可苟順也主簿近代相承服斬過葬便除可如故事自餘無服大成寥落可準諸境內之民為齊衰三月魏書公孫表附傳表孫邃為青州刺史卒于官青州佐吏疑為所服高祖詔制定代人姓族詔代人諸胄先無姓族雖功賢之胤混然未分故官達者位極公卿其功衰之親仍居猥任比欲制定姓族事多未就且宜甄擢隨時漸銓其穆陸賀劉樓干嵇尉八姓皆太祖已降勳著當世位盡王公灼然可知者且下司州吏部勿充猥官一同四姓自此以外應班士流者尋續別敕原出朔土舊為部落大人而自皇始已來有三世官在給事已上及州刺史鎮大將及品登王公者為姓若本非大人而皇始已來職官三世尚已上及品登王公而中閒不降官緒亦為姓諸部落大人之後而皇始已來官不及前列而有三世為中散監已上外為太守子都品登子男者為族若本非大人而皇始已來三世有令己上外為副將子都太守品登侯己上者亦為族凡此姓族之支親與其身有緦麻服已內微有一二世官者雖不全充美例亦入姓族五世已外則各自計之不蒙宗人之蔭也雖緦麻而三世官不至姓班有族官則入族官無族官則不入姓族之例也凡此定姓族者皆具列由來直擬姓族以呈聞朕當決姓族之首末其此諸狀皆須問宗族列疑明同然後句其舊籍審其官宦有實則奏不得輕信其言虛長僥僞不實者訴人皆加傳旨問而詐不以實之坐選官依職事答問不以實之條令司空公穆亮領軍將軍元儼中護軍廣陽王嘉尚書陸琇等詳定北人姓務令平均隨所了者三月一列簿帳送門下以聞魏書官氏志餞南安王楨詔從祖南安既之蕃任將曠違千里豫懷惘戀然今者集雖曰分岐實為曲宴竝可賦詩申意射者可以觀德不能賦詩者可聽射也當使武士彎弓文人下筆魏書南安王楨傳久旱得雨詔炎陽爽節秋零卷澍在子之責實深悚栗故輟膳三晨以命上訴靈鑒誠款曲流雲液雖休勿休寧敢愆怠將有賢人湛德高士凝棲雖加銓采未能招致其精訪幽谷舉茲賢彥直言極諫匡豫不及又邪佞毀朝固唯治蠹貪夫竊位大政以虧主者彈劾不肖明黜盜祿又法為治要民命尢重在京之囚悉命條奏朕將親案以時議決又疾苦六極人神所矜宜時訪恤以拯窮廢鰥寡困乏不能自存者明加矜恤令得存濟又輕徭薄賦君人常理歲中恆役具以狀聞又夫婦之道生民所先仲春奔會禮有達式男女失時者以禮會之又京民始業農桑為本田稼多少課督不具以狀言魏書孝文紀下詔僕射李沖領軍于烈陸睿元丕早大臣自與卿等同受非常之詔朕許以不死之旨思得上下齊信以保大義朕于卿等常忘短棄瑕務相含養豈謂陸睿無心之甚一至于斯乃與穆泰結禍數圖反噬以朕遷洛內懷不可擬舉諸王議引子恂若斯之論前後非一始欲推故南安王次推陽平王若不肯從欲逼樂陵王訕謗朝廷書信炳然事既垂就睿以洛都休明勸令小緩于是之後兩人復競然猶隱而弗聞賴陽平王忠貞奮發獲泰之言便爾馳表得使正人糾慝恆嶽無塵是以睿之愆之失處入門誅朕諦尋前旨許不盡法反逆之志自負幽明違誓在彼不關朕也反心逆意既異餘犯雖欲矜恕末如之何然猶憶先言兼以末頗異議聽自死別府免厥孥戮其門子孫永世不齒元丕二子一弟首為賊端其父無人明證理在可觀但以言無炳灼隱而弗窮以連坐應死特恕為民朕本期有終而彼自棄卿等之閒忽及今日違心乖念一何可悲故此別示想無致怪也謀反之外皎如白日耳魏書陸俟附傳陸睿與穆泰等同謀構逆賜死獄中高祖詔僕射李沖領軍于烈云云沖烈表云云原元拔養子從罪詔僕射之議據律明矣太尉等論于曲矯也養所以從戮者緣其已免所生故不得復甄于所養此獨何福長處吞舟于國所以不襲者重列爵特立制因天之所絶推而除之耳豈復報對刑賞于斯則應死可特原心魏書李沖傳沙門道登喪詔朕師登法師奄至徂背痛怛摧慟不能已已比樂治慎喪未容即赴便準師義哭諸門外績素之魏書釋老志引武興王楊集始入宴詔劉昶集始邊方之酋不足以當諸侯之禮但王者不遺小國之臣況此蕃垂之主故勞公卿于此魏書劉昶傳為鳩摩羅什舊堂所建浮圖詔羅什法師可謂神出五寸志入四行者也今常住寺猶有遺地獄悅修蹤情深遐遠可于舊堂所為建三級浮圖又見逼昏虐為道殄軀既暫同俗禮應大子胤可推訪以聞當加敘接魏書釋老志恤老病詔哀貧恤老王者所先鰥寡六疾尤宜矜愍可敕司州洛陽之民年七十已上無子孫六十已上無朞親貧不自存者給以衣食及不滿六十而有廢痼之疾無大功之親窮困無以自療者皆于別坊遣醫救護給醫師四人豫請藥物以療之魏書孝文紀下命公孫延景宣詔房伯玉天無二日土無兩王是以躬總六師蕩一四海宛城小戍豈足以禦抗王威深可三思封侯胙士事塹俯仰魏書房法壽附傳朕親率麾旆遠清江沔此之小戍豈足徘徊王師但戎輅所經纖介須殄宜量力三思自求多福且卿早蒙蕭賾殊常之眷曾不懷恩報以應露蕭鸞妄言入繼道成賾子無孑遺卿不能建忠于前君方立節于逆豎卿之罪一又頃年傷我偏師卿之罪二今鑾旆親戎清一南服不先面縛待罪麾下卿之罪三卿之此戍多則一年中則百日少則三旬剋殄豈遠宜善思之後悔無及魏書房法壽附傳詔彭城王協明便交敵可敕將士肅爾軍儀魏書彭城王協傳詔答彭城王協割身存國理為遠矣但汝亦我及減已助國職俸便停親國二事聽三分受一魏書彭城王協傳協表以國秩職俸親恤以裨軍國詔答增彭城王協邑戶詔朕形疲稚年心勞長歲積思成痾頓發汝潁弟六弟協孝均周弟感侔姬旦遺食捨寐動止必親敦醫勸膳誠力俱竭致茲保康實賴同氣又秉務緝政百司是憑綱維折衷萬揆獲濟撫師于霖浩之辰處戎于薦逼之日安外靜內功臣大道侍省之績可以孔懷無褒翼亮之勤實乃勳存社稷宜有酬賞以旌國功可增邑一千戶魏書彭城王協傳又詔彭城王協汝在私能孝處公必忠比來勤憂足布朝野但可祗應魏書彭城王協傳
