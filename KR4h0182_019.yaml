body:
  text: 元孚陳賑恤阿那瓌便宜表皮服之人未嘗粒食宜從俗因利拯其所無昔漢建武中單于款塞時轉河東米糒二萬五千斛牛羊三萬六千頭以給之斯即前代和戎撫新柔遠之長策也乞以悖牛產羊餬其口命且畜牧繁息是其所便毛血之利惠兼衣食又尚書奏云如其仍住七州隨宜置之臣謂人情戀本寍肯徙內若依臣請給賑雜畜愛本重鄉必還舊土如其不然禁留益損假令逼徙事非久計何者人面獸心去留難測既易水草痾恙將多憂愁致困死亡必甚兼其餘類尚在沙磧脫出狂悖翻歸舊巢必殘掠邑里遺毒百姓亂面方塞未若杜其未萌又貿遷起于上古交易行于中世漢與胡通亦立關市北人阻饑命懸溝壑公給之外必求市易彼若願求宜見聽許營大者不計小名圖遠者弗拘近利雖戎狄衰盛歷代不同叛服之情略可論討周之北伐僅獲中規漢氏外攘裁收下策昔在代京恆為重備將帥勞止甲士疲力前世苦之計未能致今天祚天魏亂亡在彼朝廷垂天覆之恩廓大造之德鳩其散亡禮送令返宜因此時善思遠策竊以理雖萬變可以一觀來事雖懸易以往卜昔漢宣之世呼韓款塞漢遣董忠韓昌領邊郡士馬送出朔方因留衛助又光武時亦令中郎將段彬置安集椽史隨單于所在參察動靜斯皆守吉之元龜安邊之勝策計今朝廷成功不減曩時蠕蠕國敝亦同疇日宜準昔成謨略依舊事借其所閑地聽使田牧粗置官屬示相慰撫嚴戒邊兵以見保衛馭以寬仁縻以久策使親不至矯詐疏不容叛反今北鎮諸將舊常云一人代外邏因令防察所謂天子有道守在四夷者也先人有奪人之心待降如受彊敵武非專外亦以防內若從處分割配諸州鎮遼遠非轉輸可到悔叛之情變起難測又居人畜業布在原野戎夷性貪見則思盜防彼肅此少兵不堪渾流之際易相干犯驅之還本未必樂去配州內徙復不肯從既其如此為費必大魏書臨淮王譚附傳修樂器表昔太和中中書監高閭太樂令公孫崇脩造金石數十年閒乃奏成功時大集儒士攷其得失太常卿劉芳請別營造久而方就復召公卿量校合否論者沸騰莫有適從登彼旨敕竝見施用往歲大軍入洛戎馬交馳所有樂器亡失垂盡臣至太樂署問太樂令張乾龜等云承前以來置宮懸四箱簨𧇽六架東北架編黃鍾之磬十四雖器名黃鍾而聲實夷則攷之音制不甚諧韻姑洗懸于東北太薂編于西北蕤賓列于西南竝皆器象差位調律不和又有儀鍾十四虛懸架首初不叩擊今便刪廢以從正則臣今據周禮鳧氏脩廣之規磬氏倨句之法吹律求聲叩鐘求音損除繁雜討論實錄依十二月為十二宮各準辰次當位懸設月聲既備隨用擊奏則會還相為宮之義又得律呂相生之體今量鐘磬之數各以十二架為定魏書臨淮王譚附傳教武表國朝偃武崇文偏捨來久州鎮兵人或有雄勇不閑武蓺今取歲暮之暇番上之日訓其兵法弓矢千槊三分竝教使人閑其能臨事無闕魏書咸陽王禧傳考格表竊惟三載考績百王通典今任事上中者三年升一階散官上第者四載登一級閑𤕠之官本非虛置或以賢能而進或因累勤而舉如其無能不應忝茲高選既其以能進之朝伍或任官外戍遠使絕域催督逋懸察檢州鎮皆是散官以充劇使及于考陟排同閑伍檢散官之人非才皆劣稱事之輩未必悉賢而考閑以多年課煩以少歲上乖天澤之均下生不等之苦又尋景明之格無折考之文正始之奏有與奪之級明參差之考非聖慈之心改典易常乃有司之意又尋考級之奏委于任事之手涉議科勤絕于散官之筆遂使在事者得展自勤之能散輩者獨絕披衿之所抑以上下之閑限以旨格之判致使近侍禁職抱槃屈之辭禁衛武夫懷不申之恨欲剋平四海何以獲諸又散官在直一玷成尢銜使愆失差毫即坐徽纆所逮未以事閑優之節慶之賚不以祿微加賞罪殿之犯未殊任事考陟之機推年不等臣聞君舉必書書而不法後代何觀詩云王事靡盬不遑啟處又曰豈不懷歸畏此𥳑書依依楊柳以敘治兵之役霏霏雨雪又申振旅之勤若折往來日月便是采薇之詩廢杕杜之歌罷又任事之官吉凶請假定省埽拜動歷十旬或因患重請動輒經歲征役在途勤泰百倍苦樂之勢非任事之倫在家私閑非理務之日論優語劇先宜折之武人本挽上格者為羽林次格者為虎賁下格者為直從或累紀征戍靡所不涉或帶甲連年負重干里或經戰損傷或年老衰竭今試以本格責其如初有爽于先退階奪級此便責以不衰理未通也又蕃使之人必抽朝彥或歷嶮千餘或履危萬里登有死亡之憂咸懷不返之憾魂骨奉忠以尸將命先朝賞格酬以爵品今朝改式止及階勞折以代考有乖使望非所以獎勵皇華而敦崇四牡者也復尋正始之格汎後任事上中者三年升一階汎前任事上中者六年進一級三年一考自古通經今以汎前六年昇一階檢無愆犯倍年成級以此推之明以汎代考新除一日同霑階榮下第之人因汎上陟上第之士由汎而退臣又見部尉資品本居流外刊諸明令行之已久然近為里巷多盜以其威輕不肅欲進品清流以壓姦𤕠甄深啟云為法者施而觀之不便則改竊謂斯言有可采用聖慈昭覽更高宰尉之秩今考格始宣懷怨者眾臣竊觀之亦謂不可有光國典改之何難魏書高陽王雍傳又見通典十五自陳六罪表臣初入柏堂見詔旨之行一由門下而臣出君行不以悛意每覽傷矜視之慘目深知不可不能禁制臣之罪一也臣近忝內樞兼尸師傅宜保護躬溫清晨夕而于忠身居武司禁勒自在限以內外朝謁𥳑絕皇居寢食所在不知社稷安危又亦不預出入柏堂尸位而已臣之罪二也忠規欲殺臣賴在事執拒又令僕卿相任情進黜遷官授職多不經旬斥退賢良專納心腹威振百寮勢傾朝野臣見其如此欲出忠為雍州刺史鎮撫關右在心未行反為忠廢忝官尸祿孤負恩私臣之罪三也先帝升遐儲宮纂統斯乃君父之恆謨臣子之永則加賞之義自古無之忠既人臣受恩先帝喪禍之祭竭節是常迎陛下于東宮臣下之恆事如其不爾更欲何為而忠意氣淩雲坐要封爵爾日抑之交恐為禍臣以權臣所欲不敢輒違即集王公卿士議其多少清河王臣懌先帝懿弟識度寬明臨眾唱議非以勤而賞之憚違權臣之旨望顏而授臣知不可因而從之臣之罪四也忠秉權門下且居宰執又總禁旅為崇訓衛尉身兼內外橫于宮掖臣之罪五也古者重罪必令三公會期至旬日所以重死刑也先帝登極十有七年細人犯刑猶寬憲墨朝廷貴仕不戮一人今陛下踐阼年未半周殺僕射尚書如夭一草是忠秉權矯旨擅行誅戮臣知不能救臣之罪六也臣位荷師相年未及終難恕之罪顯露非一何情以處何顏以生雖經恩宥猶有餘責謹反私門伏聽司敗魏書高陽王雍傳靈太后臨朝出于忠為冀州刺史雍表請限賤妾奴婢服飾表王公已下賤妾悉不聽用織成綿繡金玉珠璣違者以違旨論奴婢悉不得衣綾綺纈止于縵繒而已奴則布服竝不得以金銀為釵帶犯者鞭一百魏書高陽王雍傳雍領司州牧表請云云太后從之而不能久行也奏禁鹽池復置監司取稅鹽池天藏資育群生仰惟先朝限者亦不苟與細民競茲贏利但利起天池取用無法或豪貴封護或近者吝守卑賤遠來超然絕望是以因置主司令其裁察彊弱相兼務令得所且十一之稅自古及今取輒以次所濟為廣自爾霑洽遠近齊平公私兩宜儲益不少及鼓吹主簿王後興等詞稱請供百官食鹽二萬斛之外歲求輸馬千匹牛五百頭以此而推非可稍計後中尉甄琛啟求罷禁被敕付議尚書執奏稱琛啟坐談則理高行之則事闕請依常禁為允詔依琛計乃為繞池之民尉保光等擅自固護語其障禁倍于官司取與自由貴賤任口若無大宥罪合推斷詳度二三深乖王法臣等商量請依先朝之詔禁之為便防姦息暴斷遣輕重亦準前旨所置監司一同往式魏書食貨志神龜初太師高陽王雍太傳清河王懌等奏于是復置監官以監檢焉奏請用辥欽船運計運漕之利今古攸同舟車息耗實相殊絕欽之所列關西而已若域內同行足為公私巨益謹輒參量備如前計庶徵召有減勞止小康若此請蒙逐必須溝洫通流即求開興修築或先以開治或古迹仍在舊事可因用功差易此冬閑月令疏通咸訖比春水之時使運漕無滯魏書食貨志三門都將辥欽上言造船以易車運于公私為便錄尚書高陽王雍尚書僕射李崇等奏奏分置阿那瓌婆羅門蠕蠕代跨絕域感化歸附那瓌委質于前婆羅門歸誠于後漢時呼韓得同今美竊聞漢立南北單于晉有東西之稱皆所以相維禦難為國藩籬今臣等參議以為懷朔鎮北士名無結山吐若奚泉敦煌北西海郡即漢晉舊障二處寬平原野彌沃阿那瓌宜置西吐若奚泉婆羅門宜置西海郡各令總率部落收離聚散其爵號及資給所須唯恩裁處彼臣下之官任其舊俗阿那瓌所居既是境外宜少優遣以示威刑請沃野懷朔武川鎮各差二百人令當鎮軍主監率給其糧仗送至前所仍于彼為其造構功就聽還諸于北來在婆羅門前投化者令州鎮上佐準程給糧送詣懷朔阿那瓌鎮與使人量給食稟在京館者任其去留阿那瓌草創先無儲積請給朔州麻子乾飯二千斛官駝運送婆羅門居于西海既是境內資衛不得同之阿那瓌等新造藩屏宜各遣使持節馳驛先詣慰喻并委經略魏書蠕蠕傳正光二年十月錄尚書事高陽王雍尚書令李崇侍中侯剛尚書左僕射元欽侍中元叉侍中安豐王延明吏部尚書元修義尚書李彥給事黃門侍郎元纂張烈盧同等奏又見通典一百九十六費羊皮張回事議州處張回專引盜律檢回所犯本非和掠保證明然去盜遠矣今引以盜律之條處以和掠之罪原情究律實為乖當如臣鈞之議知買掠良人者本無罪文何以言之群盜彊盜無首從皆同和掠之罪故應不異明此自無正條引類以結罪臣鴻以轉賣流漂罪與掠等可謂罪人斯得案賊律云謀殺人而發覺者流從者五歲刑已傷及殺而還蘇者死從者流已殺者斬從而加功者死不加功者流詳沈賤之與身死流漂之與腐骨一存一亡為害孰甚然賊律殺人有首從之科盜人賣買無唱和差等謀殺之與和掠同是良人應為準例所以不引殺人減之降從彊盜之一科縱令謀殺之與彊盜俱得為例而以從輕其義安在又云知人掠盜之物而故買者以隨從論此明禁暴掠之原遏姦盜之本非謂買之于親尊之手而同之于盜掠之刑竊謂五服相賣俱是良人所以容有差等之罪者明去掠盜理遠故從親疏為差級尊卑為輕重依律諸共犯罪者皆以發意為首明賣買之先有由魁末之坐宜定若羊皮不云賣則回無買心則羊皮為元首張回從坐首有沾刑之科從有極默之戾推之憲律法刑無據買者之罪宜各從賣者之坐又詳臣鴻之議有從他親屬買得良人而復真賣不語後人由狀者處同掠罪既一為婢賣與不賣俱非良人何必以不賣為可原轉賣為難恕張回之愆宜鞭一百賣子葬親孝誠可美而表賞之議未聞刑罰之科已降恐非敦風厲俗以德導民之謂請免羊皮之罪公酬賣直魏書刑罰志通典一百六十七南郊明堂配食議竊以尚德尊功其來自昔郊稷宗文周之茂典仰惟世祖太武皇帝以神武纂業剋清禍亂德濟生民功加四海宜配南郊高祖孝文皇帝大聖膺期惟新魏道刑措勝殘功同天地宜配明堂魏書禮志二熙平二年三月北海王雍清河王懌廣平王懷任城王澄胡國珍崔光等議停元匡所制尺度議伏惟高祖創改權量已定匡今新造微有參差且匡云所造尺度與漢志王莽權斛不殊又晉中書監荀勖云後漢至魏尺長于古四分有餘于是依周禮積黍以起度量惟古玉律及鐘遂改正之尋勖所造之尺與高祖所定毫釐略同及侍中崔光得古象尺于時亦準議令施用仰惟孝文皇帝德邁前王睿明下燭不刊之式事難變改臣等參論請停匡議永遵先皇之制魏書廣平王洛侯附傳匡所制尺度訖太師高陽王雍等議
