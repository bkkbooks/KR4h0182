body:
  text: 陽固北都賦闕南都賦闕演賾賦紹有周之遐軌兮初錫世于河陽建甸侯而列爵兮與王室而竝昌遭季葉之紛亂兮仍矯迹于良鄉棄侯衛之楨弼兮乃植根于幽方自祖考而輝烈兮逮余躬而翳微懼堂構之頹撓兮恐崩毀其洪基心惴惴而慄慄兮若臨深而履薄登喬本而長吟兮抗幽谷而靡託何身輕而任重兮懼顛墜于峻壑憑神明之扶助兮雖幽微而獲存賴先后之醇德兮乃保護其遺孫伊日月之屢遷兮何四時之相逼知年命之有期兮慨斡流之不息傷艱躓之相承兮悲屯蹇而日臻心側愴而不懌兮乃有懷于古人或垂綸于渭濱兮有胥靡于傅巖既應繇而赴兆兮作殷周之元鑒孔栖栖而不息兮終見黜于庶邦墨馳騁而不已兮亦舉世而不容有鸞孤而爭國兮有讓位而采薇有躍馬而赴會兮有棲遲以俟時曹納辛而袁亡兮哀戮田而曹盛鮑授州而得時兮韓棄牧而失性趙堯門而誕聖兮終天隱而不繁衛泯軀于世難兮啟洪業于宣元釋皋繇之法憲兮見蓼六之先亡諫疑枉于怨獄兮寍于公之獨昌明禍福之同門兮知休咎之異塗尋倚伏之無源兮或先詘而後舒賜憑軒而策駟兮撫清琴而自娛憲服敝于陋巷兮蘊六蓺于蓬廬勃計行而致位兮錯謀合而身傾蕭功成而福集兮韓勳立而禍并紛回平而綿結兮亮未識其幽情有積毀而恩昵兮有積譽而寵衰或形乖而意合兮或身密而志離情與貌而紛競兮體與識而交馳且流言而見疑兮先緣謗而益信樂食子而中疏兮已放麑而日進或舉世而稱賢兮偶不合于主心或居鄉而三黜兮獨為時之所欽或負鼎而干主兮或杖策于幽林或望旗而色阻兮或臨危而撫琴道有大而由小兮義有顯而必微理貴在于得要兮事終成于會機每一日而三省兮亦有念而九思孰有是而可是兮孰有非而可非石育子而啟夏兮鳦遺卵而孕殷鳥藉冰而存棄兮虎乳孩以字文發昇舟而魚躍兮季潛軀而覆雲或揮戈而爭帝兮或洗耳而辭君道曲成而不一兮神參差而異兆茲聖達之末明兮豈前修之克了迷白日之近遙兮有方闚于天表且臨海而觀瀾兮何津源之杳杳文遷繹而身徂兮景守節而災移湯改祝而革命兮靈投策而詬龜圉據胎而為巨兮友發文而自相風吹鶂而襄墜兮神壓紐而平王彼嬴縮之由人兮信吉凶之在已或勤憂以減齡兮亦安樂而獲祉弟成師而害兄兮父純臣而烹子識同命于三君兮兆先見于矞姒始樓桑而發輝兮終龍變于巴庸繞閶門而結慶兮鬱蟬蛻于三江水浩浩而襄陵兮竊息壤而瘠之鯀殛死于羽山兮禹宣力而營之鑿龍門以通河兮疏九江而入海總九州以攸同兮甄五都之所在雖父子之同氣兮乃業行之丕改以患蹇為福兮痛比干之殘軀以佞諛為獲安兮哂宰嚭之見屠以舉士而受賞兮悼史遷之腐刑以進為無益兮見鄂秋之專城以仁義為桎梏兮信揖讓之勞疲以放曠為懸解兮傷六親之乖離哀越種之被戮兮嘉范蠡之脫羈欽四皓之高尚兮歎伊周之陟危望仗鉞而先鋒兮光安車而弗顧求封賞于寸心兮夢台袞于遠慮或忌賢而獨立兮或篡君以自樹既思匿而名揚兮亦求清而反汙見眾兆之紛錯兮覩變化之無方心營營而擾擾兮乃探衷而準常儼端坐于敝筵兮始拂龜而整筴冀靈鑒之佑余兮願告余以忠益龜發兆以施靈兮利去華而守約蓍布列而成卦兮保龍潛而勿躍踵嘉遯之玄蹤兮追考槃于巖壑登名山目恬澹兮辭朝市之紛若奉貞吉于占繇兮翻夕警而晨裝揖許公于箕嶺兮諮夷齊于首陽瞻嵩華之嵁崿兮眺恆碣之磄陵江湖之駭浪兮昇醫閭以尚羊乘玄虬之奕奕兮鳴玉鑾之瑲瑲浮滄波而濯足兮入三山而解裳謁伯禹于塗山兮詰三苖于三危登蒼梧而遐眺兮訪二妃于有媯追祝融于荊芉兮問洛宓于馮夷陵回飆而上驤兮窮深谷而下馳沿扶水而遠矚兮見虞淵之威微乘閬風之峻阪兮覿王母于崦嵫昇瑤臺而奏歌兮坐瓊室而賦詩託赤水以寄命兮附光風以傳辭出崑岫之崢嶸兮入汜林之杳鬱采鍾山之玉瑛兮收珠澤之珂珬攜羽民而遠游兮探長生之妙術騰雲霧而窈冥兮變域中之穢質望玄闕之寂寥兮過寒門而懷悲揖若士于霄際兮求霧塵于海湄憑帝臺而肆眺兮歷層冰而風馳越弱水之渟濙兮躡不周之嶮巇屑瓊蕊以為糧兮斟玉液以為漿結秋蘭以為珮兮攬白蜺以為裳聳景雲而上征兮撫閶闔而啟扉肅百神而警策兮奏中皇于紫微聆鈞天而九變兮耽廣樂而忘歸忽心移而志駭兮戀舊京而依依握招搖以為旆兮巡天漢而下游建雲旗之逶迤兮御回風之瀏瀏策王良以斂轡兮命風伯以挾輈符屏翳以清路兮告河鼓以具其舟聊右次于析木兮遹回駕于青丘請古人于首陽兮亦問道于爽鳩覩三韓之累累兮見卉服之悠悠瞻雒常之鬱鬱兮貢楛矢之啾啾心怊怊而惕惕兮志憫憫而緜緜伊五嶽之塠塠兮何四海之涓涓瞻九河其如帶兮觀三江其沈然夫五都之揔揔兮尚何足以遊盤彼八方之局促兮殊無可以達觀方吞霞而棄粒兮亦屑玉而煉丹漱醴泉以養氣兮吸沆瀣以當餐蔭建木之長柯兮援木禾之脩莖咀玉髓而充渴兮嚼正陽以長生參松喬而撫翰兮侶浮丘而上征嗟域中之默默兮詎攄寫其深情情盤桓而猶䂊兮志孤疑而未決久放蕩而不還兮心惆悵而不悅憶慈親于故鄉兮戀先君于丘墓回遊駕而改轅兮縱歸轡而緩御僕眷眷于短銜兮馬依依于跬步還故園而解羈兮入茅宇而返素耕東皋之沃壤兮釣北湖之深潭養慈顏于婦子兮競獻壽而薦甘朝樂酣于濁酒兮夕寄忻于素琴誦風雅以導志兮蘊六籍于胸襟敦儒墨之大教兮崇逸民之遠心播仁聲于終古兮流不朽之徽音進不求于聞達兮退不營于榮利泛若不繫之舟兮湛若不用之器不潔其身兮不屑于位不拘小節兮不求曲備資靈運以託已兮任性命之遭隨既聽天而委化兮無形志之兩疲除紛競而靖默兮守沖寂以無為寄後賢以藉賞兮寍怨時之弗知辭曰稟元承命人最靈兮夭壽否泰本天成兮體源究道歸聖哲兮隨化委遇能達節兮顯親揚名德之上兮保家全身亦厚量兮趣世浮動違性命兮鑒始究終同水鏡兮志願不合思遠遊兮陵虛騁志從所求兮周歷四極騰八表兮形勞志沮未衷道兮反我遊駕養慈親兮躬耕練蓺齊至人兮魏書陽尼附傳王顯奏免固官既無事役遂闔門自守著演賾賦以明幽微通塞之事其詞曰上讜言表臣聞為治不在多方在于力行而已當今之務宜早正東儲立師傅以保護立官司以防衛以係蒼生之心攬權衡親宗室彊幹弱枝以立萬世之計舉賢良黜不肖使野無遺才朝無素餐孜孜萬幾躬勤庶務使民無謗讟之響省徭役薄賦斂脩學官遵舊章貴農桑賤工賈娓談虛窮微之論簡桑門無用之費以存元元之心以救飢寒之苦上合昊天之心下悅億兆之望然後備器械脩甲兵習水戰滅吳會撰封禪之禮襲軒唐之軌同彼七十二君之徽號協定鼎嵩河之心副高祖殷勤之寄上與三皇比隆下與五帝齊美豈不茂哉臣位卑識昧言不及義屬聖明廣訪敢獻瞽言伏願陛下留神少垂究察魏書陽尼附傳時世宗廣訪得失因上讜言表駮封祖冑韓雅哲韓神固鼓吹議案祖冑議以功德有喪鼓吹不作雅哲議齊衰卒哭簫管必陳準之輕重理用未安聖人推情以制服據服以副心何容拜虞生之奠于神宮襲衰麻而奏樂大燧一移哀情頓盡反心以求豈制禮之意也就如所言義服恩輕既虞而樂正服一朞何以為斷或義服尊正服卑如此之比復何品節雅哲所議公子之喪非嫡者既殯之後義不闕樂案古雖有尊降不見作樂之文未詳此據竟在何典然君之于臣本無服體但恩誠相感致存隱惻是以仲遂卒垂笙籥不入智悼在殯杜蕢明言豈大倫之痛既殯而樂乎又神固等所議以為笳鼓不在樂限嗚饒以警眾聲笳而清路者所以辨等列明貴賤耳雖居哀恤施而不廢粗而言之似如可通攷諸正典未為符合案詩云鍾鼓既設鼓鍾伐鼛又云於論鼓鍾於樂辟雍言則相連豈非樂乎八音之數本無笳名推而類之簫管之比豈可以名稱小殊而不為樂者若以王公位重威節宜崇鼓吹公給不可私辭者魏絳和戎受金石之賞鍾公勳茂蒙五熟之賜若審功膺賞君命必行豈可陳嘉牢于齊殯之時擊鍾磬于祔之後尋究二三未有依據國子職兼文學令問所歸宜明據典謨曲盡斟酌率由必衷以辨深惑何容總議竝申無所析剖更詳得失據典正議魏書禮志四五經疑問問王者受命水火相生曰五精代感稟靈者興金德方隆禎發華渚水運告昌瑤光啟祚人道承天天理應實受謝既彰玄命若契相生之義有允不違至如湯武革命殺伐是用水火為次遵而不改既事乖代終而數同納麓順逆且殊禎運宜異而兆徵不差有疑符應問禹以鯀配天舜不尊父曰明明上天下士是冒道高者負扆四方神積者郊原斯生是以則天不能私其子紹堯不敢尊其父鯀既罪彰于山川受殛于羽裔化質與鱗甲為群銘精不能上乘箕尾而厚尊配于國陽當升煙之大禮苟存及躬以亂祀典降上帝為罪鬼之賓奏夾鍾為介蟲之樂奏天之道不乃有淪乎問湯尊稷廢柱曰神積道存異世同尊列山見享綿紀前代成湯革命承天當愆陽之運不思理數之有無黜元功于百世且畢箕感應風雨異徵尊播殖之靈而邀滂澍之潤升廢之道無乃謬與若柱不合薦虞夏應失之于前如以歲久宜遷百神可計日而代求之二三未究往旨問湯剋桀欲遷夏社為不可武王滅紂以亳社為亡國之誡曰神無定方唯人為主道協無為天地是依棄德弗崇百靈更祀周武承天禮存咸秩升后稷當四圭之尊貶士祗隔牲幣之享就如言之稷稟靈威誠允聿追之宜社非商祖孝孚乃考之咎殷鑒致誡何獨在斯問易著革命之文而無揖讓之象曰玄黃剖別人道為尊含靈佇化故義始元道是以飛龍啟徵大人載就及理運相推帝圖異序虞賓以為善終順守有慚未盡不顯揖讓之象而著已日之美豈可兆巨釁為貽厥之謀訓萬世而開安忍之闕求之反衷未識理恕問周禮秋官司烜氏邦若屋誅為明竁焉曰王道貴產法理尚恩舊德見食八象載其美五宥三刺禮經寶其仁是以祿父巨釁殷禮不輟三監亂德蔡胤猶存罪莫極于無上逆莫甚于違天行大辟禍不及族理正刑愆止于身何惡當參夷之禍何戾受淪殄之辜問儀禮繼母出嫁從為之服傳云貴終其恩曰繼母配父本非天屬與尊合德名義以興兼鞠育有加禮服是重既體違義盡棄節毀慈作嬪異門為鬼他族神道不全何終恩之有方齊服是追哭于野次苟存降重無乃過猶不及乎問禮記生不及祖父母父母稅喪已則否曰服以恩制禮由義立慈母三年孫無緦葛者以戚非天屬報養止身祖雖異域恩不及已但正體于下可無服乎且縞冠玄武子姓之服縓練之後縗絰已除猶懷慘素未忍從吉況斬焉初之創巨方始復弔之賓尚改緇襲奉哀苫次而無追變孝子孝孫豈天理是與問左氏傳齊人殺哀姜君子以為不可曰受醮從天人倫所重保育異宗承奉郊奠而乃肆極昏淫禍傾合巹之尊怙亂無終殄滅誕鞠之愛齊桓匡翼四方正存刑矩割不忍之恩行至公之法方生貶違以殺為甚而神道幽默禍降未期雖窮勃履朝臣不宜糾既事反人靈咎將有所施之取衷孰為優允問公羊傳王者之後郊天曰神不謬享帝無妄尊介丘偏祀猶不歆季氏之旅昊天至重豈可納廢饗之虔唐虞已往事無斯典三后已降始見其文揖讓之冑禮不上通昏瘉後燼四圭是主此便至道相承乾無二統純風既詖玄牡肆尊禮不虛革庶昭異聞問穀梁傳魯僖三十一年夏四月十郊不從乃免牲傳曰乃者亡乎人之辭也曰樂以觀風禮為教本其細已甚民不堪命齊不加兵屈于周典僖公魯之盛君告誡虔祀穆卜迎吉而休徵不至若推咎于天則神不棄鑒歸愆于人則頌聲宜替既命龜失辰靈威弗眷郊享不從配天斯缺即傳所言殆非虛美何承而制問尚書胤征羲和詰其罪乃季秋月朔辰弗合于房曰衡紀不移日月有度炎涼啟辰次舍無代履端屢臻歸餘成閏是以爰命羲和升準徂節使晷數應時火流協運致望舒後律耀靈爽次即官闕永容可為愆玄象一差未成巨戾且杪秋豈回星之辰授衣非合璧之月敘食弗當積失加誅律度暫差便遘殄絕仁者之兵義不妄興王赫斯舉將有異說問毛詩十月之交朔日辛卯日有食之亦孔之醜曰日月次周行舍有常分至之候不為愆咎今同之辰而為深戾者專以金木相殘指日成釁推步不一容可如之若讁見正陽日維戊午生育相因猶子歸母但以陰陽得無深忌乎若為忌也朔亦應為災如不忌也辛卯豈獨成醜且舉凡之始以屬月時繫之在日有爽明例義不妄構理用何依問論語河不出圖泣麟自傷曰聖人稟靈天地資識未形齊生死于一同等榮辱于彼我孔子自生不辰從心告齒樂正既修素王斯著方興吾已之歎結反袂之悲進涉無上之心退深負杖之懼聖達之理無乃缺如魏書房法壽附傳
