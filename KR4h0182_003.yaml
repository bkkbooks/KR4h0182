body:
  text: 卷三孝文帝一求言詔朕猥承前緒纂戎鴻烈思隆先志緝熙政道群公卿士其各勉厥心匡朕不逮諸有便民利國者具狀以聞魏書孝文紀上求直言極諫詔朕纂承皇極照臨萬方思闡遐風光被兆庶使朝有不諱之音野無自蔽之響疇咨帝載詢及芻蕘自今已後群官卿士下及吏民各聽上書直言極諫勿有所隱諸有便宜益治利民可以正風俗者有司以聞朕將親覽與三事大夫論其可否裁而用之魏書孝文紀上改元太和詔朕夙承寶業懼不堪荷而天貺具臻地瑞並應風和氣晼天人交協豈朕沖昧所能致哉實賴神祇七廟降福之助今三正告初祗感交切宜因陽始協典革元其改今號為太和元年魏書孝文紀上勸農桑詔今牧民者與朕共治天下者也宜簡以徭役先之勸獎相其水陸務盡地利使農夫外布桑婦內勤若輕有徵發致奪民時以侵擅論民有不從長教惰于農桑者加以罪刑魏書孝文紀上督課田農詔朕政治多闕災眚屢興去年牛疫死傷太半耕墾之利富有虧損今東作既興人須肄業其敕在所督課田農有牛者加勤于常歲無牛者倍庸于餘年一夫制治田四十畝中男二十畝無令人有餘力地有遺利魏書孝文紀上通典一工役不染清流詔工商皂隸各有厥分而有司縱濫或染清流自今戶內有工役者推上本部丞已下準次而授若階藉元勳以勞定國者不從此制魏書孝文紀上斬不裸形詔刑罰所以禁暴息姦絶其命不在裸形其參詳舊典務從寬仁魏書刑罰志又詔民由化穆非嚴刑所制防之雖峻陷者深甚今犯法至死同入斬刑去衣裸體男女媟見豈齊之以法示之以禮者也令具為之制魏書刑罰志詔皮歡喜夫忠臣生于德義之門智勇出于將相之族往年氐羌放命侵竊邊戌都將皮喜梁醜奴等或資父舊勳或身建殊效威名著于庸漢公義列于天府故授以節鉞委閫外之任並罄力盡鋭克荷所司霜戈始動蟻賊奔敗仇池旋復民夷晏安及討葭蘆又梟凶醜元惡俱殲窺𨵦永息朕甚嘉之其所陳計略商校利害料其應否寧邊益國專之可也今軍威既振群愚懾服革斃崇新有易因之勢寬猛之宜任其量處應立郡縣者亦聽銓置其楊文度楊鼠親屬家纍部送赴臺仇池南秦之根本守禦資儲特須豐積險阻之要尤宜守防令姦覘之徒絶其僥幸勉勤戎務綏靜新俗懷民安上稱朕意焉魏書皮豹子附傳皮喜為仇池鎮將攻拔葭蘆城斬楊文度孝文詔盧昶使江南詔卿便至彼勿存彼我密邇江揚不早當晚會是朕物卿等欲言便言無相疑難魏書盧玄附傳北史三十定婚葬律令詔婚聘過禮則嫁娶有失時之斃厚葬送終則生者有縻費之苦聖王知其知此故申之以禮數約之以法禁乃者民漸奢尚婚葬越軌致貧富相高貴賤無別又皇族貴戚及士民之家不惟氏族高下與非類婚偶先帝親發明詔為之科禁而百姓習常仍不肅改朕念憲章舊典祗案先制著之律令永為定準犯者以違制論魏書孝文紀上詔敕勿吉國三國同是藩附宜共和順勿相侵擾魏書勿吉國傳太和初遣使乙力支稱密共百濟並力取高句麗請其可否詔敕明功罪詔懸爵于朝而有功者必縻其賞懸刑于市而有罪者必罹其辜斯乃古今之成典治道之實要諸州刺史牧民之官自頃以來遂各怠慢縱姦納賂背公緣私致今盜賊並興侵劫滋甚姦宄之聲屢聞朕聽朕承太平之運屬千載之期思光洪緒惟新庶績亦望蕃翰群司敷德宣惠以助沖人共成斯美幸克已復禮思愆改過使寡昧無愧于祖宗百姓見德于當世有司明為條禁稱朕意焉魏書孝文紀上詔皮歡喜速城駱谷卿受命專征薄伐邊寇軍威所及即皆平蕩復仇池之舊鎮破葭蘆之新邦梟擒首逆割翦凶黨勳庸之美朕無間然仇池國之要藩防守事宜尢須完實從前以來駱谷置鎮是以姦賊息窺𨵦之心邊城無危敗之禍近由徙就建安致有往年之役前敕卿等部率兵將駱谷築城雖有一時之勤終致永延之固而卿等不祇詔命至于今日徒使兵人稽頓無事間停方復曲辭表求罷下豈是良將忘身憂國盡忠之謂也諸州之兵已復一歲宜暫戮力成此要功卿等表求來年築城豈不更勞兵將孰若因今兵勢即就之一勞永逸事不再舉也今更給軍糧一月速于駱谷築城使四月盡必令成就訖若不時營築乃築而不成成而不固以軍法從事魏書皮豹子附傳賜國老綿布詔昔四代養老問道乞言朕雖沖昧每尚其美今賜國老各衣一襲綿五斤絹布各五匹魏書孝文紀上令樂部五日一詣高允詔允年涉危境而家分養薄可令樂部絲竹十人五日一詣允以娛其志魏書高允傳罷候職詔治因政寬斃由網密今候職干數姦巧弄威重罪受賕不列細過吹毛而舉其一切罷之魏書刑罰志憂旱詔朕承乾緒君臨海內夙興昧旦如履薄冰今東作方興庶類萌動品物資生膏雨不降歲一不登百姓飢乏朕甚懼焉其敕天下祀山川群神及能興雲雨者修飾祠堂薦以牲璧民有疾苦所在存問魏書孝文紀上決遣罪囚赴農詔廷尉者天下之平民命之所懸也朕得惟刑之恤者仗獄官之稱其任也一夫不耕將或受其餒一婦不織將或受其寒今農時要月百姓肆力之秋而愚民陷罪者甚衆宜隨輕重決遣以赴耕耘之業魏書孝文紀上南伐與劉昶詔卿識機體運先覺而來卿宗廟不復血食朕聞斯問矜忿兼懷今遣大將軍率南州甲卒以伐逆豎剋蕩凶醜翦除民害氛穢既清即胙卿江南之土以興蕃業魏書劉昶傳恤獄囚詔隆寒雪降諸在徽纆及轉輸在都或有凍餒朕用愍焉可遣侍臣詣廷尉獄及有囚之所周巡省察飢寒者給以衣食桎梏者代以輕鎖魏書孝文紀上詔責高句麗王槤道成親殺其君竊號江左朕方欲興滅國于舊邦繼絶世于劉氏而卿越境外交遠通篡賊豈是藩臣守節之義今不以一過掩卿舊款即送還藩其感恕思愆祗承明憲輯寧所部動靜以聞魏書高句麗傳時光州于海中得槤所遣詣蕭道成使餘奴等送闕高祖詔責槤法秀逆黨降罪詔法秀妖詐亂常妄説符瑞蘭臺御史張求等一百餘人招結奴隸謀為大逆有司科以族誅誠合刑憲且矜愚重命猶所弗忍其五族者降止同祖三族止一門門誅止一身魏書孝文紀上沙門法秀謀反伏誅祈雨詔時雨不霑春苗萎悴諸有骸骨之處皆敕埋藏勿令露見有神祇之所悉可禱祈魏書孝文紀上決遣獄囚詔乃者邊兵屢動勞役未息百姓因之輕陷刑網獄訟煩興四民失業朕每念之用傷懷抱農時要月民須肆力其敕天下勿使有留獄久囚魏書孝文紀上為馮太后造塔詔朕以虛寡幼纂寶曆仰恃慈明緝寧四海欲報之德正覺是憑諸鷙鳥傷生之類宜放之山林其以此地為太皇太后經始靈塔魏書文成文明馮后傳賜程駿詔程駿歷官清慎言事每愜又門無俠貨之賓室有懷道之士可賜帛六百匹旌其儉德魏書程駿傳復靈丘等州郡租調詔靈丘郡土既褊塉又諸州路衝官私所經供費非一往年巡行見其勞瘁可復民租調十五年魏書孝文紀上復南七州常調詔蕭道成逆亂江淮戎旗頻舉七州之民既有征運之勞深乖輕徭之義朕甚愍之其復常調三年魏書孝文紀上停捕貢虎狼詔虎狼猛暴食肉殘生取捕之日每多傷害既無所益損費良多從今勿復捕貢魏書孝文紀上行幸虎圈詔免災民租算詔朕以寡薄政缺和平不能仰緝緯象蠲益六沴去秋淫雨洪水為災百姓嗷然朕用嗟愍故遣使者循方賑恤而牧守不思利民之道其于取辦愛毛反裘甚無謂也今課督未入及將來租算一以丏之有司勉加勸課以要來穰稱朕意焉魏書孝文紀上對狀不實詔朕每思知百姓之所疾苦以增修寬政而明不燭遠實有缺焉故具問守宰苛虐之狀于州郡使者秀孝計掾而對多不實甚乖朕虛求之意宜案以大辟明罔上必誅然情猶未忍可恕罪聽歸申下天下使知後犯無恕魏書孝文紀上詔群官朕承祖宗夙夜惟懼然聽政之際猶慮未周至于案文審獄思聞己過自今群官奏事當獻可替否無或面從俾朕之過彰于遠近魏書孝文紀上崇異苟頽詔頽為台鼎論道是寄歷奉四朝庸績彌遠宜加崇異以彰厥功自茲已後可永受復除魏書苟頽傳旌兕先氏詔老生不仁侵陵貞淑原其強暴便可戮之而女守禮履節沒身不改雖處草萊行合古迹宜賜美名以顯風操其標墓旌善號曰貞女魏書涇州貞女兕先氏傳女許嫁彭老生未及成禮輒往逼之女不肯從老生怒而刺殺之有司劾以死罪詔云云又見北史九十一作貞女兒氏禁同姓為婚詔淳風行于上古禮化用乎近葉是以夏殷不嫌一族之婚周世始絶同姓之娶斯皆教隨時設治因事改者也皇運初基中原未混撥亂經綸日不暇給古風遺朴未遑釐改後遂因循迄茲莫變朕屬百年之期當後仁之政思易質舊式昭惟新自今悉禁絶之有犯以不道論魏書孝文紀上班祿大赦詔置宜班祿行之尚矣周禮有食祿之典二漢著受俸之秩逮于魏晉莫不聿稽往憲以經綸治道自中原喪亂茲制中絶先朝因循未遑釐改朕永鑒四方求民之瘼夙興昧旦至于憂勤故憲章舊典始班俸祿罷諸商人以簡民事戶增調三匹穀二斛九斗以為官司之祿均預調為二匹之賦即兼商用雖有一時之煩終克永逸之益祿行之後贓滿一匹者死變法改度宜為更始其大赦天下與之惟新魏書孝文紀上令官民各上便宜詔帝業至重非廣詢無以致治王務至繁非博采無以興功先王知其如此故虛已以求過明恕以思咎是以諫鼓置于堯世謗木立于舜庭用能耳目四達庶類咸熙朕承纍聖之洪基屬千載之昌運每布遐風景行前式承明之初班下內外聽人各盡規以補其闕中旨雖宣允稱者少故變時法遠遵古典班制俸祿改更刑書寬猛末允人或異議思言者莫由申情求諫者無因自達故令上明不周下情壅塞今制百辟卿士工商吏民各上便宜利民益治損化傷政直言極諫勿有所隱務令辭無煩華理從簡實朕將親覽以知世事之要使言之者無罪聞之者足以為戒魏書孝文紀上班俸詔俸制已立宜時班行其以十月為首每季一請魏書孝文紀上焚圖讖詔圖讖之興起于三季既非經國之典徒為妖邪所憑自今圖讖祕緯及名為孔子閉房記者一皆焚之留者以大辟論又諸巫覡假稱神鬼妄説吉凶及委巷諸卜非墳典所載者嚴君禁斷魏書孝文紀上令官民各上書極諫詔昔之哲王莫不博采下情勤求針諫建設旌鼓詢納芻蕘朕班祿刪刑慮不周允虛懷讜直思顯洪猷百司卿士及工商吏民其各上書極諫靡有所隱魏書孝文紀上以李沖為咸陽王禧師詔仲尼在鄉黨猶尚恂恂周文王為世子卑躬求道禧等雖連萼宸暉得不尊尚師傅也故為置之以加令德廷尉卿李沖可咸陽王師魏書咸陽王禧傳還買飢民良口詔數州災飢饉荐臻致有賣鬻男女者天之所譴在豫一人而百姓無辜橫罹艱毒朕用殷憂夕惕忘食與寢今自太和六年已來買定冀幽相四州飢民良口者盡還所親雖聘為妻妾遇之非理情不樂者亦離之魏書孝文紀上均田詔朕承乾在位十有五年每覽先王之典經綸百氏儲畜既積黎元永安爰暨季葉斯道陵替富強者并兼山澤貧弱者望絶一廛致令地有遺利民無餘財或爭畝畔以忘軀或因飢饉以棄業而欲天下太平百姓豐足安可得哉今遣使者循行州郡與牧守均給天下之田還受以生死為斷勸課農桑興富民之本魏書孝文紀上詔報司馬躍此地若任稼穡雖有獸利事須廢封若是山澗虞禁何損尋先朝置此豈苟藉斯禽亮亦以俟軍行薪蒸之用其更論之魏書司馬楚之附傳答高閭詔覽表具卿安邊之策比當與卿面論一二魏書高閭傳
