body:
  text: 王延業皇太后輿駕議案周禮王后有五輅重翟以從王祠厭翟以從王饗賓客安車以朝見于王翟車以親桑輦車宮中所乘又漢輿服志云秦并天下閲三代之禮或曰殷瑞山車金根之色殷人以為大輅于是始皇作金根之車漢承秦制御為乘興太皇太后皇太后皆御金根車加交絡帷裳非法駕則乘紫罽軿車雲虡文畫輈黃金塗五末蓋瓜在右騑駕三馬阮諶禮圖并載秦漢已來輿服遺云金根輅皇后法駕乘之以禮婚見廟乘輅后法駕之以親桑安車后小駕乘之以助祭山軿車后行則乘之紺罽軿車后小行則乘之以哭公主邑君王妃公侯夫人入閣輿后出人閣宮中小遊則乘之晉先蠶儀注皇后乘雲母安車駕六騩案周秦漢晉車輿儀式互見圖書雖名號小異其太較略相依擬金根車雖起自秦造即殷之遺制今之乘輿五輅是其象也華飾典麗容觀莊美司馬彪以為孔子所謂乘殷之輅即此之謂也案阮氏圖桑車亦飾以雲母晉之雲母車即是一與周之翟車其用正同安車既名同周制又用同重翟山軿車案圖飾之以紫紺罽軿車雖制用異于厭翟而實同用于今入閣輿與輦其用又同案圖今之黑漆畫扇輦與周之輦車其形相似竊以為秦減周制百事創革官名軌式莫不殊異漢魏因循繼踵仍舊雖時有損益而莫能反古良由去聖久遠典儀殊缺時移俗易物隨事變雖經賢哲祖襲無改伏惟皇太后睿聖淵凝照臨萬物動循典故貽則後王今輒竭管見稽之周禮考之漢晉採諸圖史驗之時事以為宜依漢晉法駕則御金根車駕四馬加交絡帷裳御雲母車駕四馬以親桑其非法駕則御紫罽軿車駕三馬小駕則御安車駕三馬以助祭小行則御紺罽軿車駕三馬以哭公主王妃公侯夫人宮中出入則御畫扇輦車案舊事比之周禮唯闕從王饗賓客及朝見于王之乘竊以為古者諸侯有朝會之禮故有從饗之儀今無其事宜從省略又今之皇居宮掖相逼就有朝見理無結駟即事考實亦宜闕廢又哭公主及王妃周禮所無施之于今實合事要損益不同用捨隨時三代異制其道然也又金根及雲母駕馬或三或六訪之經禮無駕六之文今之乘輿又皆駕四義符古典宜仍駕四其餘小駕宜從駕三其制用形飾備見圖志魏書禮志四熙平元年六月太學博士王延業議胡太后父廟制議梁王制云諸侯祭二昭二穆與太祖之廟而五又小記云王者立四廟鄭玄云高祖以下與始祖而五明立廟之正以親為限不過于四其外有大功者然後為祖宗然則無太祖者止于四世有太祖乃得為五禮之正文也文王世子云五廟之孫祖廟未毀雖為庶人冠娶必告鄭玄云實四廟而言五廟者容高祖為始封君之子明始封之君在四世之外正位太祖乃得稱五廟之孫若未有太祖已祀五世則鄭無為釋高祖為始封君之子也此先儒精義當今顯證也又喪服傳曰若公子之子孫有封為國君者則世世祖是人也不祖公子鄭玄云謂後世為君者祖此受封之君不得祀別子也公子若在高祖以下則如其親服後世遷之乃毀其廟爾明始封猶在親限故祀止高祖又云如親而遷尢知高祖之父不立廟矣此又立廟明法與今事相當者也又禮緯云夏四廟至子孫五殷五廟至子孫六注云言至子孫則初時未備也此又顯在緯籍區別若斯者也又晉初以宣帝是始封之君應為太祖而以猶在祖位故唯祀征西已下六世待世世相推宣帝出居太祖之位然後七廟乃備此又依準前軌若重規襲矩者也竊謂太祖者功高業大百世不遷故親廟之外特更崇立苟無其功不可獨居正位而遽見遷毀且三世已前廟及于五玄孫已後祀止于四一與一奪名位莫定求之典禮所未前聞今太土秦公疏爵列土大啓河山傳祚無窮永同帶礪實有始封之功方成不遷之廟但親在四世之內名班昭穆之序雖應為太祖而尚在禰位不可遠探高祖之父以合五者之數太祖之室當須世世相推親盡之後乃出居正位以備五廟之典夫循文責實理貴允當考創宗祊得禮為美不可苟薦虛名取榮多數求之經記竊謂為允又武始侯本無采地于皇朝制令名準大夫案如禮意諸侯奪宗武始四時蒸嘗宜于秦公之廟魏書禮志二神龜初靈太后父司徒胡國珍薨贈太上秦公時疑其廟制太學博士王延業議宗室助祭議案孝經曰郊祀后稷以配天宗祀文王于明堂以配上帝然則太祖不遷者尊王業之初基二祧不毀者旌不朽之洪烈其旁枝遠胄豈得同四廟之親哉故禮記婚義曰古者婦人先嫁三月祖廟未毀教于公宮祖廟既毀教于宗室又文王世子曰五廟之孫祖廟未毀雖庶人冠娶必告死必赴不忘親也親未絶而列于庶人賤無能也鄭注云赴告于君也實四廟言五者容顯考為始封君子故也鄭君別其四廟理協二祭而四廟者在當世服屬之內可以與于子孫之位若廟毀服盡豈得同于此例乎敢竭愚昧請以四廟為斷魏書禮志二江陽王繼表言道武曾孫宜得預祭靈太后令議定以聞王僧奇等議又見通典五十一改葬尼太后服制議案喪服雖云改葬緦文無指據至于注解乖異不同馬融王肅云本有三年之服者鄭及三重然而後來諸儒符融者多與玄者少今請依馬王諸儒之議至尊宜服緦案記外宗為君夫人猶內宗鄭注云為君服斬夫人齊衰不敢以親服至尊也今皇太后雖上承宗廟下臨朝臣至于為姑不得過期計應無服其清河汝南二王母服三年亦宜有緦自餘王公百官為君之母妻唯期而己並應不服魏書禮志四神龜元年十一月崔光上言四門博士劉季明議又略見通典一百二謹檢喪服并中代雜論記云改葬緦鄭注臣為君子為父妻為夫親見尸柩不可以無服故服緦三年者緦則期以下無服竊謂鄭氏得服緦之旨謬三月之言如臣所見請依康成之服緦既葬而除魏書禮志四神龜元年十一月太常博士鄭六議又略見通典一百二上言船運租調計京西水次汾華二州恆農河北河東正平平陽五郡年常綿絹及資麻皆折公物雇車牛送京道險人敝貴公損私略計華州一車官酬絹八匹三丈九尺別有私民雇價布六十匹河東一車官酬絹五匹二丈別有私民雇價布五十匹自餘州郡雖未練多少推之遠近應不減此今求車取雇絹三匹市材造船不勞採斫計船一艘舉十三車車取三匹合有三十九匹雇作手并匠及船上雜具食直足以成船計一船利絹七十八匹布七百八十匹又租車一乘官格四十斛成載私民雇價遠者五斗布一匹近者一石布一匹準其私費一車布遠者八十匹近者四十匹造船一艘計舉七百石準其雇價應有一千四百匹今取布三百匹造船一艘并船上覆治雜事計一船有利布一千一百匹又其造船之處皆須鋸材人功并削船茹依功多少即給當州郡門兵不假更召汾州有租調之處去汾不過百里華州去河不滿六十並令計程依舊酬價車送船所船之所運唯達雷陂其陸路從雷陂至倉庫調一車雇絹一匹租一車布五匹則于公私為便魏書食貨志議用辥欽船運計效立于公濟民為本政列于朝潤國是先故大禹疏決以通四載之宜有漢穿引受納百川之用厥績顯于當時嘉聲播于圖史今校辥欽之説雖迹驗未彰而指況甚善所云以船代車是其策之長者若以門兵造舟便為闕彼防禦無容全依宜令收雇車之物市材執作及倉庫所須悉以營辦七月之始十月初旬令州郡綱典各租調于將所然後付之十車之中留車士四人佐其守護粟帛上船之日隨運至京將共監慎如有耗損其倍徵河中缺失專歸運司輸京之時聽其即納不得雜合違失常體必使量上數下謹其受入自餘一如其列計底柱之難號為天險迅驚千里未易其功然既陳便利無容輒抑若效充其説則附例酬庸如其不驗徵填所損今始開創不可懸生減折且依請營立一年之後須知贏費歲遣御史校其虛實脫有乖越別更裁量魏書食貨志答有司符問立準以調八音狀前被符問京房準定六十律之後雖有器存曉之者鮮至熹平末張光等猶不能定絃之急緩聲之清濁仲儒授自何師出何典籍而云能曉但仲儒在江左之日頗愛琴又嘗覽司馬彪所撰續漢書見京房準術成數昞然而張光等不能定仲儒不量庸昧竊有意焉遂竭愚思鑽研甚久雖未能測其機妙至于聲韻頗有所得度量衡曆出自黃鍾雖造管察氣經史備存但氣有盈虛黍有巨細差之毫釐失之千里自非管應時候聲驗吉凶則是非之原諒亦難定此則非仲儒淺識所敢聞之至于準者本以代律取其分數調校樂器則宮商易辨若尺寸小長則六十宮商相與微濁若分數君短則六十徵羽類皆小清語其大本居然微異至于清濁相宣諧會歌管皆得應合雖積黍驗氣取聲之本清濁諧會亦須有方若間準意則辨五聲清濁之韻若善琴術則知五調調音之體參此二途以均樂器則自然應和不相奪倫如不練此必有乖謬案後漢順帝陽嘉二年冬十月行禮辟雍奏應鍾始復黃鍾作樂器隨月律是為十二之律必須次第為宮而商角徵羽以類從之尋調聲之體宮商宜濁徵羽用清若公孫崇止以十二律聲而云還相為宮清濁悉足非唯未練五調調器之法至于五聲次第自是不足何者黃鍾為聲氣之元其管最長故以黃鍾為宮太蔟為商林鍾為徵則宮徵相順若均之八音猶須錯採衆聲配成其美若以應鍾為宮大呂為商蕤賓為徵則徵濁而宮清雖有其韻不成音曲若以夷則為宮則十二律中唯得取中呂為徽其商角羽並無其韻若以中呂為宮則十二律內全無所取何者中呂為十二之竅變律之首依京房書中呂為宮乃以去滅為商執始為徵然後方韻而崇乃以中呂為宮猶用林鍾為商黃鍾為徵何由可諧仲儒以為調和樂器文飾五聲非準不妙若如嚴嵩父子心賞清濁是則為難若依案見尺作準調絃緩急清濁可以意推耳但音聲精微史傳簡略舊志唯云準形如瑟十三絃隱間九尺以應黃鍾九守調中一絃令與黃鍾相得案畫以求其聲遂不辨準須柱以下柱有高下絃有粗細餘十二絃復應若為致令攬者迎前拱手又案房準九尺之內為一十七萬七千一百四十七分一尺之內為萬九千六百八十三分又復十之是為于準一寸之內亦為萬九千六百八十三分然則于準一分之內乘為二十分又為小分以辨強弱中間至促雖復離朱之明猶不能窮而分之雖然仲儒私曾考驗但前卻中柱使入常準尺分之內則相生之韻已自應合然分數既微器宜精妙其準面平直須如停水其中絃一柱高下須與二頭臨嶽一等移柱上下之時不使離絃不得舉絃又中絃粗細須與琴宮相類中絃須施軫如琴以軫調聲令與黃鍾一管相合中絃下依數畫出六十律清濁之節其餘十二絃須施柱如箏又凡絃皆須豫張使臨時不動即于中絃案畫一周之聲度著十二絃上然後依相生之法以次運行取十二律之商徵商徵既定又依琴五調調聲之法以均樂器其調以宮為主清調以商為主平調以角為主五調各以一聲為主然後錯採衆聲以文飾之方如錦繡自上代以來消息調準之方並史文所略出仲儒愚思若事有乖此聲則不和仲儒尋準之分數精微如彼定絃緩急艱難若此而張光等親掌其事尚不知藏中有準既未識其器又焉能施絃也且燧人不師資而習火延壽不束修以變律故云知之者欲教而無從心達者體知而無師苟有一毫釐所得皆關心抱豈必要經師授然後為奇哉但仲儒自省膚淺才非贍足正可粗識音韻才言其理致耳魏書樂志先是有陳仲儒者自江南歸國頗間樂事請依京房立準以調八音神龜二年夏有司問狀仲儒言云云又見通典一百四十三上前廢帝疏臣聞崇禮建學列代之所修尊經重道百王所不易是以均熟洞起昭明之頌載揚膠序大闢都穆之詠斯顯伏惟大魏乘乾統物欽若奉寺模唐軌虞率由前訓重以高祖繼聖垂衣儒風載蔚得才之盛如彼薪槱固以追隆周而並驅駕炎漢而獨邁宣皇下武式遵舊章用能揄揚盛烈聿修厥美自茲已降世極道消風猷稍遠澆薄方競退讓寂寥馳競靡節進必吏能升非學藝是使刀筆小用計日而期榮專經大才甘心于陋巷然治之為本所貴得賢苟值其人豈拘常檢三代兩漢異世間出或釋褐中林鬱登卿尹或投竿釣渚徑升公相事炳丹青義在往策彼哉邈乎不可勝紀竊以今之所用弗修前矩至如當世通儒冠時盛德見徵不過四門登庸不越九品以此取士求之濟治譬猶卻行以及前之燕而向楚積習之不可者其所由來者漸矣昔魯興泮宮頌聲爰發鄭廢學校國風以譏將以納民軌物莫始于經禮菁莪育才義光于篇什自兵亂以來垂將十載干戈日陳俎豆斯闕四海荒涼民物凋敝名教頓虧風流殆盡世之陵夷可為歎息陛下中興纂曆理運維新方隅稍康實維文德但禮賢崇讓之科沿世未備還淳反朴之化起言斯繆夫先黃老而退六經史遷終其成蠹貴玄虛而賤儒術應氏所以亢言臣雖不敏敢忘前載且魏武在戎尚修學校宣尼確論造次必儒臣愚以為宜重修國學廣延胄子使函丈之教日聞釋奠之禮不闕并詔天下郡國興立儒教考課之程咸依舊典苟經明行修宜擢以不次抑斗筲喋喋之才進大雅汪汪之德博收鴻生以光顧問縶維奇異共精得失使區寰之內競務仁義之風荒散之餘漸知禮樂之用豈不美哉臣誠暗短敢慕前訓用稽古義上塵聽覽伏願陛下垂就日之監齊非煙之化儻以臣言可採乞特施行魏書羊深傳規崔亮書殷周以鄉孰貢士兩漢由州郡薦才魏晉因循又置中正諦觀在昔莫不審舉雖未盡美足應十收六七而朝廷貢才止求其文不取其理察孝廉唯論章句不及治道立中正不考人才行業空辨氏姓高下至于取士之途不溥沙汰之理未精而舅屬當銓衡宜須改張易調如之何反為停年格以限之天下士子誰復修厲名行哉魏書崔亮傳亮遷吏部尚書奏為停年格制亮外甥司空咨議劉景安書規亮又見北史四十四通典十四
