body:
  text: 崔道固上表請罪臣資生南境限隔大化本朝不以卑末委授藩任而劉氏蕭牆內侮懼貽大戮前遣崔啟之奉表歸誠幸蒙陛下過垂矜納并賜爵寵慶佩罔極應奔闕庭但劉彧尋續遣使恕臣百死愚以世奉劉氏深愆蒙宥若猶違背則是不忠于本朝而欲求忠于大魏雖曰希生懼大魏之所不許是用迷回孤負天日冒萬死之艱固執拒守僕臣白曜振曜威靈漸經二載大將臨城以今月十四日臣東郭失守于臣款彧之誠庶可以彰于大魏矣臣勢窮力屈以十七日面縛請罪白曜奉宣皇恩恕臣生命斯實陛下起臣死尸肉臣朽骨天地造物所不能行而陛下育之雖虞舜之貸有苗姬文之宥崇壘方之聖澤未足以喻既未奉朝旨無由親馳道路謹遣大息景徽束骸歸闕伏聽刑斧魏書崔玄伯附傳道固復叛皇興初顯祖詔慕容白曜築長圍攻其城東郭道固面縛請罪表復族兄惠景書主上之為人也無幽不照無細不存仁則無遠不及博則無典不究殫三墳之微盡九丘之極至于文章錯綜煥然蔚炳猶夫子之牆矣遂乃開獨悟之明尋先王之迹安遷靈荒兆變帝基惟新中壤宅臨伊域三光起重輝之照庶物蒙再化之始分氏定族料甲乙之科班官命爵清九流之貫禮俗之敘粲然復興河洛之閒重隆周道巷歌邑頌朝熙門穆濟濟之盛非可備陳矣加以累葉重光地兼四岳士馬彊富人神欣仰道德仁義民不能名且大人出本所無在況從上聖至天子天孫者乎聖上諸弟風度相類咸陽王已下莫不英越枝葉扶疏徧在天下所稱稍蝎殊為未然文士競謀于廟堂武夫效勇于疆埸若論事勢此為實矣計彼王篡殺之迹人鬼同知疑親猜貴早暴遐邇兄投心逆節千載何名物患無施器非時用生不振世沒無令聲先師以為鄙君子以為恥此則事困伎殫自勉無益故其宜矣以兄之才夙起鄉土如弟之徒誰不瞻仰每尋昔念未敢忘懷雖復途遙二千心想若對敬遵軌範以資一生今名可揚矣而不能顯親事可變矣而不能離辱故世之所未解也且君子在家也不過孝于其親入朝也不過忠于其君主上之于兄恩則不可酬義則不可背身可殺也故非其酬功不逮也故非其報今可以效矣而又弗為非孝也即實而言兄之不變得為忠乎至于講武爭彊不敵者久矣論安與危不同者驗矣群情背去獨留者謬矣願深察之王晏道絕外交器非雄朗專華保望便就屠割方之于兄其全百倍且淮蕃海捍本出北豪壽春之任兄何由免以是而言猜嫌已決又宗門未幾南北莫寄先構之重非兄何託受社之榮鄙心之相望矣今執志不寤忠孝兩忘王晏之辜安能自保見機而作其在茲乎國家西至長安東盡即墨營造器甲必盡堅精晝夜不息者于茲數載今秋中月雲羅必舉賈不及時雖貴不用若不早圖況枉連城矣枚乘有言欲出不出閒不容髮精哉斯談弟中于北京身罹事譴大造之及有獲為幸比蒙清舉起崖疑非一犬馬之心誠有在矣雖復彼此為異猶昔情不移也況于今日哉如兄之誨如弟之規改張易調易于反掌萬一乖情此將運也魏書崔玄伯附傳齊明帝遣僧淵族兄惠景遺書規令改圖僧淵復書上言祫禘今宣武皇帝主雖入廟然烝嘗時祭猶別寢室至于殷祫宜存古典案禮三年喪畢祫于太祖明年春禘于群廟又案杜元凱云卒哭而除三年喪畢而禘魏武皇后以太和四年六月崩其月既葬除服即吉四月行事而猶未禘王肅以為既除即吉故特時祭至于禘祫宜存古禮高堂隆如肅議于是停殷祭又仰尋太和二十三年四月孝文帝崩其年十月祭廟景明元年七月祫于太祖三年春禘于群廟亦三年乃祫惟古禮及晉魏之議并景明故事愚謂來秋七月祫祭應停宜待三年終乃後祫禘通典五十奏開銅鑛恆農郡銅青谷有銅鑛計一斗得銅五兩四銖葦池谷鑛計一斗得銅五兩鸞帳山鑛計一斗得銅四兩河內郡王屋山鑛計一斗得銅八兩南青州苑燭山齊州商山並是往昔銅官舊迹見在謹案鑄錢方興用銅處廣既有冶利並宜開鑄魏書食貨志熙平二年冬尚書崔亮奏又見通典九荅劉景安書汝所言乃有深致吾乘時邀幸得為吏部尚書當其壯也尚不如人況今朽老而居帝難之任常思同升舉直以報明主之恩盡忠竭力不為貽厥之累昨為此格有由而然今巳為汝所怪千載之後誰知我哉可靜念吾言當為汝論之吾兼正六為吏部郎三為尚書銓衡所宜頗知之矣但古今不同時宜須異何者昔有中正品其才第上之尚書尚書據狀量人授職此乃與天下群賢共爵人也吾謂當爾之時無遺才無濫舉矣而汝猶云十收六七況今日之選專歸尚書以一人之鑑照察天下劉毅所云一吏部兩郎中而欲究竟人物何異以管闚天而求其博哉今勳人甚多又羽林入選武夫崛起不解書計唯可彍弩前驅指蹤捕噬而巳忽令垂組乘軒求其烹鮮之效未曾操刀而使專割又武人至多官員至少不可周溥設今十人共一官猶無官可授況一人望一官何由可不怨哉吾近面執不宜使武人入選請賜其爵厚其祿既不見從是以權立此格限以停年耳昔子產鑄刑書以救獘叔向譏之以正法何異汝以古禮難權宜哉仲尼云德我者亦春秋罪我者亦春秋吾之此指其由是也但令當來君子知吾意焉魏書崔亮傳通典十四請以司空行參軍讓從叔和表臣誠微賤未登讓品屬逢聖朝恥無讓德魏書崔亮附傳誡子孫吾自謂立身無慚古烈但以祿命有限無容希世取進在官以來不冒一級官雖不達經為九卿且吾平生素業足以遺汝官閥亦何足言也吾既運薄便經三娶而汝之兄弟各不同生合葬非古吾百年之後不須合也然贈諡之及出自君恩豈容子孫自求之也勿須求贈若違吾志如有神靈不享汝祀吾兄弟自幼及老衣服飲食未曾一片不同至于兒女官婚榮利之事未嘗不先以推弟弟頃橫禍權作松櫬亦可為吾作松棺使吾見之魏書崔亮附傳議用辥欽朱元旭船運計刳木為舟用興上代鑿渠通運利盡中古是以漕輓河渭留侯以為偉談方舟蜀漢酈生稱為口實豈直張純之奏見美東都陳勰之功事高晉世其為利益所從來久矣案欽所列實允弗宜郎中之計備盡公理但舟楫所通遠近必至苟利公私不宜止在前件昔人乃遠通襃斜以利關中之漕南達交廣以增京洛之饒況乃漳洹夷路河濟平流而不均彼省煩同茲巨益且鴻溝之引宋衛史牒具存討虜之通幽冀古迹備在舟車省益理實相懸水陸難易力用不等昔忝東州親逕驗斯損益不可同年而語請諸通水運之處皆宜率同此式縱復五百三百里車運水次校計利饒猶為不少其欽所列州郡如請興造東路諸州皆先通水運今年租調悉用舟楫若船數有闕且賃假充車比之僦車交成息耗其先未通流宜遣檢行閑月修治使理有可通必無壅滯如此則發召匪多為益實廣一爾蹔勞久安永逸魏書食貨志賊諸子汝等宜皆一體勿作同堂意若不用吾言鬼神不享汝祭祀北史二十四休誠諸子云云休亡枕中有書如平生所誡崔光請復李彪史職表伏見前御史中尉臣李彪夙懷美意創刊魏典臣昔為彪所致與之同業積年其志力貞彊攷迹無倦督勸群寮注綴略舉雖頃來契闊多所廢離近蒙收起還綜厥事老而彌厲史才日新若克復舊職專功不殆必能昭明春秋闡成皇籍既先帝厚委宿歷高班纖負微愆應從滌洗愚謂宜申以常伯正綰著作停其外役展其內思研積歲月紀冊必就鴻聲巨迹蔚乎有章盛軌懋詠鑠焉無泯矣魏書李彪傳景明二年春崔光表荅詔問雞禍表臣謹案漢書五行志宣帝黃龍元年未央殿路軨中雌雞化為雄毛變而不鳴不將無距元帝初元中丞相府史家雌雞伏予漸化為雄冠距鳴將永光中有獻雄雞生角劉向以為雞者小畜主司時起居小臣執事為政之象也言小臣將乘君之威以害政事指石顯也竟寍元年石顯伏辜此其效也靈帝光和元年南宮寺雌雞欲化為雄一身毛皆似雄但頭冠尚未變詔以問議郎蔡邕邕對曰貌之不恭則有雞禍臣竊推之頭為元首人君之象也今雞一身已變未至于頭而上知之是將有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大是後張角作亂稱黃巾賊遂破壞四方疲于賦役民多叛者上不改政遂至天下大亂今之雞狀雖與漢不同而其應頗相類矣向邕竝博達之士攷物驗事信而有證誠可畏也臣以邕言推之翅足眾多亦群下相扇助之象雛而未大腳羽差小亦其勢尚微易制御也臣聞災異之見皆所以示吉凶明君覩之而懼乃能招福闇主視之彌慢所用致禍詩書春秋秦漢之事多矣此陛下所觀者也今或有自賤而貴關預政事殆亦前代君房之匹比者南境死亡千計白骨橫野存有酷恨之痛歿為怨傷之魂義陽屯師盛夏未返荊蠻狡猾征人淹次東州轉輸往多無還百姓困窮絞縊以殞北方霜降蠶婦輟事群生憔悴莫甚于今此亦賈誼哭歎谷永切諫之時司寇行戮君為之不舉陛下為民父母所宜矜恤國重戎戰用兵猶火內外怨敝易以亂離陛下縱欲忽天下豈不仰念太祖取之艱難先帝經營劬勞也誠願陛下留聰明之鑒警天地之意禮處左右節其貴越往者鄧通董賢之盛愛之正所以害之又躬饗加罕宴宗或闕時應親肅郊廟延敬諸父檢訪四方務加休息爰發慈旨撫振貧瘼簡費山池減撤聲飲晝存政道夜以安身博采芻蕘進賢黜佞則兆庶幸甚妖弭慶進禎祥集矣魏書崔光傳正始元年夏有典事史元顯獻四足四翼雞詔散騎侍郎趙邕以問光光表荅云云世宗覽之大悅後數日而茹皓等竝以罪失伏法又見北史四十四荅敕示太極西序菌表去二十八日有物出于太極之西序敕以示臣臣案其形即莊子所謂蒸成菌者也又云朝菌不終晦朔雍門周所稱磨蕭斧而伐朝菌皆指言蒸氣鬱長非有根種柔脆之質凋殞速易不延旬月無擬斧斤又多生墟落穢溼之地罕起殿堂高華之所今極宇崇麗牆築工密糞朽弗加沾濡不及而茲菌歘構厥狀扶疏誠足異也夫野木生朝野鳥入廟古人以為敗亡之象然懼災修德者咸致休慶所謂家利而怪先國興而妖豫是故桑穀拱庭太戊以昌雊雉集鼎武丁用熙自比鴟鵲巢于廟殿梟鵩鳴于宮寢菌生賓階軒坐之正準諸往記信可為誡且東南未靜兵革不息郊甸之內大旱跨時民勞物悴莫此之甚承天子育者所宜矜恤伏願陛下追殷二宗感變之意側躬聳誠惟新聖道節夜飲之忻彊朝御之膳養方富之年保金玉之性則魏祚可以永隆皇壽等于山岳魏書崔光傳正始二年八月光表又見北史四十四求取高綽等撿驗厤法表易稱君子以治厤明時書云厤象日月星辰迺同律度量衡孔子陳後王之法曰謹權量審法度春秋舉先王之正時也履端于始又言天子有日宮是以昔在軒轅容成作厤逮乎帝唐羲和察影皆所以審農時而重民事也太和十一年臣自博士遷著作忝司載述時舊鐘律郎張明豫推步厤法治己丑元草刱未備乃遷中京轉為太史令未幾喪亡所造致廢臣中脩史景明初奏求奉車都尉領太史令趙樊生著作佐郎張洪給事中領太樂令公孫崇等造厤功未及訖而樊生又喪洪出除涇州長史唯崇獨專其任暨永平初亦已略舉時洪府解停京又奉令重脩前事更取太史令趙勝太廟令龐靈扶明豫子龍祥共集祕書與崇等詳驗推建密厤然天道幽遠測步理深候觀遷延歲月滋久而崇及勝前後並喪洪所造厤為甲午甲戌二元又除豫州司馬靈扶亦除蒲陰令洪至豫州續造甲子己亥二元唯龍祥在京獨修前事以皇魏運水德為甲子元兼校書郎李業興本雖不豫亦和造厤為戊子元三家之術並未申用故貞靜處士李謐私立厤法言合紀次求就其兄瑒追取與洪等所造遞相參攷以知精麤臣以仰測晷度實難審正又求更取諸能算術兼解經義者前司徒司馬高綽駙馬都尉盧道虔前冀州鎮東長史祖瑩前并州秀才王延業謁者僕射常景等曰集祕書與史官同檢疏密并朝貴十五日一臨推驗得失擇其善者奏聞施用限至歲終但世代推移軌憲時改上元今古攷準或異故三代課步始卒各別臣職豫其事而朽墯已甚既謝運籌之能彌愧意算之蓺由是多歷年世茲業弗成公私負責俯仰慚視魏書律厤志上延昌四年冬侍中國子祭酒領著作崔光表
