body:
  text: 孝明帝依崔光請祫祭詔太常援引古今並有證據可依請魏書禮志二任城王澄奏太常卿崔亮上言秋七月應祫祭孝明詔行新政詔高祖革禮成治遺澤在民世宗纂承丕業聖德昭遠朕以沖孺屬當寶圖洪基至重若履冰薄王公百辟群牧庶官皆受遇先朝寵榮自昔宜各勉崇共康世道戮力意誠以匡輔不逮其有懷道丘園昧迹板築山棲谷飲舒卷從時者宜廣戔帛緝和鼎飪有能讜言直諫濟世益時者在所以聞當待以不次之位孝子順孫義夫節婦表其門閭以彰厥美高年孤獨不能自存者贍以粟帛若因飢失業天屬流離或賣鬻男女以為僕隸者各聽歸還比冀方未肅徐城寇擾將統久勞士卒疲敝並遣撫慰賜以衣馬緣邊州鎮固捍之勞朔方酋庶北面所委亦令勞賚以副其心其有先朝舊事寢而不舉頃來便習不依軌式者並可疏聞當加覽裁若益時利治不拘常制者自依別例其明申約稱朕意焉魏書孝明紀皇太后親覽萬機詔云云憂旱詔炎旱積辰苗稼萎悴比雖微澍猶未霑洽晚種不納企望憂勞在豫之責思自兢厲尚書可釐恤獄犴察其淹枉簡量輕重隨事以聞無使一人怨嗟增傷和氣土木作役權皆休罷勸農省務肆力田疇庶嘉澤近降豐年可必魏書孝明紀催遣傅豎眼救益州詔比敕傅豎眼倍道兼行而猶未達可更遣尚書郎堪幹者一人馳馹催遣庶令拔彼倒懸救茲危急魏書元法僧傳帝王墳陵勿聽耕稼詔先賢列聖道冠生民仁風盛德煥乎圖史暨曆數永終迹隨物變陵隧沓藹鞠為茂草古帝諸陵多見踐藉可明敕所在諸有帝王墳陵四面各五十步勿聽耕稼魏書孝明紀報高昌王麴嘉求內徙詔卿地隔關山境接荒漠頻請朝援徙國內遷雖來誠可嘉即于理未怗何者彼之氓庶是漢魏遺黎自晉氏不綱因難播越成家立國世積已久惡徙重遷人懷戀舊今若動之恐異同之變爰在肘腋不得便如來表魏書高昌國傳報任城王澄今古錢通用詔錢行已久今東尚有事且依舊用魏書食貨志復戰沒兵士詔揚州硤石荊山新淮酇城兵士戰沒者追給斂財復一房五年若無妻子復其家一人二年身被三瘡賞一階雖一瘡而四體廢落者亦同此賞魏書孝明紀戚族在敘詔皇魏開基道邁周漢蟬連二都德盛百祀雖帝胤蕃衍親賢並茂而猶沈屈素履巾褐衡門非所謂廣命戚族翼屏王室者也今可依世近遠敘之列位魏書孝明紀月望親聽訟詔察訟理冤實維政首躬親聽覽民信所由比日諒暗之中治綱未振獄犴繁廣嗟訴驟聞雖曰司存每多誣壅曾是寡德實深矜慨自今月望當暫出城闉親納滯枉主者可宣諸近遠咸使聞知魏書孝明紀北京未遷者聽仍停詔北京根舊帝業所基南遷二紀猶有留住懷本樂故未能自遣若未遷者悉可聽其仍停安堵永業門才術藝應于時求者自別徵引不在斯例周之子孫漢之劉族遍于海內咸致蕃衍豈拘南北千里而已哉魏書孝明紀給老民郡縣板詔朕沖昧撫運政道未康民之疾苦弗遑紀恤夙宵矜慨鑒寐深懷眷彼百齡悼茲六極京畿百年以上給大郡板九十以上給小郡板八十以上給大縣板七十以上給小縣板諸州百姓百歲以上給小郡板九十以上給上縣板八十以上給中縣板鰥寡孤獨不能自存者給粟五斛帛二匹魏書孝明紀輕囚減等詔朕沖昧纂曆未間政道皇太后殷憂在疚始覽萬幾故獄犴淹枉百姓冤敝言念繁刑思存降省京師見囚殊死以下可悉減一等魏書孝明紀居喪不從役詔頃年以來戎車頻動服制未終奪哀從役罔極之痛弗申鞠育之恩靡報非所謂敦崇至道者也自今雖金革之事皆不得請起居喪魏書孝明紀崇憲太后服詔崇憲皇太后德協坤儀徵符月晷方融壼化奄至崩殂朕幼集荼蓼夙憑德訓及戡蔬定難是賴謨謀夫禮沿情制義循事立可特為齊衰三月以伸追仰之心魏書禮志四通典八十旌異盧元禮妻李氏詔孔子稱毀不滅性蓋為其廢養絶類也李既非嫡子而孝不勝哀雖乖依就而志厲義遠若不加旌異則無勸引澆浮可追號曰貞孝女宗易其里為孝德里標李盧二門以敦風俗魏書列女盧元禮妻李氏傳乾脯山以西為九原詔民生有終下歸兆域京邑隱賑口盈億萬貴賤攸憑未有定所為民父母尢宜存恤今制乾脯山以西擬為九原魏書孝明紀皇太后稱詔詔朕以沖眇纂承寶位夙夜惟寅若涉淵海賴皇太后慈仁被以夙訓自臨朝踐極歲將半紀天平地成四海寧乂天道高遠巍巍難名猶以撝挹自居稱號弗備非所以崇奉坤元允協億兆者也宜遵舊典稱詔宇內以副黎蒸元元之望魏書孝明紀改葬文昭高太后詔文昭皇太后德協坤儀美符文姒作合高祖實誕英聖而夙世淪暉狐塋弗𥘑先帝孝感自衷遷奉未遂永言哀恨義結幽明廢呂尊薄禮伸漢代魏書孝文昭后高氏傳又詔文昭皇太后尊配高祖祔廟定號促令遷奉自終及始太后當主可更上尊號稱太皇太后以同漢晉之典正姑婦之禮廟號如舊文昭遷靈櫬于長陵兆西北六十步魏書孝文昭后高氏傳雩祈詔農要之月時澤弗應嘉穀未納三麥枯悴德之無感歎懼兼懷可敕內外依舊雩祈率從祀典察獄理冤掩胔埋骼冀瀛之境往經寇暴死者既多白骨橫道可遣專令收葬賑窮恤寡救疾存老準訪前式務令周備魏書孝明紀答蕭寶夤詔禮樂之事蓋非常人所明可如所奏魏書樂志處決劉輝事詔容妃慧猛恕死髡鞭付宮餘如奏通典一百六十七蘭陵公主駙馬都尉劉輝坐與河陰縣民張智壽妹容妃陳慶和妹慧猛姦亂毆主傷胎輝懼罪逃亡門下處奏容妃慧猛各入死刑智壽慶和並以知情不加防限處以流坐詔云云又詔輝悖法亂理罪不可縱厚賞懸募必望擒獲容妃慧猛與輝私亂因此耽惑主致非常此而不誅將何懲肅且已醮之女不應坐及昆弟但智壽慶和知妹姦情初不防禦招引劉輝共成淫醜敗風穢化理深其罰特敕門下結獄不拘恆司豈得一同常例以為通準且古有詔獄寧復一歸大理而尚書治本納言所屬弗究悖理之淺深不詳損化之多少違彼義途苟存執憲殊乖任寄深合罪責崔纂可免郎都坐尚書悉奪祿一時魏書刑罰志門下處奏劉輝事詔如奏尚書三公郎中崔纂執不下尚書元修義右僕射遊肇各奏請更議詔云云又見通典一百六十七釋奠詔建或緯民立教為本尊師崇道茲典自昔來歲仲陽節和氣潤釋奠孔顏乃其時也有司可豫繕國學圖飾聖賢置官簡牲擇吉備禮魏書孝明紀旱災申囚枉濫詔朕以寡薄運膺寶圖雖未明求衣惕懼終日而暗昧多闕炎旱為災在豫之愧無忘寢食今刑獄繁多囹圄尚積宜敷仁惠以濟斯民八座可推鞠見囚務申枉濫魏書孝明紀旱災理冤獄詔攘災招應修政為本民乃神主實宜率先刺史守令與朕共治天下宜哀矜勿喜視民如傷況今炎旱歷時萬姓雕敝而不撫恤窮冤理決庶獄可嚴敕州郡善加綏隱務盡聰明加之祗肅必使事允人紳時致雲應其賦役不便于民者具以狀聞便當蠲罷魏書孝明紀封阿那瓌為蠕蠕王詔蠕蠕世雄朔方擅制漠裔鄰通上國百有餘載自神鼎南底纍紀于茲虔貢雖違邊燧靜息憑心象魏潛款彌純今其主阿那瓌屬離時難邦分親析萬里遠馳庇命有道悲同申伍忠孝足矜方存興滅之師以隆繼絶之舉宜且優以賓禮期之立功疏爵祚土大啓河嶽可封朔方郡開國公蠕蠕王食邑一千戶錫以衣冕加以軺車祿恤儀衛同乎戚蕃魏書孝明紀答張普惠諫送阿那瓌還國詔夫窮鳥歸人尚或興惻況那瓌嬰禍流離遠來依庇在情在國何容弗矜且納亡興喪有國大義皇魏堂堂寧廢斯德後主亂亡似當非謬此送彼迎想無拒戰國義宜表朝算已決卿深誠厚慮朕用嘉戢但此段機略不獲相從脫後不逮勿憚匡言魏書張普惠傳詔遣楊鈞送蠕蠕主阿那瓌還國普惠上疏諫云云詔答護送阿那瓌還國詔蠕蠕王阿那瓌遭離寇禍遠來投庇邦分衆析猶無定主而永懷北風思還綏集啓疏情切良用愍然夫存亡恤敗自古通典可差國使及彼前後三介與阿那瓌相隨并敕懷朔都督簡鋭騎二千躬自率護送達境首今觀機招納若彼候迎宜錫筐篚車馬之屬務使優隆禮餞而返如不容受任聽還闕其行裝資遣付尚書量給魏書孝明紀得蠕蠕使者牒詔舊經蠕蠕使者牒云具仁往喻婆羅門迎阿那瓌復藩之意婆羅門殊自驕慢無遜避之心責具仁禮敬具仁執節不屈婆羅門遣文官莫何去汾俟斤丘升頭六人將兵二千隨具仁迎阿那瓌魏書蠕蠕傳優禮江陽王繼詔至節嘉辰禮有朝慶親尊戚老理宜優異王位高年宿可依齊郡王簡故事朝訖引坐免其拜伏魏書京兆王黎附傳憂旱詔時澤弗降禾稼形損在豫之責夙宵震懼雖克躬撤降仍無招感有司可修案舊典祗行六事圄犴淹枉隨速鞫決庶尹廢職量加修厲鰥獨困窮在所存恤役賦煩民咸君蠲省賢良讜直以時升進貪殘邪佞即就屏黜男女怨曠務令會偶庶革止懲違有弭災沴魏書孝明紀詔蠕蠕阿那瓌北鎮群狄為逆不息蠕蠕主為國立忠助加誅討言念誠心無忘寢食今知停在朔垂與爾朱榮鄰接其嚴勒部曲勿相暴掠又近得蠕蠕主啓更欲為國東討但蠕蠕主世居北漠不宜炎夏今可且停聽待後敕魏書蠕蠕傳祈雨詔朕以沖昧夙纂寶曆不能祗奉上靈感延和氣致令炎旱頻歲嘉雨弗洽百稼燋萎晚種未下將成災年秋稔莫覬在豫之責憂懼震懷今可依舊分遣有司馳祈嶽瀆及諸山川百神能興雲雨者盡其虔肅必令感降玉帛牲牢隨應薦享上下群官側躬自厲理冤獄止土功減膳撤懸禁止屠殺魏書孝明紀班宣正光曆大赦詔治曆明時前王茂軌考辰正筆奕代通規是以北平革定于漢年揚偉草算于魏世自皇運肇基典章猶缺推步晷曜未盡厥理先朝仍世每所慨然至神龜中始命儒官改創疏踳回度易憲始會璇衡今大正斯始陽煦將開品物初萌宜變耳目所謂魏雖舊邦其曆維新者也便可班宣內外號曰正光曆又首節嘉辰獲展丘禘神人交和理契幽顯思與億兆共此維新可大赦天下魏書孝明紀詔中尉中尉端衡肅厲威風以見事糾劾七品六品祿足代耕亦不聽錮貼店肆爭利城市魏書孝明紀報崔光乞劉昺子孫免役詔昞德冠前世蔚為儒宗太保啓陳深合勸善其孫等三家特可聽免魏書劉昞傳年滿七十得與銓敘及解官給半祿詔達尊斯在齒豫一焉崇敬黃耇先代通訓故方叔以元老處位充國緣自強見留雖七十致仕明乎典故然以德尚壯許其縶維今庶寮之中或年迫懸車循禮宜退但少收其力老棄其身言念勤舊眷然未忍或戴白在朝未當外任或停私曆紀甫受考級如此之徒雖滿七十聽其蒞民以終常限或新解郡縣或外佐始停已滿七十方求更敘者吏部可依令不奏其有高名俊德老成髦士灼然顯達為時所知者不拘斯例若才非秀異見在朝官依令合解者可給本官半祿以終其身使辭朝之叟不恨歸于閭巷矣魏書孝明紀賑恤北垂遭寇詔狂蠢肆暴陵竊北垂雖軍威時接賊徒懾遁然獯虐所過多離其禍言念斯敝有軫深懷可敕北道行臺遣使巡檢遭寇之處飢餒不粒者厚加賑恤務令存濟魏書孝明紀災異修省詔朕以眇暗忝承鴻緒因祖宗之基託王公之上每鑒寐屬慮思康億兆比雨旱愆時星運舛錯政理闕和靈祗表異永尋夕惕載恧于懷宜詔百司各勤厥職諸有鰥寡窮疾冤滯不申者並加釐恤若孝子順孫廉貞義節才學超異獨行高時者具以言上朕將親覽加以旌命魏書孝明紀議討破落汗拔陵詔朕比以鎮人搆逆登遣都督臨淮王剋時除翦軍屆五原前鋒失利二將殞命兵士挫衄又武川乖防復陷凶手恐賊勢浸淫寇連恆朔金陵在波夙夜憂惶諸人宜陳良策以副朕懷魏書李崇傳北鎮破落汗拔陵反臨淮王彧敗于五原安北將軍李叔仁敗于白道詔引丞相令僕尚書侍中黃門于顯陽殿詔云云又詔去歲阿那瓌叛逆遣李崇令北征崇遂長驅塞北返旆榆關此亦一時之盛崇乃上表求改鎮為州罷削舊貫朕于時以舊典難革不許其請尋李崇此表開諸鎮非異之心致有今日之事但既往難追為復略論此耳朕以李崇國戚望重器識英斷意欲還遣崇行總督三軍揚旌恆朔除彼群盜諸人謂可爾以不魏書李崇傳免軍貫為民以討莫折念生詔賞貴宿勞明主恆德恩沾舊績哲后常範太祖道武皇帝應期撥亂大造區夏世祖太武皇帝纂戎丕緒光闡王業躬率六師掃清逋穢諸州鎮城人木充牙爪服勤征旅契闊行間備嘗勞刻逮顯祖獻文皇帝自北被南淮海思又便差割強族分衛方鎮高祖孝文皇帝遠遵盤庚將遷嵩洛規遏北疆蕩闢南境選良家酋帥增戍朔垂戎捍所寄實惟斯等先帝以其誠效既亮方加酬錫會宛郢馳烽朐泗告警軍旗頻動兵連積歲茲恩仍寢用迄千今怨叛之興頗由于此朕叨承乾曆撫馭宇宙調風布政思廣惠液宜追述前恩敷茲後施諸州鎮軍貫元非犯配者悉免為民鎮改為州依舊立稱此等世習干戈率多徑勇今既甄拔應思報效可三五簡發討彼沙隴當使人齊其力奮擊先驅妖黨狂醜必可蕩滌衝鋒斬級自依恆賞魏書孝明紀咸陽京兆二王諸于聽附屬籍詔周德崇厚蔡仲享國漢道仁恕淮南畢王皆所以申恩懿戚蠲蕩舊釁義彰曩葉詠流前史頃者咸陽京兆王自貽禍敗事由間惑猶有可矜兩門諸子並可聽附屬籍魏書咸陽王禧附傳崔光伯申代詔光伯自蒞海沂清風遠著兼其兄光韶復能辭榮侍養兄弟忠孝宜有甄録可更申三年以厲風化魏書崔亮附傳亮從父弟光伯除北海太守有司以其更漏依例奏代肅宗詔考課詔勸善黜惡經國茂典其令每歲一終郡守列令長刺史列守相以定考課辨其能否若有濫謬以考功失衷論魏書孝明紀改州郡上司徒公文為上相府詔丞相高陽王道德淵廣明允篤誠儀形太階垂風下國實所以豫違汝弼致治責成宜班新制宣之遐邇其州郡先上司徒公文悉可改上相府施行符告皆亦如之魏書孝明紀令一品至五品各舉所知詔選衆而舉其來自昔朕纘承大業綜理萬幾求賢致治心焉若渴知人則哲振古所難宜博訪公卿采茲聲實可令第一品以下五品以上人各薦其所知不限素身居職必使精辨器藝具注所能然後依牒簡擢隨才收敘庶濟濟之美無替往時謇謇之直有申茲歲魏書孝明紀追削劉騰爵位除元叉名為民詔朕以寡昧夙承天曆茫若涉海罔知所濟實憑宗社降祐之靈庶勉幼志以康世道而祌龜之末權臣擅命元叉劉騰陰相影響遂使皇太后幽隔後宮太傳清河王無辜致害相州刺史中山王熙橫被夷滅右衛將軍奚康生仍見誅翦從此已後無所畏忌恣諸侵求任所與奪無君之心積習稍久不臣之迹緣事彌彰蔽耳目之明專生殺之柄天下為之不康四郊由茲多壘此而可忍孰不可懷雖屢經赦宥未容致之于法猶宜辨正以謝朝野騰身既往可追削爵位叉之非狀誠合徽纆但以宗枝舊戚特加全貸可除名為民魏書孝明紀削黜侯剛詔剛因緣時會恩隆自久擢于凡品越升顯爵往以微勤賞同利建寵靈之極超絶夷等曾無犬馬識主之誠方懷梟獍返噬之志與權臣元叉婚姻朋黨虧違典制長直禁中一出一入迭為姦防又與劉騰共為心膂間隔二宮逼脅內外且位居繩憲糾察是司宜立格言勢同鷹隼方嚴楚撻枉服貞良專任凶威以直為曲不忠不道深暴民聽附下罔上事彰幽顯莫大之罪難從宥原封爵之科理宜貶奪可征虜將軍餘悉削黜魏書侯剛傳封鹿悆為定陶縣子詔日者法僧父子頑固自天長惡不已竊城外叛職此亂階遂使彭宋名藩翻為賊有雖宗臣名將揮戈于泗濱虎士雄卒竦劍于汁渚然高墉峻堞非可易登廣涘深隍實為難踐是用日昃忘食中宵憤惋者也而衍都督豫章王蕭綜體運知機欲歸有道潛遣密信送款于都督臨淮王于時事同夜光能不案劍殿中侍御史監軍鹿悆不憚虎口視險若夷便能占募入驗虛實誓盟既固所圖遂果返地復城息我兵甲亦是悆之力焉若不酬以榮祿何以勸厲將來可封定陶縣開國子食邑三百戶除員外散騎常侍魏書鹿悆傳蕭綜降詔云云齒敘功臣子孫詔追功表德為善者勸祖宗功臣勒銘王府而子孫廢替淪于凡民爵位無聞遷流有失潁川名守重泉令宰惠風美政結于民心而猶同常品未蒙褒陟非所謂愛及甘棠彝倫攸敘者也其功臣名將為先朝所知子孫屈塞不見齒敘牧守令長聲稱卓然者皆仰有司具以名聞朕將振彼幽滯用闡治風魏書孝明紀親老聽居官祿養詔大孝榮親著之昔典故安平耄耋諸子滿朝自今諸有父母年八十以上者皆聽居官祿養溫凊朝夕魏書孝明紀出師詔高祖以大明定功世宗以下武寧亂聲溢朔南化清中宇業盛隆周祚延七百朕幼齡纂曆夙馭鴻基戰戰兢兢若臨淵谷暗于治道政刑未孚權臣擅命亂我朝式致使西秦跋扈朔漠構妖蠢爾荊蠻氛埃不息孔熾甚于涇陽出軍切于細柳而師旅盤桓留滯不進北淯縣危南陽告急將虧荊沔之地以致蹙國之憂今茅轂扼腕爪牙歎憤並欲摧挫封豕剿截長蛇使人神兩泰幽明獻古朕將躬馭六師掃蕩逋穢其配衣六軍分隸熊虎前驅後隊左翼右師必令將帥雄果軍吏明濟糧仗車馬速度時須其有失律亡軍兵戍逃叛盜賊劫掠伏竄山澤者免其往咎録其後效別立募格聽其自新廣下州郡令赴軍所今先討荊蠻疆理南服戈旗東指掃平淮外然後奮七萃于西戎騰五牛于北狄躬撫亂離之苦面恤飢寒之患爾乃還蹕嵩宇飲至廟庭沈璧河洛告成泰岱豈不盛歟百官內外牧守軍宰宜各肅勤用明爾職魏書孝明紀詔高陽王雍比相府弗開陰陽未變王秉哲居宗勳望隆重道庇蒼生威被華裔體國猶家匪躬在節可開府置佐史魏書高陽王雍傳改封東平王略詔昔劉蒼好善利建東平曹植能文大啓陳國是用聲彪磐石義鬱維城侍中義陽王略體自蕃華門勳夙著內潤外朗兄弟偉如既見義忘家捐生殉國永言忠烈何日忘之往雖弛擔為梁今便言旋詣闕有志有節能始能終方傳美丹青懸諸日月略前未至之日即心立稱故封義陽王然國邊地寓食他邑求之二三未為盡善宣比德均封追芳曩烈可改封東平王戶數如前洛陽伽藍記募士詔自運屬艱棘歷載于茲烽驛交馳旌鼓不息祖宗盛業危若輟旒社稷鴻基始將淪墜朕威德不能遐被經略無以及遠俾令蒼生罹此塗炭何以苟安黃屋無愧黔黎今便避居正殿蔬餐素服當親自招募收集忠勇其有直言正諫之士敢決徇義之夫二十五日悉集華林東門人別引見共論得失班告內外咸使聞知魏書孝明紀聽宗室子女離絶詔頃舊京淪覆中原喪亂宗室子女屬籍在七廟之內為雜戶濫門所拘辱者悉聽離絶魏書孝明紀輸粟授官詔關隴遭罹寇難燕趙賊逆憑陵蒼生波流耕農靡業加諸轉運勞役已甚州倉儲實無宜懸圚自非開輸賞之格何以息遭運之煩凡有能輸粟入瀛定岐雍四州者官斗二百斛賞一階入二華州者五百石賞一階不限多少粟畢授官魏書孝明紀答高謙之詔此啓深會朕意付外量聞魏書高謙之傳謙之上疏乞新舊典洛陽河陰二令得入奏是非詔答以毛鴻賓為北雍刺史詔此以晝錦榮卿也北史四十九毛避附傳改北地郡為北雍州鴻賓為刺史詔
