body:
  text: 孫惠蔚上書言童子衰麻如成人臣雖識謝古人微涉傳記近取諸身遠取諸禮驗情以求理尋理以推制竊謂童子在幼之儀居喪之節冠杖之制有降成人衰麻之服略為不異以玉藻二𥳑微足明之曰童子之節錦紳并紐錦即大帶既有佩觿之革又有錦紐之紳此明童子雖幼已備二帶以凶類吉則腰絰存焉又曰童子無緦服鄭注曰雖不服緦猶免深衣是許其有裳但不殊上下又深衣之制長幼俱服童子為服之緦猶免深衣況居有服之斬而反無裳乎臣又聞先師舊說童子常服類深衣衰裳所施理或取象但典無成言故未敢孤斷又曰聽事則不麻則知不聽事麻矣故注曰無麻往給事此明族人之喪童子有事貫絰帶麻執事不易故暫聽去之以便其使往則不麻不往則絰如使童子本自無麻禮腰首聽與不聽俱闕兩絰唯舉無麻足明不備豈得言聽事則不麻乎以此論之有絰明矣且童子不杖不廬之節理儉于責不裳不絰之制未覩其說又臣竊解童子不衣裳之記是有聞之言將謂童子時甫稚齡未就外傳出則不交族人內則事殊長者餕旨父母之前往來慈乳之手故許其無裳以便易之若在志學之後將冠之初年居二九質竝成人受道成均之學釋菜上庠之內將命孔氏之門執燭會參之室而唯有掩身之衣無蔽下之裳臣愚未之安矣又女子未許嫁二十則笄觀祭祀納酒漿助奠廟堂之中視禮至敬之處其于婉容之服寧無其備以此推之則男女雖幼理應有裳但男子未冠禮謝三加女子未出衣殊狄緣無名之服禮文罕見童子雖不當室苟以成人之心則許其人服緦之絰輕猶有絰斬重無麻是為與輕而專重非禮之意此臣之所以深疑也又衰傍有衽以掩裳際如使無裳衽便徒設若復去衽衰又不備設有齊斬之故而便成童男女唯服無衽之衰去其裳絰此必識禮之所不行亦以明矣若不行于己而立制于人是為違制以為法從制以誤人恕禮而行理將異此魏書禮志三太和十九年太師馮熙薨有數子尚幼議者以為童子之節事降成人謂為衰而不裳免而不絰又無腰麻繆垂唯有絞帶時博士孫惠蔚上書言上疏請校補祕書臣聞聖皇之御世也必幽贊人經參天二地憲章典故述遵鴻猷故易曰觀乎天文以察時變觀乎人文以化成天下然則六經百氏圖書祕籍乃承天之正術治人之貞範是以溫柔疏遠詩書之教恭儉易良禮樂之道爻彖以精微為神春秋以屬辭為化故大訓炳于東序藝文光于麟閣斯實太乎之樞宗勝殘之要道有國之靈基帝王之盛業安上靖民敦風美俗其在茲乎及秦棄學術禮經泯絶漢興求訪典文載舉先王遺訓燦然復存暨光武撥亂日不暇給而入洛之書二千餘兩魏晉之世尢重典墳收亡集逸九流成備觀其鳩閲史篇訪購經論紙竹所載略盡無遺臣學闕通儒思不及遠徒循章句片義無立而慈造曲覃廁班祕省忝官承乏唯書是司而觀閣舊典先無定目新故雜糅首尾不全有者纍帙數十無者曠年不寫或篇第褫落始末淪殘或文壞字誤謬爛相屬篇目雖多全定者少臣今依前丞臣盧昶所撰甲乙新録欲裨殘補闕損併有無校練句讀以為定本次第均寫永為常式其省先無本者廣加推尋搜求令足然經記浩博諸子紛綸部帙既多章篇紕繆當非一一校書歲月可了今求令四門博士及在京儒生四十人在祕書省專精校考參定宇義如蒙聽許則典文允正群書大集魏書孫惠蔚傳惠蔚既入東觀見典籍未周上疏詔許之上言禫終應祫明年應禘臣聞國之大禮莫崇明祀祀之大者莫過禘祫所以嚴祖敬宗追養繼孝合享聖靈審諦昭穆遷毀有恆制尊卑有定體誠愨著于中百順應于外是以惟王創制為建邦之典仲尼述定為不刊之式暨秦燔詩書鴻籍泯滅漢氏興求拾綴遺篆淹中之經孔安所得唯有卿大夫士饋食之篇而天子諸侯享廟之祭禘祫之禮盡亡曲臺之記戴氏所述然多載尸灌之義牲獻之數而行事之法備物之體蔑有具焉今之取證唯有王制一𥳑公羊一冊考此二書以求厥旨自餘經傳雖時有片記至于取正無可依攬是以兩漢淵儒魏晉碩學咸據斯文以為朝典然持論有深淺及義有精浮故令傳記雖一而探意乖舛伏惟孝文皇帝合德乾元應靈誕載玄思洞微神心畼古禮括商周樂宣韶濩六籍幽而重昭五典淪而復顯舉二經于和中一姬公于洛邑陛下睿哲淵凝欽明道極應必世之期屬功成之會繼文垂則實惟下武而祫禘二殷國之大事蒸嘗合享朝之盛禮此先皇之所留心聖懷以之永慕臣聞司宗初開致禮清廟敢竭愚管輒陳所懷謹案王制曰天子犆礿祫禘祫嘗祫蒸鄭玄曰天子諸侯之喪畢合先君之主于祖廟而祭之謂之祫後因以為常魯禮三年喪畢而格于太祖明年春禘于群廟自爾之後五年而再殷祭一祫一禘春秋公羊魯文二年八月丁卯大事于太廟傳曰大事者何大祫也大祫者何合祭也毀廟之主陳于太祖未毀廟之主皆升合食于太祖五年而再殷祭何休曰陳者就陳列太祖前太祖東鄉昭南鄉穆北鄉其餘孫從王父父曰昭子曰穆又曰殷盛也謂三年祫五年禘禘所以異于祫者功者皆祭也祫猶合也禘猶諦也審諦無所遺失察記傳之文何鄭祫禘之義略可得聞然則三年喪畢祫祭太祖明年春祀遍禘群廟此禮之正也古之道也又案魏氏故事魏明帝以景初三年正月崩至五年正月積二十五晦為大祥太常孔美博士趙怡等以為禫在二十七月到其年四月依禮應祫散騎常侍王肅博士樂詳等以為禫在祥月至其年二月宜應祫祭雖孔王異議六八殊制至于喪畢之祫明年之禘其議一焉陛下永惟孝思恩心即禮取鄭捨王禫終此晦來月中旬禮應大祫六室神祏外食大祖明年春享咸禘群廟自茲以後五年為常又古之祭法時祫竝行天子先祫後時諸侯先時後祫此于古為當在今則煩且禮有升降事有文節通時之制聖人弗違當祫之月宜減時祭以從要省然大禮久廢群議或殊以臣觀之理在無怪何者心制既終二殷口始祫禘之正實在于斯若停而闕之唯行時祭七聖不聞合享百辟不覩盛事何以宣昭令問垂式後昆乎皇朝同等三代治邁終古而令徽典缺千昔人鴻美慚于往志此禮所不行情所未許臣學不鉤深思無經遠徒閲章句蔑爾無立但飲澤聖時銘恩天造是以妄盡區區冀有塵露所陳蒙允請付禮官集定儀注魏書禮志二世宗景明二年六月祕青丞孫惠蔚上云云又見通典五十重議有喪不作鼓吹司空禮服衰麻心懷慘切其于聲樂本無作理但以鼓吹公議致有疑論耳案鼓吹之制蓋古之軍聲獻捷之樂不常用也有重位茂勳乃得備作方之金石準之管絃其為音奏雖曰小殊然其大體與樂無異是以禮云鼓無當于五聲五聲不得不知竊惟今者加台司之儀蓋欲兼廣威華若有哀用之無變于吉便是一人之身悲樂竝用求之禮情于理未盡二公雖受之于公用之非私出入聲作亦以娛巳今既有喪心不在樂笳鼓之事明非欲聞宜從寧戚之義廢而勿作但禮崇公卿出入之儀至有趨以采齊行以肆夏和鑾之聲佩玉之飾者所以顯槐鼎之至貴彰宰輔之為重今二公地處尊親儀殊百辟鼓吹之用無容全去禮有懸而不樂今陳之以備威儀不作以示京痛述理節情愚謂為允魏書禮志四延昌三年清河王懌有叔母喪高肇有兄子喪竝上言未知出入猶作鼓吹不封祖胄議宜止蔣雅哲韓神固議不闕房景先駮祕書監國子祭酒孫惠蔚及封祖胄重議詔可又見通典八十二表諫南伐伏承六軍雲動問罪荊陽弔民淮表一同甌越但臣愚見私竊未安何者京邑新遷百姓易業公私草創生途索然兼往歲弗稔民多饑饉二三之際嗟惋易興天道悠長宜遵養時晦願抑赫斯以待後日魏書樓伏連附傳上書諫連坐充役周書父子罪不相及天下善人少惡人多以一人犯罪延及合門司馬牛受桓魋之罰柳下惠嬰盜砳之誅豈不哀哉魏書崔挺傳時立重制一人犯罪逋亡合門充役挺上書顧命諸子吾才疏效薄于國無功若朝廷復加贈諡宜循吾意不得祇受若致干求則非吾子斂以時服祭勿殺生魏書崔挺附傳至殷州請兵仗表竊惟殷州地實四衝居當五裂西通長山東漸巨野頃國路康寧四方有截仍聚姦宄桴鼓時鳴況今天長喪亂妖災閒起定州逆虜趑趣北界鄴下凶燼蠶噬腹心兩處犬羊勢足并合城下之戰匪暮斯朝臣以不武屬此屏捍實思效力以弱敵彊析骸煮弩固此忠節但基址造創庶事茫然升儲尺刃聊自未有雖欲竭誠莫知攸濟謹列所須兵仗請垂矜許必當虎視一方遏其侵軼肅清境內保全所委魏書崔辨附傳治河疏臣聞有國有家者莫不以萬姓為心故矜傷軫于造次求瘼結于寢興黎民阻饑唐堯致歎衆庶斯饉帝乙罰已良以為政與農實繫民命水旱緣茲以得濟夷險用此而獲安頃東北數州頻年淫雨長河激浪洪波汩流川陸連濤原隰通望彌漫不已泛濫為災戶無擔石之儲家有藜藿之色華壤膏腴變為舄鹵菽麥禾黍化作雚蒲斯用痛心徘徊潸然佇立也昔洪水為害四載流于夏書九士既平攸同紀自虞誥亮由君之勤恤臣用劬勞日昃忘餐宵分廢寢伏惟皇魏握圖臨宇揔契裁極道敷九有德被八荒槐階棘路實維英哲虎門麟閣實曰賢明天地函和日月光曜自比定冀水潦無歲不饑幽瀛川河頻年泛溢豈是陽九厄會百六鍾期故以人事而然非為運極昔魏國鹹舄史起哂之茲地荒蕪臣實為取不揆愚瞽輒敢陳之計水之湊下浸潤無閒九河通塞屢有變改不可一準古法皆循舊隄何者河決瓠子梁楚幾危宣防既建水還舊迹十數年閒戶口豐衍又決屯氏兩川分流東北數郡之地僅得支存及下通靈鳴水田一路往昔膏腴十分病九邑居凋離墳井毀滅良由水大渠狹更不開瀉衆流壅塞曲直乘之所致也至若量其逶迤穿鑿溝澮分立隄堨所在疏通預決其路令無停蹙隨其高下必得地形土水參功務從便省使地有金隄之堅水有非常之備鉤連相注多置水口從河入海遠邇徑過瀉其撓瀉泄此陂澤九月農罷量役計功十月昏正立匠表度縣遣能工麾畫形勢郡發明使籌察可否審地推岸辨其脈流樹拔分崖練厥從往別使案檢分部是非瞰睇川原明審通塞當境修治不勞役遠終春自罷未須久功即以高下營田因于水陸水種粳稻陸藝桑麻必使室有久儲門豐餘積其實上葉禦災之方亦為中古井田之利即之近事有可比倫江淮之南地勢汙下雲雨陰霖動彌旬月遙途遠運惟用舟艫南畝畬菑微事耒耜而衆庶未為饉色黔首罕有饑顏豈天德不均致地偏罰故是地勢異圖有茲豐餒臣既鄉居水際目覩荒殘每思鄭白屢想王李夙宵不昧言念皇家愚誠丹款實希效力有心螢爝乞暫施行使數州士女無廢耕桑之業聖世洪恩有賑饑荒之士鄴宰深笑息自一朝臣之至誠申于今日魏書崔辨附傳于時冀定數州頻遭水害崔楷上疏奏請更議劉輝事伏見旨募若獲劉輝者職人賞二階白民聽出身進一階廝役免役奴婢為良案輝無叛逆之罪賞同反人劉宣明之格又尋門下處奏以容妃慧猛與輝私姦兩情耽惑令輝挾忿毆主傷胎雖律無正條罪合極法竝處入死其智壽等二家配敦煌為兵天慈廣被不即施行雖恕其命竊謂未可夫律令王者所以治天下不為喜怒增減不由親疏改易案鬭律祖父母父母分怒以兵刃殺子孫者五歲刑毆殺者四歲刑若心有愛憎而故殺者各加一等雖王姬下降貴殊常妻然人婦之孕不得非子又依永平四年先朝舊格諸刑流及死律者皆首罪判定後決從者事必因本以求支獄若以輝逃避便應懸募未有捨其首罪而成其末愆流死參差或時未允門下中禁大臣職布敷奏昔邴吉為相不存鬭斃而問牛喘豈不以同別故也案容紀等罪止于姦私若擒之穢席衆證分明即律科處不越杖刑坐何得同宮掖之罪齊奚官之律案智壽口訴妹適司士曹參軍羅顯貴已生二女于其夫則他家之母禮云婦人不二夫猶曰不二天若私門失度罪在于夫釁非兄弟昔魏晉未除五族之刑有免子戮母之坐何曾諍之謂在室之女從父母之刑己醮之婦從夫家之刑斯乃不刊之令軌古今之通議律許周親相隱之謂凡罪況姦私之醜豈得以同氣相證論刑過其所犯語情又乖律憲案律姦罪無相緣之坐不可借輝之忿加兄弟之刑夫刑人于市與衆棄之爵人于朝與衆共之明不私于天下無斯于耳目何得目非正刑書施行四海刑名一失駟馬不追既有詔旨依即行下非律之案理宜更請魏書刑罰志神龜中蘭陵公主駙馬劉輝坐與河陰縣民張智壽妹容妃陳慶和妹慧猛姦亂毆主傷貽輝懼罪逃亡門下處奏容妃慧猛各入死刑智壽慶和竝以知情不加防限處以流坐詔容妃慧猛恕死髡鞭付宮餘如奏尚書三公郎中崔纂執云云又見通典一百六十七獄成許家人陳訴議律文獄己成及決竟經所綰而疑有姦斯不直于法及訴冤枉者得攝訊覆治之檢使處罪者雖已案成御史風彈以痛誣伏或栲不承引依證而科或有私嫌彊逼成罪家人訴枉辭案相背刑憲不輕理須訊鞠既為公正豈疑于私如謂窺不測之澤抑絶訟端則枉滯之徒終無申理若從其案成便乖覆治之律然未判經赦及覆治理狀真僞未分承前以來如此例皆得復職愚謂經奏遇赦及已覆治得為獄成魏書刑罰志延昌三年六月兼廷尉卿元志監王靖等上言獄成不容家人陳訴大理正崔纂評楊機丞申休律博士劉安元等議劉景暉九歲且赦後不合死坐議景暉云能變為蛇雉此乃傍人之言雖殺暉為無理恐赦暉復惑衆是以依違不敢專執當今不諱之朝不應行無罪之戮景暉九歲小兒口尚乳臭舉動云為竝不關已月光之稱不出其口皆姦吏無端橫生粉墨所謂為之者巧殺之者能若以妖言惑衆據律應死然更不破闕惑衆赦令之後方顯其律令之外更求其罪赦律何以取信于天下天下焉得不疑于赦律乎書曰與殺無辜寧失有罪又案法例律八十已上八歲已下殺傷論坐者上請議者謂悼耄之罪不用此律愚以老智如尚父少惠如甘羅此非常之士可如其議景暉愚小自依凡律魏書刑罰志熙平中廷尉卿裴涎俊上言月光童子劉景暉妖言惑衆事在赦後合死坐正崔纂以為無談子論闕後主蠲雜戶詔諸寺署所綰雜保戶姓高者天保之初雖有優敕權假力用未免者今可悉蠲雜戶任屬郡縣一準平人北齊書後主紀
