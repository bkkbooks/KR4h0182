body:
  text: 劉昶上宋前廢帝表請葬竟陵王誕竊聞淮南中霧眷求遺緒楚英流殛愛存丘墓並難結兩臣義開二主法雖事斷禮或情申伏見故賊劉誕稱戎犯節自詒逆命膏斧嬰戮在憲已彰但尋屬忝皇枝位叨列辟一以罪終魂骸莫赦生均宗籍死同匹豎旅窆委雜封樹不修今歲月愈邁愆流釁往踐境興懷感事傷目陛下繼明升運咸與惟新大德方臨哀矜莫及夫欒布哭巿義犯雷霆田叔鉗赭志于夷戮況在天倫何獨無感伏願稽若前準降申丹志乞薄改褊祔微表窀穸則朽骨知榮窮泉識荷臨紙哽慟辭不自宣宋書竟陵王誕傳前廢帝即位義陽王昶為征北將軍徐州刺史道經廣陵上表詔以庶人禮葬并置守衛乞停更與宋主書表臣殖根南偽託體不殊秉旄作牧職班台位天厭子業夷戮同體背本歸朝事捨簪笏臣弟彧廢姪自立彰于遐邇孔懷之義難奪為臣之典靡經棠棣之詠可修越敬之事未允臣若改書事為二敬猶修往文彼所不納伏望聖慈停臣今答魏書劉昶傳皇興中顯祖詔昶與彧書彧不答責昶以外臣之禮尋敕昶更與彧書昶表云云巿廷從之求邊戍啓臣本國不造私有虐政不能廢昏立德扶定傾危萬里奔波投蔭皇闕仰賴天慈以存首領然大恥未雪痛愧纏心屬逢陛下釐校之始願垂曲恩處臣邊戍招集遺人以雪私恥雖死之日猶若生年魏書劉昶傳疾篤上疏臣聞忠于事君者節義著于臨終孝于奉親者淳誠表干垂沒故孔明卒軍不忘全蜀之計曾參疾甚情存善言之益雖則庸昧敢忘景行臣荷天地覆載之恩蒙大造生成之德漸風訓于華年服道教于弱冠濯纓清朝垂周三紀受先帝非分之眷叨陛下殊常之寵遂乃齊迹功舊內侍幃幄爵列諸王位班上等從容聞道與知國政誠思竭盡力命以報所受不謂事與心違忽嬰重疾每屈輿駕親臨問之榮洽生平惠流身後犬馬之誠銜佩罔極今所病遂篤慮必不起延者闕庭鯁戀終日仰恃皇造宿眷之隆敢陳愚昧管窺之見臣聞為治之要其略有五一者慎刑罰二者任賢能三者親忠信四者遠讒佞五者行黜陟夫刑罰明則姦宄息賢能用則功績著親忠信則視聽審遠讒佞則疑間絶黜陟行則貪叨改是以欽恤惟刑載在唐典知人則哲惟帝所難周書垂好德之文漢史列防姦之論考省幽明先王大典又八表既廣遠近事殊撫荒裔宜待之以寬信綏華甸宜惠之以明簡哀恤孤獨賑施困窮録功舊赦小罪輕徭役薄賦斂修福業禁淫祀願聽政餘暇賜垂覽察使子囊之誠重申于當世將墜之志獲用于明時魏書王睿傳上孝武帝讜言疏伏奉詔書以風雹厲威上動天眷訪讜辭于百辟詔輿誦于四海宸衷懇切備在絲綸祗承兢感心焉靡厝伏惟陛下啓籙應期馭育萬物承綴旒之艱運纂纖絲之危緒忘餐日昃求衣未明俾上帝下臨愍茲荼蓼永濟溝壑而滄浪降戾作害中秋上帝照臨義不虛變竊惟風為號令皇天所以示威雹者氣激陰陽有所交諍殆行令殊節舒急失中之所致也昔澍雨千里實緣教祀之誠炎精三舍寧非善言之力譴不空發徵豈謬應誰謂蓋高實符人事伏願陛下留心曲覽垂神遠察禮賢登士博舉審官擢申滯怨振窮省役使夫滋水沒川之彥畢居朝右儀表丹表之位未或虛加圜土絶五毒之民揆日息千門之費巖巖廊署無不遇之土忪忪惸獨荷酒帛之恩則物見昭蘇人知休泰徐奏薰風之曲無論鴻鴈之歌豈不天人幸甚鬼神咸忭魏書王睿附傳敦煌移就涼州議此蹙國之事非闢土之宜愚謂敦煌之立其來已久雖土鄰強寇而兵人素習縱有姦竊不能為害循常置戍足以自全進斷北狄之覘途退塞西夷之窺路若徙就姑臧慮人懷異志或貪留重遷情不願徙脫引寇內侵深為國患且敦煌去涼州及千餘里捨遠就近遙防有闕一旦廢罷是啓戎心則夷狄交構互相往來恐醜徒協契侵竊涼土及近諸戍則關右荒擾烽警不息邊役煩興艱難方甚魏書韓秀傳延興中尚書奏以敦煌一鎮介遠西北寇賊路衝慮或不固欲移就涼州群官會議僉以為然秀獨謂非便上表請屯田臣聞金湯之固非粟不守韓白之勇非糧不戰故自用兵以來莫不先積聚然後圖兼并者也今江左未賓鯨鯢待戮自不委粟彭城以強豐沛將何以拓定江關掃一衡霍竊惟在鎮之兵不減數萬資糧之絹人十二匹即自隨身用度無準未及代下不免飢寒論之于公無毫釐之潤語其利私則橫費不足非所謂納民軌度公私相益也徐州左右水陸壤沃清汴通流足盈激灌其中良田十餘萬頃若以兵絹市牛分減戍卒計其牛數足得萬頭興力公田必當大獲粟稻一歲之中且給官食半兵耘植餘兵尚衆且耕且守不防捍邊一年之收過于十倍之絹暫時之耕足充數載之食于後兵資唯須內庫五稔之後穀帛俱溢匪直戍士有豐飽之資于國有吞敵之勢昔杜預田宛葉以平吳充國耕西零以強漢臣雖識謝古人任當邊守庶竭塵露有增山海魏書辥野豬附傳虎子為徐州刺史時州鎮戍兵資絹自隨不入公庫任其私用常苦飢寒虎子上表上疏請寬省徵調臣聞先王建不易之軌萬代承之聖主垂不刊之制千載共仰伏惟陛下道洽群生恩齊造化仁德所覃迹超前哲遠崇古典留意治方革前王之斃法申當今之宜用定貢賦之輕重均品秩之厚薄庶令百辟足以代耕編戶享其餘蓄巍乎煥焉不可量也臣竊尋居邊之民蒙化日淺戎馬之所資計素微小戶者一丁而已計其徵調之費終歲乃有七縑去年徵責不備或有貨易田宅質妻賣子呻吟道路不可忍聞今淮南之人思慕聖化延頸企足十室而九恐聞賦重更懷進退非惟損皇風之盛慮傷慕義之心且臣所居與南連接民情去就實所諳知特宜寬省以招未至其小郡太守數戶而已一請止六尺絹歲不滿匹既委邊捍取其必死邀之士重何吝君輕今班制已行布之天下不宜忤冒以亂朝章但猥藉恩私備位蕃嶽憂責之地敢不盡言魏書辥野豬附傳喻下邳宿豫城內書劉彧肆逆滔天弗鑒靈命猶謂絶而復興長江可恃敢遣張永周凱等率此蟻衆送死彭城大軍未臨逆首奔潰今乘機電舉當屠此城遂平吳會弔民伐罪幸時歸款自求多福魏書孔伯恭傳請孝文帝居喪節哀表王者居極至尊至重父天母地懷柔百靈是以古先哲王制禮成務施政立治必順天而後動宣憲垂範必依典而後行用能四時不忒陰陽和畼若有過舉咎徵必集故大舜至慕事在納麓之前孔子至聖喪無過瘠之紀堯書稽古之美不録在服之痛禮備諸侯之喪而無天子之式雖有上達之言未見居喪之典然則位重者為世以屈已居聖者達命以忘情伏惟陛下至德參二儀惠澤覃河海宣禮明刑動遵古式以至孝之痛服期年之喪練事既闋號慕如始統重極之尊同衆庶之制廢越紼之大敬闕宗祀之舊軌誠由文明太皇太后聖略超古惠訓深至欲報之德昊天罔極比之前代戚為過甚豈所謂順帝之則約躬隨衆者也陛下既為天地所子又為萬民父母子過哀父則為之慘悴父過戚子則為之憂傷近蒙接見咫尺冕旒聖容哀毀駭感無止況神祇至靈而不久虧和氣微致風旱者哉書稱一人有慶兆民賴之今一人過哀黎元焉繫群官所以顛殞震懼率土所以危惶悚栗百姓何仰而不憂嘉禾何由而播植願陛下上承金册遺訓下稱億兆之心時襲輕服數御常膳修崇郊祠垂惠咸秩輿駕時動以釋憂煩博采廣咨以導性氣息無益之戀行利見之德則休徵可致嘉應必臻禮教並宣孝慈兼備普天蒙賴含生幸甚魏書穆崇附傳文明太后崩已過期月高祖毀瘠猶甚穆亮表奏七廟無宜闕一升平之會事在于今推功考德實如明旨但七廟之祀備行日久無宜闕一虛有所侍臣等愚謂依先尊祀可垂文示後理衷如此不敢不言魏書禮志一太和十五年四月改營太廟詔闕一廟無主以自待司空公長樂王穆亮等奏言又見通典四十七上言從李彪魏為水德議臣等受敕共議中書監高閭祕書丞李彪等二人所議皇魏行次尚書高閭以石承晉為水德以燕承石為木德以秦承燕為火德大魏次秦為土德皆以地據中夏以為得統之徵皇魏建號事接秦末晉既滅亡天命在我故因中原有寄即而承之彪等據神元皇帝與晉武並時桓穆二帝仍修舊好始自平文逮于太祖抗衡秦趙終平慕容晉祚終于秦方大魏興于雲朔據漢棄秦承周之義以皇魏承晉為水德二家之論大略如此臣等謹共參論伏惟皇魏世王玄朔下迄魏晉趙秦二燕雖地據中華德祚微淺並獲推敘于理未愜又國家積德修長道光萬載彪等職主東觀詳究圖史所據之理其致難奪今欲從彪等所議宜承晉為水德魏書禮志一太和十四年高閭議魏承秦為土德李彪崔光議魏承晉為水德十五年正月長樂王穆亮及陸睿王元孫馮誕遊明根鄧侍祖李愷郭祚衛慶封琳崔挺賈元壽等言皇太后輿駕議案周禮王后之五輅重翟鍚面朱總厭翟勒面繢總安車雕面鷖總皆有容蓋翟車貝面組總有握輦車組挽有翣羽蓋重翟后從王祭祀所乘厭翟后從王賓饗諸侯所乘安車后朝見于王所乘翟車后出桑則乘輦車后宮中所乘謹以周禮聖制不刊之典其禮文尤備孔子云其或繼周者雖百世可知也以其法不可踰以此言之後王輿服典章多放周式雖文質時變輅名宜存雕飾雖異理無全捨當今聖后臨朝親覽庶政輿駕之式宜備典禮臣等學缺通經叨參議末輒率短見宜準周禮備造五輅雕飾之制隨時增減魏書禮志四熙平元年六月太常卿穆紹少卿元端博士鄭六劉臺龍等議奏制殿名臣聞至尊至貴莫崇于帝王天人挹損莫大于謙光伏惟陛下躬唐虞之德存道頤神逍遙物外宮居之名當協睿旨臣愚以為宜曰崇光魏書公孫表附傳曉告淮源蠻天地明靈即是民之父母豈有父母甘子肉味自今以後悉宜以酒脯代魏書韋閬附傳淮源舊有祠堂蠻俗恆用人祭之韋珍乃曉告追理慕容白曜表臣聞經疆啓宇實良將之功褒德酬庸乃聖王之務昔薑公仗鉞開隆周之基韓生秉旄興鴻漢之業故能賞超當時名垂前史若閫外功成而流言內作人主猜疑良將懷懼樂毅所以背燕章邯所以奔楚至如鄧艾懷忠矯命寧國赤心皎然幽顯同見而橫受屠戮良可悲哀及士冶伐吳奮不顧命萬里浮江應機直指使孫皓君臣輿櫬入洛大功亦舉讒書驟至內外唱和貝錦將成微晉武之鑒亦幾于顛沛矣每覽其事常為痛心聖主明王固宜深察臣伏見故征南大將軍開府儀同三司青州刺史濟南王慕容白曜祖父相資世酋東裔值皇運廓被委節臣妾白曜生長王國飲服道教爵列上階位登常伯去天安初江陰夷楚敢拒王命三方阻兵連城嶽峙海岱蒼生翹首拯援聖朝乃眷南顧思救荒黎大議廟堂顯舉元將百寮同音僉日惟允遂推轂委誠授以專征之任握兵十萬仗鉞一方威陵河濟則淮徐震懼師出無鹽而申纂授首濟北太原同時消潰麋溝垣苗相尋奔走及回麾東掃道固銜璧盤陽梁鄒肉袒請命于時東陽未平人懷去就沈文靜高崇仁擁衆不朝扇擾邊服崔僧祐蓋次陽陳顯達連兵淮海水陸鋒起揚旌而至規援青齊士民忷忷莫不南顧時兵役既久咸有歸心而白曜外宣皇風內盡方略身擐甲胄與士卒同安撫初附示以厚恩三軍懷挾纊之溫新民欣來蘇之澤遂使僧祐擁徒弭旆效順軍門文靜崇仁棄城竄海次陽顯達望塵南奔聲震江吳風偃荊漢及青州剋平文秀面縛海波清靜三齊克定逖彼東南永為國有使天府納六州之貢濟泗息烽警之虞開岱宗封禪之略闢山川望秩之序斯誠宗廟之靈神算所授然抑亦白曜與有力矣及氛翳既盡爵命亦隆榮燭當時聲譽日遠而民惡其上妄生尤隙因其功高流言惑聽巧偽亂真朱紫難辨傷夷未瘳命門屠戮鴻勳盛德蔑爾無聞有識之徒能不悽愴臣謂白曜策名王庭纍荷榮授歷司出內世載忠美秉鉞啓蕃折衝敵國開疆千里拔城十二辛勤于戎旅之際契闊于矢石之間登鋒履危志存靜亂及方難既夷身膺高賞受胙河山與國升降六十之年寵靈已極觀其立功足明機運豈容僥幸更邀非望者乎且于時國家士馬屯積京南跨州連鎮勢侔雲嶽主將驍雄按鉀在所莫不殉忠死難效節奉時此之不可生心白曜足知之矣況僭逆阻兵營岱厭亂加以王師仍舉州郡屠裂齊民勞止神膽俱喪亡燼之衆不可與圖存離敗之民不可以語勇哉白曜果毅習戎體間兵勢寧不知士民之不可藉將士之不同已據強兵之勢因塗炭之民而欲立非常之事此愚夫之所弗為也料此推之事可知矣伏惟陛下聖鑒自天仁孝宰世風冠宇宙道超百王開國以來諸有罪犯極刑不得骸骨者悉聽收葬大造之恩振古未有而白曜人舊功高嬰禍淪覆名滅國除爵命無紹天下衆庶咸共哀憐方之餘流應有差異願陛下揚日月之光明勳臣之績垂天地之施慰僵尸之魂使合棺定諡歿有餘稱選其宗近才堪驅策錫以微爵繼其絶世進可以獎勸將來退可以顯國恩澤使存者荷莫大之恩死者受骨肉之惠豈不美哉仰惟聖明霈然昭覽狂瞽之言伏待刑憲魏書慕容白曜陰傳奏請采京南山青碧石柱鄉郡民李飛太原民王顯前列稱詣京南山采藥到遊越谷南嶺下見青碧石柱數百枚被詔案檢稱所見青碧柱長者一匹相接而上或方一尺二寸或方一寸方楞悉就其數既多不可具數請付作曹采用魏書靈徵志下太和元年十月南部尚書安定侯鄧宗慶奏
